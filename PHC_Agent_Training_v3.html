not propose any solution until all three are answered.",lines:[{role:"agent",text:'"Thank you for visiting today. Can I ask — what did you like most about the unit?"'},{role:"client",text:'"The view was better than I expected. And the building feels more solid than some I\'ve seen."'},{role:"agent",text:'"Good to hear. What concerned you — anything that gave you pause?"'},{role:"client",text:'"The size. 53 sqm feels a bit small. I\'d hoped for something larger."'},{role:"agent",text:'"That\'s really useful. Last question: does this type of project — the location, the building quality, the management — feel right for what you described to me?"'},{role:"client",text:'"Yes, I think so. Just the size issue."'},{role:"agent",text:'"In that case, let me show you the 2-bedroom option in the same building — 78sqm, same management, same view orientation. It\'s $40,000 more but the rental income is also higher — around $900/month vs $800. Would that be worth looking at?"'},{role:"note",text:"Debrief: Did the Agent ask all three questions before proposing anything? Did the pivot feel natural?"}],debrief:"The three debrief questions are not small talk — they are qualification data. The client tells you exactly how to close in their answers. Listen before you speak."},quiz:[{q:"Before a site visit, the most important thing to confirm is:",opts:["That the client has their passport","The exact floor, view, sqm, payment schedule, and current foreign quota remaining","That the developer has a good-looking showroom","That the unit has been furnished to show standard"],correct:1,explain:"Know your product before the visit. Floor, view, size, payment schedule, and especially the foreign quota — if quota is nearly full, you must disclose this before the visit, not during it."},{q:"During a site visit a client says 'the views are amazing.' The PHC agent response is:",opts:["'Yes, the views are incredible — one of the best in Phnom Penh!'","'This unit is floor 17, south-facing. Direct sunlight from 9am to 3pm, clear river view year-round.'","'Wait until you see the amenities downstairs.'","'Many clients have said the same thing — this is a very popular floor.'"],correct:1,explain:"Specifics signal expertise. Agreeing with 'amazing' signals a tour guide. State the facts — floor, orientation, light hours, view characteristics. This is what an Investment Advisor sounds like on a site visit."},{q:"Immediately after a site visit, the three questions you ask are:",opts:["'Are you ready to book?' · 'What budget do you have?' · 'When can you sign?'","'What did you like most?' · 'What concerned you?' · 'Does this feel like the right type for your goals?'","'Did you love it?' · 'Shall I check availability?' · 'When would you move in?'","'What did you think?' · 'Any questions?' · 'Want to see another?'"],correct:1,explain:"These three questions surface the client's positive signals, residual concerns, and fit assessment — all the information needed to propose the correct next step or pivot to a better match."},{q:"The correct next step to propose after a strong site visit is:",opts:["A booking deposit — strike while enthusiasm is high","A review of the SPA with the legal team, or viewing the next matched unit","A follow-up call in two weeks when they have had time to think","A meeting with Nick to discuss commitment"],correct:1,explain:"One clear, structured next step. Either SPA review with legal support, or a follow-up viewing of a better-matched unit. Never push for a close on the same day as a first site visit — it signals pressure, not advisory."}],reflection:"Describe what an ideal site visit looks like from your perspective — from the moment you message the client before arrival to the written follow-up the next day."},
{id:17,week:4,title:"Writing Proposals & Follow-Ups",short:"Proposals & Follow-Ups",objectives:["Produce a PHC-standard written proposal after every client meeting","Write follow-up messages that add value rather than create pressure","Know the difference between a check-in and a chase"],sections:[{label:"Why Written Communication Matters",heading:"The document is the professional",body:"Verbal conversations are forgotten. Written summaries become the reference point clients return to when making decisions — often days or weeks later, sometimes shared with family or advisors in other countries. A well-written PHC proposal can close a deal without a single additional conversation. A poorly written one can undo a great meeting.",box:{title:"PHC written communication standard:",lines:["Every client meeting → same-day written summary (email or WhatsApp structured message)","Every site visit → written summary within 24 hours","Every qualified investor → written proposal within 48 hours of first meeting","Format: clear, structured, data-led — no marketing language, no pressure"]}},{label:"The PHC Proposal Structure",heading:"What a proposal must contain",body:"A PHC proposal is not a brochure. It is a structured advisory document. Every section serves a purpose.",rules:[{title:"1. Client situation summary",detail:"2–3 sentences summarising what the client told you: their goal, timeline, budget, and risk profile. This shows you listened."},{title:"2. Your recommendation and why",detail:"State the 1–2 projects you recommend. For each: why this project fits their stated criteria (not why it is a great project in general)."},{title:"3. The numbers",detail:"Net yield calculation. Total cost of purchase including stamp duty. Monthly income estimate. CGT on a modelled exit scenario. Show your working."},{title:"4. Risks — explicitly stated",detail:"State the 2–3 most relevant risks for this client's profile: exit liquidity, CGT, vacancy rate, off-plan construction risk (if applicable). This is the section that builds the most trust."},{title:"5. Clear next step",detail:"One action. 'I suggest we schedule an SPA review with our legal team this week.' Not multiple options — one clear proposal."}]},{label:"Follow-Up Principles",heading:"Add value or stay silent",body:"The most common follow-up mistake is sending a message that adds no new information and simply says 'just checking in.' This is pressure disguised as care. PHC follow-ups always add something: a market update, a relevant data point, a direct answer to an open question.",rules:[{title:"The value-add check-in",detail:"'I wanted to share that the foreign quota on Le Condé has moved to 64% as of this week — relevant to your timeline. Let me know if you would like to discuss.' This is a check-in with a reason."},{title:"The answer to an open question",detail:"If the client asked something you could not answer immediately, the follow-up is the answer. 'You asked about the management fee at J Tower 3 — I confirmed it is $1.8/sqm/month, identical to J Tower 2.' This is high-trust follow-up."},{title:"The re-qualification after silence",detail:"After 7–10 days of no response: 'I wanted to reach out — not to push, but to check if anything has changed in your timeline or situation. If there is new information I can provide, I am happy to do so.' This is professional. 'Are you still interested?' is not."}]}],roleplay:{scenario:"Sending a follow-up after a first meeting with a European investor",instructions:"Write the message live. Read it aloud before the debrief.",lines:[{role:"note",text:"Context: German investor, 52, interested in Le Condé or J Tower 3, timeline 3–6 months, $200K budget, main concern was exit liquidity."},  {role:"agent",text:"'Dear Mr. Schmidt, thank you for visiting us today. As discussed, I am attaching a summary of the two projects I recommended for your profile, along with the full cost calculations and the risks I mentioned — including exit liquidity. The key numbers: Le Condé 1BR, BKK1, completed: total cost ~$164K including stamp duty. Net yield estimate ~5.2%. The REAKH J Tower 2 case study (5-year verified result) is included as a reference point for realistic long-term return. Next step I would suggest: a call with our European advisor Reza, who can walk you through the legal structure in detail. Are you available this week? Best regards, [Agent Name], Property Hub Cambodia.'"},{role:"note",text:"Debrief: Was there any pressure language? Were the risks visible? Was there exactly one next step?"}],debrief:"The best follow-up reads like a memo from a trusted advisor, not a message from a salesperson. If it could have been sent by an agent at any agency, it is not PHC quality. It should be specific to what that client told you."},quiz:[{q:"A PHC written proposal must always include:",opts:["A developer brochure and price list","Client situation summary, recommendation with rationale, net yield numbers, risks, and one next step","A comparison of at least 5 projects","Testimonials from previous clients"],correct:1,explain:"The five components: client situation (you listened) · recommendation with rationale (you matched) · numbers (you are precise) · risks (you are honest) · one next step (you are clear). Each component has a trust function."},{q:"A client has not responded for 8 days. The PHC follow-up message is:",opts:["'Hi, just checking in — are you still interested?'","'Hi, prices on Le Condé may be moving — wanted to give you a heads up.'","'I wanted to reach out — not to push, but to check if anything has changed in your timeline or if there is new information I can provide.'","'Hi, I have not heard from you. Do you want to proceed or not?'"],correct:2,explain:"The re-qualification follow-up after silence is a professional check-in, not pressure. It opens a door without pushing through it. 'Not to push' is a PHC phrase — it signals advisor behaviour, not sales behaviour."},{q:"The risks section in a PHC proposal is:",opts:["Optional — only include if the client asked about risks","A brief disclaimer at the bottom","A prominent, explicitly stated list of the 2–3 most relevant risks for this client's profile","Only required for off-plan projects"],correct:2,explain:"The risks section is the most trust-building part of the proposal. It shows the client you are an advisor, not a salesperson. Make it prominent and specific to their profile — not a generic legal disclaimer."},{q:"Which of the following is a PHC-quality follow-up message?",opts:["'Just wanted to check — any decision yet?'","'I confirmed the management fee at J Tower 3 that you asked about — $1.8/sqm/month, same as J Tower 2. Happy to walk through the full cost model if useful.'","'Hi! Great meeting yesterday. Let me know if you want to move forward.'","'The market is moving fast — you should decide soon.'"],correct:1,explain:"This follows the value-add principle: it answers an open question, it is specific to the conversation, and it adds new information. No pressure, no urgency — just professional follow-through."}],reflection:"Write a PHC-standard proposal for a Japanese investor who is interested in J Tower 3, has a $200K budget, and whose main concern is developer reliability."},
{id:18,week:4,title:"Pipeline & Deal Management",short:"Pipeline Management",objectives:["Understand the PHC pipeline stages and what drives each one","Know how to manage multiple clients simultaneously without losing quality","Identify which leads to invest time in — and which to park or walk away from"],sections:[{label:"The PHC Pipeline Stages",heading:"Every client is in a stage — know which one",body:"Pipeline management is not about tracking — it is about knowing what each client needs next and delivering it. An agent with 20 leads managed with precision will outperform an agent with 50 leads managed loosely. Quality of follow-through beats volume of contacts.",table:{headers:["Stage","Definition","What the client needs next"],rows:[["New lead","First contact made, not yet qualified","5-min qualification — goal, budget, timeline, risk tolerance"],["Qualified","Segment identified, budget and timeline confirmed","Project shortlist + initial proposal within 48 hrs"],["Presented","Projects shown, first proposal sent","Responses to objections + site visit offer"],["Site visited","Physical viewing completed","Debrief summary + SPA review offer or re-match"],["Proposal sent","Full written proposal delivered","Space to decide + value-add check-in at 7 days"],["In legal review","SPA with client's legal advisor","Facilitate review, answer questions, do not rush"],["Ready to close","Client confirmed intent","Booking deposit process + clear timeline to SPA"],["Closed","Booking paid, SPA signed","Handover support, property management setup"],["Parked","Not ready — timeline 6+ months out","Light-touch update every 4–6 weeks, no pressure"]]}},{label:"Time Allocation",heading:"Who deserves your time this week",body:"Most agents spread time evenly across all leads. This is a mistake. PHC agents concentrate time on the leads where their action will move the deal forward. The rest get a light-touch holding position.",rules:[{title:"High-focus leads",detail:"Qualified leads who have seen at least one project and have a timeline under 3 months. These are the deals to invest time in every day."},{title:"Maintenance leads",detail:"Leads who are qualified but timeline is 3–6 months. Weekly or bi-weekly check-in with value-add information. No heavy selling."},{title:"Parked leads",detail:"Timeline 6+ months, or missing a critical qualification element. Monthly update — a relevant market data point, a new project announcement. No meetings until they re-qualify."},{title:"Auto-reject leads",detail:"No clear budget, unrealistic yield expectations (15%+ net), nominee enquiries, or rental income under $500/month. Close politely. Do not invest time."}]},{label:"Weekly Pipeline Review",heading:"The CEO metrics — know your numbers",body:"Nick reviews these metrics weekly. You should know your own numbers before he asks. These are the numbers that measure the health of your pipeline.",grid:[["Leads this week","New first contacts made. Track source: REAKH listing, referral, social media, walk-in."],["Qualification rate","% of leads that pass the 5-minute qualification. Low rate = you are talking to the wrong people."],["Site visits this week","Qualified leads who have physically viewed a project. This is the most predictive metric for closings."],["Proposals sent","Written proposals delivered to qualified leads. Every qualified client should have a proposal within 48 hours."],["Closings","Booking deposits paid and SPAs in progress. This is the output metric."],["Pipeline value","Estimated transaction value of all qualified active leads. Know this number."]]}],roleplay:{scenario:"Weekly pipeline review conversation with Nick",instructions:"Practice being specific and honest — no vague answers.",lines:[{role:"nick",text:'"Walk me through your pipeline. How many qualified leads do you have this week?"'},{role:"agent",text:'"Seven active qualified leads. Three are in the presented stage — I sent proposals last week. Two have done site visits and I\'m waiting on SPA review responses. One is ready to close — booking deposit expected by Friday. One I\'m re-classifying as parked — their timeline pushed to Q4."'},{role:"nick",text:'"What\'s the status on the three you sent proposals to?"'},{role:"agent",text:'"Lead 1 — German investor, responded with a question about CGT calculation. I\'m sending the worked example today. Lead 2 — Japanese couple, no response in 6 days. I\'m sending a value-add check-in this afternoon — the J Tower 3 pre-sale announcement. Lead 3 — Overseas Cambodian, confirmed they need one more week for family discussion."'},{role:"note",text:"Debrief: Was the Agent specific? Did they know exactly where each lead was and what was needed next?"}],debrief:"Pipeline management is the discipline that separates a productive week from a reactive one. If you do not know the status of every qualified lead before Monday morning, you are already behind."},quiz:[{q:"A client has been in the 'proposal sent' stage for 10 days with no response. You should:",opts:["Move them to lost and focus on new leads","Send a value-add check-in — not a pressure message — with a relevant data point or answered open question","Call them daily until they respond","Send the proposal again with a lower price"],correct:1,explain:"10 days of silence after a proposal is normal. A value-add check-in reopens the conversation without creating pressure. A relevant data point — foreign quota update, a new project launch, a confirmed answer to their question — is the right tool."},{q:"Which of these leads should receive the most of your time this week?",opts:["A new enquiry with a $500K budget but no clear timeline","A qualified lead who visited a site 5 days ago, has a 2-month timeline, and asked about the SPA process","A parked lead who contacted you 6 months ago but said they would be ready 'next year'","An overseas lead who has not responded in 3 weeks"],correct:1,explain:"The site-visited, short-timeline, SPA-interested lead is closest to closing. Focus goes where action moves the deal forward. High-focus leads are those where your next contact or action can change the stage."},{q:"The PHC auto-reject criteria for leads includes:",opts:["Clients who ask too many questions","Clients with a timeline over 6 months","Leads with no clear budget, unrealistic yield expectations, or nominee enquiries","Clients from Eastern Europe or Asia"],correct:2,explain:"Auto-reject: no clear budget, 15%+ net yield expectations, nominee structure requests, or rental income under $500/month target. These leads consume time and damage standards. Close politely and move on."},{q:"The most predictive pipeline metric for upcoming closings is:",opts:["Number of new leads generated","Number of WhatsApp messages sent","Number of site visits conducted by qualified leads","Number of proposals sent"],correct:2,explain:"Site visits are the most reliable leading indicator. A qualified lead who has visited a project and has a short timeline is the closest thing to a confirmed closing in real estate. Track this metric every week."}],reflection:"Write your honest pipeline review for this week: how many qualified leads do you have, where are they in the stages, and what is the one specific action needed for each?"},
{id:19,week:4,title:"Performance Standards & Self-Evaluation",short:"Performance Standards",objectives:["Know PHC's performance standards and what they measure","Be able to evaluate your own performance honestly using data — not feelings","Identify one specific improvement to work on in your next 4 weeks"],sections:[{label:"What PHC Measures",heading:"The metrics that define performance",body:"Performance at PHC is not measured by hours worked, enthusiasm, or how many client messages you sent. It is measured by outcomes and quality of process. Nick reviews these metrics weekly. You should review them daily.",box:{title:"PHC weekly CEO metrics — know your numbers:",lines:["Leads: new first contacts this week (source tracked)","Viewings: qualified leads who completed a site visit","Closings: booking deposits paid or SPAs signed","Revenue: commission confirmed this week","Pipeline value: total estimated transaction value of active qualified leads","Conversion rate: closings ÷ qualified leads (track over rolling 4-week period)"]}},{label:"Quality Standards",heading:"The standard is not the average",body:"Volume without quality is not PHC. An agent who closes 2 deals from 6 qualified leads — with full written proposals, correct yield presentations, and properly managed follow-ups — is performing better than an agent who closes 2 deals from 40 unmanaged contacts. PHC measures both output and process.",rules:[{title:"Standard 1 — Proposal quality",detail:"Every qualified lead receives a written proposal within 48 hours. The proposal contains: client situation summary, recommendation rationale, net yield calculation, risks stated, one next step. No exceptions."},{title:"Standard 2 — Follow-up consistency",detail:"Every lead in the qualified or later stage receives a value-add follow-up within 7 days of last contact. No lead is left in silence for more than 7 days without a logged action."},{title:"Standard 3 — Yield presentation accuracy",detail:"Every yield figure presented to a client is net — not gross. Management fees, vacancy, and rental tax are deducted before any figure is communicated. Gross figures are always labelled as gross."},{title:"Standard 4 — Risk disclosure",detail:"Every investment client receives explicit risk disclosure before any project recommendation. Exit liquidity, yield reality, developer track record, and CGT are all named. Not hinted at — named."}]},{label:"Self-Evaluation Framework",heading:"Honest review — not self-criticism",body:"The purpose of self-evaluation is not to feel bad about gaps. It is to identify the one change that will make the most difference over the next 4 weeks. PHC advisors focus on one improvement at a time.",rules:[{title:"Ask these four questions every Friday",detail:"1. How many qualified leads did I move forward this week? 2. Did every proposal contain all five components? 3. Did any client hear a gross yield figure without being told it was gross? 4. Was any risk disclosure skipped or softened?"},{title:"The one-improvement principle",detail:"Identify the single biggest gap in your process this week. Write it down. Build one specific habit to address it next week. Do not try to fix everything at once — the agent who fixes one real thing each month will outperform the agent who tries to fix ten things and fixes none."},{title:"When to escalate to Nick",detail:"Escalate immediately: strata title uncertainty, foreign quota near cap, off-plan projects from unverified developers, clients requesting nominee structures, any legal question. Do not guess on these — escalate."}]}],roleplay:{scenario:"Self-evaluation conversation at end of week 4",instructions:"This is a conversation with yourself. Be honest — the purpose is identification, not self-criticism.",lines:[{role:"note",text:"Agent reviews the week alone or with a peer."},  {role:"agent",text:'"This week: 4 qualified leads, 2 site visits, 1 proposal sent, 0 closings. Proposal sent — I checked: it had the client situation, the recommendation, the numbers, the risks, and the next step. Good."'},{role:"agent",text:'"Site visit 1 — I forgot to confirm the foreign quota before arrival. I had to check my phone on site. That damaged the moment. Next week: always verify quota 24 hours before any site visit."'},{role:"agent",text:'"One qualified lead went 9 days without contact from me. That broke the 7-day standard. I need to set a calendar reminder for every lead at the 5-day mark."'},{role:"note",text:"Debrief: Was the self-evaluation specific? Did it identify one concrete change for next week?"}],debrief:"Self-evaluation that produces a specific, actionable improvement is worth 10 pep talks. The goal is not to feel better — it is to perform better next week."},quiz:[{q:"PHC's performance evaluation is primarily based on:",opts:["Hours worked and number of client messages sent","Enthusiasm and attitude","Outcomes (closings, revenue) AND process quality (proposal standards, yield accuracy, risk disclosure)","Client feedback scores only"],correct:2,explain:"PHC measures both output (closings, revenue, pipeline value) and process quality (proposal completeness, yield accuracy, risk disclosure, follow-up consistency). High volume with poor process is not PHC standard."},{q:"The self-evaluation question 'did any client hear a gross yield figure without being told it was gross?' is:",opts:["Optional — yield presentation style varies by client","Only relevant for Japanese and European investors","A core weekly quality check — applies to every client interaction","Only important during formal performance reviews"],correct:2,explain:"This is a weekly quality check that applies to every client. Gross yield presented without labelling is a misrepresentation. Catching and correcting this habit early is what prevents credibility damage later."},{q:"The one-improvement principle states:",opts:["Identify every gap and address all of them simultaneously","Focus on the single biggest gap in your process and build one specific habit to address it over 4 weeks","Only work on improvements Nick identifies in review","Improvement is optional once you start closing deals"],correct:1,explain:"One real improvement per month compounds. Trying to fix ten things at once fixes nothing. Identify the single biggest gap — write it down — build one specific habit. This is the PHC self-development model."},{q:"When should you escalate to Nick rather than answering independently?",opts:["When a client asks about price negotiation","When you are unsure about yield calculations","For strata title uncertainty, foreign quota near cap, nominee structures, off-plan unverified developers, or any legal question","Only when a deal is about to close"],correct:2,explain:"Escalate these immediately — do not guess: strata title status, near-cap foreign quota, nominee enquiries, unverified off-plan developers, legal questions. Guessing on these creates risk for the client and for PHC's reputation."}],reflection:"What is the single biggest gap in your performance this week — and what is the one specific habit you will build next week to address it?"},
{id:20,week:4,title:"Graduation — The PHC Standard Review",short:"Graduation",objectives:["Demonstrate integrated mastery of all 19 previous lessons","Complete the final standards self-assessment","Understand the ongoing responsibilities of a PHC Investment Advisor"],sections:[{label:"What You Have Covered",heading:"Twenty lessons. One standard.",body:"You have completed the PHC 20-Day Agent Training Program. Before your graduation review with Nick, this final lesson asks you to integrate everything — not recall individual facts, but apply the framework as a whole.",box:{title:"The 20-lesson curriculum covered:",lines:["Week 1 — Foundation: PHC identity, Cambodia market (REAKH data), property law, portfolio, client segments","Week 2 — Advisory Skills: mindset, qualification, advisory flow, language standards, reading signals","Week 3 — Advanced Advisory: yield & ROI, Japanese protocol, European protocol, Khmer clients, objections","Week 4 — Performance: site visits, proposals, pipeline management, performance standards, graduation"]}},{label:"The PHC Standard — A Summary",heading:"Non-negotiable, every day",body:"These are the principles that define a PHC Investment Advisor. Not during training — always.",rules:[{title:"Clarity over persuasion",detail:"If it cannot be explained simply and honestly, it should not be sold. Yield figures are net, risks are named, CGT is disclosed. Always."},{title:"Trust is the product",detail:"One lost deal protects ten future relationships. Protect the reputation even when it costs the transaction."},{title:"Segment first, project second",detail:"The client's profile, goal, and risk tolerance determine the recommendation — never the commission on the product."},{title:"Written follow-up every time",detail:"Every meeting ends with a same-day summary. Every qualified client gets a proposal within 48 hours. Every lead is followed up within 7 days."},{title:"Escalate what you do not know",detail:"Uncertainty on legal questions, strata title, foreign quota, or developer credibility is escalated to Nick immediately. Confidence without knowledge is the most dangerous thing in advisory."}]},{label:"Ongoing Responsibilities",heading:"The program ends. The standard does not.",body:"Graduation from the 20-day program means you are qualified to work with PHC clients under the PHC standard. It does not mean the learning is finished. The Cambodia market changes. New projects launch. Tax laws evolve. Your responsibility as a PHC agent is to stay current.",rules:[{title:"Market updates",detail:"Read the REAKH news and reports. Track REAKH.com.kh for new listings, market trends, and developer announcements. Know what launched, what completed, and what sold. Your knowledge is your credibility."},{title:"Product knowledge",detail:"For every new project PHC adds to the portfolio: know the developer track record, title type, foreign quota, price per sqm, rental income estimate, and management setup before presenting to any client."},{title:"Language and cultural fluency",detail:"PHC serves Khmer, Japanese, German, English, and other international clients. Continuous improvement in cultural communication — not just language — is part of the PHC standard."},{title:"Nick's door",detail:"PHC is a consultative environment. If you encounter a situation you are unsure about — a difficult objection, a legal question, an unusual client request — Nick's door is open. Use it. That is how the standard is maintained."}]}],roleplay:{scenario:"Graduation review with Nick — integrated case scenario",instructions:"This is a complete client scenario from start to finish. Answer each stage as you would in reality.",lines:[{role:"nick",text:'"A 58-year-old Japanese investor contacts PHC. He has ¥25M to invest (~$165,000). He has never invested outside Japan. He says he wants \'guaranteed income.\' Walk me through your process from first contact to written proposal."'},{role:"agent",text:'"First — I would not accept the \'guaranteed income\' framing. I would acknowledge his goal: stable passive income. Then qualify: timeline, risk tolerance, family involvement, hold period."'},{role:"nick",text:'"He says he wants 8% return and he\'s heard other agencies are offering that."'},{role:"agent",text:'"I would say: \'I understand — 8% gross is commonly advertised. The honest figure is net: after management, vacancy, and rental tax, a realistic net yield in BKK1 is 5–7%. The REAKH verified case study on J Tower 2 shows 6.85% per year average over 5 years — that is a real transaction, not a projection. I would rather give you the accurate number than the attractive one.\'"'},{role:"nick",text:'"Good. Which project would you recommend and why?"'},{role:"agent",text:'"J Tower 3 — Tanichu developer, which is Japanese, so the cultural trust is immediate. Strata title confirmed. Pre-sale pricing gives him the best entry point on a project with J Tower 2\'s verified delivery track record as a reference. If he prefers a completed asset with no construction risk, Le Condé — Hopetree Japan management, completed May 2025, BKK1, from $150K."'},{role:"note",text:"Debrief: Did the Agent address the 'guaranteed' language, realign the yield expectation with data, disclose risks first, and recommend projects based on the client profile?"}],debrief:"This is the PHC standard in action: no guarantee language, honest yield, risk-first, data-backed recommendation, matched to the client profile. Not because it is scripted — but because it is right."},quiz:[{q:"A client opens with 'I want guaranteed 8% income.' The PHC response is:",opts:["Confirm 8% is achievable in BKK1","Agree and show projects with 8% advertised gross yield","Acknowledge their goal, realign to net yield reality with data, and explain that guarantees are not how responsible advisors work","Ask Nick what to say"],correct:2,explain:"Acknowledge the goal (stable income). Realign the number (gross vs net). Explain the principle (no guarantees in investment property). Data: REAKH verified 6.85%/yr average. This is the complete PHC response."},{q:"The most important thing that distinguishes a PHC Investment Advisor from a typical real estate agent is:",opts:["PHC has better listings and developer relationships","PHC advisors lead with risk before return, present net yield, and only recommend projects matched to the client's stated profile","PHC offers the lowest commission in the market","PHC has multilingual capabilities"],correct:1,explain:"The defining distinction is the advisory framework: risks before returns, net yield (not gross), segment-first matching, written follow-ups, and no urgency tactics. These are not features — they are the standard."},{q:"If you are unsure whether a project's strata title is confirmed for a foreign buyer, you should:",opts:["Present it anyway and note the caveat in small print","Ask the developer and trust their answer","Escalate to Nick immediately — never present a project to a foreign buyer without confirmed strata title status","Wait until you are sure before following up with the client"],correct:2,explain:"Strata title confirmation for foreign buyers is non-negotiable. Do not guess. Do not trust a verbal developer confirmation without documentation. Escalate to Nick immediately. This protects the client and PHC's reputation."},{q:"The PHC 20-day program ending means:",opts:["You are now fully independent and no longer need Nick's input","The learning is finished — you know everything required","You are qualified to work with PHC clients under the PHC standard — and the responsibility to stay current is now yours","You can now use your own approach rather than the PHC framework"],correct:2,explain:"Graduation means you meet the standard. The standard never stops. The market changes, new projects launch, laws evolve. Staying current — REAKH updates, product knowledge, cultural fluency — is an ongoing obligation, not a one-time training outcome."},{q:"The reflection question for Lesson 20 is unique because:",opts:["It is multiple choice like all the others","It asks you to evaluate your instructor","It asks you to write a personal commitment — one thing you will do differently after completing this program","It does not count toward your graduation score"],correct:2,explain:"The final reflection is a personal commitment — not a knowledge test. The 20-day program trains the mind. The commitment converts training into behaviour. That conversion is what PHC is actually looking for."}],reflection:"Write one specific commitment — not a list of ten. One thing you will do differently in every client conversation after completing this program. Be precise: not 'I will be more professional' but 'I will always present net yield and name all deductions before giving a client any return figure.'"},
{id:21,week:5,title:"Leads, Content & Distribution — How PHC's Channels Work",short:"Leads & Distribution",objectives:["Know which PHC advisor receives inbound leads from each language channel, and why","Understand how the Content Bot posts and translates listings across all four channels","Understand PHC's 70/30 educational-to-listing content strategy and why it matters for trust"],sections:[{label:"How Listings Reach Clients",heading:"One bot, four languages, one tap",body:"Every PHC listing that appears on Telegram goes through the same pipeline before a client ever sees it. Nick forwards the raw listing to PHC's Content Bot, which detects the listing format, translates it into English, Japanese, Russian, and German, and sends one review message back. Approving it posts all four language versions to their channels at the same moment — the same listing, the same standard, in every market PHC serves.",box:{title:"The pipeline, step by step",lines:["Listing forwarded to @PHC_Content_Bot","Bot detects format and translates to EN / JP / RU / DE","One combined review message — Approve All posts everywhere at once","Each posted listing carries two buttons: Contact Us and More Property"]}},{label:"Who Gets the Lead",heading:"Contact Us routes to a real person, not a queue",body:"The 'Contact Us' button on every posted listing opens a direct Telegram chat — not a shared inbox, not a bot conversation. It goes straight to the advisor responsible for that channel's audience. If a lead reaches you this way, you are their first point of contact. Treat it exactly like a walk-in inquiry and apply the Advisory Conversation Flow from Lesson 8 from the first reply.",rules:[{title:"English channel",detail:"Contact Us routes to Monika"},{title:"Japanese channel",detail:"Contact Us routes to Nick"},{title:"Russian channel",detail:"Contact Us routes to Monika"},{title:"German channel",detail:"Contact Us routes to REZA"}]},{label:"Why PHC Posts More Than Listings",heading:"70% educational, 30% listings — on purpose",body:"An audience that only ever sees listings learns to scroll past them. PHC's content mix is built so that most of what a client sees before they ever message in is educational — market data, the buying process, ownership law, honest answers to common objections. This is the same trust-first standard from Lesson 6: a client should already sense PHC is an advisor, not a salesperson, before the first conversation even happens.",box:{title:"Educational topics in rotation",lines:["Foreign ownership & strata-title law","Buying process & payment plans","Market data — yields, USD stability, districts","Myth-busting / FAQ","Developer verification — how PHC vets a project"]}}],roleplay:{scenario:"A cold message arrives from the German Contact Us button",instructions:"This is a coaching conversation with Nick about handling an inbound lead that arrives with no context.",lines:[{role:"nick",text:'"You get a Telegram message: \'Hi, is this still available? What is the payment plan?\' No name, no project mentioned. What is your first move?"'},{role:"agent",text:'"First, I check which channel this could have come from — since I only receive Contact Us messages from the German channel, I know it is tied to a listing PHC recently posted there. I ask which project they saw, so I respond with the right details instead of guessing."'},{role:"nick",text:'"Good. They reply: \'The one with the 24/7 nurse station.\' What now?"'},{role:"agent",text:'"That is J Tower 3. I confirm the project, then apply the normal advisory flow from here — qualify first, and I do not just recite the payment plan without understanding their timeline and goal."'},{role:"note",text:"Debrief: Did the agent correctly infer the lead source from the channel they own, ask for context instead of guessing, and fall back into the standard qualification flow rather than treating this as a special case?"}],debrief:"A lead from a Contact Us button is not a special process — it is a normal inbound inquiry that happens to start with less context. Identify the source, get the missing context, then run the same advisory standard as any other client."},quiz:[{q:"Which PHC advisor's Telegram receives 'Contact Us' clicks from the German-language channel?",opts:["Whoever is online at the time","REZA","Monika","Nick"],correct:1,explain:"Contact Us routes by channel, not availability — German always reaches REZA directly, the same way English and Russian always reach Monika, and Japanese always reaches Nick."},{q:"Why does PHC deliberately post 70% educational content instead of almost all listings?",opts:["Listings perform worse on Telegram's algorithm","Educational content is faster to produce","It builds the trusted-advisor positioning before a client ever reaches out — the same standard from the Advisor Mindset lesson","Clients are legally required to see educational content first"],correct:2,explain:"The content mix exists to build trust before the first conversation — a client who has already seen honest, useful content arrives expecting an advisor, not a salesperson."},{q:"A lead's first message has no greeting, no name, and no project mentioned. What does this most likely mean?",opts:["They are not a serious buyer — deprioritize them","They tapped a channel's Contact Us button and are replying to a specific listing you may not have seen yet","This is spam and should be ignored","Ask them to resend in English only"],correct:1,explain:"Contact Us opens a fresh chat with no shared history — the client sees the listing, you don't, until you ask which one it was."}],km:{title:"អតិថិជនសក្តានុពល មាតិកា និងការចែកចាយ — របៀបដែលបណ្តាញ PHC ដំណើរការ",short:"អតិថិជន និងការចែកចាយ",objectives:["ដឹងថាទីប្រឹក្សា PHC ណាម្នាក់ទទួលអតិថិជនសក្តានុពលពីប្រព័ន្ធភាសានីមួយៗ និងមូលហេតុ","យល់ដឹងពីរបៀបដែល Content Bot បង្ហោះ និងបកប្រែបញ្ជីអចលនទ្រព្យទៅគ្រប់បណ្តាញទាំងបួន","យល់ដឹងពីយុទ្ធសាស្ត្រមាតិកា 70/30 (អប់រំ/បញ្ជីលក់) របស់ PHC និងមូលហេតុសំខាន់របស់វា"],sections:[{label:"របៀបដែលបញ្ }
function saveS(){try{localStorage.setItem('phc_v3',JSON.stringify(S));}catch(e){}}
// Returns a lesson with its .km fields (if any) merged over the English
// original when Khmer is selected — lessons without a .km block fall back
// to English untouched. Single choke point so every render path that goes
// through cur() gets localized automatically.
function loc(l){return (S.lang==='km'&&l.km)?Object.assign({},l,l.km):l;}
function cur(){return loc(LESSONS[S.li])}
function steps(l){return 1+l.sections.length+1+1+1;}

// ═══════════════════════════════════════════════════════════════════
// UPDATE UI CHROME
// ═══════════════════════════════════════════════════════════════════
function updateChrome(){
  var d=S.done.length;
  var total=LESSONS.length;
  document.getElementById('tb-fill').style.width=(d/total*100)+'%';
  document.getElementById('tb-label').textContent=d+' / '+total;
  document.getElementById('tb-ctx').textContent=S.view==='lesson'?'L'+cur().id+' — '+cur().title:'Agent Training Program';
  updateLangButtons();
}

// ═══════════════════════════════════════════════════════════════════
// LANGUAGE TOGGLE (EN / KM) — only lessons with a .km block translate;
// everything else quietly stays English regardless of the toggle.
// ═══════════════════════════════════════════════════════════════════
function updateLangButtons(){
  var en=document.getElementById('tb-lang-en'), km=document.getElementById('tb-lang-km');
  if(!en||!km)return;
  var base='font-size:11px;font-weight:600;padding:5px 10px;border-radius:6px;cursor:pointer;border:1px solid rgba(255,255,255,.18);';
  var on='background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.32);color:#fff;';
  var off='background:transparent;color:rgba(255,255,255,.55);';
  en.setAttribute('style',base+(S.lang==='en'?on:off));
  km.setAttribute('style',base+(S.lang==='km'?on:off));
}
function setLang(v){
  if(S.lang===v)return;
  S.lang=v; saveS();
  if(S.view==='lesson') renderLesson();
  else if(S.view==='certificate') viewCertificate();
  else renderLanding();
  buildSidebar();updateChrome();updateMobNav();
}

// ═══════════════════════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════════════════════
function buildSidebar(){
  var h='';
  [1,2,3,4,5].forEach(function(w){
    var wls=LESSONS.filter(function(l){return l.week===w;});
    if(!wls.length)return;
    h+='<div class="sb-week"><div class="sb-week-pip" style="background:'+wc(w)+'"></div><div class="sb-week-txt">Week '+w+' — '+wn(w)+'</div></div>';
    wls.forEach(function(l){
      var idx=LESSONS.indexOf(l);
      var dl=loc(l);
      var done=S.done.indexOf(l.id)>=0;
      var active=S.view==='lesson'&&S.li===idx;
      h+='<div class="sb-row'+(active?' active':'')+(done?' done':'')+'" onclick="openLesson('+idx+')">'
        +'<div class="sb-badge">'+(done?'✓':active?'▶':l.id)+'</div>'
        +'<div class="sb-title">'+esc(dl.short)+'</div>'
        +'</div>';
    });
  });
  document.getElementById('sidebar').innerHTML=h;
}

// ═══════════════════════════════════════════════════════════════════
// MOBILE NAV
// ═══════════════════════════════════════════════════════════════════
function updateMobNav(){
  var mn=document.getElementById('mob-nav');
  if(!mn)return;
  var isMob=window.innerWidth<=700;
  mn.style.display=isMob?'flex':'none';
  if(!isMob)return;
  var cont=document.getElementById('mn-continue');
  var back=document.getElementById('mn-back');
  if(S.view==='certificate'){
    cont.textContent='🖨 Print';
    cont.disabled=false;
    back.style.opacity='1';
    back.disabled=false;
  } else if(S.view==='lesson'){
    var l=cur(), tot=steps(l), st=S.step;
    var nSec=l.sections.length;
    var isComplete=st===tot-1;
    var isQuiz=st===nSec+2;
    var isLast=S.li===LESSONS.length-1;
    if(isComplete){
      cont.textContent=!isLast?'Next Lesson →':'Certificate 🎓';
      cont.className='mob-nav-continue'+(isLast?' cta-gold':'');
      cont.disabled=false;
    } else if(isQuiz){
      var sub=S.qs[l.id];
      var perfect=false;
      if(sub){var sc2=0;S.qa[l.id].forEach(function(a,i){if(a&&a.chosen===l.quiz[i].correct)sc2++;});perfect=sc2===l.quiz.length;}
      cont.textContent='Continue →';
      cont.disabled=!(sub&&perfect);
    } else {
      cont.textContent='Continue →';
      cont.disabled=false;
    }
    back.style.opacity=st>0?'1':'0.4';
    back.disabled=st<=0;
  } else {
    // landing
    var ni=LESSONS.findIndex(function(l){return S.done.indexOf(l.id)<0;});
    cont.textContent=ni>=0?'Continue →':'Certificate 🎓';
    cont.disabled=false;
    back.style.opacity='0.4';
    back.disabled=true;
  }
}
function mobContinue(){
  if(S.view==='certificate'){window.print();return;}
  if(S.view==='landing'){
    var ni=LESSONS.findIndex(function(l){return S.done.indexOf(l.id)<0;});
    if(ni>=0) openLesson(ni);
    else viewCertificate();
    return;
  }
  var l=cur(),tot=steps(l),st=S.step,nSec=l.sections.length,isComplete=st===tot-1,isLast=S.li===LESSONS.length-1;
  if(isComplete){
    if(!isLast) openLesson(S.li+1);
    else viewCertificate();
  } else {
    goNext();
  }
}
function mobBack(){
  if(S.view==='lesson'&&S.step>0)goBack();
  else renderLanding();
}
window.addEventListener('resize',updateMobNav);

function openLesson(idx){
  S.li=idx; S.step=0; S.view='lesson';
  var l=cur();
  if(!S.qa[l.id]) S.qa[l.id]=l.quiz.map(function(){return{answered:false,chosen:-1};});
  renderLesson(); buildSidebar(); updateChrome(); updateMobNav();
  window.scrollTo(0,0);
}

function renderLesson(){
  var l=cur(),tot=steps(l),st=S.step,nSec=l.sections.length;
  var pips=Array.from({length:tot},function(_,i){
    return '<div class="pip'+(i<st?' done':i===st?' active':'')+'"></div>';
  }).join('');

  var chrome='<div class="lesson-chrome">'
    +'<div class="lc-top">'
    +'<div class="lc-week-tag" style="background:'+wc(l.week)+'">Week '+l.week+'</div>'
    +'<div class="lc-title">'+esc(l.title)+'</div>'
    +'<div class="lc-counter">'+(st+1)+'/'+tot+'</div>'
    +'</div>'
    +'<div class="pips">'+pips+'</div>'
    +'</div>';

  var content='';
  if(st===0) content=buildObjectives(l);
  else if(st<=nSec) content=buildSection(l,l.sections[st-1]);
  else if(st===nSec+1) content=buildRoleplay(l);
  else if(st===nSec+2) content=buildQuiz(l);
  else content=buildComplete(l);

  var footer=buildFooter(l,st,tot);

  document.getElementById('main').innerHTML=
    chrome
    +'<div class="scroll"><div class="rise" id="active-content">'+content+'</div></div>'
    +footer;

  var sc=document.querySelector('.scroll');
  if(sc) sc.scrollTop=0;
  updateMobNav();
}

function buildObjectives(l){
  var rows=l.objectives.map(function(o){
    return '<div class="obj-row"><span class="obj-arrow">→</span><span>'+esc(o)+'</span></div>';
  }).join('');
  return '<div class="eyebrow">Lesson '+l.id+' of '+LESSONS.length+'</div>'
    +'<div class="heading">'+esc(l.title)+'</div>'
    +'<div class="obj-card"><div class="obj-eyebrow">By the end of this lesson you will:</div>'+rows+'</div>'
    +'<div class="body-text"><p>This is lesson '+l.id+' of the PHC 20-day training program. Work through each section at your own pace. The quiz unlocks after all questions are answered.</p></div>';
}

function buildSection(l,sec){
  var h='<div class="eyebrow">'+esc(sec.label||'')+'</div><div class="heading">'+esc(sec.heading)+'</div>';
  if(sec.body) h+='<div class="body-text"><p>'+esc(sec.body)+'</p></div>';
  if(sec.box){
    h+='<div class="info-box"><div class="ib-label">'+esc(sec.box.title)+'</div>'+sec.box.lines.map(esc).join('<br>')+'</div>';
  }
  if(sec.warning) h+='<div class="warn-box">'+esc(sec.warning)+'</div>';
  if(sec.grid){
    h+='<div class="info-grid">';
    sec.grid.forEach(function(r){h+='<div class="ig"><div class="ig-lbl">'+esc(r[0])+'</div><div class="ig-val">'+esc(r[1])+'</div></div>';});
    h+='</div>';
  }
  if(sec.rules){
    h+='<div class="rules">';
    sec.rules.forEach(function(r,i){h+='<div class="rule"><div class="rule-n">'+(i+1)+'</div><div><div class="rule-title">'+esc(r.title)+'</div><div class="rule-detail">'+esc(r.detail)+'</div></div></div>';});
    h+='</div>';
  }
  if(sec.table){
    var hasScrollHint=sec.table.headers.length>3?'<div class="tbl-scroll-hint">← Scroll to see all →</div>':'';
    h+='<div class="tbl-outer">'+hasScrollHint+'<div class="tbl-wrap"><table><thead><tr>'+sec.table.headers.map(function(hd){return'<th>'+esc(hd)+'</th>';}).join('')+'</tr></thead><tbody>';
    sec.table.rows.forEach(function(row){h+='<tr>'+row.map(function(c){return'<td>'+esc(c)+'</td>';}).join('')+'</tr>';});
    h+='</tbody></table></div>';
  }
  return h;
}

function buildRoleplay(l){
  var rp=l.roleplay;
  var lines=rp.lines.map(function(ln){
    var role=ln.role; // 'agent' | 'client' | 'note'
    var tagLabel=role==='agent'?'Agent':role==='client'?'Client':'Note';
    var tag='<span class="rp-tag '+role+'">'+tagLabel+'</span>';
    return '<div class="rp-line rp-'+role+'">'+tag+'<span class="rp-text">'+esc(ln.text)+'</span></div>';
  }).join('');
  return '<div class="eyebrow">Role-Play Practice</div>'
    +'<div class="heading">Practice Scenario</div>'
    +'<div class="body-text"><p>Apply what you have learned. Read through the script, then practice it with a colleague — switching roles after the first run.</p></div>'
    +'<div class="rp-trigger" onclick="toggleRP(this)">'
    +'<div class="rp-trigger-icon"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>'
    +'<div class="rp-trigger-inner"><div class="rp-trigger-eyebrow">Scenario</div><div class="rp-trigger-title">'+esc(rp.scenario)+'</div></div>'
    +'<span class="rp-chevron">▼</span>'
    +'</div>'
    +'<div class="rp-panel" id="rp-panel">'
    +'<div class="rp-panel-inner">'
    +'<div class="rp-inst">'+esc(rp.instructions)+'</div>'
    +'<div class="rp-lines">'+lines+'</div>'
    +'<div class="rp-debrief"><strong>Coaching point:</strong> '+esc(rp.debrief)+'</div>'
    +'</div></div>';
}

function buildQuiz(l){
  var qa=S.qa[l.id], sub=S.qs[l.id];
  var letters=['A','B','C','D'];
  var sc=0; if(sub) qa.forEach(function(a,i){if(a&&a.chosen===l.quiz[i].correct)sc++;});
  var total=l.quiz.length;
  var perfect=sub&&sc===total;
  var answeredCount=qa.filter(function(a){return a.answered;}).length;

  // Meta bar
  var metaRight=sub
    ?'<span class="quiz-meta-score" style="color:'+(perfect?'var(--ok)':'var(--err)')+'">'+sc+'/'+total+' correct'+(perfect?' ✓':'')+' </span>'
      +(perfect?'':'<button class="btn" onclick="retryQuiz()" style="font-size:12px;padding:5px 12px;margin-left:6px">Retry</button>')
    :'<span id="quiz-answered-badge" class="quiz-meta-score">'+answeredCount+'/'+total+' answered</span>';

  var meta='<div class="quiz-meta"><span style="font-weight:500">'
    +(sub?(perfect?'All correct — well done':'Not all correct — review below and retry'):'Select one answer per question, then submit')
    +'</span>'+metaRight+'</div>';

  // Questions
  var qhtml=l.quiz.map(function(q,qi){
    var ans=qa[qi];
    var opts=q.opts.map(function(opt,oi){
      var cls='q-opt';
      if(sub){
        // Post-submit: reveal correct/wrong fully
        cls+=' locked';
        if(oi===q.correct) cls+=' correct';
        else if(ans&&ans.chosen===oi&&oi!==q.correct) cls+=' wrong';
      } else if(ans&&ans.answered){
        // Pre-submit: only show selected state, no reveal
        cls+=' locked';
        if(oi===ans.chosen) cls+=' selected';
      }
      var click=(!sub&&!(ans&&ans.answered))?'onclick="pickAnswer('+qi+','+oi+')"':'';
      return '<div class="'+cls+'" '+click+'>'
        +'<div class="opt-ltr">'+letters[oi]+'</div>'
        +'<div class="opt-text">'+esc(opt)+'</div>'
        +'</div>';
    }).join('');

    // Feedback only after submit
    var fb='';
    if(sub&&ans){
      var ok=ans.chosen===q.correct;
      fb='<div class="q-feedback '+(ok?'correct':'wrong')+'" style="display:block">'
        +'<div class="fb-head">'+(ok?'✓ Correct':'✗ Incorrect — correct answer highlighted above')+'</div>'
        +'<div class="fb-body">'+esc(q.explain)+'</div>'
        +'</div>';
    }
    return '<div class="q-block">'
      +'<div class="q-num">Question '+(qi+1)+' of '+total+'</div>'
      +'<div class="q-text">'+esc(q.q)+'</div>'
      +'<div class="q-opts" id="qo-'+qi+'">'+opts+'</div>'
      +fb
      +'</div>';
  }).join('');

  // Actions
  var allAns=qa.every(function(a){return a.answered;});
  var actions='';
  if(!sub){
    actions='<div class="quiz-actions">'
      +'<button class="btn primary" '+(allAns?'':'disabled')+' onclick="submitQuiz()" id="submit-btn">Submit Answers</button>'
      +(!allAns?'<span class="quiz-hint">Answer all '+total+' questions to submit</span>':'')
      +'</div>';
  } else if(!perfect){
    // Require retry — must score 100% to proceed
    actions='<div class="quiz-actions">'
      +'<div class="quiz-pass-gate">'
      +'<svg viewBox="0 0 24 24" fill="none" stroke="var(--err)" stroke-width="2" stroke-linecap="round" width="16" height="16"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
      +'<span>Score <strong>'+sc+'/'+total+'</strong> — you need <strong>'+total+'/'+total+'</strong> to continue. Review the explanations above, then retry.</span>'
      +'</div>'
      +'<button class="btn primary" onclick="retryQuiz()">Retry Quiz</button>'
      +'</div>';
  }

  return '<div class="eyebrow">Knowledge Check</div>'
    +'<div class="heading">Lesson '+l.id+' Quiz</div>'
    +meta+qhtml+actions;
}

function buildComplete(l){
  var qa=S.qa[l.id]||[]; var sc=0;
  qa.forEach(function(a,i){if(a&&a.chosen===l.quiz[i].correct)sc++;});
  var tot=l.quiz.length;
  var pc=sc===tot?'good':sc>=Math.ceil(tot*.6)?'ok':'mid';
  var isLast=S.li===LESSONS.length-1;

  // ── Program complete screen (L20) ──────────────────────────────
  if(isLast){
    var nameVal=S.name||'';
    return '<div class="complete" style="gap:20px;padding:40px 24px">'
      +'<div style="width:72px;height:72px;border-radius:50%;background:var(--navy-d);border:2px solid var(--gold-border);display:flex;align-items:center;justify-content:center">'
      +'<svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="var(--gold)" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>'
      +'</div>'
      +'<div class="complete-h" style="font-size:30px">Program Complete</div>'
      +'<div class="complete-sub">You have completed all '+LESSONS.length+' lessons of the PHC Agent Training Program. Enter your name below to generate your certificate.</div>'
      +'<div class="score-pills"><div class="s-pill good">All 20 lessons passed</div><div class="s-pill '+pc+'">L20 quiz: '+sc+'/'+tot+'</div></div>'
      +'<div class="name-prompt" style="width:100%;max-width:480px">'
      +'<div class="name-prompt-label">Certificate name</div>'
      +'<div class="name-prompt-sub">Enter your full name exactly as you want it to appear on the certificate.</div>'
      +'<div class="name-input-row">'
      +'<input class="name-input" id="cert-name-input" type="text" placeholder="Your full name…" value="'+esc(nameVal)+'" oninput="saveName(this.value)">'
      +'<button class="btn cta" onclick="viewCertificate()" style="padding:10px 20px;white-space:nowrap" id="cert-btn">View Certificate →</button>'
      +'</div>'
      +'</div>'
      +'<div class="reflect-card" style="width:100%;max-width:480px">'
      +'<div class="reflect-eyebrow">Final reflection</div>'
      +'<div class="reflect-q">'+esc(l.reflection)+'</div>'
      +'</div>'
      +'</div>';
  }

  // ── Standard lesson complete screen ───────────────────────────
  var nextIdx=S.li+1;
  var nextCard='<div class="next-card" onclick="openLesson('+nextIdx+')">'
    +'<div class="next-card-eyebrow">Up next — Lesson '+LESSONS[nextIdx].id+'</div>'
    +'<div class="next-card-title">'+esc(LESSONS[nextIdx].title)+'</div>'
    +'</div>';
  return '<div class="complete">'
    +'<div class="complete-checkmark"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>'
    +'<div class="complete-h">Lesson '+l.id+' Complete</div>'
    +'<div class="complete-sub">Review the reflection question before moving on.</div>'
    +'<div class="score-pills"><div class="s-pill '+pc+'">'+sc+'/'+tot+' quiz score</div></div>'
    +'<div class="reflect-card"><div class="reflect-eyebrow">Reflection question</div><div class="reflect-q">'+esc(l.reflection)+'</div></div>'
    +nextCard
    +'</div>';
}

function buildFooter(l,st,tot){
  var nSec=l.sections.length;
  var isComplete=st===tot-1, isQuiz=st===nSec+2, isLast=S.li===LESSONS.length-1;
  var next='',hint='';
  if(isComplete){
    if(!isLast){
      next='<button class="btn cta" onclick="openLesson('+(S.li+1)+')">Next Lesson →</button>';
    } else {
      // L20 complete — offer certificate or overview
      next='<button class="btn cta" onclick="viewCertificate()">View Certificate 🎓</button>';
    }
  } else if(isQuiz){
    var sub=S.qs[l.id];
    var perfect=false;
    if(sub){
      var sc=0; S.qa[l.id].forEach(function(a,i){if(a&&a.chosen===l.quiz[i].correct)sc++;});
      perfect=sc===l.quiz.length;
    }
    var canContinue=sub&&perfect;
    next='<button class="btn primary" '+(canContinue?'':'disabled')+' onclick="goNext()">Continue →</button>';
    if(!sub) hint='Submit answers to continue';
    else if(!perfect) hint='100% required to continue';
  } else {
    next='<button class="btn primary" onclick="goNext()">Continue →</button>';
  }
  return '<div class="footbar">'
    +(st>0?'<button class="btn" onclick="goBack()">← Back</button>':'<button class="btn" onclick="renderLanding()">← Overview</button>')
    +next
    +(hint?'<span class="footbar-hint">'+esc(hint)+'</span>':'')
    +'</div>';
}

// ACTIONS
// ═══════════════════════════════════════════════════════════════════
function goNext(){
  var l=cur(),tot=steps(l);
  // Gate: cannot leave quiz step unless submitted AND perfect score
  var nSec=l.sections.length;
  if(S.step===nSec+2){
    var sub=S.qs[l.id]; if(!sub)return;
    var qa=S.qa[l.id]; var sc=0;
    qa.forEach(function(a,i){if(a&&a.chosen===l.quiz[i].correct)sc++;});
    if(sc<l.quiz.length)return; // force retry
  }
  if(S.step<tot-1){
    S.step++;
    if(S.step===tot-1){
      if(S.done.indexOf(l.id)<0){S.done.push(l.id);saveS();}
      buildSidebar();updateChrome();
    }
    renderLesson();
  }
}
function goBack(){
  if(S.step>0){S.step--;renderLesson();}
  else renderLanding();
}
function toggleRP(el){
  var panel=document.getElementById('rp-panel');
  var chev=el.querySelector('.rp-chevron');
  var open=panel.classList.toggle('open');
  chev.classList.toggle('open',open);
}
function pickAnswer(qi,oi){
  var l=cur(),qa=S.qa[l.id];
  if(qa[qi].answered)return;
  qa[qi].answered=true; qa[qi].chosen=oi;
  saveS();
  var block=document.getElementById('qo-'+qi);
  if(!block)return;
  // Only mark selected — no reveal of correct/wrong until submit
  block.querySelectorAll('.q-opt').forEach(function(opt,idx){
    opt.classList.add('locked');
    opt.removeAttribute('onclick');
    if(idx===oi) opt.classList.add('selected');
  });
  // Answered count badge
  var answeredCount=qa.filter(function(a){return a.answered;}).length;
  var badge=document.getElementById('quiz-answered-badge');
  if(badge) badge.textContent=answeredCount+'/'+l.quiz.length+' answered';
  // Enable submit when all answered
  var allAns=qa.every(function(a){return a.answered;});
  var btn=document.getElementById('submit-btn');
  if(btn&&allAns){
    btn.removeAttribute('disabled');
    var hint=btn.parentElement.querySelector('.quiz-hint');
    if(hint)hint.remove();
  }
  updateMobNav();
}
function submitQuiz(){
  var l=cur(); S.qs[l.id]=true; saveS(); renderLesson();
}
function retryQuiz(){
  var l=cur();
  S.qa[l.id]=l.quiz.map(function(){return{answered:false,chosen:-1};});
  S.qs[l.id]=false; saveS(); renderLesson();
}

function saveName(val){
  S.name=val;
  saveS();
}

function viewCertificate(){
  var name=(S.name||'').trim();
  if(!name){
    var inp=document.getElementById('cert-name-input');
    if(inp){inp.focus();inp.style.borderColor='var(--err)';}
    return;

  S.view='certificate';
  renderCertificate();
}
