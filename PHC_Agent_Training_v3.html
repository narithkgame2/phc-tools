ocused"],["G.A.T.O Tower","BKK1","TBC","Upcoming","JP luxury, EU $400K+"]]}},{label:"Project Matching",heading:"The quick-match guide",body:"Use this as your selection filter before every client presentation.",rules:[{title:"Japanese investor, safety first",detail:"→ J Tower 2 or J Tower 3 — Japanese developer (Tanichu) = highest trust signal"},{title:"European, hands-off rental",detail:"→ Le Condé — Hopetree Japan management from day one"},{title:"Khmer family, first home",detail:"→ Time Square 11 BKK3 or Royal Platinum Toul Kork"},{title:"Budget investor, lowest entry",detail:"→ Time Square 10 Otres Beach from ~$40K"},{title:"Luxury long-term hold",detail:"→ J Tower 3 or G.A.T.O Tower — landmark positioning"}]},{label:"ROI Case Study",heading:"J Tower 2 — verified real transaction",body:"This is not a projection. This is a real completed transaction documented in the REAKH Investment & Market Analysis Condominium Report 2025. Use it in client conversations as evidence, never as a promise.",box:{title:"Source: REAKH Condominium Report · J Tower 2, Tanichu Developer",lines:["Unit: 2BR 2BA · Net size 65sqm · Floor 17 · South & East facing","Purchased 2019: $139,755 · Furniture: $8,000 · Total in: $147,755","Handover: 2022 (3-year construction period)","Rental: $1,200/month · Mgmt fee $1.8/sqm → Net $1,083/month","Occupancy: 90% → Net annual income: $11,696","Resale 2024: $175,000 · Capital appreciation: $27,245","5-year total return: $23,392 (rent) + $27,245 (appreciation) = $50,637","ROI: 34.27% total · 6.85% average per year"]},warning:"This is a historical result on a specific unit. Past performance does not guarantee future returns. Always present it as data — never as a guarantee. CGT now applies on any resale profit."}],roleplay:{scenario:"Matching the right project to the right client",instructions:"Practice justifying your shortlist — not just naming it.",lines:[{role:"client",text:'"I have $180,000 to invest. I want stable rental income and I\'m not looking for anything risky."'},{role:"agent",text:'"Based on what you\'ve told me, I\'d like to focus on two options — both completed, both with institutional management."'},{role:"client",text:'"What are they?"'},{role:"agent",text:'"Le Condé BKK1 — completed May 2025, Hopetree Japan management, strata title, from $150K. And J Tower 2 — completed, Japanese developer Tanichu, freehold strata, strong rental demand. Both fit your stability requirement."'},{role:"client",text:'"Why those two and not others?"'},{role:"agent",text:'"Because you said stability. Completed assets with proven management eliminate the construction risk and vacancy uncertainty of off-plan projects. These two are as close to turnkey as Cambodia offers."'},{role:"note",text:"Debrief: Did the Agent justify the shortlist clearly? Did the Client feel heard — not sold to?"}],debrief:"Always justify why you chose the 2–3 options you present. 'These fit your goals' is not enough — explain how."},quiz:[{q:"Which Megakim project sold 85% of its units within 6 months of launch?",opts:["Time Square 9","Time Square 10","Time Square 11","Time Square 8"],correct:3,explain:"Time Square 8, Toul Tom Pong. Strong market validation for Megakim's delivery track record and genuine buyer demand."},{q:"A Japanese investor wants the highest-trust project in the portfolio. You recommend:",opts:["Le Condé BKK1","J Tower 2 or J Tower 3","Time Square 9","G.A.T.O Tower"],correct:1,explain:"J Tower 2 or J Tower 3. Japanese developer (Tanichu) = highest cultural trust signal for Japanese investors. This is the Tier 1 recommendation for that segment."},{q:"Le Condé is managed by which operator — and why does this matter?",opts:["Megakim property management","Hopetree Japan — signals institutional Japanese-standard management","Wangfu International directly","An independent local agency"],correct:1,explain:"Hopetree Japan. This is a key selling point for Japanese investors (familiar brand) and European hands-off buyers (institutional quality operator)."},{q:"A European buyer wants a completed, hands-off rental asset under $200K. Your first recommendation is:",opts:["Time Square 10 Otres Beach — lowest entry price","G.A.T.O Tower — landmark BKK1 positioning","Le Condé BKK1 — completed May 2025, Hopetree Japan management, from $150K","J Tower 3 — Japanese luxury, highest tier"],correct:2,explain:"Le Condé matches all criteria: completed, institutional management (Hopetree Japan), BKK1 location, from $150K. It is the Tier 1 match for a European hands-off rental buyer under $200K."}],reflection:"Without looking at the document, how many active PHC projects can you name from memory — with their district and status?"},
{id:5,week:1,title:"Who Our Clients Are",short:"Client Segments",objectives:["Know all 5 PHC client segments by profile, goal, and decision style","Be able to identify which segment a new client belongs to within 5 minutes","Know which projects match each segment — and why"],sections:[{label:"Why Segmentation Matters",heading:"One approach fits no one",body:"The biggest mistake a new agent makes is treating every client the same. A Japanese investor who prioritizes stability needs a completely different conversation than a young Khmer professional buying their first home. Understanding your client's segment before saying anything about a project is not optional — it is the foundation of good advisory.",box:{title:"The rule:",lines:["Identify the segment first. Match the project second. Never reverse this order."]}},{label:"The 5 Segments",heading:"Know each profile exactly",body:"These are the five client types PHC serves. Each has a different goal, decision style, and best-fit project selection.",table:{headers:["Segment","Profile","Primary goal","Best projects"],rows:[["Japanese investors","40–65, high earner, low risk tolerance","Stable passive income, capital safety","J Tower 2, J Tower 3, TS9, Le Condé"],["German/European","45–65, pre-retirement, analytical","Monthly income to supplement pension","Le Condé, Royal Platinum, Peninsula"],["Overseas Cambodians","30–55, abroad, family-focused","Home for family, safe capital, connection","TS8, TS11, Royal Platinum, TS9"],["Local Khmer end-users","25–50, Phnom Penh, lifestyle","Safe family home, community, status","TS11 BKK3, Royal Platinum, TS8"],["Other foreign investors","Russian, Chinese, hands-off rental","Yield and management quality","Le Condé, Peninsula, TS9"]]}},{label:"The 5-Minute Test",heading:"Identify the segment before presenting anything",body:"Within the first 5 minutes of any first meeting, you should know which segment you are serving. These three questions get you there.",rules:[{title:"Ask about nationality and background",detail:"This immediately identifies the likely segment. Then: 'Have you invested in property before — here or elsewhere?'"},{title:"Ask about their primary goal",detail:"'What are you hoping this investment will do for you?' Rental income → investor. Live in it → end-user. Both → mixed profile."},{title:"Ask the most powerful question",detail:"'What would make this a bad decision for you?' — This single question reveals risk tolerance, decision criteria, and fears simultaneously."}]}],roleplay:{scenario:"Identifying the client segment in 5 minutes",instructions:"Practice running the 5-minute test naturally — not as an interrogation.",lines:[{role:"client",text:'"I\'m interested in property in BKK1. What do you have?"'},{role:"agent",text:'"Happy to show you. Before I do — can I ask a few quick questions so I show you the most relevant options?"'},{role:"client",text:'"Sure."'},{role:"agent",text:'"What\'s driving your interest right now — rental income, capital growth, somewhere to live, or a mix?"'},{role:"client",text:'"Mostly somewhere to spend 4–5 months a year, but ideally it pays for itself when I\'m not there."'},{role:"agent",text:'"That\'s really useful. And is this for retirement use, or are you still working?"'},{role:"client",text:'"I retire in 18 months. Swiss-based."'},{role:"agent",text:'"Perfect — that\'s exactly the profile our co-founder Reza specialises in. He works with European retirement buyers specifically. I\'d like to involve him from our next conversation."'},{role:"note",text:"Debrief: Did the Agent avoid presenting anything before qualifying? Was the Reza handoff natural?"}],debrief:"Notice the Agent showed nothing. In 4 questions they identified: European → retirement buyer → part-year use + rental → Reza involvement needed. Segment first. Always."},quiz:[{q:"A 52-year-old German client says his primary goal is 'reliable monthly income to supplement my pension.' Which segment is he in?",opts:["Segment 5 — Other foreign investor","Segment 2 — German/European buyer","Segment 1 — Japanese investor","Segment 3 — Overseas Cambodian"],correct:1,explain:"German/European buyer. Retirement income framing, European nationality, logic-first approach expected. Involve Reza early."},{q:"A local Khmer buyer says 'I need to discuss with my parents before deciding.' You should:",opts:["Push for a faster decision — parents are not the buyer","Offer shareable materials and welcome the family into the process","Reduce the price to make the decision easier","Follow up more frequently to maintain momentum"],correct:1,explain:"Family consensus is part of the normal process for local Khmer buyers. Support it fully. Prepare shareable materials. Never treat it as an obstacle."},{q:"The most powerful 5-minute qualification question is:",opts:["'What is your budget?'","'How did you hear about us?'","'What would make this a bad decision for you?'","'Are you buying for yourself or as an investment?'"],correct:2,explain:"'What would make this a bad decision for you?' reveals risk tolerance, fears, and decision criteria simultaneously. It is the single most valuable qualification question in the PHC framework."},{q:"The correct order in client advisory is:",opts:["Match the project first, then understand the client","Identify segment first, match project second","Present all available options, then narrow down","Ask budget first, then identify the segment"],correct:1,explain:"Identify the segment first. Match the project second. This order is never reversed at PHC — presenting before qualifying is a volume salesperson move, not an advisory one."},{q:"An overseas Cambodian client abroad contacts you about property for their family in Phnom Penh. You should:",opts:["Focus on investment yield — same as any other foreign buyer","Prioritise clear comparisons, responsive communication, and walkthrough support","Treat them as a Local Khmer end-user — same profile","Refer them to a Khmer-speaking agent only"],correct:1,explain:"Overseas Cambodians are often faster decision-makers but need clear comparisons and remote support. Responsive communication and walkthrough facilitation are the priority."}],reflection:"You meet a new client. In the first 5 minutes, what 3 things do you want to know about them — and why those 3?"},
{id:6,week:2,title:"The PHC Advisor Mindset",short:"Advisor Mindset",objectives:["Understand what separates a trusted advisor from a salesperson","Know the PHC trust-building sequence for first meetings","Avoid the five most common agent mistakes"],sections:[{label:"The Mindset Shift",heading:"Authority comes from restraint",body:"Most agents try to impress clients with how much they know. PHC advisors do the opposite. They ask more than they tell. They disclose risks before returns. They say 'this may not be suitable for you' — and mean it. That restraint is what creates authority.",box:{title:"The PHC first-meeting sequence:",lines:["1. Listen first — qualify before presenting anything","2. Name the risks before the returns","3. Match to max 2–3 projects — justify each one","4. Never push for a decision in meeting one","5. Send a written follow-up the same day"]}},{label:"Five Mistakes",heading:"What destroys trust — immediately",body:"These are the five behaviours that will damage your credibility with clients. Each of them is common. None of them are acceptable at PHC.",rules:[{title:"Quoting gross yield as if it were net",detail:"Always present net yield. Gross yield includes none of the costs the client will actually face. Presenting gross without context is dishonest."},{title:"Guaranteeing anything about future value",detail:"'This will definitely go up' or 'guaranteed rental income' are phrases that will destroy your credibility. Cambodia is not guaranteed. Nothing is."},{title:"Rushing the decision",detail:"Urgency tactics — 'only 2 units left,' 'price goes up tomorrow' — work once and then destroy trust forever. PHC does not use them."},{title:"Presenting without qualifying",detail:"Showing projects before understanding the client is the mark of a volume salesperson. PHC advisors never do this."},{title:"Not following up in writing",detail:"A verbal conversation is forgotten. A written summary shows professionalism and gives the client something to reference. Send it the same day."}]}],roleplay:{scenario:"Opening a first meeting with a new client",instructions:"Practice establishing authority through questions — not through telling.",lines:[{role:"client",text:'"I\'ve been looking at property in Phnom Penh for a while. I know what I want."'},{role:"agent",text:'"That\'s a great position to be in. What\'s drawn you to Phnom Penh specifically — investment, lifestyle, or both?"'},{role:"client",text:'"Investment. I want 8% yield."'},{role:"agent",text:'"Understood. Before I show you anything — can I ask what you\'ve seen so far, and what made you hesitate on those?"'},{role:"client",text:'"A few projects. The yields looked good but I wasn\'t sure about the developer."'},{role:"agent",text:'"That hesitation is the right instinct. Developer track record is one of the most important risk factors in this market. Let me ask about your timeline and risk tolerance before I make any recommendations."'},{role:"note",text:"Debrief: The agent asked four questions before saying anything about a project. Was it natural?"}],debrief:"An advisor who asks good questions appears more competent than one who talks a lot. Every question delays the pitch — and that delay builds trust."},quiz:[{q:"PHC's approach to first meetings is:",opts:["Present the best projects first to make a strong impression","Listen, qualify, then match — never present before understanding","Give a market overview first, then ask questions","Discuss price ranges to filter serious buyers early"],correct:1,explain:"Listen first. Qualify before presenting anything. The sequence is the system — and the system is why clients trust PHC over volume agencies."},{q:"A client asks for a guaranteed 8% return. You should:",opts:["Confirm it's achievable in BKK1 based on current data","Explain clearly that guarantees are not how responsible advisors work — and present net yield data instead","Refer them to the developer who can provide guarantees","Tell them 8% is too high and suggest 6%"],correct:1,explain:"Never guarantee returns. Explain net yield data honestly. 'Here is what the data shows, here is what affects it, here is the range' — that is the PHC answer."},{q:"Why is same-day written follow-up non-negotiable?",opts:["Because it shows how busy and in-demand you are","Because it creates a written record of what was discussed — and demonstrates professionalism","To give the client a chance to read more marketing materials","To lock in commitment before they look at competitors"],correct:1,explain:"Written follow-up summarises what was discussed, clarifies risks, and signals professionalism. It is the most reliable trust-building act after a first meeting."},{q:"Which of these five mistakes is most likely to permanently damage trust with a serious investor?",opts:["Forgetting to send a follow-up email","Using urgency tactics such as 'only 2 units left'","Starting the meeting with a project overview","Asking too many qualifying questions"],correct:1,explain:"Urgency tactics work once — then destroy trust permanently. Serious investors recognise them immediately. PHC never uses them under any circumstance."}],reflection:"Think of a time you felt genuinely respected and not sold to. What did that person do differently — and can you apply it?"},
{id:7,week:2,title:"Qualifying Clients Correctly",short:"Client Qualification",objectives:["Know the 4 qualification dimensions every PHC agent must uncover","Be able to qualify a client in under 10 minutes without it feeling like an interrogation","Know which questions reveal the most and why"],sections:[{label:"Why Qualification Matters",heading:"The wrong project is worse than no project",body:"Recommending the wrong project to a client — even if they buy — is a failure. It creates dissatisfied clients, bad reviews, and no referrals. The qualification framework protects both the client and PHC's reputation.",box:{title:"The 4 dimensions you must uncover:",lines:["1. Goal — what do they want the investment to do?","2. Timeline — when do they need to act, and when do they expect returns?","3. Budget — realistic range, not aspirational","4. Risk tolerance — what keeps them up at night?"]}},{label:"The Questions",heading:"Questions that open — not close",body:"Good qualification questions feel like curiosity, not interrogation. The framing matters as much as the content.",rules:[{title:"Goal question",detail:"'What are you hoping this investment will do for you — in 3 years, and in 10 years?' The gap between those two answers tells you a lot."},{title:"Timeline question",detail:"'If you found something ideal today, what would need to happen before you could move forward?' This reveals hidden blockers — visa, funds, family, other commitments."},{title:"Budget question",detail:"'What range are you working with — and is that flexible if the right opportunity came up?' Never assume the stated budget is fixed."},{title:"Risk question",detail:"'What would make this investment a mistake for you?' This is the most honest question. Risk is personal — and only the client can define it."}]},{label:"Red Flags",heading:"Know when to pause — or walk away",body:"Not every client is the right fit for PHC. Part of qualification is recognising this early.",rules:[{title:"Unrealistic yield expectations",detail:"'I need 15% net yield.' If the expectation is disconnected from the market, realign before proceeding. If they refuse — they are not your client."},{title:"Zero timeline",detail:"'I need to buy this week.' Urgency without information is a sign of poor decision-making — not a buying signal. Slow down."},{title:"Nominee structures",detail:"Any client asking to use a Cambodian nominee to own property must be stopped. This is legally risky and PHC does not support it."}]}],roleplay:{scenario:"Full qualification in under 10 minutes",instructions:"Practice all 4 dimensions in natural sequence — without reading from a script.",lines:[{role:"agent",text:'"Thank you for coming in. Before I show you anything — tell me what\'s bringing you to Cambodia property right now."'},{role:"client",text:'"I heard yields are good here. A friend made money."'},{role:"agent",text:'"What kind of return is he getting — do you know if that\'s gross or net?"'},{role:"client",text:'"Not sure. He said 8%."'},{role:"agent",text:'"8% gross is common. Net after management and vacancy is usually 5.5–7% depending on location and operator. Does that range still work for you?"'},{role:"client",text:'"Yes, I think so."'},{role:"agent",text:'"Good. What\'s your timeline — are you looking to move forward in the next few months, or are you still in research mode?"'},{role:"client",text:'"I\'d like to decide in the next 2 months."'},{role:"agent",text:'"Perfect. And roughly what range are you working with?"'},{role:"note",text:"Debrief: Did the Agent realign the yield expectation early — calmly and without judgment?"}],debrief:"Realigning expectations early is a service, not a rejection. It protects the client from disappointment — and protects PHC from a bad outcome."},quiz:[{q:"A client says 'I want 12% net yield in Cambodia.' You should:",opts:["Show them the highest-yield project available","Agree — it's possible in the right location","Calmly explain that 12% net is not realistic in the current Phnom Penh market — and share actual data","Tell them Cambodia is not the right market for them"],correct:2,explain:"Realign the expectation with data, calmly. '12% net is not realistic — here is what the data shows' is the PHC response. Don't agree to it, don't dismiss the client — educate."},{q:"Which question most reliably reveals a client's real risk tolerance?",opts:["'How much can you afford to lose?'","'What would make this investment a mistake for you?'","'Are you comfortable with off-plan risk?'","'How much experience do you have with property?'"],correct:1,explain:"'What would make this a mistake for you?' is open-ended and personal. It reveals fears, deal-breakers, and values that no closed question would surface."},{q:"A client asks you to help them set up a Cambodian nominee structure to own a villa. You should:",opts:["Refer them to a local lawyer who handles nominees","Help them — it's common practice","Explain that PHC does not support nominee structures due to legal risk — and offer compliant alternatives","Ask Nick first before responding"],correct:2,explain:"PHC does not support nominee structures. This is a legal risk to the client and a reputational risk to PHC. State this clearly and redirect to compliant ownership options."},{q:"A client says 'I need to buy this week.' This is:",opts:["A strong buying signal — move fast and close","A red flag — urgency without information is poor decision-making","Normal — most serious buyers decide quickly","An opportunity to show them all available inventory"],correct:1,explain:"'I need to buy this week' without proper qualification is a red flag, not a buying signal. Slow down, qualify properly, and protect both the client and PHC from a rushed bad outcome."}],reflection:"Think about a client conversation where you felt you didn't understand what they really wanted. What questions would you ask differently now?"},
{id:8,week:2,title:"The Advisory Conversation Flow",short:"Advisory Flow",objectives:["Know the 5-stage PHC advisory conversation flow","Understand what to say at each stage — and what never to say","Be able to move through the flow naturally without it feeling scripted"],sections:[{label:"The Framework",heading:"Five stages — every client, every time",body:"Every PHC client conversation follows the same five stages. The content changes. The structure does not. This consistency is why clients trust PHC over informal agencies.",rules:[{title:"Stage 1 — Open",detail:"Welcome. Build comfort. Never sell in stage 1. Goal: the client feels at ease and speaks freely."},{title:"Stage 2 — Qualify",detail:"Run the 4-dimension qualification (goal, timeline, budget, risk). No project discussion yet. Goal: you understand their situation better than they do."},{title:"Stage 3 — Match",detail:"Present 2–3 options maximum. Justify each one. Never show everything. Goal: the client sees you as a filter — not a catalogue."},{title:"Stage 4 — Risk disclosure",detail:"Before asking about next steps — name every relevant risk. Exit liquidity. Yield reality. Developer track record. CGT. Goal: client feels informed, not sold to."},{title:"Stage 5 — Next step",detail:"Propose one clear next step. Site visit. SPA review. Meeting with Nick. Never leave a meeting without one agreed action. Goal: momentum, not pressure."}]},{label:"Language Principles",heading:"What PHC advisors say — and never say",body:"Words matter. These are the PHC language rules.",table:{headers:["Instead of…","Say…"],rows:[["'Guaranteed returns'","'Based on current data, the net yield range is X–Y%'"],["'You should buy now'","'Based on your timeline, this window may be relevant'"],["'Only 2 units left'","Never use scarcity tactics — ever"],["'This will definitely go up'","'Historical price data shows X — future performance is not guaranteed'"],["'Don't worry about CGT'","'CGT applies — here is how it affects your scenario'"]]}}],roleplay:{scenario:"Running all 5 stages in sequence",instructions:"Full advisory conversation — 10 minutes. Practice moving through each stage naturally.",lines:[{role:"agent",text:'"Thank you for coming in. How did you first hear about us?"'},{role:"client",text:'"Your listing on Realestate.com.kh. I\'ve been looking for a few months."'},{role:"agent",text:'"Great. Can I ask — what\'s driving the decision right now? Investment income, somewhere to live, or both?"'},{role:"client",text:'"Investment. I want passive income."'},{role:"agent",text:'"Understood. What timeline are you working with, and roughly what range?"'},{role:"client",text:'"$150–200K. In the next 3 months ideally."'},{role:"agent",text:'"That\'s a workable range. Before I show you options — I want to make sure I name the risks upfront. Exit liquidity in Cambodia is improving but not liquid like Singapore. Rental income is real, but net yield is lower than gross advertised. CGT now applies to resale. For a buy-and-hold rental strategy, this market makes sense. For a quick flip — it doesn\'t. Does that framing work for you?"'},{role:"client",text:'"Yes — I\'m looking for long-term income. Not flipping."'},{role:"agent",text:'"Perfect. Then let me show you two options I\'d recommend for your profile specifically — and explain why."'},{role:"note",text:"Debrief: Did Stage 4 (risk disclosure) happen before Stage 3 (matching)? That is the PHC sequence."}],debrief:"Risk disclosure before project matching is the single biggest differentiator between PHC advisors and everyone else. Master this sequence."},quiz:[{q:"In the PHC advisory flow, when does risk disclosure happen?",opts:["At the end — after the client has expressed interest","Before showing any specific projects","Only if the client asks about it","After the client has agreed to a site visit"],correct:1,explain:"Risk disclosure comes before project matching. Always. This is the PHC sequence — and it is the most trust-building part of the entire framework."},{q:"A client asks 'what's the upside if prices go up?' You should:",opts:["Give an optimistic estimate based on BKK1 appreciation trends","Explain what historical data shows — then name the factors that could limit it","Redirect to rental yield instead — more reliable","Confirm BKK1 prices are up 3–5% and extrapolate"],correct:1,explain:"Name the upside and the downside. 'Historical data shows X — here are the factors that could limit or reverse that' is the balanced PHC answer."},{q:"The correct number of projects to present in Stage 3 is:",opts:["As many as possible — give the client choice","1 — make the decision easy","2–3 maximum — justified and matched to profile","5 — show the full relevant range"],correct:2,explain:"2–3 maximum, each justified. A long list signals you don't know the client's needs. A short, justified shortlist signals expertise and genuine matching."},{q:"What is the goal of Stage 5 (Next Step) in the PHC advisory flow?",opts:["Close the deal before the client changes their mind","Get a deposit paid to secure the unit","Agree one clear next action — momentum without pressure","Schedule a follow-up call within 48 hours"],correct:2,explain:"Stage 5 is about one agreed next action — site visit, SPA review, meeting with Nick. Never leave without it. The goal is momentum, never pressure."}],reflection:"Which of the 5 stages do you find most natural — and which will require the most practice for you personally?"},
{id:9,week:2,title:"Language & Communication Standards",short:"Language Standards",objectives:["Know PHC's exact language rules for yields, guarantees, and risk","Understand how tone differs by client segment","Be able to adjust your communication style without changing your standards"],sections:[{label:"Yield Language",heading:"Gross vs net — always clarify",body:"Yield is the number clients care about most — and the one most commonly misrepresented. PHC's rule is absolute: always present net yield. Gross yield means nothing to the client's actual income.",box:{title:"PHC yield language standard:",lines:["Always say: 'Net yield after management fees and vacancy'","Never say: 'Guaranteed X%' — Cambodia does not guarantee yields","Always range: '6.5–7.5% net based on current data' — never a single number","Always disclose: management fees, vacancy assumptions, CGT on exit"]},warning:"Quoting gross yield without clarifying it is gross is a misrepresentation. If a developer gives you a gross figure, convert and clarify before passing it to any client."},{label:"Segment Tone Guide",heading:"Same standards, different language",body:"PHC's standards never change. But the way we communicate them must adapt to each client's cultural and professional background.",table:{headers:["Segment","Tone","Language emphasis"],rows:[["Japanese investors","Formal, structured, unhurried","Risk first, data with evidence, written follow-up always"],["German/European","Logical, precise, no emotional language","ROI, downside protection, legal clarity"],["Overseas Cambodians","Warm, clear, family framing","Safety, community, developer reputation"],["Local Khmer","Warm, respectful, community-focused","Comfort, status, payment flexibility"],["Russian/Chinese investors","Direct, yield-focused, practical","Yield data, management quality, exit options"]]}}],roleplay:{scenario:"Adapting tone without changing standards",instructions:"Agent plays the same content — but adjusts tone for a Japanese investor vs a German investor.",lines:[{role:"note",text:"Round 1 — Japanese investor (formal, risk-first)"},{role:"agent",text:'"Nakamura-san, before I share the project details, I would like to walk through the risk profile first. In Cambodia, exit liquidity is improving but still limited compared to Japan. Rental income is real, but subject to vacancy and management quality. I want to make sure you have a complete picture before we discuss any specific investment."'},{role:"note",text:"Round 2 — German investor (logical, ROI-focused)"},{role:"agent",text:'"Before I share the numbers, let me give you the complete picture — including the downside. Net yield in BKK1 is 7.8–8.7% based on current data. Exit liquidity is improving. CGT applies to resale. For a long-term hold strategy, this market performs. For anything under 5 years — the numbers change significantly."'},{role:"note",text:"Debrief: Same standards. Different delivery. What changed — and why?"}],debrief:"The Japanese client needs to feel safe before hearing numbers. The German client needs the numbers to be precise and complete. Neither gets a sales pitch. Both get the same honest standard."},quiz:[{q:"A developer tells you a project yields 9.5%. You should present this to clients as:",opts:["9.5% — you have the developer's word","'Up to 9.5% depending on occupancy'","Convert to estimated net yield (after fees and vacancy), state it as a range, and flag the source","9.5% gross — clarify it's before costs"],correct:2,explain:"Convert to net. State it as a range. Flag that it's based on developer projections, not verified historical data. That is the PHC standard."},{q:"A Japanese investor asks about yield. You should:",opts:["Lead with the return data — they want to see numbers first","Lead with risk disclosure first, then present net yield data with evidence","Give a range and let them ask follow-up questions","Match the developer's advertised gross yield"],correct:1,explain:"Japanese clients need to feel safe before hearing returns. Risk first, then data, then evidence. Never lead with upside for Japanese investors."},{q:"'This will definitely appreciate in value' is:",opts:["Fine to say if you believe it","Acceptable if BKK1 data supports it","Never acceptable — no PHC advisor uses guaranteed future value language","OK for Khmer end-users who need reassurance"],correct:2,explain:"Never acceptable. Future value is never guaranteed. This phrase creates legal and reputational risk. 'Historical data shows X — future performance is not guaranteed' is the only acceptable framing."},{q:"A German investor asks you to compare two projects. Your response should emphasise:",opts:["Which developer has a better marketing reputation","ROI, downside protection, and legal clarity — in precise, logical terms","Emotional appeal — community, lifestyle, long-term happiness","Developer nationality as the primary trust signal"],correct:1,explain:"German/European buyers are analytical and logic-driven. Lead with ROI, downside scenarios, and legal structure. Avoid emotional language entirely — it signals an unprepared advisor."}],reflection:"Write the exact words you would use to explain net yield to a Japanese investor who has never owned property outside Japan."},
{id:10,week:2,title:"Reading Client Signals",short:"Reading Signals",objectives:["Recognise the difference between buying signals and stall signals","Know how to respond to hesitation without pressuring","Know when to re-qualify a client who has gone cold"],sections:[{label:"Buying Signals",heading:"When a client is ready — what it looks like",body:"Buying signals are rarely obvious. Most clients don't say 'I'm ready to buy.' They show it. Learning to read these signals is one of the most important advisory skills.",box:{title:"Common buying signals:",lines:["Asking about payment schedule or deposit amount","Asking about specific floors or unit numbers","Bringing a partner or family member to a meeting","Asking about handover timeline or furniture packages","Requesting the SPA or legal documentation"]}},{label:"Stall Signals",heading:"Hesitation vs disinterest — know the difference",body:"A client who stalls is not always a lost client. But treating stall signals as buying signals — or pushing through them — destroys trust.",rules:[{title:"'I need to think about it'",detail:"This is information, not a setback. Ask: 'Of course — what specifically would you want to think through? I want to make sure you have everything you need.'"},{title:"'I'll decide after I visit'",detail:"A positive signal. Facilitate the site visit immediately. Don't let momentum die."},{title:"'I'm looking at other options'",detail:"Expected. Ask: 'What are you comparing us to? That helps me give you the most honest comparison.' Never dismiss competitors."},{title:"'My advisor / accountant needs to review'",detail:"A serious buying signal from a careful buyer. Offer PHC legal documentation immediately and facilitate the review."},{title:"Silence for more than 7 days",detail:"Re-qualify. Send a check-in that offers new information — not pressure. 'I wanted to share an update on X project — does it change anything for you?'"}]}],roleplay:{scenario:"Client stalls after a strong first meeting",instructions:"Practice responding to hesitation with curiosity — not pressure.",lines:[{role:"client",text:'"I liked what I saw. I just need more time to think."'},{role:"agent",text:'"Of course. Can I ask — is there a specific part of the decision you\'d like more time on? I want to make sure you\'re not waiting on information I could give you now."'},{role:"client",text:'"It\'s mainly the developer. I haven\'t heard of Megakim before."'},{role:"agent",text:'"That\'s completely fair. Let me send you the project delivery record — 7 completed projects, handover data, and client reviews. Would it also help to speak with a current unit owner?"'},{role:"client",text:'"That would actually be very helpful."'},{role:"note",text:"Debrief: Did the Agent respond to hesitation with a question — not a push?"}],debrief:"Curiosity over pressure. Every stall signal contains a piece of information. Find it — don't override it."},quiz:[{q:"A client asks 'which floor would you recommend?' This is:",opts:["A neutral question requiring a standard answer","A buying signal — they are starting to picture ownership","A stall — they are avoiding commitment","An objection about pricing"],correct:1,explain:"Specific floor/unit questions are among the clearest buying signals. The client is starting to picture ownership. Respond thoughtfully — don't treat it as a logistics question."},{q:"A client has not responded for 10 days. You should:",opts:["Send a follow-up saying the price is going up soon","Send a check-in with a relevant update — not pressure","Mark them as lost and move on","Call daily until they respond"],correct:1,explain:"After a quiet period, re-engage with information, not pressure. 'I wanted to share an update on X' is the PHC approach. Never use artificial urgency."},{q:"A client says 'my accountant needs to review the documents.' You should:",opts:["Ask them to decide before involving their accountant","Provide PHC legal documentation and facilitate the review immediately","Explain that most clients don't use accountants for this type of purchase","Follow up after a week to check if the review is done"],correct:1,explain:"This is a serious buying signal from a careful investor. The correct response is to facilitate — not slow down. Provide documentation immediately."},{q:"A client says 'I'm looking at other options.' The PHC response is:",opts:["Offer a discount to keep their attention","Dismiss the competition — our projects are clearly better","Ask what they are comparing and offer an honest side-by-side view","Remind them that good units sell quickly"],correct:2,explain:"Never dismiss competitors. Ask what they're comparing — this gives you information and demonstrates confidence. An advisor who welcomes comparison builds more trust than one who avoids it."}],reflection:"Think about a client who went cold. Looking back — what signal were they giving, and what could you have done differently?"},
{id:11,week:3,title:"Yield, ROI & Cost of Ownership",short:"Yield & ROI",objectives:["Calculate gross and net yield accurately for any unit","Explain the full cost of ownership — buying, holding, and selling","Walk a client through a realistic ROI scenario using verified data"],sections:[{label:"Gross vs Net Yield",heading:"The number that matters is net",body:"Most developers advertise gross yield. Gross yield means nothing to the investor's actual income. Net yield is what lands in the bank. The difference is significant — and misrepresenting it is a credibility risk. PHC always presents net.",box:{title:"The net yield calculation:",lines:["Gross yield = annual rent ÷ purchase price × 100","Net yield = (annual rent − management fees − vacancy − taxes) ÷ purchase price × 100","Average deductions: management fee ~$1.8/sqm/month + ~10% vacancy + 14% rental tax (foreigner)","Rule of thumb: net is typically 1.5–2.5% lower than gross in Cambodia"]},warning:"Never quote gross yield without labelling it as gross. Always convert to net before presenting to any client. A developer quoting 9% gross may mean 6.5–7% net. Know the difference."},{label:"Full Cost of Ownership",heading:"What the investor actually pays",body:"The headline purchase price is only part of the equation. Every serious investor will ask about total in and total out. Know every cost — if you miss one, you lose credibility.",table:{headers:["Cost item","Rate","On $150K unit"],rows:[["Booking deposit","$500–$2,000","One-time, refundable terms vary"],["Downpayment","20–30% of price","$30K–$45K on signing"],["Transfer tax (stamp duty)","4% of value","$6,000 (exemptions may apply)"],["Legal / SPA review","0.5–1% of value","$750–$1,500"],["Furniture & fit-out","Varies","$5K–$15K typical"],["Annual property tax (TOIP)","0.1% above $25K","~$125/yr on $150K"],["Building management","$1–$2/sqm/month","$53–$106/month (53sqm unit)"],["Rental income tax","14% of gross (foreigner)","On $800/month = $112/month"],["CGT on exit (20% on gain)","20% of taxable profit","Varies by gain and holding period"]]}},{label:"Verified ROI — J Tower 2",heading:"Real numbers from a real transaction",body:"This case study is documented in the REAKH Investment & Market Analysis Condominium Report 2025. It is the most credible ROI reference available for PHC agents. Use it as data — never as a promise.",rules:[{title:"The verified 5-year result",detail:"Purchased 2019 for $139,755 + $8K furniture. Handed over 2022. Rented at $1,200/month gross ($1,083 net at 90% occupancy). Resold 2024 for $175,000. Total return: $50,637. Average per year: 6.85%. Total ROI: 34.27%."},{title:"The 8-year and 10-year projections",detail:"REAKH projects: 8-year hold = 58% total ROI (7.25%/yr). 10-year hold = 77.23% total ROI (7.72%/yr). These are projections, not verified results. Present them as such."},{title:"How to use this with clients",detail:"'Here is a real verified transaction from our partner REAKH. This is what actually happened — not what was promised.' Then show the numbers. Let the data do the work."}]}],roleplay:{scenario:"A client asks what kind of return they can realistically expect",instructions:"Practice presenting ROI with precision — not enthusiasm. Lead with costs before returns.",lines:[{role:"client",text:'"I\'m looking at a $150,000 unit in BKK1. What kind of return can I expect?"'},{role:"agent",text:'"Let me give you the full picture — starting with costs, then income, then what the data shows on exit."'},{role:"client",text:'"Sure."'},{role:"agent",text:'"All-in, a $150K unit typically costs $155–$160K including transfer tax and legal fees. A 1-bedroom in BKK1 rents for around $800/month gross. After management fees and rental tax, you\'re net around $650–$670/month — roughly $7,800–$8,000/year. That\'s 5–5.5% net yield on your total investment."'},{role:"client",text:'"That\'s lower than I expected."'},{role:"agent",text:'"It\'s honest. Some agencies will quote you 8 or 9% gross — that\'s before costs. On a completed, well-managed BKK1 unit, 5–7% net is a realistic long-term range. The strongest verified data point we have — from our partner REAKH on J Tower 2 — shows 6.85% per year average over 5 years, combining rental income and capital appreciation."'},{role:"note",text:"Debrief: Did the Agent lead with costs before returns? Was the yield figure presented as net, not gross?"}],debrief:"The agent who presents the full cost picture first — including the deductions — is the one the client will trust when it matters. Never lead with the headline return."},quiz:[{q:"A developer advertises 9% rental yield. Before presenting this to a client, you should:",opts:["Use the 9% figure — the developer confirmed it","Convert to an estimated net yield range, label the source, and note it is gross","Round it down to 8% to be conservative","Only use it if the developer provides it in writing"],correct:1,explain:"Always convert developer yield claims to an estimated net figure. Gross yield excludes management fees, vacancy, and rental tax — the costs the investor actually bears. Presenting gross as-is is a misrepresentation."},{q:"On a $150,000 condo purchase, the one-time transfer tax (stamp duty) is approximately:",opts:["$750","$3,000","$6,000","$15,000"],correct:2,explain:"Transfer tax is 4% of the assessed property value. On $150,000 that is $6,000 — a significant one-time cost that must be disclosed upfront. Note that stamp duty exemptions may apply for properties under $70K or $210K depending on buyer profile."},{q:"The J Tower 2 REAKH case study shows what verified total ROI over 5 years?",opts:["18.5%","27.3%","34.27%","52%"],correct:2,explain:"34.27% total ROI over 5 years (2019–2024) — averaging 6.85% per year. This combines $23,392 in net rental income and $27,245 in capital appreciation on a $147,755 total investment."},{q:"Net yield for a foreign investor on a BKK1 1-bedroom unit at $800/month rent is closest to:",opts:["8% — matches gross advertised rates","6.5–7% — after removing all costs","5–5.5% — after management, vacancy, and 14% rental tax","3% — market is too competitive"],correct:2,explain:"After deducting management fees (~$1.8/sqm/month), ~10% vacancy, and 14% rental income tax for foreign non-residents, net yield on a typical BKK1 1BR drops to approximately 5–5.5% on total investment cost. This is the honest number."}],reflection:"Walk through the full cost of ownership on a $150,000 BKK1 unit from reservation to resale. What is the total cash out — and what is the realistic net return over 7 years?"},
{id:12,week:3,title:"The Japanese Investor Protocol",short:"Japanese Protocol",objectives:["Understand exactly how Japanese investors think about risk and decision-making","Know the specific PHC protocol for every stage of a Japanese investor conversation","Be able to adapt tone, evidence, and follow-up to Japanese professional standards"],sections:[{label:"Understanding the Profile",heading:"Who you are talking to",body:"Japanese investors in Cambodia are typically professionals in their 40s–60s with high incomes, low risk tolerance, and a strong preference for stability over returns. They have a long-term orientation, distrust urgency, and require verifiable evidence before making any decision. Trust is the entry point — without it, no product discussion is possible.",box:{title:"Japanese investor profile — PHC framework:",lines:["Age: typically 40–65 · Income: high earner · Risk tolerance: LOW","Primary goal: stable passive income + capital preservation","Decision style: methodical, evidence-based, consensus with family or advisors","Cultural norms: respect for hierarchy, structured communication, no pressure","Best-fit projects: J Tower 2 / J Tower 3 (Tanichu developer), Le Condé (Hopetree Japan mgmt)","Language: always provide written follow-ups; if possible, Japanese-language summaries"]}},{label:"The Protocol — Step by Step",heading:"Every conversation follows this exact structure",body:"With Japanese investors, the sequence is not flexible. Deviating from this order — especially presenting returns before risks — signals an amateur and ends the relationship.",rules:[{title:"Step 1: Open with respect, not product",detail:"'Nakamura-san, thank you for taking the time to meet with us. Before I share anything about our projects, I would like to understand your goals and concerns first.' Never lead with a project. Ever."},{title:"Step 2: Disclose risks before returns — always",detail:"Exit liquidity risk first. Then yield reality. Then developer track record. Then CGT. PHC rule: Japanese clients must hear the downside before the upside. This is what creates trust, not undermines it."},{title:"Step 3: Present maximum 2 projects — with evidence",detail:"J Tower 3 or J Tower 2 for Tanichu familiarity. Le Condé for Hopetree Japan management. No more than 2. Justify each with data — delivery history, verified rental data, strata title confirmation."},{title:"Step 4: Never push for a decision in meeting one",detail:"The standard Japanese investor will not decide in the first or even second meeting. This is normal. 'I need to discuss with my family' is not a stall — it is the process. Respect it. Schedule meeting two."},{title:"Step 5: Send written follow-up the same day",detail:"Every PHC meeting with a Japanese investor ends with a same-day written summary: risks clarified + net yield data + next step agreed. This is non-negotiable. It signals professionalism at a standard Japanese professionals recognise."}]},{label:"Language & Evidence",heading:"What to say — and what never to say",body:"Language with Japanese investors must be precise, calm, and evidence-based. The words matter as much as the numbers.",table:{headers:["Never say","Say instead"],rows:[["'Guaranteed 8% return'","'Based on REAKH verified data, net yield range is 5–7%'"],["'You should buy now — prices are rising'","'The REAKH data shows transaction volume up 25% in 2025. Timing is a consideration.'"],["'This is a great opportunity'","'This project has a verified delivery record. Here are the facts.'"],["'Don't worry about CGT'","'CGT applies at exit. Here is the calculation on your scenario.'"],["'Other Japanese investors are buying'","Never use social proof as a pressure tactic. Present data instead."]]}}],roleplay:{scenario:"Opening a first meeting with a Japanese investor",instructions:"Practice the risk-first sequence. Time yourself — risks should come before any project name.",lines:[{role:"agent",text:'"Tanaka-san, before I share anything about our projects — may I ask what is most important to you in this investment? Is it income stability, capital preservation, or a combination?"'},{role:"client",text:'"Capital safety first. Income is secondary."'},{role:"agent",text:'"That is very helpful. I want to be transparent with you about how this market works before we discuss any specific project. Cambodia is a growing market, but exit liquidity is not yet at the level of Japan or Singapore. If you needed to sell in 2–3 years, that could be challenging. For a 7–10 year hold with rental income, the data is much more supportive."'},{role:"client",text:'"I understand. What does the rental income look like in practice?"'},{role:"agent",text:'"Based on a verified REAKH case study — a real transaction, not a projection — a 2-bedroom in BKK1 rented at $1,083/month net after management fees, at 90% occupancy. Over 5 years, that generated $23,392 in net rental income, and the unit appreciated by $27,245. Total return: 34% over 5 years."'},{role:"note",text:"Debrief: Did risk come first? Was the ROI data presented as verified fact, not as a sales pitch?"}],debrief:"A Japanese client who hears risks before returns will trust you more, not less. That trust is what makes them act — on their timeline, not yours."},quiz:[{q:"With a Japanese investor, you should present risks:",opts:["After showing the projects — to avoid dampening enthusiasm","Only if the client asks about them","Before presenting any specific project — always","At the end of the meeting as a brief disclaimer"],correct:2,explain:"Risks come first with Japanese investors — every time. This is the PHC Japanese investor protocol. Presenting returns before risks signals a salesperson, not an advisor."},{q:"A Japanese client says 'I need to discuss with my family before deciding.' You should:",opts:["Increase urgency — offer a limited time price","Thank them and prepare a shareable written summary for the family discussion","Mark them as low-priority and focus on faster-moving leads","Call them every day until they respond"],correct:1,explain:"Family consensus is a normal and respected part of the Japanese decision process. Prepare a clear, professional summary they can share with family or advisors. This is a buying signal, not a stall."},{q:"The two highest-trust projects for Japanese investors in the PHC portfolio are:",opts:["Le Condé and Royal Platinum","Time Square 9 and G.A.T.O Tower","J Tower 2 / J Tower 3 (Tanichu) and Le Condé (Hopetree Japan)","Peninsula and Time Square 8"],correct:2,explain:"J Tower 3 / J Tower 2 because Tanichu is a Japanese developer — the highest cultural trust signal for Japanese buyers. Le Condé because Hopetree Japan management is recognised and trusted in the Japanese market."},{q:"Same-day written follow-up after a Japanese investor meeting is:",opts:["Nice to have if you have time","Optional — most Japanese investors prefer phone follow-up","Non-negotiable — it summarises risks, net yield data, and agreed next step","Only required after a second meeting"],correct:2,explain:"Same-day written follow-up is the most reliable trust-building act in the PHC Japanese investor protocol. It demonstrates professionalism at a standard Japanese investors expect. It is not optional."}],reflection:"Write the first 3 sentences you would say to open a meeting with a 55-year-old Japanese investor — in a way that builds trust before any product is mentioned."},
{id:13,week:3,title:"The European & German Investor Protocol",short:"European Protocol",objectives:["Understand the decision-making style and priorities of German and European investors","Know how to present yield data, legal structure, and downside scenarios in a way that resonates","Avoid the communication mistakes that consistently lose European clients"],sections:[{label:"Understanding the Profile",heading:"Logic, precision, and downside protection",body:"German and European investors approaching Cambodia real estate are typically analytically oriented, financially literate, and highly skeptical of promotional language. They respond to structure, data, and clearly stated downside scenarios. Emotional language, vague guarantees, and lifestyle framing will immediately signal an unprepared advisor.",box:{title:"European investor profile — PHC framework:",lines:["Age: 45–65 · Profile: pre-retirement, professional, often high net worth","Primary goal: reliable monthly income to supplement pension or savings","Decision style: logical, comparative, requires written documentation","Risk tolerance: moderate — will accept risk if it is clearly quantified","Best-fit projects: Le Condé (institutional management), Peninsula (yield focus), Royal Platinum (completed, stable)","Key advisor: Reza — PHC co-founder, European advisor specialist"]}},{label:"What Europeans Need to Hear",heading:"Structure the conversation around three questions",body:"Every European investor has three core questions, whether they ask them explicitly or not. Answer all three — with data — before they ask.",rules:[{title:"Question 1: What is my actual monthly income?",detail:"Net rental yield after all costs. Not gross. Example: $150K unit in BKK1, $800 rent, minus $117 management, minus $112 tax = approximately $571/month net. Annual = ~$6,852. Net yield ~4.6% on total investment including stamp duty."},{title:"Question 2: What is my downside scenario?",detail:"Exit liquidity is the main risk. Cambodia is not liquid like Germany or France. If you needed to sell in 2–3 years, you may not find a buyer at your target price. Long-term hold (7–10 years) mitigates this significantly."},{title:"Question 3: What is the legal protection?",detail:"Strata title freehold is genuine legal ownership — registered at the Ministry of Land, backed by Cambodian law. The 70% foreign quota ensures foreigners are protected as a voting majority cannot be reached. SPA review by an independent lawyer is standard and expected."}]},{label:"Common Mistakes",heading:"What consistently loses European clients",body:"These are the specific communication patterns that cause European and German investors to disengage.",rules:[{title:"Using emotional language",detail:"'Beautiful lifestyle,' 'vibrant community,' 'you'll love living here' — these phrases signal you don't understand who you're talking to. European investors want ROI, not lifestyle copy."},{title:"Leading with upside without naming downside",detail:"Presenting appreciation potential without CGT, exit liquidity, or vacancy risk is a red flag to an analytical investor. They will spot it — and they won't come back."},{title:"Failing to involve Reza",detail:"Reza is PHC's European investor specialist. If the client profile is German or wider European, involve Reza from the second conversation. Not doing so is a missed advantage."},{title:"Sending informal follow-ups",detail:"European professionals expect structured, written communication. A WhatsApp voice note is not appropriate. A PDF summary with data, risks, and a clear next step is."}]}],roleplay:{scenario:"Presenting net yield to a German investor",instructions:"Practice presenting costs before income — no emotional language anywhere.",lines:[{role:"client",text:'"I want to understand the real numbers. What is the net yield after all costs?"'},{role:"agent",text:'"Good question — and I want to give you the precise figure. Let\'s take a completed 1-bedroom in BKK1 at $150,000. Rental income: $800/month gross. Building management fee at $1.8/sqm on a 53sqm unit: $95/month. Rental income tax at 14% for non-residents: $112/month. Net income: approximately $593/month — $7,116/year."'},{role:"client",text:'"So that\'s 4.7% on $150,000?"'},{role:"agent",text:'"Correct. 4.7% net cash yield on total purchase price before stamp duty. Including the 4% transfer tax, your total investment is around $156,000. Net yield drops to approximately 4.5%. However, the verified REAKH case study on J Tower 2 shows that capital appreciation of $27,245 over 5 years added 18% to total return. Combined, the 5-year average was 6.85% per year."'},{role:"note",text:"Debrief: Was the yield presented step-by-step? Did the Agent show their working? Was there any emotional language?"}],debrief:"German and European investors do not want a sales pitch. They want an advisor who can show their working. If you can do the math live in a conversation, you will win the trust."},quiz:[{q:"A German investor asks 'what is my actual monthly income on a $150K BKK1 unit?' The correct answer is:",opts:["$800 — that is the market rental rate","$686 — after management fees only","Approximately $570–$600 net — after management fees and 14% rental tax","$1,083 — based on the REAKH case study"],correct:2,explain:"$800 gross minus ~$95 management fee minus ~$112 rental tax (14% for non-residents) = approximately $593/month net. Always show the deductions line by line — this is what European investors respect."},{q:"A European investor asks about downside scenarios. You should:",opts:["Redirect to the upside — focus on the opportunity","Acknowledge exit liquidity risk specifically and quantify it","Tell them Cambodia is as safe as Singapore","Give a vague answer about market uncertainty"],correct:1,explain:"Name the specific downside: exit liquidity is the primary risk. Cambodia is improving but is not liquid. A 2–3 year hold could be problematic if they need to sell. A 7–10 year hold substantially reduces this risk. Always be specific — vague risk disclaimers are not credible."},{q:"When should Reza be involved in a European investor conversation?",opts:["Only if the client asks about German language support","Only for clients investing over $300K","From the second conversation onwards for any German or European buyer","Only at the closing stage"],correct:2,explain:"Reza is PHC's European investor specialist. Involving him early — from the second meeting — is a competitive advantage. Not doing so means you are not deploying the team effectively."},{q:"Which communication format is appropriate for European investor follow-up?",opts:["WhatsApp voice note — fast and personal","A verbal summary at the end of the meeting","A structured PDF or written document with data, risks, and clear next step","Email with a project brochure attached"],correct:2,explain:"European professionals expect structured, written, data-led communication. A PDF summary with net yield calculation, risks named, and a clear next step is the PHC standard. A brochure alone is not enough — it lacks the analysis layer the client expects."}],reflection:"Write a 3-paragraph written follow-up summary for a German client who has just attended their first PHC meeting and shown interest in Le Condé BKK1."},
{id:14,week:3,title:"Serving Khmer & Overseas Cambodian Clients",short:"Khmer Clients",objectives:["Understand what local Khmer and overseas Cambodian clients value most","Know how to adapt communication, project selection, and decision support for each sub-segment","Avoid the assumptions that damage trust with Cambodian-heritage clients"],sections:[{label:"Two Distinct Sub-Segments",heading:"Not one group — two different conversations",body:"'Khmer client' is not a single profile. Local Khmer end-users and overseas Cambodians have different goals, different decision speeds, and different emotional drivers. Treating them as one group is the first mistake most agents make.",grid:[["Local Khmer end-user","25–50, Phnom Penh-based, lifestyle upgrade or family home. Values: community, school proximity, developer reputation, payment flexibility. Slower decision — family consensus required."],["Overseas Cambodian","30–55, based abroad (USA, France, Australia, Canada). Goal: investment + family connection + capital preservation. Often faster to decide. Needs: clear remote process, walkthrough support, reliable documentation."]]},{label:"Local Khmer Client Protocol",heading:"Family, community, and comfort first",body:"Local Khmer buyers are motivated by the idea of a safe, modern home for their family in a trusted community. They are not primarily yield-driven. Developer reputation and project track record matter more than ROI calculations.",rules:[{title:"Lead with safety and community — not returns",detail:"'This development is by Megakim — 7 completed projects, all delivered on time. The building has 24-hour security, a school nearby, and a residents community.' This framing resonates. Net yield does not."},{title:"Payment flexibility is a decision driver",detail:"Many local buyers are sensitive to payment schedule. Know the instalment plans for every project. Some offer up to 50% due at completion — this significantly reduces risk during construction. Feature this prominently."},{title:"Support family consensus — don't rush it",detail:"Decisions will involve parents, siblings, or spouses. This is not a delay — it is the process. Prepare materials they can take home and share. Offer a joint meeting with family if needed."},{title:"Language and warmth",detail:"Communicate in Khmer where possible. Tone should be warm, respectful, and community-focused. Avoid financial jargon — use plain language about what the home will feel like to live in."}]},{label:"Overseas Cambodian Protocol",heading:"Remote buyers need extra support — not less rigour",body:"Overseas Cambodians are often faster to commit than local buyers, but they carry specific anxieties about buying remotely: developer trust, documentation security, and the ability to manage from abroad.",rules:[{title:"Prioritise developer track record loudly",detail:"'Megakim has delivered 7 projects. Here are the handover photos from Time Square 8. Here is the strata title certificate.' Overseas buyers cannot visit easily — verified delivery evidence is the substitute for a site visit."},{title:"Remote process must be airtight",detail:"Provide: clear payment schedule in writing, digital SPA review process, title transfer documentation, and property management options. 'You don't need to be here' only works if you can back it up."},{title:"Respond fast",detail:"Overseas Cambodians often make decisions across time zones with narrow windows of availability. Response time matters more than with local clients. Missed messages are missed deals."},{title:"WhatsApp and Telegram are the right channels",detail:"These clients are not in the office. They are on their phones. Use the channels that work for them — with professional content, not casual voice notes."}]}],roleplay:{scenario:"Handling a family decision process for a local Khmer buyer",instructions:"Practice supporting the consensus without creating urgency.",lines:[{role:"client",text:'"I like the unit in Time Square 11. But I need to talk with my parents first."'},{role:"agent",text:'"Of course — that\'s completely normal. I\'d like to help make that conversation as easy as possible for you."'},{role:"client",text:'"What should I tell them?"'},{role:"agent",text:'"Let me prepare a simple summary — the project name, developer track record, payment plan, and what the monthly cost looks like. Something clear they can read without needing to know the full background. Would that help?"'},{role:"client",text:'"Yes, that would be very helpful."'},{role:"agent",text:'"I\'ll send it to you today. If it would be useful, I\'m also happy to join a meeting with your family — by phone or in person — to answer any questions they have directly."'},{role:"note",text:"Debrief: Did the Agent resist creating urgency? Did they actively support the family process?"}],debrief:"For Khmer clients, the family is part of the decision. Support it — not just tolerate it. An agent who makes the family feel respected will close the deal. An agent who creates pressure will lose it."},quiz:[{q:"A local Khmer buyer says 'my parents want to see the building first.' You should:",opts:["Tell them they can visit after booking to save the unit","Offer to arrange a site visit for the whole family as a priority","Explain that the project is off-plan and not visitable","Send them a video instead — site visits take too long"],correct:1,explain:"Site visits for family members are part of the Khmer client process. Facilitate them proactively. A family that has seen the building is far more likely to support the decision."},{q:"An overseas Cambodian client contacts you from Los Angeles at 10pm Cambodia time. You should:",opts:["Reply the next morning — client should expect time zone delays","Reply as soon as possible — response speed is a trust signal for overseas buyers","Ask them to call during business hours","Send a brochure and follow up during PP office hours"],correct:1,explain:"Overseas Cambodian clients operate across time zones with limited availability windows. Fast response is a competitive differentiator. A delayed response sends the client to another agency."},{q:"For local Khmer buyers, the most important project selection factor is:",opts:["Net yield and ROI projections","Developer reputation, payment flexibility, and community feel","Price per sqm vs comparable districts","Foreign ownership eligibility"],correct:1,explain:"Local Khmer end-users are driven by community, safety, family suitability, and payment flexibility — not yield calculations. PHC projects like Time Square 11 BKK3 and Royal Platinum Toul Kork lead with these qualities."},{q:"When preparing materials for a Khmer buyer's family discussion, you should include:",opts:["The full investment analysis with yield tables","A simple, clear summary: project name, developer track record, payment plan, monthly cost","Only the developer brochure — let the family research independently","A price comparison vs other projects in the same area"],correct:1,explain:"Keep it simple and clear. The family needs enough to feel confident — not overwhelmed. Developer track record and payment plan are the two most important reassurance points for local Khmer families."}],reflection:"Think about the differences between how you would open a conversation with a 35-year-old Khmer professional buying their first home, versus a 45-year-old Cambodian-American looking to invest remotely. What changes — and what stays the same?"},
{id:15,week:3,title:"Handling Objections",short:"Objections",objectives:["Recognise the 8 most common objections in the Cambodia property market","Respond to each one with data and calm — never with pressure or dismissal","Know when an objection is a buying signal versus a genuine dealbreaker"],sections:[{label:"What Objections Actually Are",heading:"Information, not rejection",body:"Every objection contains information. 'It's too expensive' means 'help me understand the value.' 'I need more time' means 'I haven't got what I need to decide yet.' 'The market is risky' means 'I don't fully trust this yet.' The agent who hears the information inside the objection — and responds to it — is the one who builds trust. The agent who tries to overcome the objection is the one who loses the client.",box:{title:"The PHC objection framework:",lines:["1. Acknowledge — confirm you heard them","2. Clarify — ask one question to understand the specific concern","3. Respond with data — never with pressure","4. Check — confirm whether the response addressed their concern","5. Move forward — propose a next step, not a close"]}},{label:"The 8 Common Objections",heading:"Know the answer to each one before you hear it",body:"These are the objections every PHC agent will face regularly. Prepare for them — not with scripts, but with facts.",rules:[{title:"'The market is too risky'",detail:"Acknowledge: 'That is a fair concern.' Data: 'The REAKH report shows transaction volume up 25% in 2025, and Cambodia is entering its second property cycle. The risk is real but the direction is clear for long-term holders.' Ask: 'What specific risk concerns you most?'"},{title:"'Yields are lower than other markets'",detail:"Agree partially: 'Net yields in Cambodia are 5–7% — lower than some frontier markets, higher than most developed ones. What matters is the combination: USD-denominated, no currency risk, and a market in early-cycle recovery.' Data: J Tower 2 combined yield = 6.85%/yr."},{title:"'I don't know the developer'",detail:"Verify: 'That is the right instinct — developer track record is the most important risk factor in this market.' Evidence: 'Megakim has completed 7 projects. Tanichu is a Japanese developer with J Tower 2 as a delivered, verified asset. Would it help to see the handover documentation?'"},{title:"'The CGT makes it less attractive'",detail:"Correct the framing: 'CGT applies to the profit on exit — not the full sale price. On a $200K exit with a $100K purchase and $40K costs, the tax is $12,000. For a 7–10 year hold with rental income, that is a small part of the total return.'"},{title:"'I've heard about developers defaulting'",detail:"Acknowledge: 'Yes — that happened to some projects in the 2015–2019 cycle.' Differentiate: 'PHC recommends only completed projects or developers with a verified track record. We do not recommend off-plan from unknown developers.'"},{title:"'The rental market seems oversupplied'",detail:"Data: 'BKK1 has 18.5% of all rental demand in Phnom Penh. Vacancy rates on well-managed completed units in central districts are low. The risk is higher in outer districts with weaker management.'"},{title:"'I want to think about it'",detail:"Ask: 'Of course — what specifically would you want to think through? I want to make sure you have all the information you need.' Then address the specific gap."},{title:"'I can get a better deal elsewhere'",detail:"Ask: 'What are you comparing this to specifically? I want to give you the most accurate comparison I can.' Never dismiss. Understand what the alternative is and engage with it honestly."}]}],roleplay:{scenario:"Handling the 'market is too risky' objection",instructions:"Practice using data calmly — acknowledge first, then respond, then check.",lines:[{role:"client",text:'"Honestly, I\'m not sure. Cambodia still feels risky to me."'},{role:"agent",text:'"That\'s a completely fair concern — and I don\'t want to dismiss it. Can I ask: what specific risk concerns you most? Is it the political environment, the developer, the legal structure, or something else?"'},{role:"client",text:'"Mostly the developer. I\'ve heard of projects that didn\'t deliver."'},{role:"agent",text:'"Yes — that did happen, primarily in the 2015–2019 off-plan boom. Some projects were launched without the capital to complete. That\'s why PHC only recommends projects from developers with a verified delivery track record. Megakim has completed 7 projects. Tanichu delivered J Tower 2 on schedule. Le Condé is completed and occupied. Would it help if I showed you the handover data from any of these?"'},{role:"client",text:'"Yes, that would help."'},{role:"note",text:"Debrief: Did the Agent acknowledge before responding? Did they ask a clarifying question to find the specific concern?"}],debrief:"Acknowledge, clarify, respond with data. Never skip the clarifying question — the stated objection is often not the real one. Find the actual concern, then address it."},quiz:[{q:"A client says 'yields are lower than other markets.' The PHC response is:",opts:["Agree and suggest they invest elsewhere if they want higher yields","Disagree — Cambodia yields are the highest in Asia","Acknowledge the comparison is valid, then add context: USD denomination, early-cycle recovery, verified 6.85%/yr combined return from REAKH data","Redirect to capital appreciation instead"],correct:2,explain:"Partially agree — acknowledging the comparison builds credibility. Then add the context: USD base, no currency risk, early-cycle market, verified ROI data. This is a complete answer, not a deflection."},{q:"A client says 'I've heard developers in Cambodia default.' You should:",opts:["Deny it — those were isolated incidents long ago","Acknowledge it happened in the 2015–2019 cycle, then differentiate PHC's project selection criteria","Change the subject to a positive project story","Offer a buy-back guarantee to address the concern"],correct:1,explain:"Acknowledge the truth — it happened. Then differentiate: PHC only recommends developers with verified delivery track records. This is more credible than denial, and it demonstrates that PHC's due diligence process is real."},{q:"When a client says 'I need to think about it,' the correct first response is:",opts:["Create urgency — prices may change","Ask what specifically they want to think through","Give them space and follow up in 2 weeks","Send them a project brochure to review"],correct:1,explain:"'I need to think about it' almost always contains a specific unresolved concern. Asking 'what specifically would you want to think through?' surfaces it. The answer to that question is what you need to address — not the time objection itself."},{q:"The CGT objection ('CGT makes this less attractive') is best handled by:",opts:["Agreeing and suggesting they wait until CGT is removed","Denying CGT has any real impact","Correcting the framing: CGT applies to taxable profit, not full sale price — and showing the actual calculation on their scenario","Redirecting to rental yield as the real return driver"],correct:2,explain:"Show the math. 'CGT applies to the taxable gain — on a $200K sale with $100K purchase and $40K documented costs, the tax is $12,000. Over a 7–10 year hold with rental income, that is a manageable exit cost.' The calculation dismantles the objection better than any reframe."}],reflection:"Think of the hardest objection you would find most difficult to answer. Write out how you would handle it using the PHC framework: acknowledge, clarify, respond with data, check, move forward."},
{id:16,week:4,title:"Site Visits & Property Presentations",short:"Site Visits",objectives:["Know how to prepare, conduct, and debrief a site visit professionally","Understand what to emphasise — and what to never say — during a property walkthrough","Convert a strong site visit into a clear next step"],sections:[{label:"Before the Visit",heading:"Preparation is the visit",body:"Most agents show up and react to whatever happens on site. PHC agents prepare. The preparation determines 70% of the outcome. A well-prepared site visit builds authority before a single door is opened.",rules:[{title:"Research the unit before you arrive",detail:"Know the exact floor, unit number, sqm, view orientation, management fee, and payment schedule. If you have to check your phone during the visit to answer basic questions, you have already lost ground."},{title:"Set the agenda before arrival",detail:"Message the client before: 'During our visit, we will look at the unit, the amenities, meet the onsite management team if available, and I will walk you through the full cost picture.' This signals structure and professionalism."},{title:"Know the building's foreign quota status",detail:"Before the visit: confirm the remaining foreign ownership percentage. If quota is low — flag it before the visit, not during. Surprises on site destroy confidence."},{title:"Prepare your objection responses",detail:"Anticipate the 2–3 concerns most likely for this client's profile (from qualification). Think through the data responses before you walk in."}]},{label:"During the Visit",heading:"What to do — and what never to say",body:"The site visit is not a sales presentation. It is a discovery and verification experience for the client. Your role is to guide, not to sell.",rules:[{title:"Let the client lead the walkthrough",detail:"Open the door and step back. Let the client move through the space naturally. Note what they comment on. Their reactions are qualification data."},{title:"Comment on specifics, not generalities",detail:"'This floor is 17th — south-facing. You will have direct sunlight from 9am to 3pm.' Not: 'The views are amazing.' Specifics signal expertise. Generalities signal a tour guide."},{title:"Address the management team if on site",detail:"Introduce the client to the building manager or reception if possible. Third-party voices — especially from Japanese management brands — carry more weight than your own."},{title:"Never use urgency language on site",detail:"'Only 3 units left on this floor' on a site visit is a pressure tactic that sophisticated buyers immediately recognise. If inventory is genuinely limited, state it once — factually, not urgently."}]},{label:"After the Visit",heading:"The debrief is where deals are won",body:"The 15 minutes after a site visit — whether in the lobby, a nearby café, or by phone — is the most valuable advisory time in the entire sales process. Use it deliberately.",rules:[{title:"Ask three questions immediately after",detail:"'What did you like most?' · 'What concerned you?' · 'Does this feel like the right type of property for what you described to me?' These three questions surface everything you need for the next step."},{title:"Confirm or update your recommendation",detail:"Based on their responses, either confirm your recommendation or adjust it: 'Given what you said about space — I think the 2-bedroom at Time Square 9 would actually be a better fit. Can I show you that one next?'"},{title:"Propose one clear next step",detail:"'The natural next step is to review the SPA together. Would you like me to arrange that with our legal team this week?' Always one step. Never push for a close."},{title:"Send a written summary within 24 hours",detail:"Summary of the unit visited · observations noted · any open questions · the agreed next step. This is standard PHC practice after every site visit."}]}],roleplay:{scenario:"Debrief conversation after a site visit",instructions:"Practice the three-question debrief. Do
