ҹҶбһ„бһҮбһ¶бһ“бһ·бһ…бҹ’бһ…бҹ”\""},{"role":"agent","text":"\"Qualified lead бһҳбһҪбһҷбһҡбһјбһ”бһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһ‘бһ»бһҖбһ…бҹ„бһӣ 9 бһҗбҹ’бһ„бҹғбһҠбҹ„бһҷбһӮбҹ’бһҳбһ¶бһ“бһҖбһ¶бһҡбһ‘бһ¶бһҖбҹӢбһ‘бһ„бһ–бһёбһҒбҹ’бһүбһ»бҹҶбҹ” бһ“бҹ„бҹҮбһ”бһ¶бһ“бһ”бҹҶбһ”бҹӮбһҖбһҹбҹ’бһҸбһ„бҹӢбһҠбһ¶бһҡ 7 бһҗбҹ’бһ„бҹғбҹ” бһҒбҹ’бһүбһ»бҹҶбһ…бһ¶бҹҶбһ”бһ¶бһ…бҹӢбһҸбҹ’бһҡбһјбһңбһҖбҹҶбһҺбһҸбҹӢбһҖбһ¶бһҡбһҡбҹҶбһӣбһ№бһҖбһҖбҹ’бһ“бһ»бһ„бһ”бҹ’бһҡбһҸбһ·бһ‘бһ·бһ“бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢ lead бһӮбҹ’бһҡбһ”бҹӢбһҡбһјбһ”бһ“бҹ…бһҸбҹ’бһҡбһ№бһҳбһҗбҹ’бһ„бҹғбһ‘бһё 5бҹ”\""},{"role":"note","text":"бһҖбһ¶бһҡбһ”бһјбһҖбһҹбһҡбһ»бһ”бһңбһ¶бһҷбһҸбһҳбҹ’бһӣбҹғбҹ– бһҸбһҫбһҖбһ¶бһҡбһңбһ¶бһҷбһҸбһҳбҹ’бһӣбҹғбһҹбһҳбһҸбҹ’бһҗбһ—бһ¶бһ–бһҒбҹ’бһӣбһҪбһ“бһҜбһ„бһҳбһ¶бһ“бһӣбһҖбҹ’бһҒбһҺбҹҲбһҮбһ¶бһҖбҹӢбһӣбһ¶бһҖбҹӢбһҠбҹӮбһҡбһ¬бһ‘бҹҒ? бһҸбһҫбһңбһ¶бһ”бһ¶бһ“бһҖбһҸбҹӢбһҹбһҳбҹ’бһӮбһ¶бһӣбҹӢбһҖбһ¶бһҡбһ•бҹ’бһӣбһ¶бһҹбҹӢбһ”бҹ’бһҸбһјбһҡбһҮбһ¶бһҖбҹӢбһҹбҹ’бһҸбҹӮбһ„бһҳбһҪбһҷбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҹбһ”бҹ’бһҸбһ¶бһ бҹҚбһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһҠбҹӮбһҡбһ¬бһ‘бҹҒ?"}],"debrief":"бһҖбһ¶бһҡбһңбһ¶бһҷбһҸбһҳбҹ’бһӣбҹғбһҹбһҳбһҸбҹ’бһҗбһ—бһ¶бһ–бһҒбҹ’бһӣбһҪбһ“бһҜбһ„бһҠбҹӮбһӣбһ”бһ„бҹ’бһҖбһҫбһҸбһ”бһ¶бһ“бһҮбһ¶бһҖбһ¶бһҡбһҖбҹӮбһӣбһҳбҹ’бһўбһҮбһ¶бһҖбҹӢбһӣбһ¶бһҖбҹӢ бһўбһ¶бһ…бһўбһ“бһ»бһңбһҸбҹ’бһҸбһ”бһ¶бһ“ бһҳбһ¶бһ“бһҸбһҳбҹ’бһӣбҹғбһҹбҹ’бһҳбһҫбһ“бһ№бһ„бһҖбһ¶бһҡбһ•бҹ’бһҸбһӣбҹӢбһҖбһҳбҹ’бһӣбһ¶бҹҶбһ„бһ…бһ·бһҸбҹ’бһҸ 10 бһҠбһ„бҹ” бһӮбҹ„бһӣбһҠбҹ…бһҳбһ·бһ“бһҳбҹӮбһ“бһҠбһҫбһҳбҹ’бһ”бһёбһҳбһ¶бһ“бһўбһ¶бһҡбһҳбҹ’бһҳбһҺбҹҚбһӣбҹ’бһўбһҮбһ¶бһ„бһҳбһ»бһ“бһ‘бҹҒ вҖ” бһӮбһәбһҠбһҫбһҳбҹ’бһ”бһёбһ’бҹ’бһңбһҫбһұбҹ’бһҷбһ”бһ¶бһ“бһӣбҹ’бһўбһҮбһ¶бһ„бһҳбһ»бһ“бһ“бҹ…бһҹбһ”бҹ’бһҸбһ¶бһ бҹҚбһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбҹ”"},"quiz":[{"q":"бһҖбһ¶бһҡбһңбһ¶бһҷбһҸбһҳбҹ’бһӣбҹғбһ”бҹ’бһҡбһҸбһ·бһ”бһҸбҹ’бһҸбһ·бһҖбһ¶бһҡбһҡбһ”бһҹбҹӢ PHC бһӮбһәбһ•бҹ’бһўбҹӮбһҖбһҮбһ¶бһ…бһҳбҹ’бһ”бһ„бһӣбһҫбҹ–","opts":["бһҳбҹүбҹ„бһ„бһ’бҹ’бһңбһҫбһҖбһ¶бһҡ бһ“бһ·бһ„бһ…бҹҶбһ“бһҪбһ“бһҹбһ¶бһҡбһўбһҸбһ·бһҗбһ·бһҮбһ“бһҠбҹӮбһӣбһ”бһ¶бһ“бһ•бҹ’бһүбһҫ","бһҖбһ¶бһҡбһҡбҹҶбһ—бһҫбһ” бһ“бһ·бһ„бһўбһ¶бһҖбһ”бҹ’бһ”бһҖбһ·бһҡбһ·бһҷбһ¶","бһӣбһ‘бҹ’бһ’бһ•бһӣбһ•бһӣбһҹбһҳбҹ’бһҡбҹҒбһ… (closings, бһ”бҹ’ бһҸбһ·бһҗбһ·бһҮбһ“ бһ“бһ·бһ„бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҖбҹҒбһҡбҹ’бһҸбһ·бҹҚбһҲбҹ’бһҳбҹ„бҹҮбһҡбһ”бһҹбҹӢ PHCбҹ”"}]}},
{id:20,week:4,title:"Graduation вҖ” The PHC Standard Review",short:"Graduation",objectives:["Demonstrate integrated mastery of all 19 previous lessons","Complete the final standards self-assessment","Understand the ongoing responsibilities of a PHC Investment Advisor"],sections:[{label:"What You Have Covered",heading:"Twenty lessons. One standard.",body:"You have completed the PHC 20-Day Agent Training Program. Before your graduation review with Nick, this final lesson asks you to integrate everything вҖ” not recall individual facts, but apply the framework as a whole.",box:{title:"The 20-lesson curriculum covered:",lines:["Week 1 вҖ” Foundation: PHC identity, Cambodia market (REAKH data), property law, portfolio, client segments","Week 2 вҖ” Advisory Skills: mindset, qualification, advisory flow, language standards, reading signals","Week 3 вҖ” Advanced Advisory: yield & ROI, Japanese protocol, European protocol, Khmer clients, objections","Week 4 вҖ” Performance: site visits, proposals, pipeline management, performance standards, graduation"]}},{label:"The PHC Standard вҖ” A Summary",heading:"Non-negotiable, every day",body:"These are the principles that define a PHC Investment Advisor. Not during training вҖ” always.",rules:[{title:"Clarity over persuasion",detail:"If it cannot be explained simply and honestly, it should not be sold. Yield figures are net, risks are named, CGT is disclosed. Always."},{title:"Trust is the product",detail:"One lost deal protects ten future relationships. Protect the reputation even when it costs the transaction."},{title:"Segment first, project second",detail:"The client's profile, goal, and risk tolerance determine the recommendation вҖ” never the commission on the product."},{title:"Written follow-up every time",detail:"Every meeting ends with a same-day summary. Every qualified client gets a proposal within 48 hours. Every lead is followed up within 7 days."},{title:"Escalate what you do not know",detail:"Uncertainty on legal questions, strata title, foreign quota, or developer credibility is escalated to Nick immediately. Confidence without knowledge is the most dangerous thing in advisory."}]},{label:"Ongoing Responsibilities",heading:"The program ends. The standard does not.",body:"Graduation from the 20-day program means you are qualified to work with PHC clients under the PHC standard. It does not mean the learning is finished. The Cambodia market changes. New projects launch. Tax laws evolve. Your responsibility as a PHC agent is to stay current.",rules:[{title:"Market updates",detail:"Read the REAKH news and reports. Track REAKH.com.kh for new listings, market trends, and developer announcements. Know what launched, what completed, and what sold. Your knowledge is your credibility."},{title:"Product knowledge",detail:"For every new project PHC adds to the portfolio: know the developer track record, title type, foreign quota, price per sqm, rental income estimate, and management setup before presenting to any client."},{title:"Language and cultural fluency",detail:"PHC serves Khmer, Japanese, German, English, and other international clients. Continuous improvement in cultural communication вҖ” not just language вҖ” is part of the PHC standard."},{title:"Nick's door",detail:"PHC is a consultative environment. If you encounter a situation you are unsure about вҖ” a difficult objection, a legal question, an unusual client request вҖ” Nick's door is open. Use it. That is how the standard is maintained."}]}],roleplay:{scenario:"Graduation review with Nick вҖ” integrated case scenario",instructions:"This is a complete client scenario from start to finish. Answer each stage as you would in reality.",lines:[{role:"nick",text:'"A 58-year-old Japanese investor contacts PHC. He has ВҘ25M to invest (~$165,000). He has never invested outside Japan. He says he wants \'guaranteed income.\' Walk me through your process from first contact to written proposal."'},{role:"agent",text:'"First вҖ” I would not accept the \'guaranteed income\' framing. I would acknowledge his goal: stable passive income. Then qualify: timeline, risk tolerance, family involvement, hold period."'},{role:"nick",text:'"He says he wants 8% return and he\'s heard other agencies are offering that."'},{role:"agent",text:'"I would say: \'I understand вҖ” 8% gross is commonly advertised. The honest figure is net: after management, vacancy, and rental tax, a realistic net yield in BKK1 is 5вҖ“7%. The REAKH verified case study on J Tower 2 shows 6.85% per year average over 5 years вҖ” that is a real transaction, not a projection. I would rather give you the accurate number than the attractive one.\'"'},{role:"nick",text:'"Good. Which project would you recommend and why?"'},{role:"agent",text:'"J Tower 3 вҖ” Tanichu developer, which is Japanese, so the cultural trust is immediate. Strata title confirmed. Pre-sale pricing gives him the best entry point on a project with J Tower 2\'s verified delivery track record as a reference. If he prefers a completed asset with no construction risk, Le CondГ© вҖ” Hopetree Japan management, completed May 2025, BKK1, from $150K."'},{role:"note",text:"Debrief: Did the Agent address the 'guaranteed' language, realign the yield expectation with data, disclose risks first, and recommend projects based on the client profile?"}],debrief:"This is the PHC standard in action: no guarantee language, honest yield, risk-first, data-backed recommendation, matched to the client profile. Not because it is scripted вҖ” but because it is right."},quiz:[{q:"A client opens with 'I want guaranteed 8% income.' The PHC response is:",opts:["Confirm 8% is achievable in BKK1","Agree and show projects with 8% advertised gross yield","Acknowledge their goal, realign to net yield reality with data, and explain that guarantees are not how responsible advisors work","Ask Nick what to say"],correct:2,explain:"Acknowledge the goal (stable income). Realign the number (gross vs net). Explain the principle (no guarantees in investment property). Data: REAKH verified 6.85%/yr average. This is the complete PHC response."},{q:"The most important thing that distinguishes a PHC Investment Advisor from a typical real estate agent is:",opts:["PHC has better listings and developer relationships","PHC advisors lead with risk before return, present net yield, and only recommend projects matched to the client's stated profile","PHC offers the lowest commission in the market","PHC has multilingual capabilities"],correct:1,explain:"The defining distinction is the advisory framework: risks before returns, net yield (not gross), segment-first matching, written follow-ups, and no urgency tactics. These are not features вҖ” they are the standard."},{q:"If you are unsure whether a project's strata title is confirmed for a foreign buyer, you should:",opts:["Present it anyway and note the caveat in small print","Ask the developer and trust their answer","Escalate to Nick immediately вҖ” never present a project to a foreign buyer without confirmed strata title status","Wait until you are sure before following up with the client"],correct:2,explain:"Strata title confirmation for foreign buyers is non-negotiable. Do not guess. Do not trust a verbal developer confirmation without documentation. Escalate to Nick immediately. This protects the client and PHC's reputation."},{q:"The PHC 20-day program ending means:",opts:["You are now fully independent and no longer need Nick's input","The learning is finished вҖ” you know everything required","You are qualified to work with PHC clients under the PHC standard вҖ” and the responsibility to stay current is now yours","You can now use your own approach rather than the PHC framework"],correct:2,explain:"Graduation means you meet the standard. The standard never stops. The market changes, new projects launch, laws evolve. Staying current вҖ” REAKH updates, product knowledge, cultural fluency вҖ” is an ongoing obligation, not a one-time training outcome."},{q:"The reflection question for Lesson 20 is unique because:",opts:["It is multiple choice like all the others","It asks you to evaluate your instructor","It asks you to write a personal commitment вҖ” one thing you will do differently after completing this program","It does not count toward your graduation score"],correct:2,explain:"The final reflection is a personal commitment вҖ” not a knowledge test. The 20-day program trains the mind. The commitment converts training into behaviour. That conversion is what PHC is actually looking for."}],reflection:"Write one specific commitment вҖ” not a list of ten. One thing you will do differently in every client conversation after completing this program. Be precise: not 'I will be more professional' but 'I will always present net yield and name all deductions before giving a client any return figure.'"},
{id:21,week:5,title:"Leads, Content & Distribution вҖ” How PHC's Channels Work",short:"Leads & Distribution",objectives:["Know which PHC advisor receives inbound leads from each language channel, and why","Understand how the Content Bot posts and translates listings across all four channels","Understand PHC's 70/30 educational-to-listing content strategy and why it matters for trust"],sections:[{label:"How Listings Reach Clients",heading:"One bot, four languages, one tap",body:"Every PHC listing that appears on Telegram goes through the same pipeline before a client ever sees it. Nick forwards the raw listing to PHC's Content Bot, which detects the listing format, translates it into English, Japanese, Russian, and German, and sends one review message back. Approving it posts all four language versions to their channels at the same moment вҖ” the same listing, the same standard, in every market PHC serves.",box:{title:"The pipeline, step by step",lines:["Listing forwarded to @PHC_Content_Bot","Bot detects format and translates to EN / JP / RU / DE","One combined review message вҖ” Approve All posts everywhere at once","Each posted listing carries two buttons: Contact Us and More Property"]}},{label:"Who Gets the Lead",heading:"Contact Us routes to a real person, not a queue",body:"The 'Contact Us' button on every posted listing opens a direct Telegram chat вҖ” not a shared inbox, not a bot conversation. It goes straight to the advisor responsible for that channel's audience. If a lead reaches you this way, you are their first point of contact. Treat it exactly like a walk-in inquiry and apply the Advisory Conversation Flow from Lesson 8 from the first reply.",rules:[{title:"English channel",detail:"Contact Us routes to Monika"},{title:"Japanese channel",detail:"Contact Us routes to Nick"},{title:"Russian channel",detail:"Contact Us routes to Monika"},{title:"German channel",detail:"Contact Us routes to REZA"}]},{label:"Why PHC Posts More Than Listings",heading:"70% educational, 30% listings вҖ” on purpose",body:"An audience that only ever sees listings learns to scroll past them. PHC's content mix is built so that most of what a client sees before they ever message in is educational вҖ” market data, the buying process, ownership law, honest answers to common objections. This is the same trust-first standard from Lesson 6: a client should already sense PHC is an advisor, not a salesperson, before the first conversation even happens.",box:{title:"Educational topics in rotation",lines:["Foreign ownership & strata-title law","Buying process & payment plans","Market data вҖ” yields, USD stability, districts","Myth-busting / FAQ","Developer verification вҖ” how PHC vets a project"]}}],roleplay:{scenario:"A cold message arrives from the German Contact Us button",instructions:"This is a coaching conversation with Nick about handling an inbound lead that arrives with no context.",lines:[{role:"nick",text:'"You get a Telegram message: \'Hi, is this still available? What is the payment plan?\' No name, no project mentioned. What is your first move?"'},{role:"agent",text:'"First, I check which channel this could have come from вҖ” since I only receive Contact Us messages from the German channel, I know it is tied to a listing PHC recently posted there. I ask which project they saw, so I respond with the right details instead of guessing."'},{role:"nick",text:'"Good. They reply: \'The one with the 24/7 nurse station.\' What now?"'},{role:"agent",text:'"That is J Tower 3. I confirm the project, then apply the normal advisory flow from here вҖ” qualify first, and I do not just recite the payment plan without understanding their timeline and goal."'},{role:"note",text:"Debrief: Did the agent correctly infer the lead source from the channel they own, ask for context instead of guessing, and fall back into the standard qualification flow rather than treating this as a special case?"}],debrief:"A lead from a Contact Us button is not a special process вҖ” it is a normal inbound inquiry that happens to start with less context. Identify the source, get the missing context, then run the same advisory standard as any other client."},quiz:[{q:"Which PHC advisor's Telegram receives 'Contact Us' clicks from the German-language channel?",opts:["Whoever is online at the time","REZA","Monika","Nick"],correct:1,explain:"Contact Us routes by channel, not availability вҖ” German always reaches REZA directly, the same way English and Russian always reach Monika, and Japanese always reaches Nick."},{q:"Why does PHC deliberately post 70% educational content instead of almost all listings?",opts:["Listings perform worse on Telegram's algorithm","Educational content is faster to produce","It builds the trusted-advisor positioning before a client ever reaches out вҖ” the same standard from the Advisor Mindset lesson","Clients are legally required to see educational content first"],correct:2,explain:"The content mix exists to build trust before the first conversation вҖ” a client who has already seen honest, useful content arrives expecting an advisor, not a salesperson."},{q:"A lead's first message has no greeting, no name, and no project mentioned. What does this most likely mean?",opts:["They are not a serious buyer вҖ” deprioritize them","They tapped a channel's Contact Us button and are replying to a specific listing you may not have seen yet","This is spam and should be ignored","Ask them to resend in English only"],correct:1,explain:"Contact Us opens a fresh chat with no shared history вҖ” the client sees the listing, you don't, until you ask which one it was."}],km:{"title":"Leads, Content & Distribution вҖ” бһҡбһ”бҹҖбһ”бһҠбҹӮбһӣбһ”бһҺбҹ’бһҸбһ¶бһүбһҡбһ”бһҹбҹӢ PHC бһҠбҹҶбһҺбһҫбһҡбһҖбһ¶бһҡ","short":"бһўбһҸбһ·бһҗбһ·бһҮбһ“бһҹбһҖбҹ’бһҸбһ¶бһ“бһ»бһ–бһӣ бһ“бһ·бһ„бһҖбһ¶бһҡбһ…бҹӮбһҖбһ…бһ¶бһҷ","objectives":["бһҹбҹ’бһңбҹӮбһ„бһҷбһӣбҹӢбһҗбһ¶бһ‘бһёбһ”бҹ’бһҡбһ№бһҖбҹ’бһҹбһ¶ PHC бһҺбһ¶бһҳбҹ’бһ“бһ¶бһҖбҹӢбһҠбҹӮбһӣбһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бһўбһ function updateChrome(){
  var d=S.done.length;
  var total=LESSONS.length;
  document.getElementById('tb-fill').style.width=(d/total*100)+'%';
  document.getElementById('tb-label').textContent=d+' / '+total;
  document.getElementById('tb-ctx').textContent=S.view==='lesson'?'L'+cur().id+' вҖ” '+cur().title:'Agent Training Program';
  updateLangButtons();
}

function updateLangButtons(){
  var en=document.getElementById('tb-lang-en'), km=document.getElementById('tb-lang-km');
  if(!en||!km)return;
  var base='font-size:11px;font-weight:600;padding:5px 10px;border-radius:6px;cursor:pointer;border:1px solid rgba(255,255,255,.18);';
  var on='background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.32);color:#fff;';
  var off='background:transparent;color:rgba(255,255,255,.55);';
  en.setAttribute('style',base+(S.lang==='en'?on:off));
  km.setAttribute('style',base+(S.lang==='km'?on:off));
}
function setLang(v){
  if(S.lang===v)return;
  S.lang=v; saveS();
  if(S.view==='lesson') renderLesson();
  else if(S.view==='certificate') viewCertificate();
  else renderLanding();
  buildSidebar();updateChrome();updateMobNav();
}

// SIDEBAR
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function buildSidebar(){
  var h='';
  [1,2,3,4,5].forEach(function(w){
    var wls=LESSONS.filter(function(l){return l.week===w;});
    if(!wls.length)return;
    h+='<div class="sb-week"><div class="sb-week-pip" style="background:'+wc(w)+'"></div><div class="sb-week-txt">Week '+w+' вҖ” '+wn(w)+'</div></div>';
    wls.forEach(function(l){
      var idx=LESSONS.indexOf(l);
      var dl=loc(l);
      var done=S.done.indexOf(l.id)>=0;
      var active=S.view==='lesson'&&S.li===idx;
      h+='<div class="sb-row'+(active?' active':'')+(done?' done':'')+'" onclick="openLesson('+idx+')">'
        +'<div class="sb-badge">'+(done?'вң“':active?'в–¶':l.id)+'</div>'
        +'<div class="sb-title">'+esc(dl.short)+'</div>'
        +'</div>';
    });
  });
  document.getElementById('sidebar').innerHTML=h;
}

// MOBILE NAV
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function updateMobNav(){
  var mn=document.getElementById('mob-nav');
  if(!mn)return;
  var isMob=window.innerWidth<=700;
  mn.style.display=isMob?'flex':'none';
  if(!isMob)return;
  var cont=document.getElementById('mn-continue');
  var back=document.getElementById('mn-back');
  if(S.view==='certificate'){
    cont.textContent='рҹ–Ё Print';
    cont.disabled=false;
    back.style.opacity='1';
    back.disabled=false;
  } else if(S.view==='lesson'){
    var l=cur(), tot=steps(l), st=S.step;
    var nSec=l.sections.length;
    var isComplete=st===tot-1;
    var isQuiz=st===nSec+2;
    var isLast=S.li===LESSONS.length-1;
    if(isComplete){
      cont.textContent=!isLast?'Next Lesson вҶ’':'Certificate рҹҺ“';
      cont.className='mob-nav-continue'+(isLast?' cta-gold':'');
      cont.disabled=false;
    } else if(isQuiz){
      var sub=S.qs[l.id];
      var perfect=false;
      if(sub){var sc2=0;S.qa[l.id].forEach(function(a,i){if(a&&a.chosen===l.quiz[i].correct)sc2++;});perfect=sc2===l.quiz.length;}
      cont.textContent='Continue вҶ’';
      cont.disabled=!(sub&&perfect);
    } else {
      cont.textContent='Continue вҶ’';
      cont.disabled=false;
    }
    back.style.opacity=st>0?'1':'0.4';
    back.disabled=st<=0;
  } else {
    // landing
    var ni=LESSONS.findIndex(function(l){return S.done.indexOf(l.id)<0;});
    cont.textContent=ni>=0?'Continue вҶ’':'Certificate рҹҺ“';
    cont.disabled=false;
    back.style.opacity='0.4';
    back.disabled=true;
  }
}
function mobContinue(){
  if(S.view==='certificate'){window.print();return;}
  if(S.view==='landing'){
    var ni=LESSONS.findIndex(function(l){return S.done.indexOf(l.id)<0;});
    if(ni>=0) openLesson(ni);
    else viewCertificate();
    return;
  }
  var l=cur(),tot=steps(l),st=S.step,nSec=l.sections.length,isComplete=st===tot-1,isLast=S.li===LESSONS.length-1;
  if(isComplete){
    if(!isLast) openLesson(S.li+1);
    else viewCertificate();
  } else {
    goNext();
  }
}
function mobBack(){
  if(S.view==='lesson'&&S.step>0)goBack();
  else renderLanding();
}
window.addEventListener('resize',updateMobNav);

function openLesson(idx){
  S.li=idx; S.step=0; S.view='lesson';
  var l=cur();
  if(!S.qa[l.id]) S.qa[l.id]=l.quiz.map(function(){return{answered:false,chosen:-1};});
  renderLesson(); buildSidebar(); updateChrome(); updateMobNav();
  window.scrollTo(0,0);
}

function renderLesson(){
  var l=cur(),tot=steps(l),st=S.step,nSec=l.sections.length;
  var pips=Array.from({length:tot},function(_,i){
    return '<div class="pip'+(i<st?' done':i===st?' active':'')+'"></div>';
  }).join('');

  var chrome='<div class="lesson-chrome">'
    +'<div class="lc-top">'
    +'<div class="lc-week-tag" style="background:'+wc(l.week)+'">Week '+l.week+'</div>'
    +'<div class="lc-title">'+esc(l.title)+'</div>'
    +'<div class="lc-counter">'+(st+1)+'/'+tot+'</div>'
    +'</div>'
    +'<div class="pips">'+pips+'</div>'
    +'</div>';

  var content='';
  if(st===0) content=buildObjectives(l);
  else if(st<=nSec) content=buildSection(l,l.sections[st-1]);
  else if(st===nSec+1) content=buildRoleplay(l);
  else if(st===nSec+2) content=buildQuiz(l);
  else content=buildComplete(l);

  var footer=buildFooter(l,st,tot);

  document.getElementById('main').innerHTML=
    chrome
    +'<div class="scroll"><div class="rise" id="active-content">'+content+'</div></div>'
    +footer;

  var sc=document.querySelector('.scroll');
  if(sc) sc.scrollTop=0;
  updateMobNav();
}

// A real spot-illustration for "which floors can foreigners own" вҖ” not a
// text comparison. Ground floor drawn separately in red/blocked; floors
// above in green/allowed, matching the actual rule.
function buildFloorDiagram(){
  var floors=[{y:10,label:'4'},{y:40,label:'3'},{y:70,label:'2'}];
  var svgFloors=floors.map(function(f){
    return '<rect x="10" y="'+f.y+'" width="70" height="28" rx="3" fill="var(--ok)"/>'
      +'<text x="45" y="'+(f.y+18)+'" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">'+f.label+'</text>';
  }).join('');
  var svg='<svg width="90" height="150" viewBox="0 0 90 150">'+svgFloors
    +'<rect x="10" y="100" width="70" height="28" rx="3" fill="var(--err)"/>'
    +'<text x="45" y="118" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Ground</text>'
    +'<rect x="35" y="128" width="20" height="14" fill="var(--navy)"/></svg>';
  var legend='<div class="building-legend">'
    +'<div class="legend-row"><div class="legend-swatch blocked">вң•</div><div class="legend-text"><b>Ground floor</b><span>Foreigners cannot own this, ever</span></div></div>'
    +'<div class="legend-row"><div class="legend-swatch ok">вң“</div><div class="legend-text"><b>1st floor and up</b><span>Foreigners can legally own these</span></div></div>'
    +'</div>';
  return '<div class="diagram-box"><div class="diagram-title">Which floors can a foreigner own?</div><div class="building-diagram">'+svg+legend+'</div></div>';

// A real proportional bar for the 70/30 foreign-ownership quota, instead
// of just stating the percentage in a sentence.
function buildQuotaBar(){
  return '<div class="diagram-box"><div class="diagram-title">How much of one building can foreigners own?</div>'
    +'<div class="quota-wrap"><div class="quota-bar"><div class="quota-seg foreign">Up to 70%</div><div class="quota-seg local">At least 30%</div></div>'
    +'<div class="quota-caption"><span>Can be foreign-owned</span><span>Must stay Cambodian-owned</span></div></div></div>';
}

// A visual flow for any numbered process вҖ” shown as connected steps
// instead of only a list of text cards. Use for any section that
// describes "first this, then this" in order.
function buildFlowDiagram(steps){
  var h='<div class="flow-diagram">';
  steps.forEach(function(s,i){
    if(i>0) h+='<div class="flow-arrow">вҶ’</div>';
    h+='<div class="flow-step"><div class="flow-step-n">'+(i+1)+'</div><div class="flow-step-title">'+esc(s.title)+'</div><div class="flow-step-sub">'+esc(s.sub)+'</div></div>';
  });
  h+='</div>';
  return h;
}

function buildCalc(c){
  var h='<div class="calc-box"><div class="calc-title">'+esc(c.title)+'</div>';
  c.rows.forEach(function(r){h+='<div class="calc-row'+(r.total?' total':'')+'"><span>'+esc(r.label)+'</span><span>'+esc(r.value)+'</span></div>';});
  h+='</div>';
  return h;
}

function buildSection(l,sec){
  var h='<div class="eyebrow">'+esc(sec.label||'')+'</div><div class="heading">'+esc(sec.heading)+'</div>';
  if(sec.body) h+='<div class="body-text"><p>'+esc(sec.body)+'</p></div>';
  if(sec.analogy){
    h+='<div class="analogy-box"><div class="ib-label">Think of it like this</div>'+esc(sec.analogy)+'</div>';
  }
  if(sec.flow) h+=buildFlowDiagram(sec.flow);
  if(sec.calc) h+=buildCalc(sec.calc);
  if(sec.diagrams){
    sec.diagrams.forEach(function(d){
      if(d==='floors') h+=buildFloorDiagram();
      if(d==='quota') h+=buildQuotaBar();
    });
  }
  if(sec.box){
    h+='<div class="info-box"><div class="ib-label">'+esc(sec.box.title)+'</div>'+sec.box.lines.map(esc).join('<br>')+'</div>';
  }
  if(sec.warning) h+='<div class="warn-box">'+esc(sec.warning)+'</div>';
  if(sec.grid){
    h+='<div class="info-grid">';
    sec.grid.forEach(function(r){h+='<div class="ig"><div class="ig-lbl">'+esc(r[0])+'</div><div class="ig-val">'+esc(r[1])+'</div></div>';});
    h+='</div>';
  }
  if(sec.rules){
    h+='<div class="rules">';
    sec.rules.forEach(function(r,i){
      h+='<div class="rule"><div class="rule-n">'+(i+1)+'</div><div><div class="rule-title">'+esc(r.title)+'</div><div class="rule-detail">'+esc(r.detail)+'</div>';
      if(r.action) h+='<div class="rule-action"><b>How you\'d do this:</b> '+esc(r.action)+'</div>';
      h+='</div></div>';
    });
    h+='</div>';
  }
  if(sec.table){
    var hasScrollHint=sec.table.headers.length>3?'<div class="tbl-scroll-hint">вҶҗ Scroll to see all вҶ’</div>':'';
    h+='<div class="tbl-outer">'+hasScrollHint+'<div class="tbl-wrap"><table><thead><tr>'+sec.table.headers.map(function(hd){return'<th>'+esc(hd)+'</th>';}).join('')+'</tr></thead><tbody>';
    sec.table.rows.forEach(function(row){h+='<tr>'+row.map(function(c){return'<td>'+esc(c)+'</td>';}).join('')+'</tr>';});
    h+='</tbody></table></div>';
  }
  return h;
}

function buildQuiz(l){
  var qa=S.qa[l.id], sub=S.qs[l.id];
  var letters=['A','B','C','D'];
  var sc=0; if(sub) qa.forEach(function(a,i){if(a&&a.chosen===l.quiz[i].correct)sc++;});
  var total=l.quiz.length;
  var perfect=sub&&sc===total;
  var answeredCount=qa.filter(function(a){return a.answered;}).length;

  // Meta bar
  var metaRight=sub
    ?'<span class="quiz-meta-score" style="color:'+(perfect?'var(--ok)':'var(--err)')+'">'+sc+'/'+total+' correct'+(perfect?' вң“':'')+' </span>'
      +(perfect?'':'<button class="btn" onclick="retryQuiz()" style="font-size:12px;padding:5px 12px;margin-left:6px">Retry</button>')
    :'<span id="quiz-answered-badge" class="quiz-meta-score">'+answeredCount+'/'+total+' answered</span>';

  var meta='<div class="quiz-meta"><span style="font-weight:500">'
    +(sub?(perfect?'All correct вҖ” well done':'Not all correct вҖ” review below and retry'):'Select one answer per question, then submit')
    +'</span>'+metaRight+'</div>';

  // Questions
  var qhtml=l.quiz.map(function(q,qi){
    var ans=qa[qi];
    var opts=q.opts.map(function(opt,oi){
      var cls='q-opt';
      if(sub){
        // Post-submit: reveal correct/wrong fully
        cls+=' locked';
        if(oi===q.correct) cls+=' correct';
        else if(ans&&ans.chosen===oi&&oi!==q.correct) cls+=' wrong';
      } else if(ans&&ans.answered){
        // Pre-submit: only show selected state, no reveal
        cls+=' locked';
        if(oi===ans.chosen) cls+=' selected';
      }
      var click=(!sub&&!(ans&&ans.answered))?'onclick="pickAnswer('+qi+','+oi+')"':'';
      return '<div class="'+cls+'" '+click+'>'
        +'<div class="opt-ltr">'+letters[oi]+'</div>'
        +'<div class="opt-text">'+esc(opt)+'</div>'
        +'</div>';
    }).join('');

    // Feedback only after submit
    var fb='';
    if(sub&&ans){
      var ok=ans.chosen===q.correct;
      fb='<div class="q-feedback '+(ok?'correct':'wrong')+'" style="display:block">'
        +'<div class="fb-head">'+(ok?'вң“ Correct':'вң— Incorrect вҖ” correct answer highlighted above')+'</div>'
        +'<div class="fb-body">'+esc(q.explain)+'</div>'
        +'</div>';
    }
    return '<div class="q-block">'
      +'<div class="q-num">Question '+(qi+1)+' of '+total+'</div>'
      +'<div class="q-text">'+esc(q.q)+'</div>'
      +'<div class="q-opts" id="qo-'+qi+'">'+opts+'</div>'
      +fb
      +'</div>';
  }).join('');

  // Actions
  var allAns=qa.every(function(a){return a.answered;});
  var actions='';
  if(!sub){
    actions='<div class="quiz-actions">'
      +'<button class="btn primary" '+(allAns?'':'disabled')+' onclick="submitQuiz()" id="submit-btn">Submit Answers</button>'
      +(!allAns?'<span class="quiz-hint">Answer all '+total+' questions to submit</span>':'')
      +'</div>';
  } else if(!perfect){
    // Require retry вҖ” must score 100% to proceed
    actions='<div class="quiz-actions">'
      +'<div class="quiz-pass-gate">'
      +'<svg viewBox="0 0 24 24" fill="none" stroke="var(--err)" stroke-width="2" stroke-linecap="round" width="16" height="16"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
      +'<span>Score <strong>'+sc+'/'+total+'</strong> вҖ” you need <strong>'+total+'/'+total+'</strong> to continue. Review the explanations above, then retry.</span>'
      +'</div>'
      +'<button class="btn primary" onclick="retryQuiz()">Retry Quiz</button>'
      +'</div>';
  }

  return '<div class="eyebrow">Knowledge Check</div>'
    +'<div class="heading">Lesson '+l.id+' Quiz</div>'
    +meta+qhtml+actions;
}

    +'</div>';

    +'<div class="complete-h">Lesson '+l.id+' Complete</div>'
    +'<div class="complete-sub">Review the reflection question before moving on.</div>'
    +'<div class="score-pills"><div class="s-pill '+pc+'">'+sc+'/'+tot+' quiz score</div></div>'

function buildFooter(l,st,tot){
  var nSec=l.sections.length;
  var isComplete=st===tot-1, isQuiz=st===nSec+2, isLast=S.li===LESSONS.length-1;
  var next='',hint='';
  if(isComplete){
    if(!isLast){
      next='<button class="btn cta" onclick="openLesson('+(S.li+1)+')">Next Lesson вҶ’</button>';
    } else {
      // L20 complete вҖ” offer certificate or overview
      next='<button class="btn cta" onclick="viewCertificate()">View Certificate рҹҺ“</button>';
    }
  } else if(isQuiz){
    var sub=S.qs[l.id];
    var perfect=false;
    if(sub){
      var sc=0; S.qa[l.id].forEach(function(a,i){if(a&&a.chosen===l.quiz[i].correct)sc++;});
      perfect=sc===l.quiz.length;
    }
    var canContinue=sub&&perfect;
    next='<button class="btn primary" '+(canContinue?'':'disabled')+' onclick="goNext()">Continue вҶ’</button>';
    if(!sub) hint='Submit answers to continue';
    else if(!perfect) hint='100% required to continue';
  } else {
    next='<button class="btn primary" onclick="goNext()">Continue вҶ’</button>';
  }
  return '<div class="footbar">'
    +(st>0?'<button class="btn" onclick="goBack()">вҶҗ Back</button>':'<button class="btn" onclick="renderLanding()">вҶҗ Overview</button>')
    +next
    +(hint?'<span class="footbar-hint">'+esc(hint)+'</span>':'')
    +'</div>';
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// ACTIONS
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function goNext(){
  var l=cur(),tot=steps(l);
  // Gate: cannot leave quiz step unless submitted AND perfect score
  var nSec=l.sections.length;
  if(S.step===nSec+2){
    var sub=S.qs[l.id]; if(!sub)return;
    var qa=S.qa[l.id]; var sc=0;
    qa.forEach(function(a,i){if(a&&a.chosen===l.quiz[i].correct)sc++;});
    if(sc<l.quiz.length)return; // force retry
  }
  if(S.step<tot-1){
    S.step++;
    if(S.step===tot-1){
      if(S.done.indexOf(l.id)<0){S.done.push(l.id);saveS();}
      buildSidebar();updateChrome();
    }
    renderLesson();
  }
}
function goBack(){
  if(S.step>0){S.step--;renderLesson();}
  else renderLanding();
}
function toggleRP(el){
  var panel=document.getElementById('rp-panel');
  var chev=el.querySelector('.rp-chevron');
  var open=panel.classList.toggle('open');
  chev.classList.toggle('open',open);
}
function pickAnswer(qi,oi){
  var l=cur(),qa=S.qa[l.id];
  if(qa[qi].answered)return;
  qa[qi].answered=true; qa[qi].chosen=oi;
  saveS();
  var block=document.getElementById('qo-'+qi);
  if(!block)return;
  // Only mark selected вҖ” no reveal of correct/wrong until submit
  block.querySelectorAll('.q-opt').forEach(function(opt,idx){
    opt.classList.add('locked');
    opt.removeAttribute('onclick');
    if(idx===oi) opt.classList.add('selected');
  });
  // Answered count badge
  var answeredCount=qa.filter(function(a){return a.answered;}).length;
  var badge=document.getElementById('quiz-answered-badge');
  if(badge) badge.textContent=answeredCount+'/'+l.quiz.length+' answered';
  // Enable submit when all answered
  var allAns=qa.every(function(a){return a.answered;});
  var btn=document.getElementById('submit-btn');
  if(btn&&allAns){
    btn.removeAttribute('disabled');
    var hint=btn.parentElement.querySelector('.quiz-hint');
    if(hint)hint.remove();
  }
  updateMobNav();
}
function submitQuiz(){
  var l=cur(); S.qs[l.id]=true; saveS(); renderLesson();
}
function retryQuiz(){
  var l=cur();
  S.qa[l.id]=l.quiz.map(function(){return{answered:false,chosen:-1};});
  S.qs[l.id]=false; saveS(); renderLesson();
}

function saveName(val){
  S.name=val;

}
