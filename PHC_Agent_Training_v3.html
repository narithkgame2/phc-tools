ҷбһўбһ…бһӣбһ“бһ‘бҹ’бһҡбһ–бҹ’бһҷ?'"],"correct":1,"explain":"'бһҸбһҫбһўбҹ’бһңбһёбһҠбҹӮбһӣбһ“бһ№бһ„бһ’бҹ’бһңбһҫбһұбҹ’бһҷбһҖбһ¶бһҡбһңбһ·бһ“бһ·бһҷбҹ„бһӮбһ“бҹҒбҹҮбһҖбҹ’бһӣбһ¶бһҷбһҮбһ¶бһҖбҹҶбһ бһ»бһҹбһҶбҹ’бһӮбһ„бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһ”бһ„?' бһӮбһәбһҮбһ¶бһҹбҹҶбһҺбһҪбһҡ бһ”бһҫбһҖбһ…бҹҶбһ  бһ“бһ·бһ„бһ•бҹ’бһҸбҹ„бһҸбһӣбһҫбһ”бһ»бһӮбҹ’бһӮбһӣбҹ” бһңбһ¶бһ”бһҖбһўбһ¶бһҖбҹ’бһҡбһ¶бһҸбһ–бһёбһҖбһ¶бһҡбһ—бҹҗбһҷбһҒбҹ’бһӣбһ¶бһ… бһ…бҹҶбһҺбһ»бһ…бһҳбһ·бһ“бһўбһ¶бһ…бһ‘бһ‘бһҪбһӣбһҷбһҖбһ”бһ¶бһ“ бһ“бһ·бһ„бһҸбһҳбҹ’бһӣбҹғбһ•бҹ’бһ‘бһ¶бһӣбҹӢбһҒбҹ’бһӣбһҪбһ“ бһҠбҹӮбһӣбһӮбҹ’бһҳбһ¶бһ“бһҹбҹҶбһҺбһҪбһҡбһ”бһ·бһ‘бһҺбһ¶бһҳбһҪбһҷбһўбһ¶бһ…бһ‘бһ¶бһүбһ…бҹҒбһүбһ”бһ¶бһ“бһЎбһҫбһҷбҹ”"},{"q":"бһўбһҸбһ·бһҗбһ·бһҮбһ“бһҹбҹ’бһ“бһҫбһҹбһ»бҹҶбһұбҹ’бһҷбһўбҹ’бһ“бһҖбһҮбһҪбһҷбһҡбҹҖбһ”бһ…бҹҶбһҡбһ…бһ“бһ¶бһҹбһҳбҹ’бһ–бҹҗбһ“бҹ’бһ’бһҲбҹ’бһҳбҹ„бҹҮбһ”бһ¶бҹҶбһ„бһҳбһ»бһҒбһҮбһ¶бһҮбһ“бһҮбһ¶бһҸбһ·бһҒбҹ’бһҳбҹӮбһҡ бһҠбһҫбһҳбҹ’бһ”бһёбһҖбһ¶бһ“бҹӢбһҖбһ¶бһ”бҹӢбһңбһёбһЎбһ¶бҹ” бһўбҹ’бһ“бһҖбһӮбһҪбһҡбһҸбҹӮбҹ–","opts":["бһҺбҹӮбһ“бһ¶бҹҶбһ–бһҪбһҖбһӮбһ¶бһҸбҹӢбһ‘бҹ…бһҳбҹҒбһ’бһ¶бһңбһёбһҖбҹ’бһ“бһ»бһ„бһҹбҹ’бһҡбһ»бһҖбһҠбҹӮбһӣбһҖбһ¶бһҸбҹӢбһҖбһ¶бһ”бҹӢбһҡбһ…бһ“бһ¶бһҹбһҳбҹ’бһ–бҹҗбһ“бҹ’бһ’бһҲбҹ’бһҳбҹ„бҹҮбһ”бһ¶бҹҶбһ„бһҳбһ»бһҒ","бһҮбһҪбһҷбһ–бһҪбһҖбһӮбһ¶бһҸбҹӢ вҖ” бһңбһ¶бһҮбһ¶бһҖбһ¶бһҡбһўбһ“бһ»бһңбһҸбҹ’бһҸбһ‘бһјбһ‘бҹ…","бһ–бһ“бҹ’бһҷбһӣбҹӢбһҗбһ¶ PHC бһҳбһ·бһ“бһӮбһ¶бҹҶбһ‘бҹ’бһҡбһҡбһ…бһ“бһ¶бһҹбһҳбҹ’бһ–бҹҗбһ“бҹ’бһ’бһҲбҹ’бһҳбҹ„бҹҮбһ”бһ¶бҹҶбһ„бһҳбһ»бһҒбһЎбһҫбһҷ бһҠбҹ„бһҷбһҹбһ¶бһҡбһ бһ¶бһ“бһ·бһ—бҹҗбһҷбһ•бҹ’бһӣбһјбһңбһ…бҹ’бһ”бһ¶бһ”бҹӢ вҖ” бһ бһҫбһҷбһ•бҹ’бһҸбһӣбҹӢбһҮбһҳбҹ’бһҡбһҫбһҹбһҹбҹ’бһҡбһ”бһ…бҹ’бһ”бһ¶бһ”бҹӢбһҮбҹҶбһ“бһҪбһҹбһңбһ·бһү","бһҹбһҪбһҡ Nick бһҮбһ¶бһҳбһ»бһ“бһҹбһ·бһ“бһҳбһ»бһ“бһ“бһ№бһ„бһҶбҹ’бһӣбһҫбһҷ"],"correct":2,"explain":"PHC бһҳбһ·бһ“бһӮбһ¶бҹҶбһ‘бҹ’бһҡбһҡбһ…бһ“бһ¶бһҹбһҳбҹ’бһ–бҹҗбһ“бҹ’бһ’бһҲбҹ’бһҳбҹ„бҹҮбһ”бһ¶бҹҶбһ„бһҳбһ»бһҒбһЎбһҫбһҷбҹ” бһ“бҹҒбҹҮбһҮбһ¶бһ бһ¶бһ“бһ·бһ—бҹҗбһҷбһ•бҹ’бһӣбһјбһңбһ…бҹ’бһ”бһ¶бһ”бҹӢбһ…бҹҶбһ–бҹ„бҹҮбһўбһҸбһ·бһҗбһ·бһҮбһ“ бһ“бһ·бһ„бһҮбһ¶бһ бһ¶бһ“бһ·бһ—бҹҗбһҷбһҖбһ·бһҸбҹ’бһҷбһ¶бһ“бһ»бһ—бһ¶бһ–бһ…бҹҶбһ–бҹ„бҹҮ PHCбҹ” бһ”бһүбҹ’бһҮбһ¶бһҖбҹӢбһ…бҹҶбһҺбһ»бһ…бһ“бҹҒбҹҮбһұбҹ’бһҷбһ…бҹ’бһ”бһ¶бһҹбҹӢ бһ бһҫбһҷбһҸбһҳбҹ’бһҡбһ„бҹӢбһ‘бһ·бһҹбһ‘бҹ…бһҖбһ¶бһ“бҹӢбһҮбһҳбҹ’бһҡбһҫбһҹбһҖбһҳбҹ’бһҳбһҹбһ·бһ‘бҹ’бһ’бһ·бһҹбҹ’бһҡбһ”бһ…бҹ’бһ”бһ¶бһ”бҹӢбҹ”"},{"q":"бһўбһҸбһ·бһҗбһ·бһҮбһ“бһ“бһ·бһҷбһ¶бһҷбһҗбһ¶ 'бһҒбҹ’бһүбһ»бҹҶбһҸбҹ’бһҡбһјбһңбһҸбҹӮбһ‘бһ·бһүбһ“бҹ…бһҖбҹ’бһ“бһ»бһ„бһҹбһ”бҹ’бһҸбһ¶бһ бҹҚбһ“бҹҒбҹҮбҹ”' бһ“бҹҒбҹҮбһӮбһәбһҮбһ¶бҹ–","opts":["бһҹбһүбҹ’бһүбһ¶бһ‘бһ·бһүбһҷбҹүбһ¶бһ„бһҒбҹ’бһӣбһ¶бҹҶбһ„бһҖбҹ’бһӣбһ¶ вҖ” бһҸбҹ’бһҡбһјбһңбһ”бһ“бҹ’бһҸбһұбҹ’бһҷбһӣбһҝбһ“ бһ бһҫбһҷбһ”бһ·бһ‘бһҖбһ¶бһҡбһӣбһҖбҹӢ","бһҹбһүбҹ’бһүбһ¶бһ–бҹ’бһҡбһҳбһ¶бһ“ вҖ” бһ—бһ¶бһ–бһ”бһ“бҹ’бһ‘бһ¶бһ“бҹӢбһҠбҹӮбһӣбһҒбҹ’бһңбҹҮбһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“ бһӮбһәбһҮбһ¶бһҖбһ¶бһҡбһҹбһҳбҹ’бһҡбҹҒбһ…бһ…бһ·бһҸбҹ’бһҸбһҳбһ·бһ“бһ”бһ¶бһ“бһӣбҹ’бһў","бһҡбһҝбһ„бһ’бһҳбҹ’бһҳбһҸбһ¶ вҖ” бһўбҹ’бһ“бһҖбһңбһ·бһ“бһ·бһҷбҹ„бһӮбһ’бҹ’бһ„бһ“бҹӢбһ’бҹ’бһ„бһҡбһ—бһ¶бһӮбһ…бҹ’бһҡбһҫбһ“бһҹбһҳбҹ’бһҡбҹҒбһ…бһ…бһ·бһҸбҹ’бһҸбһӣбһҝбһ“","бһұбһҖбһ¶бһҹбһҠбһҫбһҳбҹ’бһ”бһёбһ”бһ„бҹ’бһ бһ¶бһүбһҹбҹ’бһҸбһ»бһҖбһўбһ…бһӣбһ“бһ‘бҹ’бһҡбһ–бҹ’бһҷбһҠбҹӮбһӣбһҳбһ¶бһ“бһ‘бһ¶бҹҶбһ„бһўбһҹбҹӢбһҮбһјбһ“бһ–бһҪбһҖбһӮбһ¶бһҸбҹӢ"],"correct":1,"explain":"'бһҒбҹ’бһүбһ»бҹҶбһҸбҹ’бһҡбһјбһңбһҸбҹӮбһ‘бһ·бһүбһ“бҹ…бһҖбҹ’бһ“бһ»бһ„бһҹбһ”бҹ’бһҸбһ¶бһ бҹҚбһ“бҹҒбҹҮ' бһҠбҹ„бһҷбһӮбҹ’бһҳбһ¶бһ“бһҖбһ¶бһҡбһңбһ¶бһҷбһҸбһҳбҹ’бһӣбҹғбһҹбҹ’бһңбҹӮбһ„бһҷбһӣбҹӢбһҸбҹ’бһҡбһ№бһҳбһҸбҹ’бһҡбһјбһң бһӮбһәбһҮбһ¶бһҹбһүбҹ’бһүбһ¶бһ–бҹ’бһҡбһҳбһ¶бһ“ бһҳбһ·бһ“бһҳбҹӮбһ“бһҮбһ¶бһҹбһүбҹ’бһүбһ¶бһ‘бһ·бһүбһЎбһҫбһҷбҹ” бһҸбҹ’бһҡбһјбһңбһ–бһ“бҹ’бһҷбһәбһҸбһ…бһ„бҹ’бһңбһ¶бһҖбҹӢ бһңбһ¶бһҷбһҸбһҳбҹ’бһӣбҹғбһұбҹ’бһҷбһ”бһ¶бһ“бһҸбҹ’бһҡбһ№бһҳбһҸбҹ’бһҡбһјбһң бһ“бһ·бһ„бһҖбһ¶бһҡбһ–бһ¶бһҡбһ‘бһ¶бҹҶбһ„бһўбһҸбһ·бһҗбһ·бһҮбһ“ бһ“бһ·бһ„ PHC бһ–бһёбһӣбһ‘бҹ’бһ’бһ•бһӣбһ”бҹ’бһҡбһүбһ¶бһ”бҹӢбһ”бҹ’бһҡбһүбһ¶бһӣбҹӢбһҠбҹӮбһӣбһҳбһ·бһ“бһӣбҹ’бһўбҹ”"}]}},
{id:8,week:2,title:"The Advisory Conversation Flow",short:"Advisory Flow",objectives:["Know the 5-stage PHC advisory conversation flow","Understand what to say at each stage вҖ” and what never to say","Be able to move through the flow naturally without it feeling scripted"],sections:[{label:"The Framework",heading:"Five stages вҖ” every client, every time",body:"Every PHC client conversation follows the same five stages. The content changes. The structure does not. This consistency is why clients trust PHC over informal agencies.",rules:[{title:"Stage 1 вҖ” Open",detail:"Welcome. Build comfort. Never sell in stage 1. Goal: the client feels at ease and speaks freely."},{title:"Stage 2 вҖ” Qualify",detail:"Run the 4-dimension qualification (goal, timeline, budget, risk). No project discussion yet. Goal: you understand their situation better than they do."},{title:"Stage 3 вҖ” Match",detail:"Present 2вҖ“3 options maximum. Justify each one. Never show everything. Goal: the client sees you as a filter вҖ” not a catalogue."},{title:"Stage 4 вҖ” Risk disclosure",detail:"Before asking about next steps вҖ” name every relevant risk. Exit liquidity. Yield reality. Developer track record. CGT. Goal: client feels informed, not sold to."},{title:"Stage 5 вҖ” Next step",detail:"Propose one clear next step. Site visit. SPA review. Meeting with Nick. Never leave a meeting without one agreed action. Goal: momentum, not pressure."}]},{label:"Language Principles",heading:"What PHC advisors say вҖ” and never say",body:"Words matter. These are the PHC language rules.",table:{headers:["Instead ofвҖҰ","SayвҖҰ"],rows:[["'Guaranteed returns'","'Based on current data, the net yield range is XвҖ“Y%'"],["'You should buy now'","'Based on your timeline, this window may be relevant'"],["'Only 2 units left'","Never use scarcity tactics вҖ” ever"],["'This will definitely go up'","'Historical price data shows X вҖ” future performance is not guaranteed'"],["'Don't worry about CGT'","'CGT applies вҖ” here is how it affects your scenario'"]]}}],roleplay:{scenario:"Running all 5 stages in sequence",instructions:"Full advisory conversation вҖ” 10 minutes. Practice moving through each stage naturally.",lines:[{role:"agent",text:'"Thank you for coming in. How did you first hear about us?"'},{role:"client",text:'"Your listing on Realestate.com.kh. I\'ve been looking for a few months."'},{role:"agent",text:'"Great. Can I ask вҖ” what\'s driving the decision right now? Investment income, somewhere to live, or both?"'},{role:"client",text:'"Investment. I want passive income."'},{role:"agent",text:'"Understood. What timeline are you working with, and roughly what range?"'},{role:"client",text:'"$150вҖ“200K. In the next 3 months ideally."'},{role:"agent",text:'"That\'s a workable range. Before I show you options вҖ” I want to make sure I name the risks upfront. Exit liquidity in Cambodia is improving but not liquid like Singapore. Rental income is real, but net yield is lower than gross advertised. CGT now applies to resale. For a buy-and-hold rental strategy, this market makes sense. For a quick flip вҖ” it doesn\'t. Does that framing work for you?"'},{role:"client",text:'"Yes вҖ” I\'m looking for long-term income. Not flipping."'},{role:"agent",text:'"Perfect. Then let me show you two options I\'d recommend for your profile specifically вҖ” and explain why."'},{role:"note",text:"Debrief: Did Stage 4 (risk disclosure) happen before Stage 3 (matching)? That is the PHC sequence."}],debrief:"Risk disclosure before project matching is the single biggest differentiator between PHC advisors and everyone else. Master this sequence."},quiz:[{q:"In the PHC advisory flow, when does risk disclosure happen?",opts:["At the end вҖ” after the client has expressed interest","Before showing any specific projects","Only if the client asks about it","After the client has agreed to a site visit"],correct:1,explain:"Risk disclosure comes before project matching. Always. This is the PHC sequence вҖ” and it is the most trust-building part of the entire framework."},{q:"A client asks 'what's the upside if prices go up?' You should:",opts:["Give an optimistic estimate based on BKK1 appreciation trends","Explain what historical data shows вҖ” then name the factors that could limit it","Redirect to rental yield instead вҖ” more reliable","Confirm BKK1 prices are up 3вҖ“5% and extrapolate"],correct:1,explain:"Name the upside and the downside. 'Historical data shows X вҖ” here are the factors that could limit or reverse that' is the balanced PHC answer."},{q:"The correct number of projects to present in Stage 3 is:",opts:["As many as possible вҖ” give the client choice","1 вҖ” make the decision easy","2вҖ“3 maximum вҖ” justified and matched to profile","5 вҖ” show the full relevant range"],correct:2,explain:"2вҖ“3 maximum, each justified. A long list signals you don't know the client's needs. A short, justified shortlist signals expertise and genuine matching."},{q:"What is the goal of Stage 5 (Next Step) in the PHC advisory flow?",opts:["Close the deal before the client changes their mind","Get a deposit paid to secure the unit","Agree one clear next action вҖ” momentum without pressure","Schedule a follow-up call within 48 hours"],correct:2,explain:"Stage 5 is about one agreed next action вҖ” site visit, SPA review, meeting with Nick. Never leave without it. The goal is momentum, never pressure."}],reflection:"Which of the 5 stages do you find most natural вҖ” and which will require the most practice for you personally?",km:{"title":"бһӣбҹҶбһ бһјбһҡбһ“бҹғбһҖбһ¶бһҡбһҹбһ“бҹ’бһ‘бһ“бһ¶бһ”бҹ’бһҡбһ№бһҖбҹ’бһҹбһ¶бһҷбҹ„бһ”бһӣбҹӢ","short":"бһӣбҹҶбһ бһјбһҡбһҖбһ¶бһҡбһ”бҹ’бһҡбһ№бһҖбҹ’бһҹбһ¶","objectives":["бһҹбҹ’бһӮбһ¶бһӣбҹӢбһҠбҹҶбһҺбһ¶бһҖбҹӢбһҖбһ¶бһӣбһ‘бһ¶бҹҶбһ„ бҹҘ бһ“бҹғбһӣбҹҶбһ бһјбһҡбһҖбһ¶бһҡбһҹбһ“бҹ’бһ‘бһ“бһ¶бһ”бҹ’бһҡбһ№бһҖбҹ’бһҹбһ¶бһҷбҹ„бһ”бһӣбҹӢбһҡбһ”бһҹбҹӢ PHC","бһҷбһӣбҹӢбһҠбһ№бһ„бһ–бһёбһўбҹ’бһңбһёбһҠбҹӮбһӣбһҸбҹ’бһҡбһјбһңбһ“бһ·бһҷбһ¶бһҷбһҖбҹ’бһ“бһ»бһ„бһҠбҹҶбһҺбһ¶бһҖбҹӢбһҖбһ¶бһӣбһ“бһёбһҳбһҪбһҷбҹ— вҖ” бһ“бһ·бһ„бһўбҹ’бһңбһёбһҠбҹӮбһӣбһҳбһ·бһ“бһҸбҹ’бһҡбһјбһңбһ“бһ·бһҷбһ¶бһҷбһҠбһ¶бһ…бҹӢбһҒбһ¶бһҸ","бһўбһ¶бһ…бһ”бҹ„бҹҮбһҮбҹҶбһ бһ¶бһ“бһҶбҹ’бһӣбһ„бһҖбһ¶бһҸбҹӢбһӣбҹҶбһ бһјбһҡбһ“бҹҒбҹҮбһҠбҹ„бһҷбһ’бһҳбҹ’бһҳбһҮбһ¶бһҸбһ· бһҠбҹ„бһҷбһҳбһ·бһ“бһ’бҹ’бһңбһҫбһұбҹ’бһҷбһҳбһ¶бһ“бһўбһ¶бһҡбһҳбҹ’бһҳбһҺбҹҚбһҗбһ¶бһ‘бһ“бҹ’бһ‘бҹҒбһүбһ…бһ¶бҹҶбһҳбһ¶бһҸбҹӢ"],"sections":[{"label":"бһҹбһҖбҹ’бһҡбһ”бһҒбҹҗбһҺбҹ’бһҢбһҖбһ¶бһҡбһ„бһ¶бһҡ","heading":"бһ”бҹ’бһҡбһ¶бҹҶбһҠбҹҶбһҺбһ¶бһҖбҹӢбһҖбһ¶бһӣ вҖ” бһўбһҸбһ·бһҗбһ·бһҮбһ“бһӮбҹ’бһҡбһ”бҹӢбһҡбһјбһ” бһӮбҹ’бһҡбһ”бҹӢбһ–бҹҒбһӣбһңбҹҒбһӣбһ¶","body":"бһҡбһ¶бһӣбҹӢбһҖбһ¶бһҡбһҹбһ“бҹ’бһ‘бһ“бһ¶бһҮбһ¶бһҳбһҪбһҷбһўбһҸбһ·бһҗбһ·бһҮбһ“бһҡбһ”бһҹбҹӢ PHC бһҸбҹӮбһ„бһҸбҹӮбһҠбһҫбһҡбһҸбһ¶бһҳбһҠбҹҶбһҺбһ¶бһҖбҹӢбһҖбһ¶бһӣбһ‘бһ¶бҹҶбһ„бһ”бҹ’бһҡбһ¶бҹҶбһҠбһјбһ…бҹ—бһӮбҹ’бһ“бһ¶бҹ” бһҒбҹ’бһӣбһ№бһҳбһҹбһ¶бһҡбһўбһ¶бһ…бһ•бҹ’бһӣбһ¶бһҹбҹӢбһ”бҹ’бһҸбһјбһҡ бһ”бҹүбһ»бһ“бҹ’бһҸбҹӮбһҡбһ…бһ“бһ¶бһҹбһҳбҹ’бһ–бҹҗбһ“бҹ’бһ’бһҳбһ·бһ“бһ•бҹ’бһӣбһ¶бһҹбҹӢбһ”бҹ’бһҸбһјбһҡбһЎбһҫбһҷбҹ” бһ—бһ¶бһ–бһҹбҹҠбһёбһҹбһ„бҹ’бһңбһ¶бһҖбҹӢбһӮбҹ’бһ“бһ¶бһ“бҹҒбҹҮбһ бһҫбһҷбһҠбҹӮбһӣбһ’бҹ’бһңбһҫбһұбҹ’бһҷбһўбһҸбһ·бһҗбһ·бһҮбһ“бһ‘бһ»бһҖбһ…бһ·бһҸбҹ’бһҸ PHC бһҮбһ¶бһ„бһ—бҹ’бһ“бһ¶бһҖбҹӢбһ„бһ¶бһҡбһҠбҹӮбһӣбһӮбҹ’бһҳбһ¶бһ“бһ”бҹ’бһҡбһ–бҹҗбһ“бҹ’бһ’бһ…бҹ’бһ”бһ¶бһҹбҹӢбһӣбһ¶бһҹбҹӢбҹ”","rules":[{"title":"бһҠбҹҶбһҺбһ¶бһҖбҹӢбһҖбһ¶бһӣбһ‘бһё бҹЎ вҖ” бһҖбһ¶бһҡбһ”бһҫбһҖбһҶбһ¶бһҖ (Open)","detail":"бһҹбҹ’бһңбһ¶бһӮбһҳбһ“бҹҚбҹ” бһ”бһ„бҹ’бһҖбһҫбһҸбһ—бһ¶бһ–бһҹбҹ’бһ“бһ·бһ‘бҹ’бһ’бһҹбҹ’бһ“бһ¶бһӣ бһ“бһ·бһ„бһ•бһ¶бһҹбһ»бһҖбһ—бһ¶бһ–бҹ” бһҳбһ·бһ“бһҸбҹ’бһҡбһјбһңбһӣбһҖбҹӢбһ“бҹ…бһҖбҹ’бһ“бһ»бһ„бһҠбҹҶбһҺбһ¶бһҖбҹӢбһҖбһ¶бһӣбһ‘бһё бҹЎ бһЎбһҫбһҷбҹ” бһӮбҹ„бһӣбһҠбҹ…бҹ– бһўбһҸбһ·бһҗбһ·бһҮбһ“бһҳбһ¶бһ“бһўбһ¶бһҡбһҳбҹ’бһҳбһҺбҹҚбһ’бһјбһҡбһҹбҹ’бһҡбһ¶бһӣ бһ“бһ·бһ„бһ“бһ·бһҷбһ¶бһҷбһ”бһ¶бһ“бһҠбҹ„бһҷбһҹбҹҒбһҡбһёбҹ”"},{"title":"бһҠбҹҶбһҺбһ¶бһҖбҹӢбһҖбһ¶бһӣбһ‘бһё бҹў вҖ” бһҖбһ¶бһҡбһңбһ¶бһҷбһҸбһҳбҹ’бһӣбҹғбһҹбҹ’бһңбҹӮбһ„бһҷбһӣбҹӢ (Qualify)","detail":"бһҠбҹҶбһҺбһҫбһҡбһҖбһ¶бһҡбһҖбһ¶бһҡбһңбһ¶бһҷбһҸбһҳбҹ’бһӣбҹғбһӣбһҫбһңбһ·бһҳбһ¶бһҸбҹ’бһҡбһ‘бһ¶бҹҶбһ„ бҹӨ (бһӮбҹ„бһӣбһҠбҹ…, бһҖбһ¶бһӣб бһҡбһңбһ·бһ“бһ·бһҷбҹ„бһӮбҹ” бһҒбҹ’бһүбһ»бҹҶбһ…бһ„бҹӢбһ”бһ¶бһ“бһ…бҹҶбһҺбһјбһӣбһўбһҖбһҳбҹ’бһҳ (Passive income)бҹ”\""},{"role":"agent","text":"\"бһҷбһӣбҹӢбһ…бҹ’бһ”бһ¶бһҹбҹӢбһҺбһ¶бһҹбҹӢбһ”бһ„бҹ” бһҸбһҫбһҖбһ¶бһӣбһңбһ·бһ—бһ¶бһӮбһ–бҹҒбһӣбһңбҹҒбһӣбһ¶бһ”бҹӮбһ”бһҺбһ¶бһҠбҹӮбһӣбһ”бһ„бһҖбҹҶбһ–бһ»бһ„бһҡбҹҖбһ”бһ…бҹҶ бһ бһҫбһҷбһҸбһҫбһ”бҹ’бһҡбһ бҹӮбһӣбһҮбһ¶бһ…бһ“бҹ’бһӣбҹ„бҹҮбһҗбһңбһ·бһҖбһ¶бһ”бҹүбһ»бһ“бҹ’бһҳбһ¶бһ“бһҠбҹӮбһҡ?\""},{"role":"client","text":"\"$150вҖ“200Kбҹ” бһ”бҹ’бһҡбһҹбһ·бһ“бһ”бһҫбһўбһ¶бһ… бһҖбҹ’бһ“бһ»бһ„бһҡбһ„бҹ’бһңбһ„бҹӢ бҹЈ бһҒбҹӮбһҒбһ¶бһ„бһҳбһ»бһҒбҹ”\""},{"role":"agent","text":"\"бһ“бҹ„бҹҮбһҮбһ¶бһ…бһ“бҹ’бһӣбҹ„бҹҮбһҗбһңбһ·бһҖбһ¶бһҠбҹӮбһӣбһўбһ¶бһ…бһ’бҹ’бһңбһҫбһҖбһ¶бһҡбһ”бһ¶бһ“бҹ” бһҳбһ»бһ“бһ–бҹҒбһӣбһҒбҹ’бһүбһ»бҹҶбһ”бһ„бҹ’бһ бһ¶бһүбһҮбһҳбҹ’бһҡбһҫбһҹбһҮбһјбһ“бһ”бһ„ вҖ” бһҒбҹ’бһүбһ»бҹҶбһ…бһ„бҹӢбһ”бҹ’бһҡбһ¶бһҖбһҠбһҗбһ¶бһҒбҹ’бһүбһ»бҹҶбһ”бһ¶бһ“бһҮбһҳбҹ’бһҡбһ¶бһ”бһҮбһјбһ“бһ–бһёбһ бһ¶бһ“бһ·бһ—бҹҗбһҷбһҮбһ¶бһҳбһ»бһ“бһҹбһ·бһ“бҹ” бһҹбһ—бһ¶бһ–бһҹбһ¶бһ…бҹӢбһ”бҹ’бһҡбһ¶бһҖбҹӢбһ“бҹғбһҖбһ¶бһҡбһӣбһҖбҹӢбһ…бҹҒбһү (Exit liquidity) бһ“бҹ…бһҖбһҳбҹ’бһ–бһ»бһҮбһ¶бһҖбҹҶбһ–бһ»бһ„бһҸбҹӮбһӣбҹ’бһўбһ”бҹ’бһҡбһҹбһҫбһҡ бһ”бҹүбһ»бһ“бҹ’бһҸбҹӮбһҳбһ·бһ“бһ‘бһ¶бһ“бҹӢбһҳбһ¶бһ“бһҹбһ—бһ¶бһ–бһҡбһ бҹҗбһҹбһҠбһјбһ…бһҹбһ·бһ„бҹ’бһ бһ”бһ»бһҡбһёбһ“бҹ„бҹҮбһ‘бҹҒбҹ” бһ…бҹҶбһҺбһјбһӣбһ–бһёбһҖбһ¶бһҡбһҮбһҪбһӣбһӮбһәбһҮбһ¶бһҡбһҝбһ„бһ–бһ·бһҸ бһ”бҹүбһ»бһ“бҹ’бһҸбҹӮбһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһ»бһ‘бҹ’бһ’бһӮбһәбһ‘бһ¶бһ”бһҮбһ¶бһ„бһўбҹ’бһңбһёбһҠбҹӮбһӣбһ•бҹ’бһҹбһ–бҹ’бһңбһ•бҹ’бһҹбһ¶бһҷбҹ” CGT бһҘбһЎбһјбһңбһ“бҹҒбҹҮбһҸбҹ’бһҡбһјбһңбһўбһ“бһ»бһңбһҸбҹ’бһҸбһӣбһҫбһҖбһ¶бһҡбһӣбһҖбҹӢбһ”бһ“бҹ’бһҸбҹ” бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҷбһ»бһ‘бҹ’бһ’бһҹбһ¶бһҹбҹ’бһҸбҹ’бһҡбһ‘бһ·бһүбһ‘бһ»бһҖбһҮбһҪбһӣ бһ‘бһёбһ•бҹ’бһҹбһ¶бһҡбһ“бҹҒбҹҮбһӮбһәбһҹбһҳбһ бҹҒбһҸбһ»бһ•бһӣбһҺбһ¶бһҹбҹӢбҹ” бһ”бҹүбһ»бһ“бҹ’бһҸбҹӮбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҷбһ»бһ‘бҹ’бһ’бһҹбһ¶бһҹбҹ’бһҸбҹ’бһҡбһ‘бһ·бһүбһӣбһҖбҹӢбһҷбһҖбһ…бҹҶбһҺбҹҒбһүбһҡбһ бҹҗбһҹ (Quick flip) вҖ” бһӮбһәбһҳбһ·бһ“бһҹбһҳбһҹбҹ’бһҡбһ”бһ‘бҹҒбҹ” бһҸбһҫбһҖбһ¶бһҡбһҖбҹҶбһҺбһҸбҹӢбһҖбҹ’бһҡбһ”бһҒбҹҗбһҺбҹ’бһҢбһ”бҹӮбһ”бһ“бҹҒбҹҮбһҹбһҳбһҹбҹ’бһҡбһ”бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһ”бһ„бһҠбҹӮбһҡбһ¬бһ‘бҹҒ?\""},{"role":"client","text":"\"бһ”бһ¶бһ‘ вҖ” бһҒбҹ’бһүбһ»бҹҶбһҖбҹҶбһ–бһ»бһ„бһҹбҹ’бһңбҹӮбһ„бһҡбһҖбһ…бҹҶбһҺбһјбһӣбһҡбһҷбҹҲбһ–бҹҒбһӣбһңбҹӮбһ„бҹ” бһҳбһ·бһ“бһҳбҹӮбһ“бһ‘бһ·бһүбһӣбһҖбҹӢбһ—бҹ’бһӣбһ¶бһҳбҹ—бһ‘бҹҒбҹ”\""},{"role":"agent","text":"\"бһӣбҹ’бһўбһҘбһҸбһҒбҹ’бһ…бҹ„бҹҮбҹ” бһўбҹҠбһёбһ…бһ№бһ„бһўбһ“бһ»бһүбҹ’бһүбһ¶бһҸбһұбҹ’бһҷбһҒбҹ’бһүбһ»бҹҶбһ”бһ„бҹ’бһ бһ¶бһүбһҮбһҳбҹ’бһҡбһҫбһҹбһ–бһёбһҡбһҠбҹӮбһӣбһҒбҹ’бһүбһ»бҹҶбһҺбҹӮбһ“бһ¶бҹҶбһҮбһ¶бһ–бһ·бһҹбҹҒбһҹбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ·бһҡбһјбһ”бһҡбһ”бһҹбҹӢбһ”бһ„ вҖ” бһ бһҫбһҷбһ–бһ“бҹ’бһҷбһӣбҹӢбһ–бһёбһ бҹҒбһҸбһ»бһ•бһӣбҹ”\""},{"role":"note","text":"бһҖбһ¶бһҡбһ”бһјбһҖбһҹбһҡбһ»бһ”бһҹбһ„бҹ’бһҒбҹҒбһ”бҹ– бһҸбһҫбһҠбҹҶбһҺбһ¶бһҖбҹӢбһҖбһ¶бһӣбһ‘бһё бҹӨ (бһҖбһ¶бһҡбһ‘бһҳбҹ’бһӣбһ¶бһҷбһ бһ¶бһ“бһ·бһ—бҹҗбһҷ) бһ”бһ¶бһ“бһҖбһҫбһҸбһЎбһҫбһ„бһҳбһ»бһ“бһҠбҹҶбһҺбһ¶бһҖбҹӢбһҖбһ¶бһӣбһ‘бһё бҹЈ (бһҖбһ¶бһҡбһ•бҹ’бһӮбһјбһ•бҹ’бһӮбһ„) бһҠбҹӮбһҡбһ¬бһ‘бҹҒ? бһ“бҹ„бҹҮбһ бһҫбһҷбһҮбһ¶бһӣбҹҶбһҠбһ¶бһ”бҹӢбһӣбҹҶбһҠбҹ„бһҷбһҡбһ”бһҹбҹӢ PHCбҹ”"}],"debrief":"бһҖбһ¶бһҡбһ‘бһҳбҹ’бһӣбһ¶бһҷбһ бһ¶бһ“бһ·бһ—бҹҗбһҷбһҳбһ»бһ“бһ–бҹҒбһӣбһ•бҹ’бһӮбһјбһ•бҹ’бһӮбһ„бһӮбһҳбҹ’бһҡбҹ„бһ„ бһӮбһәбһҮбһ¶бһ…бҹҶбһҺбһ»бһ…бһҒбһ»бһҹбһ”бҹ’бһӣбҹӮбһҖбһҠбҹҸбһ’бҹҶбһ”бҹҶбһ•бһ»бһҸбһҸбҹӮбһҳбһҪбһҷбһӮбһҸбҹӢбһҡбһңбһ¶бһ„бһ‘бһёбһ”бҹ’бһҡбһ№бһҖбҹ’бһҹбһ¶бһҡбһ”бһҹбҹӢ PHC бһ“бһ·бһ„бһўбҹ’бһ“бһҖбһҠбһ‘бҹғбҹ” бһҸбҹ’бһҡбһјбһңбһ…бһ¶бһҸбҹӢбһҖбһ¶бһҡбһӣбҹҶбһҠбһ¶бһ”бҹӢбһӣбҹҶбһҠбҹ„бһҷбһ“бҹҒбҹҮбһұбҹ’бһҷбһ”бһ¶бһ“бһҹбҹ’бһ‘бһ¶бһҸбҹӢбһҮбҹҶбһ“бһ¶бһүбҹ”"},"quiz":[{"q":"бһ“бҹ…бһҖбҹ’бһ“бһ»бһ„бһӣбҹҶбһ бһјбһҡбһҖбһ¶бһҡбһ”бҹ’бһҡбһ№бһҖбҹ’бһҹбһ¶бһҷбҹ„бһ”бһӣбҹӢбһҡбһ”бһҹбҹӢ PHC бһҸбһҫбһҖбһ¶бһҡбһ‘бһҳбҹ’бһӣбһ¶бһҷбһ бһ¶бһ“бһ·бһ—бҹҗбһҷбһҖбһҫбһҸбһЎбһҫбһ„бһ“бҹ…бһ–бҹҒбһӣбһҺбһ¶?","opts":["бһ“бҹ…бһ…бһ»бһ„бһ”бһүбҹ’бһ…бһ”бҹӢ вҖ” бһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ–бһёбһўбһҸбһ·бһҗбһ·бһҮбһ“бһ”бһ¶бһ“бһ”бһ„бҹ’бһ бһ¶бһүбһҖбһ¶бһҡбһ…бһ¶бһ”бҹӢбһўбһ¶бһҡбһҳбҹ’бһҳбһҺбҹҚ","бһҳбһ»бһ“бһ–бҹҒбһӣбһ”бһ„бҹ’бһ бһ¶бһүбһӮбһҳбҹ’бһҡбҹ„бһ„бһҮбһ¶бһҖбҹӢбһӣбһ¶бһҖбҹӢбһҺбһ¶бһҳбһҪбһҷ","бһӣбһ»бҹҮбһҸбҹ’бһҡбһ¶бһҸбҹӮбһўбһҸбһ·бһҗбһ·бһҮбһ“бһҹбһҪбһҡбһ“бһ¶бҹҶбһўбҹҶбһ–бһёбһңбһ¶"," {id:9,week:2,title:"Language & Communication Standards",short:"Language Standards",objectives:["Know PHC's exact language rules for yields, guarantees, and risk","Understand how tone differs by client segment","Be able to adjust your communication style without changing your standards"],sections:[{label:"Yield Language",heading:"Gross vs net вҖ” always clarify",body:"Yield is the number clients care about most вҖ” and the one most commonly misrepresented. PHC's rule is absolute: always present net yield. Gross yield means nothing to the client's actual income.",box:{title:"PHC yield language standard:",lines:["Always say: 'Net yield after management fees and vacancy'","Never say: 'Guaranteed X%' вҖ” Cambodia does not guarantee yields","Always range: '6.5вҖ“7.5% net based on current data' вҖ” never a single number","Always disclose: management fees, vacancy assumptions, CGT on exit"]},warning:"Quoting gross yield without clarifying it is gross is a misrepresentation. If a developer gives you a gross figure, convert and clarify before passing it to any client."},{label:"Segment Tone Guide",heading:"Same standards, different language",body:"PHC's standards never change. But the way we communicate them must adapt to each client's cultural and professional background.",table:{headers:["Segment","Tone","Language emphasis"],rows:[["Japanese investors","Formal, structured, unhurried","Risk first, data with evidence, written follow-up always"],["German/European","Logical, precise, no emotional language","ROI, downside protection, legal clarity"],["Overseas Cambodians","Warm, clear, family framing","Safety, community, developer reputation"],["Local Khmer","Warm, respectful, community-focused","Comfort, status, payment flexibility"],["Russian/Chinese investors","Direct, yield-focused, practical","Yield data, management quality, exit options"]]}}],roleplay:{scenario:"Adapting tone without changing standards",instructions:"Agent plays the same content вҖ” but adjusts tone for a Japanese investor vs a German investor.",lines:[{role:"note",text:"Round 1 вҖ” Japanese investor (formal, risk-first)"},{role:"agent",text:'"Nakamura-san, before I share the project details, I would like to walk through the risk profile first. In Cambodia, exit liquidity is improving but still limited compared to Japan. Rental income is real, but subject to vacancy and management quality. I want to make sure you have a complete picture before we discuss any specific investment."'},{role:"note",text:"Round 2 вҖ” German investor (logical, ROI-focused)"},{role:"agent",text:'"Before I share the numbers, let me give you the complete picture вҖ” including the downside. Net yield in BKK1 is 7.8вҖ“8.7% based on current data. Exit liquidity is improving. CGT applies to resale. For a long-term hold strategy, this market performs. For anything under 5 years вҖ” the numbers change significantly."'},{role:"note",text:"Debrief: Same standards. Different delivery. What changed вҖ” and why?"}],debrief:"The Japanese client needs to feel safe before hearing numbers. The German client needs the numbers to be precise and complete. Neither gets a sales pitch. Both get the same honest standard."},quiz:[{q:"A developer tells you a project yields 9.5%. You should present this to clients as:",opts:["9.5% вҖ” you have the developer's word","'Up to 9.5% depending on occupancy'","Convert to estimated net yield (after fees and vacancy), state it as a range, and flag the source","9.5% gross вҖ” clarify it's before costs"],correct:2,explain:"Convert to net. State it as a range. Flag that it's based on developer projections, not verified historical data. That is the PHC standard."},{q:"A Japanese investor asks about yield. You should:",opts:["Lead with the return data вҖ” they want to see numbers first","Lead with risk disclosure first, then present net yield data with evidence","Give a range and let them ask follow-up questions","Match the developer's advertised gross yield"],correct:1,explain:"Japanese clients need to feel safe before hearing returns. Risk first, then data, then evidence. Never lead with upside for Japanese investors."},{q:"'This will definitely appreciate in value' is:",opts:["Fine to say if you believe it","Acceptable if BKK1 data supports it","Never acceptable вҖ” no PHC advisor uses guaranteed future value language","OK for Khmer end-users who need reassurance"],correct:2,explain:"Never acceptable. Future value is never guaranteed. This phrase creates legal and reputational risk. 'Historical data shows X вҖ” future performance is not guaranteed' is the only acceptable framing."},{q:"A German investor asks you to compare two projects. Your response should emphasise:",opts:["Which developer has a better marketing reputation","ROI, downside protection, and legal clarity вҖ” in precise, logical terms","Emotional appeal вҖ” community, lifestyle, long-term happiness","Developer nationality as the primary trust signal"],correct:1,explain:"German/European buyers are analytical and logic-driven. Lead with ROI, downside scenarios, and legal structure. Avoid emotional language entirely вҖ” it signals an unprepared advisor."}],reflection:"Write the exact words you would use to explain net yield to a Japanese investor who has never owned property outside Japan.",km:{"title":"бһҹбҹ’бһҸбһ„бҹӢбһҠбһ¶бһҡбһ—бһ¶бһҹбһ¶ бһ“бһ·бһ„бһҖбһ¶бһҡбһ‘бҹҶбһ“бһ¶бһҖбҹӢбһ‘бҹҶбһ“бһ„","short":"бһҹбҹ’бһҸбһ„бҹӢбһҠбһ¶бһҡбһ—бһ¶бһҹбһ¶","objectives":["бһҹбҹ’бһӮбһ¶бһӣбҹӢбһңбһ·бһ’бһ¶бһ“бһ—бһ¶бһҹбһ¶бһ…бҹ’бһ”бһ¶бһҹбҹӢбһӣбһ¶бһҹбҹӢбһҡбһ”бһҹбҹӢ PHC бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһ•бһӣбһ…бҹҶбһҺбҹҒбһү бһҖбһ¶бһҡбһ’бһ¶бһ“бһ¶ бһ“бһ·бһ„бһ бһ¶бһ“бһ·бһ—бҹҗбһҷ","бһҷбһӣбҹӢбһҠбһ№бһ„бһ–бһёбһҡбһ”бҹҖбһ”бһҠбҹӮбһӣбһҸбһ»бһ„бһҹбҹҶбһЎбҹҒбһ„бһҒбһ»бһҹбһӮбҹ’бһ“бһ¶бһҸбһ¶бһҳбһ•бҹ’бһ“бҹӮбһҖбһўбһҸбһ·бһҗбһ·бһҮбһ“бһ“бһёбһҳбһҪбһҷбҹ—","бһўбһ¶бһ…бһҖбҹӮбһҹбһҳбҹ’бһҡбһҪбһӣбһҡбһ…бһ“бһ¶бһ”бҹҗбһ‘бҹ’бһҳбһ“бҹғбһҖбһ¶бһҡбһ‘бҹҶбһ“бһ¶бһҖбҹӢбһ‘бҹҶбһ“бһ„бһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖ бһҠбҹ„бһҷбһҳбһ·бһ“бһ•бҹ’бһӣбһ¶бһҹбҹӢбһ”бҹ’бһҸбһјбһҡбһҹбҹ’бһҸб t":"\"бһӣбҹ„бһҖ Nakamura бһҳбһ»бһ“бһ–бҹҒбһӣбһҒбҹ’бһүбһ»бҹҶбһ…бҹӮбһҖбһҡбҹҶбһӣбҹӮбһҖбһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бһӣбһҳбҹ’бһўбһ·бһҸбһ“бҹғбһӮбһҳбҹ’бһҡбҹ„бһ„ бһҒбҹ’бһүбһ»бҹҶбһҹбһјбһҳбһҡбҹҖбһ”бһҡбһ¶бһ”бҹӢбһўбҹҶбһ–бһёбһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ·бһ бһ¶бһ“бһ·бһ—бҹҗбһҷбһҮбһ¶бһҳбһ»бһ“бһҹбһ·бһ“бҹ” бһ“бҹ…бһҖбһҳбҹ’бһ–бһ»бһҮбһ¶ бһҹбһ—бһ¶бһ–бһҹбһ¶бһ…бҹӢбһ”бҹ’бһҡбһ¶бһҖбҹӢбһ“бҹғбһҖбһ¶бһҡбһӣбһҖбҹӢбһ…бҹҒбһү (Exit liquidity) бһҖбҹҶбһ–бһ»бһ„бһҸбҹӮбһҖбһҫбһ“бһЎбһҫбһ„ бһ”бҹүбһ»бһ“бҹ’бһҸбҹӮбһ“бҹ…бһҸбҹӮбһҳбһ¶бһ“бһҖбһҳбҹ’бһҡбһ·бһҸбһ”бһҫбһ’бҹҖбһ”бһ“бһ№бһ„бһ”бҹ’бһҡбһ‘бҹҒбһҹбһҮбһ”бҹүбһ»бһ“бҹ” бһ…бҹҶбһҺбһјбһӣбһ–бһёбһҖбһ¶бһҡбһҮбһҪбһӣбһӮбһәбһҮбһ¶бһҡбһҝбһ„бһ–бһ·бһҸ бһ”бҹүбһ»бһ“бҹ’бһҸбҹӮбһңбһ¶бһўбһ¶бһҹбҹ’бһҡбҹҗбһҷбһӣбһҫбһўбһҸбҹ’бһҡбһ¶бһҷбһјбһ“бһёбһҸбһ‘бҹҶбһ“бҹҒбһҡ бһ“бһ·бһ„бһӮбһ»бһҺбһ—бһ¶бһ–бһ“бҹғбһҖбһ¶бһҡбһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһҡбһ„бҹ” бһҒбҹ’бһүбһ»бҹҶбһ…бһ„бҹӢбһ”бҹ’бһҡбһ¶бһҖбһҠбһҗбһ¶бһӣбҹ„бһҖбһҳбһ¶бһ“бһҡбһјбһ”бһ—бһ¶бһ–бһ–бҹҒбһүбһӣбҹҒбһү бһҳбһ»бһ“бһ–бҹҒбһӣбһҷбһҫбһ„бһ–бһ·бһ—бһ¶бһҖбҹ’бһҹбһ¶бһўбҹҶбһ–бһёбһҖбһ¶бһҡбһңбһ·бһ“бһ·бһҷбҹ„бһӮбһҮбһ¶бһҖбҹӢбһӣбһ¶бһҖбҹӢбһҺбһ¶бһҳбһҪбһҷбҹ”\""},{"role":"note","text":"бһҮбһ»бҹҶбһ‘бһё бҹў вҖ” бһўбҹ’бһ“бһҖбһңбһ·бһ“бһ·бһҷбҹ„бһӮбһўбһ¶бһӣбҹ’бһӣбһәбһҳбҹүбһ„бҹӢ (бһҳбһ¶бһ“бһ бҹҒбһҸбһ»бһ•бһӣ, бһ•бҹ’бһҸбҹ„бһҸбһӣбһҫ ROI)"},{"role":"agent","text":"\"бһҳбһ»бһ“бһ–бҹҒбһӣбһҒбҹ’бһүбһ»бҹҶбһ…бҹӮбһҖбһҡбҹҶбһӣбҹӮбһҖбһҸбһҪбһӣбҹҒбһҒ бһўбһ“бһ»бһүбҹ’бһүбһ¶бһҸбһұбҹ’бһҷбһҒбҹ’бһүбһ»бҹҶбһ•бҹ’бһҸбһӣбҹӢбһҡбһјбһ”бһ—бһ¶бһ–бһ–бҹҒбһүбһӣбҹҒбһүбһҮбһјбһ“бһӣбҹ„бһҖ вҖ” бһҡбһ¶бһ”бҹӢбһ”бһүбҹ’бһ…бһјбһӣбһ‘бһ¶бҹҶбһ„бһ бһ¶бһ“бһ·бһ—бҹҗбһҷбһўбһңбһ·бһҮбҹ’бһҮбһҳбһ¶бһ“бҹ” бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһ»бһ‘бҹ’бһ’бһ“бҹ… BKK1 бһӮбһә 7.8вҖ“8.7% бһ•бҹ’бһўбҹӮбһҖбһӣбһҫбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһ”бһ…бҹ’бһ…бһ»бһ”бҹ’бһ”бһ“бҹ’бһ“бҹ” бһҹбһ—бһ¶бһ–бһҹбһ¶бһ…бҹӢбһ”бҹ’бһҡбһ¶бһҖбҹӢбһ“бҹғбһҖбһ¶бһҡбһӣбһҖбҹӢбһ…бҹҒбһүбһҖбҹҶбһ–бһ»бһ„бһҸбҹӮбһӣбҹ’бһўбһ”бҹ’бһҡбһҹбһҫбһҡбҹ” CGT бһҸбҹ’бһҡбһјбһңбһўбһ“бһ»бһңбһҸбҹ’бһҸбһӣбһҫбһҖбһ¶бһҡбһӣбһҖбҹӢбһ”бһ“бҹ’бһҸбҹ” бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҷбһ»бһ‘бҹ’бһ’бһҹбһ¶бһҹбҹ’бһҸбҹ’бһҡбһҖбһ¶бһ“бҹӢбһҖбһ¶бһ”бҹӢбһҡбһҷбҹҲбһ–бҹҒбһӣбһңбҹӮбһ„ бһ‘бһёб  бһҖбҹ’бһ“бһ»бһ„бһ“бҹҗбһҷбһ…бҹ’бһ”бһ¶бһҹбҹӢбһӣбһ¶бһҹбҹӢ бһ“бһ·бһ„бһҳбһ¶бһ“бһ бҹҒбһҸбһ»бһ•бһӣ","бһҖбһ¶бһҡбһ‘бһ¶бһҖбҹӢбһ‘бһ¶бһүбһ•бҹ’бһӣбһјбһңбһўбһ¶бһҡбһҳбҹ’бһҳбһҺбҹҚ вҖ” бһҹбһ бһӮбһҳбһ“бҹҚ бһҡбһ”бҹҖбһ”бһҡбһҹбҹӢбһ“бҹ… бһҹбһ»бһ—бһҳбһ„бҹ’бһӮбһӣбһҡбһҷбҹҲбһ–бҹҒбһӣбһңбҹӮбһ„","бһҹбһүбҹ’бһҮбһ¶бһҸбһ·бһ“бҹғбһҖбҹ’бһҡбһ»бһҳбһ бҹҠбһ»бһ“бһўбһ—бһ·бһңбһҢбҹ’бһҚбһ“бҹҚбһҮбһ¶бһҹбһүбҹ’бһүбһ¶бһ‘бҹҶбһ“бһ»бһҖбһ…бһ·бһҸбҹ’бһҸбһ…бһҳбҹ’бһ”бһ„"],"correct":1,"explain":"бһўбҹ’бһ“бһҖбһ‘бһ·бһүбһҮбһ¶бһҸбһ·бһўбһ¶бһӣбҹ’бһӣбһәбһҳбҹүбһ„бҹӢ/бһўбһәбһҡбҹүбһ»бһ” бһӮбһәбһҮбһ¶бһҳбһ“бһ»бһҹбҹ’бһҹбһ…бһјбһӣбһ…бһ·бһҸбҹ’бһҸбһңбһ·бһ—бһ¶бһӮ бһ“бһ·бһ„бһҠбһ№бһҖбһ“бһ¶бҹҶбһҠбҹ„бһҷбһ бҹҒбһҸбһ»бһ•бһӣбҹ” бһҸбҹ’бһҡбһјбһңбһ…бһ¶бһ”бҹӢбһ•бҹ’бһҸбһҫбһҳбһҠбҹ„бһҷ ROI бһҖбһҡбһҺбһёбһ бһ¶бһ“бһ·бһ—бҹҗбһҷбһўбһңбһ·бһҮбҹ’бһҮбһҳбһ¶бһ“ бһ“бһ·бһ„бһҡбһ…бһ“бһ¶бһҹбһҳбҹ’бһ–бҹҗбһ“бҹ’бһ’бһ•бҹ’бһӣбһјбһңбһ…бҹ’бһ”бһ¶бһ”бҹӢбҹ” бһ…бҹҖбһҹбһңбһ¶бһ„бһ—бһ¶бһҹбһ¶бһўбһјбһҹбһ‘бһ¶бһүбһўбһ¶бһҡбһҳбҹ’бһҳбһҺбҹҚбһ‘бһ¶бҹҶбһ„бһҹбҹ’бһҡбһ»бһ„ вҖ” бһңбһ¶бһ”бһ„бҹ’бһ бһ¶бһүбһ–бһёбһ‘бһёбһ”бҹ’бһҡбһ№бһҖбҹ’бһҹбһ¶бһҠбҹӮбһӣбһҒбҹ’бһңбҹҮбһҖбһ¶бһҡбһҸбҹ’бһҡбҹҖбһҳбһҒбҹ’бһӣбһҪбһ“бҹ”"}]}},
{id:10,week:2,title:"Reading Client Signals",short:"Reading Signals",objectives:["Recognise the difference between buying signals and stall signals","Know how to respond to hesitation without pressuring","Know when to re-qualify a client who has gone cold"],sections:[{label:"Buying Signals",heading:"When a client is ready вҖ” what it looks like",body:"Buying signals are rarely obvious. Most clients don't say 'I'm ready to buy.' They show it. Learning to read these signals is one of the most important advisory skills.",box:{title:"Common buying signals:",lines:["Asking about payment schedule or deposit amount","Asking about specific floors or unit numbers","Bringing a partner or family member to a meeting","Asking about handover timeline or furniture packages","Requesting the SPA or legal documentation"]}},{label:"Stall Signals",heading:"Hesitation vs disinterest вҖ” know the difference",body:"A client who stalls is not always a lost client. But treating stall signals as buying signals вҖ” or pushing through them вҖ” destroys trust.",rules:[{title:"'I need to think about it'",detail:"This is information, not a setback. Ask: 'Of course вҖ” what specifically would you want to think through? I want to make sure you have everything you need.'"},{title:"'I'll decide after I visit'",detail:"A positive signal. Facilitate the site visit immediately. Don't let momentum die."},{title:"'I'm looking at other options'",detail:"Expected. Ask: 'What are you comparing us to? That helps me give you the most honest comparison.' Never dismiss competitors."},{title:"'My advisor / accountant needs to review'",detail:"A serious buying signal from a careful buyer. Offer PHC legal documentation immediately and facilitate the review."},{title:"Silence for more than 7 days",detail:"Re-qualify. Send a check-in that offers new information вҖ” not pressure. 'I wanted to share an update on X project вҖ” does it change anything for you?'"}]}],roleplay:{scenario:"Client stalls after a strong first meeting",instructions:"Practice responding to hesitation with curiosity вҖ” not pressure.",lines:[{role:"client",text:'"I liked what I saw. I just need more time to think."'},{role:"agent",text:'"Of course. Can I ask вҖ” is there a specific part of the decision you\'d like more time on? I want to make sure you\'re not waiting on information I could give you now."'},{role:"client",text:'"It\'s mainly the developer. I haven\'t heard of Megakim before."'},{role:"agent",text:'"That\'s completely fair. Let me send you the project delivery record вҖ” 7 completed projects, handover data, and client reviews. Would it also help to speak with a current unit owner?"'},{role:"client",text:'"That would actually be very helpful."'},{role:"note",text:"Debrief: Did the Agent respond to hesitation with a question вҖ” not a push?"}],debrief:"Curiosity over pressure. Every stall signal contains a piece of information. Find it вҖ” don't override it."},quiz:[{q:"A client asks 'which floor would you recommend?' This is:",opts:["A neutral question requiring a standard answer","A buying signal вҖ” they are starting to picture ownership","A stall вҖ” they are avoiding commitment","An objection about pricing"],correct:1,explain:"Specific floor/unit questions are among the clearest buying signals. The client is starting to picture ownership. Respond thoughtfully вҖ” don't treat it as a logistics question."},{q:"A client has not responded for 10 days. You should:",opts:["Send a follow-up saying the price is going up soon","Send a check-in with a relevant update вҖ” not pressure","Mark them as lost and move on","Call daily until they respond"],correct:1,explain:"After a quiet period, re-engage with information, not pressure. 'I wanted to share an update on X' is the PHC approach. Never use artificial urgency."},{q:"A client says 'my accountant needs to review the documents.' You should:",opts:["Ask them to decide before involving their accountant","Provide PHC legal documentation and facilitate the review immediately","Explain that most clients don't use accountants for this type of purchase","Follow up after a week to check if the review is done"],correct:1,explain:"This is a serious buying signal from a careful investor. The correct response is to facilitate вҖ” not slow down. Provide documentation immediately."},{q:"A client says 'I'm looking at other options.' The PHC response is:",opts:["Offer a discount to keep their attention","Dismiss the competition вҖ” our projects are clearly better","Ask what they are comparing and offer an honest side-by-side view","Remind them that good units sell quickly"],correct:2,explain:"Never dismiss competitors. Ask what they're comparing вҖ” this gives you information and demonstrates confidence. An advisor who welcomes comparison builds more trust than one who avoids it."}],reflection:"Think about a client who went cold. Looking back вҖ” what signal were they giving, and what could you have done differently?",km:{"title":"бһҖбһ¶бһҡбһҳбһҫбһӣбһҠбһ№бһ„бһ–бһёбһҹбһүбҹ’бһүбһ¶бһҡбһ”бһҹбҹӢбһўбһҸбһ·бһҗбһ·бһҮбһ“","short":"бһҖбһ¶бһҡбһҳбһҫбһӣбһҹбһүбҹ’бһүбһ¶","objectives":["бһ‘бһ‘бһҪбһӣбһҹбҹ’бһӮбһ¶бһӣбҹӢбһ—бһ¶бһ–бһҒбһ»бһҹбһӮбҹ’бһ“бһ¶бһҡбһңбһ¶бһ„бһҹбһүбҹ’бһүбһ¶бһ‘бһ·бһү бһ“бһ·бһ„бһҹбһүбҹ’бһүбһ¶бһҹбҹ’бһ‘бһ¶бһҖбҹӢбһҹбҹ’бһ‘бһҫбһҡ","бһҠбһ№бһ„бһ–бһёбһҡбһ”бҹҖбһ”бһҶбҹ’бһӣбһҫбһҷбһҸбһ”бһ‘бҹ…бһ“бһ№бһ„бһҖбһ¶бһҡбһҹбҹ’бһ‘бһ¶бһҖбҹӢбһҹбҹ’бһ‘бһҫбһҡбһҠбҹ„бһҷбһҳбһ·бһ“бһ”бһ„бҹ’бһҖбһҫбһҸбһҹбһҳбҹ’бһ–бһ¶бһ’","бһҠбһ№бһ„бһҗбһ¶бһ“бҹ…бһ–бҹҒбһӣбһҺбһ¶бһҸбҹ’бһҡбһјбһңбһңбһ¶бһҷбһҸбһҳбҹ’бһӣбҹғбһўбһҸбһ·бһҗбһ·бһҮбһ“бһЎбһҫбһ„бһңбһ·бһү бһҠбҹӮбһӣбһ”бһ¶бһ“бһҹбҹ’бһ„бһ¶бһҸбҹӢбһ”бһ¶бһҸбҹӢбһҠбҹҶбһҺбһ№бһ„"],"sections":[{"label":"бһҹбһүбҹ’бһүбһ¶бһ‘бһ·бһү","heading":"бһ“бҹ…бһ–бҹҒбһӣбһўбһҸбһ·бһҗбһ·бһҮбһ“бһҸбҹ’бһҡбҹҖбһҳбһҒбҹ’бһӣбһҪбһ“бһҡбһҪбһ…бһҡбһ¶бһӣбҹӢ вҖ” бһҸбһҫбһңбһ¶бһҳбһ¶бһ“бһҡбһјбһ”бһҡбһ¶бһ„бһҷбҹүбһ¶бһ„бһҺбһ¶","body":"бһҹбһүбҹ’бһүбһ¶бһ‘бһ·бһүбһҖбһҳбҹ’бһҡбһ“бһ№бһ„бһ”бһ„бҹ’бһ бһ¶бһүбһҳбһҖбһ…бҹ’бһ”бһ¶бһҹбҹӢбҹ—бһҺбһ¶бһҹбҹӢбҹ” бһўбһҸбһ·бһҗбһ·бһҮбһ“бһ—бһ¶бһӮбһ…бҹ’бһҡбһҫбһ“бһ ҳбҹ’бһ–бһ¶бһ’бһЎбһҫбһҷбҹ” 'бһҒбҹ’бһүбһ»бҹҶбһ…бһ„бҹӢбһ…бҹӮбһҖбһҡбҹҶбһӣбҹӮбһҖбһ”бһ…бҹ’бһ…бһ»бһ”бҹ’бһ”бһ“бҹ’бһ“бһ—бһ¶бһ–бһӣбһҫбһӮбһҳбҹ’бһҡбҹ„бһ„ X вҖ” бһҸбһҫбһңбһ¶бһҳбһ¶бһ“бһҖбһ¶бһҡбһ•бҹ’бһӣбһ¶бһҹбҹӢбһ”бҹ’бһҸбһјбһҡбһўбҹ’бһңбһёбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһ”бһ„бһҠбҹӮбһҡбһ¬бһ‘бҹҒ?'"}]}],"reflection":"бһӮбһ·бһҸбһўбҹҶбһ–бһёбһўбһҸбһ·бһҗбһ·бһҮбһ“бһҳбҹ’бһ“бһ¶бһҖбҹӢбһҠбҹӮбһӣбһ”бһ¶бһ“бһҹбҹ’бһ„бһ¶бһҸбҹӢбһ”бһ¶бһҸбҹӢбһҠбҹҶбһҺбһ№бһ„бҹ” бһ–бҹҒбһӣбһҖбҹ’бһҡбһЎбҹҒбһҖбһҳбһҫбһӣбһ‘бҹ…бһҖбҹ’бһҡбҹ„бһҷ вҖ” бһҸбһҫбһҹбһүбҹ’бһүбһ¶бһўбҹ’бһңбһёбһҠбҹӮбһӣбһ–бһҪбһҖбһӮбһ¶бһҸбҹӢбһ”бһ¶бһ“бһ”бһ„бҹ’бһ бһ¶бһү бһ бһҫбһҷбһҸбһҫбһўбҹ’бһ“бһҖбһўбһ¶бһ…бһ’бҹ’бһңбһҫбһўбҹ’бһңбһёбһҒбһ»бһҹбһ–бһёбһҳбһ»бһ“бһ”бһ¶бһ“бһҒбҹ’бһӣбҹҮ?","roleplay":{"scenario":"бһўбһҸбһ·бһҗбһ·бһҮбһ“бһҹбҹ’бһ‘бһ¶бһҖбҹӢбһҹбҹ’бһ‘бҹҗбһҡбһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ–бһёбһҮбҹҶбһ“бһҪбһ”бһҠбҹҶбһ”бһјбһ„бһҠбҹҸбһӣбҹ’бһў","instructions":"бһўбһ“бһ»бһңбһҸбҹ’бһҸбһҖбһ¶бһҡбһҶбҹ’бһӣбһҫбһҷбһҸбһ”бһ‘бҹ…бһ“бһ№бһ„бһҖбһ¶бһҡбһҹбҹ’бһ‘бһ¶бһҖбҹӢбһҹбҹ’бһ‘бһҫбһҡбһҠбҹ„бһҷбһҖбһ¶бһҡбһ…бһ„бҹӢбһҠбһ№бһ„бһ…бһ„бҹӢбһғбһҫбһү вҖ” бһҳбһ·бһ“бһҳбҹӮбһ“бһҹбһҳбҹ’бһ–бһ¶бһ’бһЎбһҫбһҷбҹ”","lines":[{"role":"client","text":"\"бһҒбҹ’бһүбһ»бҹҶбһ…бһјбһӣбһ…бһ·бһҸбҹ’бһҸбһўбҹ’бһңбһёбһҠбҹӮбһӣбһҒбҹ’бһүбһ»бҹҶбһ”бһ¶бһ“бһғбһҫбһүбҹ” бһҒбҹ’бһүбһ»бҹҶбһӮбҹ’бһҡбһ¶бһ“бҹӢбһҸбҹӮбһҸбҹ’бһҡбһјбһңбһҖбһ¶бһҡбһ–бҹҒбһӣбһ”бһ“бҹ’бһҗбҹӮбһҳбһ‘бҹҖбһҸбһҠбһҫбһҳбҹ’бһ”бһёбһӮбһ·бһҸбҹ”\""},{"role":"agent","text":"\"бһ–бһ·бһҸбһҺбһ¶бһҹбҹӢбһ”бһ„бҹ” бһҸбһҫбһҒбҹ’бһүбһ»бҹҶбһўбһ¶бһ…бһҹбһҪбһҡбһ”бһ“бҹ’бһҸбһ·бһ…бһ”бһ¶бһ“бһ‘бҹҒбһҗбһ¶ вҖ” бһҸбһҫбһҳбһ¶бһ“бһ•бҹ’бһ“бҹӮбһҖбһҮбһ¶бһҖбҹӢбһӣбһ¶бһҖбҹӢбһҺбһ¶бһҳбһҪбһҷбһ“бҹғбһҖбһ¶бһҡбһҹбһҳбҹ’бһҡбҹҒбһ…бһ…бһ·бһҸбҹ’бһҸбһҠбҹӮбһӣбһ”бһ„бһ…бһ„бҹӢбһ”бһ¶бһ“бһ–бҹҒбһӣбһ”бһ“бҹ’бһҗбҹӮбһҳбһҠбҹӮбһҡбһ¬бһ‘бҹҒ? бһҒбҹ’бһүбһ»бҹҶбһ…бһ„бҹӢбһ”бҹ’бһҡбһ¶бһҖбһҠбһҗбһ¶бһ”бһ„бһҳбһ·бһ“бһҖбҹҶбһ–бһ»бһ„бһҡбһ„бҹӢбһ…бһ¶бҹҶбһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бһҠбҹӮбһӣбһҒбҹ’бһүбһ»бҹҶбһўбһ¶бһ…бһ•бҹ’бһҸбһӣбҹӢбһҮбһјбһ“бһ”бһ„бһ“бһ¶бһ–бҹҒбһӣбһ“бҹҒбҹҮбһ”бһ¶бһ“бҹ”\""},{"role":"client","text":"\"бһҮбһ¶бһҹбҹҶбһҒбһ¶бһ“бҹӢбһӮбһәбһҖбҹ’бһҡбһ»бһҳбһ бҹҠбһ»бһ“бһўбһ—бһ·бһңбһҢбҹ’бһҚбһ“бҹҚб һ„бһ…бҹ’бһ”бһ¶бһҹбҹӢбһҺбһ¶бһҹбҹӢ","бһҹбһҪбһҡбһ–бһёбһўбҹ’бһңбһёбһҠбҹӮбһӣбһ–бһҪбһҖбһӮбһ¶бһҸбҹӢбһҖбҹҶбһ–бһ»бһ„бһ”бҹ’бһҡбҹҖбһ”бһ’бҹҖбһ” бһ“бһ·бһ„бһ•бҹ’бһҸбһӣбҹӢбһҖбһ¶бһҡбһҳбһҫбһӣбһғбһҫбһүбһ‘бһ“бҹ’бһ‘бһ№бһҳбһӮбҹ’бһ“бһ¶бһҠбҹ„бһҷбһҹбҹ’бһҳбҹ„бҹҮбһҸбҹ’бһҡбһ„бҹӢ","бһҡбҹҶбһӣбһ№бһҖбһ–бһҪбһҖбһӮбһ¶бһҸбҹӢбһҗбһ¶бһҷбһјбһ“бһёбһҸбһӣбҹ’бһўбҹ—бһӣбһҖбҹӢбһҠбһ¶бһ…бҹӢбһӣбһҝбһ“бһҺбһ¶бһҹбҹӢ"],"correct":2,"explain":"бһҳбһ·бһ“бһҸбҹ’бһҡбһјбһңбһ”бһ„бҹ’бһўбһ¶бһ”бҹӢбһҠбҹғбһӮбһјбһ”бҹ’бһҡбһҖбһҪбһҸбһ”бҹ’бһҡбһҮбҹӮбһ„бһЎбһҫбһҷбҹ” бһҹбһҪбһҡбһ–бһёбһўбҹ’бһңбһёбһҠбҹӮбһӣбһ–бһҪбһҖбһӮбһ¶бһҸбҹӢбһҖбҹҶбһ–бһ»бһ„бһ”бҹ’бһҡбҹҖбһ”бһ’бҹҖбһ” вҖ” бһ“бҹҒбҹҮбһ•бҹ’бһҸбһӣбҹӢбһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бһҠбһӣбҹӢбһўбҹ’бһ“бһҖ бһ“бһ·бһ„бһ”бһ„бҹ’бһ бһ¶бһүбһ–бһёбһ‘бҹҶбһ“бһ»бһҖбһ…бһ·бһҸбҹ’бһҸбҹ” бһ‘бһёбһ”бҹ’бһҡбһ№бһҖбҹ’бһҹбһ¶бһҠбҹӮбһӣбһҹбҹ’бһңбһ¶бһӮбһҳбһ“бҹҚбһҖбһ¶бһҡбһ”бҹ’бһҡбҹҖбһ”бһ’бҹҖбһ” бһ”бһ„бҹ’бһҖбһҫбһҸбһ‘бҹҶбһ“бһ»бһҖбһ…бһ·бһҸбҹ’бһҸбһ”бһ¶бһ“бһ…бҹ’бһҡбһҫбһ“бһҮбһ¶бһ„бһўбҹ’бһ“бһҖбһҠбҹӮбһӣбһ…бҹҖбһҹбһңбһ¶бһ„бһңбһ¶бҹ”"}]}},
{id:11,week:3,title:"Yield, ROI & Cost of Ownership",short:"Yield & ROI",objectives:["Calculate gross and net yield accurately for any unit","Explain the full cost of ownership вҖ” buying, holding, and selling","Walk a client through a realistic ROI scenario using verified data"],sections:[{label:"Gross vs Net Yield",heading:"The number that matters is net",body:"Most developers advertise gross yield. Gross yield means nothing to the investor's actual income. Net yield is what lands in the bank. The difference is significant вҖ” and misrepresenting it is a credibility risk. PHC always presents net.",box:{title:"The net yield calculation:",lines:["Gross yield = annual rent Г· purchase price Г— 100","Net yield = (annual rent вҲ’ management fees вҲ’ vacancy вҲ’ taxes) Г· purchase price Г— 100","Average deductions: management fee ~$1.8/sqm/month + ~10% vacancy + 14% rental tax (foreigner)","Rule of thumb: net is typically 1.5вҖ“2.5% lower than gross in Cambodia"]},warning:"Never quote gross yield without labelling it as gross. Always convert to net before presenting to any client. A developer quoting 9% gross may mean 6.5вҖ“7% net. Know the difference."},{label:"Full Cost of Ownership",heading:"What the investor actually pays",body:"The headline purchase price is only part of the equation. Every serious investor will ask about total in and total out. Know every cost вҖ” if you miss one, you lose credibility.",table:{headers:["Cost item","Rate","On $150K unit"],rows:[["Booking deposit","$500вҖ“$2,000","One-time, refundable terms vary"],["Downpayment","20вҖ“30% of price","$30KвҖ“$45K on signing"],["Transfer tax (stamp duty)","4% of value","$6,000 (exemptions may apply)"],["Legal / SPA review","0.5вҖ“1% of value","$750вҖ“$1,500"],["Furniture & fit-out","Varies","$5KвҖ“$15K typical"],["Annual property tax (TOIP)","0.1% above $25K","~$125/yr on $150K"],["Building management","$1вҖ“$2/sqm/month","$53вҖ“$106/month (53sqm unit)"],["Rental income tax","14% of gross (foreigner)","On $800/month = $112/month"],["CGT on exit (20% on gain)","20% of taxable profit","Varies by gain and holding period"]]}},{label:"Verified ROI вҖ” J Tower 2",heading:"Real numbers from a real transaction",body:"This case study is documented in the REAKH Investment & Market Analysis Condominium Report 2025. It is the most credible ROI reference available for PHC agents. Use it as data вҖ” never as a promise.",rules:[{title:"The verified 5-year result",detail:"Purchased 2019 for $139,755 + $8K furniture. Handed over 2022. Rented at $1,200/month gross ($1,083 net at 90% occupancy). Resold 2024 for $175,000. Total return: $50,637. Average per year: 6.85%. Total ROI: 34.27%."},{title:"The 8-year and 10-year projections",detail:"REAKH projects: 8-year hold = 58% total ROI (7.25%/yr). 10-year hold = 77.23% total ROI (7.72%/yr). These are projections, not verified results. Present them as such."},{title:"How to use this with clients",detail:"'Here is a real verified transaction from our partner REAKH. This is what actually happened вҖ” not what was promised.' Then show the numbers. Let the data do the work."}]}],roleplay:{scenario:"A client asks what kind of return they can realistically expect",instructions:"Practice presenting ROI with precision вҖ” not enthusiasm. Lead with costs before returns.",lines:[{role:"client",text:'"I\'m looking at a $150,000 unit in BKK1. What kind of return can I expect?"'},{role:"agent",text:'"Let me give you the full picture вҖ” starting with costs, then income, then what the data shows on exit."'},{role:"client",text:'"Sure."'},{role:"agent",text:'"All-in, a $150K unit typically costs $155вҖ“$160K including transfer tax and legal fees. A 1-bedroom in BKK1 rents for around $800/month gross. After management fees and rental tax, you\'re net around $650вҖ“$670/month вҖ” roughly $7,800вҖ“$8,000/year. That\'s 5вҖ“5.5% net yield on your total investment."'},{role:"client",text:'"That\'s lower than I expected."'},{role:"agent",text:'"It\'s honest. Some agencies will quote you 8 or 9% gross вҖ” that\'s before costs. On a completed, well-managed BKK1 unit, 5вҖ“7% net is a realistic long-term range. The strongest verified data point we have вҖ” from our partner REAKH on J Tower 2 вҖ” shows 6.85% per year average over 5 years, combining rental income and capital appreciation."'},{role:"note",text:"Debrief: Did the Agent lead with costs before returns? Was the yield figure presented as net, not gross?"}],debrief:"The agent who presents the full cost picture first вҖ” including the deductions вҖ” is the one the client will trust when it matters. Never lead with the headline return."},quiz:[{q:"A developer advertises 9% rental yield. Before presenting this to a client, you should:",opts:["Use the 9% figure вҖ” the developer confirmed it","Convert to an estimated net yield range, label the source, and note it is gross","Round it down to 8% to be conservative","Only use it if the developer provides it in writing"],correct:1,explain:"Always convert developer yield claims to an estimated net figure. Gross yield excludes management fees, vacancy, and rental tax вҖ” the costs the investor actually bears. Presenting gross as-is is a misrepresentation."},{q:"On a $150,000 condo purchase, the one-time transfer tax (stamp duty) is approximately:",opts:["$750","$3,000","$6,000","$15,000"],correct:2,explain:"Transfer tax is 4% of the assessed property value. On $150,000 that is $6,000 вҖ” a significant one-time cost that must be disclosed upfront. Note that stamp duty exemptions may apply for properties under $70K or $210K depending on buyer profile."},{q:"The J Tower 2 REAKH case study shows what verified total ROI over 5 years?",opts:["18.5%","27.3%","34.27%","52%"],correct:2,explain:"34.27% total ROI over 5 years (2019вҖ“2024) вҖ” averaging 6.85% per year. This combines $23,392 in net rental income and $27,245 in capital appreciation on a $147,755 total investment."},{q:"Net yield for a foreign investor on a BKK1 1-bedroom unit at $800/month rent is closest to:",opts:["8% вҖ” matches gross advertised rates","6.5вҖ“7% вҖ” after removing all costs","5вҖ“5.5% вҖ” after management, vacancy, and 14% rental tax","3% вҖ” market is too competitive"],correct:2,explain:"After deducting management fees (~$1.8/sqm/month), ~10% vacancy, and 14% rental income tax for foreign non-residents, net yield on a typical BKK1 1BR drops to approximately 5вҖ“5.5% on total investment cost. This is the honest number."}],reflection:"Walk through the full cost of ownership on a $150,000 BKK1 unit from reservation to resale. What is the total cash out вҖ” and what is the realistic net return over 7 years?",km:{"title":"бһўбһҸбҹ’бһҡбһ¶бһ•бһӣбһ…бҹҶбһҺбҹҒбһү (Yield), ROI бһ“бһ·бһ„бһҗбҹ’бһӣбҹғбһ…бҹҶбһҺбһ¶бһҷбһӣбһҫбһҖбһҳбҹ’бһҳбһҹбһ·бһ‘бҹ’бһ’бһ·","short":"Yield & ROI","objectives":["бһӮбһҺбһ“бһ¶бһўбһҸбҹ’бһҡбһ¶бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһҡбһ»бһ” (Gross Yield) бһ“бһ·бһ„бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһ»бһ‘бҹ’бһ’ (Net Yield) бһұбҹ’бһҷбһ”бһ¶бһ“бһҸбҹ’бһҡбһ№бһҳбһҸбҹ’бһҡбһјбһңбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһӮбҹ’бһҡбһ”бҹӢбһҷбһјбһ“бһёбһҸ","бһ–бһ“бҹ’бһҷбһӣбҹӢбһ–бһёбһҗбҹ’бһӣбҹғбһ…бҹҶбһҺбһ¶бһҷбһҹбһҡбһ»бһ”бһӣбһҫбһҖбһҳбҹ’бһҳбһҹбһ·бһ‘бҹ’бһ’бһ· вҖ” бһҖбһ¶бһҡбһ‘бһ·бһү бһҖбһ¶бһҡбһҖбһ¶бһ“бҹӢбһҖбһ¶бһ”бҹӢ бһ“бһ·бһ„бһҖбһ¶бһҡбһӣбһҖбҹӢбһ…бҹҒбһү","бһ“бһ¶бҹҶбһўбһҸбһ·бһҗбһ·бһҮбһ“бһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһҳбһҫбһӣбһҹбҹҒбһ“бһ¶бһҡбһёбһҷбҹүбһј ROI бһ–бһ·бһҸбһ”бҹ’бһҡбһ¶бһҖбһҠбһҠбҹ„бһҷбһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһҠбҹӮбһӣбһ”бһ¶бһ“бһ•бҹ’бһ‘бҹҖбһ„бһ•бҹ’бһ‘бһ¶бһҸбҹӢ"],"sections":[{"label":"бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһҡбһ»бһ” бһ’бҹҖбһ”бһ“бһ№бһ„ бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһ»бһ‘бҹ’бһ’","heading":"бһҸбһҪбһӣбҹҒбһҒбһҠбҹӮбһӣбһҳбһ¶бһ“бһ“бҹҗбһҷбһ–бһ·бһҸбһ”бҹ’бһҡбһ¶бһҖбһҠ бһӮбһәбһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһ»бһ‘бҹ’бһ’","body":"бһҖбҹ’бһҡбһ»бһҳбһ бҹҠбһ»бһ“бһўбһ—бһ·бһңбһҢбҹ’бһҚбһ“бҹҚбһ—бһ¶бһӮбһ…бҹ’бһҡбһҫбһ“бһ•бҹ’бһҹбһ–бҹ’бһңбһ•бҹ’бһҹбһ¶бһҷбһ–бһёбһўбһҸбҹ’бһҡбһ¶бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһҡбһ»бһ” (Gross Yield)бҹ” бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһҡбһ»бһ”бһӮбҹ’бһҳбһ¶бһ“бһ“бҹҗбһҷбһўбҹ’бһңбһёбһЎбһҫбһҷбһ…бҹҶбһ–бҹ„бҹҮбһ”бҹ’бһҡбһ¶бһҖбҹӢбһ…бҹҶбһҺбһјбһӣбһ–бһ·бһҸбһ”бҹ’бһҡбһ¶бһҖбһҠбһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖбһңбһ·бһ“бһ·бһҷбҹ„бһӮбҹ” бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһ»бһ‘бҹ’бһ’ (Net Yield) бһӮбһәбһҮбһ¶бһўбҹ’бһңбһёбһҠбҹӮбһӣбһ’бҹ’бһӣбһ¶бһҖбҹӢбһ…бһјбһӣбһҖбҹ’бһ“бһ»бһ„бһҖбһ»бһ„бһ’бһ“бһ¶бһӮбһ¶бһҡбҹ” бһ—бһ¶бһ–бһҒбһ»бһҹбһӮбҹ’бһ“бһ¶бһҡбһңбһ¶бһ„бһҸбһҪбһӣбҹҒбһҒбһ‘бһ¶бҹҶбһ„бһ–бһёбһҡбһ“бҹҒбҹҮбһӮбһәбһҳбһ¶бһ“бһ‘бҹҶбһ бҹҶбһ’бҹҶ вҖ” бһ бһҫбһҷбһҖбһ¶бһҡбһ”бһ“бҹ’бһӣбҹҶбһ—бҹ’бһ“бҹӮбһҖбһӣбһҫбһҸбһҪбһӣбҹҒбһҒбһ“бҹҒбҹҮ бһӮбһәбһҮбһ¶бһ бһ¶бһ“бһ·бһ—бҹҗбһҷбһ”бҹҶбһ•бҹ’бһӣбһ¶бһүбһ—бһ¶бһ–бһӮбһҪбһҡбһұбҹ’бһҷбһҮбһҝбһҮбһ¶бһҖбҹӢбҹ” PHC бһҸбҹӮбһ„бһҸбҹӮбһ”бһ„бҹ’бһ бһ¶бһүбһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһ»бһ‘бҹ’бһ’бһҮбһ¶бһ“бһ·бһ…бҹ’бһ…бҹ”","box":{"title":"бһҡбһјбһ”бһҳбһ“бҹ’бһҸбһӮбһҺбһ“бһ¶бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһ»бһ‘бҹ’бһ’бҹ–","lines":["бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһҡбһ»бһ” (Gross yield) = бһҗбҹ’бһӣбҹғбһҮбһҪбһӣбһ”бҹ’бһҡбһ…бһ¶бҹҶбһҶбҹ’бһ“бһ¶бҹҶ Г· бһҸбһҳбҹ’бһӣбҹғбһ‘бһ·бһү Г— 100","бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһ»бһ‘бҹ’бһ’ (Net yield) = (бһҗбҹ’бһӣбҹғбһҮбһҪбһӣбһ”бҹ’бһҡбһ…бһ¶бҹҶбһҶбҹ’бһ“бһ¶бҹҶ вҲ’ бһҗбҹ’бһӣбҹғбһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһҡбһ„ вҲ’ бһўбһҸбҹ’бһҡбһ¶бһҷбһјбһ“бһёбһҸбһ‘бҹҶбһ“бҹҒбһҡ вҲ’ бһ–бһ“бҹ’бһ’) Г· бһҸбһҳбҹ’бһӣбҹғбһ‘бһ·бһү Г— 100","бһҖбһ¶бһҡбһҖбһ¶бһҸбҹӢбһҖбһҖбҹҒбһҡбһ”бҹ’бһҡбһ…бһ¶бҹҶбһҳбһ’бҹ’бһҷбһҳбҹ– бһҗбҹ’бһӣбҹғбһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһҡбһ„ ~$1.8/sqm/бһҒбҹӮ + ~10% бһўбһҸбҹ’бһҡбһ¶бһҷбһјбһ“бһёбһҸбһ‘бҹҶбһ“бҹҒбһҡ + бһ–бһ“бҹ’бһ’бһӣбһҫбһ”бҹ’бһҡбһ¶бһҖбҹӢбһ…бҹҶбһҺбһјбһӣбһ–бһёбһҖбһ¶бһҡбһҮбһҪбһӣ 14% (бһҮбһ“бһ”бһҡбһ‘бҹҒбһҹ)","бһңбһ·бһ’бһ¶бһ“бһҮбһ¶бһ‘бһјбһ‘бҹ…бҹ– бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһ»бһ‘бҹ’бһ’бһҮбһ¶бһ‘бһјбһ‘бҹ…бһ‘бһ¶бһ”бһҮбһ¶бһ„бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһҡбһ»бһ”бһ–бһё 1.5вҖ“2.5% бһ“бҹ…бһҖбһҳбҹ’бһ–бһ»бһҮбһ¶"]},"warning":"бһҳбһ·бһ“бһҸбҹ’бһҡбһјбһңбһҮбһҳбҹ’бһҡбһ¶бһ”бһ–бһёбһўбһҸбҹ’бһҡбһ¶бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһҡбһ»бһ”бһҠбҹ„бһҷбһҳбһ·бһ“бһ”бһ¶бһ“бһ”бһүбҹ’бһҮбһ¶бһҖбҹӢбһҗбһ¶бһңбһ¶бһҮбһ¶бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһҡбһ»бһ”бһЎбһҫбһҷбҹ” бһҸбҹ’бһҡбһјбһңбһ”бҹҶбһ”бҹ’бһӣбҹӮбһ„бһ‘бҹ…бһҮбһ¶бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһ»бһ‘бҹ’бһ’бһҮбһ¶бһ“бһ·бһ…бҹ’б һ”бһ”бһ„бҹ’бһ бһ¶бһүбһ–бһёбһўбҹ’бһңбһёбһҠбҹӮбһӣбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһ”бһ„бҹ’бһ бһ¶бһүбһ“бҹ…бһ–бҹҒбһӣбһӣбһҖбҹӢбһ…бҹҒбһүбҹ”\""},{"role":"client","text":"\"бһ”бһ¶бһ‘ бһӣбҹ’бһўбһҸбһ¶бһҹбҹ”\""},{"role":"agent","text":"\"бһҮбһ¶бһҹбһҡбһ»бһ” бһҷбһјбһ“бһёбһҸбһҸбһҳбҹ’бһӣбҹғ $150K бһҮбһ¶бһ‘бһјбһ‘бҹ…бһ…бҹҶбһҺбһ¶бһҷбһўбһҹбҹӢбһ”бҹ’бһҡбһҳбһ¶бһҺ $155вҖ“$160K бһҠбҹ„бһҷбһҡбһ¶бһ”бҹӢбһ”бһүбҹ’бһ…бһјбһӣбһ‘бһ¶бҹҶбһ„бһ–бһ“бҹ’бһ’бһ”бҹ’бһҡбһ‘бһ¶бһҖбҹӢбһҖбҹ’бһҡбһЎбһ¶ бһ“бһ·бһ„бһҹбҹҒбһңбһ¶бһ•бҹ’бһӣбһјбһңбһ…бҹ’бһ”бһ¶бһ”бҹӢбҹ” бһҷбһјбһ“бһёбһҸбһ”бһ“бҹ’бһ‘бһ”бҹӢбһӮбҹҒбһ„ бҹЎ бһ“бҹ… BKK1 бһўбһ¶бһ…бһҮбһҪбһӣбһ”бһ¶бһ“бһ”бҹ’бһҡбһ бҹӮбһӣ $800/бһҒбҹӮ бһҹбһҡбһ»бһ”бҹ” бһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ–бһёбһҠбһҖбһҗбҹ’бһӣбҹғбһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһҡбһ„ бһ“бһ·бһ„бһ–бһ“бҹ’бһ’бһӣбһҫбһҖбһ¶бһҡбһҮбһҪбһӣ бһ”бһ„бһ“бһ№бһ„бһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бһ”бҹ’бһҡбһ¶бһҖбҹӢбһҹбһ»бһ‘бҹ’бһ’бһ”бҹ’бһҡбһ бҹӮбһӣ $650вҖ“$670/бһҒбҹӮ вҖ” бһҸбҹ’бһҡбһјбһңбһҮбһ¶бһҡбһ„бҹ’бһңбһ„бҹӢ $7,800вҖ“$8,000/бһҶбҹ’бһ“бһ¶бҹҶбҹ” бһ“бҹ„бҹҮбһҸбҹ’бһҡбһјбһңбһҮбһ¶бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһ»бһ‘бҹ’бһ’ 5вҖ“5.5% бһӣбһҫбһҖбһ¶бһҡбһңбһ·бһ“бһ·бһҷбҹ„бһӮбһҹбһҡбһ»бһ”бһҡбһ”бһҹбҹӢбһ”бһ„бҹ”\""},{"role":"client","text":"\"бһҸбһҪбһӣбҹҒбһҒбһ бҹ’бһ“бһ№бһ„бһ‘бһ¶бһ”бһҮбһ¶бһ„бһўбҹ’бһңбһёбһҠбҹӮбһӣбһҒбҹ’бһүбһ»бҹҶбһ”бһ¶бһ“бһҡбҹҶбһ–бһ№бһ„бһ‘бһ»бһҖбҹ”\""},{"role":"agent","text":"\"бһңбһ¶бһҮбһ¶бһҸбһҪбһӣбҹҒбһҒбһҹбҹ’бһҳбҹ„бҹҮбһҸбҹ’бһҡбһ„бҹӢбһ”бһ„бҹ” бһ—бҹ’бһ“бһ¶бһҖбҹӢбһ„бһ¶бһҡбһҳбһҪбһҷбһ…бҹҶбһ“бһҪбһ“бһ“бһ№бһ„бһ”бҹ’бһҡбһ¶бһ”бҹӢбһ”бһ„бһҗбһ¶ 8 бһ¬ 9% бһҹбһҡбһ»бһ” вҖ” бһ”бҹүбһ»бһ“бҹ’бһҸбҹӮбһҸбһҪбһӣбҹҒбһҒбһ“бҹ„бҹҮбһӮбһәбһҳбһ»бһ“бһ–бҹҒбһӣбһҠбһҖбһ…бҹҶбһҺбһ¶бһҷбҹ” бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҷбһјбһ“бһёбһҸбһҠбҹӮбһӣбһҹбһ¶бһ„бһҹбһ„бҹӢбһҡбһҪбһ… бһ“бһ·бһ„бһҳбһ¶бһ“бһҖбһ¶бһҡбһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһҡбһ„бһӣбҹ’бһўбһ“бҹ… BKK1 бһ…бһ“бҹ’бһӣбҹ„бҹҮбһ–бһё 5вҖ“7% бһҹбһ»бһ‘бҹ’бһ’ бһӮбһәбһҮбһ¶бһ…бһ“бҹ’бһӣбҹ„бҹҮбһ–бһ·бһҸбһ”бҹ’бһҡбһ¶бһҖбһҠбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҡбһҷбҹҲбһ–бҹҒбһӣбһңбҹӮбһ„бҹ” бһ…бҹҶбһҺбһ»бһ…бһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһҠбҹӮбһӣбһ”бһ¶бһ“бһ•бҹ’бһ‘бҹҖбһ„бһ•бҹ’бһ‘бһ¶бһҸбҹӢбһҡбһ№бһ„бһҳбһ¶бҹҶбһ”бҹҶбһ•бһ»бһҸбһҠбҹӮбһӣбһҷбһҫбһ„бһҳбһ¶бһ“ вҖ” бһ–бһёбһҠбҹғбһӮбһјбһҡбһ”бһҹбҹӢбһҷбһҫбһ„ REAKH бһӣбһҫбһӮбһҳбҹ’бһҡбҹ„бһ„ J Tower 2 вҖ” бһ”бһ„бҹ’бһ бһ¶бһүбһ–бһёбһҳбһ’бҹ’бһҷбһҳбһ—бһ¶бһӮ 6.85% бһҖбҹ’бһ“бһ»бһ„бһҳбһҪбһҷбһҶбҹ’бһ“бһ¶бҹҶ бһҖбҹ’бһ“бһ»бһ„бһҡбһҷбҹҲбһ–бҹҒбһӣ бҹҘ бһҶбҹ’бһ“бһ¶бҹҶ бһҠбҹ„бһҷбһ”бһјбһҖбһ”бһүбҹ’бһ…бһјбһӣбһӮбҹ’бһ“бһ¶бһҡбһңбһ¶бһ„бһ”бҹ’бһҡбһ¶бһҖбҹӢбһ…бҹҶбһҺбһјбһӣбһ–бһёбһҖбһ¶бһҡбһҮбһҪбһӣ бһ“бһ·бһ„бһҖбҹҶбһҺбһҫбһ“бһҸбһҳбҹ’бһӣбҹғбһҠбһҫбһҳбҹ”\""},{"role":"note","text":"бһҖбһ¶бһҡбһ”бһјбһҖбһҹбһҡбһ»бһ”бһҹбһ„бҹ’бһҒбҹҒбһ”бҹ– бһҸбһҫбһ—бҹ’бһ“бһ¶бһҖбҹӢбһ„бһ¶бһҡбһ”бһ¶бһ“бһ…бһ¶бһ”бҹӢбһ•бҹ’бһҸбһҫбһҳбһҠбҹ„бһҷбһҖбһ¶бһҡбһ”бһ„бҹ’бһ бһ¶бһүбһҗбҹ’бһӣбҹғбһ…бҹҶбһҺбһ¶бһҷбһҳбһ»бһ“бһ“бһ№бһ„бһ“бһ·бһҷбһ¶бһҷбһ–бһёбһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҠбҹӮбһҡбһ¬бһ‘бҹҒ? бһҸбһҫбһҸбһҪбһӣбҹҒбһҒбһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһ”бһ„бҹ’бһ бһ¶бһүбһҮбһ¶бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһ»бһ‘бҹ’бһ’ бһҳбһ·бһ“бһҳбҹӮбһ“бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһҡбһ»бһ”бһҠбҹӮбһҡбһ¬бһ‘бҹҒ?"}],"debrief":"бһ—бҹ’бһ“бһ¶бһҖбҹӢбһ„бһ¶бһҡбһҠбҹӮбһӣбһ”бһ„бҹ’бһ бһ¶бһүбһҡбһјбһ”бһ—бһ¶бһ–бһҗбҹ’бһӣбҹғбһ…бҹҶбһҺбһ¶бһҷбһ–бҹҒбһүбһӣбҹҒбһүбһҳбһ»бһ“бһӮбҹҒ вҖ” бһҡбһҪбһҳбһ‘бһ¶бҹҶбһ„бһҖбһ¶бһҡбһҖбһ¶бһҸбҹӢбһҖбһҖбҹҒбһҡбһ•бҹ’бһҹбҹҒбһ„бҹ— вҖ” бһӮбһәбһҮбһ¶бһ”бһ»бһӮбҹ’бһӮбһӣбһҠбҹӮбһӣбһўбһҸбһ·бһҗбһ·бһҮбһ“бһ“бһ№бһ„бһ‘бһ»бһҖбһ…бһ·бһҸбҹ’бһҸбһ“бҹ…бһ–бҹҒбһӣбһ…бһ¶бҹҶбһ”бһ¶бһ…бҹӢбҹ” бһҳбһ·бһ“бһҸбҹ’бһҡбһјбһңбһ…бһ¶бһ”бҹӢбһ•бҹ’бһҸбһҫбһҳбһҠбҹ„бһҷбһҖбһ¶бһҡбһ”бҹ’бһҡбһҖбһ¶бһҹбһ–бһёбһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҳбһ»бһ“бһӮбҹҒбһЎбһҫбһҷбҹ”"},"quiz":[{"q":"бһҖбҹ’бһҡбһ»бһҳбһ бҹҠбһ»бһ“бһўбһ—бһ·бһңбһҢбҹ’бһҚбһ“бҹҚбһҳбһҪбһҷбһ•бҹ’бһҹбһ–бҹ’бһңбһ•бҹ’бһҹбһ¶бһҷбһ–бһёбһўбһҸбҹ’бһҡбһ¶бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһ–бһёбһҖбһ¶бһҡбһҮбһҪбһӣ 9%бҹ” бһҳбһ»бһ“бһ–бҹҒбһӣбһ”бһ„бҹ’бһ бһ¶бһүбһҡбһҝбһ„бһ“бҹҒбҹҮбһ‘бҹ…бһҖбһ¶бһ“бҹӢбһўбһҸбһ·бһҗбһ·бһҮбһ“ бһўбҹ’бһ“бһҖбһӮбһҪбһҡбһҸбҹӮбҹ–","opts":["бһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһҸбһҪбһӣбҹҒбһҒ 9% бһ“бҹ„бҹҮ вҖ” бһҖбҹ’бһҡбһ»бһҳбһ бҹҠбһ»бһ“бһўбһ—бһ·бһңбһҢбҹ’бһҚбһ“бҹҚбһ”бһ¶бһ“бһ”бһүбҹ’бһҮбһ¶бһҖбҹӢбһҡбһҪбһ…бһ бһҫбһҷ","бһ”бҹҶбһ”бҹ’бһӣбҹӮбһ„бһ‘бҹ…бһҮбһ¶бһ…бһ“бҹ’бһӣбҹ„бҹҮбһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһ»бһ‘бҹ’бһ’бһ”бҹүбһ¶бһ“бҹӢбһ” бһҖбһӣбҹӮбһ„бһ–бһ“бҹ’бһ’бһ”бҹ’бһҡбһҗбһ¶бһ”бҹӢбһҸбҹ’бһҡбһ¶бһўбһ¶бһ…бһ“бһ№бһ„бһҸбҹ’бһҡбһјбһңбһўбһ“бһ»бһңбһҸбҹ’бһҸбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһўбһ…бһӣбһ“бһ‘бҹ’бһҡбһ–бҹ’бһҷбһҖбҹ’бһҡбҹ„бһҳ $70K бһ¬ $210K бһўбһ¶бһҹбҹ’бһҡбҹҗбһҷбһӣбһҫбһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ·бһҡбһјбһ”бһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖбһ‘бһ·бһүбҹ”"},{"q":"бһҖбһ¶бһҡбһҹбһ·бһҖбҹ’бһҹбһ¶бһҖбһҡбһҺбһё J Tower 2 бһҡбһ”бһҹбҹӢ REAKH бһ”бһ„бҹ’бһ бһ¶бһүбһ–бһё ROI бһҹбһҡбһ»бһ”бһҠбҹӮбһӣбһ”бһ¶бһ“бһ•бҹ’бһ‘бҹҖбһ„бһ•бҹ’бһ‘бһ¶бһҸбҹӢбһҖбһҳбҹ’бһҡбһ·бһҸбһҺбһ¶бһҖбҹ’бһ“бһ»бһ„бһҡбһҷбҹҲбһ–бҹҒбһӣ бҹҘ бһҶбҹ’бһ“бһ¶бҹҶ?","opts":["18.5%","27.3%","34.27%","52%"],"correct":2,"explain":"ROI бһҹбһҡбһ»бһ” 34.27% бһҖбҹ’бһ“бһ»бһ„бһҡбһҷбҹҲбһ–бҹҒбһӣ бҹҘ бһҶбҹ’бһ“бһ¶бҹҶ (2019вҖ“2024) вҖ” бһҮбһ¶бһҳбһ’бҹ’бһҷбһҳ 6.85% бһҖбҹ’бһ“бһ»бһ„бһҳбһҪбһҷбһҶбҹ’бһ“бһ¶бҹҶбҹ” бһҸбһҪбһӣбҹҒбһҒбһ“бҹҒбҹҮбһ”бһјбһҖбһ”бһүбҹ’бһ…бһјбһӣбһӮбҹ’бһ“бһ¶бһҡбһңбһ¶бһ„бһ”бҹ’бһҡбһ¶бһҖбҹӢбһ…бҹҶбһҺбһјбһӣбһҮбһҪбһӣбһҹбһ»бһ‘бҹ’бһ’ $23,392 бһ“бһ·бһ„бһҖбҹҶбһҺбһҫбһ“бһҸбһҳбҹ’бһӣбҹғбһҠбһҫбһҳ $27,245 бһӣбһҫбһҖбһ¶бһҡбһңбһ·бһ“бһ·бһҷбҹ„бһӮбһҹбһҡбһ»бһ” $147,755бҹ”"},{"q":"бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһ»бһ‘бҹ’бһ’бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһўбҹ’бһ“бһҖбһңбһ·бһ“бһ·бһҷбҹ„бһӮбһ”бһҡбһ‘бҹҒбһҹбһӣбһҫ BKK1 бһҷбһјбһ“бһёбһҸ бҹЎ бһ”бһ“бҹ’бһ‘бһ”бҹӢбһӮбҹҒбһ„ бһҖбҹ’бһ“бһ»бһ„бһҸбһҳбҹ’бһӣбҹғбһҮбһҪбһӣ $800/бһҒбҹӮ бһӮбһәбһҖбҹҖбһҖбһ‘бҹ…бһ“бһ№бһ„бҹ–","opts":["8% вҖ” бһҸбҹ’бһҡбһјбһңбһӮбҹ’бһ“бһ¶бһ“бһ№бһ„бһўбһҸбҹ’бһҡбһ¶бһҹбһҡбһ»бһ”бһҠбҹӮбһӣбһ”бһ¶бһ“бһ•бҹ’бһҹбһ–бҹ’бһңбһ•бҹ’бһҹбһ¶бһҷ","6.5вҖ“7% вҖ” бһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ–бһёбһҠбһҖбһҖбһ¶бһҡбһ…бҹҶбһҺбһ¶бһҷбһ‘бһ¶бҹҶбһ„бһўбһҹбҹӢ","5вҖ“5.5% вҖ” бһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ–бһёбһҠбһҖбһҗбҹ’бһӣбҹғбһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһҡбһ„ бһўбһҸбҹ’бһҡбһ¶бһҷбһјбһ“бһёбһҸбһ‘бҹҶбһ“бҹҒбһҡ бһ“бһ·бһ„бһ–бһ“бҹ’бһ’бһҮбһҪбһӣ 14%","3% вҖ” бһ‘бһёбһ•бҹ’бһҹбһ¶бһҡбһҳбһ¶бһ“бһҖбһ¶бһҡбһ”бҹ’бһҡбһҖбһҪбһҸбһ”бҹ’бһҡбһҮбҹӮбһ„бһҒбҹ’бһӣбһ¶бҹҶбһ„бһ–бҹҒбһҖ"],"correct":2,"explain":"бһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ–бһёбһҖбһ¶бһҸбҹӢбһҗбҹ’бһӣбҹғбһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһҡбһ„ (~$1.8/sqm/бһҒбҹӮ) бһўбһҸбҹ’бһҡбһ¶бһҷбһјбһ“бһёбһҸбһ‘бҹҶбһ“бҹҒбһҡ ~10% бһ“бһ·бһ„бһ–бһ“бҹ’бһ’бһӣбһҫбһ”бҹ’бһҡбһ¶бһҖбҹӢбһ…бҹҶбһҺбһјбһӣбһҮбһҪбһӣ 14% бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҮбһ“бһ”бһҡбһ‘бҹҒбһҹбһҳбһ·бһ“бһҳбҹӮбһ“бһ“бһ·бһңбҹҒбһҹбһ“бһҮбһ“ бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһ»бһ‘бҹ’бһ’бһӣбһҫ 1BR бһ“бҹ… BKK1 бһҮбһ¶бһ‘бһјбһ‘бҹ…бһ’бҹ’бһӣбһ¶бһҖбҹӢбһҳбһҖбһҸбҹ’бһҡбһ№бһҳбһ”бҹ’бһҡбһ бҹӮбһӣ 5вҖ“5.5% бһ“бҹғбһҠбһҫбһҳбһ‘бһ»бһ“бһңбһ·бһ“бһ·бһҷбҹ„бһӮбһҹбһҡбһ»бһ”бҹ” бһ“бҹҒбҹҮбһӮбһәбһҮбһ¶бһҸбһҪбһӣбҹҒбһҒбһҹбҹ’бһҳбҹ„бҹҮбһҸбҹ’бһҡбһ„бҹӢбҹ”"}]}},
{id:12,week:3,title:"The Japanese Investor Protocol",short:"Japanese Protocol",objectives:["Understand exactly how Japanese investors think about risk and decision-making","Know the specific PHC protocol for every stage of a Japanese investor conversation","Be able to adapt tone, evidence, and follow-up to Japanese professional standards"],sections:[{label:"Understanding the Profile",heading:"Who you are talking to",body:"Japanese investors in Cambodia are typically professionals in their 40sвҖ“60s with high incomes, low risk tolerance, and a strong preference for stability over returns. They have a long-term orientation, distrust urgency, and require verifiable evidence before making any decision. Trust is the entry point вҖ” without it, no product discussion is possible.",box:{title:"Japanese investor profile вҖ” PHC framework:",lines:["Age: typically 40вҖ“65 В· Income: high earner В· Risk tolerance: LOW","Primary goal: stable passive income + capital preservation","Decision style: methodical, evidence-based, consensus with family or advisors","Cultural norms: respect for hierarchy, structured communication, no pressure","Best-fit projects: J Tower 2 / J Tower 3 (Tanichu developer), Le CondГ© (Hopetree Japan mgmt)","Language: always provide written follow-ups; if possible, Japanese-language summaries"]}},{label:"The Protocol вҖ” Step by Step",heading:"Every conversation follows this exact structure",body:"With Japanese investors, the sequence is not flexible. Deviating from this order вҖ” especially presenting returns before risks вҖ” signals an amateur and ends the relationship.",rules:[{title:"Step 1: Open with respect, not product",detail:"'Nakamura-san, thank you for taking the time to meet with us. Before I share anything about our projects, I would like to understand your goals and concerns first.' Never lead with a project. Ever."},{title:"Step 2: Disclose risks before returns вҖ” always",detail:"Exit liquidity risk first. Then yield reality. Then developer track record. Then CGT. PHC rule: Japanese clients must hear the downside before the upside. This is what creates trust, not undermines it."},{title:"Step 3: Present maximum 2 projects вҖ” with evidence",detail:"J Tower 3 or J Tower 2 for Tanichu familiarity. Le CondГ© for Hopetree Japan management. No more than 2. Justify each with data вҖ” delivery history, verified rental data, strata title confirmation."},{title:"Step 4: Never push for a decision in meeting one",detail:"The standard Japanese investor will not decide in the first or even second meeting. This is normal. 'I need to discuss with my family' is not a stall вҖ” it is the process. Respect it. Schedule meeting two."},{title:"Step 5: Send written follow-up the same day",detail:"Every PHC meeting with a Japanese investor ends with a same-day written summary: risks clarified + net yield data + next step agreed. This is non-negotiable. It signals professionalism at a standard Japanese professionals recognise."}]},{label:"Language & Evidence",heading:"What to say вҖ” and what never to say",body:"Language with Japanese investors must be precise, calm, and evidence-based. The words matter as much as the numbers.",table:{headers:["Never say","Say instead"],rows:[["'Guaranteed 8% return'","'Based on REAKH verified data, net yield range is 5вҖ“7%'"],["'You should buy now вҖ” prices are rising'","'The REAKH data shows transaction volume up 25% in 2025. Timing is a consideration.'"],["'This is a great opportunity'","'This project has a verified delivery record. Here are the facts.'"],["'Don't worry about CGT'","'CGT applies at exit. Here is the calculation on your scenario.'"],["'Other Japanese investors are buying'","Never use social proof as a pressure tactic. Present data instead."]]}}],roleplay:{scenario:"Opening a first meeting with a Japanese investor",instructions:"Practice the risk-first sequence. Time yourself вҖ” risks should come before any project name.",lines:[{role:"agent",text:'"Tanaka-san, before I share anything about our projects вҖ” may I ask what is most important to you in this investment? Is it income stability, capital preservation, or a combination?"'},{role:"client",text:'"Capital safety first. Income is secondary."'},{role:"agent",text:'"That is very helpful. I want to be transparent with you about how this market works before we discuss any specific project. Cambodia is a growing market, but exit liquidity is not yet at the level of Japan or Singapore. If you needed to sell in 2вҖ“3 years, that could be challenging. For a 7вҖ“10 year hold with rental income, the data is much more supportive."'},{role:"client",text:'"I understand. What does the rental income look like in practice?"'},{role:"agent",text:'"Based on a verified REAKH case study вҖ” a real transaction, not a projection вҖ” a 2-bedroom in BKK1 rented at $1,083/month net after management fees, at 90% occupancy. Over 5 years, that generated $23,392 in net rental income, and the unit appreciated by $27,245. Total return: 34% over 5 years."'},{role:"note",text:"Debrief: Did risk come first? Was the ROI data presented as verified fact, not as a sales pitch?"}],debrief:"A Japanese client who hears risks before returns will trust you more, not less. That trust is what makes them act вҖ” on their timeline, not yours."},quiz:[{q:"With a Japanese investor, you should present risks:",opts:["After showing the projects вҖ” to avoid dampening enthusiasm","Only if the client asks about them","Before presenting any specific project вҖ” always","At the end of the meeting as a brief disclaimer"],correct:2,explain:"Risks come first with Japanese investors вҖ” every time. This is the PHC Japanese investor protocol. Presenting returns before risks signals a salesperson, not an advisor."},{q:"A Japanese client says 'I need to discuss with my family before deciding.' You should:",opts:["Increase urgency вҖ” offer a limited time price","Thank them and prepare a shareable written summary for the family discussion","Mark them as low-priority and focus on faster-moving leads","Call them every day until they respond"],correct:1,explain:"Family consensus is a normal and respected part of the Japanese decision process. Prepare a clear, professional summary they can share with family or advisors. This is a buying signal, not a stall."},{q:"The two highest-trust projects for Japanese investors in the PHC portfolio are:",opts:["Le CondГ© and Royal Platinum","Time Square 9 and G.A.T.O Tower","J Tower 2 / J Tower 3 (Tanichu) and Le CondГ© (Hopetree Japan)","Peninsula and Time Square 8"],correct:2,explain:"J Tower 3 / J Tower 2 because Tanichu is a Japanese developer вҖ” the highest cultural trust signal for Japanese buyers. Le CondГ© because Hopetree Japan management is recognised and trusted in the Japanese market."},{q:"Same-day written follow-up after a Japanese investor meeting is:",opts:["Nice to have if you have time","Optional вҖ” most Japanese investors prefer phone follow-up","Non-negotiable вҖ” it summarises risks, net yield data, and agreed next step","Only required after a second meeting"],correct:2,explain:"Same-day written follow-up is the most reliable trust-building act in the PHC Japanese investor protocol. It demonstrates professionalism at a standard Japanese investors expect. It is not optional."}],reflection:"Write the first 3 sentences you would say to open a meeting with a 55-year-old Japanese investor вҖ” in a way that builds trust before any product is mentioned.",km:{"title":"бһ–бһ·бһ’бһёбһҹбһ¶бһҡбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһўбҹ’бһ“бһҖбһңбһ·бһ“бһ·бһҷбҹ„бһӮбһҮбһ”бҹүбһ»бһ“","short":"бһ–бһ·бһ’бһёбһҹбһ¶бһҡбһҮбһ”бҹүбһ»бһ“","objectives":["бһҷбһӣбҹӢбһҠбһ№бһ„бһұбҹ’бһҷбһ”бһ¶бһ“бһ…бҹ’бһ”бһ¶бһҹбҹӢбһӣбһ¶бһҹбҹӢбһ–бһёбһҡбһ”бҹҖбһ”бһҠбҹӮбһӣбһўбҹ’бһ“бһҖбһңбһ·бһ“бһ·бһҷбҹ„бһӮбһҮбһ”бҹүбһ»бһ“бһӮбһ·бһҸбһўбҹҶбһ–бһёбһ бһ¶бһ“бһ·бһ—бҹҗбһҷ бһ“бһ·бһ„бһҖбһ¶бһҡбһҹбһҳбҹ’бһҡбҹҒбһ…бһ…бһ·бһҸбҹ’бһҸ","бһҹбҹ’бһӮбһ¶бһӣбҹӢбһ–бһёбһ–бһ·бһ’бһёбһҹбһ¶бһҡбһҮбһ¶бһҖбҹӢбһӣбһ¶бһҖбҹӢбһҡбһ”бһҹбҹӢ PHC бһҹбһҳбҹ’бһҡбһ һ–бһҠбһҫбһҳбһ‘бһ»бһ“бһҮбһ¶бһ…бһҳбҹ’бһ”бһ„бҹ” бһ”бҹ’бһҡбһ¶бһҖбҹӢбһ…бҹҶбһҺбһјбһӣбһҮбһ¶бһҡбһҝбһ„бһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ”бһ“бҹ’бһҹбҹҶбҹ”\""},{"role":"agent","text":"\"бһ“бҹ„бҹҮбһҮбһ¶бһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бһҳбһ¶бһ“бһ”бҹ’бһҡбһҷбҹ„бһҮбһ“бҹҚбһҺбһ¶бһҹбҹӢбҹ” бһҒбҹ’бһүбһ»бҹҶбһ…бһ„бҹӢбһҳбһ¶бһ“бһ—бһ¶бһ–бһҹбҹ’бһҳбҹ„бҹҮбһҸбҹ’бһҡбһ„бҹӢбһҮбһ¶бһҳбһҪбһҷбһӣбҹ„бһҖбһўбҹҶбһ–бһёбһҡбһ”бҹҖбһ”бһҠбҹӮбһӣбһ‘бһёбһ•бҹ’бһҹбһ¶бһҡбһ“бҹҒбҹҮбһҠбҹҶбһҺбһҫбһҡбһҖбһ¶бһҡ бһҳбһ»бһ“бһ–бҹҒбһӣбһҷбһҫбһ„бһ–бһ·бһ—бһ¶бһҖбҹ’бһҹбһ¶бһўбҹҶбһ–бһёбһӮбһҳбҹ’бһҡбҹ„бһ„бһҮбһ¶бһҖбҹӢбһӣбһ¶бһҖбҹӢбһҺбһ¶бһҳбһҪбһҷбҹ” бһҖбһҳбҹ’бһ–бһ»бһҮбһ¶бһӮбһәбһҮбһ¶бһ‘бһёбһ•бҹ’бһҹбһ¶бһҡбһҖбҹҶбһ–бһ»бһ„бһҖбһҫбһ“бһЎбһҫбһ„ бһ”бҹүбһ»бһ“бҹ’бһҸбҹӮбһҹбһ—бһ¶бһ–бһҹбһ¶бһ…бҹӢбһ”бҹ’бһҡбһ¶бһҖбҹӢбһ“бҹғбһҖбһ¶бһҡбһӣбһҖбҹӢбһ…бҹҒбһү (Exit liquidity) бһҳбһ·бһ“бһ‘бһ¶бһ“бҹӢбһҠбһӣбҹӢбһҖбһҳбҹ’бһҡбһ·бһҸбһ”бҹ’бһҡбһ‘бҹҒбһҹбһҮбһ”бҹүбһ»бһ“ бһ¬бһҹбһ·бһ„бҹ’бһ бһ”бһ»бһҡбһёбһ“бҹ…бһЎбһҫбһҷбһ‘бҹҒбҹ” бһ”бҹ’бһҡбһҹбһ·бһ“бһ”бһҫбһӣбҹ„бһҖбһҸбҹ’бһҡбһјбһңбһҖбһ¶бһҡбһӣбһҖбҹӢбһңбһ·бһүбһҖбҹ’бһ“бһ»бһ„бһҡбһҷбҹҲбһ–бҹҒбһӣ бҹўвҖ“бҹЈ бһҶбҹ’бһ“бһ¶бҹҶ бһңбһ¶бһўбһ¶бһ…бһ“бһ№бһ„бһҳбһ¶бһ“бһ”бһ…бҹ’бһ…бҹҗбһҷбһ”бҹ’бһҡбһҲбһҳбҹ” бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҖбһ¶бһҡбһҖбһ¶бһ“бҹӢбһҖбһ¶бһ”бҹӢбһҡбһҷбҹҲбһ–бҹҒбһӣ бҹ§вҖ“бҹЎбҹ  бһҶбҹ’бһ“бһ¶бҹҶ бһҠбһҫбһҳбҹ’бһ”бһёбһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бһ…бҹҶбһҺбһјбһӣбһҮбһҪбһӣ бһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһӮбһ¶бҹҶбһ‘бҹ’бһҡбһҡбһҝбһ„бһ“бҹҒбҹҮбһ”бһ¶бһ“бһӣбҹ’бһўбһҮбһ¶бһ„бҹ”\""},{"role":"client","text":"\"бһҒбҹ’бһүбһ»бҹҶбһҷбһӣбҹӢбһ бһҫбһҷбҹ” бһ…бһ»бҹҮбһ”бҹ’бһҡбһ¶бһҖбҹӢбһ…бҹҶбһҺбһјбһӣбһ–бһёбһҖбһ¶бһҡбһҮбһҪбһӣбһңбһ·бһү бһҳбһ¶бһ“бһ‘бһ·бһҠбҹ’бһӢбһ—бһ¶бһ–бһҷбҹүбһ¶бһ„бһҳбҹүбҹҒбһ…бһҠбҹӮбһҡбһҖбҹ’бһ“бһ»бһ„бһўбһ“бһ»бһңбһҸбҹ’бһҸбһҮбһ¶бһҖбҹӢбһҹбҹ’бһҸбҹӮбһ„?\""},{"role":"agent","text":"\"бһ•бҹ’бһўбҹӮбһҖбһӣбһҫбһҖбһ¶бһҡбһҹбһ·бһҖбҹ’бһҹбһ¶бһҖбһҡбһҺбһёбһҠбҹӮбһӣбһ”бһ¶бһ“бһ•бҹ’бһ‘бҹҖбһ„бһ•бҹ’бһ‘бһ¶бһҸбҹӢбһҡбһ”бһҹбҹӢ REAKH вҖ” бһҠбҹӮбһӣбһҮбһ¶бһ”бҹ’бһҡбһҸбһ·бһ”бһҸбҹ’бһҸбһ·бһҖбһ¶бһҡбһ‘бһ·бһүбһӣбһҖбҹӢбһ–бһ·бһҸбһ”бҹ’бһҡбһ¶бһҖбһҠ бһҳбһ·бһ“бһҳбҹӮбһ“бһҮбһ¶бһҖбһ¶бһҡбһ”бҹүбһ¶бһ“бҹӢбһ”бҹ’бһҡбһҳбһ¶бһҺ вҖ” бһҷбһјбһ“бһёбһҸбһ”бһ“бҹ’бһ‘бһ”бҹӢ һңбһ·бһ“бһ·бһҷбҹ„бһӮбһҮбһ”бҹүбһ»бһ“бһ—бһ¶бһӮбһ…бҹ’бһҡбһҫбһ“бһ…бһјбһӣбһ…бһ·бһҸбҹ’бһҸбһҖбһ¶бһҡбһҸбһ¶бһҳбһҠбһ¶бһ“бһҸбһ¶бһҳбһ‘бһјбһҡбһҹбҹҗбһ–бҹ’бһ‘","бһҡбһҝбһ„бһҠбһ¶бһ…бҹӢбһҒбһ¶бһҸбһҳбһ·бһ“бһўбһ¶бһ…бһҡбҹҶбһӣбһ„бһ”бһ¶бһ“ вҖ” бһңбһ¶бһҹбһ„бҹ’бһҒбҹҒбһ”бһ–бһёбһ бһ¶бһ“бһ·бһ—бҹҗбһҷ бһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһ»бһ‘бҹ’бһ’ бһ“бһ·бһ„бһҮбҹҶбһ бһ¶бһ“бһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһҠбҹӮбһӣбһ”бһ¶бһ“бһ–бҹ’бһҡбһҳбһ–бҹ’бһҡбҹҖбһ„","бһҸбһҳбҹ’бһҡбһјбһңбһұбҹ’бһҷбһ’бҹ’бһңбһҫбһҸбҹӮбһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ–бһёбһҮбҹҶбһ“бһҪбһ”бһӣбһҫбһҖбһ‘бһёбһ–бһёбһҡбһ”бҹ’бһҡбҹҖбһ”бһ’бҹҖбһ”бһ”бҹүбһ»бһҺбҹ’бһҺбҹ„бҹҮ"],"correct":2,"explain":"бһҖбһ¶бһҡбһҸбһ¶бһҳбһҠбһ¶бһ“бһҮбһ¶бһӣбһ¶бһҷбһӣбһҖбҹ’бһҒбһҺбҹҚбһўбһҖбҹ’бһҹбһҡбһ“бҹ…бһҗбҹ’бһ„бҹғбһҠбһҠбҹӮбһӣ бһӮбһәбһҮбһ¶бһҹбһҖбһҳбҹ’бһҳбһ—бһ¶бһ–бһ”бһ„бҹ’бһҖбһҫбһҸбһ‘бҹҶбһ“бһ»бһҖбһ…бһ·бһҸбҹ’бһҸбһҠбҹӮбһӣбһӮбһҪбһҡбһұбҹ’бһҷбһ‘бһ»бһҖбһ…бһ·бһҸбҹ’бһҸбһ”бҹҶбһ•бһ»бһҸбһ“бҹ…бһҖбҹ’бһ“бһ»бһ„бһ–бһ·бһ’бһёбһҹбһ¶бһҡбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһўбҹ’бһ“бһҖбһңбһ·бһ“бһ·бһҷбҹ„бһӮбһҮбһ”бҹүбһ»бһ“бһҡбһ”бһҹбҹӢ PHCбҹ” бһңбһ¶бһ”бһ„бҹ’бһ бһ¶бһүбһ–бһёбһңбһ·бһҮбҹ’бһҮбһ¶бһҮбһёбһңбҹҲбһҖбҹ’бһ“бһ»бһ„бһҹбҹ’бһҸбһ„бҹӢбһҠбһ¶бһҡбһҠбҹӮбһӣбһўбҹ’бһ“бһҖбһңбһ·бһ“бһ·бһҷбҹ„бһӮбһҮбһ”бҹүбһ»бһ“бһҡбҹҶбһ–бһ№бһ„бһ‘бһ»бһҖбҹ” бһңбһ¶бһҮбһ¶бһҡбһҝбһ„бһҳбһ·бһ“бһўбһ¶бһ…бһҡбҹҶбһӣбһ„бһ”бһ¶бһ“бһЎбһҫбһҷбҹ”"}]}},
{id:13,week:3,title:"The European & German Investor Protocol",short:"European Protocol",objectives:["Understand the decision-making style and priorities of German and European investors","Know how to present yield data, legal structure, and downside scenarios in a way that resonates","Avoid the communication mistakes that consistently lose European clients"],sections:[{label:"Understanding the Profile",heading:"Logic, precision, and downside protection",body:"German and European investors approaching Cambodia real estate are typically analytically oriented, financially literate, and highly skeptical of promotional language. They respond to structure, data, and clearly stated downside scenarios. Emotional language, vague guarantees, and lifestyle framing will immediately signal an unprepared advisor.",box:{title:"European investor profile вҖ” PHC framework:",lines:["Age: 45вҖ“65 В· Profile: pre-retirement, professional, often high net worth","Primary goal: reliable monthly income to supplement pension or savings","Decision style: logical, comparative, requires written documentation","Risk tolerance: moderate вҖ” will accept risk if it is clearly quantified","Best-fit projects: Le CondГ© (institutional management), Peninsula (yield focus), Royal Platinum (completed, stable)","Key advisor: Reza вҖ” PHC co-founder, European advisor specialist"]}},{label:"What Europeans Need to Hear",heading:"Structure the conversation around three questions",body:"Every European investor has three core questions, whether they ask them explicitly or not. Answer all three вҖ” with data вҖ” before they ask.",rules:[{title:"Question 1: What is my actual monthly income?",detail:"Net rental yield after all costs. Not gross. Example: $150K unit in BKK1, $800 rent, minus $117 management, minus $112 tax = approximately $571/month net. Annual = ~$6,852. Net yield ~4.6% on total investment including stamp duty."},{title:"Question 2: What is my downside scenario?",detail:"Exit liquidity is the main risk. Cambodia is not liquid like Germany or France. If you needed to sell in 2вҖ“3 years, you may not find a buyer at your target price. Long-term hold (7вҖ“10 years) mitigates this significantly."},{title:"Question 3: What is the legal protection?",detail:"Strata title freehold is genuine legal ownership вҖ” registered at the Ministry of Land, backed by Cambodian law. The 70% foreign quota ensures foreigners are protected as a voting majority cannot be reached. SPA review by an independent lawyer is standard and expected."}]},{label:"Common Mistakes",heading:"What consistently loses European clients",body:"These are the specific communication patterns that cause European and German investors to disengage.",rules:[{title:"Using emotional language",detail:"'Beautiful lifestyle,' 'vibrant community,' 'you'll love living here' вҖ” these phrases signal you don't understand who you're talking to. European investors want ROI, not lifestyle copy."},{title:"Leading with upside without naming downside",detail:"Presenting appreciation potential without CGT, exit liquidity, or vacancy risk is a red flag to an analytical investor. They will spot it вҖ” and they won't come back."},{title:"Failing to involve Reza",detail:"Reza is PHC's European investor specialist. If the client profile is German or wider European, involve Reza from the second conversation. Not doing so is a missed advantage."},{title:"Sending informal follow-ups",detail:"European professionals expect structured, written communication. A WhatsApp voice note is not appropriate. A PDF summary with data, risks, and a clear next step is."}]}],roleplay:{scenario:"Presenting net yield to a German investor",instructions:"Practice presenting costs before income вҖ” no emotional language anywhere.",lines:[{role:"client",text:'"I want to understand the real numbers. What is the net yield after all costs?"'},{role:"agent",text:'"Good question вҖ” and I want to give you the precise figure. Let\'s take a completed 1-bedroom in BKK1 at $150,000. Rental income: $800/month gross. Building management fee at $1.8/sqm on a 53sqm unit: $95/month. Rental income tax at 14% for non-residents: $112/month. Net income: approximately $593/month вҖ” $7,116/year."'},{role:"client",text:'"So that\'s 4.7% on $150,000?"'},{role:"agent",text:'"Correct. 4.7% net cash yield on total purchase price before stamp duty. Including the 4% transfer tax, your total investment is around $156,000. Net yield drops to approximately 4.5%. However, the verified REAKH case study on J Tower 2 shows that capital appreciation of $27,245 over 5 years added 18% to total return. Combined, the 5-year average was 6.85% per year."'},{role:"note",text:"Debrief: Was the yield presented step-by-step? Did the Agent show their working? Was there any emotional language?"}],debrief:"German and European investors do not want a sales pitch. They want an advisor who can show their working. If you can do the math live in a conversation, you will win the trust."},quiz:[{q:"A German investor asks 'what is my actual monthly income on a $150K BKK1 unit?' The correct answer is:",opts:["$800 вҖ” that is the market rental rate","$686 вҖ” after management fees only","Approximately $570вҖ“$600 net вҖ” after management fees and 14% rental tax","$1,083 вҖ” based on the REAKH case study"],correct:2,explain:"$800 gross minus ~$95 management fee minus ~$112 rental tax (14% for non-residents) = approximately $593/month net. Always show the deductions line by line вҖ” this is what European investors respect."},{q:"A European investor asks about downside scenarios. You should:",opts:["Redirect to the upside вҖ” focus on the opportunity","Acknowledge exit liquidity risk specifically and quantify it","Tell them Cambodia is as safe as Singapore","Give a vague answer about market uncertainty"],correct:1,explain:"Name the specific downside: exit liquidity is the primary risk. Cambodia is improving but is not liquid. A 2вҖ“3 year hold could be problematic if they need to sell. A 7вҖ“10 year hold substantially reduces this risk. Always be specific вҖ” vague risk disclaimers are not credible."},{q:"When should Reza be involved in a European investor conversation?",opts:["Only if the client asks about German language support","Only for clients investing over $300K","From the second conversation onwards for any German or European buyer","Only at the closing stage"],correct:2,explain:"Reza is PHC's European investor specialist. Involving him early вҖ” from the second meeting вҖ” is a competitive advantage. Not doing so means you are not deploying the team effectively."},{q:"Which communication format is appropriate for European investor follow-up?",opts:["WhatsApp voice note вҖ” fast and personal","A verbal summary at the end of the meeting","A structured PDF or written document with data, risks, and clear next step","Email with a project brochure attached"],correct:2,explain:"European professionals expect structured, written, data-led communication. A PDF summary with net yield calculation, risks named, and a clear next step is the PHC standard. A brochure alone is not enough вҖ” it lacks the analysis layer the client expects."}],reflection:"Write a 3-paragraph written follow-up summary for a German client who has just attended their first PHC meeting and shown interest in Le CondГ© BKK1.",km:{"title":"бһ–бһ·бһ’бһёбһҹбһ¶бһҡбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһўбҹ’бһ“бһҖбһңбһ·бһ“бһ·бһҷбҹ„бһӮбһўбһәбһҡбҹүбһ»бһ” бһ“бһ·бһ„бһўбһ¶бһӣбҹ’бһӣбһәбһҳбҹүбһ„бҹӢ","short":"бһ–бһ·бһ’бһёбһҹбһ¶бһҡбһўбһәбһҡбҹүбһ»бһ”","objectives":["бһҷбһӣбҹӢбһҠбһ№бһ„бһ–бһё бһҡбһ…бһ“бһ¶бһ”бҹҗбһ‘бҹ’бһҳбһ“бҹғбһҖбһ¶бһҡбһҹбһҳбҹ’бһҡбҹҒбһ…бһ…бһ·бһҸбҹ’бһҸ бһ“бһ·бһ„бһўбһ¶бһ‘бһ·бһ—бһ¶бһ–бһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖбһңбһ·бһ“бһ·бһҷбҹ„бһӮбһўбһ¶бһӣбҹ’бһӣбһәбһҳбҹүбһ„бҹӢ бһ“бһ·бһ„бһўбһәбһҡбҹүбһ»бһ”","бһҹбҹ’бһӮбһ¶бһӣбҹӢбһ–бһёбһҡбһ”бҹҖбһ”бһ”бһ„бҹ’бһ бһ¶бһүбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһ•бһӣбһ…бҹҶбһҺбҹҒбһү бһҡбһ…бһ“бһ¶бһҹбһҳбҹ’бһ–бҹҗбһ“бҹ’бһ’бһ•бҹ’бһӣбһјбһңбһ…бҹ’бһ”бһ¶бһ”бҹӢ бһ“бһ·бһ„бһҹбҹҒбһ“бһ¶бһҡбһёбһҷ һҷбҹ” бһҸбҹ’бһҡбһјбһңбһҶбҹ’бһӣбһҫбһҷбһҹбҹҶбһҺбһҪбһҡбһ‘бһ¶бҹҶбһ„бһ”бһёбһ“бҹҒбҹҮ вҖ” бһҠбҹ„бһҷбһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷ вҖ” бһҳбһ»бһ“бһ–бҹҒбһӣбһ–бһҪбһҖбһӮбһ¶бһҸбҹӢбһ…бҹ„бһ‘бһҹбһҪбһҡбҹ”","rules":[{"title":"бһҹбҹҶбһҺбһҪбһҡбһ‘бһё бҹЎбҹ– бһҸбһҫбһ”бҹ’бһҡбһ¶бһҖбҹӢбһ…бҹҶбһҺбһјбһӣбһ”бҹ’бһҡбһ…бһ¶бҹҶбһҒбҹӮбһ–бһ·бһҸбһ”бҹ’бһҡбһ¶бһҖбһҠбһҡбһ”бһҹбҹӢбһҒбҹ’бһүбһ»бҹҶбһҳбһ¶бһ“бһ…бҹҶбһ“бһҪбһ“бһ”бҹүбһ»бһ“бҹ’бһҳбһ¶бһ“?","detail":"бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҮбһҪбһӣбһҹбһ»бһ‘бҹ’бһ’бһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ–бһёбһҖбһ¶бһҸбҹӢбһҗбҹ’бһӣбҹғбһ…бҹҶбһҺбһ¶бһҷбһ‘бһ¶бҹҶбһ„бһўбһҹбҹӢбҹ” бһҳбһ·бһ“бһҳбҹӮбһ“бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһҡбһ»бһ”бһЎбһҫбһҷбҹ” бһ§бһ‘бһ¶бһ бһҡбһҺбҹҚбҹ– бһҷбһјбһ“бһёбһҸ $150K бһ“бҹ… BKK1, бһҗбҹ’бһӣбҹғбһҮбһҪбһӣ $800, бһҠбһҖ $117 бһҗбҹ’бһӣбҹғбһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһҡбһ„, бһҠбһҖ $112 бһ–бһ“бҹ’бһ’ = бһ”бҹ’бһҡбһ бҹӮбһӣ $571/бһҒбҹӮ бһҹбһ»бһ‘бҹ’бһ’бҹ” бһ”бҹ’бһҡбһ…бһ¶бҹҶбһҶбҹ’бһ“бһ¶бҹҶ = ~$6,852бҹ” бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһ»бһ‘бҹ’бһ’ ~4.6% бһӣбһҫбһҖбһ¶бһҡбһңбһ·бһ“бһ·бһҷбҹ„бһӮбһҹбһҡбһ»бһ”бһҡбһҪбһҳбһ‘бһ¶бҹҶбһ„бһ–бһ“бҹ’бһ’бһ”бҹ’бһҡбһҗбһ¶бһ”бҹӢбһҸбҹ’бһҡбһ¶бҹ”"},{"title":"бһҹбҹҶбһҺбһҪбһҡбһ‘бһё бҹўбҹ– бһҸбһҫбһҹбҹҒбһ“бһ¶бһҡбһёбһҷбҹүбһјбһ бһ¶бһ“бһ·бһ—бҹҗбһҷбһўбһңбһ·бһҮбҹ’бһҮбһҳбһ¶бһ“бһҡбһ”бһҹбҹӢбһҒбҹ’бһүбһ»бҹҶбһҮбһ¶бһўбҹ’бһңбһё?","detail":"бһ бһ¶бһ“бһ·бһ—бҹҗбһҷбһҹбһ—бһ¶бһ–бһҹбһ¶бһ…бҹӢбһ”бҹ’бһҡбһ¶бһҖбҹӢбһ“бҹғбһҖбһ¶бһҡбһӣбһҖбҹӢбһ…бҹҒбһү бһӮбһәбһҮбһ¶бһ бһ¶бһ“бһ·бһ—бҹҗбһҷбһ…бһҳбҹ’бһ”бһ„бҹ” бһҖбһҳбҹ’бһ–бһ»бһҮбһ¶бһҳбһ·бһ“бһ‘бһ¶бһ“бҹӢбһҳбһ¶бһ“бһҹбһ—бһ¶бһ–бһҹбһ¶бһ…бҹӢбһ”бҹ’бһҡбһ¶бһҖбҹӢбһҡбһ бҹҗбһҹбһҠбһјбһ…бһўбһ¶бһӣбҹ’бһӣбһәбһҳбҹүбһ„бҹӢ бһ¬бһ”бһ¶бһҡбһ¶бҹҶбһ„бһ“бҹ„бҹҮбһ‘бҹҒбҹ” бһ”бҹ’бһҡбһҹбһ·бһ“бһ”бһҫбһӣбҹ„бһҖбһўбҹ’бһ“бһҖбһҸбҹ’бһҡбһјбһңбһҖбһ¶бһҡбһӣбһҖбҹӢбһңбһ·бһүбһҖбҹ’бһ“бһ»бһ„бһҡбһҷбҹҲбһ–бҹҒбһӣ бҹўвҖ“бҹЈ бһҶбҹ’бһ“бһ¶бҹҶ бһӣбҹ„бһҖбһўбҹ’бһ“бһҖбһўбһ¶бһ…бһ“бһ№бһ„бһҳбһ·бһ“бһҹбҹ’бһңбҹӮбһ„бһҡбһҖбһўбҹ’бһ“бһҖбһ‘бһ·бһүбһҖбҹ’бһ“бһ»бһ„бһҸбһҳбҹ’бһӣбҹғбһӮбҹ„бһӣбһҠбҹ…бһ”бһ¶бһ“бһЎбһҫбһҷбҹ” бһҖбһ¶бһҡбһҖбһ¶бһ“бҹӢбһҖбһ¶бһ”бҹӢбһҡбһҷбҹҲбһ–бҹҒбһӣбһңбҹӮбһ„ (бҹ§вҖ“бҹЎбҹ  бһҶбҹ’бһ“бһ¶бҹҶ) бһҮбһҪбһҷбһҖбһ¶бһҸбҹӢбһ”бһ“бҹ’бһҗбһҷбһ бһ¶бһ“бһ·бһ—бҹҗбһҷбһ“бҹҒбҹҮбһ”бһ¶бһ“бһҷбҹүбһ¶бһ„бһ…бҹ’бһҡбһҫбһ“бҹ”"},{"title":"бһҹбҹҶбһҺбһҪбһҡбһ‘бһё бҹЈбҹ– бһҸбһҫбһўбҹ’бһңбһёбһҮбһ¶бһҖбһ¶бһҡбһҖбһ¶бһҡбһ–бһ¶бһҡбһҒбһ¶бһ„бһ•бҹ’бһӣбһјбһңбһ…бҹ’бһ”бһ¶бһ”бҹӢбһҡбһ”бһҹбҹӢбһҒбҹ’бһүбһ»бҹҶ?","detail":"бһ”бҹҗбһҺбҹ’бһҺбһҖбһҳбҹ’бһҳбһҹбһ·бһ‘бҹ’бһ’бһ·бһўбһҡбһјбһ”бһё (Strata title) бһӮбһәбһҮбһ¶бһҖбһҳбҹ’бһҳбһҹбһ·бһ‘бҹ’бһ’бһ·бһҹбҹ’бһҡбһ”бһ…бҹ’бһ”бһ¶бһ”бҹӢбһ–бһ·бһҸбһ”бҹ’бһҡбһ¶бһҖбһҠ вҖ” бһ…бһ»бҹҮбһ”бһүбҹ’бһҮбһёбһ“бҹ…бһҖбҹ’бһҡбһҹбһҪбһ„бһҡбҹҖбһ”бһ…бҹҶбһҠбҹӮбһ“бһҠбһё бһ“бһ·бһ„бһӮбһ¶бҹҶбһ‘бҹ’бһҡбһҠбҹ„бһҷбһ…бҹ’бһ”бһ¶бһ”бҹӢбһҖбһҳбҹ’бһ–бһ»бһҮбһ¶бҹ” бһҖбһјбһҸбһ¶бһҳбҹ’бһ…бһ¶бһҹбҹӢбһҖбһҳбҹ’бһҳбһҹбһ·бһ‘бҹ’бһ’бһ·бһ”бһҡбһ‘бҹҒбһҹ 70% бһ’бһ¶бһ“бһ¶бһҗбһ¶бһҮбһ“бһ”бһҡбһ‘бҹҒбһҹбһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһҖбһ¶бһҡбһ–бһ¶бһҡ бһҠбҹ„бһҷбһҹбһ¶бһҡбһӮбҹ’бһҳбһ¶бһ“бһҹбҹҶбһЎбҹҒбһ„бһ—бһ¶бһӮбһ…бҹ’бһҡбһҫбһ“бһҠбҹӮбһӣбһўбһ¶бһ…бһҹбһҳбҹ’бһҡбҹҒбһ…бһ”бһ¶бһ“бһЎбһҫбһҷбҹ” бһҖбһ¶бһҡбһ–бһ·бһ“бһ·бһҸбҹ’бһҷ SPA бһҠбҹ„бһҷбһҳбҹҒбһ’бһ¶бһңбһёбһҜбһҖбһҡбһ¶бһҮбҹ’бһҷ бһӮбһәбһҮбһ¶бһҹбҹ’бһҸбһ„бҹӢбһҠбһ¶бһҡ бһ“бһ·бһ„бһҮбһ¶бһҡбһҝбһ„бһҠбҹӮбһӣбһҡбҹҶбһ–бһ№бһ„бһ‘бһ»бһҖбҹ”"}]},{"label":"бһҖбҹҶбһ бһ»бһҹбһҶбҹ’бһӮбһ„бһ‘бһјбһ‘бҹ…","heading":"бһўбҹ’бһңбһёбһҠбҹӮбһӣбһ”бҹҶбһ•бҹ’бһӣбһ¶бһүбһ‘бҹҶбһ“бһ¶бһҖбҹӢбһ‘бҹҶбһ“бһ„бһҮбһ¶бһҳбһҪбһҷбһўбһҸбһ·бһҗбһ·бһҮбһ“бһўбһәбһҡбҹүбһ»бһ”бһҮбһ¶бһүбһ№бһҖбһүбһ¶бһ”бҹӢ","body":"бһ‘бһ¶бҹҶбһ„бһ“бҹҒбҹҮбһӮбһәбһҮбһ¶бһ‘бһҳбҹ’бһҡбһ„бҹӢбһ“бҹғбһҖбһ¶бһҡбһ‘бҹҶбһ“бһ¶бһҖбҹӢбһ‘бҹҶбһ“бһ„бһҮбһ¶бһҖбҹӢбһӣбһ¶бһҖбҹӢбһҠбҹӮбһӣбһ’бҹ’бһңбһҫбһұбҹ’бһҷбһўбҹ’бһ“бһҖбһңбһ·бһ“бһ·бһҷбҹ„бһӮбһўбһәбһҡбҹүбһ»бһ” бһ“бһ·бһ„бһўбһ¶бһӣбҹ’бһӣбһәбһҳбҹүбһ„бҹӢ бһ”бһүбҹ’бһҲбһ”бҹӢбһҖбһ¶бһҡбһ”бһ“бҹ’бһҸбһ‘бҹҶбһ“бһ¶бһҖбҹӢбһ‘бҹҶбһ“бһ„бҹ”","rules":[{"title":"бһҖбһ¶бһҡбһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһ—бһ¶бһҹбһ¶бһўбһјбһҹбһ‘бһ¶бһүбһўбһ¶бһҡбһҳбҹ’бһҳбһҺбҹҚ","detail":"'бһҡбһ”бҹҖбһ”бһҡбһҹбҹӢбһ“бҹ…бһҠбҹҸбһҹбҹ’бһҡбһҹбҹӢбһҹбҹ’бһўбһ¶бһҸ' 'бһҹбһ бһӮбһҳбһ“бҹҚбһҠбҹҸбһҡбһҹбҹӢбһҡбһңбһҫбһҖ' 'бһўбҹ’бһ“бһҖбһ“бһ№бһ„бһ…бһјбһӣбһ…бһ·бһҸбҹ’бһҸбһҖбһ¶бһҡбһҡбһҹбҹӢбһ“бҹ…бһ‘бһёбһ“бҹҒбҹҮ' вҖ” бһғбҹ’бһӣбһ¶бһ‘бһ¶бҹҶбһ„бһ“бҹҒбҹҮбһ”бһүбҹ’бһҮбһ¶бһҖбҹӢбһҗбһ
