’бһҹбһҡбһҠбҹӮбһӣбһҳбһ¶бһ“бһҡбһ…бһ“бһ¶бһҹбһҳбҹ’бһ–бҹҗбһ“бҹ’бһ’ бһҮбһ¶бһҳбһҪбһҷбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷ бһ бһ¶бһ“бһ·бһ—бҹҗбһҷ бһ“бһ·бһ„бһҮбҹҶбһ бһ¶бһ“бһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ…бҹ’бһ”бһ¶бһҹбҹӢбһӣбһ¶бһҹбҹӢ","бһўбҹҠбһёбһҳбҹӮбһӣбһҠбҹӮбһӣбһ—бҹ’бһҮбһ¶бһ”бҹӢбһҳбһҖбһҮбһ¶бһҳбһҪбһҷбһҖбһ¶бһҸбһ¶бһЎбһ»бһҖбһӮбһҳбҹ’бһҡбҹ„бһ„"],"correct":2,"explain":"бһўбҹ’бһ“бһҖбһҮбҹҶбһ“бһ¶бһүбһўбһәбһҡбҹүбһ»бһ”бһҡбҹҶбһ–бһ№бһ„бһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бһҖбһ¶бһҡбһ‘бҹҶбһ“бһ¶бһҖбҹӢбһ‘бҹҶбһ“бһ„бһҮбһ¶бһӣбһ¶бһҷбһӣбһҖбҹ’бһҒбһҺбҹҚбһўбһҖбҹ’бһҹбһҡ бһҠбһ№бһҖбһ“бһ¶бҹҶбһҠбҹ„бһҷбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷ бһ“бһ·бһ„бһҳбһ¶бһ“бһҡбһ…бһ“бһ¶бһҹбһҳбҹ’бһ–бҹҗбһ“бҹ’бһ’бҹ” бһҹбҹҒбһ…бһҖбҹ’бһҸбһёбһҹбһ„бҹ’бһҒбҹҒбһ”бһҮбһ¶ PDF бһҠбҹӮбһӣбһҳбһ¶бһ“бһҖбһ¶бһҡбһӮбһҺбһ“бһ¶бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһ»бһ‘бҹ’бһ’ бһҖбһ¶бһҡбһ”бһүбҹ’бһҮбһ¶бһҖбҹӢбһ бһ¶бһ“бһ·бһ—бҹҗбһҷ бһ“бһ·бһ„бһҮбҹҶбһ бһ¶бһ“бһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ…бҹ’бһ”бһ¶бһҹбҹӢбһӣбһ¶бһҹбҹӢ бһӮбһәбһҮбһ¶бһҹбҹ’бһҸбһ„бҹӢбһҠбһ¶бһҡ PHCбҹ” бһҖбһ¶бһҸбһ¶бһЎбһ»бһҖбһҸбҹӮбһҳбһҪбһҷбһҳбһ»бһҒбһӮбһәбһҳбһ·бһ“бһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһҡбһ¶бһ“бҹӢбһЎбһҫбһҷ вҖ” бһңбһ¶бһҒбҹ’бһңбҹҮбһҹбҹ’бһҡбһ‘бһ¶бһ”бҹӢбһ“бҹғбһҖбһ¶бһҡбһңбһ·бһ—бһ¶бһӮбһҠбҹӮбһӣбһўбһҸбһ·бһҗбһ·бһҮбһ“бһҡбҹҶбһ–бһ№бһ„бһ‘бһ»бһҖбҹ”"}]}},
{id:14,week:3,title:"Serving Khmer & Overseas Cambodian Clients",short:"Khmer Clients",objectives:["Understand what local Khmer and overseas Cambodian clients value most","Know how to adapt communication, project selection, and decision support for each sub-segment","Avoid the assumptions that damage trust with Cambodian-heritage clients"],sections:[{label:"Two Distinct Sub-Segments",heading:"Not one group вҖ” two different conversations",body:"'Khmer client' is not a single profile. Local Khmer end-users and overseas Cambodians have different goals, different decision speeds, and different emotional drivers. Treating them as one group is the first mistake most agents make.",grid:[["Local Khmer end-user","25вҖ“50, Phnom Penh-based, lifestyle upgrade or family home. Values: community, school proximity, developer reputation, payment flexibility. Slower decision вҖ” family consensus required."],["Overseas Cambodian","30вҖ“55, based abroad (USA, France, Australia, Canada). Goal: investment + family connection + capital preservation. Often faster to decide. Needs: clear remote process, walkthrough support, reliable documentation."]]},{label:"Local Khmer Client Protocol",heading:"Family, community, and comfort first",body:"Local Khmer buyers are motivated by the idea of a safe, modern home for their family in a trusted community. They are not primarily yield-driven. Developer reputation and project track record matter more than ROI calculations.",rules:[{title:"Lead with safety and community вҖ” not returns",detail:"'This development is by Megakim вҖ” 7 completed projects, all delivered on time. The building has 24-hour security, a school nearby, and a residents community.' This framing resonates. Net yield does not."},{title:"Payment flexibility is a decision driver",detail:"Many local buyers are sensitive to payment schedule. Know the instalment plans for every project. Some offer up to 50% due at completion вҖ” this significantly reduces risk during construction. Feature this prominently."},{title:"Support family consensus вҖ” don't rush it",detail:"Decisions will involve parents, siblings, or spouses. This is not a delay вҖ” it is the process. Prepare materials they can take home and share. Offer a joint meeting with family if needed."},{title:"Language and warmth",detail:"Communicate in Khmer where possible. Tone should be warm, respectful, and community-focused. Avoid financial jargon вҖ” use plain language about what the home will feel like to live in."}]},{label:"Overseas Cambodian Protocol",heading:"Remote buyers need extra support вҖ” not less rigour",body:"Overseas Cambodians are often faster to commit than local buyers, but they carry specific anxieties about buying remotely: developer trust, documentation security, and the ability to manage from abroad.",rules:[{title:"Prioritise developer track record loudly",detail:"'Megakim has delivered 7 projects. Here are the handover photos from Time Square 8. Here is the strata title certificate.' Overseas buyers cannot visit easily вҖ” verified delivery evidence is the substitute for a site visit."},{title:"Remote process must be airtight",detail:"Provide: clear payment schedule in writing, digital SPA review process, title transfer documentation, and property management options. 'You don't need to be here' only works if you can back it up."},{title:"Respond fast",detail:"Overseas Cambodians often make decisions across time zones with narrow windows of availability. Response time matters more than with local clients. Missed messages are missed deals."},{title:"WhatsApp and Telegram are the right channels",detail:"These clients are not in the office. They are on their phones. Use the channels that work for them вҖ” with professional content, not casual voice notes."}]}],roleplay:{scenario:"Handling a family decision process for a local Khmer buyer",instructions:"Practice supporting the consensus without creating urgency.",lines:[{role:"client",text:'"I like the unit in Time Square 11. But I need to talk with my parents first."'},{role:"agent",text:'"Of course вҖ” that\'s completely normal. I\'d like to help make that conversation as easy as possible for you."'},{role:"client",text:'"What should I tell them?"'},{role:"agent",text:'"Let me prepare a simple summary вҖ” the project name, developer track record, payment plan, and what the monthly cost looks like. Something clear they can read without needing to know the full background. Would that help?"'},{role:"client",text:'"Yes, that would be very helpful."'},{role:"agent",text:'"I\'ll send it to you today. If it would be useful, I\'m also happy to join a meeting with your family вҖ” by phone or in person вҖ” to answer any questions they have directly."'},{role:"note",text:"Debrief: Did the Agent resist creating urgency? Did they actively support the family process?"}],debrief:"For Khmer clients, the family is part of the decision. Support it вҖ” not just tolerate it. An agent who makes the family feel respected will close the deal. An agent who creates pressure will lose it."},quiz:[{q:"A local Khmer buyer says 'my parents want to see the building first.' You should:",opts:["Tell them they can visit after booking to save the unit","Offer to arrange a site visit for the whole family as a priority","Explain that the project is off-plan and not visitable","Send them a video instead вҖ” site visits take too long"],correct:1,explain:"Site visits for family members are part of the Khmer client process. Facilitate them proactively. A family that has seen the building is far more likely to support the decision."},{q:"An overseas Cambodian client contacts you from Los Angeles at 10pm Cambodia time. You should:",opts:["Reply the next morning вҖ” client should expect time zone delays","Reply as soon as possible вҖ” response speed is a trust signal for overseas buyers","Ask them to call during business hours","Send a brochure and follow up during PP office hours"],correct:1,explain:"Overseas Cambodian clients operate across time zones with limited availability windows. Fast response is a competitive differentiator. A delayed response sends the client to another agency."},{q:"For local Khmer buyers, the most important project selection factor is:",opts:["Net yield and ROI projections","Developer reputation, payment flexibility, and community feel","Price per sqm vs comparable districts","Foreign ownership eligibility"],correct:1,explain:"Local Khmer end-users are driven by community, safety, family suitability, and payment flexibility вҖ” not yield calculations. PHC projects like Time Square 11 BKK3 and Royal Platinum Toul Kork lead with these qualities."},{q:"When preparing materials for a Khmer buyer's family discussion, you should include:",opts:["The full investment analysis with yield tables","A simple, clear summary: project name, developer track record, payment plan, monthly cost","Only the developer brochure вҖ” let the family research independently","A price comparison vs other projects in the same area"],correct:1,explain:"Keep it simple and clear. The family needs enough to feel confident вҖ” not overwhelmed. Developer track record and payment plan are the two most important reassurance points for local Khmer families."}],reflection:"Think about the differences between how you would open a conversation with a 35-year-old Khmer professional buying their first home, versus a 45-year-old Cambodian-American looking to invest remotely. What changes вҖ” and what stays the same?",km:{"title":"бһҖбһ¶бһҡбһ”бһҳбҹ’бһҡбһҫбһҹбҹҒбһңбһ¶бһҖбһҳбҹ’бһҳбһҮбһјбһ“бһўбһҸбһ·бһҗбһ·бһҮбһ“бһҒбҹ’бһҳбҹӮбһҡбһҖбҹ’бһ“бһ»бһ„бһҹбҹ’бһҡбһ»бһҖ бһ“бһ·бһ„бһўбһ¶бһҺбһ·бһҖбһҮбһ“бһҒбҹ’бһҳбҹӮбһҡбһ“бҹ…бһ”бһҡбһ‘бҹҒбһҹ","short":"бһўбһҸбһ·бһҗбһ·бһҮбһ“бһҒбҹ’бһҳбҹӮбһҡ","objectives":["бһҷбһӣбҹӢбһҠбһ№бһ„бһ–бһёбһўбҹ’бһңбһёбһҠбҹӮбһӣбһўбһҸбһ·бһҗбһ·бһҮбһ“бһҒбҹ’бһҳбҹӮбһҡбһҖбҹ’бһ“бһ»бһ„бһҹбҹ’бһҡбһ»бһҖ бһ“бһ·бһ„бһўбһ¶бһҺбһ·бһҖбһҮбһ“бһҒбҹ’бһҳбҹӮбһҡбһ“бҹ…бһ”бһҡбһ‘бҹҒбһҹбһұбҹ’бһҷбһҸбһҳбҹ’бһӣбҹғбһ”бҹҶбһ•бһ»бһҸ","бһҹбҹ’бһӮбһ¶бһӣбҹӢбһ–бһёбһҡбһ”бҹҖбһ”бһҸбһҳбҹ’бһҡбһ„бҹӢбһҖбһ¶бһҡбһ‘бҹҶбһ“бһ¶бһҖбҹӢбһ‘бҹҶбһ“бһ„ бһҖбһ¶бһҡбһҮбҹ’бһҡбһҫбһҹбһҡбһҫбһҹбһӮбһҳбҹ’бһҡбҹ„бһ„ бһ“бһ·бһ„бһҖбһ¶бһҡбһӮбһ¶бҹҶбһ‘бҹ’бһҡбһҖбһ¶бһҡбһҹбһҳбҹ’бһҡбҹҒбһ…бһ…бһ·бһҸбҹ’бһҸбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһ•бҹ’бһ“бҹӮбһҖбһўбһҸбһ·бһҗбһ·бһҮбһ“бһ“бһёбһҳбһҪбһҷбҹ—","бһ…бҹҖбһҹбһңбһ¶бһ„бһҖбһ¶бһҡбһҹбһ“бҹ’бһҳбһҸбһ‘бһ¶бҹҶбһ„бһЎбһ¶бһҷбһҠбҹӮбһӣбһ”бҹҶбһ•бҹ’бһӣбһ¶бһүбһ‘бҹҶбһ“бһ»бһҖбһ…бһ·бһҸбҹ’бһҸбһҮбһ¶бһҳбһҪбһҷбһўбһҸбһ·бһҗбһ·бһҮбһ“бһҠбҹӮбһӣбһҳбһ¶бһ“бһ”бҹ’бһҡбһ—бһ–бһҠбһҫбһҳбһҮбһ¶бһҮбһ“бһҮбһ¶бһҸбһ·бһҒбҹ’бһҳбҹӮбһҡ"],"sections":[{"label":"бһ•бҹ’бһ“бҹӮбһҖбһўбһҸбһ·бһҗбһ·бһҮбһ“бһ–бһёбһҡбһ•бҹ’бһҹбҹҒбһ„бһӮбҹ’бһ“бһ¶","heading":"бһҳбһ·бһ“бһҳбҹӮбһ“бһҮбһ¶бһҖбҹ’бһҡбһ»бһҳбһҸбҹӮбһҳбһҪбһҷбһЎбһҫбһҷ вҖ” бһӮбһәбһҮбһ¶бһҖбһ¶бһҡбһҹбһ“бҹ’бһ‘бһ“бһ¶бһ–бһёбһҡбһ•бҹ’бһҹбҹҒбһ„бһӮбҹ’бһ“бһ¶","body":"'бһўбһҸбһ·бһҗбһ·бһҮбһ“бһҒбҹ’бһҳбҹӮбһҡ' бһҳбһ·бһ“бһҳбҹӮбһ“бһҮбһ¶бһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ·бһҡбһјбһ”бһҸбҹӮбһҳбһҪбһҷбһ“бҹ„бҹҮбһ‘бҹҒбҹ” бһўбҹ’бһ“бһҖбһ‘бһ·бһүбһҡбһҹбҹӢбһ“бҹ…бһ•бҹ’бһ‘бһ¶бһӣбҹӢбһҮбһ¶бһҮбһ“бһҮбһ¶бһҸбһ·бһҒбҹ’бһҳбҹӮбһҡбһҖбҹ’бһ“бһ»бһ„бһҹбҹ’бһҡбһ»бһҖ бһ“бһ·бһ„бһўбһ¶бһҺбһ·бһҖбһҮбһ“бһҒбҹ’бһҳбҹӮбһҡбһ“бҹ…бһ”бһҡбһ‘бҹҒбһҹ бһҳбһ¶бһ“бһӮбҹ„бһӣбһҠбҹ…бһҒбһ»бһҹбһӮбҹ’бһ“бһ¶ бһӣбҹ’бһ”бһҝбһ“бһ“бҹғбһҖбһ¶бһҡбһҹбһҳбҹ’бһҡбҹҒбһ…бһ…бһ·бһҸбҹ’бһҸбһҒбһ»бһҹбһӮбҹ’бһ“бһ¶ бһ“бһ·бһ„бһҖбһҸбҹ’бһҸбһ¶бһҖбһҳбҹ’бһҳбһҹбһ·бһ‘бҹ’бһ’бһ·бһ•бҹ’бһӣбһјбһңбһўбһ¶бһҡбһҳбҹ’бһҳбһҺбҹҚбһҒбһ»бһҹбһӮбҹ’бһ“бһ¶бҹ” бһҖбһ¶бһҡбһ”бҹ’бһҡбһ–бҹ’бһҡбһ№бһҸбҹ’бһҸбһ‘бҹ…бһӣбһҫбһ–бһҪбһҖбһӮбһ¶бһҸбҹӢбһҠбһјбһ…бһҮбһ¶бһҖбҹ’бһҡбһ»бһҳбһҸбҹӮбһҳбһҪбһҷ бһӮбһәбһҮбһ¶бһҖбҹҶбһ бһ»бһҹбһҠбҹҶбһ”бһјбһ„бһҠбҹӮбһӣбһ—бҹ’бһ“бһ¶бһҖбҹӢбһ„бһ¶бһҡбһ—бһ¶бһӮбһ…бҹ’бһҡбһҫбһ“бһ”бҹ’бһҡбһ–бҹ’бһҡбһ№бһҸбҹ’бһҸбҹ”","grid":[["бһўбҹ’бһ“бһҖбһ‘бһ·бһүбһҡбһҹбҹӢбһ“бҹ…бһ•бҹ’бһ‘бһ¶бһӣбҹӢбһҮбһ¶бһҮбһ“бһҮбһ¶бһҸбһ·бһҒбҹ’бһҳбҹӮбһҡбһҖбҹ’бһ“бһ»бһ„бһҹбҹ’бһҡбһ»бһҖ","бһўбһ¶бһҷбһ» 25вҖ“50 бһҶбҹ’бһ“бһ¶бҹҶ бһўбһ—бһ·бһңбһҢбҹ’бһҚбһ“бҹ…бһ—бҹ’бһ“бҹҶбһ–бҹҒбһү бһҖбһ¶бһҡбһ•бҹ’бһӣбһ¶бһҹбҹӢбһ”бҹ’бһҸбһјбһҡбһҡбһ”бҹҖбһ”бһҡбһҹбҹӢбһ“бҹ… бһ¬бһ•бҹ’бһ‘бҹҮбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһӮбҹ’бһҡбһҪбһҹбһ¶бһҡбҹ” бһҸбһҳбҹ’бһӣбҹғбҹ– бһҹбһ бһӮбһҳбһ“бҹҚ бһҮбһ·бһҸбһҹбһ¶бһӣбһ¶бһҡбҹҖбһ“ бһҖбҹҒбһҡбҹ’бһҸбһ·бҹҚбһҲбҹ’бһҳбҹ„бҹҮбһҖбҹ’бһҡбһ»бһҳбһ бҹҠбһ»бһ“бһўбһ—бһ·бһңбһҢбҹ’бһҚбһ“бҹҚ бһ—бһ¶бһ–бһ”бһҸбҹӢбһ”бҹӮбһ“бһ“бҹғбһҖбһ¶бһҡбһ”бһ„бҹӢбһ”бҹ’бһҡбһ¶бһҖбҹӢбҹ” бһҖбһ¶бһҡбһҹбһҳбҹ’бһҡбҹҒбһ…бһ…бһ·бһҸбҹ’бһҸбһҷбһәбһҸбһҮбһ¶бһ„ вҖ” бһҸбҹ’бһҡбһјбһңбһҖбһ¶бһҡбһҖбһ¶бһҡбһҜбһҖбһ—бһ¶бһ–бһӮбҹ’бһ“бһ¶бһҖбҹ’бһ“бһ»бһ„бһӮбҹ’бһҡбһҪбһҹбһ¶бһҡбҹ”"],["бһўбһ¶бһҺбһ·бһҖбһҮбһ“бһҒбҹ’бһҳбҹӮбһҡбһ“бҹ…бһ”бһҡбһ‘бҹҒбһҹ","бһўбһ¶бһҷбһ» 30вҖ“55 бһҶбҹ’бһ“бһ¶бҹҶ бһҡбһҹбҹӢбһ“бҹ…бһ”бһҡбһ‘бҹҒбһҹ (бһўбһ¶бһҳбҹҒбһҡбһ·бһҖ бһ”бһ¶бһҡбһ¶бҹҶбһ„ бһўбһјбһҹбҹ’бһҸбҹ’бһҡбһ¶бһӣбһё бһҖбһ¶бһҺбһ¶бһҠбһ¶)бҹ” бһӮбҹ„бһӣбһҠбҹ…бҹ– бһҖбһ¶бһҡбһңбһ·бһ“бһ·бһҷбҹ„бһӮ + бһҖбһ¶бһҡбһ—бҹ’бһҮбһ¶бһ”бҹӢбһ‘бҹҶбһ“бһ¶бһҖбҹӢбһ‘бҹҶбһ“бһ„бһӮбҹ’бһҡбһҪбһҹбһ¶бһҡ + бһҖбһ¶бһҡбһҡбһҖбҹ’бһҹбһ¶бһҠбһҫбһҳбһ‘бһ»бһ“бҹ” бһҮбһ¶бһүбһ№бһҖбһүбһ¶бһ”бҹӢбһҹбһҳбҹ’бһҡбҹҒбһ…бһ…бһ·бһҸбҹ’бһҸбһӣбһҝбһ“бһҮбһ¶бһ„бҹ” бһҸбһҳбҹ’бһҡбһјбһңбһҖбһ¶бһҡбҹ– бһҠбҹҶбһҺбһҫбһҡбһҖбһ¶бһҡбһ–бһёбһ…бһҳбҹ’бһ„бһ¶бһҷбһ…бҹ’бһ”бһ¶бһҹбҹӢбһӣбһ¶бһҹбҹӢ бһҖбһ¶бһҡбһӮбһ¶бҹҶбһ‘бҹ’бһҡбһҖбһ¶бһҡбһ…бһ»бҹҮбһҳбһҫбһӣ бһҖбһ¶бһҡбһҡбҹҖбһ”бһ…бҹҶбһҜбһҖбһҹбһ¶бһҡбһҠбҹӮбһӣбһӮбһҪбһҡбһұбҹ’бһҷбһ‘бһ»бһҖбһ…бһ·бһҸбҹ’бһҸбҹ”"]]},{"label":"бһ–бһ·бһ’бһёбһҹбһ¶бһҡбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһўбһҸбһ·бһҗбһ·бһҮбһ“бһҒбҹ’бһҳбҹӮбһҡбһҖбҹ’бһ“бһ»бһ„бһҹбҹ’бһҡбһ»бһҖ","heading":"бһӮбҹ’бһҡбһҪбһҹбһ¶бһҡ бһҹбһ бһӮбһҳбһ“бҹҚ бһ“бһ·бһ„бһ—бһ¶бһ–бһ•бһ¶бһҹбһ»бһҖбһ—бһ¶бһ–бһҮбһ¶бһ…бһҳбҹ’бһ”бһ„","body":"бһўбҹ’бһ“бһҖбһ‘бһ·бһүбһҒбҹ’бһҳбҹӮбһҡбһҖбҹ’бһ“бһ»бһ„бһҹбҹ’бһҡбһ»бһҖбһҳбһ¶бһ“бһҖбһҸбҹ’бһҸбһ¶бһҮбҹҶбһҡбһ»бһүбһ…бһ·бһҸбҹ’бһҸбһҠбҹ„бһҷбһӮбҹҶбһ“бһ·бһҸбһ“бҹғбһҖбһ¶бһҡбһҳбһ¶бһ“бһ•бҹ’бһ‘бҹҮбһҠбҹӮбһӣбһҳбһ¶бһ“бһҹбһ»бһңбһҸбҹ’бһҗбһ·бһ—бһ¶бһ– бһ“бһ·бһ„бһ‘бҹҶбһ“бһҫбһ”бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһӮбҹ’бһҡбһҪбһҹбһ¶бһҡбһҡбһ”бһҹбҹӢбһ–бһҪбһҖбһӮбһ¶бһҸбҹӢбһ“бҹ…бһҖбҹ’бһ“бһ»бһ„бһҹбһ бһӮбһҳбһ“бҹҚбһҠбҹӮбһӣбһӮбһҪбһҡбһұбҹ’бһҷбһ‘бһ»бһҖбһ…бһ·бһҸбҹ’бһҸбҹ” бһ–бһҪбһҖбһӮбһ¶бһҸбҹӢбһҳбһ·бһ“бһҳбһ¶бһ“бһҖбһҸбҹ’бһҸбһ¶бһҮбҹҶбһҡбһ»бһүбһ…бһҳбҹ’бһ”бһ„бһҠбҹ„бһҷбһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһ“бҹ„бҹҮбһЎбһҫбһҷбҹ” бһҖбҹҒбһҡбҹ’бһҸбһ·бҹҚбһҲбҹ’бһҳбҹ„бҹҮбһҖбҹ’бһҡбһ»бһҳбһ бҹҠбһ»бһ“бһ :"\"бһҒбҹ’бһүбһ»бҹҶбһ“бһ№бһ„бһ•бҹ’бһүбһҫбһҮбһјбһ“бһ”бһ„бһ“бҹ…бһҗбҹ’бһ„бҹғбһ“бҹҒбҹҮбҹ” бһ”бҹ’бһҡбһҹбһ·бһ“бһ”бһҫбһҳбһ¶бһ“бһ”бҹ’бһҡбһҷбҹ„бһҮбһ“бҹҚ бһҒбҹ’бһүбһ»бҹҶбһҖбҹҸбһҡбһёбһҖбһҡбһ¶бһҷбһ“бһ№бһ„бһ…бһјбһӣбһҡбһҪбһҳбһҖбҹ’бһ“бһ»бһ„бһҮбҹҶбһ“бһҪбһ”бһҮбһ¶бһҳбһҪбһҷбһӮбҹ’бһҡбһҪбһҹбһ¶бһҡбһҡбһ”бһҹбҹӢбһ”бһ„бһҠбҹӮбһҡ вҖ” бһҸбһ¶бһҳбһ‘бһјбһҡбһҹбҹҗбһ–бҹ’бһ‘ бһ¬бһҮбһҪбһ”бһ•бҹ’бһ‘бһ¶бһӣбҹӢ вҖ” бһҠбһҫбһҳбҹ’бһ”бһёбһҶбҹ’бһӣбһҫбһҷбһҹбҹҶбһҺбһҪбһҡбһ•бҹ’бһҹбҹҒбһ„бҹ—бһҠбҹӮбһӣбһӮбһ¶бһҸбҹӢбһҳбһ¶бһ“бһҠбҹ„бһҷбһ•бҹ’бһ‘бһ¶бһӣбҹӢбҹ”\""},{"role":"note","text":"бһҖбһ¶бһҡбһ”бһјбһҖбһҹбһҡбһ»бһ”бһҹбһ„бҹ’бһҒбҹҒбһ”бҹ– бһҸбһҫбһ—бҹ’бһ“бһ¶бһҖбҹӢбһ„бһ¶бһҡбһ”бһ¶бһ“бһ‘бһ”бҹӢбһ‘бһӣбҹӢбһ“бһ№бһ„бһҖбһ¶бһҡбһ”бһ„бҹ’бһҖбһҫбһҸбһ—бһ¶бһ–бһ”бһ“бҹ’бһ‘бһ¶бһ“бҹӢбһҠбҹӮбһҡбһ¬бһ‘бҹҒ? бһҸбһҫбһ–бһҪбһҖбһӮбһ¶бһҸбҹӢбһ”бһ¶бһ“бһӮбһ¶бҹҶбһ‘бҹ’бһҡбһҠбҹҶбһҺбһҫбһҡбһҖбһ¶бһҡбһҖбҹ’бһ“бһ»бһ„бһӮбҹ’бһҡбһҪбһҹбһ¶бһҡбһҠбҹ„бһҷбһҹбһҖбһҳбҹ’бһҳбһҠбҹӮбһҡбһ¬бһ‘бҹҒ?"}],"debrief":"бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһўбһҸбһ·бһҗбһ·бһҮбһ“бһҒбҹ’бһҳбҹӮбһҡ бһӮбҹ’бһҡбһҪбһҹбһ¶бһҡбһӮбһәбһҮбһ¶бһ•бҹ’бһ“бҹӮбһҖбһҳбһҪбһҷбһ“бҹғбһҖбһ¶бһҡбһҹбһҳбҹ’бһҡбҹҒбһ…бһ…бһ·бһҸбҹ’бһҸбҹ” бһҸбҹ’бһҡбһјбһңбһӮбһ¶бҹҶбһ‘бҹ’бһҡбһңбһ¶ вҖ” бһҳбһ·бһ“бһҳбҹӮбһ“бһӮбҹ’бһҡбһ¶бһ“бҹӢбһҸбҹӮбһўбһҸбҹӢбһ‘бҹ’бһҡбһ¶бҹҶбһ“бҹ„бҹҮбһ‘бҹҒбҹ” бһ—бҹ’бһ“бһ¶бһҖбҹӢбһ„бһ¶бһҡбһҠбҹӮбһӣбһ’бҹ’бһңбһҫбһұбҹ’бһҷбһӮбҹ’бһҡбһҪбһҹбһ¶бһҡбһҳбһ¶бһ“бһўбһ¶бһҡбһҳбҹ’бһҳбһҺбҹҚбһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бһҖбһ¶бһҡбһӮбҹ„бһҡбһ– бһ“бһ№бһ„бһ”бһ·бһ‘бһҖбһ¶бһҡбһӣбһҖбҹӢбһ”бһ¶бһ“бҹ” бһ—бҹ’бһ“бһ¶бһҖбҹӢбһ„бһ¶бһҡбһҠбҹӮбһӣбһ”бһ„бҹ’бһҖбһҫбһҸбһҹбһҳбҹ’бһ–бһ¶бһ’ бһ“бһ№бһ„бһ”бһ¶бһҸбҹӢбһ”бһ„бҹӢбһңбһ¶бҹ”"},"quiz":[{"q":"бһўбҹ’бһ“бһҖбһ‘бһ·бһүбһҒбҹ’бһҳбҹӮбһҡбһҖбҹ’бһ“бһ»бһ„бһҹбҹ’бһҡбһ»бһҖбһҳбҹ’бһ“бһ¶бһҖбҹӢбһ“бһ·бһҷбһ¶бһҷбһҗбһ¶ 'бһӘбһ–бһ»бһҖбһҳбҹ’бһҸбһ¶бһҷбһҒбҹ’бһүбһ»бҹҶбһ…бһ„бҹӢбһҳбһҫбһӣбһўбһӮбһ¶бһҡбһҹбһ·бһ“бҹ”' бһўбҹ’бһ“бһҖбһӮбһҪбһҡбһҸбҹӮбҹ–","opts":["бһ”бҹ’бһҡбһ¶бһ”бҹӢбһ–бһҪбһҖбһӮбһ¶бһҸбҹӢбһҗбһ¶бһ–бһҪбһҖбһӮбһ¶бһҸбҹӢбһўбһ¶бһ…бһ‘бҹ…бһҳбһҫбһӣбһ”бһ¶бһ“бһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ–бһёбһҖбһҖбҹӢбһ‘бһ»бһҖбһҡбһҖбҹ’бһҹбһ¶бһҷбһјбһ“бһёбһҸ","бһ•бҹ’бһҸбһӣбҹӢбһҮбһјбһ“бһҖбһ¶бһҡбһҡбҹҖбһ”бһ…бҹҶбһҖбһ¶бһҡбһ… ӢбһҖбһ¶бһҡбһ–бһ·бһ—бһ¶бһҖбҹ’бһҹбһ¶бһҖбҹ’бһ“бһ»бһ„бһӮбҹ’бһҡбһҪбһҹбһ¶бһҡбһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖбһ‘бһ·бһүбһҒбҹ’бһҳбҹӮбһҡ бһўбҹ’бһ“бһҖбһӮбһҪбһҡбһҸбҹӮбһҡбһ¶бһ”бҹӢбһ”бһүбҹ’бһ…бһјбһӣбҹ–","opts":["бһҖбһ¶бһҡбһңбһ·бһ—бһ¶бһӮбһҖбһ¶бһҡбһңбһ·бһ“бһ·бһҷбҹ„бһӮбһ–бҹҒбһүбһӣбҹҒбһү бһҮбһ¶бһҳбһҪбһҷбһҸбһ¶бһҡбһ¶бһ„бһ•бһӣбһ…бҹҶбһҺбҹҒбһү","бһҹбҹҒбһ…бһҖбҹ’бһҸбһёбһҹбһ„бҹ’бһҒбҹҒбһ”бһҹбһ¶бһҳбһүбҹ’бһү бһ“бһ·бһ„бһ…бҹ’бһ”бһ¶бһҹбҹӢбһӣбһ¶бһҹбҹӢбҹ– бһҲбҹ’бһҳбҹ„бҹҮбһӮбһҳбҹ’бһҡбҹ„бһ„ бһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ·бһҹбҹ’бһ“бһ¶бһҠбҹғбһҖбҹ’бһҡбһ»бһҳбһ бҹҠбһ»бһ“бһўбһ—бһ·бһңбһҢбҹ’бһҚбһ“бҹҚ бһ•бҹӮбһ“бһҖбһ¶бһҡбһ”бһ„бҹӢбһ”бҹ’бһҡбһ¶бһҖбҹӢ бһ…бҹҶбһҺбһ¶бһҷбһ”бҹ’бһҡбһ…бһ¶бҹҶбһҒбҹӮ","бһҳбһ¶бһ“бһҸбҹӮбһ”бҹ’бһҡбһјбһҹбҹҠбһҪбһҡбһҡбһ”бһҹбҹӢбһҖбҹ’бһҡбһ»бһҳбһ бҹҠбһ»бһ“бһўбһ—бһ·бһңбһҢбҹ’бһҚбһ“бҹҚбһ”бҹүбһ»бһҺбҹ’бһҺбҹ„бҹҮ вҖ” бһ‘бһ»бһҖбһұбҹ’бһҷбһӮбҹ’бһҡбһҪбһҹбһ¶бһҡбһҹбҹ’бһҡбһ¶бһңбһҮбҹ’бһҡбһ¶бһңбһҠбҹ„бһҷбһҒбҹ’бһӣбһҪбһ“бһҜбһ„","бһҖбһ¶бһҡбһ”бҹ’бһҡбҹҖбһ”бһ’бҹҖбһ”бһҸбһҳбҹ’бһӣбҹғ бһ’бҹҖбһ”бһ“бһ№бһ„бһӮбһҳбҹ’бһҡбҹ„бһ„бһ•бҹ’бһҹбҹҒбһ„бһ‘бҹҖбһҸбһ“бҹ…бһҖбҹ’бһ“бһ»бһ„бһҸбҹҶбһ”бһ“бҹӢбһҠбһҠбҹӮбһӣ"],"correct":1,"explain":"бһҡбһҖбҹ’бһҹбһ¶бһңбһ¶бһұбҹ’бһҷбһҹбһ¶бһҳбһүбҹ’бһү бһ“бһ·бһ„бһ…бҹ’бһ”бһ¶бһҹбҹӢбһӣбһ¶бһҹбҹӢбҹ” бһӮбҹ’бһҡбһҪбһҹбһ¶бһҡбһҸбҹ’бһҡбһјбһңбһҖбһ¶бһҡбһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһҡбһ¶бһ“бҹӢбһҠбһҫбһҳбҹ’бһ”бһёбһұбҹ’бһҷбһҳбһ¶бһ“бһ‘бҹҶбһ“бһ»бһҖбһ…бһ·бһҸбҹ’бһҸ вҖ” бһҳбһ·бһ“бһҳбҹӮбһ“бһҖбһ¶бһҡбһ„бһҝбһ„бһҶбҹ’бһ„бһӣбҹӢбһЎбһҫбһҷбҹ” бһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ·бһҹбҹ’бһ“бһ¶бһҠбҹғбһҖбҹ’бһҡбһ»бһҳбһ бҹҠбһ»бһ“бһўбһ—бһ·бһңбһҢбҹ’бһҚбһ“бҹҚ бһ“бһ·бһ„бһ•бҹӮбһ“бһҖбһ¶бһҡбһ”бһ„бҹӢбһ”бҹ’бһҡбһ¶бһҖбҹӢ бһӮбһәбһҮбһ¶бһ…бҹҶбһҺбһ»бһ…бһ•бҹ’бһҸбһӣбҹӢбһ‘бҹҶбһ“бһ»бһҖбһ…бһ·бһҸбҹ’бһҸбһҹбҹҶбһҒбһ¶бһ“бҹӢбһ”бҹҶбһ•бһ»бһҸбһ–бһёбһҡбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһӮбҹ’бһҡбһҪбһҹбһ¶бһҡбһҒбҹ’бһҳбҹӮбһҡбһҖбҹ’бһ“бһ»бһ„бһҹбҹ’бһҡбһ»бһҖбҹ”"}]}},
{id:15,week:3,title:"Handling Objections",short:"Objections",objectives:["Recognise the 8 most common objections in the Cambodia property market","Respond to each one with data and calm вҖ” never with pressure or dismissal","Know when an objection is a buying signal versus a genuine dealbreaker"],sections:[{label:"What Objections Actually Are",heading:"Information, not rejection",body:"Every objection contains information. 'It's too expensive' means 'help me understand the value.' 'I need more time' means 'I haven't got what I need to decide yet.' 'The market is risky' means 'I don't fully trust this yet.' The agent who hears the information inside the objection вҖ” and responds to it вҖ” is the one who builds trust. The agent who tries to overcome the objection is the one who loses the client.",box:{title:"The PHC objection framework:",lines:["1. Acknowledge вҖ” confirm you heard them","2. Clarify вҖ” ask one question to understand the specific concern","3. Respond with data вҖ” never with pressure","4. Check вҖ” confirm whether the response addressed their concern","5. Move forward вҖ” propose a next step, not a close"]}},{label:"The 8 Common Objections",heading:"Know the answer to each one before you hear it",body:"These are the objections every PHC agent will face regularly. Prepare for them вҖ” not with scripts, but with facts.",rules:[{title:"'The market is too risky'",detail:"Acknowledge: 'That is a fair concern.' Data: 'The REAKH report shows transaction volume up 25% in 2025, and Cambodia is entering its second property cycle. The risk is real but the direction is clear for long-term holders.' Ask: 'What specific risk concerns you most?'"},{title:"'Yields are lower than other markets'",detail:"Agree partially: 'Net yields in Cambodia are 5вҖ“7% вҖ” lower than some frontier markets, higher than most developed ones. What matters is the combination: USD-denominated, no currency risk, and a market in early-cycle recovery.' Data: J Tower 2 combined yield = 6.85%/yr."},{title:"'I don't know the developer'",detail:"Verify: 'That is the right instinct вҖ” developer track record is the most important risk factor in this market.' Evidence: 'Megakim has completed 7 projects. Tanichu is a Japanese developer with J Tower 2 as a delivered, verified asset. Would it help to see the handover documentation?'"},{title:"'The CGT makes it less attractive'",detail:"Correct the framing: 'CGT applies to the profit on exit вҖ” not the full sale price. On a $200K exit with a $100K purchase and $40K costs, the tax is $12,000. For a 7вҖ“10 year hold with rental income, that is a small part of the total return.'"},{title:"'I've heard about developers defaulting'",detail:"Acknowledge: 'Yes вҖ” that happened to some projects in the 2015вҖ“2019 cycle.' Differentiate: 'PHC recommends only completed projects or developers with a verified track record. We do not recommend off-plan from unknown developers.'"},{title:"'The rental market seems oversupplied'",detail:"Data: 'BKK1 has 18.5% of all rental demand in Phnom Penh. Vacancy rates on well-managed completed units in central districts are low. The risk is higher in outer districts with weaker management.'"},{title:"'I want to think about it'",detail:"Ask: 'Of course вҖ” what specifically would you want to think through? I want to make sure you have all the information you need.' Then address the specific gap."},{title:"'I can get a better deal elsewhere'",detail:"Ask: 'What are you comparing this to specifically? I want to give you the most accurate comparison I can.' Never dismiss. Understand what the alternative is and engage with it honestly."}]}],roleplay:{scenario:"Handling the 'market is too risky' objection",instructions:"Practice using data calmly вҖ” acknowledge first, then respond, then check.",lines:[{role:"client",text:'"Honestly, I\'m not sure. Cambodia still feels risky to me."'},{role:"agent",text:'"That\'s a completely fair concern вҖ” and I don\'t want to dismiss it. Can I ask: what specific risk concerns you most? Is it the political environment, the developer, the legal structure, or something else?"'},{role:"client",text:'"Mostly the developer. I\'ve heard of projects that didn\'t deliver."'},{role:"agent",text:'"Yes вҖ” that did happen, primarily in the 2015вҖ“2019 off-plan boom. Some projects were launched without the capital to complete. That\'s why PHC only recommends projects from developers with a verified delivery track record. Megakim has completed 7 projects. Tanichu delivered J Tower 2 on schedule. Le CondГ© is completed and occupied. Would it help if I showed you the handover data from any of these?"'},{role:"client",text:'"Yes, that would help."'},{role:"note",text:"Debrief: Did the Agent acknowledge before responding? Did they ask a clarifying question to find the specific concern?"}],debrief:"Acknowledge, clarify, respond with data. Never skip the clarifying question вҖ” the stated objection is often not the real one. Find the actual concern, then address it."},quiz:[{q:"A client says 'yields are lower than other markets.' The PHC response is:",opts:["Agree and suggest they invest elsewhere if they want higher yields","Disagree вҖ” Cambodia yields are the highest in Asia","Acknowledge the comparison is valid, then add context: USD denomination, early-cycle recovery, verified 6.85%/yr combined return from REAKH data","Redirect to capital appreciation instead"],correct:2,explain:"Partially agree вҖ” acknowledging the comparison builds credibility. Then add the context: USD base, no currency risk, early-cycle market, verified ROI data. This is a complete answer, not a deflection."},{q:"A client says 'I've heard developers in Cambodia default.' You should:",opts:["Deny it вҖ” those were isolated incidents long ago","Acknowledge it happened in the 2015вҖ“2019 cycle, then differentiate PHC's project selection criteria","Change the subject to a positive project story","Offer a buy-back guarantee to address the concern"],correct:1,explain:"Acknowledge the truth вҖ” it happened. Then differentiate: PHC only recommends developers with verified delivery track records. This is more credible than denial, and it demonstrates that PHC's due diligence process is real."},{q:"When a client says 'I need to think about it,' the correct first response is:",opts:["Create urgency вҖ” prices may change","Ask what specifically they want to think through","Give them space and follow up in 2 weeks","Send them a project brochure to review"],correct:1,explain:"'I need to think about it' almost always contains a specific unresolved concern. Asking 'what specifically would you want to think through?' surfaces it. The answer to that question is what you need to address вҖ” not the time objection itself."},{q:"The CGT objection ('CGT makes this less attractive') is best handled by:",opts:["Agreeing and suggesting they wait until CGT is removed","Denying CGT has any real impact","Correcting the framing: CGT applies to taxable profit, not full sale price вҖ” and showing the actual calculation on their scenario","Redirecting to rental yield as the real return driver"],correct:2,explain:"Show the math. 'CGT applies to the taxable gain вҖ” on a $200K sale with $100K purchase and $40K documented costs, the tax is $12,000. Over a 7вҖ“10 year hold with rental income, that is a manageable exit cost.' The calculation dismantles the objection better than any reframe."}],reflection:"Think of the hardest objection you would find most difficult to answer. Write out how you would handle it using the PHC framework: acknowledge, clarify, respond with data, check, move forward.",km:{"title":"бһҖбһ¶бһҡбһ…бһ¶бһҸбҹӢбһ…бҹӮбһ„бһҖбһ¶бһҡбһ‘бһ¶бһҹбҹӢбһ‘бҹӮбһ„ / бһҖбһ¶бһҡбһҹбҹ’бһ‘бһ¶бһҖбҹӢбһҹбҹ’бһ‘бһҫбһҡ","short":"бһҖбһ¶бһҡбһ‘бһ¶бһҹбҹӢбһ‘бҹӮбһ„","objectives":["бһ‘бһ‘бһҪбһӣбһҹбҹ’бһӮбһ¶бһӣбҹӢбһҖбһ¶бһҡбһ‘бһ¶бһҹбҹӢбһ‘бҹӮбһ„бһ‘бһјбһ‘бҹ…бһ”бҹҶбһ•бһ»бһҸбһ‘бһ¶бҹҶбһ„ бҹЁ бһ“бҹ…бһҖбҹ’бһ“бһ»бһ„бһ‘бһёбһ•бҹ’бһҹбһ¶бһҡбһўбһ…бһӣбһ“бһ‘бҹ’бһҡбһ–бҹ’бһҷбһҖбһҳбҹ’бһ–бһ» ҡбһ бһјбһҸбһҠбһӣбҹӢ CGT бһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһӣбһ»бһ”бһ…бҹ„бһӣ","бһ”бһҠбһ·бһҹбҹҒбһ’бһҗбһ¶ CGT бһӮбҹ’бһҳбһ¶бһ“бһ•бһӣбһ”бҹүбҹҮбһ–бһ¶бһӣбҹӢбһ–бһ·бһҸбһ”бҹ’бһҡбһ¶бһҖбһҠбһЎбһҫбһҷ","бһҖбҹӮбһҸбһҳбҹ’бһҡбһјбһңбһҖбһ¶бһҡбһҖбҹҶбһҺбһҸбҹӢбһҖбҹ’бһҡбһ”бһҒбҹҗбһҺбҹ’бһҢбҹ– CGT бһўбһ“бһ»бһңбһҸбҹ’бһҸбһӣбһҫбһ”бҹ’бһҡбһ¶бһҖбҹӢбһ…бҹҶбһҺбҹҒбһүбһҠбҹӮбһӣбһҸбҹ’бһҡбһјбһңбһҮбһ¶бһ”бҹӢбһ–бһ“бҹ’бһ’ бһҳбһ·бһ“бһҳбҹӮбһ“бһҸбһҳбҹ’бһӣбҹғбһӣбһҖбҹӢбһҹбһҡбһ»бһ”бһЎбһҫбһҷ вҖ” бһ бһҫбһҷбһ”бһ„бҹ’бһ бһ¶бһүбһҖбһ¶бһҡбһӮбһҺбһ“бһ¶бһҮбһ¶бһҖбҹӢбһҹбҹ’бһҸбҹӮбһ„бһӣбһҫбһҹбҹҒбһ“бһ¶бһҡбһёбһҷбҹүбһјбһҡбһ”бһҹбҹӢбһ–бһҪбһҖбһӮбһ¶бһҸбҹӢ","бһ”бһ„бҹ’бһңбҹӮбһҡбһ‘бһ·бһҹбһҠбҹ…бһ‘бҹ…бһҖбһ¶бһ“бҹӢбһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһ–бһёбһҖбһ¶бһҡбһҮбһҪбһӣбһҮбһ¶бһҖбһҸбҹ’бһҸбһ¶бһҮбҹҶбһҡбһ»бһүбһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһ–бһ·бһҸбһ”бҹ’бһҡбһ¶бһҖбһҠ"],"correct":2,"explain":"бһ”бһ„бҹ’бһ бһ¶бһүбһҖбһ¶бһҡбһӮбһҺбһ“бһ¶бҹ” 'CGT бһўбһ“бһ»бһңбһҸбҹ’бһҸбһӣбһҫбһ”бҹ’бһҡбһ¶бһҖбҹӢбһ…бҹҶбһҺбҹҒбһүбһҠбҹӮбһӣбһҸбҹ’бһҡбһјбһңбһҮбһ¶бһ”бҹӢбһ–бһ“бҹ’бһ’ вҖ” бһӣбһҫбһҖбһ¶бһҡбһӣбһҖбҹӢ $200K бһҠбҹ„бһҷбһҳбһ¶бһ“бһҸбһҳбҹ’бһӣбҹғбһ‘бһ·бһү $100K бһ“бһ·бһ„бһ…бҹҶбһҺбһ¶бһҷ $40K бһ–бһ“бҹ’бһ’бһӮбһә $12,000бҹ” бһҖбҹ’бһ“бһ»бһ„бһҡбһҷбҹҲбһ–бҹҒбһӣ бҹ§вҖ“бҹЎбҹ  бһҶбҹ’бһ“бһ¶бҹҶ бһҮбһ¶бһҳбһҪбһҷбһ”бҹ’бһҡбһ¶бһҖбҹӢбһ…бҹҶбһҺбһјбһӣбһҮбһҪбһӣ бһ“бҹ„бҹҮбһҮбһ¶бһ…бҹҶбһҺбһ¶бһҷбһӣбһҖбҹӢбһ…бҹҒбһүбһҠбҹӮбһӣбһўбһ¶бһ…бһ…бһ¶бһҸбҹӢбһ…бҹӮбһ„бһ”бһ¶бһ“бҹ”' бһҖбһ¶бһҡбһӮбһҺбһ“бһ¶бһҡбҹҶбһӣбһ¶бһҷбһҖбһ¶бһҡбһ‘бһ¶бһҹбҹӢбһ‘бҹӮбһ„бһ”бһ¶бһ“бһӣбҹ’бһўбһҮбһ¶бһ„бһҖбһ¶бһҡбһ•бҹ’бһӣбһ¶бһҹбҹӢбһ”бҹ’бһҸбһјбһҡбһ”бһҡбһ·бһ”бһ‘бһҺбһ¶бһҳбһҪбһҷбҹ”"}]}},
{id:16,week:4,title:"Site Visits & Property Presentations",short:"Site Visits",objectives:["Know how to prepare, conduct, and debrief a site visit professionally","Understand what to emphasise вҖ” and what to never say вҖ” during a property walkthrough","Convert a strong site visit into a clear next step"],sections:[{label:"Before the Visit",heading:"Preparation is the visit",body:"Most agents show up and react to whatever happens on site. PHC agents prepare. The preparation determines 70% of the outcome. A well-prepared site visit builds authority before a single door is opened.",rules:[{title:"Research the unit before you arrive",detail:"Know the exact floor, unit number, sqm, view orientation, management fee, and payment schedule. If you have to check your phone during the visit to answer basic questions, you have already lost ground."},{title:"Set the agenda before arrival",detail:"Message the client before: 'During our visit, we will look at the unit, the amenities, meet the onsite management team if available, and I will walk you through the full cost picture.' This signals structure and professionalism."},{title:"Know the building's foreign quota status",detail:"Before the visit: confirm the remaining foreign ownership percentage. If quota is low вҖ” flag it before the visit, not during. Surprises on site destroy confidence."},{title:"Prepare your objection responses",detail:"Anticipate the 2вҖ“3 concerns most likely for this client's profile (from qualification). Think through the data responses before you walk in."}]},{label:"During the Visit",heading:"What to do вҖ” and what never to say",body:"The site visit is not a sales presentation. It is a discovery and verification experience for the client. Your role is to guide, not to sell.",rules:[{title:"Let the client lead the walkthrough",detail:"Open the door and step back. Let the client move through the space naturally. Note what they comment on. Their reactions are qualification data."},{title:"Comment on specifics, not generalities",detail:"'This floor is 17th вҖ” south-facing. You will have direct sunlight from 9am to 3pm.' Not: 'The views are amazing.' Specifics signal expertise. Generalities signal a tour guide."},{title:"Address the management team if on site",detail:"Introduce the client to the building manager or reception if possible. Third-party voices вҖ” especially from Japanese management brands вҖ” carry more weight than your own."},{title:"Never use urgency language on site",detail:"'Only 3 units left on this floor' on a site visit is a pressure tactic that sophisticated buyers immediately recognise. If inventory is genuinely limited, state it once вҖ” factually, not urgently."}]},{label:"After the Visit",heading:"The debrief is where deals are won",body:"The 15 minutes after a site visit вҖ” whether in the lobby, a nearby cafГ©, or by phone вҖ” is the most valuable advisory time in the entire sales process. Use it deliberately.",rules:[{title:"Ask three questions immediately after",detail:"'What did you like most?' В· 'What concerned you?' В· 'Does this feel like the right type of property for what you described to me?' These three questions surface everything you need for the next step."},{title:"Confirm or update your recommendation",detail:"Based on their responses, either confirm your recommendation or adjust it: 'Given what you said about space вҖ” I think the 2-bedroom at Time Square 9 would actually be a better fit. Can I show you that one next?'"},{title:"Propose one clear next step",detail:"'The natural next step is to review the SPA together. Would you like me to arrange that with our legal team this week?' Always one step. Never push for a close."},{title:"Send a written summary within 24 hours",detail:"Summary of the unit visited В· observations noted В· any open questions В· the agreed next step. This is standard PHC practice after every site visit."}]}],roleplay:{scenario:"Debrief conversation after a site visit",instructions:"Practice the three-question debrief. Do not propose any solution until all three are answered.",lines:[{role:"agent",text:'"Thank you for visiting today. Can I ask вҖ” what did you like most about the unit?"'},{role:"client",text:'"The view was better than I expected. And the building feels more solid than some I\'ve seen."'},{role:"agent",text:'"Good to hear. What concerned you вҖ” anything that gave you pause?"'},{role:"client",text:'"The size. 53 sqm feels a bit small. I\'d hoped for something larger."'},{role:"agent",text:'"That\'s really useful. Last question: does this type of project вҖ” the location, the building quality, the management вҖ” feel right for what you described to me?"'},{role:"client",text:'"Yes, I think so. Just the size issue."'},{role:"agent",text:'"In that case, let me show you the 2-bedroom option in the same building вҖ” 78sqm, same management, same view orientation. It\'s $40,000 more but the rental income is also higher вҖ” around $900/month vs $800. Would that be worth looking at?"'},{role:"note",text:"Debrief: Did the Agent ask all three questions before proposing anything? Did the pivot feel natural?"}],debrief:"The three debrief questions are not small talk вҖ” they are qualification data. The client tells you exactly how to close in their answers. Listen before you speak."},quiz:[{q:"Before a site visit, the most important thing to confirm is:",opts:["That the client has their passport","The exact floor, view, sqm, payment schedule, and current foreign quota remaining","That the developer has a good-looking showroom","That the unit has been furnished to show standard"],correct:1,explain:"Know your product before the visit. Floor, view, size, payment schedule, and especially the foreign quota вҖ” if quota is nearly full, you must disclose this before the visit, not during it."},{q:"During a site visit a client says 'the views are amazing.' The PHC agent response is:",opts:["'Yes, the views are incredible вҖ” one of the best in Phnom Penh!'","'This unit is floor 17, south-facing. Direct sunlight from 9am to 3pm, clear river view year-round.'","'Wait until you see the amenities downstairs.'","'Many clients have said the same thing вҖ” this is a very popular floor.'"],correct:1,explain:"Specifics signal expertise. Agreeing with 'amazing' signals a tour guide. State the facts вҖ” floor, orientation, light hours, view characteristics. This is what an Investment Advisor sounds like on a site visit."},{q:"Immediately after a site visit, the three questions you ask are:",opts:["'Are you ready to book?' В· 'What budget do you have?' В· 'When can you sign?'","'What did you like most?' В· 'What concerned you?' В· 'Does this feel like the right type for your goals?'","'Did you love it?' В· 'Shall I check availability?' В· 'When would you move in?'","'What did you think?' В· 'Any questions?' В· 'Want to see another?'"],correct:1,explain:"These three questions surface the client's positive signals, residual concerns, and fit assessment вҖ” all the information needed to propose the correct next step or pivot to a better match."},{q:"The correct next step to propose after a strong site visit is:",opts:["A booking deposit вҖ” strike while enthusiasm is high","A review of the SPA with the legal team, or viewing the next matched unit","A follow-up call in two weeks when they have had time to think","A meeting with Nick to discuss commitment"],correct:1,explain:"One clear, structured next step. Either SPA review with legal support, or a follow-up viewing of a better-matched unit. Never push for a close on the same day as a first site visit вҖ” it signals pressure, not advisory."}],reflection:"Describe what an ideal site visit looks like from your perspective вҖ” from the moment you message the client before arrival to the written follow-up the next day.",km:{"title":"бһҖбһ¶бһҡбһ…бһ»бҹҮбһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһ‘бһёбһҸбһ¶бҹҶбһ„бһ•бҹ’бһ‘бһ¶бһӣбҹӢ бһ“бһ·бһ„бһҖбһ¶бһҡбһ’бҹ’бһңбһҫбһ”бһ‘бһ”бһ„бҹ’бһ бһ¶бһүбһўбҹҶбһ–бһёбһўбһ…бһӣбһ“бһ‘бҹ’бһҡбһ–бҹ’бһҷ","short":"бһҖбһ¶бһҡбһ…бһ»бҹҮбһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһ‘бһёбһҸбһ¶бҹҶбһ„бһ•бҹ’бһ‘бһ¶бһӣбҹӢ","objectives":["бһҷбһӣбҹӢбһҠбһ№бһ„бһ–бһёбһҡбһ”бҹҖбһ”бһҡбҹҖбһ”бһ…бҹҶ бһҠбһ№бһҖбһ“бһ¶бҹҶ бһ“бһ·бһ„бһ”бһјбһҖбһҹбһҡбһ»бһ”бһңбһ¶бһҷбһҸбһҳбҹ’бһӣбҹғбһҖбһ¶бһҡбһ…бһ»бҹҮбһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһ‘бһёбһҸбһ¶бҹҶбһ„бһ•бҹ’бһ‘бһ¶бһӣбҹӢбһ”бҹ’бһҡбһҖбһ”бһҠбҹ„бһҷбһўбһ¶бһҮбһёбһ–","бһҷбһӣбҹӢбһҠбһ№бһ„бһ–бһёбһўбҹ’бһңбһёбһҠбҹӮбһӣбһҸбҹ’бһҡбһјбһңбһҹбһ„бҹ’бһҖбһҸбҹӢбһ’бҹ’бһ„бһ“бҹӢ вҖ” бһ“бһ·бһ„бһўбҹ’бһңбһёбһҠбҹӮбһӣбһҠбһ¶бһ…бҹӢбһҒбһ¶бһҸбһҳбһ·бһ“бһҸбҹ’бһҡбһјбһңбһ“бһ·бһҷбһ¶бһҷ вҖ” бһҖбҹ’бһ“бһ»бһ„бһўбҹҶбһЎбһ»бһ„бһ–бҹҒбһӣбһҠбһҫбһҡбһ‘бһҹбҹ’бһҹбһ“бһ¶бһўбһ…бһӣбһ“бһ‘бҹ’бһҡбһ–бҹ’бһҷ","бһ”бһҳбҹ’бһӣбҹӮбһ„бһҖбһ¶бһҡбһ…бһ»бҹҮбһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһ‘бһёбһҸбһ¶бҹҶбһ„бһ”бҹ’бһҡбһҖбһ”бһҠбҹ„бһҷбһӣбһ‘бҹ’бһ’бһ•бһӣбһӣбҹ’бһўбһұбҹ’бһҷбһ‘бҹ…бһҮбһ¶бһҮбҹҶбһ бһ¶бһ“бһ”бһ“бҹ’бһҸбһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһҷбҹүбһ¶бһ„бһ…бҹ’бһ”бһ¶бһҹбҹӢбһӣбһ¶бһҹбҹӢ"],"sections":[{"label":"бһҳбһ»бһ“бһ–бҹҒбһӣбһ…бһ»бҹҮбһ–бһ·бһ“бһ·бһҸбҹ’бһҷ","heading":"бһҖбһ¶бһҡбһҡбҹҖбһ”бһ…бҹҶбһ‘бһ»бһҖбһҮбһ¶бһҳбһ»бһ“ бһӮбһәбһҮбһ¶бһӮбһ“бҹ’бһӣбһ№бҹҮбһ“бҹғбһҖбһ¶бһҡбһ…бһ»бҹҮбһ–бһ·бһ“бһ·бһҸбҹ’бһҷ","body":"бһ—бҹ’бһ“бһ¶бһҖбҹӢбһ„бһ¶бһҡбһ—бһ¶бһӮбһ…бҹ’бһҡбһҫбһ“бһӮбҹ’бһҡбһ¶бһ“бҹӢбһҸбҹӮбһҳбһҖбһҠбһӣбҹӢбһ‘бһёбһҸбһ¶бҹҶбһ„ бһ бһҫбһҷбһҶбҹ’бһӣбһҫбһҷбһҸбһ”бһҸбһ¶бһҳбһҹбҹ’бһҗбһ¶бһ“бһ—бһ¶бһ–бһҮбһ¶бһҖбҹӢбһҹбҹ’бһҸбҹӮбһ„бһҠбҹӮбһӣбһҖбһҫбһҸбһЎбһҫбһ„бһ”бҹүбһ»бһҺбҹ’бһҺбҹ„бҹҮбҹ” бһ—бҹ’бһ“бһ¶бһҖбҹӢбһ„бһ¶бһҡ PHC бһҸбҹӮбһ„бһҸбҹӮбһҡбҹҖбһ”бһ…бҹҶбһ‘бһ»бһҖбһҮбһ¶бһҳбһ»бһ“бҹ” бһҖбһ¶бһҡбһҡбҹҖбһ”бһ…бҹҶбһ‘бһ»бһҖбһҮбһ¶бһҳбһ»бһ“бһҖбҹҶбһҺбһҸбҹӢбһӣбһ‘бҹ’бһ’бһ•бһӣбһҡбһ бһјбһҸбһҠбһӣбҹӢ 70%бҹ” бһҖбһ¶бһҡбһҡбҹҖбһ”бһ…бҹҶбһ…бһ»бҹҮбһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһ‘бһёбһҸбһ¶бҹҶбһ„бһ”бһ¶бһ“бһӣбҹ’бһў бһ”бһ„бҹ’бһҖбһҫбһҸбһ”бһ¶бһ“бһҮбһ¶бһҘбһ‘бҹ’бһ’бһ·бһ–бһӣ бһ“бһ·бһ„бһҮбҹҶбһ“бһҝбһ‘бһ»бһҖбһ…бһ·бһҸбҹ’бһҸ бһҸбһ¶бҹҶбһ„бһ–бһёбһҳбһ»бһ“бһ–бҹҒбһӣбһ”бһҫбһҖбһ‘бҹ’бһңбһ¶бһҡбһўбһ…бһӣбһ“бһ‘бҹ’бһҡбһ–бҹ’бһҷбһ‘бҹ…бһ‘бҹҖбһҸбҹ”","rules":[{"title":"бһҹбҹ’бһҡбһ¶бһңбһҮбҹ’бһҡбһ¶бһңбһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бһҷбһјбһ“бһёбһҸбһұбҹ’бһҷбһ”бһ¶бһ“бһ…бҹ’бһ”бһ¶бһҹбҹӢбһҳбһ»бһ“бһ–бҹҒ бһҖбҹӢбһҹбҹ’бһ‘бһ¶бһҖбҹӢ?\""},{"role":"client","text":"\"бһ‘бҹҶбһ бҹҶбҹ” 53sqm бһўбһ¶бһҡбһҳбҹ’бһҳбһҺбҹҚбһҗбһ¶бһҡбҹҖбһ„бһҸбһјбһ…бһ”бһ“бҹ’бһҸбһ·бһ…бҹ” бһҒбҹ’бһүбһ»бҹҶбһҹбһ„бҹ’бһғбһ№бһҳбһҗбһ¶бһ“бһ№бһ„бһ”бһ¶бһ“бһ‘бҹҶбһ бҹҶбһ’бҹҶбһҮбһ¶бһ„бһ“бҹҒбҹҮбһ”бһ“бҹ’бһҸбһ·бһ…бҹ”\""},{"role":"agent","text":"\"бһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бһ“бҹҒбҹҮбһ–бһ·бһҸбһҮбһ¶бһҳбһ¶бһ“бһ”бҹ’бһҡбһҷбҹ„бһҮбһ“бҹҚбһҒбҹ’бһӣбһ¶бҹҶбһ„бһҺбһ¶бһҹбҹӢбҹ” бһҹбҹҶбһҺбһҪбһҡбһ…бһ»бһ„бһҖбҹ’бһҡбҹ„бһҷбҹ– бһҸбһҫбһӮбһҳбҹ’бһҡбҹ„бһ„бһ”бҹ’бһҡбһ—бҹҒбһ‘бһ“бҹҒбҹҮ вҖ” бһ‘бһёбһҸбһ¶бҹҶбһ„ бһӮбһ»бһҺбһ—бһ¶бһ–бһўбһӮбһ¶бһҡ бһҖбһ¶бһҡбһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһҡбһ„ вҖ” бһҳбһ¶бһ“бһўбһ¶бһҡбһҳбҹ’бһҳбһҺбҹҚбһҗбһ¶бһҹбһҳбһҹбҹ’бһҡбһ”бһ“бһ№бһ„бһўбҹ’бһңбһёбһҠбҹӮбһӣбһўбҹ’бһ“бһҖбһ”бһ¶бһ“бһҡбҹҖбһ”бһҡбһ¶бһ”бҹӢбһ”бҹ’бһҡбһ¶бһ”бҹӢбһҒбҹ’бһүбһ»бҹҶбһҠбҹӮбһҡбһ¬бһ‘бҹҒ?\""},{"role":"client","text":"\"бһ”бһ¶бһ‘/бһ…бһ¶бһҹ бһҒбҹ’бһүбһ»бҹҶбһӮбһ·бһҸбһҗбһ¶бһҸбҹ’бһҡбһјбһңбһ бһҫбһҷбҹ” бһӮбҹ’бһҡбһ¶бһ“бҹӢбһҸбҹӮбһҳбһ¶бһ“бһ”бһүбҹ’бһ бһ¶бһҸбҹ’бһҡбһ„бҹӢбһ‘бҹҶбһ бҹҶбһ”бҹүбһ»бһҺбҹ’бһҺбҹ„бҹҮбҹ”\""},{"role":"agent","text":"\"бһ”бһҫбһҠбһјбһ…бҹ’бһ“бҹ„бҹҮ бһҒбҹ’бһүбһ»бҹҶбһҹбһјбһҳбһ”бһ„бҹ’бһ бһ¶бһүбһҮбһҳбҹ’бһҡбһҫбһҹ 2-bedroom бһ“бҹ…бһҖбҹ’бһ“бһ»бһ„бһўбһӮбһ¶бһҡбһҮбһ¶бһҳбһҪбһҷбһӮбҹ’бһ“бһ¶бһ“бҹҒбҹҮбһҮбһјбһ“бһўбҹ’бһ“бһҖ вҖ” бһ‘бҹҶбһ бҹҶ 78sqm бһҖбһ¶бһҡбһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһҡбһ„бһҠбһјбһ…бһӮбҹ’бһ“бһ¶ бһ‘бһ·бһҹбһҠбҹ…бһ‘бһҹбҹ’бһҹбһ“бһёбһҷбһ—бһ¶бһ–бһҠбһјбһ…бһӮбҹ’бһ“бһ¶бҹ” бһңбһ¶бһҳбһ¶бһ“бһҸбһҳбҹ’бһӣбҹғбһ”бһ“бҹ’бһҗбҹӮбһҳ $40,000 бһ”бҹүбһ»бһ“бҹ’бһҸбҹӮбһ”бҹ’бһҡбһ¶бһҖбҹӢбһ…бҹҶбһҺбһјбһӣбһ–бһёбһҖбһ¶бһҡбһҮбһҪбһӣбһҖбҹҸбһҒбҹ’бһ–бһҹбҹӢбһҮбһ¶бһ„бһҠбҹӮбһҡ вҖ” бһ”бҹ’бһҡбһ бҹӮбһӣ $900/month бһ’бҹҖбһ”бһ“бһ№бһ„ $800бҹ” бһҸбһҫбһңбһ¶бһҳбһ¶бһ“бһҸбһҳбҹ’бһӣбҹғбһҹбһҳбһӣбҹ’бһҳбһҳбһ“бһ№бһ„бһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһҳбһҫбһӣбһҠбҹӮбһҡбһ¬бһ‘бҹҒ?\""},{"role":"note","text":"бһҖбһ¶бһҡбһ”бһјбһҖбһҹбһҡбһ»бһ”бһңбһ¶бһҷбһҸбһҳбҹ’бһӣбҹғбҹ– бһҸбһҫбһ—бҹ’бһ“бһ¶бһҖбҹӢбһ„бһ¶бһҡбһ”бһ¶бһ“бһҹбһҪбһҡбһҹбҹҶбһҺбһҪбһҡбһ‘бһ¶бҹҶбһ„бһ”бһёбһҳбһ»бһ“бһ–бҹҒбһӣбһҹбҹ’бһ“бһҫбһўбҹ’бһңбһёбһҳбһҪбһҷбһҠбҹӮбһҡбһ¬бһ‘бҹҒ? бһҸбһҫбһҖбһ¶бһҡбһ”бһ„бҹ’бһңбҹӮбһҡбһҹбҹ’бһҗбһ¶бһ“бһ һ„бһўбҹҶбһЎбһ»бһ„бһ–бҹҒбһӣбһ…бһ»бҹҮбһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһ‘бһёбһҸбһ¶бҹҶбһ„бҹ”"},{"q":"бһ—бҹ’бһӣбһ¶бһҳбҹ—бһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ–бһёбһҖбһ¶бһҡбһ…бһ»бҹҮбһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһ‘бһёбһҸбһ¶бҹҶбһ„ бһҹбҹҶбһҺбһҪбһҡбһ‘бһ¶бҹҶбһ„бһ”бһёбһҠбҹӮбһӣбһўбҹ’бһ“бһҖбһҸбҹ’бһҡбһјбһңбһҹбһҪбһҡбһӮбһәбҹ–","opts":["'бһҸбһҫбһўбҹ’бһ“бһҖбһҸбҹ’бһҡбҹҖбһҳбһҒбҹ’бһӣбһҪбһ“бһҖбһҖбҹӢбһ бһҫбһҷбһ¬бһ“бҹ…?' В· 'бһҸбһҫбһўбҹ’бһ“бһҖбһҳбһ¶бһ“бһҖбһүбҹ’бһ…бһ”бҹӢбһҗбһңбһ·бһҖбһ¶бһ”бҹүбһ»бһ“бҹ’бһҳбһ¶бһ“?' В· 'бһҸбһҫбһўбҹ’бһ“бһҖбһўбһ¶бһ…бһ…бһ»бҹҮбһ бһҸбҹ’бһҗбһӣбҹҒбһҒбһ¶бһ”бһ¶бһ“бһ“бҹ…бһ–бҹҒбһӣбһҺбһ¶?'","'бһҸбһҫбһўбҹ’бһңбһёбһҠбҹӮбһӣбһўбҹ’бһ“бһҖбһ–бҹҒбһүбһ…бһ·бһҸбҹ’бһҸбһ”бҹҶбһ•бһ»бһҸ?' В· 'бһҸбһҫбһҳбһ¶бһ“бһўбҹ’бһңбһёбһҠбҹӮбһӣбһ’бҹ’бһңбһҫбһұбҹ’бһҷбһўбҹ’бһ“бһҖбһ”бһ¶бһҡбһҳбҹ’бһ—бһҠбҹӮбһҡбһ¬бһ‘бҹҒ?' В· 'бһҸбһҫбһўбҹ’бһ“бһҖбһҳбһ¶бһ“бһўбһ¶бһҡбһҳбҹ’бһҳбһҺбҹҚбһҗбһ¶ бһ“бҹҒбҹҮбһҮбһ¶бһ”бҹ’бһҡбһ—бҹҒбһ‘бһҠбҹӮбһӣбһҹбһҳбһҹбҹ’бһҡбһ”бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһӮбҹ„бһӣбһҠбҹ…бһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖбһҠбҹӮбһҡбһ¬бһ‘бҹҒ?'","'бһҸбһҫбһўбҹ’бһ“бһҖбһҹбҹ’бһҡбһЎбһ¶бһүбҹӢбһңбһ¶бһ‘бҹҒ?' В· 'бһҸбһҫбһҒбҹ’бһүбһ»бҹҶбһӮбһҪбһҡбһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһҳбһҫбһӣбһҹбҹ’бһҸбһ»бһҖбһҠбҹӮбһӣбһ‘бҹҶбһ“бҹҒбһҡбһҠбҹӮбһҡбһ¬бһ‘бҹҒ?' В· 'бһҸбһҫбһўбҹ’бһ“бһҖбһ“бһ№бһ„бһҡбһҫбһ…бһјбһӣбһ“бҹ…бһ–бҹҒбһӣбһҺбһ¶?'","'бһҸбһҫбһўбҹ’бһ“бһҖбһӮбһ·бһҸбһҷбҹүбһ¶бһ„бһҺбһ¶бһҠбҹӮбһҡ?' В· 'бһҳбһ¶бһ“бһҹбҹҶбһҺбһҪбһҡбһўбҹ’бһңбһёбһ‘бҹҒ?' В· 'бһ…бһ„бҹӢбһҳбһҫбһӣбһҳбһҪбһҷбһ‘бҹҖбһҸбһ‘бҹҒ?'"],"correct":1,"explain":"бһҹбҹҶбһҺбһҪбһҡбһ‘бһ¶бҹҶбһ„бһ”бһёбһ“бҹҒбҹҮбһ”бһүбҹ’бһ…бҹҒбһүбһ“бһјбһңбһҹбһүбҹ’бһүбһ¶бһңбһ·бһҮбҹ’бһҮбһҳбһ¶бһ“бһҡбһ”бһҹбҹӢбһўбһҸбһ·бһҗбһ·бһҮбһ“ бһҖбҹ’бһҸбһёбһ”бһ¶бһҡбһҳбҹ’бһ—бһҠбҹӮбһӣбһ“бҹ…бһҹбҹҒбһҹбһҹбһӣбҹӢ бһ“бһ·бһ„бһҖбһ¶бһҡбһңбһ¶бһҷбһҸбһҳбҹ’бһӣбҹғбһ—бһ¶бһ–бһҹбһҳбһҹбҹ’бһҡбһ” вҖ” бһҡбһ¶бһӣбҹӢбһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бһ‘бһ¶бҹҶбһ„бһўбһҹбҹӢбһҠбҹӮбһӣбһҸбҹ’бһҡбһјбһңбһҖбһ¶бһҡбһҠбһҫбһҳбҹ’бһ”бһёбһҹбҹ’бһ“бһҫбһҮбҹҶбһ бһ¶бһ“бһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһҠбҹӮбһӣбһҸбҹ’бһҡбһ№бһҳбһҸбҹ’бһҡбһјбһң бһ¬бһ”бһ„бҹ’бһңбҹӮбһҡбһ‘бҹ…бһҡбһҖбһҮбһҳбҹ’бһҡбһҫбһҹбһҠбҹӮбһӣбһҹбһҳбһҹбҹ’бһҡбһ”бһҮбһ¶бһ„бҹ”"},{"q":"бһҮбҹҶбһ бһ¶бһ“бһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһҠбҹӮбһӣбһҸбҹ’бһҡбһ№бһҳбһҸбҹ’бһҡбһјбһңбһҖбҹ’бһ“бһ»бһ„бһҖбһ¶бһҡбһҹбҹ’бһ“бһҫбһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ–бһёбһҖбһ¶бһҡбһ…бһ»бҹҮбһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһ‘бһёбһҸбһ¶бҹҶбһ„бһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бһӣбһ‘бҹ’бһ’бһ•бһӣбһӣбҹ’бһўбһӮбһәбҹ–","opts":["бһҖбһ¶бһҡбһ”бҹ’бһҡбһ¶бһҖбҹӢбһҖбһҖбҹӢ вҖ” бһҹбһҳбҹ’бһҡбҹҒбһ…бһҖбһ¶бһҡбһӣбһҖбҹӢбһ—бҹ’бһӣбһ¶бһҳбҹ—бһ“бҹ…бһ–бҹҒбһӣбһҖбһ¶бһҡбһҡбҹҶбһ—бһҫбһ”бһҖбҹҶбһ–бһ»бһ„бһҳбһ¶бһ“бһҒбҹ’бһ–бһҹбҹӢ","бһҖбһ¶бһҡбһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһҳбһҫбһӣ SPA бһҮбһ¶бһҳбһҪбһҷбһҖбҹ’бһҡбһ»бһҳбһҖбһ¶бһҡбһ„бһ¶бһҡбһ…бҹ’бһ”бһ¶бһ”бҹӢ бһ¬бһҖбһ¶бһҡбһ‘бһҹбҹ’бһҹбһ“бһ¶бһҷбһјбһ“бһёбһҸбһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһҠбҹӮбһӣбһҹбһҳбһҹбҹ’бһҡбһ”","бһҖбһ¶бһҡбһ‘бһјбһҡбһҹбҹҗбһ–бҹ’бһ‘бһҸбһ¶бһҳбһҠбһ¶бһ“бһҖбҹ’бһ“бһ»бһ„бһҡбһҷбҹҲбһ–бҹҒбһӣбһ–бһёбһҡбһ”бҹ’бһҡбһҮбһ¶бһ”бҹ’бһҸбһ¶бһ бҹҚбһ“бҹ…бһ–бҹҒбһӣбһ–бһҪбһҖбһӮбһ¶бһҸбҹӢбһҳбһ¶бһ“бһ–бҹҒбһӣбһӮбһ·бһҸбһӮбһјбһҡ","бһҖбһ¶бһҡбһҮбһҪбһ”бһ–бһ·бһ—бһ¶бһҖбҹ’бһҹбһ¶бһҮбһ¶бһҳбһҪбһҷ Nick бһҠбһҫбһҳбҹ’бһ”бһёбһ–бһ·бһ—бһ¶бһҖбҹ’бһҹбһ¶бһўбҹҶбһ–бһёбһҖбһ¶бһҡбһ”бҹ’бһҸбҹҒбһҮбҹ’бһүбһ¶бһ…бһ·бһҸбҹ’бһҸ"],"correct":1,"explain":"бһҮбҹҶбһ бһ¶бһ“бһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ…бҹ’бһ”бһ¶бһҹбҹӢбһӣбһ¶бһҹбҹӢ бһ“бһ·бһ„бһҳбһ¶бһ“бһҡбһ…бһ“бһ¶бһҹбһҳбҹ’бһ–бҹҗбһ“бҹ’бһ’бһҳбһҪбһҷбҹ” бһўбһ¶бһ…бһҮбһ¶бһҖбһ¶бһҡбһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһҳбһҫбһӣ SPA бһҠбҹ„бһҷбһҳбһ¶бһ“бһҖбһ¶бһҡбһӮбһ¶бҹҶбһ‘бҹ’бһҡбһ•бҹ’бһ“бҹӮбһҖбһ…бҹ’бһ”бһ¶бһ”бҹӢ бһ¬бһҖбһ¶бһҡбһ‘бһҹбҹ’бһҹбһ“бһ¶бһҸбһ¶бһҳбһҠбһ¶бһ“бһ“бһјбһңбһҷбһјбһ“бһёбһҸбһҠбҹӮбһӣбһҹбһҳбһҹбҹ’бһҡбһ”бһҮбһ¶бһ„бҹ” бһҠбһ¶бһ…бҹӢбһҒбһ¶бһҸбһҖбһ»бҹҶбһ”бһ„бҹ’бһҒбҹҶбһҠбһҫбһҳбҹ’бһ”бһёбһ”бһүбҹ’бһ…бһ”бҹӢбһҖбһ¶бһҡбһӣбһҖбҹӢбһ“бҹ…бһҗбҹ’бһ„бҹғбһҸбҹӮбһҳбһҪбһҷбһҮбһ¶бһҳбһҪбһҷбһ“бһ№бһ„бһҖбһ¶бһҡбһ…бһ»бҹҮбһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһ‘бһёбһҸбһ¶бҹҶбһ„бһӣбһҫбһҖбһҠбҹҶбһ”бһјбһ„ вҖ” бһңбһ¶бһ”бһ„бҹ’бһ бһ¶бһүбһ–бһёбһҹбһҳбҹ’бһ–бһ¶бһ’ бһҳбһ·бһ“бһҳбҹӮбһ“бһҖбһ¶бһҡбһ”бҹ’бһҡбһ№бһҖбҹ’бһҹбһ¶бһҷбҹ„бһ”бһӣбҹӢбһЎбһҫбһҷбҹ”"}]}},
{id:17,week:4,title:"Writing Proposals & Follow-Ups",short:"Proposals & Follow-Ups",objectives:["Produce a PHC-standard written proposal after every client meeting","Write follow-up messages that add value rather than create pressure","Know the difference between a check-in and a chase"],sections:[{label:"Why Written Communication Matters",heading:"The document is the professional",body:"Verbal conversations are forgotten. Written summaries become the reference point clients return to when making decisions вҖ” often days or weeks later, sometimes shared with family or advisors in other countries. A well-written PHC proposal can close a deal without a single additional conversation. A poorly written one can undo a great meeting.",box:{title:"PHC written communication standard:",lines:["Every client meeting вҶ’ same-day written summary (email or WhatsApp structured message)","Every site visit вҶ’ written summary within 24 hours","Every qualified investor вҶ’ written proposal within 48 hours of first meeting","Format: clear, structured, data-led вҖ” no marketing language, no pressure"]}},{label:"The PHC Proposal Structure",heading:"What a proposal must contain",body:"A PHC proposal is not a brochure. It is a structured advisory document. Every section serves a purpose.",rules:[{title:"1. Client situation summary",detail:"2вҖ“3 sentences summarising what the client told you: their goal, timeline, budget, and risk profile. This shows you listened."},{title:"2. Your recommendation and why",detail:"State the 1вҖ“2 projects you recommend. For each: why this project fits their stated criteria (not why it is a great project in general)."},{title:"3. The numbers",detail:"Net yield calculation. Total cost of purchase including stamp duty. Monthly income estimate. CGT on a modelled exit scenario. Show your working."},{title:"4. Risks вҖ” explicitly stated",detail:"State the 2вҖ“3 most relevant risks for this client's profile: exit liquidity, CGT, vacancy rate, off-plan construction risk (if applicable). This is the section that builds the most trust."},{title:"5. Clear next step",detail:"One action. 'I suggest we schedule an SPA review with our legal team this week.' Not multiple options вҖ” one clear proposal."}]},{label:"Follow-Up Principles",heading:"Add value or stay silent",body:"The most common follow-up mistake is sending a message that adds no new information and simply says 'just checking in.' This is pressure disguised as care. PHC follow-ups always add something: a market update, a relevant data point, a direct answer to an open question.",rules:[{title:"The value-add check-in",detail:"'I wanted to share that the foreign quota on Le CondГ© has moved to 64% as of this week вҖ” relevant to your timeline. Let me know if you would like to discuss.' This is a check-in with a reason."},{title:"The answer to an open question",detail:"If the client asked something you could not answer immediately, the follow-up is the answer. 'You asked about the management fee at J Tower 3 вҖ” I confirmed it is $1.8/sqm/month, identical to J Tower 2.' This is high-trust follow-up."},{title:"The re-qualification after silence",detail:"After 7вҖ“10 days of no response: 'I wanted to reach out вҖ” not to push, but to check if anything has changed in your timeline or situation. If there is new information I can provide, I am happy to do so.' This is professional. 'Are you still interested?' is not."}]}],roleplay:{scenario:"Sending a follow-up after a first meeting with a European investor",instructions:"Write the message live. Read it aloud before the debrief.",lines:[{role:"note",text:"Context: German investor, 52, interested in Le CondГ© or J Tower 3, timeline 3вҖ“6 months, $200K budget, main concern was exit liquidity."},  {role:"agent",text:"'Dear Mr. Schmidt, thank you for visiting us today. As discussed, I am attaching a summary of the two projects I recommended for your profile, along with the full cost calculations and the risks I mentioned вҖ” including exit liquidity. The key numbers: Le CondГ© 1BR, BKK1, completed: total cost ~$164K including stamp duty. Net yield estimate ~5.2%. The REAKH J Tower 2 case study (5-year verified result) is included as a reference point for realistic long-term return. Next step I would suggest: a call with our European advisor Reza, who can walk you through the legal structure in detail. Are you available this week? Best regards, [Agent Name], Property Hub Cambodia.'"},{role:"note",text:"Debrief: Was there any pressure language? Were the risks visible? Was there exactly one next step?"}],debrief:"The best follow-up reads like a memo from a trusted advisor, not a message from a salesperson. If it could have been sent by an agent at any agency, it is not PHC quality. It should be specific to what that client told you."},quiz:[{q:"A PHC written proposal must always include:",opts:["A developer brochure and price list","Client situation summary, recommendation with rationale, net yield numbers, risks, and one next step","A comparison of at least 5 projects","Testimonials from previous clients"],correct:1,explain:"The five components: client situation (you listened) В· recommendation with rationale (you matched) В· numbers (you are precise) В· risks (you are honest) В· one next step (you are clear). Each component has a trust function."},{q:"A client has not responded for 8 days. The PHC follow-up message is:",opts:["'Hi, just checking in вҖ” are you still interested?'","'Hi, prices on Le CondГ© may be moving вҖ” wanted to give you a heads up.'","'I wanted to reach out вҖ” not to push, but to check if anything has changed in your timeline or if there is new information I can provide.'","'Hi, I have not heard from you. Do you want to proceed or not?'"],correct:2,explain:"The re-qualification follow-up after silence is a professional check-in, not pressure. It opens a door without pushing through it. 'Not to push' is a PHC phrase вҖ” it signals advisor behaviour, not sales behaviour."},{q:"The risks section in a PHC proposal is:",opts:["Optional вҖ” only include if the client asked about risks","A brief disclaimer at the bottom","A prominent, explicitly stated list of the 2вҖ“3 most relevant risks for this client's profile","Only required for off-plan projects"],correct:2,explain:"The risks section is the most trust-building part of the proposal. It shows the client you are an advisor, not a salesperson. Make it prominent and specific to their profile вҖ” not a generic legal disclaimer."},{q:"Which of the following is a PHC-quality follow-up message?",opts:["'Just wanted to check вҖ” any decision yet?'","'I confirmed the management fee at J Tower 3 that you asked about вҖ” $1.8/sqm/month, same as J Tower 2. Happy to walk through the full cost model if useful.'","'Hi! Great meeting yesterday. Let me know if you want to move forward.'","'The market is moving fast вҖ” you should decide soon.'"],correct:1,explain:"This follows the value-add principle: it answers an open question, it is specific to the conversation, and it adds new information. No pressure, no urgency вҖ” just professional follow-through."}],reflection:"Write a PHC-standard proposal for a Japanese investor who is interested in J Tower 3, has a $200K budget, and whose main concern is developer reliability.",km:{"title":"бһҖбһ¶бһҡбһҹбһҡбһҹбҹҒбһҡбһҹбҹҶбһҺбһҫ бһ“бһ·бһ„бһҖбһ¶бһҡбһ•бҹ’бһүбһҫбһҹбһ¶бһҡбһҸбһ¶бһҳбһҠбһ¶бһ“","short":"бһҹбҹҶбһҺбһҫ бһ“бһ·бһ„бһҖбһ¶бһҡбһ•бҹ’бһүбһҫбһҹбһ¶бһҡбһҸбһ¶бһҳбһҠбһ¶бһ“","objectives":["бһҡбҹҖбһ”бһ…бҹҶбһҹбҹҶбһҺбһҫбһҮбһ¶бһӣбһ¶бһҷбһӣбһҖбҹ’бһҒбһҺбҹҚбһўбһҖбҹ’бһҹбһҡбһҸбһ¶бһҳбһҹбҹ’бһҸбһ„бҹӢбһҠбһ¶бһҡ PHC бһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ–бһёбһҖбһ¶бһҡбһҮбһҪбһ”бһ–бһ·бһ—бһ¶бһҖбҹ’бһҹбһ¶бһҮбһ¶бһҳбһҪбһҷбһўбһҸбһ·бһҗбһ·бһҮбһ“бһӮбҹ’бһҡбһ”бҹӢбһ–бҹҒбһӣ","бһҹбһҡбһҹбҹҒбһҡбһҹбһ¶бһҡбһҸбһ¶бһҳбһҠбһ¶бһ“бһҠбҹӮбһӣбһ”бһ“бҹ’бһҗбҹӮбһҳбһҸбһҳбҹ’бһӣбҹғ бһҮбһ¶бһҮбһ¶бһ„бһҖбһ¶бһҡбһ”бһ„бҹ’бһҖбһҫбһҸбһҹбһҳбҹ’бһ–бһ¶бһ’","бһҹбҹ’бһӮбһ¶бһӣбҹӢбһ–бһёбһ—бһ¶бһ–бһҒбһ»бһҹбһӮбҹ’бһ“бһ¶бһҡбһңбһ¶бһ„бһҖбһ¶бһҡбһ•бҹ’бһүбһҫбһҹбһ¶бһҡбһҹбһҪбһҡбһҹбһ»бһҒбһ‘бһ»бһҖбҹ’бһҒбһ”бһ“бҹ’бһҗбҹӮбһҳбһҸбһҳбҹ’бһӣбҹғ (check-in) бһ“бһ·бһ„бһҖбһ¶бһҡбһҠбҹҒбһүбһҠбҹ„бһӣбһҸбһ¶бһҳбһ‘бһ¶бһҡ (chase)"],"sections":[{"label":"бһ бҹҒбһҸбһ»бһўбҹ’бһңбһёбһ”бһ¶бһ“бһҮбһ¶бһҖбһ¶бһҡбһ‘бһ¶бһҖбҹӢбһ‘бһ„бһҮбһ¶бһӣбһ¶бһҷбһӣбһҖбҹ’бһҒбһҺбҹҚбһўбһҖбҹ’бһҹбһҡбһҳбһ¶бһ“бһҹбһ¶бһҡбҹҲбһҹбҹҶбһҒбһ¶бһ“бҹӢ","heading":"бһҜбһҖбһҹбһ¶бһҡбһӮбһәбһҮбһ¶бһҳбһ»бһҒбһҳбһ¶бһҸбҹӢбһ“бҹғбһўбһ¶бһҮбһёбһ–","body":"бһҖбһ¶бһҡбһҹбһ“бҹ’бһ‘бһ“бһ¶бһҸбһ¶бһҳбһҳбһ¶бһҸбҹӢбһ‘бһ‘бҹҒбһ“бһ№бһ„бһҸбҹ’бһҡбһјбһңбһ—бҹ’бһӣбҹҒбһ…бһ—бҹ’бһӣбһ¶бҹҶбһ„бҹ” бһҹбҹҒбһ…бһҖбҹ’бһҸбһёбһҹбһ„бҹ’бһҒбҹҒбһ”бһҮбһ¶бһӣбһ¶бһҷбһӣбһҖбҹ’бһҒбһҺбҹҚбһўбһҖбҹ’бһҹбһҡбһ“бһ№бһ„бһҖбҹ’бһӣбһ¶бһҷбһҮбһ¶бһ…бҹҶбһҺбһ»бһ…бһҷбҹ„бһ„бһҠбҹӮбһӣбһўбһҸбһ·бһҗбһ·бһҮбһ“бһҸбҹ’бһҡбһЎбһ”бҹӢбһҳбһҖбһҳбһҫбһӣбһңбһ·бһүбһ“бҹ…бһ–бҹҒбһӣбһ’бҹ’бһңбһҫбһҖбһ¶бһҡбһҹбһҳбҹ’бһҡбҹҒбһ…бһ…бһ·бһҸбҹ’бһҸ вҖ” бһҮбһ¶бһүбһ№бһҖбһүбһ¶бһ”бҹӢбһ…бҹ’бһҡбһҫбһ“бһҗбҹ’бһ„бҹғбһ¬бһ…бҹ’бһҡбһҫбһ“бһҹбһ”бҹ’бһҸбһ¶бһ бҹҚбһҖбҹ’бһҡбҹ„бһҷбһҳбһҖ бһҠбҹ„бһҷбһҮбһҪбһ“бһҖбһ¶бһӣбһҸбҹ’бһҡбһјбһңбһ…бҹӮбһҖбһҡбҹҶбһӣбҹӮбһҖбһҮбһ¶бһҳбһҪбһҷбһӮбҹ’бһҡбһҪбһҹбһ¶бһҡ бһ¬бһ‘бһёбһ”бҹ’бһҡбһ№бһҖбҹ’бһҹбһ¶бһ“бҹ…бһ”бҹ’бһҡбһ‘бҹҒбһҹбһ•бҹ’бһҹбҹҒбһ„бһ‘бҹҖбһҸбҹ” бһҹбҹҶбһҺбһҫ PHC бһҠбҹӮбһӣбһҹбһҡбһҹбҹҒбһҡбһ”бһ¶бһ“бһӣбҹ’бһўбһўбһ¶бһ…бһ”бһүбҹ’бһ…бһ”бҹӢбһҖбһ¶бһҡбһӣбһҖбҹӢбһ”бһ¶бһ“бһҠбҹ„бһҷбһҳбһ·бһ“бһ”бһ¶бһ…бҹӢбһҳбһ¶бһ“бһҖбһ¶бһҡбһҹбһ“бҹ’бһ‘бһ“бһ¶бһ”бһ“бҹ’бһҗбҹӮбһҳбһҹбһјбһҳбҹ’бһ”бһёбһҳбһҪбһҷбһҳбҹүбһ¶бһҸбҹӢбҹ” бһ…бҹҶбһҺбҹӮбһҖбһҹбҹҶбһҺбһҫбһҠбҹӮбһӣбһҹбһҡбһҹбҹҒбһҡбһҳбһ·бһ“бһ”бһ¶бһ“бһӣбҹ’бһў бһўбһ¶бһ…бһ”бҹҶбһ•бҹ’бһӣбһ¶бһүбһҮбҹҶбһ“бһҪбһ”бһ–бһ·бһ—бһ¶бһҖбҹ’бһҹбһ¶бһҠбҹҸбһӣбҹ’бһўбһҘбһҸбһҒбҹ’бһ…бҹ„бҹҮбһ”бһ¶бһ“бҹ”","box":{"title":"бһҹбҹ’бһҸбһ„бҹӢбһҠбһ¶бһҡбһҖбһ¶бһҡбһ‘бһ¶бһҖбҹӢбһ‘бһ„бһҮбһ¶бһӣбһ¶бһҷбһӣбһҖбҹ’бһҒбһҺбҹҚбһўбһҖбҹ’бһҹбһҡ PHCбҹ–","lines":["бһҡбһ¶бһӣбҹӢбһҖбһ¶бһҡбһҮбһҪбһ”бһ–бһ·бһ—бһ¶бһҖбҹ’бһҹбһ¶бһҮбһ¶бһҳбһҪбһҷбһўбһҸбһ·бһҗбһ·бһҮбһ“ вҶ’ бһҹбҹҒбһ…бһҖбҹ’бһҸбһёбһҹбһ„бҹ’бһҒбҹҒбһ”бһҮбһ¶бһӣбһ¶бһҷбһӣбһҖбҹ’бһҒбһҺбҹҚбһўбһҖбҹ’бһҹбһҡбһҖбҹ’бһ“бһ»бһ„бһҗбҹ’бһ„бҹғбһҸбҹӮбһҳбһҪбһҷ (бһўбҹҠбһёбһҳбҹӮбһӣ бһ¬бһҹбһ¶бһҡ WhatsApp бһҳбһ¶бһ“бһҡбһ…бһ“бһ¶бһҹбһҳбҹ’бһ–бҹҗбһ“бҹ’бһ’)","бһҡбһ¶бһӣбҹӢбһҖбһ¶бһҡбһ…бһ»бҹҮбһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһ‘бһёбһҸбһ¶бҹҶбһ„ вҶ’ бһҹбҹҒбһ…бһҖбҹ’бһҸбһёбһҹбһ„бҹ’бһҒбҹҒбһ”бһҮбһ¶бһӣбһ¶бһҷбһӣбһҖбҹ’бһҒбһҺбҹҚбһўбһҖбҹ’бһҹбһҡбһҖбҹ’бһ“бһ»бһ„бһҡбһ„бҹ’бһңбһ„бҹӢ 24 бһҳбҹүбҹ„бһ„","бһҡбһ¶бһӣбҹӢбһңбһ·бһ“бһ·бһҷбҹ„бһӮбһ·бһ“бһҠбҹӮбһӣбһҳбһ¶бһ“бһӣбһҖбҹ’бһҒбһҺбҹҲбһҹбһҳбҹ’бһ”бһҸбҹ’бһҸбһ·бһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһҡбһ¶бһ“бҹӢ вҶ’ бһҹбҹҶбһҺбһҫбһҮбһ¶бһӣбһ¶бһҷбһӣбһҖбҹ’бһҒбһҺбҹҚбһўбһҖбҹ’бһҹбһҡбһҖбҹ’бһ“бһ»бһ„бһҡбһ„бҹ’бһңбһ„бҹӢ 48 бһҳбҹүбҹ„бһ„бһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ–бһёбһҮбҹҶбһ“бһҪбһ”бһӣбһҫбһҖбһҠбҹҶбһ”бһјбһ„","бһ‘бһҳбҹ’бһҡбһ„бҹӢбҹ– бһ…бҹ’бһ”бһ¶бһҹбҹӢбһӣбһ¶бһҹбҹӢ бһҳбһ¶бһ“бһҡбһ…бһ“бһ¶бһҹбһҳбҹ’бһ–бҹҗбһ“бҹ’бһ’ бһ•бҹ’бһўбҹӮбһҖбһӣбһҫбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷ вҖ” бһӮбҹ’бһҳбһ¶бһ“бһ—бһ¶бһҹбһ¶бһ•бҹ’бһҹбһ–бҹ’бһңбһ•бҹ’бһҹбһ¶бһҷбһ–бһ¶бһҺбһ·бһҮбҹ’бһҮбһҖбһҳбҹ’бһҳ бһӮбҹ’бһҳбһ¶бһ“бһҹбһҳбҹ’бһ–бһ¶бһ’"]}},{"label":"бһҡбһ…бһ“бһ¶бһҹбһҳбҹ’бһ–бҹҗбһ“бҹ’бһ’бһҹбҹҶбһҺбһҫбһҡбһ”бһҹбҹӢ PHC","heading":"бһўбҹ’бһңбһёбһҠбҹӮбһӣбһҹбҹҶбһҺбһҫбһҳбһҪбһҷбһҸбҹ’бһҡбһјбһңбһҸбҹӮбһҳбһ¶бһ“","body":"бһҹбҹҶбһҺбһҫбһҡбһ”бһҹбҹӢ PHC бһҳбһ·бһ“бһҳбҹӮбһ“бһҮбһ¶бһҖбҹ’бһҡбһҠбһ¶бһҹбһ”бһҸбҹӢбһ•бҹ’бһҹбһ–бҹ’бһңбһ•бҹ’бһҹбһ¶бһҷ (brochure) бһ“бҹ„бҹҮбһ‘бҹҒбҹ” бһңбһ¶бһҮбһ¶бһҜбһҖбһҹбһ¶бһҡбһ”бҹ’бһҡбһ№бһҖбҹ’бһҹбһ¶бһҷбҹ„бһ”бһӣбҹӢбһҠбҹӮбһӣбһҳбһ¶бһ“бһҡбһ…бһ“бһ¶бһҹбһҳбҹ’бһ–бҹҗбһ“бҹ’бһ’бһ…бҹ’бһ”бһ¶бһҹбҹӢбһӣбһ¶бһҹбҹӢбҹ” бһ•бҹ’бһ“бҹӮбһҖбһ“бһёбһҳбһҪбһҷбҹ—бһ”бһҳбҹ’бһҡбһҫбһұбҹ’бһҷбһӮбҹ„бһӣбһ”бҹҶбһҺбһ„бһҮбһ¶бһҖбҹӢбһӣбһ¶бһҖбҹӢбҹ”","rules":[{"title":"1. бһҹбҹҒбһ…бһҖбҹ’бһҸбһёбһҹбһ„бҹ’бһҒбҹҒбһ”бһҹбҹ’бһҗбһ¶бһ“бһ—бһ¶бһ–бһҡбһ”бһҹбҹӢбһўбһҸбһ·бһҗбһ·бһҮбһ“","detail":"2вҖ“3 бһ”бҹ’бһҡбһҷбҹ„бһӮбһҹбһ„бҹ’бһҒбҹҒбһ”бһўбҹҶбһ–бһёбһўбҹ’бһңбһёбһҠбҹӮбһӣбһўбһҸбһ·бһҗбһ·бһҮбһ“бһ”бһ¶бһ“бһ”бҹ’бһҡбһ¶бһ”бҹӢбһўбҹ’бһ“бһҖбҹ– бһӮбҹ„бһӣбһҠбҹ… бһҖбһ¶бһӣбһңбһ·бһ—бһ¶бһӮ бһҖбһүбҹ’бһ…бһ”бҹӢбһҗбһңбһ·бһҖбһ¶ бһ“бһ·бһ„бһҖбһҳбҹ’бһҡбһ·бһҸбһ бһ¶бһ“бһ·бһ—бҹҗбһҷбһҠбҹӮбһӣбһ‘бһ‘бһҪбһӣбһҷбһҖбһ”бһ¶бһ“бҹ” бһ“бҹҒбҹҮбһ”бһ„бҹ’бһ бһ¶бһүбһҗбһ¶бһўбҹ’бһ“бһҖбһ”бһ¶бһ“бһҹбҹ’бһҸбһ¶бһ”бҹӢбһ–бһҪбһҖбһӮбһ¶бһҸбҹӢбҹ”"},{"title":"2. бһҖбһ¶бһҡбһҺбҹӮбһ“бһ¶бҹҶбһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖ бһ“бһ·бһ„бһ бҹҒбһҸбһ»бһ•бһӣ","detail":"бһ”бһүбҹ’бһҮбһ¶бһҖбҹӢбһӮбһҳбҹ’бһҡбҹ„бһ„ 1вҖ“2 бһҠбҹӮбһӣбһўбҹ’бһ“бһҖбһҺбҹӮбһ“бһ¶бҹҶбҹ” бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһӮбһҳбҹ’бһҡбҹ„бһ„бһ“бһёбһҳбһҪбһҷбҹ—бҹ– бһ бҹҒбһҸбһ»бһўбҹ’бһңбһёбһ”бһ¶бһ“бһҮбһ¶бһӮбһҳбҹ’бһҡбҹ„бһ„бһ“бҹҒбҹҮбһҹбһҳбһҹбҹ’бһҡбһ”бһ“бһ№бһ„бһӣбһҖбҹ’бһҒбһҺбҹҲбһңбһ·бһ“бһ·бһ…бҹ’бһҶбҹҗбһҷбһҠбҹӮбһӣбһ–бһҪбһҖбһӮбһ¶бһҸбҹӢбһ”бһ¶бһ“бһ”бһүбҹ’бһҮбһ¶бһҖбҹӢ (бһҳбһ·бһ“бһҳбҹӮбһ“бһ бҹҒбһҸбһ»бһўбҹ’бһңбһёбһ”бһ¶бһ“бһҮбһ¶бһңбһ¶бһҮбһ¶бһӮбһҳбҹ’бһҡбҹ„бһ„бһҠбҹҸбһӣбҹ’бһўбһҮбһ¶бһҡбһҪбһҳбһ“бҹ„бҹҮбһ‘бҹҒ)бҹ”"},{"title":"3. бһҸбһҪбһӣбҹҒбһҒбһӣбҹҒбһҒ","detail":"бһҖбһ¶бһҡбһӮбһҺбһ“бһ¶бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһ»бһ‘бҹ’бһ’ (net yield)бҹ” бһ…бҹҶбһҺбһ¶бһҷбһҹбһҡбһ»бһ”бһ“бҹғбһҖбһ¶бһҡбһ‘бһ·бһү бһҡбһҪбһҳбһ‘бһ¶бҹҶбһ„бһ–бһ“бҹ’бһ’бһ”бҹ’бһҡбһ‘бһ¶бһ”бҹӢбһҸбҹ’бһҡбһ¶ (stamp duty)бҹ” бһҖбһ¶бһҡбһ”бҹүбһ¶бһ“бҹӢбһ”бҹ’бһҡбһҳбһ¶бһҺбһ”бҹ’бһҡбһ¶бһҖбҹӢбһ…бҹҶбһҺбһјбһӣбһ”бҹ’бһҡбһ…бһ¶бҹҶбһҒбҹӮбҹ” CGT бһӣбһҫбһҹбҹҒбһ“бһ¶бһҡбһёбһҷбҹүбһјбһ…бҹ’бһҡбһҖбһ…бҹҒбһүбһҠбҹӮбһӣбһ”бһ¶бһ“бһ’бҹ’бһңбһҫбһҳбҹүбһјбһҠбҹӮбһӣбҹ” бһ”бһ„бҹ’бһ бһ¶бһүбһ–бһёбһҡбһ”бҹҖбһ”бһӮбһҺбһ“бһ¶бһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖбҹ”"},{"title":"4. бһ бһ¶бһ“бһ·бһ—бҹҗбһҷ вҖ” бһ”бһүбҹ’бһҮбһ¶бһҖбҹӢбһҷбҹүбһ¶бһ„бһ…бҹ’бһ”бһ¶бһҹбҹӢбһӣбһ¶бһҹбҹӢ","detail":"бһ”бһүбҹ’бһҮбһ¶бһҖбҹӢбһ бһ¶бһ“бһ·бһ—бҹҗбһҷбһҠбҹӮбһӣбһ–бһ¶бһҖбҹӢбһ–бҹҗбһ“бҹ’бһ’бһ”бҹҶбһ•бһ»бһҸ 2вҖ“3 бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бһҡбһјбһ”бһңбһ“бҹ’бһҸбһҡбһ”бһҹбҹӢбһўбһҸбһ·бһҗбһ·бһҮбһ“бһ“бҹҒбҹҮбҹ– бһҹбһ—бһ¶бһ–бһҹбһ¶бһ…бҹӢбһ”бҹ’бһҡбһ¶бһҖбҹӢбһ“бҹғбһ…бҹ’бһҡбһҖбһ…бҹҒбһү (exit liquidity), CGT, бһўбһҸбҹ’бһҡбһ¶бһҷбһјбһ“бһёбһҸбһ‘бҹҶбһ“бҹҒбһҡ, бһ бһ¶бһ“бһ·бһ—бҹҗбһҷбһҹбҹҶбһҺбһ„бҹӢ off-plan (бһ”бҹ’бһҡбһҹбһ·бһ“бһ”бһҫбһ–бһ¶бһҖбҹӢбһ–бҹҗбһ“бҹ’бһ’)бҹ” бһ“бҹҒбҹҮбһҮбһ¶бһ•бҹ’бһ“бҹӮбһҖбһҠбҹӮбһӣбһ”бһ„бҹ’бһҖбһҫбһҸбһ‘бҹҶбһ“бһ»бһҖбһ…бһ·бһҸбҹ’бһҸбһ”бһ¶бһ“бһҒбҹ’бһӣбһ¶бҹҶбһ„бһ”бҹҶбһ•бһ»бһҸбҹ”"},{"title":"5. бһҮбҹҶбһ бһ¶бһ“бһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһҠбҹӮбһӣбһ…бҹ’бһ”бһ¶бһҹбҹӢбһӣбһ¶бһҹбҹӢ","detail":"бһҹбһҖбһҳбҹ’бһҳбһ—бһ¶бһ–бһҸбҹӮбһҳбһҪбһҷбҹ” 'бһҒбҹ’бһүбһ»бҹҶбһҹбһјбһҳбһҹбҹ’бһ“бһҫбһұбҹ’бһҷбһҷбһҫбһ„бһҡбҹҖбһ”бһ…бҹҶбһҖбһ¶бһӣбһңбһ·бһ—бһ¶бһ  вҖ” $1.8/sqm/month бһҠбһјбһ…бһӮбҹ’бһ“бһ¶бһ“бһ№бһ„ J Tower 2 бһҠбҹӮбһҡбҹ” бһҡбһёбһҖбһҡбһ¶бһҷбһ“бһ№бһ„бһ–бһ“бҹ’бһҷбһӣбҹӢбһ–бһёбһҳбҹүбһјбһҠбҹӮбһӣбһ…бҹҶбһҺбһ¶бһҷбһҹбһҡбһ»бһ” бһ”бҹ’бһҡбһҹбһ·бһ“бһ”бһҫбһҳбһ¶бһ“бһ”бҹ’бһҡбһҷбҹ„бһҮбһ“бҹҚбҹ”'","'бһҹбһҪбһҹбҹ’бһҠбһё! бһҮбҹҶбһ“бһҪбһ”бһҳбҹ’бһҹбһ·бһӣбһҳбһ·бһүбһ–бһ·бһҸбһҮбһ¶бһӣбҹ’бһўбһҺбһ¶бһҹбҹӢбҹ” бһҮбһҳбҹ’бһҡбһ¶бһ”бһұбҹ’бһҷбһҒбҹ’бһүбһ»бҹҶбһҠбһ№бһ„бһ•бһ„ бһ”бҹ’бһҡбһҹбһ·бһ“бһ”бһҫбһўбҹ’бһ“бһҖбһ…бһ„бҹӢбһ”бһ“бҹ’бһҸбһ‘бҹ…бһҳбһ»бһҒбҹ”'","'бһ‘бһёбһ•бҹ’бһҹбһ¶бһҡбһҖбҹҶбһ–бһ»бһ„бһҠбһҫбһҡбһӣбһҝбһ“бһҺбһ¶бһҹбҹӢ вҖ” бһўбҹ’бһ“бһҖбһӮбһҪбһҡбһҸбҹӮбһҹбһҳбҹ’бһҡбҹҒбһ…бһ…бһ·бһҸбҹ’бһҸбһұбҹ’бһҷбһ”бһ¶бһ“бһҶбһ¶бһ”бҹӢбҹ”'"],"correct":1,"explain":"бһҹбһ¶бһҡбһ“бҹҒбҹҮбһўбһ“бһ»бһңбһҸбҹ’бһҸбһҸбһ¶бһҳбһӮбҹ„бһӣбһҖбһ¶бһҡбһҺбҹҚбһ”бһ“бҹ’бһҗбҹӮбһҳбһҸбһҳбҹ’бһӣбҹғбҹ– бһңбһ¶бһҶбҹ’бһӣбһҫбһҷбһҹбҹҶбһҺбһҪбһҡбһҠбҹӮбһӣбһ“бҹ…бһ…бҹ„бһ‘ бһңбһ¶бһҳбһ¶бһ“бһӣбһҖбҹ’бһҒбһҺбҹҲбһҮбһ¶бһҖбҹӢбһӣбһ¶бһҖбҹӢбһ…бҹҶбһ–бҹ„бҹҮбһҖбһ¶бһҡбһҹбһ“бҹ’бһ‘бһ“бһ¶ бһ бһҫбһҷбһңбһ¶бһ”бһ“бҹ’бһҗбҹӮбһҳбһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бһҗбҹ’бһҳбһёбҹ” бһӮбҹ’бһҳбһ¶бһ“бһҹбһҳбҹ’бһ–бһ¶бһ’ бһӮбҹ’бһҳбһ¶бһ“бһҖбһ¶бһҡбһ”бһ„бҹ’бһҒбҹҶбһұбҹ’бһҷбһ”бҹ’бһҡбһүбһ¶бһ”бҹӢ вҖ” бһӮбҹ’бһҡбһ¶бһ“бҹӢбһҸбҹӮбһҮбһ¶бһҖбһ¶бһҡбһҸбһ¶бһҳбһҠбһ¶бһ“бһҖбһ¶бһҡбһ„бһ¶бһҡбһ”бҹ’бһҡбһҖбһ”бһҠбҹ„бһҷбһўбһ¶бһҮбһёбһ–бҹ”"}]}},
{id:18,week:4,title:"Pipeline & Deal Management",short:"Pipeline Management",objectives:["Understand the PHC pipeline stages and what drives each one","Know how to manage multiple clients simultaneously without losing quality","Identify which leads to invest time in вҖ” and which to park or walk away from"],sections:[{label:"The PHC Pipeline Stages",heading:"Every client is in a stage вҖ” know which one",body:"Pipeline management is not about tracking вҖ” it is about knowing what each client needs next and delivering it. An agent with 20 leads managed with precision will outperform an agent with 50 leads managed loosely. Quality of follow-through beats volume of contacts.",table:{headers:["Stage","Definition","What the client needs next"],rows:[["New lead","First contact made, not yet qualified","5-min qualification вҖ” goal, budget, timeline, risk tolerance"],["Qualified","Segment identified, budget and timeline confirmed","Project shortlist + initial proposal within 48 hrs"],["Presented","Projects shown, first proposal sent","Responses to objections + site visit offer"],["Site visited","Physical viewing completed","Debrief summary + SPA review offer or re-match"],["Proposal sent","Full written proposal delivered","Space to decide + value-add check-in at 7 days"],["In legal review","SPA with client's legal advisor","Facilitate review, answer questions, do not rush"],["Ready to close","Client confirmed intent","Booking deposit process + clear timeline to SPA"],["Closed","Booking paid, SPA signed","Handover support, property management setup"],["Parked","Not ready вҖ” timeline 6+ months out","Light-touch update every 4вҖ“6 weeks, no pressure"]]}},{label:"Time Allocation",heading:"Who deserves your time this week",body:"Most agents spread time evenly across all leads. This is a mistake. PHC agents concentrate time on the leads where their action will move the deal forward. The rest get a light-touch holding position.",rules:[{title:"High-focus leads",detail:"Qualified leads who have seen at least one project and have a timeline under 3 months. These are the deals to invest time in every day."},{title:"Maintenance leads",detail:"Leads who are qualified but timeline is 3вҖ“6 months. Weekly or bi-weekly check-in with value-add information. No heavy selling."},{title:"Parked leads",detail:"Timeline 6+ months, or missing a critical qualification element. Monthly update вҖ” a relevant market data point, a new project announcement. No meetings until they re-qualify."},{title:"Auto-reject leads",detail:"No clear budget, unrealistic yield expectations (15%+ net), nominee enquiries, or rental income under $500/month. Close politely. Do not invest time."}]},{label:"Weekly Pipeline Review",heading:"The CEO metrics вҖ” know your numbers",body:"Nick reviews these metrics weekly. You should know your own numbers before he asks. These are the numbers that measure the health of your pipeline.",grid:[["Leads this week","New first contacts made. Track source: REAKH listing, referral, social media, walk-in."],["Qualification rate","% of leads that pass the 5-minute qualification. Low rate = you are talking to the wrong people."],["Site visits this week","Qualified leads who have physically viewed a project. This is the most predictive metric for closings."],["Proposals sent","Written proposals delivered to qualified leads. Every qualified client should have a proposal within 48 hours."],["Closings","Booking deposits paid and SPAs in progress. This is the output metric."],["Pipeline value","Estimated transaction value of all qualified active leads. Know this number."]]}],roleplay:{scenario:"Weekly pipeline review conversation with Nick",instructions:"Practice being specific and honest вҖ” no vague answers.",lines:[{role:"nick",text:'"Walk me through your pipeline. How many qualified leads do you have this week?"'},{role:"agent",text:'"Seven active qualified leads. Three are in the presented stage вҖ” I sent proposals last week. Two have done site visits and I\'m waiting on SPA review responses. One is ready to close вҖ” booking deposit expected by Friday. One I\'m re-classifying as parked вҖ” their timeline pushed to Q4."'},{role:"nick",text:'"What\'s the status on the three you sent proposals to?"'},{role:"agent",text:'"Lead 1 вҖ” German investor, responded with a question about CGT calculation. I\'m sending the worked example today. Lead 2 вҖ” Japanese couple, no response in 6 days. I\'m sending a value-add check-in this afternoon вҖ” the J Tower 3 pre-sale announcement. Lead 3 вҖ” Overseas Cambodian, confirmed they need one more week for family discussion."'},{role:"note",text:"Debrief: Was the Agent specific? Did they know exactly where each lead was and what was needed next?"}],debrief:"Pipeline management is the discipline that separates a productive week from a reactive one. If you do not know the status of every qualified lead before Monday morning, you are already behind."},quiz:[{q:"A client has been in the 'proposal sent' stage for 10 days with no response. You should:",opts:["Move them to lost and focus on new leads","Send a value-add check-in вҖ” not a pressure message вҖ” with a relevant data point or answered open question","Call them daily until they respond","Send the proposal again with a lower price"],correct:1,explain:"10 days of silence after a proposal is normal. A value-add check-in reopens the conversation without creating pressure. A relevant data point вҖ” foreign quota update, a new project launch, a confirmed answer to their question вҖ” is the right tool."},{q:"Which of these leads should receive the most of your time this week?",opts:["A new enquiry with a $500K budget but no clear timeline","A qualified lead who visited a site 5 days ago, has a 2-month timeline, and asked about the SPA process","A parked lead who contacted you 6 months ago but said they would be ready 'next year'","An overseas lead who has not responded in 3 weeks"],correct:1,explain:"The site-visited, short-timeline, SPA-interested lead is closest to closing. Focus goes where action moves the deal forward. High-focus leads are those where your next contact or action can change the stage."},{q:"The PHC auto-reject criteria for leads includes:",opts:["Clients who ask too many questions","Clients with a timeline over 6 months","Leads with no clear budget, unrealistic yield expectations, or nominee enquiries","Clients from Eastern Europe or Asia"],correct:2,explain:"Auto-reject: no clear budget, 15%+ net yield expectations, nominee structure requests, or rental income under $500/month target. These leads consume time and damage standards. Close politely and move on."},{q:"The most predictive pipeline metric for upcoming closings is:",opts:["Number of new leads generated","Number of WhatsApp messages sent","Number of site visits conducted by qualified leads","Number of proposals sent"],correct:2,explain:"Site visits are the most reliable leading indicator. A qualified lead who has visited a project and has a short timeline is the closest thing to a confirmed closing in real estate. Track this metric every week."}],reflection:"Write your honest pipeline review for this week: how many qualified leads do you have, where are they in the stages, and what is the one specific action needed for each?",km:{"title":"бһҖбһ¶бһҡбһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһҡбһ„бһҒбҹ’бһҹбҹӮбһ…бҹ’бһҡбһңбһ¶бһҖбҹӢбһҖбһ¶бһҡбһ„бһ¶бһҡ бһ“бһ·бһ„бһҖбһ¶бһҡ deal бһҮбһҪбһүбһҠбһјбһҡ","short":"бһҖбһ¶бһҡбһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһҡбһ„бһҒбҹ’бһҹбҹӮбһ…бҹ’бһҡбһңбһ¶бһҖбҹӢбһҖбһ¶бһҡбһ„бһ¶бһҡ","objectives":["бһҷбһӣбҹӢбһҠбһ№бһ„бһ–бһёбһҠбҹҶбһҺбһ¶бһҖбҹӢбһҖбһ¶бһӣбһҒбҹ’бһҹбҹӮбһ…бҹ’бһҡбһңбһ¶бһҖбҹӢбһҖбһ¶бһҡбһ„бһ¶бһҡ PHC бһ“бһ·бһ„бһўбҹ’бһңбһёбһҠбҹӮбһӣбһҡбһ»бһүбһ…бҹ’бһҡбһ¶бһ“бһҠбҹҶбһҺбһ¶бһҖбҹӢбһҖбһ¶бһӣбһ“бһёбһҳбһҪбһҷбҹ—","бһҠбһ№бһ„бһ–бһёбһҡбһ”бҹҖбһ”бһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһҡбһ„бһўбһҸбһ·бһҗбһ·бһҮбһ“бһ…бҹ’бһҡбһҫбһ“бһҖбҹ’бһ“бһ»бһ„бһ–бҹҒбһӣбһҠбҹҶбһҺбһ¶бһӣбһӮбҹ’бһ“бһ¶бһҠбҹ„бһҷбһҳбһ·бһ“бһ”бһ¶бһҸбҹӢбһ”бһ„бҹӢбһӮбһ»бһҺбһ—бһ¶бһ–","бһҖбһҸбҹӢбһҹбһҳбҹ’бһӮбһ¶бһӣбҹ бҹ’бһҡбһ…бһ¶бҹҶбһҹбһ”бҹ’бһҸбһ¶бһ бҹҚ бһ¬бһ–бһёбһҡбһ”бҹ’бһҡбһҮбһ¶бһ”бҹ’бһҸбһ¶бһ бҹҚбһҳбҹ’бһҸбһ„ бһҠбҹ„бһҷбһ”бҹ’бһҡбһҫбһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бһ”бһ“бҹ’бһҗбҹӮбһҳбһҸбһҳбҹ’бһӣбҹғбҹ” бһӮбҹ’бһҳбһ¶бһ“бһҖбһ¶бһҡбһӣбһҖбҹӢбһҠбһјбһҡбһ’бҹ’бһ„бһ“бҹӢбһ’бҹ’бһ„бһҡбһЎбһҫбһҷбҹ”"},{"title":"Leads бһ•бҹ’бһўбһ¶бһҖбһ‘бһ»бһҖ (Parked leads)","detail":"бһҖбһ¶бһӣбһңбһ·бһ—бһ¶бһӮ 6+ бһҒбҹӮ бһ¬бһҒбҹ’бһңбҹҮбһ’бһ¶бһҸбһ»бһ•бҹ’бһҹбҹҶбһңбһ¶бһҷбһҸбһҳбҹ’бһӣбҹғбһӣбһҖбҹ’бһҒбһҺбҹҲбһҹбһҳбҹ’бһ”бһҸбҹ’бһҸбһ·бһҹбҹҶбһҒбһ¶бһ“бҹӢбһҺбһ¶бһҳбһҪбһҷбҹ” бһ”бһ…бҹ’бһ…бһ»бһ”бҹ’бһ”бһ“бҹ’бһ“бһ—бһ¶бһ–бһ”бҹ’бһҡбһ…бһ¶бҹҶбһҒбҹӮ вҖ” бһ…бҹҶбһҺбһ»бһ…бһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһ‘бһёбһ•бҹ’бһҹбһ¶бһҡбһҠбҹӮбһӣбһ–бһ¶бһҖбҹӢбһ–бҹҗбһ“бҹ’бһ’ бһҖбһ¶бһҡбһ”бҹ’бһҡбһҖбһ¶бһҹбһӮбһҳбҹ’бһҡбҹ„бһ„бһҗбҹ’бһҳбһёбҹ” бһӮбҹ’бһҳбһ¶бһ“бһҖбһ¶бһҡбһҮбһҪбһ”бһ–бһ·бһ—бһ¶бһҖбҹ’бһҹбһ¶ бһҡбһ бһјбһҸбһҠбһӣбҹӢбһ–бһҪбһҖбһӮбҹҒбһңбһ¶бһҷбһҸбһҳбҹ’бһӣбҹғбһӣбһҖбҹ’бһҒбһҺбҹҲбһҹбһҳбҹ’бһ”бһҸбҹ’бһҸбһ·бһЎбһҫбһ„бһңбһ·бһүбҹ”"},{"title":"Leads бһ”бһҠбһ·бһҹбҹҒбһ’бһҹбҹ’бһңбҹҗбһҷбһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ· (Auto-reject leads)","detail":"бһӮбҹ’бһҳбһ¶бһ“бһҖбһүбҹ’бһ…бһ”бҹӢбһҗбһңбһ·бһҖбһ¶бһ…бҹ’бһ”бһ¶бһҹбҹӢбһӣбһ¶бһҹбҹӢ бһҖбһ¶бһҡбһҡбҹҶбһ–бһ№бһ„бһ‘бһ»бһҖбһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҳбһ·бһ“бһ”бҹ’бһҡбһ¶бһҖбһҠбһ“бһ·бһҷбһҳ (15%+ бһҹбһ»бһ‘бҹ’бһ’) бһҖбһ¶бһҡбһҹбһ¶бһҖбһҹбһҪбһҡбһ”бҹ’бһҡбһҫбһҲбҹ’бһҳбҹ„бҹҮбһҸбҹҶбһҺбһ¶бһ„ (nominee) бһ¬бһ”бҹ’бһҡбһ¶бһҖбҹӢбһ…бҹҶбһҺбһјбһӣбһҮбһҪбһӣбһҖбҹ’бһҡбҹ„бһҳ $500/monthбҹ” бһ”бһүбҹ’бһ…бһ”бҹӢбһҠбҹ„бһҷбһӮбһҪбһҡбһҹбһҳбҹ” бһҖбһ»бҹҶбһ…бҹҶбһҺбһ¶бһҷбһ–бҹҒбһӣбһңбһ·бһ“бһ·бһҷбҹ„бһӮбҹ”"}]},{"label":"бһҖбһ¶бһҡбһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһҳбһҫбһӣбһҒбҹ’бһҹбҹӮбһ…бҹ’бһҡбһңбһ¶бһҖбҹӢбһҖбһ¶бһҡбһ„бһ¶бһҡбһ”бҹ’бһҡбһ…бһ¶бҹҶбһҹбһ”бҹ’бһҸбһ¶бһ бҹҚ","heading":"бһҡбһ„бҹ’бһңбһ¶бһҹбҹӢбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһҗбҹ’бһ“бһ¶бһҖбҹӢ CEO вҖ” бһҸбҹ’бһҡбһјбһңбһҹбҹ’бһӮбһ¶бһӣбҹӢбһҸбһҪбһӣбҹҒбһҒбһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖ","body":"Nick бһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһҳбһҫбһӣбһҡбһ„бҹ’бһңбһ¶бһҹбҹӢбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһ‘бһ¶бҹҶбһ„бһ“бҹҒбҹҮбһ”бҹ’бһҡбһ…бһ¶бҹҶбһҹбһ”бҹ’бһҸбһ¶бһ бҹҚбҹ” бһўбҹ’бһ“бһҖбһӮбһҪбһҡбһҸбҹӮбһҹбҹ’бһӮбһ¶бһӣбҹӢбһҸбһҪбһӣбҹҒбһҒбһҒбҹ’бһӣбһ {id:19,week:4,title:"Performance Standards & Self-Evaluation",short:"Performance Standards",objectives:["Know PHC's performance standards and what they measure","Be able to evaluate your own performance honestly using data вҖ” not feelings","Identify one specific improvement to work on in your next 4 weeks"],sections:[{label:"What PHC Measures",heading:"The metrics that define performance",body:"Performance at PHC is not measured by hours worked, enthusiasm, or how many client messages you sent. It is measured by outcomes and quality of process. Nick reviews these metrics weekly. You should review them daily.",box:{title:"PHC weekly CEO metrics вҖ” know your numbers:",lines:["Leads: new first contacts this week (source tracked)","Viewings: qualified leads who completed a site visit","Closings: booking deposits paid or SPAs signed","Revenue: commission confirmed this week","Pipeline value: total estimated transaction value of active qualified leads","Conversion rate: closings Г· qualified leads (track over rolling 4-week period)"]}},{label:"Quality Standards",heading:"The standard is not the average",body:"Volume without quality is not PHC. An agent who closes 2 deals from 6 qualified leads вҖ” with full written proposals, correct yield presentations, and properly managed follow-ups вҖ” is performing better than an agent who closes 2 deals from 40 unmanaged contacts. PHC measures both output and process.",rules:[{title:"Standard 1 вҖ” Proposal quality",detail:"Every qualified lead receives a written proposal within 48 hours. The proposal contains: client situation summary, recommendation rationale, net yield calculation, risks stated, one next step. No exceptions."},{title:"Standard 2 вҖ” Follow-up consistency",detail:"Every lead in the qualified or later stage receives a value-add follow-up within 7 days of last contact. No lead is left in silence for more than 7 days without a logged action."},{title:"Standard 3 вҖ” Yield presentation accuracy",detail:"Every yield figure presented to a client is net вҖ” not gross. Management fees, vacancy, and rental tax are deducted before any figure is communicated. Gross figures are always labelled as gross."},{title:"Standard 4 вҖ” Risk disclosure",detail:"Every investment client receives explicit risk disclosure before any project recommendation. Exit liquidity, yield reality, developer track record, and CGT are all named. Not hinted at вҖ” named."}]},{label:"Self-Evaluation Framework",heading:"Honest review вҖ” not self-criticism",body:"The purpose of self-evaluation is not to feel bad about gaps. It is to identify the one change that will make the most difference over the next 4 weeks. PHC advisors focus on one improvement at a time.",rules:[{title:"Ask these four questions every Friday",detail:"1. How many qualified leads did I move forward this week? 2. Did every proposal contain all five components? 3. Did any client hear a gross yield figure without being told it was gross? 4. Was any risk disclosure skipped or softened?"},{title:"The one-improvement principle",detail:"Identify the single biggest gap in your process this week. Write it down. Build one specific habit to address it next week. Do not try to fix everything at once вҖ” the agent who fixes one real thing each month will outperform the agent who tries to fix ten things and fixes none."},{title:"When to escalate to Nick",detail:"Escalate immediately: strata title uncertainty, foreign quota near cap, off-plan projects from unverified developers, clients requesting nominee structures, any legal question. Do not guess on these вҖ” escalate."}]}],roleplay:{scenario:"Self-evaluation conversation at end of week 4",instructions:"This is a conversation with yourself. Be honest вҖ” the purpose is identification, not self-criticism.",lines:[{role:"note",text:"Agent reviews the week alone or with a peer."},  {role:"agent",text:'"This week: 4 qualified leads, 2 site visits, 1 proposal sent, 0 closings. Proposal sent вҖ” I checked: it had the client situation, the recommendation, the numbers, the risks, and the next step. Good."'},{role:"agent",text:'"Site visit 1 вҖ” I forgot to confirm the foreign quota before arrival. I had to check my phone on site. That damaged the moment. Next week: always verify quota 24 hours before any site visit."'},{role:"agent",text:'"One qualified lead went 9 days without contact from me. That broke the 7-day standard. I need to set a calendar reminder for every lead at the 5-day mark."'},{role:"note",text:"Debrief: Was the self-evaluation specific? Did it identify one concrete change for next week?"}],debrief:"Self-evaluation that produces a specific, actionable improvement is worth 10 pep talks. The goal is not to feel better вҖ” it is to perform better next week."},quiz:[{q:"PHC's performance evaluation is primarily based on:",opts:["Hours worked and number of client messages sent","Enthusiasm and attitude","Outcomes (closings, revenue) AND process quality (proposal standards, yield accuracy, risk disclosure)","Client feedback scores only"],correct:2,explain:"PHC measures both output (closings, revenue, pipeline value) and process quality (proposal completeness, yield accuracy, risk disclosure, follow-up consistency). High volume with poor process is not PHC standard."},{q:"The self-evaluation question 'did any client hear a gross yield figure without being told it was gross?' is:",opts:["Optional вҖ” yield presentation style varies by client","Only relevant for Japanese and European investors","A core weekly quality check вҖ” applies to every client interaction","Only important during formal performance reviews"],correct:2,explain:"This is a weekly quality check that applies to every client. Gross yield presented without labelling is a misrepresentation. Catching and correcting this habit early is what prevents credibility damage later."},{q:"The one-improvement principle states:",opts:["Identify every gap and address all of them simultaneously","Focus on the single biggest gap in your process and build one specific habit to address it over 4 weeks","Only work on improvements Nick identifies in review","Improvement is optional once you start closing deals"],correct:1,explain:"One real improvement per month compounds. Trying to fix ten things at once fixes nothing. Identify the single biggest gap вҖ” write it down вҖ” build one specific habit. This is the PHC self-development model."},{q:"When should you escalate to Nick rather than answering independently?",opts:["When a client asks about price negotiation","When you are unsure about yield calculations","For strata title uncertainty, foreign quota near cap, nominee structures, off-plan unverified developers, or any legal question","Only when a deal is about to close"],correct:2,explain:"Escalate these immediately вҖ” do not guess: strata title status, near-cap foreign quota, nominee enquiries, unverified off-plan developers, legal questions. Guessing on these creates risk for the client and for PHC's reputation."}],reflection:"What is the single biggest gap in your performance this week вҖ” and what is the one specific habit you will build next week to address it?",km:{"title":"бһҹбҹ’бһҸбһ„бҹӢбһҠбһ¶бһҡбһ”бҹ’бһҡбһҸбһ·бһ”бһҸбҹ’бһҸбһ·бһҖбһ¶бһҡ бһ“бһ·бһ„бһҖбһ¶бһҡбһңбһ¶бһҷбһҸбһҳбҹ’бһӣбҹғбһҹбһҳбһҸбҹ’бһҗбһ—бһ¶бһ–бһҒбҹ’бһӣбһҪбһ“бһҜбһ„","short":"бһҹбҹ’бһҸбһ„бҹӢбһҠбһ¶бһҡбһ”бҹ’бһҡбһҸбһ·бһ”бһҸбҹ’бһҸбһ·бһҖбһ¶бһҡ","objectives":["бһҹбҹ’бһӮбһ¶бһӣбҹӢбһҹбҹ’бһҸбһ„бҹӢбһҠбһ¶бһҡбһ”бҹ’бһҡбһҸбһ·бһ”бһҸбҹ’бһҸбһ·бһҖбһ¶бһҡбһҡбһ”бһҹбҹӢ PHC бһ“бһ·бһ„бһўбҹ’бһңбһёбһҠбҹӮбһӣбһҹбҹ’бһҸбһ„бҹӢбһҠбһ¶бһҡбһ‘бһ¶бҹҶбһ„бһ“бҹ„бҹҮбһңбһ¶бһҹбҹӢбһңбҹӮбһ„","бһўбһ¶бһ…бһңбһ¶бһҷбһҸбһҳбҹ’бһӣбҹғбһ”бҹ’бһҡбһҸбһ·бһ”бһҸбҹ’бһҸбһ·бһҖбһ¶бһҡбһ•бҹ’бһ‘бһ¶бһӣбҹӢбһҒбҹ’бһӣбһҪбһ“бһҠбҹ„бһҷбһҹбҹ’бһҳбҹ„бҹҮбһҸбҹ’бһҡбһ„бҹӢбһҠбҹ„бһҷбһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷ вҖ” бһҳбһ·бһ“бһҳбҹӮбһ“бһўбһ¶бһҡбһҳбҹ’бһҳбһҺбҹҚбһЎбһҫбһҷ","бһҖбһҸбҹӢбһҹбһҳбҹ’бһӮбһ¶бһӣбҹӢбһҖбһ¶бһҡбһҖбҹӮбһӣбһҳбҹ’бһўбһҮбһ¶бһҖбҹӢбһӣбһ¶бһҖбҹӢбһҳбһҪбһҷбһҠбһҫбһҳбҹ’бһ”б бһ“бҹ’бһҗбҹӮбһҳбһҸбһҳбҹ’бһӣбҹғбһҖбҹ’бһ“бһ»бһ„бһҡбһ„бҹ’бһңбһ„бҹӢ 7 бһҗбҹ’бһ„бҹғбһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ–бһёбһҖбһ¶бһҡбһ‘бһ¶бһҖбҹӢбһ‘бһ„бһ…бһ»бһ„бһҖбҹ’бһҡбҹ„бһҷбҹ” бһӮбҹ’бһҳбһ¶бһ“ lead бһҺбһ¶бһҳбһҪбһҷбһҸбҹ’бһҡбһјбһңбһ‘бһ»бһҖбһ…бҹ„бһӣбһҖбҹ’бһ“бһ»бһ„бһ—бһ¶бһ–бһҹбҹ’бһ„бһ”бҹӢбһҹбҹ’бһ„бһ¶бһҸбҹӢбһӣбһҫбһҹбһ–бһё 7 бһҗбҹ’бһ„бҹғбһҠбҹ„бһҷбһӮбҹ’бһҳбһ¶бһ“бһҹбһҖбһҳбҹ’бһҳбһ—бһ¶бһ–бһҠбҹӮбһӣбһ”бһ¶бһ“бһҖбһҸбҹӢбһҸбҹ’бһҡбһ¶бһ“бҹ„бҹҮбһ‘бҹҒбҹ”"},{"title":"бһҹбҹ’бһҸбһ„бҹӢбһҠбһ¶бһҡбһ‘бһё 3 вҖ” бһ—бһ¶бһ–бһҸбҹ’бһҡбһ№бһҳбһҸбҹ’бһҡбһјбһңбһ“бҹғбһҖбһ¶бһҡбһ’бҹ’бһңбһҫбһ”бһ‘бһ”бһ„бҹ’бһ бһ¶бһүбһ•бһӣбһ…бҹҶбһҺбҹҒбһү","detail":"бһҸбһҪбһӣбҹҒбһҒбһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһӮбҹ’бһҡбһ”бҹӢбһҡбһјбһ”бһҠбҹӮбһӣбһ”бһ¶бһ“бһ”бһ„бҹ’бһ бһ¶бһүбһҮбһјбһ“бһўбһҸбһ·бһҗбһ·бһҮбһ“ бһӮбһәбһҮбһ¶бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһ»бһ‘бҹ’бһ’ (net) вҖ” бһҳбһ·бһ“бһҳбҹӮбһ“бһҹбһҡбһ»бһ” (gross) бһЎбһҫбһҷбҹ” бһҖбһҳбҹ’бһҡбҹғбһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһҡбһ„ бһўбһҸбҹ’бһҡбһ¶бһҷбһјбһ“бһёбһҸбһ‘бҹҶбһ“бҹҒбһҡ бһ“бһ·бһ„бһ–бһ“бҹ’бһ’бһӣбһҫбһҖбһ¶бһҡбһҮбһҪбһӣ бһҸбҹ’бһҡбһјбһңбһҸбҹӮбһҠбһҖбһ…бҹҒбһү бһҳбһ»бһ“бһ–бҹҒбһӣбһҸбһҪбһӣбҹҒбһҒбһҺбһ¶бһҳбһҪбһҷбһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһ”бҹ’бһҡбһ¶бһ”бҹӢбһ‘бҹ…бһўбһҸбһ·бһҗбһ·бһҮбһ“бҹ” бһҸбһҪбһӣбҹҒбһҒ gross бһҸбҹ’бһҡбһјбһңбһҸбҹӮбһ”бһ·бһ‘бһҹбҹ’бһӣбһ¶бһҖбһҮбһ¶ gross бһҮбһ¶бһ“бһ·бһ…бҹ’бһ…бҹ”"},{"title":"бһҹбҹ’бһҸбһ„бҹӢбһҠбһ¶бһҡбһ‘бһё 4 вҖ” бһҖбһ¶бһҡбһ‘бһҳбҹ’бһӣбһ¶бһҷбһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бһ бһ¶бһ“бһ·бһ—бҹҗбһҷ","detail":"бһўбһҸбһ·бһҗбһ·бһҮбһ“бһңбһ·бһ“бһ·бһҷбҹ„бһӮбһӮбҹ’бһҡбһ”бҹӢбһҡбһјбһ” бһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бһҖбһ¶бһҡбһ‘бһҳбҹ’бһӣбһ¶бһҷбһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бһ бһ¶бһ“бһ·бһ—бҹҗбһҷбһҷбҹүбһ¶бһ„бһ…бҹ’бһ”бһ¶бһҹбҹӢбһӣбһ¶бһҹбҹӢ бһҳбһ»бһ“бһ–бҹҒбһӣбһҳбһ¶бһ“бһҖбһ¶бһҡбһҺбҹӮбһ“бһ¶бҹҶбһӮбһҳбҹ’бһҡбҹ„бһ„бһҺбһ¶бһҳбһҪбһҷбҹ” бһҹбһ—бһ¶бһ–бһҹбһ¶бһ…бҹӢбһ”бҹ’бһҡбһ¶бһҖбҹӢбһ“бҹғбһ…бҹ’бһҡбһҖбһ…бҹҒбһү бһ—бһ¶бһ–бһ”бҹ’бһҡбһ¶бһҖбһҠбһ“бһ·бһҷбһҳбһ“бҹғбһ•бһӣбһ…бҹҶбһҺбҹҒбһү бһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ·бһҹбҹ’бһ“бһ¶бһҠбҹғбһҖбҹ’бһҡбһ»бһҳбһ бҹҠбһ»бһ“бһўбһ—бһ·бһңбһҢбҹ’бһҚбһ“бҹҚ бһ“бһ·бһ„ CGT бһҹбһ»бһ‘бҹ’бһ’бһҸбҹӮбһҸбҹ’бһҡбһјбһңбһҸбҹӮбһ…бҹҶбһҲбҹ’бһҳбҹ„бҹҮбһ…бҹ’бһ”бһ¶бһҹбҹӢбҹ—бҹ” бһҳбһ·бһ“бһҳбҹӮбһ“бһ“бһ·бһҷбһ¶бһҷбһ”бһ„бҹ’бһ бһҫбһ”бҹ—бһ‘бҹҒ вҖ” бһӮбһәбһ…бҹҶбһҲбҹ’бһҳбҹ„бҹҮбһ…бҹ’бһ”бһ¶бһҹбҹӢбҹ—бҹ”"}]},{"label":"бһҖбҹ’бһҡбһ”бһҒбҹҗбһҺбҹ’бһҢбһңбһ¶бһҷбһҸбһҳбҹ’бһӣбҹғбһҹбһҳбһҸбҹ’бһҗбһ—бһ¶бһ–бһҒбҹ’бһӣбһҪбһ“бһҜбһ„","heading":"бһҖбһ¶бһҡбһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһҳбһҫбһӣбһҠбҹ„бһҷбһҹбҹ’бһҳбҹ„бҹҮбһҸбҹ’бһҡбһ„бҹӢ вҖ” бһҳбһ·бһ“бһҳбҹӮбһ“бһҮбһ¶бһҖбһ¶бһҡбһҡбҹҮбһӮбһ“бҹӢбһҒбҹ’бһӣбһҪбһ“бһҜбһ„бһ‘бҹҒ","body":"бһӮбҹ„бһӣбһ”бҹҶбһҺбһ„бһ“бҹғбһҖбһ¶бһҡбһңбһ¶бһҷбһҸбһҳбҹ’бһӣбҹғбһҹбһҳбһҸбҹ’бһҗбһ—бһ¶бһ–бһҒбҹ’бһӣбһҪбһ“бһҜбһ„ бһҳбһ·бһ“бһҳбҹӮбһ“бһҠбһҫбһҳбҹ’бһ”бһёбһўбһ¶бһҡбһҳбҹ’бһҳбһҺбҹҚбһҳбһ·бһ“бһӣбҹ’бһўбһ…бҹҶбһ–бҹ„бҹҮбһ…бһ“бҹ’бһӣбҹ„бҹҮбһ”бҹ’бһҡбһ бҹ„бһ„бһ“бҹ„бҹҮбһ‘бҹҒбҹ” бһңбһ¶бһӮбһәбһҠбһҫбһҳбҹ’бһ”бһёбһҖбһҸбҹӢбһҹбһҳбҹ’бһӮбһ¶бһӣбҹӢбһҖбһ¶бһҡбһ•бҹ’бһӣбһ¶бһҹбҹӢбһ”бҹ’бһҸбһјбһҡбһҸбҹӮбһҳбһҪбһҷбһҠбҹӮбһӣбһ“бһ№бһ„бһ”бһ„бҹ’бһҖбһҫбһҸбһ•бһӣбһҒбһ»бһҹбһ”бҹ’бһӣбҹӮбһҖбһҒбҹ’бһӣбһ¶бҹҶбһ„бһ”бҹҶбһ•бһ»бһҸбһҖбҹ’бһ“бһ»бһ„бһҡбһҷбҹҲбһ–бҹҒбһӣ 4 бһҹбһ”бҹ’бһҸбһ¶бһ бҹҚбһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбҹ” бһ‘бһёбһ”бҹ’бһҡбһ№бһҖбҹ’бһҹбһ¶ PHC бһ•бҹ’бһҸбҹ„бһҸбһӣбһҫбһҖбһ¶бһҡбһҖбҹӮбһӣбһҳбҹ’бһўбһҳбҹ’бһҸбһ„бһҳбһҪбһҷбҹ—бҹ”","rules":[{"title":"бһҹбһҪбһҡбһҹбҹҶбһҺбһҪбһҡбһ‘бһ¶бҹҶбһ„бһ”бһҪбһ“бһ“бҹҒбҹҮбһҡбҹҖбһ„бһҡбһ¶бһӣбҹӢбһҗбҹ’бһ„бҹғбһҹбһ»бһҖбҹ’бһҡ","detail":"1. бһҸбһҫбһҒбҹ’бһүбһ»бҹҶбһ”бһ¶бһ“бһҡбһ»бһүбһ…бҹ’бһҡбһ¶бһ“ qualified leads бһұбҹ’бһҷбһ‘бҹ…бһҳбһ»бһҒбһ”бһ¶бһ“бһ…бҹҶбһ“бһҪбһ“бһ”бҹүбһ»бһ“бҹ’бһҳбһ¶бһ“бһҖбҹ’бһ“бһ»бһ„бһҹбһ”бҹ’бһҸбһ¶бһ бҹҚбһ“бҹҒбҹҮ? 2. бһҸбһҫбһҹбҹҶбһҺбһҫбһӮбҹ’бһҡбһ”бҹӢбһҡбһјбһ”бһҳбһ¶бһ“бһҹбһҳбһ¶бһҹбһ—бһ¶бһӮбһ‘бһ¶бҹҶбһ„бһ”бҹ’бһҡбһ¶бҹҶбһҠбҹӮбһ¬бһ‘бҹҒ? 3. бһҸбһҫбһҳбһ¶бһ“бһўбһҸбһ·бһҗбһ·бһҮбһ“бһҺбһ¶бһҳбҹ’бһ“бһ¶бһҖбҹӢбһ”бһ¶бһ“бһ®бһҸбһҪбһӣбҹҒбһҒбһ•бһӣбһ…бҹҶбһҺбҹҒбһү gross бһҠбҹ„бһҷбһҳбһ·бһ“бһ”бһ¶бһ“бһ”бҹ’бһҡбһ¶бһ”бҹӢбһҗбһ¶бһңбһ¶бһҮбһ¶ gross бһҠбҹӮбһҡбһ¬бһ‘бҹҒ? 4. бһҸбһҫбһҳбһ¶бһ“бһҖбһ¶бһҡбһ‘бһҳбҹ’бһӣбһ¶бһҷбһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бһ бһ¶бһ“бһ·бһ—бҹҗбһҷбһҺбһ¶бһҳбһҪбһҷбһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһҡбҹҶбһӣбһ„ бһ¬бһ’бҹ’бһңбһҫбһұбҹ’бһҷбһҹбҹ’бһҡбһ¶бһӣбһҹбһҳбһҹбҹ’бһҡбһ”бһҠбҹӮбһҡбһ¬бһ‘бҹҒ?"},{"title":"бһӮбҹ„бһӣбһҖбһ¶бһҡбһҺбҹҚбһҖбҹӮбһӣбһҳбҹ’бһўбһҳбҹ’бһҸбһ„бһҳбһҪбһҷ
