ិនិយោគិនដំបូង","instructions":"ហាត់សមនិយាយរឿងនេះឱ្យបានច្បាស់លាស់ និងដោយមិនកាត់បន្ថយហានិភ័យនោះទេ។","lines":[{"role":"client","text":"\"មានគេប្រាប់ខ្ញុំថាមានពន្ធលើចំណេញដើមទុន (CGT) ថ្មីនៅកម្ពុជា។ តើវាជាការពិតទេ?\""},{"role":"agent","text":"\"បាទ ពិតមែនហើយ — CGT បានចូលជាធរមានក្នុងខែមករា ឆ្នាំ 2026។ វាអនុវត្តលើប្រាក់ចំណេញដែលអ្នកទទួលបាននៅពេលអ្នកលក់អចលនទ្រព្យ។ អត្រាគឺ 20% លើប្រាក់ចំណេញដែលត្រូវជាប់ពន្ធ។\""},{"role":"client","text":"\"អញ្ចឹងការទិញនៅពេលនេះជាគំនិតមិនល្អមែនទេ?\""},{"role":"agent","text":"\"មិនមែនទាល់តែសោះ — វាមានន័យថាយុទ្ធសាស្ត្របានផ្លាស់ប្តូរ។ សម្រាប់ការកាន់កាប់រយៈពេលវែងដើម្បីទទួលបានចំណូលពីការជួល CGT គឺអាចគ្រប់គ្រងបាន។ ឧទាហរណ៍ លើការលក់ចេញ $200K ដោយមានតម្លៃទិញ $100K និងចំណាយមានឯកសារបញ្ជាក់ $40K ពន្ធគឺប្រហែល $12,000។ បញ្ហាគឺការទិញលក់ក្នុងរយៈពេលខ្លី (flipping) — យុទ្ធសាស្ត្រនោះមិនសមស្របទៀតទេក្នុងទីផ្សារនេះ។\""},{"role":"client","text":"\"អ្នកបានរៀបរាប់ពីរយៈពេល 7 ឆ្នាំ — តើវាវែងគ្រប់គ្រាន់ទេ?\""},{"role":"agent","text":"\"ផ្អែកលើការសិក្សាករណីជាក់ស្តែងរបស់ REAKH លើគម្រោង J Tower 2 — ដែលជាប្រតិបត្តិការផ្លូវការដែលបានផ្ទៀងផ្ទាត់ — ការកាន់កាប់រយៈពេល 5 ឆ្នាំបានបង្កើត ROI សរុប 34%។ នៅឆ្នាំទី 8 ការព្យាករណ៍គឺ 58%។ ប្រាក់ចំណូលពីការជួលកើនឡើងបូកបន្តិចម្តងៗតាមពេលវេលា។ CGT អនុវត្តនៅពេលលក់ចេញ ប៉ុន្តែរយៈពេលកាន់កាប់គឺជាអ្វីដែលជម្រុញផលចំណេញ។\""},{"role":"note","text":"ការបូកសរុបដកពិសោធន៍៖ តើភ្នាក់ងារបានបញ្ជាក់ចំនួនទឹកប្រាក់ CGT យ៉ាងច្បាស់លាស់ដែរឬទេ? តើពួកគាត់បានប្រើប្រាស់ការសិក្សាករណី J Tower 2 ជាភស្តុតាង ដោយមិនមែនជាការបញ្ចុះបញ្ចូលដែរឬទេ?"}],"debrief":"CGT ត្រូវតែត្រូវបានបង្ហាញជាមុនដោយសកម្មជាមួយនឹងតួលេខច្បាស់លាស់ — មិនមែនការផ្តល់ទំនុកចិត្តបែបស្រពិចស្រពិលនោះទេ។ ពាក្យថា 'កុំបារម្ភ' គឺមិនអាចទទួលយកបានឡើយ។ ពាក្យថា 'នេះជាការគណនា' ទើបជាការត្រឹមត្រូវ។"},"quiz":[{"q":"យោងតាមរបាយការណ៍ខុនដូ REAKH តើតម្លៃមធ្យមក្នុងមួយម៉ែត្រការ៉េនៅ BKK1 (gross) គឺស្មើនឹងប៉ុន្មាន?","opts":["$1,200","$1,800 — តម្លៃមធ្យមនៅរាជធានីភ្នំពេញ","$2,000","$2,800"],"correct":2,"explain":"REAKH រាយការណ៍ថា BKK1 មានតម្លៃ $2,000/sqm gross — ដែលជាតម្លៃមធ្យមទីផ្សារនៅគ្រប់កម្រិតគម្រោងក្នុង BKK1។ នេះជាតួលេខដែលត្រូវប្រើប្រាស់ក្នុងការសន្ទនាជាមួយអតិថិជន ដោយសារវាទទួលបានពីដៃគូបញ្ជីអចលនទ្រព្យផ្លូវការរបស់យើង។"},{"q":"យោងតាមទិន្នន័យ REAKH តើប្រភេទយូនីតមួយណាដែលគ្របដណ្តប់លើទាំងការទិញ និងការជួល?","opts":["Studio — តម្លៃទាបបំផុត ងាយស្រួលជួលបំផុត","បន្ទប់គេង 2 — ផ្តល់ផលចំណេញល្អបំផុត","បន្ទប់គេង 1 — 61% នៃការទិញ, 72% នៃការជួល","បន្ទប់គេង 3 — ថ្លៃជួលខ្ពស់បំផុត ការផ្គត់ផ្គង់មានកម្រិត"],"correct":2,"explain":"បន្ទប់គេង 1 គ្របដណ្តប់លើផ្នែកទាំងពីរ៖ 61% នៃការទិញខុនដូសរុប និង 72% នៃតម្រូវការជួលសរុប។ ពួកវាផ្តល់នូវតុល្យភាពល្អបំផុតនៃសមត្ថភាពទិញ ល្បឿននៃការជួល និងភាពងាយស្រួលចូលរួមរបស់វិនិយោគិន។"},{"q":"តើបរិមាណប្រតិបត្តិការនៅក្នុងទីផ្សារខុនដូនៅរាជធានីភ្នំពេញបានផ្លាស់ប្តូរប៉ុន្មានក្នុងឆ្នាំ 2025?","opts":["ថយចុះ 10% — ទីផ្សារនៅតែបន្តប្រមូលផ្តុំការស្តារឡើងវិញ","កើនឡើង 5% — យឺតប៉ុន្តែមានស្ថិរភាព","កើនឡើង 25% — បញ្ជាក់ដោយទិន្នន័យ REAKH","ថេរ — គ្មានការផ្លាស់ប្តូរគួរឱ្យកត់សម្គាល់"],"correct":2,"explain":"កើនឡើង 25% ក្នុងឆ្នាំ 2025។ នេះគឺជាចំណុចទិន្នន័យសន្ទុះទីផ្សារដែលសំខាន់បំផុតតែមួយគត់ពីរាយការណ៍ REAKH។ វាបង្ហាញពីទំនុកចិត្តរបស់អ្នកទិញដែលកំពុងត្រឡប់មកវិញ និងទីផ្សារដែលកំពុងឈានចូលដល់វដ្តថ្មី។"},{"q":"តើ CGT នៅកម្ពុជាត្រូវបានអនុវត្តក្នុងអត្រាប៉ុន្មាន និងលើមូលដ្ឋានអ្វី?","opts":["10% នៃតម្លៃលក់","20% នៃតម្លៃលក់សរុប","20% នៃប្រាក់ចំណេញដែលត្រូវជាប់ពន្ធ — ចំណេញបន្ទាប់ពីដកតម្លៃទិញ និងចំណាយ","5% ពន្ធប្រថាប់ត្រាលើតម្លៃពេញ"],"correct":2,"explain":"CGT គឺ 20% នៃប្រាក់ចំណេញដែលត្រូវជាប់ពន្ធ មិនមែនតម្លៃលក់ពេញនោះទេ។ ចំណេញ = តម្លៃលក់ ដក តម្លៃទិញ និងចំណាយដែលមានឯកសារបញ្ជាក់។ អ្នកជាប់ពន្ធក៏អាចប្រើប្រាស់វិធីសាស្ត្រកាត់កងកម្រិតថេរ 80% បានផងដែរ។ តែងតែបង្ហាញរឿងនេះឱ្យបានត្រឹមត្រូវ — ភាពខុសគ្នានេះផ្លាស់ប្តូរការគណនាពេលលក់ចេញរបស់វិនិយោគិនយ៉ាងខ្លាំង។"}]}},
{id:3,week:1,title:"How Real Estate Works in Cambodia",short:"Real Estate Law",objectives:["Know the difference between the two title types, and why it matters", "Explain the 3 foreign-ownership rules to any client, in simple words", "Know the 4 steps of the buying process, in order"],sections:[{"label": "Title Types", "heading": "The single most important word in this lesson: title", "body": "\"Title\" is the legal document that proves who owns a property. If a client buys the wrong title type, they may not legally own anything. This is the biggest mistake to avoid in your entire job.", "analogy": "A strata title works like a car registration from the national government. It proves that exact car belongs to you, anywhere in the country, and any police officer can check it. A soft title is more like a note from your neighborhood chief. It might be true, but nobody outside that neighborhood has to accept it, and there is no national record of it at all.", "box": {"title": "The 2 title types you need to know:", "lines": ["Strata Title — permanent ownership, registered with the national government (Ministry of Land Management). The only title type foreigners can legally use. Every PHC property has this.", "Soft Title — registered only with a local authority, not the national government. Not legally valid nationwide. Only for Cambodian citizens. Never recommend this to a PHC client."]}, "warning": "If a developer cannot prove strata title for a condo, stop the conversation. Tell Nick before you say anything else to the client."}, {"label": "Foreign Ownership Rules", "heading": "3 rules for foreign buyers — know these by heart", "body": "Cambodia does allow foreigners to own property, but only under 3 specific rules. A client will ask about this in almost every conversation. A wrong answer here breaks trust immediately. The two pictures below show the two rules that are easiest to get wrong — look at the picture, then read the rule.", "diagrams": ["floors", "quota"], "rules": [{"title": "Rule 1: Ground floor is never allowed", "detail": "Foreigners can only own units starting from the 1st floor and up. A ground-floor unit cannot legally belong to a foreigner — no matter what title type it has.", "action": "If a foreign client likes a ground-floor unit, tell them immediately it is not possible, then show them a unit one floor up instead."}, {"title": "Rule 2: Max 70% foreign ownership per building", "detail": "No more than 70% of the units in one building can be owned by foreigners. This is called the \"foreign quota.\" Always check how much quota is left before you recommend a project.", "action": "Before recommending any project, ask: how much foreign quota is left in this building? If it's under 5%, say so clearly before showing anything."}, {"title": "Rule 3: Strata title is required, no exceptions", "detail": "Every unit sold to a foreign client must have strata title. This was covered in the section above — it matters enough to repeat here.", "action": "Check the title type for every unit, every time, before you mention it to a foreign client."}]}, {"label": "The Buying Process", "heading": "4 steps, in order — memorize this order", "body": "Every client will ask \"what happens next?\" at some point. Know this order without having to look it up. Here it is as a picture first — the details are below it.", "flow": [{"title": "Reservation", "sub": "Small deposit, $1,000–$3,000"}, {"title": "SPA", "sub": "Legal contract, lawyer reviews it"}, {"title": "Payment Schedule", "sub": "Staged payments during construction"}, {"title": "Handover", "sub": "Title registered in your name"}], "rules": [{"title": "Step 1: Reservation", "detail": "The client pays a small deposit, usually $1,000–$3,000. This holds the unit while paperwork is prepared. Ask the developer about their specific refund policy before the client pays.", "action": "Confirm the refund policy in writing before the client pays the reservation deposit."}, {"title": "Step 2: Sale & Purchase Agreement (SPA)", "detail": "This is the main legal contract between the buyer and the developer. Always recommend the client hire their own independent lawyer to review it before signing.", "action": "Say this exact sentence to every client: \"I recommend having your own lawyer review the SPA before you sign.\""}, {"title": "Step 3: Payment Schedule", "detail": "Payments are usually made in stages during construction, or as one larger payment if the unit is already built. Know the payment schedule for every project you present.", "action": "Before showing a project, check its payment schedule so you can answer questions without pausing."}, {"title": "Step 4: Handover & Title Registration", "detail": "The developer hands over the finished unit. The client makes the final payment. Then the strata title is registered in the client's name at the Ministry of Land Management. PHC helps coordinate this step.", "action": "Tell the client this step exists early on, so the ending of the process is not a surprise."}]}],roleplay:{"scenario": "Explaining the foreign ownership rules", "instructions": "Practice sounding direct without sounding harsh. The client needs clarity, not a lecture.", "lines": [{"role": "client", "text": "\"I like unit 01 on the ground floor — can I buy it?\""}, {"role": "agent", "text": "\"I need to tell you clearly: as a foreigner, you cannot legally own a ground-floor unit in Cambodia.\""}, {"role": "client", "text": "\"Why not?\""}, {"role": "agent", "text": "\"Cambodian law only allows foreign ownership starting from the 1st floor and up. This rule applies no matter what type of title the unit has.\""}, {"role": "client", "text": "\"But the developer told me it has strata title.\""}, {"role": "agent", "text": "\"The title type is correct — but the floor rule still applies. Unit 02, one floor up, has the same layout and is fully available to you. Would you like to see it?\""}, {"role": "note", "text": "Debrief: Did the agent sound direct without sounding harsh? Did the client feel redirected, not rejected?"}], "debrief": "The floor rule is a hard rule. Do not soften it or suggest a workaround. Redirect confidently to a real option instead."},quiz:[{"q": "A foreign buyer wants a ground-floor unit in a new BKK1 condo. What do you do?", "opts": ["Continue — ground floor is fine if the building has strata title", "Explain clearly that foreigners cannot legally own ground-floor units, and offer an alternative unit", "Ask the developer if they can make an exception", "Suggest they use a Cambodian friend's name instead"], "correct": 1, "explain": "Foreigners can only own units from the 1st floor and up. This rule has no exceptions. Redirect to a real, legal option right away."}, {"q": "A building already has 68% foreign ownership. A Japanese investor wants to buy a unit there. What do you do?", "opts": ["Continue — 68% is under the 70% limit, so it's fine", "Point out that only 2% of the foreign quota remains — this is very close to the legal limit", "Tell them foreigners cannot buy there because it's over 65%", "It doesn't matter — strata title protects them regardless"], "correct": 1, "explain": "Only 2% of the foreign quota is left. This must be said clearly. The building could hit its limit before handover, which would block title registration."}, {"q": "What is an SPA?", "opts": ["A property valuation report", "Sale & Purchase Agreement — the main legal contract between buyer and developer", "A standard payment schedule", "A government land tax form"], "correct": 1, "explain": "SPA = Sale & Purchase Agreement. It is a binding legal contract. Always recommend the client's own independent lawyer review it before signing."}, {"q": "What is the first step a buyer takes to hold a specific unit?", "opts": ["Sign the SPA immediately", "Apply for a visa", "Pay a reservation deposit", "Pay the full purchase price"], "correct": 2, "explain": "The reservation deposit comes first — usually $1,000–$3,000. It holds the unit while paperwork is prepared. Always confirm the refund policy before the client pays."}, {"q": "Soft Title is:", "opts": ["Acceptable for foreign buyers if the condo is already built", "A national-level permanent title, equal to strata title", "Registered only with a local authority, not recognized nationwide — for Cambodian citizens only", "The same as strata title, but for commercial property"], "correct": 2, "explain": "Soft Title is not recognized at the national level. It is only for Cambodian citizens. Never recommend it to any PHC client, regardless of nationality."}],reflection:"In your own simple words, explain the foreign ownership rules to a first-time buyer from Japan who has never bought property outside Japan before.",km:{"title":"ដំណើរការអចលនទ្រព្យនៅកម្ពុជា","short":"ច្បាប់អចលនទ្រព្យ","objectives":["ស្គាល់ភាពខុសគ្នារវាងប្លង់រឹង (Hard Title) ប្លង់អគារសហកម្មសិទ្ធិ (Strata Title) និងប្លង់ទន់ (Soft Title)","យល់ដឹងពីក្បួនច្បាប់កម្មសិទ្ធិបរទេស និងអាចពន្យល់ដល់អតិថិជនគ្រប់រូបបាន","ស្គាល់ដំណើរការទិញជាជំហានៗ"],"sections":[{"label":"ប្រភេទប្លង់កម្មសិទ្ធិ","heading":"ប្រភេទប្លង់គឺជាអ្វីដែលសំខាន់បំផុតដែលអ្នកនឹងត្រូវរៀន","body":"ប្រភេទប្លង់កំណត់ពីកម្មសិទ្ធិស្របច្បាប់។ ប្លង់ខុសសម្រាប់អ្នកទិញបរទេស = គ្មានកម្មសិទ្ធិស្របច្បាប់។ មិនត្រូវណែនាំគម្រោងទៅកាន់អតិថិជនបរទេសដោយមិនបានផ្ទៀងផ្ទាត់ប្រភេទប្លង់ជាមុនឡើយ។","box":{"title":"ប្រភេទប្លង់ពីរដែលអ្នកត្រូវតែដឹង៖","lines":["ប្លង់រឹង / ប្លង់អគារសហកម្មសិទ្ធិ (Strata Title) — កម្មសិទ្ធិអចិន្ត្រៃយ៍។ ចុះបញ្ជីនៅក្រសួងរៀបចំដែនដី។ តម្រូវឱ្យមានសម្រាប់អ្នកទិញបរទេសទាំងអស់។ ជាស្ដង់ដាររបស់ PHC។","ប្លង់ទន់ — ចុះបញ្ជីត្រឹមអាជ្ញាធរមូលដ្ឋាន មិនត្រូវបានទទួលស្គាល់ក្នុងកម្រិតជាតិឡើយ។ សម្រាប់ជនជាតិខ្មែរតែប៉ុណ្ណោះ។ មិនត្រូវណែនាំដល់អតិថិជន PHC ណាម្នាក់ឡើយ។"]},"warning":"ប្រសិនបើម្ចាស់គម្រោងមិនអាចបញ្ជាក់ពីប្លង់អគារសហកម្មសិទ្ធិ (strata title) សម្រាប់ខុនដូបានទេ — កុំបន្តទៅមុខទៀត។ រាយការណ៍ជូន Nick មុនពេលផ្តល់ប្រឹក្សាដល់អតិថិជន។"},{"label":"ច្បាប់កម្មសិទ្ធិបរទេស","heading":"វិធានបីយ៉ាង — ត្រូវចាំឱ្យច្បាស់","body":"ប្រទេសកម្ពុជាអនុញ្ញាតឱ្យជនបរទេ ច្បាស់លាស់ មិនមែនការស្តីបន្ទោសនោះទេ។","lines":[{"role":"client","text":"\"ខ្ញុំចូលចិត្តយូនីតលេខ 01 នៅជាន់ផ្ទាល់ដី — តើខ្ញុំអាចទិញវាបានទេ?\""},{"role":"agent","text":"\"ខ្ញុំត្រូវតែជម្រាបអ្នកតាមត្រង់៖ ក្នុងនាមជាជនបរទេស អ្នកមិនអាចកាន់កាប់យូនីតជាន់ផ្ទាល់ដីដោយស្របច្បាប់នៅកម្ពុជាបានឡើយ។\""},{"role":"client","text":"\"ហេតុអ្វីបានជាមិនបាន?\""},{"role":"agent","text":"\"ច្បាប់កម្ពុជាកម្រិតកម្មសិទ្ធិអចិន្ត្រៃយ៍របស់ជនបរទេសត្រឹមតែយូនីតដែលស្ថិតនៅចាប់ពីជាន់ទី 1 ឡើងលើតែប៉ុណ្ណោះ។ ការកម្រិតនេះអនុវត្តដោយមិនគិតពីប្រភេទប្លង់នោះទេ។\""},{"role":"client","text":"\"ប៉ុន្តែម្ចាស់គម្រោងបាននិយាយថាវាជាប្លង់អគារសហកម្មសិទ្ធិ (strata title)។\""},{"role":"agent","text":"\"ប្លង់អគារសហកម្មសិទ្ធិគឺត្រឹមត្រូវសម្រាប់អគារ — ប៉ុន្តែការកម្រិតជាន់នៅតែអនុវត្តដដែល។ ជាន់ទី 2 មានផ្លង់បន្ទប់ស្រដៀងគ្នា ហើយគ្រប់លក្ខខណ្ឌសម្រាប់កម្មសិទ្ធិបរទេស។ តើឱ្យខ្ញុំបង្ហាញប្លង់ជាន់ជូនអ្នកមើលដែរឬទេ?\""},{"role":"note","text":"ការបូកសរុបដកពិសោធន៍៖ តើភ្នាក់ងារនិយាយចំៗដោយមិនតឹងរ៉ឹងពេកដែរឬទេ? តើអតិថិជនមានអារម្មណ៍ថាត្រូវបានតម្រង់ទិសឡើងវិញ — មិនមែនត្រូវបានបដិសេធដែរឬទេ?"}],"debrief":"ការកម្រិតជាន់គឺជាច្បាប់ដាច់ខាត។ មិនត្រូវសម្រួលវាឱ្យស្រាល ឬស្នើវិធីសាស្រ្តកៀចវាងឡើយ។ តម្រង់ទិសដោយទំនុកចិត្តទៅកាន់ជម្រើសផ្សេងទៀតដែលស្របច្បាប់។"},"quiz":[{"q":"វិនិយោគិនបរទេសម្នាក់ចង់ទិញយូនីតជាន់ផ្ទាល់ដីនៅក្នុងខុនដូថ្មីនៅ BKK1។ អ្នកគួរតែ៖","opts":["បន្តដំណើរការ — ជាន់ផ្ទាល់ដីគឺមិនអីទេប្រសិនបើមានប្លង់អគារសហកម្មសិទ្ធិ","ផ្តល់ប្រឹក្សាថាជនបរទេសមិនអាចកាន់កាប់យូនីតជាន់ផ្ទាល់ដីដោយស្របច្បាប់បានឡើយ ហើយផ្តល់ជម្រើសផ្សេង","ពិនិត្យជាមួយម្ចាស់គម្រោងថាតើពួកគាត់អាចធ្វើការលើកលែងបានដែរឬទេ","ណែនាំឱ្យពួកគាត់ប្រើប្រាស់រចនាសម្ព័ន្ធតំណាងជនជាតិខ្មែរ (nominee)"],"correct":1,"explain":"ជនបរទេសអាចកាន់កាប់បានតែយូនីតចាប់ពីជាន់ទី 1 ឡើងលើតែប៉ុណ្ណោះ។ នេះគឺជាច្បាប់មិនអាចសម្រុះសម្រួលបានឡើយ។ តម្រង់ទិសទៅកាន់យូនីតជាន់ខាងលើដែលស្របច្បាប់ភ្លាមៗ។"},{"q":"គម្រោងមួយមានកម្មសិទ្ធិបរទេស 68% រួចហើយ។ វិនិយោគិនជប៉ុនម្នាក់ចង់ទិញ។ អ្នកគួរតែ៖","opts":["បន្តដំណើរការ — 68% គឺស្ថិតនៅក្រោមពិដាន 70% ដូច្នេះវាគ្មានបញ្ហាទេ","កត់សម្គាល់ថាមានកូតាបរទេសនៅសល់តែ 2% ប៉ុណ្ណោះ — នេះជិតដល់កម្រិតកំណត់តាមច្បាប់ហើយ","ប្រាប់ពួកគាត់ថាជនបរទេសមិនអាចទិញបានទេព្រោះវាលើសពី 65%","វាមិនសំខាន់ទេ — ប្លង់អគារសហកម្មសិទ្ធិការពារពួកគាត់ដោយមិនគិតពីកូតា"],"correct":1,"explain":"កូតាបរទេសនៅសល់តែ 2% ប៉ុណ្ណោះ។ រឿងនេះត្រូវតែត្រូវបានបញ្ជាក់ឱ្យច្បាស់លាស់។ គម្រោងអាចនឹងឈានដល់កម្រិតកំណត់មុនពេលប្រគល់ផ្ទះ ដែលអាចរាំងស្ទះដល់ការផ្ទេរប្លង់។"},{"q":"តើ SPA គឺជាអ្វីនៅក្នុងដំណើរការទិញនៅកម្ពុជា?","opts":["ការវាយតម្លៃអចលនទ្រព្យសហកម្មសិទ្ធិ","កិច្ចសន្យាទិញលក់ — កិច្ចសន្យាផ្លូវច្បាប់រវាងអ្នកទិញ និងម្ចាស់គម្រោង","ការរៀបចំការបង់ប្រាក់ស្ដង់ដារ","ព្រះរាជក្រមទ្រព្យសម្បត្តិរដ្ឋ"],"correct":1,"explain":"SPA = Sales & Purchase Agreement (កិច្ចសន្យាទិញលក់)។ វាជាកិច្ចសន្យាផ្លូវច្បាប់ដែលមានភាពជាប់ជំពាក់រវាងអ្នកទិញ និងម្ចាស់គម្រោង។ តែងតែណែនាំអតិថិជនឱ្យមានទីប្រឹក្សាផ្នែកច្បាប់ឯករាជ្យពិនិត្យមើលមុនពេលចុះហត្ថលេខា។"},{"q":"តើអ្វីជាជំហានដំបូងដែលអ្នកទិញត្រូវធ្វើដើម្បីកក់យូនីតជាក់លាក់ណាមួយ?","opts":["ចុះហត្ថលេខាលើ SPA ភ្លាមៗ","ដាក់ពាក្យសុំទិដ្ឋាការ","បង់ប្រាក់កក់ទុក (Reservation deposit)","ផ្ទេរប្រាក់ថ្លៃទិញពេញលេញ"],"correct":2,"explain":"ការកក់ទុកមកមុនគេ — ជាធម្មតា $1,000–$3,000។ វា រក្សាយូនីត ខណៈពេលដែលឯកសារកំពុងត្រូវបានរៀបចំ។ តែងតែបញ្ជាក់ពីគោលការណ៍សងប្រាក់វិញមុនពេលណែនាំអតិថិជនឱ្យបន្តដំណើរការ។"},{"q":"ប្លង់ទន់ (Soft Title) គឺ៖","opts":["អាចទទួលយកបានសម្រាប់អ្នកទិញបរទេសក្នុងខុនដូដែលសាងសង់រួច","ប្លង់អចិន្ត្រៃយ៍ដែលបានចុះបញ្ជីថ្នាក់ជាតិស្មើនឹងប្លង់អគារសហកម្មសិទ្ធិ","ប្លង់ដែលបានចុះបញ្ជីត្រឹមអាជ្ញាធរមូលដ្ឋានដែលមិនត្រូវបានទទួលស្គាល់ក្នុងកម្រិតជាតិ — សម្រាប់ជនជាតិខ្មែរតែប៉ុណ្ណោះ","ដូចគ្នានឹងប្លង់អគារសហកម្មសិទ្ធិដែរ ប៉ុន្តែសម្រាប់អចលនទ្រព្យពាណិជ្ជកម្ម"],"correct":2,"explain":"ប្លង់ទន់មិនត្រូវបានទទួលស្គាល់ក្នុងកម្រិតជាតិឡើយ។ វាសម្រាប់ជនជាតិខ្មែរតែប៉ុណ្ណោះ។ មិនត្រូវណែនាំវាដល់អតិថិជន PHC ណាម្នាក់ឡើយ ដោយមិនគិតពីសញ្ជាតិនោះទេ។"}]}},
{id:4,week:1,title:"The PHC Project Portfolio",short:"Project Portfolio",objectives:["Know every active PHC project: developer, location, status, price, title type", "Match the right project to the right client", "Explain one real, verified investment result using real numbers"],sections:[{"label": "The Two Developers You'll Mention Most", "heading": "Know these two developers as well as you know the projects", "body": "PHC works with several developers. Two of them come up constantly with international buyers — learn their story, not just their name.", "table": {"headers": ["Developer", "Track record", "Best for"], "rows": [["Megakim World Corp", "7 completed projects, strong delivery history, modern design", "International + local buyers, competitive pricing"], ["Tanichu Assetment", "Japanese developer, precise build quality, confirmed freehold strata", "Japanese investors — highest cultural trust"]]}}, {"label": "Active Projects", "heading": "Know status, price, and best-fit client for each", "body": "These are the projects you will discuss in almost every client conversation.", "table": {"headers": ["Project", "District", "From", "Status", "Best for"], "rows": [["Time Square 8", "Toul Tompoung", "~$1,452/sqm", "Completed", "Overseas Khmer, budget investors"], ["Time Square 9", "BKK1", "~$1,700/sqm", "Under construction", "JP investors, EU buyers, upscale Khmer"], ["Time Square 10", "Otres Beach", "~$40K", "Under construction", "Coastal/holiday, low-budget entry"], ["Time Square 11", "BKK3", "TBC", "Launching Feb 2026", "Local Khmer, first-home buyers"], ["J Tower 2", "BKK1 area", "Market rate", "Completed", "Japanese investors — Tier 1"], ["J Tower 3", "BKK1 area", "TBC", "Pre-sale", "Japanese investors — Tier 1"], ["Le Condé", "BKK1", "From $150K", "Completed May '25", "Japan-managed, hands-off Europeans"], ["Royal Platinum", "Toul Kork", "From $120K", "Completed 2025", "European retirees, Khmer families"], ["Peninsula", "Chroy Changvar", "~$4,200/sqm", "On sale", "Yield-focused Europeans, $300K+"], ["G.A.T.O Tower", "BKK1", "TBC", "Near launch", "Luxury Japanese, $400K+ Europeans"]]}}, {"label": "Quick Match Guide", "heading": "Filter by client type before you present anything", "body": "Use this list before your first recommendation to any client.", "rules": [{"title": "Japanese investor, safety-focused", "detail": "J Tower 2 or J Tower 3 — a Japanese developer (Tanichu) is the strongest trust signal for this client.", "action": "Lead with the developer's name before the unit details."}, {"title": "European, wants hands-off rental", "detail": "Le Condé — managed by Hopetree Japan from day one, no landlord duties.", "action": "Say the words \"fully managed\" in your first sentence about this project."}, {"title": "Khmer family, first home", "detail": "Time Square 11 (BKK3) or Royal Platinum (Toul Kork).", "action": "Ask about school proximity before showing any unit."}, {"title": "Low-budget investor", "detail": "Time Square 10, Otres Beach, from about $40K.", "action": "Confirm their budget ceiling before mentioning this — it can feel like a downgrade if introduced wrong."}, {"title": "Luxury, long-term hold", "detail": "J Tower 3 or G.A.T.O Tower — landmark locations.", "action": "These are the only projects to open with price first, not story first — this client expects it."}]}, {"label": "A Real, Verified Result", "heading": "J Tower 2 — a real transaction, not a projection", "body": "This is documented in REAKH's own 2025 market report. Use it as evidence in conversation — never as a promise of what will happen to a new buyer.", "calc": {"title": "J Tower 2 — 2BR unit, bought 2019, sold 2024", "rows": [{"label": "Purchase price + furniture (2019)", "value": "$147,755"}, {"label": "Rental income, 5 years (net of fees)", "value": "$23,392"}, {"label": "Resale price (2024)", "value": "$175,000"}, {"label": "Capital gain", "value": "$27,245"}, {"label": "Total 5-year return", "value": "$50,637 (34.3%, ~6.85%/yr)", "total": true}]}, "warning": "This is one real, past result on one specific unit. Past results do not guarantee future ones. Always say \"this is what happened\" — never \"this is what will happen.\""}],roleplay:{"scenario": "Matching the right project to a client's stated goal", "instructions": "Practice explaining your reasoning, not just naming a project.", "lines": [{"role": "client", "text": "\"I have $180,000. I want stable rental income and I don't want to manage anything myself.\""}, {"role": "agent", "text": "\"Based on that, I'd focus on two options — both completed, both professionally managed.\""}, {"role": "client", "text": "\"What are they?\""}, {"role": "agent", "text": "\"Le Condé in BKK1, managed by Hopetree Japan, from $150K. And J Tower 2, completed, managed, strong rental demand from Japanese developer trust.\""}, {"role": "client", "text": "\"Why these two and not something else?\""}, {"role": "agent", "text": "\"Because you said hands-off and stable — a completed, professionally managed building removes construction risk and the guesswork of a new building's vacancy rate. These two are the closest to a ready-made outcome that Cambodia currently offers.\""}, {"role": "note", "text": "Debrief: Did the agent explain *why*, not just name projects? Did the client feel understood, not sold to?"}], "debrief": "Always explain your reasoning for the 2-3 options you show. \"These fit your goals\" is not enough — explain how."},quiz:[{"q": "Which developer is Japanese, and is the strongest trust signal for Japanese buyers?", "opts": ["Megakim World Corp", "Tanichu Assetment", "Hopetree Japan", "Royal Platinum Group"], "correct": 1, "explain": "Tanichu Assetment. A Japanese developer name is the single strongest cultural trust signal for a Japanese client."}, {"q": "A European client wants a completed, professionally managed rental unit under $200K. Best first recommendation?", "opts": ["Time Square 10, Otres Beach", "G.A.T.O Tower", "Le Condé, BKK1 — completed ដង់ដារស្ថាប័ន។\""},{"role":"client","text":"\"តើជម្រើសទាំងនោះជាអ្វីខ្លះ?\""},{"role":"agent","text":"\"Le Condé BKK1 — បញ្ចប់ការសាងសង់ឧសភា 2025 ការគ្រប់គ្រងដោយ Hopetree Japan មានប្លង់អគារសហកម្មសិទ្ធិ ចាប់ពី $150K។ និង J Tower 2 — បញ្ចប់ការសាងសង់ ម្ចាស់គម្រោងជប៉ុន Tanichu ប្លង់អគារសហកម្មសិទ្ធិអចិន្ត្រៃយ៍ តម្រូវការជួលខ្ពស់។ ទាំងពីរនេះសមស្របនឹងតម្រូវការស្ថិរភាពរបស់អ្នក។\""},{"role":"client","text":"\"ហេតុអ្វីជ្រើសរើសពីរហ្នឹង ហើយមិនមែនជាគម្រោងផ្សេងទៀត?\""},{"role":"agent","text":"\"ដោយសារតែអ្នកបាននិយាយពីស្ថិរភាព។ ទ្រព្យសម្បត្តិដែលសាងសង់រួចរាល់ជាមួយការគ្រប់គ្រងដែលបានផ្ទៀងផ្ទាត់ នឹងលុបបំបាត់ហានិភ័យសាងសង់ និងភាពមិនប្រាកដប្រជានៃបន្ទប់ទំនេររបស់គម្រោងមិនទាន់សាងសង់។ គម្រោងទាំងពីរនេះគឺជិតបំផុតទៅនឹងភាពរួចរាល់ស្រាប់ដែលប្រទេសកម្ពុជាផ្តល់ជូន។\""},{"role":"note","text":"ការបូកសរុបដកពិសោធន៍៖ តើភ្នាក់ងារបានផ្តល់ហេតុផលនៃការជ្រើសរើសយ៉ាងច្បាស់លាស់ដែរឬទេ? តើអតិថិជនមានអារម្មណ៍ថាត្រូវបានស្តាប់ — មិនមែនត្រូវបានដេញដោលលក់ដែរឬទេ?"}],"debrief":"តែងតែផ្តល់ហេតុផលថាហេតុអ្វីបានជាអ្នកជ្រើសរើសជម្រើស 2–3 ដែលអ្នកបង្ហាញ។ ពាក្យថា 'ជម្រើសទាំងនេះសមស្របនឹងគោលដៅរបស់អ្នក' គឺមិនទាន់គ្រប់គ្រាន់ទេ — ចូពន្យល់ថាតើវាសមស្របដោយរបៀបណា។"},"quiz":[{"q":"តើគម្រោង Megakim មួយណាដែលលក់អស់ 85% នៃយូនីតសរុបក្នុងរយៈពេល 6 ខែបន្ទាប់ពីបើកលក់?","opts":["Time Square 9","Time Square 10","Time Square 11","Time Square 8"],"correct":3,"explain":"Time Square 8, ទួលទំពូង។ ការបញ្ជាក់ទីផ្សារយ៉ាងរឹងមាំសម្រាប់ប្រវត្តិសាងសង់ប្រគល់ផ្ទះរបស់ Megakim និងតម្រូវការទិញពិតប្រាកដ។"},{"q":"វិនិយោគិនជប៉ុនម្នាក់ចង់បានគម្រោងដែលមានទំនុកចិត្តខ្ពស់បំផុតនៅក្នុងបញ្ជី។ អ្នកណែនាំ៖","opts":["Le Condé BKK1","J Tower 2 ឬ J Tower 3","Time Square 9","G.A.T.O Tower"],"correct":1,"explain":"J Tower 2 ឬ J Tower 3។ ម្ចាស់គម្រោងជប៉ុន (Tanichu) = សញ្ញានៃទំនុកចិត្តតាមវប្បធម៌ខ្ពស់បំផុតសម្រាប់វិនិយោគិនជប៉ុន។ នេះគឺជាការណែនាំកម្រិត Tier 1 សម្រាប់ក្រុមអតិថិជននោះ។"},{"q":"Le Condé ត្រូវបានគ្រប់គ្រងដោយក្រុមហ៊ុនប្រតិបត្តិករមួយណា — ហើយហេតុអ្វីបានជារឿងនេះសំខាន់?","opts":["ការគ្រប់គ្រងអចលនទ្រព្យ Megakim","Hopetree Japan — បង្ហាញពីការគ្រប់គ្រងស្ដង់ដារជប៉ុនកម្រិតស្ថាប័ន","Wangfu International ដោយផ្ទាល់","ក្រុមហ៊ុនភ្នាក់ងារក្នុងស្រុកឯករាជ្យ"],"correct":1,"explain":"Hopetree Japan។ នេះគឺជាចំណុចលក់សំខាន់សម្រាប់វិនិយោគិនជប៉ុន (ម៉ាកសញ្ញាដែលស្គាល់) និងអ្នកទិញអឺរ៉ុបដែលមិនចង់ចាត់ចែងផ្ទាល់ (ប្រតិបត្តិករគុណភាពស្ថាប័ន)។"},{"q":"អ្នកទិញអឺរ៉ុបម្នាក់ចង់បានទ្រព្យសម្បត្តិជួលសាងសង់រួច មិនចង់ចាត់ចែងផ្ទាល់ ក្រោម $200K។ ការណែនាំដំបូងរបស់អ្នកគឺ៖","opts":["Time Square 10 Otres Beach — តម្លៃចាប់ផ្តើមទាបបំផុត","G.A.T.O Tower — ទីតាំង BKK1 ដ៏លេចធ្លោ","Le Condé BKK1 — បញ្ចប់ការសាងសង់ឧសភា 2025, ការគ្រប់គ្រងដោយ Hopetree Japan, ចាប់ពី $150K","J Tower 3 — ជប៉ុនប្រណិត, កម្រិតខ្ពស់បំផុត"],"correct":2,"explain":"Le Condé ត្រូវគ្នានឹងលក្ខខណ្ឌទាំងអស់៖ សាងសង់រួចរាល់, ការគ្រប់គ្រងស្ថាប័ន (Hopetree Japan), ទីតាំង BKK1, ចាប់ពី $150K។ វាគឺជាការផ្គូផ្គងកម្រិត Tier 1 សម្រាប់អ្នកទិញអឺរ៉ុបដែលចង់បានការជួលដោយមិនចាត់ចែងផ្ទាល់ក្រោម $200K។"}]}},
{id:5,week:1,title:"Who Our Clients Are",short:"Client Segments",objectives:["Know PHC's 5 client segments: profile, goal, and decision style", "Identify which segment a new client belongs to within 5 minutes", "Know which projects match each segment — and why"],sections:[{"label": "Why Segmentation Matters", "heading": "One approach does not fit every client", "body": "The biggest mistake a new agent makes is treating every client the same way. A safety-focused Japanese investor needs a very different conversation from a young Khmer professional buying their first home. Knowing your client's segment before you talk about any project is not optional — it is the foundation of good advice.", "box": {"title": "The rule", "lines": ["Identify the client segment first. Match the project second. Never do it the other way around."]}}, {"label": "The 5 Segments", "heading": "Know each profile clearly", "body": "These are the five types of client PHC serves. Each one has a different goal, decision style, and best-fit project.", "table": {"headers": ["Segment", "Profile", "Main goal", "Best projects"], "rows": [["Japanese investors", "40–65, high earner, low risk tolerance", "Stable passive income, capital safety", "J Tower 2, J Tower 3, TS9, Le Condé"], ["German/European", "45–65, pre-retirement, analytical", "Monthly income to supplement pension", "Le Condé, Royal Platinum, Peninsula"], ["Overseas Cambodians", "30–55, abroad, family-focused", "Home for family, safe capital, connection", "TS8, TS11, Royal Platinum, TS9"], ["Local Khmer", "25–50, Phnom Penh-based, lifestyle upgrade", "Safe family home, community", "TS11 BKK3, Royal Platinum, TS8"], ["Other foreign investors", "Russian, Chinese, hands-off rental", "Yield and management quality", "Le Condé, Peninsula, TS9"]]}}, {"label": "The 5-Minute Test", "heading": "3 questions, in order, tell you the segment", "body": "In the first 5 minutes of any first meeting, ask these 3 questions in this order. By the end, you'll know which segment you're talking to.", "flow": [{"title": "1. Background", "sub": "Nationality and past investing experience"}, {"title": "2. Their goal", "sub": "Income, lifestyle, or both"}, {"title": "3. The power question", "sub": "What would make this the wrong decision?"}], "rules": [{"title": "Question 1: background", "detail": "\"Have you invested in property before — here or anywhere else?\" This sets the segment fast.", "action": "Ask this within the first minute of any new client conversation."}, {"title": "Question 2: their goal", "detail": "\"What do you hope this investment gives you?\" Rental income points to an investor. Living there points to an end-user.", "action": "Listen for the word \"income\" vs the word \"live\" — that single word tells you a lot."}, {"title": "Question 3: the power question", "detail": "\"What would make this the wrong decision for you?\" This single question reveals risk tolerance, decision criteria, and hidden worries all at once.", "action": "Ask this question word-for-word — it is the most useful sentence in this entire lesson."}]}],roleplay:{"scenario": "Identifying a client's segment in 5 minutes", "instructions": "Practice the 5-minute test feeling natural — not like an interrogation.", "lines": [{"role": "client", "text": "\"I'm interested in property in BKK1. What do you have?\""}, {"role": "agent", "text": "\"Happy to show you. Before I do — can I ask a couple of quick questions so I show you the most relevant options?\""}, {"role": "client", "text": "\"Sure, go ahead.\""}, {"role": "agent", "text": "\"What's driving your interest right now — rental income, capital growth, a place to live, or a mix?\""}, {"role": "client", "text": "\"Mostly a place to spend 4-5 months a year, but ideally it pays for itself when I'm not there.\""}, {"role": "agent", "text": "\"That's very helpful. And is this for retirement use, or are you still working?\""}, {"role": "client", "text": "\"I retire in about 18 months. I'm based in Switzerland.\""}, {"role": "agent", "text": "\"Perfect — that's a profile our co-founder Reza works with directly. He specializes with European retirement buyers. I'd like to bring him into our next conversation.\""}, {"role": "note", "text": "Debrief: Did the agent avoid showing everything before qualifying? Did the handoff to Reza feel smooth?"}], "debrief": "Notice the agent didn't show anything. In 4 questions they identified: European → retirement buyer → part-year use + rental → needs Reza. Segment first. Always."},quiz:[{"q": "A 52-year-old German client says their main goal is \"reliable monthly income to add to my pension.\" Which segment are they?", "opts": ["Segment 5 — other foreign investors", "Segment 2 — German/European", "Segment 1 — Japanese investors", "Segment 3 — Overseas Cambodians"], "correct": 1, "explain": "German/European. The pension-income framing, European nationality, and reason-led approach are exactly the expected profile. Bring in Reza early."}, {"q": "A local Khmer buyer says \"I need to discuss with my parents before deciding.\" What should you do?", "opts": ["Push for a faster decision — parents aren't the buyer", "Support it fully — provide shareable documents and welcome the family into the process", "Lower the price to make the decision easier", "Follow up more frequently to keep momentum"], "correct": 1, "explain": "Family agreement is a normal part of the process for local Khmer buyers. Support it. Prepare shareable documents. Never treat it as an obstacle."}, {"q": "What is the most powerful of the 3 qualifying questions?", "opts": ["\"What's your budget?\"", "\"How did you hear about us?\"", "\"What would make this the wrong decision for you?\"", "\"Are you buying for yourself or as an investment?\""], "correct": 2, "explain": "\"What would make this the wrong decision for you?\" reveals risk tolerance, worries, and decision criteria all at once. It's the single most valuable question in the qualifying process."}, {"q": "The correct order for advising any client is:", "opts": ["Match a project first, then understand the client", "Identify the segment first, then match a project", "Show every available option, then narrow down", "Ask about budget first, then everything else"], "correct": 1, "explain": "Identify the segment first. Match the project second. This order is never reversed at PHC — showing everything before qualifying is a volume-focused salesperson's move, not an advisor's."}, {"q": "An overseas Cambodian client living abroad contacts you about property for their family in Phnom Penh. You should:", "opts": ["Focus on investment yield — same as any other foreign buyer", "Prioritize clear comparisons, fast responses, and video-call support", "Treat them the same as a local end-user — same profile", "Refer them to an agent who only speaks Khmer"], "correct": 1, "explain": "Overseas Cambodians often decide faster than local buyers but need clear comparisons and remote support. Fast, responsive communication is a priority for this segment."}],reflection:"You meet a new client. In the first 5 minutes, what 3 things do you want to know about them — and why those 3?",km:{"title":"តើអតិថិជនរបស់យើងជានរណា","short":"ក្រុមអតិថិជន","objectives":["ស្គាល់ក្រុមអតិថិជន PHC ទាំង 5 តាមរយៈប្រវត្តិរូប គោលដៅ និងរចនាប័ទ្មនៃការសម្រេចចិត្ត","អាចកំណត់បានថាអតិថិជនថ្មីស្ថិតនៅក្នុងក្រុមណាក្នុងរយៈពេល 5 នាទី","ស្គាល់គម្រោងណាដែលត្រូវគ្នានឹងក្រុមនីមួយៗ — និងហេតុអ្វី"],"sections":[{"label":"ហេតុអ្វីបានជាការបែងចែកក្រុមសំខាន់","heading":"វិធីសាស្ត្រតែមួយមិនអាចសមស្របនឹងមនុស្សគ្រប់គ្នានោះទេ","body":"កំហុសធំបំផុតដែលភ្នាក់ងារថ្មីធ្វើ គឺការប្រព្រឹត្តទៅលើអតិថិជនគ្រប់រូបដូចៗគ្នា។ វិនិយោគិនជប៉ុនដែលផ្តល់អាទិភាពលើស្ថិរភាព ត្រូវការការសន្ទនាខុសគ្នាស្រឡះពីអ្នកជំនាញការខ្មែរវ័យក្មេងដែលទិញផ្ទះដំបូងរបស់ពួកគាត់។ ការយល់ពីក្រុមអតិថិជនរបស់អ្នកមុនពេលនិយាយអ្វីមួយអំពីគម្រោងមិនមែនជាជម្រើសនោះទេ — វាគឺជាគ្រឹះនៃការផ្តល់ប្រឹក្សាដ៏ល្អ។","box":{"title":"ក្បួនច្បាប់៖","lines":["កំណត់ក្រុមអតិថិជនជាមុន។ ផ្គូផ្គងគម្រោងជាក្រោយ។ មិនត្រូវធ្វើច្រាសលំដាប់ន
