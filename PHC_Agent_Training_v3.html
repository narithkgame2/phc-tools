ំណត់តម្រូវការលើប្រាក់ចំណូលចូលនិវត្តន៍ សញ្ជាតិអឺរ៉ុប វិធីសាស្ត្រផ្តោតលើហេតុផលជាចម្បងដែលត្រូវបានរំពឹងទុក។ អញ្ជើញ Reza ឱ្យចូលរួមពីដំបូង។"},{"q":"អ្នកទិញខ្មែរក្នុងស្រុកម្នាក់និយាយថា 'ខ្ញុំត្រូវពិភាក្សាជាមួយឪពុកម្តាយរបស់ខ្ញុំមុនពេលសម្រេចចិត្ត។' អ្នកគួរតែ៖","opts":["ជម្រុញឱ្យមានការសម្រេចចិត្តលឿនជាងមុន — ឪពុកម្តាយមិនមែនជាអ្នកទិញនោះទេ","ផ្តល់ឯកសារដែលវាងាយស្រួលចែករំលែក និងស្វាគមន៍គ្រួសារចូលទៅក្នុងដំណើរការ","កាត់បន្ថយតម្លៃដើម្បីធ្វើឱ្យការសម្រេចចិត្តកាន់តែងាយស្រួល","តាមដានឱ្យបានញឹកញាប់ជាងមុនដើម្បីរក្សាសន្ទុះ"],"correct":1,"explain":"ការឯកភាពគ្នាក្នុងគ្រួសារគឺជាផ្នែកនៃដំណើរការធម្មតាសំរាប់អ្នកទិញខ្មែរក្នុងស្រុក។ គាំទ្រវាឱ្យពេញលេញ។ រៀបចំឯកសារដែលអាចចែករំលែកបាន។ មិនត្រូវប្រព្រឹត្តទៅលើវាជាឧបសគ្គឡើយ។"},{"q":"សំណួរកំណត់លក្ខខណ្ឌរយៈពេល 5 នាទីដែលមានអំណាចបំផុតគឺ៖","opts":["'តើថវិការបស់អ្នកមានប៉ុន្មាន?'","'តើអ្នកដឹងព័ត៌មានអំពីយើងតាមរបៀបណា?'","'តើអ្វីដែលនឹងធ្វើឱ្យការសម្រេចចិត្តនេះក្លាយជាការសម្រេចចិត្តមិនល្អសម្រាប់អ្នក?'","'តើអ្នកទិញសម្រាប់ខ្លួនឯង ឬជាការវិនិយោគ?'"],"correct":2,"explain":"'តើអ្វីដែលនឹងធ្វើឱ្យការសម្រេចចិត្តនេះក្លាយជាការសម្រេចចិត្តមិនល្អសម្រាប់អ្នក?' បង្ហាញពីការអត់ធ្មត់ហានិភ័យ ការព្រួយបារម្ភ និងលក្ខណៈវិនិច្ឆ័យនៃការសម្រេចចិត្តក្នុងពេលដំណាលគ្នា។ វាជាសំណួរកំណត់លក្ខខណ្ឌដែលមានតម្លៃបំផុតតែមួយគត់នៅក្នុងរចនាសម្ព័ន្ធ PHC។"},{"q":"លំដាប់ដែលត្រឹមត្រូវក្នុងការផ្តល់ប្រឹក្សាដល់អតិថិជនគឺ៖","opts":["ផ្គូផ្គងគម្រោងជាមុន បន្ទាប់មកយល់ពីអតិថិជន","កំណត់ក្រុមអតិថិជនជាមុន ផ្គូផ្គងគម្រោងជាក្រោយ","បង្ហាញជម្រើសដែលអាចរកបានទាំងអស់ បន្ទាប់មកបង្រួមមកវិញ","សួរថវិកាជាមុន បន្ទាប់មកកំណត់ក្រុមអតិថិជន"],"correct":1,"explain":"កំណត់ក្រុមអតិថិជនជាមុន។ ផ្គូផ្គងគម្រោងជាក្រោយ។ លំដាប់នេះមិនដែលត្រូវបានធ្វើច្រាសឡើយនៅ PHC — ការបង្ហាញមុនពេលកំណត់លក្ខខណ្ឌគឺជាសកម្មភាពរបស់អ្នកលក់ដែលផ្តោតលើបរិមាណ មិនមែនជាទីប្រឹក្សានោះទេ។"},{"q":"អតិថិជនខ្មែរនៅបរទេសម្នាក់ដែលរស់នៅបរទេសទាក់ទងមកអ្នកអំពីអចលនទ្រព្យសម្រាប់គ្រួសាររបស់ពួកគាត់នៅភ្នំពេញ។ អ្នកគួរតែ៖","opts":["ផ្តោតលើផលចំណេញនៃការវិនិយោគ — ដូចគ្នានឹងអ្នកទិញបរទេសដទៃទៀតដែរ","ផ្តល់អាទិភាពលើការប្រៀបធៀបដែលច្បាស់លាស់ ការប្រាស្រ័យទាក់ទងឆ្លើយតបបានលឿន និងការគាំទ្រការមើលតាមវីដេអូ","ប្រព្រឹត្តទៅលើពួកគាត់ដូចជាអ្នកប្រើប្រាស់ចុងក្រោយខ្មែរក្នុងស្រុក — ប្រវត្តិរូបដូចគ្នា","បញ្ជូនពួកគាត់ទៅកាន់ភ្នាក់ងារដែលនិយាយភាសាខ្មែរតែប៉ុណ្ណោះ"],"correct":1,"explain":"ប្រជាជនខ្មែរនៅបរទេសជាញឹកញាប់ជាអ្នកសម្រេចចិត្តលឿនជាង ប៉ុន្តែត្រូវការការប្រៀបធៀបច្បាស់លាស់ និងការគាំទ្រពីចម្ងាយ។ ការប្រាស្រ័យទាក់ទងឆ្លើយតបបានលឿន និងការសម្រួលការមើលតាមវីដេអូគឺជាអាទិភាព។"}]}},
{id:6,week:2,title:"The PHC Advisor Mindset",short:"Advisor Mindset",objectives:["Understand what separates a trusted advisor from a salesperson", "Know PHC's trust-building sequence for first meetings", "Avoid the 5 most common mistakes new agents make"],sections:[{"label": "The Mindset Shift", "heading": "Being calm and asking questions builds more trust than talking", "body": "Most agents try to impress a client by showing off what they know. PHC advisors do the opposite. They ask more than they tell. They explain risk before they explain return. They say \"this project might not be right for you\" — and mean it. This calm, patient approach is what builds real trust.", "flow": [{"title": "1. Listen first", "sub": "Understand the client before showing anything"}, {"title": "2. Risk before return", "sub": "Name the downside before the upside"}, {"title": "3. Show 2-3 options", "sub": "With a reason for each one"}, {"title": "4. No pressure to decide", "sub": "Never force a decision in the first meeting"}, {"title": "5. Written follow-up", "sub": "Same-day summary, always"}]}, {"label": "The 5 Mistakes", "heading": "What destroys trust — instantly", "body": "These are 5 behaviors and habits that will damage your credibility with a client. Each one is common, but none of them is acceptable at PHC.", "rules": [{"title": "Calling gross yield the same as net yield", "detail": "Always show the net figure. Gross yield does not include the real costs a client will actually pay.", "action": "Say the word \"net\" every time you say a yield number."}, {"title": "Promising future prices", "detail": "Phrases like \"this will definitely go up\" or \"guaranteed rental income\" damage your credibility. Nothing in Cambodia is guaranteed.", "action": "Replace any guarantee language with: \"here is what the data shows.\""}, {"title": "Creating false urgency", "detail": "\"Only 2 units left\" or \"price goes up tomorrow\" works once, then destroys trust permanently. PHC never uses these tactics.", "action": "If you feel tempted to create urgency, don't — let the facts speak instead."}, {"title": "Showing projects before understanding the client", "detail": "Leading with a project before you understand the client is a volume-focused salesperson's move, not an advisor's.", "action": "Never show a project before asking at least 2 qualifying questions."}, {"title": "Skipping the written follow-up", "detail": "A spoken conversation gets forgotten. A written summary shows professionalism and gives the client something to check later.", "action": "Send it the same day. Every time."}]}],roleplay:{"scenario": "Starting a first meeting with a new client", "instructions": "Practice building trust through questions — not through talking or telling.", "lines": [{"role": "client", "text": "\"I've been looking at property in Phnom Penh for a while. I know what I want.\""}, {"role": "agent", "text": "\"That's a great starting point. What's caught your interest in Phnom Penh specifically — investment, lifestyle, or both?\""}, {"role": "client", "text": "\"Investment. I want an 8% return.\""}, {"role": "agent", "text": "\"Understood. Before I show anything, may I ask what you've looked at so far, and what made you hesitate on those?\""}, {"role": "client", "text": "\"A couple of projects. The yields looked good but I wasn't sure about the developer.\""}, {"role": "agent", "text": "\"That's the right instinct — developer track record is one of the biggest risk factors in this market. Let me ask about your timeline and risk comfort before I recommend anything.\""}, {"role": "note", "text": "Debrief: The agent asked 4 questions before naming a single project. Did it feel natural or slow?"}], "debrief": "A good advisor asks more questions than a salesperson would ever think to. Every question delays the pitch — and that delay is what builds trust."},quiz:[{"q": "PHC's approach to a first meeting is:", "opts": ["Show the best project first to make a strong impression", "Listen, assess, then match — never show a project before understanding the client", "Give a market overview, then wait for questions", "Discuss price range early to filter serious buyers"], "correct": 1, "explain": "Listen first. Assess. Match. This order is never reversed — showing a project before understanding the client is a volume-focused salesperson's move, not an advisor's."}, {"q": "A client asks you to guarantee an 8% return. You should:", "opts": ["Give a cautious estimate to make them feel good", "Explain clearly that guaranteeing is not something a responsible advisor does — and explain why", "Check with the developer and repeat their number", "Quote the highest advertised gross yield you've heard"], "correct": 1, "explain": "Never guarantee investment returns. Explain the reason honestly — this builds trust, not resistance."}, {"q": "Why is a same-day written follow-up not optional?", "opts": ["It shows you are busy and in demand", "It creates a written record of what was discussed, and shows professionalism", "It gives the client time to read promotional material", "It helps you get a commitment before they see a competitor"], "correct": 1, "explain": "A written follow-up summarizes what was discussed, confirms disclosed risks, and gives the client something to check later. It is the most trust-building action after any first meeting."}, {"q": "Which of the 5 mistakes is most likely to permanently damage trust with a serious investor?", "opts": ["Forgetting to mention a promotion", "Using fake urgency, like \"only 2 units left\"", "Asking too many qualifying questions", "Starting a meeting five minutes late"], "correct": 1, "explain": "False urgency can work once — then it destroys trust permanently. A serious investor recognizes the tactic immediately. PHC never uses it in any circumstance."}],reflection:"Think of a time you felt genuinely respected and not sold to. What did that person do differently — and can you apply it?",km:{"title":"ផ្នត់គំនិតទីប្រឹក្សារបស់ PHC","short":"ផ្នត់គំនិតទីប្រឹក្សា","objectives":["យល់ដឹងពីចំណុចខុសគ្នារវាងទីប្រឹក្សាដែលគួរឱ្យទុកចិត្ត និងអ្នកលក់","ស្គាល់ពីលំដាប់លំដោយនៃការបង្កើតទំនុកចិត្តរបស់ PHC សម្រាប់ជំនួបដំបូង","ចៀសវាងកំហុសឆ្គងទូទៅទាំង ៥ របស់ភ្នាក់ងារអចលនទ្រព្យ"],"sections":[{"label":"ការផ្លាស់ប្តូរផ្នត់គំនិត","heading":"ឥទ្ធិពល និងភាពគួរឱ្យជឿជាក់ កើតចេញពីការស្ងប់ស្ងាត់ និងការទប់ចិត្ត","body":"ភ្នាក់ងារភាគច្រើនព្យាយាមធ្វើឱ្យអតិថិជនចាប់អារម្មណ៍ដោយបង្ហាញពីចំណេះដឹងដែលខ្លួនមាន។ ប៉ុន្តែទីប្រឹក្សារបស់ PHC ធ្វើរឿងផ្ទុយពីនេះ។ ពួកគាត់សួរច្រើនជាងនិយាយ។ ពួកគាត់ទម្លាយពីហានិភ័យមុននឹងនិយាយពីផលចំណេញ។ ពួកគាត់និយាយថា 'គម្រោងនេះប្រហែលជាមិនសមស្របសម្រាប់លោកអ្នកទេ' — ហើយពួកគាត់មានបំណងនិយាយបែបនោះមែន។ ការស្ងប់ស្ងាត់ និងការទប់ចិត្តនេះហើយដែលបង្កើតបានជាឥទ្ធិពល និងភាពគួរឱ្យជឿជាក់។","box":{"title":"លំដាប់លំដោយនៃជំនួបដំបូងរបស់ PHC៖","lines":["1. ស្តាប់ជាមុន — វាយតម្លៃស្វែងយល់ពីអតិថិជនមុននឹងបង្ហាញគម្រោងអ្វីមួយ","2. បញ្ជាក់ពីហានិភ័យមុននឹងនិយាយពីផលចំណេញ","3. ផ្គូផ្គងគម្រោងយ៉ាងច្រើន ២ ទៅ ៣ ប៉ុណ្ណោះ — ព្រមទាំងពន្យល់ពីហេតុផលនៃគម្រោងនីមួយៗ","4. មិនត្រូវជំរុញឱ្យមានការសម្រេចចិត្តនៅក្នុងជំនួបលើកដំបូងឡើយ","5. ផ្ញើសារសង្ខេបតាមលាយលក្ខណ៍អក្សរតាមដាននៅថ្ងៃដដែល"]}},{"label":"កំហុសឆ្គងទាំង ៥","heading":"អ្វីដែលបំផ្លាញទំនុកចិត្ត — ភ្លាមៗ","body":"ទាំងនេះគឺជាកាយវិការ និងអាកប្បកិរិយាទាំង ៥ ដែលនឹងបំផ្លាញកិត្យានុភាពរបស់អ្នកជាមួយអតិថិជន។ កំហុសនីមួយៗសុទ្ធតែជារឿងទូទៅ ប៉ុន្តែគ្មានមួយណាដែល PHC អាចទទួលយកបានឡើយ។","rules":[{"title":"ការប្រាប់អត្រាផលចំណេញសរុប (Gross Yield) ធ្វើដូចជាអត្រាផលចំណេញសុទ្ធ (Net Yield)","detail":"ត្រូវបង្ហាញអត្រាផលចំណេញសុទ្ធជានិច្ច។ អត្រាផលចំណេញសរុបមិនបានរាប់បញ្ចូលចំណាយផ្សេងៗដែលអតិថិជនត្រូវចំណាយពិតប្រាកដនោះទេ។ ការបង្ហាញផលចំណេញសរុបដោយមិនបានពន្យល់បរិបទច្បាស់លាស់ គឺជាទង្វើមិនស្មោះត្រង់។"},{"title":"ការធានាលើតម្លៃនាពេលអនាគត","detail":"ឃ្លាដូចជា 'មួយនេះពិតជានឹងឡើងថ្លៃ' ឬ 'ធានាប្រាក់ចំណូលពីការជួល' គឺជាឃ្លាដែលនឹងបំផ្លាញកិត្យានុភាពរបស់អ្នក។ នៅកម្ពុជាគ្មានអ្វីដែលធានា ១០០% នោះទេ។ គ្មានអ្វីទៀងទាត់ឡើយ។"},{"title":"ការប្រញាប់ប្រញាល់ជំរុញការសម្រេចចិត្ត","detail":"យុទ្ធសាស្ត្របង្កើតភាពបន្ទាន់ — ដូចជា 'សល់តែ ២ យូនីតទៀតទេ' ឬ 'ថ្ងៃស្អែកឡើងថ្លៃហើយ' — អាចប្រៀបដូចជាការទាក់ទាញបានតែមួយគ្រា ប៉ុន្តែបំផ្លាញទំនុកចិត្តជារៀងរហូត។ PHC មិនប្រើប្រាស់វិធីសាស្ត្រទាំងនេះឡើយ។"},{"title":"ការបង្ហាញគម្រោងដោយមិនបានវាយតម្លៃស្វែងយល់ពីអតិថិជន","detail":"ការនាំមើលគម្រោងមុនពេលយល់ពីអតិថិជន គឺជាសញ្ញាសម្គាល់របស់អ្នកលក់ដែលផ្តោតតែលើបរិមាណ។ ទីប្រឹក្សារបស់ PHC មិនដែលធ្វើបែបនេះឡើយ។"},{"title":"ការមិនតាមដានបន្តជាលាយលក្ខណ៍អក្សរ","detail":"ការសន្ទនាតាមមាត់ទទេអាចនឹងត្រូវភ្លេចភ្លាំង។ ការសង្ខេបជាលាយលក្ខណ៍អក្សរបង្ហាញពីវិជ្ជាជីវៈ និងផ្តល់ឱ្យអតិថិជននូវឯកសារសម្រាប់ផ្ទៀងផ្ទាត់។ ត្រូវផ្ញើវាឱ្យបានក្នុងថ្ងៃដដែល។"}]}],"reflection":"សាកល្បងគិតអំពីពេលមួយដែលអ្នកមានអារម្មណ៍ថាទទួលបានការគោរពយ៉ាងពិតប្រាកដ ហើយមិនមែនត្រូវគេលក់ដាក់នោះទេ។ តើបុគ្គលរូបនោះបានធ្វើអ្វីខុសប្លែកពីគេ — ហើយតើអ្នកអាចយកវាមកអនុវត្តបានដែរឬទេ?","roleplay":{"scenario":"ការចាប់ផ្តើមជំនួបលើកដំបូងជាមួយអតិថិជនថ្មី","instructions":"អនុវត្តការបង្កើតឥទ្ធិពល និងភាពគួរឱ្យជឿជាក់តាមរយៈសំណួរ — មិនមែនតាមរយៈការប្រាប់ ឬនិយាយច្រើននោះទេ។","lines":[{"role":"client","text":"\"ខ្ញុំបានមើលអចលនទ្រព្យនៅភ្នំពេញមួយរយៈហើយ។ ខ្ញុំដឹងថាខ្ញុំត្រូវការអ្វី។\""},{"role":"agent","text":"\"នោះជាចំណុចចាប់ផ្តើមដ៏ល្អមួយ។ តើអ្វីដែលទាក់ទាញបងឱ្យចាប់អារម្មណ៍នៅភ្នំពេញជាពិសេស — សម្រាប់ការវិនិយោគ របៀបរស់នៅ ឬទាំងពីរ?\""},{"role":"client","text":"\"សម្រាប់ការវិនិយោគ។ ខ្ញុំចង់បានផលចំណេញ 8%។\""},{"role":"agent","text":"\"យល់ច្បាស់ណាស់បង។ មុនពេលខ្ញុំបង្ហាញគម្រោងអ្វីមួយដល់បង — តើខ្ញុំអាចសួរបន្តិចបានទេថា កន្លងមកបងបានមើលគម្រោងអ្វីខ្លះហើយ ហើយតើអ្វីដែលធ្វើឱ្យបងនៅរាក់រាក់ស្ទាក់ស្ទើរលើគម្រោងទាំងនោះ?\""},{"role":"client","text":"\"ពីរបីគម្រោងដែរ។ អត្រាផលចំណេញមើលទៅល្អ ប៉ុន្តែខ្ញុំមិនសូវប្រាកដចិត្តលើក្រុមហ៊ុនអភិវឌ្ឍន៍។\""},{"role":"agent","text":"\"ការស្ទាក់ស្ទើរនោះគឺជាការគិតដ៏ត្រឹមត្រូវ។ ប្រវត្តិស្នាដៃរបស់ក្រុមហ៊ុនអភិវឌ្ឍន៍ គឺជាកត្តាហានិភ័យដ៏សំខាន់បំផុតមួយនៅក្នុងទីផ្សារនេះ។ អនុញ្ញាតឱ្យខ្ញុំសួរអំពីកាលវិភាគពេលវេលា និងកម្រិតហានិភ័យដែលបងអាចទទួលយកបាន មុនពេលខ្ញុំធ្វើការណែនាំគម្រោងណាមួយជូនបង។\""},{"role":"note","text":"ការបូកសរុបសង្ខេប៖ ភ្នាក់ងារបានសួរចំនួន ៤ សំណួរមុនពេលនិយាយអ្វីមួយអំពីគម្រោង។ តើវាមានលក្ខណៈធម្មជាតិដែរឬទេ?"}],"debrief":"ទីប្រឹក្សាដែលចេះសួរសំណួរបានល្អ នឹងមើលទៅមានសមត្ថភាពជាងអ្នកដែលនិយាយច្រើន។ រាល់សំណួរនីមួយៗជួយពន្យារពេលការបង្ហាញការលក់ — ហើយការពន្យារពេលនោះហើយដែលបង្កើតបានជាទំនុកចិត្ត។"},"quiz":[{"q":"វិធីសាស្ត្ររបស់ PHC សម្រាប់ជំនួបលើកដំបូងគឺ៖","opts":["បង្ហាញគម្រោងដែលល្អបំផុតមុនគេ ដើម្បីបង្កើតការចាប់អារម្មណ៍ខ្លាំង","ស្តាប់ វាយតម្លៃស្វែងយល់ ហើយបន្តផ្គូផ្គង — មិនបង្ហាញគម្រោងមុនពេលយល់ពីអតិថិជនឡើយ","ផ្តល់ទិដ្ឋភាពទូទៅនៃទីផ្សារមុនគេ រួចចាំសួរសំណួរ","ពិភាក្សាអំពីជួរតម្លៃ ដើម្បីចម្រោះយកអ្នកទិញពិតប្រាកដតាំងពីដំបូង"],"correct":1,"explain":"ស្តាប់ជាមុន។ វាយតម្លៃស្វែងយល់មុននឹងបង្ហាញគម្រោងអ្វីមួយ។ លំដាប់លំដោយនេះគឺជាប្រព័ន្ធការងារ — ហើយប្រព័ន្ធនេះហើយដែលជាហេតុផលធ្វើឱ្យអតិថិជនទុកចិត្ត PHC ជាងភ្នាក់ងារដែលផ្តោតលើបរិមាណ។"},{"q":"អតិថិជនស្នើសុំការធានាផលចំណេញ 8%។ អ្នកគួរតែ៖","opts":["អះអាងថាកម្រិតនេះអាចសម្រេចបាននៅ BKK1 ដោយផ្អែកលើទិន្នន័យបច្ចុប្បន្ន","ពន្យល់ឱ្យបានច្បាស់លាស់ថា ការធានាមិនមែនជាការធ្វើការងាររបស់ទីប្រឹក្សាដែលមានការទទួលខុសត្រូវនោះទេ — ហើយបង្ហាញទិន្នន័យផលចំណេញសុទ្ធជំនួសវិញ","ណែនាំពួកគាត់ទៅកាន់ក្រុមហ៊ុនអភិវឌ្ឍន៍ដែលអាចផ្តល់ការធានាបាន","ប្រាប់ពួកគាត់ថា 8% គឺខ្ពស់ពេក ហើយស្នើ 6% វិញ"],"correct":1,"explain":"មិនត្រូវធានាផលចំណេញឡើយ។ ពន្យល់ទិន្នន័យផលចំណេញសុទ្ធដោយស្មោះត្រង់។ 'នេះជាអ្វីដែលទិន្នន័យបង្ហាញ នេះជាអ្វីដែលមានឥទ្ធិពលលើវា នេះជាចន្លោះផលចំណេញ' — នេះគឺជាចម្លើយរបស់ PHC។"},{"q":"ហេតុអ្វីបានជាការតាមដានជាលាយលក្ខណ៍អក្សរនៅថ្ងៃដដែលជារឿងមិនអាចរំលងបាន?","opts":["ព្រោះវាបង្ហាញថាអ្នកមមាញឹក និងមានតម្រូវការខ្លាំង","ព្រោះវាបង្កើតបានជាកំណត់ត្រាលាយលក្ខណ៍អក្សរនៃអ្វីដែលបានពិភាក្សា — និងបង្ហាញពីវិជ្ជាជីវៈ","ដើម្បីផ្តល់ឱកាសឱ្យអតិថិជនបានអានឯកសារផ្សព្វផ្សាយបន្ថែម","ដើម្បីទាញយកការប្តេជ្ញាចិត្តមុនពេលពួកគាត់ទៅមើលដៃគូប្រកួតប្រជែង"],"correct":1,"explain":"ការតាមដានជាលាយលក្ខណ៍អក្សរសង្ខេបនូវអ្វីដែលបានពិភាក្សា បញ្ជាក់ច្បាស់ពីហានិភ័យ និងបង្ហាញពីវិជ្ជាជីវៈ។ វាគឺជាសកម្មភាពបង្កើតទំនុកចិត្តដែលគួរឱ្យទុកចិត្តបំផុតបន្ទាប់ពីជំនួបដំបូង។"},{"q":"តើកំហុសមួយណាក្នុងចំណោមកំហុសទាំងប្រាំនេះ ដែលងាយនឹងបំផ្លាញទំនុកចិត្តជាមួយអ្នកវិនិយោគធ្ងន់ធ្ងរជារៀងរហូត?","opts":["ការភ្លេចផ្ញើអ៊ីមែលតាមដាន","ការប្រើប្រាស់យុទ្ធសាស្ត្របង្កើតភាពបន្ទាន់ ដូចជា 'សល់តែ ២ យូនីតទៀតទេ'","ការចាប់ផ្តើមជំនួបដោយការសង្ខេបអំពីគម្រោង","ការសួរសំណួរវាយតម្លៃច្រើនពេក"],"correct":1,"explain":"យុទ្ធសាស្ត្របង្កើតភាពបន្ទាន់អាចប្រើបានផលតែម្តងប៉ុណ្ណោះ — បន្ទាប់មកនឹងបំផ្លាញទំនុកចិត្តជារៀងរហូត។ អ្នកវិនិយោគធ្ងន់ធ្ងរមើលធ្លុះទង្វើនេះភ្លាមៗ។ PHC មិនដែលប្រើប្រាស់វាក្នុងកាលៈទេសៈណាក៏ដោយ។"}]}},
{id:7,week:2,title:"Qualifying Clients Correctly",short:"Client Qualification",objectives:["Know the 4 things you must find out about every client", "Qualify a client in under 10 minutes without it feeling like an interview", "Know which questions reveal the most, and why"],sections:[{"label": "Why Qualifying Matters", "heading": "Showing the wrong project is worse than showing nothing", "body": "Recommending the wrong project to a client — even if they buy it — is a failure. It creates an unhappy client, a bad review, and no referrals. Qualifying protects both the client and PHC's reputation.", "grid": [["1. Goal", "What do they want this investment to give them?"], ["2. Timeline", "When do they need to act, and when do they expect results?"], ["3. Budget", "A real range, not a guess"], ["4. Risk comfort", "What worries them most?"]]}, {"label": "The Questions", "heading": "Open questions, not closed ones", "body": "Good qualifying questions feel like curiosity, not an interrogation. How you ask matters as much as what you ask.", "rules": [{"title": "About their goal", "detail": "\"What do you hope this investment gives you — over 3 years, and over 10 years?\" The gap between those two answers tells you a lot.", "action": "Ask about both time frames, not just one."}, {"title": "About timeline", "detail": "\"If you found the right option today, what would need to happen before you could move forward?\" This reveals hidden obstacles — visa, budget, family, other commitments.", "action": "Listen for anything that sounds like a real blocker, and address it early."}, {"title": "About budget", "detail": "\"What range are you working with, and is there flexibility if the right opportunity comes up?\" Never assume the stated budget is fixed.", "action": "Ask about flexibility — don't assume the number given is final."}, {"title": "About risk", "detail": "\"What would make this investment a mistake for you?\" This is the most honest question you can ask, and it reveals real risk tolerance instantly.", "action": "Ask this question word-for-word — do not soften it."}]}, {"label": "Warning Signs", "heading": "Know when to slow down — or step back", "body": "Not every client is right for PHC. Recognizing this quickly protects everyone's time.", "rules": [{"title": "Unrealistic return expectations", "detail": "\"I need a 15% net yield.\" If expectations don't match the market, realign them with data before continuing. If they refuse — they are not your client.", "action": "Show real market data before agreeing to proceed further."}, {"title": "No real timeline (rushed urgency)", "detail": "\"I must buy this week.\" Urgency without information is a sign of a poor decision, not a buying signal.", "action": "Slow the pace down — ask what's driving the urgency."}, {"title": "Nominee structure requests", "detail": "Any client asking to use a Cambodian national's name to hold property must be stopped. This is a legal risk PHC does not support.", "action": "Explain the legal risk clearly, and offer a compliant alternative instead."}]}],roleplay:{"scenario": "Full qualifying conversation in under 10 minutes", "instructions": "Practice all 4 dimensions in a natural order — not a checklist.", "lines": [{"role": "agent", "text": "\"Thanks for coming in. Before I show you anything — what's driving your interest in Cambodia property right now?\""}, {"role": "client", "text": "\"I heard the yields here are good. My friend made money on a place he bought.\""}, {"role": "agent", "text": "\"What kind of yield was he getting — do you know if that was gross or net?\""}, {"role": "client", "text": "\"Not sure. He said 8%.\""}, {"role": "agent", "text": "\"That's likely gross. Net after costs is typically 5.5–7% depending on location and management. Is that still in the range you're looking for?\""}, {"role": "client", "text": "\"Yes, that's still good.\""}, {"role": "agent", "text": "\"Great. And what's your timeline — are you looking to decide in the next few months, or still exploring?\""}, {"role": "note", "text": "Debrief: Did the agent correct the yield misunderstanding calmly, without embarrassing the client? Did the questions feel like a natural conversation?"}], "debrief": "Correcting a wrong assumption immediately, gently, and with data — this is a core advisor skill. Never let a wrong number go unaddressed."},quiz:[{"q": "A client says \"I need a 15% net yield.\" You should:", "opts": ["Show projects with the highest advertised yield you can find", "Realign the expectation using real market data before proceeding", "Agree and hope you find something eventually", "Tell them Cambodia isn't the right market for them"], "correct": 1, "explain": "Realign the expectation with data, calmly. \"15% net is not realistic in today's Phnom Penh market\" is the correct response. If they refuse to adjust, they are not a fit for PHC."}, {"q": "Which question reveals a client's honest risk tolerance most reliably?", "opts": ["\"What's your budget?\"", "\"What would make this investment a mistake for you?\"", "\"Are you comfortable with off-plan risk?\"", "\"How much experience do you have with property?\""], "correct": 1, "explain": "\"What would make this a mistake for you?\" is open, personal, and specific. It reveals fears, dealbreakers, and personal values that no closed question can draw out."}, {"q": "A client asks you to help set up a Cambodian nominee to hold a villa on their behalf. You should:", "opts": ["Refer them to a local lawyer who arranges nominee structures", "Help them — it's a common practice", "Explain that PHC does not support nominee structures due to legal risk, and offer a compliant alternative", "Ask Nick first before saying anything"], "correct": 2, "explain": "PHC does not support nominee structures. Explain the legal risk clearly and immediately, then redirect to a compliant ownership path."}, {"q": "What does asking about both a 3-year and a 10-year goal reveal?", "opts": ["Nothing useful — one time frame is enough", "The gap between the two answers often reveals the client's real priorities", "It's mainly used to slow down overly eager clients", "It's only relevant for retirement-focused clients"], "correct": 1, "explain": "The gap between short-term and long-term answers often reveals what the client actually cares about — income now vs. security later, for example."}],reflection:"Think about a client conversation where you felt you didn't understand what they really wanted. What questions would you ask differently now?",km:{"title":"ការវាយតម្លៃស្វែងយល់ពីអតិថិជនឱ្យបានត្រឹមត្រូវ","short":"ការវាយតម្លៃអតិថិជន","objectives":["ស្គាល់វិមាត្រវាយតម្លៃទាំង ៤ ដែលភ្នាក់ងារ PHC គ្រប់រូបត្រូវតែស្វែងយល់ឱ្យឃើញ","អាចវាយតម្លៃអតិថិជនក្នុងរយៈពេលតិចជាង ១០ នាទី ដោយមិនធ្វើឱ្យមានអារម្មណ៍ដូចជាការសាកសួរចម្លើយ","ស្គាល់សំណួរណាដែលទាញយកព័ត៌មានបានច្រើនបំផុត និងហេតុអ្វី"],"sections":[{"label":"ហេតុអ្វីបានជាការវាយតម្លៃមានសារៈសំខាន់","heading":"គម្រោងដែលខុស គឺអាក្រក់ជាងការគ្មានគម្រោង","body":"ការណែនាំគម្រោងដែលខុសទៅឱ្យអតិថិជន — ទោះបីជាពួកគាត់ទិញក៏ដោយ — គឺជាបរាជ័យ។ វាបង្កើតឱ្យមានអតិថិជនមិនពេញចិត្ត ការវាយតម្លៃមិនល្អ និងគ្មានការណែនាំបន្ត។ សក្របខ័ណ្ឌការងារនៃការវាយតម្លៃស្វែងយល់ គឺការពារទាំងអតិថិជន និងកិត្យានុភាពរបស់ PHC។","box":{"title":"វិមាត្រទាំង ៤ ដែលអ្នកត្រូវតែស្វែងយល់ឱ្យឃើញ៖","lines":["1. គោលដៅ — តើពួកគាត់ចង់ឱ្យការវិនិយោគនេះផ្តល់អ្វីខ្លះ?","2. កាលវិភាគពេលវេលា — តើនៅពេលណាដែលពួកគាត់ត្រូវធ្វើសកម្មភាព ហើយតើរំពឹងទទួលបានផលចំណេញនៅពេលណា?","3. ថវិកា — ចន្លោះថវិកាជាក់ស្តែង មិនមែនជាការស្រមៃ","4. ការទទួលយកហានិភ័យ — តើអ្វីជាការព្រួយបារម្ភបំផុតរបស់ពួកគាត់?"]}},{"label":"សំណួរទាំងឡាយ","heading":"សំណួរដែលបើកចំហ — មិនមែនបិទជិត","body":"សំណួរវាយតម្លៃល្អៗផ្តល់អារម្មណ៍ដូចជាការចង់ដឹងចង់ឃើញ មិនមែនជាការសាកសួរចម្លើយឡើយ។ របៀបនៃការចោទសួរមានសារៈសំខាន់ស្មើនឹងខ្លឹមសារដែរ។","rules":[{"title":"សំណួរអំពីគោលដៅ","detail":"'តើបងរំពឹងថាការវិនិយោគនេះនឹងផ្តល់អ្វីខ្លះសម្រាប់បង — ក្នុងរយៈពេល ៣ ឆ្នាំ និង ១០ ឆ្នាំ?' គម្លាតរវាងចម្លើយទាំងពីរនេះនឹងប្រាប់អ្នកបានយ៉ាងច្រើន។"},{"title":"សំណួរអំពីកាលវិភាគពេលវេលា","detail":"'ប្រសិនបើបងប្រទះឃើញជម្រើសដ៏ស័ក្តិសមបំផុតនៅថ្ងៃនេះ តើមានអ្វីខ្លះដែលត្រូវរៀបចំមុនពេលបងអាចបន្តឈានទៅមុខបាន?' សំណួរនេះបកអាក្រាតឧបសគ្គលាក់មុខ — ទិដ្ឋាការ (Visa) ថវិកា គ្រួសារ ឬកាតព្វកិច្ចផ្សេងៗ។"},{"title":"សំណួរអំពីថវិកា","detail":"'តើចន្លោះថវិកាកម្រិតណាដែលបងកំពុងត្រៀមទុក — ហើយតើវាអាចបត់បែនបានដែរឬទេ ប្រសិនបើមានឱកាសស័ក្តិសមលេចឡើង?' កុំសន្មតថាកញ្ចប់ថវិកាដែលបានប្រាប់គឺជាតួលេខថេរឱ្យសោះ។"},{"title":"សំណួរអំពីហានិភ័យ","detail":"'តើអ្វីដែលនឹងធ្វើឱ្យការវិនិយោគនេះក្លាយជាកំហុសឆ្គងសម្រាប់បង?' នេះជាសំណួរដែលស្មោះត្រង់បំផុត។ ហានិភ័យគឺជាចំណង់ចំណូលចិត្តបុគ្គល — ហើយមានតែអតិថិជនប៉ុណ្ណោះដែលប្រាប់ពីវាកើត។"}]},{"label":"សញ្ញាព្រមាន","heading":"ដឹងថានៅពេលណាត្រូវផ្អាក — ឬដកថយ","body":"មិនមែនអតិថិជនគ្រប់រូបសុទ្ធតែស័ក្តិសមជាមួយ PHC នោះទេ។ ផ្នែកមួយនៃការវាយតម្លៃ គឺការទទួលស្គាល់ចំណុចនេះឱ្យបានឆាប់រហ័ស។","rules":[{"title":"ការរំពឹងទុកផលចំណេញដែលមិនប្រាកដនិយម","detail":"'ខ្ញុំត្រូវការផលចំណេញសុទ្ធ 15%។' ប្រសិនបើការរំពឹងទុកមិនស៊ីគ្នានឹងទីផ្សារ ត្រូវតម្រង់ការយល់ឃើញឡើងវិញមុននឹងបន្ត។ ប្រសិនបើពួកគាត់បដិសេធ — ពួកគាត់មិនមែនជាអតិថិជនរបស់អ្នកឡើយ។"},{"title":"គ្មានកាលវិភាគពេលវេលា (ប្រញាប់ជ្រុល)","detail":"'ខ្ញុំត្រូវតែទិញនៅក្នុងសប្តាហ៍នេះ។' ភាពបន្ទាន់ដែលខ្វះព័ត៌មាន គឺជាសញ្ញានៃការសម្រេចចិត្តមិនបានល្អ — មិនមែនជាសញ្ញាទិញនោះទេ។ ត្រូវពន្យឺតចង្វាក់។"},{"title":"រចនាសម្ព័ន្ធឈ្នោះបាំងមុខ (Nominee Structures)","detail":"អតិថិជនណាដែលស្នើសុំប្រើប្រាស់ជនជាតិកម្ពុជាបាំងមុខដើម្បីកាន់កាប់អចលនទ្រព្យ ត្រូវតែបញ្ឈប់។ នេះមានហានិភ័យផ្លូវច្បាប់ ហើយ PHC មិនគាំទ្រទង្វើនេះឡើយ។"}]}],"reflection":"គិតអំពីការសន្ទនាជាមួយអតិថិជនម្នាក់ដែលអ្នកមានអារម្មណ៍ថា មិនបានយល់ពីអ្វីដែលពួកគាត់ត្រូវការពិតប្រាកដ។ តើសំណួរអ្វីខ្លះដែលអ្នកនឹងសួរខុសពីមុននៅពេលនេះ?","roleplay":{"scenario":"ការវាយតម្លៃស្វែងយល់ពេញលេញក្នុងរយៈពេលតិចជាង ១០ នាទី","instructions":"អនុវត្តវិមាត្រទាំង ៤ តាមលំដាប់លំដោយធម្មជាតិ — ដោយមិនបាច់អានតាមក្រដាស។","lines":[{"role":"agent","text":"\"អរគុណបងដែលបានអញ្ជើញមក។ មុនពេលខ្ញុំបង្ហាញអ្វីមួយជូនបង — សូមប្រាប់ខ្ញុំបន្តិចបានទេថា តើអ្វីដែលនាំឱ្យបងចាប់អារម្មណ៍លើអចលនទ្រព្យនៅកម្ពុជានាពេលនេះ?\""},{"role":"client","text":"\"ខ្ញុំលឺថាផលចំណេញនៅទីនេះល្អ។ មិត្តភក្តិខ្ញុំរកប្រាក់បានពីទីនេះ។\""},{"role":"agent","text":"\"តើផលចំណេញកម្រិតណាដែលគាត់ទទួលបាន — តើបងដឹងទេថាជារួម (Gross) ឬសុទ្ធ (Net)?\""},{"role":"client","text":"\"មិនសូវប្រាកដដែរ។ គាត់ថា 8%។\""},{"role":"agent","text":"\"8% សរុប (Gross) គឺជារឿងទូទៅ។ ផលចំណេញសុទ្ធបន្ទាប់ពីដកថ្លៃគ្រប់គ្រង និងអត្រាយូនីតទំនេរ គឺចន្លោះពី 5.5–7% អាស្រ័យលើទីតាំង និងអ្នកប្រតិបត្តិការ។ តើចន្លោះនេះនៅតែសមស្របសម្រាប់បងដែរឬទេ?\""},{"role":"client","text":"\"បាទ ខ្ញុំគិតថានៅតែអូខេ។\""},{"role":"agent","text":"\"ល្អណាស់បង។ តើកាលវិភាគពេលវេលារបស់បងយ៉ាងម៉េចដែរ — តើបងកំពុងសម្លឹងមើលការសម្រេចចិត្តក្នុងរយៈពេលពីរប្រាំពីរខែខាងមុខ ឬក៏កំពុងស្ថិតក្នុងដំណាក់កាលស្រាវជ្រាវនៅឡើយ?\""},{"role":"client","text":"\"ខ្ញុំចង់សម្រេចចិត្តក្នុងរង្វង់ ២ ខែខាងមុខ។\""},{"role":"agent","text":"\"ល្អឥតខ្ចោះ។ ហើយតើប្រហែលជាចន្លោះថវិកាប៉ុន្មានដែរបងបានត្រៀមទុក?\""},{"role":"note","text":"ការបូកសរុបសង្ខេប៖ តើភ្នាក់ងារបានតម្រង់ការរំពឹងទុកលើផលចំណេញឡើងវិញតាំងពីដំបូង — ដោយស្ងប់ស្ងាត់ និងគ្មានការរើសអើងដែរឬទេ?"}],"debrief":"ការតម្រង់ការរំពឹងទុកឡើងវិញតាំងពីដំបូង គឺជាសេវាកម្មមួយ មិនមែនជាការបដិសេធឡើយ។ វាការពារអតិថិជនពីការខកចិត្ត — និងការពារ PHC ពីលទ្ធផលមិនល្អ។"},"quiz":[{"q":"អតិថិជននិយាយថា 'ខ្ញុំចង់បានផលចំណេញសុទ្ធ 12% នៅកម្ពុជា។' អ្នកគួរតែ៖","opts":["បង្ហាញគម្រោងដែលមានផលចំណេញខ្ពស់បំផុតដែលមាន","យល់ស្រប — វាអាចទៅរួចនៅទីតាំងដែលត្រឹមត្រូវ","ពន្យល់ដោយស្ងប់ស្ងាត់ថា ផលចំណេញសុទ្ធ 12% គឺមិនប្រាកដនិយមឡើយក្នុងទីផ្សារភ្នំពេញបច្ចុប្បន្ន — ហើយចែករំលែកទិន្នន័យពិតប្រាកដ","ប្រាប់ពួកគាត់ថាកម្ពុជាមិនមែនជាទីផ្សារដែលត្រឹមត្រូវសម្រាប់ពួកគាត់ឡើយ"],"correct":2,"explain":"តម្រង់ការរំពឹងទុកឡើងវិញជាមួយនឹងទិន្នន័យ ដោយស្ងប់ស្ងាត់។ 'ផលចំណេញសុទ្ធ 12% គឺមិនប្រាកដនិយមឡើយ — នេះជាអ្វីដែលទិន្នន័យបង្ហាញ' គឺជាចម្លើយរបស់ PHC។ កុំយល់ស្របតាម ហើយក៏កុំបដិសេធអតិថិជន — ត្រូវផ្តល់ការអប់រំយល់ដឹង។"},{"q":"តើសំណួរមួយណាដែលបកអាក្រាតពីកម្រិតហានិភ័យពិតប្រាកដរបស់អតិថិជនបានគួរឱ្យទុកចិត្តបំផុត?","opts":["'តើបងអាចទទួលរងការខាតបង់បានកម្រិតណា?'","'តើអ្វីដែលនឹងធ្វើឱ្យការវិនិយោគនេះក្លាយជាកំហុសឆ្គងសម្រាប់បង?'","'តើបងមានអារម្មណ៍ងាយស្រួលដែរឬទេជាមួយនឹងហានិភ័យគម្រោងមិនទាន់សាងសង់ (Off-plan)?'","'តើបងមានបទពិសោធន៍កម្រិតណាដែរជាមួយអចលនទ្រព្យ?'"],"correct":1,"explain":"'តើអ្វីដែលនឹងធ្វើឱ្យការវិនិយោគនេះក្លាយជាកំហុសឆ្គងសម្រាប់បង?' គឺជាសំណួរ បើកចំហ និងផ្តោតលើបុគ្គល។ វាបកអាក្រាតពីការភ័យខ្លាច ចំណុចមិនអាចទទួលយកបាន និងតម្លៃផ្ទាល់ខ្លួន ដែលគ្មានសំណួរបិទណាមួយអាចទាញចេញបានឡើយ។"},{"q":"អតិថិជនស្នើសុំឱ្យអ្នកជួយរៀបចំរចនាសម្ព័ន្ធឈ្មោះបាំងមុខជាជនជាតិខ្មែរ ដើម្បីកាន់កាប់វីឡា។ អ្នកគួរតែ៖","opts":["ណែនាំពួកគាត់ទៅមេធាវីក្នុងស្រុកដែលកាត់កាប់រចនាសម្ព័ន្ធឈ្មោះបាំងមុខ","ជួយពួកគាត់ — វាជាការអនុវត្តទូទៅ","ពន្យល់ថា PHC មិនគាំទ្ររចនាសម្ព័ន្ធឈ្មោះបាំងមុខឡើយ ដោយសារហានិភ័យផ្លូវច្បាប់ — ហើយផ្តល់ជម្រើសស្របច្បាប់ជំនួសវិញ","សួរ Nick ជាមុនសិនមុននឹងឆ្លើយ"],"correct":2,"explain":"PHC មិនគាំទ្ររចនាសម្ព័ន្ធឈ្មោះបាំងមុខឡើយ។ នេះជាហានិភ័យផ្លូវច្បាប់ចំពោះអតិថិជន និងជាហានិភ័យកិត្យានុភាពចំពោះ PHC។ បញ្ជាក់ចំណុចនេះឱ្យច្បាស់ ហើយតម្រង់ទិសទៅកាន់ជម្រើសកម្មសិទ្ធិស្របច្បាប់។"},{"q":"អតិថិជននិយាយថា 'ខ្ញុំត្រូវតែទិញនៅក្នុងសប្តាហ៍នេះ។' នេះគឺជា៖","opts":["សញ្ញាទិញយ៉ាងខ្លាំងក្លា — ត្រូវបន្តឱ្យលឿន ហើយបិទការលក់","សញ្ញាព្រមាន — ភាពបន្ទាន់ដែលខ្វះព័ត៌មាន គឺជាការសម្រេចចិត្តមិនបានល្អ","រឿងធម្មតា — អ្នកវិនិយោគធ្ងន់ធ្ងរភាគច្រើនសម្រេចចិត្តលឿន","ឱកាសដើម្បីបង្ហាញស្តុកអចលនទ្រព្យដែលមានទាំងអស់ជូនពួកគាត់"],"correct":1,"explain":"'ខ្ញុំត្រូវតែទិញនៅក្នុងសប្តាហ៍នេះ' ដោយគ្មានការវាយតម្លៃស្វែងយល់ត្រឹមត្រូវ គឺជាសញ្ញាព្រមាន មិនមែនជាសញ្ញាទិញឡើយ។ ត្រូវពន្យឺតចង្វាក់ វាយតម្លៃឱ្យបានត្រឹមត្រូវ និងការពារទាំងអតិថិជន និង PHC ពីលទ្ធផលប្រញាប់ប្រញាល់ដែលមិនល្អ។"}]}},
{id:8,week:2,title:"The Advisory Conversation Flow",short:"Advisory Flow",objectives:["Know the 5-stage PHC advisory conversation flow", "Understand what to say at each stage, and what never to say", "Move through the flow naturally, without it feeling scripted"],sections:[{"label": "The Framework", "heading": "5 stages, every client, every time", "body": "Every PHC conversation follows the same 5 stages. The content changes, but the order never does. This consistency is what makes PHC feel trustworthy instead of random.", "flow": [{"title": "1. Open", "sub": "Build comfort, no selling"}, {"title": "2. Qualify", "sub": "Understand goals, timeline, budget, risk"}, {"title": "3. Match", "sub": "Show 2-3 options, with reasons"}, {"title": "4. Risk Disclosure", "sub": "Name every relevant risk clearly"}, {"title": "5. Next Step", "sub": "One clear action, no pressure"}]}, {"label": "What Happens at Each Stage", "heading": "Know the goal of each stage before you enter it", "body": "Each stage has one job. Trying to do two jobs at once — for example, selling during the Open stage — breaks the whole flow.", "rules": [{"title": "Stage 1: Open", "detail": "Welcome the client. Build comfort. Do not sell anything yet. Goal: the client feels relaxed and free to talk.", "action": "If you catch yourself mentioning a project in the first 2 minutes, stop and go back to listening."}, {"title": "Stage 2: Qualify", "detail": "Ask about goals, timeline, budget, and risk tolerance (see Lesson 7). No project talk yet. Goal: you understand the client better than they expected.", "action": "Don't move to Stage 3 until you can summarize the client's goal back to them in one sentence."}, {"title": "Stage 3: Match", "detail": "Show 2-3 options only, with a clear reason for each. Never show everything you have. Goal: the client sees you as a filter, not a catalog.", "action": "For each project shown, say the specific reason it fits — never just \"this is a good one.\""}, {"title": "Stage 4: Risk Disclosure", "detail": "Before asking for any next step, name the real risks: exit liquidity, realistic yield, developer track record, CGT. Goal: the client feels fully informed, not sold to.", "action": "Say the risks out loud before the client asks — don't wait to be questioned."}, {"title": "Stage 5: Next Step", "detail": "Propose one clear action — a site visit, an SPA review, a meeting with Nick. Never leave a meeting without one. Goal: momentum, not pressure.", "action": "Suggest exactly one next step — never a list of options here."}]}, {"label": "Language Standards", "heading": "What PHC advisors say, and never say", "body": "The words you choose matter as much as the order you say them in.", "table": {"headers": ["Instead of…", "Say…"], "rows": [["\"Guaranteed returns\"", "\"Based on current data, net yield is X–Y%\""], ["\"You should buy now\"", "\"Based on your timeline, this window may be relevant\""], ["\"Only 2 units left\"", "Never use scarcity tactics — ever"], ["\"This will definitely go up\"", "\"Historical data shows X — future performance isn't guaranteed\""], ["\"Don't worry about CGT\"", "\"CGT applies — here's how it affects your scenario\""]]}}],roleplay:{"scenario": "Running all 5 stages in one conversation", "instructions": "Practice moving through the stages naturally — the client should never feel like they're being processed.", "lines": [{"role": "agent", "text": "\"Thanks for coming in today. How did you first hear about PHC?\""}, {"role": "client", "text": "\"Through Realestate.com.kh. I've been watching for a few months.\""}, {"role": "agent", "text": "\"Great. What's driving your decision timing now — investment income, a place to live, or both?\""}, {"role": "client", "text": "\"Investment. I want passive income.\""}, {"role": "agent", "text": "\"Understood. What's your timeline, and roughly what budget are you working with?\""}, {"role": "client", "text": "\"$150–200K. Within 3 months ideally.\""}, {"role": "agent", "text": "\"That's workable. Before I show you options — I want to be upfront about the risks first. Exit liquidity in Cambodia is improving but isn't as fast as Singapore. Net yield is realistically lower than advertised gross figures. And CGT now applies on resale. Does that framing make sense before we continue?\""}, {"role": "client", "text": "\"Yes — I'd rather know that upfront.\""}, {"role": "agent", "text": "\"Good. Let me show you the two options I think fit best, and why.\""}, {"role": "note", "text": "Debrief: Did Stage 4 (risk) happen before Stage 3's options were fully explored? That's the correct order in PHC's flow."}], "debrief": "Risk disclosure before matching options is the single biggest difference between a PHC advisor and everyone else. Master this ordering."},quiz:[{"q": "In the PHC advisory flow, when does risk disclosure happen?", "opts": ["At the very end, after the client shows interest", "Before showing specific project options", "Only if the client asks about risk", "After the client visits a site"], "correct": 1, "explain": "Risk disclosure happens before matching options. Always. This is PHC's biggest differentiator from a typical agent."}, {"q": "How many project options should Stage 3 (Match) show?", "opts": ["As many as possible, to give full choice", "1, to make the decision simple", "2-3, with a clear reason for each", "5, one for each client segment"], "correct": 2, "explain": "2-3 options, each with a stated reason. A long list signals you don't understand the client. A short, reasoned list signals you do."}, {"q": "The correct replacement for \"only 2 units left\" is:", "opts": ["\"There's high demand for this building\"", "Never use scarcity tactics — full stop", "\"I'd recommend deciding soon\"", "\"The developer says stock is limited\""], "correct": 1, "explain": "Scarcity tactics are never used at PHC, in any form. There is no acceptable replacement phrase — the tactic itself is the problem."}, {"q": "What is the goal of Stage 1 (Open)?", "opts": ["Get the client's budget as fast as possible", "Build comfort — no selling yet", "Show the strongest project to create excitement", "Confirm the client's contact details"], "correct": 1, "explain": "Stage 1 is about comfort, not information or selling. Rushing into projects or budget talk in this stage breaks the flow."}],reflection:"Which of the 5 stages do you find most natural — and which will require the most practice for you personally?",km:{"title":"លំហូរនៃការសន្ទនាប្រឹក្សាយោបល់","short":"លំហូរការប្រឹក្សា","objectives":["ស្គាល់ដំណាក់កាលទាំង ៥ នៃលំហូរការសន្ទនាប្រឹក្សាយោបល់របស់ PHC","យល់ដឹងពីអ្វីដែលត្រូវនិយាយក្នុងដំណាក់កាលនីមួយៗ — និងអ្វីដែលមិនត្រូវនិយាយដាច់ខាត","អាចបោះជំហានឆ្លងកាត់លំហូរនេះដោយធម្មជាតិ ដោយមិនធ្វើឱ្យមានអារម្មណ៍ថាទន្ទេញចាំមាត់"],"sections":[{"label":"សក្របខ័ណ្ឌការងារ","heading":"ប្រាំដំណាក់កាល — អតិថិជនគ្រប់រូប គ្រប់ពេលវេលា","body":"រាល់ការសន្ទនាជាមួយអតិថិជនរបស់ PHC តែងតែដើរតាមដំណាក់កាលទាំងប្រាំដូចៗគ្នា។ ខ្លឹមសារអាចផ្លាស់ប្តូរ ប៉ុន្តែរចនាសម្ព័ន្ធមិនផ្លាស់ប្តូរឡើយ។ ភាពស៊ីសង្វាក់គ្នានេះហើយដែលធ្វើឱ្យអតិថិជនទុកចិត្ត PHC ជាងភ្នាក់ងារដែលគ្មានប្រព័ន្ធច្បាស់លាស់។","rules":[{"title":"ដំណាក់កាលទី ១ — ការបើកឆាក (Open)","detail":"ស្វាគមន៍។ បង្កើតភាពស្និទ្ធស្នាល និងផាសុកភាព។ មិនត្រូវលក់នៅក្នុងដំណាក់កាលទី ១ ឡើយ។ គោលដៅ៖ អតិថិជនមានអារម្មណ៍ធូរស្រាល និងនិយាយបានដោយសេរី។"},{"title":"ដំណាក់កាលទី ២ — ការវាយតម្លៃស្វែងយល់ (Qualify)","detail":"ដំណើរការការវាយតម្លៃលើវិមាត្រទាំង ៤ (គោលដៅ, កាលវិភាគ, ថវិកា, ហានិភ័យ)។ មិនទាន់មានការពិភាក្សាអំពីគម្រោងនៅឡើយទេ។ គោលដៅ៖ អតិថិជនយល់ពីស្ថានភាពខ្លួនឯងបានល្អជាងមុន។"},{"title":"ដំណាក់កាលទី ៣ — ការផ្គូផ្គង (Match)","detail":"បង្ហាញជម្រើសយ៉ាងច្រើន ២ ទៅ ៣ ប៉ុណ្ណោះ។ បញ្ជាក់ហេតុផលនៃជម្រើសនីមួយៗ។ មិនត្រូវបង្ហាញជម្រើសទាំងអស់ដែលមានឡើយ។ គោលដៅ៖ អតិថិជនមើលឃើញអ្នកជាតម្រងចម្រោះ — មិនមែនជាកាតាឡុកទំនិញឡើយ។"},{"title":"ដំណាក់កាលទី ៤ — ការទម្លាយហានិភ័យ (Risk disclosure)","detail":"មុនពេលសួរអំពីជំហានបន្ទាប់ — ត្រូវប្រាប់រាល់ហានិភ័យដែលពាក់ព័ន្ធទាំងអស់។ សភាពសាច់ប្រាក់នៃការលក់ចេញ (Exit liquidity)។ ភាពជាក់ស្តែងនៃផលចំណេញ។ ប្រវត្តិស្នាដៃក្រុមហ៊ុនអភិវឌ្ឍន៍។ CGT។ គោលដៅ៖ អតិថិជនមានអារម្មណ៍ថាទទួលបានព័ត៌មានគ្រប់ជ្រុងជ្រោយ មិនមែនត្រូវគេលក់ដាក់នោះទេ។"},{"title":"ដំណាក់កាលទី ៥ — ជំហានបន្ទាប់ (Next step)","detail":"ស្នើជំហានបន្ទាប់ដែលច្បាស់លាស់មួយ។ ការចុះមើលទីតាំងផ្ទាល់។ ការពិនិត្យមើល SPA។ ជំនួបជាមួយ Nick។ មិនត្រូវចាកចេញពីជំនួបដោយគ្មានសកម្មភាពដែលបានព្រមព្រៀងគ្នាមួយនោះឡើយ។ គោលដៅ៖ បង្កើតចលនាបន្ត មិនមែនបង្កើតសម្ពាធឡើយ។"}]},{"label":"គោលការណ៍ប្រើប្រាស់ភាសា","heading":"អ្វីដែលទីប្រឹក្សា PHC និយាយ — និងមិនដែលនិយាយ","body":"ពាក្យពេចន៍មានសារៈសំខាន់ណាស់។ ទាំងនេះគឺជាវិធានភាសារបស់ PHC។","table":{"headers":["ជំនួសឱ្យពាក្យ…","ត្រូវនិយាយថា…"],"rows":[["'ធានាផលចំណេញ'","'ផ្អែកលើទិន្នន័យបច្ចុប្បន្ន ចន្លោះផលចំណេញសុទ្ធគឺ X–Y%'"],["'បងគួរតែទិញឥឡូវនេះ'","'ផ្អែកលើកាលវិភាគពេលវេលារបស់បង ឱកាសក្នុងអំឡុងពេលនេះអាចនឹងស័ក្តិសម'"],["'សល់តែ ២ យូនីតទៀតទេ'","កុំប្រើប្រាស់យុទ្ធសាស្ត្របង្កើតភាពខ្សត់ខ្សោយឱ្យសោះ — ជាដាច់ខាត"],["'មួយនេះពិតជានឹងឡើងថ្លៃ'","'ទិន្នន័យតម្លៃកន្លងមកបង្ហាញថា X — ប៉ុន្តែសមត្ថភាពនាពេលអនាគតមិនត្រូវបានធានានោះទេ'"],["'កុំបារម្ភរឿង CGT អី'","'CGT នឹងត្រូវអនុវត្ត — នេះជាវិសាលភាពដែលវាប៉ះពាល់ដល់ករណីរបស់បង'"]]}}],"reflection":"តើដំណាក់កាលណាក្នុងចំណោមដំណាក់កាលទាំង ៥ ដែលអ្នកមានអារម្មណ៍ថាធម្មជាតិបំផុតសម្រាប់អ្នក — ហើយដំណាក់កាលណាដែលតម្រូវឱ្យមានការអនុវត្តច្រើនបំផុតសម្រាប់រូបអ្នកផ្ទាល់?","roleplay":{"scenario":"ការដំណើរការដំណាក់កាលទាំង ៥ តាមលំដាប់លំដោយ","instructions":"ការសន្ទនាប្រឹក្សាយោបល់ពេញលេញ — ១០ នាទី។ អនុវត្តការបោះជំហានឆ្លងកាត់ដំណាក់កាលនីមួយៗដោយធម្មជាតិ។","lines":[{"role":"agent","text":"\"អរគុណបងដែលបានអញ្ជើញមក។ តើបងបានដឹងអំពីពួកយើងដំបូងតាមរបៀបណាដែរ?\""},{"role":"client","text":"\"តាមរយៈការផ្សព្វផ្សាយរបស់បងនៅលើ Realestate.com.kh។ ខ្ញុំបានតាមមើលពីរប្រាំពីរខែហើយ។\""},{"role":"agent","text":"\"ល្អណាស់បង។ តើខ្ញុំអាចសួរបន្តិចបានទេថា — តើអ្វីជាកត្តាជំរុញការសម្រេចចិត្តនាពេលនេះ? ចំណូលពីការវិនិយោគ កន្លែងសម្រាប់រស់នៅ ឬទាំងពីរ?\""},{"role":"client","text":"\"សម្រាប់ការវិនិយោគ។ ខ្ញុំចង់បានចំណូលអកម្ម (Passive income)។\""},{"role":"agent","text":"\"យល់ច្បាស់ណាស់បង។ តើកាលវិភាគពេលវេលាបែបណាដែលបងកំពុងរៀបចំ ហើយតើប្រហែលជាចន្លោះថវិកាប៉ុន្មានដែរ?\""},{"role":"client","text":"\"$150–200K។ ប្រសិនបើអាច ក្នុងរង្វង់ ៣ ខែខាងមុខ។\""},{"role":"agent","text":"\"នោះជាចន្លោះថវិកាដែលអាចធ្វើការបាន។ មុនពេលខ្ញុំបង្ហាញជម្រើសជូនបង — ខ្ញុំចង់ប្រាកដថាខ្ញុំបានជម្រាបជូនពីហានិភ័យជាមុនសិន។ សភាពសាច់ប្រាក់នៃការលក់ចេញ (Exit liquidity) នៅកម្ពុជាកំពុងតែល្អប្រសើរ ប៉ុន្តែមិនទាន់មានសភាពរហ័សដូចសិង្ហបុរីនោះទេ។ ចំណូលពីការជួលគឺជារឿងពិត ប៉ុន្តែផលចំណេញសុទ្ធគឺទាបជាងអ្វីដែលផ្សព្វផ្សាយ។ CGT ឥឡូវនេះត្រូវអនុវត្តលើការលក់បន្ត។ សម្រាប់យុទ្ធសាស្ត្រទិញទុកជួល ទីផ្សារនេះគឺសមហេតុផលណាស់។ ប៉ុន្តែសម្រាប់យុទ្ធសាស្ត្រទិញលក់យកចំណេញរហ័ស (Quick flip) — គឺមិនសមស្របទេ។ តើការកំណត់ក្របខ័ណ្ឌបែបនេះសមស្របសម្រាប់បងដែរឬទេ?\""},{"role":"client","text":"\"បាទ — ខ្ញុំកំពុងស្វែងរកចំណូលរយៈពេលវែង។ មិនមែនទិញលក់ភ្លាមៗទេ។\""},{"role":"agent","text":"\"ល្អឥតខ្ចោះ។ អ៊ីចឹងអនុញ្ញាតឱ្យខ្ញុំបង្ហាញជម្រើសពីរដែលខ្ញុំណែនាំជាពិសេសសម្រាប់ប្រវត្តិរូបរបស់បង — ហើយពន្យល់ពីហេតុផល។\""},{"role":"note","text":"ការបូកសរុបសង្ខេប៖ តើដំណាក់កាលទី ៤ (ការទម្លាយហានិភ័យ) បានកើតឡើងមុនដំណាក់កាលទី ៣ (ការផ្គូផ្គង) ដែរឬទេ? នោះហើយជាលំដាប់លំដោយរបស់ PHC។"}],"debrief":"ការទម្លាយហានិភ័យមុនពេលផ្គូផ្គងគម្រោង គឺជាចំណុចខុសប្លែកដ៏ធំបំផុតតែមួយគត់រវាងទីប្រឹក្សារបស់ PHC និងអ្នកដទៃ។ ត្រូវចាត់ការលំដាប់លំដោយនេះឱ្យបានស្ទាត់ជំនាញ។"},"quiz":[{"q":"នៅក្នុងលំហូរការប្រឹក្សាយោបល់របស់ PHC តើការទម្លាយហានិភ័យកើតឡើងនៅពេលណា?","opts":["នៅចុងបញ្ចប់ — បន្ទាប់ពីអតិថិជនបានបង្ហាញការចាប់អារម្មណ៍","មុនពេលបង្ហាញគម្រោងជាក់លាក់ណាមួយ","លុះត្រាតែអតិថិជនសួរនាំអំពីវា","បន្ទាប់ពីអតិថិជនបានព្រមព្រៀងចុះមើលទីតាំងផ្ទាល់"],"correct":1,"explain":"ការទម្លាយហានិភ័យត្រូវធ្វើឡើងមុនការផ្គូផ្គងគម្រោង។ ជានិច្កាល។ នេះជាលំដាប់លំដោយរបស់ PHC — ហើយវាជាផ្នែកដែលបង្កើតទំនុកចិត្តបានខ្លាំងបំផុតនៃសក្របខ័ណ្ឌការងារទាំងមូល។"},{"q":"អតិថិជនសួរថា 'តើផលចំណេញបន្ថែមមានកម្រិតណា ប្រសជាតម្លៃឡើងថ្លៃ?' អ្នកគួរតែ៖","opts":["ផ្តល់ការប៉ាន់ប្រមាណបែបវិជ្ជមាន ដោយផ្អែកលើនិន្នាការកើនឡើងតម្លៃនៅ BKK1","ពន្យល់ពីអ្វីដែលទិន្នន័យកន្លងមកបង្ហាញ — រួចបញ្ជាក់ពីកត្តាដែលអាចកំហិតវា","តម្រង់ទិសទៅកាន់ផលចំណេញពីការជួលវិញ — ដែលគួរឱ្យទុកចិត្តជាង","អះអាងថាតម្លៃនៅ BKK1 ឡើង 3–5% ហើយធ្វើការទាញប្រមាណទិន្នន័យ"],"correct":1,"explain":"បញ្ជាក់ពីផលចំណេញ និងផលប៉ះពាល់អវិជ្ជមាន។ 'ទិន្នន័យកន្លងមកបង្ហាញថា X — នេះជាកត្តាដែលអាចកំហិត ឬធ្វើឱ្យវាប្រែប្រួល' គឺជាចម្លើយដែលមានតុល្យភាពរបស់ PHC។"},{"q":"ចំនួនគម្រោងដែលត្រឹមត្រូវក្នុងការបង្ហាញនៅក្នុងដំណាក់កាលទី ៣ គឺ៖","opts":["ឱ្យច្រើនតាមដែលអាចធ្វើទៅបាន — ដើម្បីផ្តល់ជម្រើសដល់អតិថិជន","១ — ដើម្បីឱ្យការសម្រេចចិត្តមានភាពងាយស្រួល","យ៉ាងច្រើន ២–៣ — ដែលមានហេតុផលត្រឹមត្រូវ និងត្រូវគ្នានឹងប្រវត្តិរូប","៥ — ដើម្បីបង្ហាញពីជម្រើសពាក់ព័ន្ធទាំងអស់"],"correct":2,"explain":"យ៉ាងច្រើន ២–៣ ប៉ុណ្ណោះ ដោយមានហេតុផលច្បាស់លាស់សម្រាប់នីមួយៗ។ បញ្ជីវែងអន្លាយបញ្ជាក់ថាអ្នកមិនយល់ពីតម្រូវការអតិថិជនឡើយ។ បញ្ជីសម្រាំងខ្លីដែលមានហេតុផលត្រឹមត្រូវ បញ្ជាក់ពីជំនាញ និងការផ្គូផ្គងយ៉ាងពិតប្រាកដ។"},{"q":"តើអ្វីជាគោលដៅនៃដំណាក់កាលទី ៥ (ជំហានបន្ទាប់) នៅក្នុងលំហូរការប្រឹក្សាយោបល់របស់ PHC?","opts":["បិទការលក់មុនពេលអតិថិជនផ្លាស់ប្តូរចិត្ត","ទាញយកប្រាក់កក់ដើម្បីរក្សាយូនីត","ព្រមព្រៀងលើសកម្មភាពច្បាស់លាស់មួយ — បង្កើតចលនាបន្តដោយគ្មានសម្ពាធ","រៀបចំកាលវិភាគហៅទូរស័ព្ទតាមដានក្នុងរយៈពេល ៤៨ ម៉ោង"],"correct":2,"explain":"ដំណាក់កាលទី ៥ គឺអំពីសកម្មភាពបន្ទាប់មួយដែលបានព្រមព្រៀងគ្នា — ការចុះមើលទីតាំង ការពិនិត្យ SPA ការជួបជាមួយ Nick។ មិនត្រូវចាកចេញដោយគ្មានវាឡើយ។ គោលដៅគឺបង្កើតចលនាបន្ត មិនមែនសម្ពាធឡើយ។"}]}},
{id:9,week:2,title:"Language & Communication Standards",short:"Language Standards",objectives:["Know PHC's exact language rules for yield, guarantees, and risk", "Understand how tone changes by client segment", "Adjust your communication style without changing your standards"],sections:[{"label": "Yield Language", "heading": "Gross vs. net — say it clearly, every time", "body": "Yield is the number clients care about most — and the number most often used to mislead. PHC's rule is absolute: always say net yield.", "box": {"title": "PHC's yield language standard", "lines": ["Always say: \"net yield after management fees and vacancy\"", "Never say: \"guaranteed X%\" — Cambodia has no guaranteed returns", "Always give a range: \"6.5–7.5% net based on current data\" — never one exact number", "Always disclose: management fees, vacancy assumption, CGT on exit"]}}, {"label": "Tone by Client Segment", "heading": "Same standards, different tone", "body": "PHC's standards never change. But how you deliver them should fit the person in front of you.", "table": {"headers": ["Segment", "Tone", "What to emphasize"], "rows": [["Japanese investors", "Formal, structured, unhurried", "Risk first, evidence-backed data, written follow-up always"], ["German/European", "Logical, precise, no emotional language", "ROI, downside protection, legal clarity"], ["Overseas Cambodians", "Warm, clear, family framing", "Safety, community, developer reputation"], ["Local Khmer", "Warm, respectful, community-focused", "Comfort, status, payment flexibility"], ["Russian/Chinese investors", "Direct, data-first, efficient", "Yield data, management quality, exit options"]]}}, {"label": "The Absolute Rule", "heading": "One word that is never acceptable", "body": "This is short because it needs to be remembered exactly.", "warning": "Quoting gross yield without clarifying it is gross is a misrepresentation. If a developer gives you a gross figure, convert it and clarify before passing it to any client."}],roleplay:{"scenario": "Same message, two different tones", "instructions": "The agent says the same underlying facts to a Japanese investor and a German investor — notice how the tone changes but the facts don't.", "lines": [{"role": "note", "text": "Round 1 — Japanese investor (formal, risk-first)"}, {"role": "agent", "text": "\"Mr. Nakamura, before I share the project details, I'd like to walk through the risk profile first. Exit liquidity in Cambodia is improving but remains below Japan's. Rental income is real, but depends on occupancy and management quality. I want to make sure you have the full picture before we discuss anything specific.\""}, {"role": "note", "text": "Round 2 — German investor (logical, ROI-focused)"}, {"role": "agent", "text": "\"Before we look at numbers, let me give you the full picture, including the downside. Net yield in BKK1 is 7.8–8.7% based on current data. Exit liquidity is improving. CGT applies on resale. For a long-term hold, the data supports this market well. Under 5 years, the numbers change significantly.\""}, {"role": "note", "text": "Debrief: Same standard. Different tone. What changed — and what stayed exactly the same?"}], "debrief": "The Japanese client needed safety established before anything else. The German client needed complete numbers immediately. Neither got a sales pitch. Both got the same honest standard, delivered differently."},quiz:[{"q": "A developer tells you a project offers 9.5% yield. Before telling a client, you should:", "opts": ["Repeat the 9.5% figure as given", "Say \"up to 9.5% depending on occupancy\"", "Convert to an estimated net figure, state it as a range, and note it's the developer's estimate", "Round it down to 8% to be safe"], "correct": 2, "explain": "Convert to net. State a range. Note the source is the developer's estimate, not verified historical data. This is PHC's standard for any yield claim."}, {"q": "A Japanese investor asks about yield. You should:", "opts": ["Lead with the yield number — that's what they asked for", "Lead with risk disclosure first, then provide yield data with evidence", "Give a range without any supporting data", "Match whatever number the developer quoted"], "correct": 1, "explain": "Japanese clients need to feel safe before hearing numbers. Risk first, then evidence-backed data. Starting with yield alone skips the trust-building step this segment needs."}, {"q": "The phrase \"this will definitely go up in value\" is:", "opts": ["Fine to say if BKK1 prices support it", "Never acceptable — no PHC advisor uses future price guarantee language", "Acceptable for local Khmer buyers who want reassurance", "OK if paired with a disclaimer afterward"], "correct": 1, "explain": "Never acceptable. Future prices are never guaranteed. This applies to every client, regardless of segment or how confident the market data looks."}, {"q": "When talking to a German or European client, you should emphasize:", "opts": ["Community and lifestyle", "ROI, downside protection, and legal clarity", "Family framing and safety", "Fast decision-making and urgency"], "correct": 1, "explain": "German/European clients respond to logic and precision. Lead with ROI, downside scenarios, and legal structure — not emotional or lifestyle language."}],reflection:"Write the exact words you would use to explain net yield to a Japanese investor who has never owned property outside Japan.",km:{"title":"ស្តង់ដារភាសា និងការទំនាក់ទំនង","short":"ស្តង់ដារភាសា","objectives":["ស្គាល់វិធានភាសាច្បាស់លាស់របស់ PHC សម្រាប់ផលចំណេញ ការធានា និងហានិភ័យ","យល់ដឹងពីរបៀបដែលតុងសំឡេងខុសគ្នាតាមផ្នែកអតិថិជននីមួយៗ","អាចកែសម្រួលរចនាប័ទ្មនៃការទំនាក់ទំនងរបស់អ្នក ដោយមិនផ្លាស់ប្តូរស្តង់ដាររបស់អ្នកឡើយ"],"sections":[{"label":"ភាសាផលចំណេញ","heading":"សរុប (Gross) ធៀបនឹង សុទ្ធ (Net) — ត្រូវបញ្ជាក់ឱ្យច្បាស់ជានិច្ច","body":"ផលចំណេញគឺជាតួលេខដែលអតិថិជនយកចិត្តទុកដាក់បំផុត — និងជាតួលេខដែលត្រូវគេបន្លំភ្នែកញឹកញាប់បំផុត។ វិធានរបស់ PHC គឺដាច់ខាត៖ ត្រូវបង្ហាញផលចំណេញសុទ្ធជានិច្ច។ ផលចំណេញសរុបគ្មានន័យអ្វីឡើយចំពោះចំណូលពិតប្រាកដរបស់អតិថិជន។","box":{"title":"ស្តង់ដារភាសាផលចំណេញរបស់ PHC៖","lines":["ត្រូវនិយាយជានិច្ច៖ 'ផលចំណេញសុទ្ធបន្ទាប់ពីដកថ្លៃគ្រប់គ្រង និងអត្រាយូនីតទំនេរ'","មិនត្រូវនិយាយដាច់ខាត៖ 'ធានា X%' — កម្ពុជាមិនមានការធានាផលចំណេញឡើយ","ត្រូវផ្តល់ជាចន្លោះជានិច្ច៖ '6.5–7.5% សុទ្ធផ្អែកលើទិន្នន័យបច្ចុប្បន្ន' — មិនត្រូវប្រាប់តួលេខតែមួយឡើយ","ត្រូវទម្លាយជានិច្ច៖ ថ្លៃគ្រប់គ្រង ការសន្មតអត្រាយូនីតទំនេរ CGT នៅពេលលក់ចេញ"]},"warning":"ការប្រាប់អត្រាផលចំណេញសរុបដោយមិនបានបញ្ជាក់ថាវាជាផលចំណេញសរុប គឺជាការភូតភរ។ ប្រសិនបើក្រុមហ៊ុនអភិវឌ្ឍន៍ផ្តល់តួលេខសរុបឱ្យអ្នក ត្រូវកែប្រែ និងបញ្ជាក់ឱ្យច្បាស់មុននឹងបញ្ជូនទៅឱ្យអតិថិជនណាម្នាក់។"},{"label":"មគ្គុទ្ទេសក៍តុងសំឡេងតាមផ្នែកអតិថិជន","heading":"ស្តង់ដារដដែល ភាសាខុសគ្នា","body":"ស្តង់ដាររបស់ PHC មិនដែលផ្លាស់ប្តូរឡើយ។ ប៉ុន្តែរបៀបដែលយើងទំនាក់ទំនងប្រាប់ពួកគាត់ ត្រូវតែបត់បែនទៅតាមកម្រិតវប្បធម៌ និងបទពិសោធន៍វិជ្ជាជីវៈរបស់អតិថិជននីមួយៗ។","table":{"headers":["ផ្នែកអតិថិជន","តុងសំឡេង","ការទម្ងន់លើភាសា"],"rows":[["អ្នកវិនិយោគជប៉ុន","ផ្លូវការ មានរចនាសម្ព័ន្ធ មិនប្រញាប់ប្រញាល់","ហានិភ័យមុនគេ ទិន្នន័យមានភស្តុតាង ការតាមដានជាលាយលក្ខណ៍អក្សរជានិច្ច"],["អាល្លឺម៉ង់/អឺរ៉ុប","មានហេតុផល ច្បាស់លាស់ គ្មានភាសាអូសទាញអារម្មណ៍","ROI ការការពារហានិភ័យអវិជ្ជមាន ភាពច្បាស់លាស់ខាងផ្លូវច្បាប់"],["អាណិកជនខ្មែរនៅបរទេស","កក់ក្តៅ ច្បាស់លាស់ បរិយាកាសបែបគ្រួសារ","សុវត្ថិភាព សហគមន៍ កិត្យានុភាពក្រុមហ៊ុនអភិវឌ្ឍន៍"],["ជនជាតិខ្មែរក្នុងស្រុក","កក់ក្តៅ ផ្ដល់ការគោរព ផ្តោតលើសហគមន៍","ភាពផាសុកភាព ជីវភាពជោគជ័យ ភាពបត់បែននៃការបង់ប្រាក់"],["អ្នកវិនិយោគរុស្ស៊ី/ចិន","ចំៗ ផ្តោតលើផលចំណេញ អនុវត្តជាក់ស្តែង","ទិន្នន័យផលចំណេញ គុណភាពនៃការគ្រប់គ្រង ជម្រើសនៃការលក់ចេញ"]]}}],"reflection":"សរសេរពាក្យពេចន៍ជាក់ស្តែងដែលអ្នកនឹងប្រើដើម្បីពន្យល់ពីផលចំណេញសុទ្ធទៅកាន់អ្នកវិនិយោគជប៉ុនម្នាក់ ដែលមិនដែលទិញអចលនទ្រព្យនៅក្រៅប្រទេសជប៉ុនសោះ។","roleplay":{"scenario":"ការកែសម្រួលតុងសំឡេងដោយមិនផ្លាស់ប្តូរស្តង់ដារ","instructions":"ភ្នាក់ងារនិយាយខ្លឹមសារដដែល — ប៉ុន្តែកែសម្រួលតុងសំឡេងសម្រាប់អ្នកវិនិយោគជប៉ុន ធៀបនឹងអ្នកវិនិយោគអាល្លឺម៉ង់។","lines":[{"role":"note","text":"ជុំទី ១ — អ្នកវិនិយោគជប៉ុន (ផ្លូវការ, ហានិភ័យមុនគេ)"},{"role":"agent","text":"\"លោក Nakamura មុនពេលខ្ញុំចែករំលែកព័ត៌មានលម្អិតនៃគម្រោង ខ្ញុំសូមរៀបរាប់អំពីប្រវត្តិហានិភ័យជាមុនសិន។ នៅកម្ពុជា សភាពសាច់ប្រាក់នៃការលក់ចេញ (Exit liquidity) កំពុងតែកើនឡើង ប៉ុន្តែនៅតែមានកម្រិតបើធៀបនឹងប្រទេសជប៉ុន។ ចំណូលពីការជួលគឺជារឿងពិត ប៉ុន្តែវាអាស្រ័យលើអត្រាយូនីតទំនេរ និងគុណភាពនៃការគ្រប់គ្រង។ ខ្ញុំចង់ប្រាកដថាលោកមានរូបភាពពេញលេញ មុនពេលយើងពិភាក្សាអំពីការវិនិយោគជាក់លាក់ណាមួយ។\""},{"role":"note","text":"ជុំទី ២ — អ្នកវិនិយោគអាល្លឺម៉ង់ (មានហេតុផល, ផ្តោតលើ ROI)"},{"role":"agent","text":"\"មុនពេលខ្ញុំចែករំលែកតួលេខ អនុញ្ញាតឱ្យខ្ញុំផ្តល់រូបភាពពេញលេញជូនលោក — រាប់បញ្ចូលទាំងហានិភ័យអវិជ្ជមាន។ ផលចំណេញសុទ្ធនៅ BKK1 គឺ 7.8–8.7% ផ្អែកលើទិន្នន័យបច្ចុប្បន្ន។ សភាពសាច់ប្រាក់នៃការលក់ចេញកំពុងតែល្អប្រសើរ។ CGT ត្រូវអនុវត្តលើការលក់បន្ត។ សម្រាប់យុទ្ធសាស្ត្រកាន់កាប់រយៈពេលវែង ទីផ្សារនេះផ្តល់លទ្ធផលល្អ។ ប៉ុន្តែសម្រាប់រយៈពេលតិចជាង ៥ ឆ្នាំ — តួលេខនឹងផ្លាស់ប្តូរយ៉ាងខ្លាំង។\""},{"role":"note","text":"ការបូកសរុបសង្ខេប៖ ស្តង់ដារដដែល។ របៀបនិយាយខុសគ្នា។ តើមានអ្វីផ្លាស់ប្តូរ — ហើយហេតុអ្វី?"}],"debrief":"អតិថិជនជប៉ុនត្រូវមានអារម្មណ៍ថាសុវត្ថិភាពមុនពេលស្តាប់តួលេខ។ អតិថិជនអាល្លឺម៉ង់ត្រូវការតួលេខដែលច្បាស់លាស់ និងពេញលេញ។ អ្នកទាំងពីរមិនទទួលបានការអូសទាញលក់ឡើយ។ អ្នកទាំងពីរទទួលបានស្តង់ដារស្មោះត្រង់ដូចគ្នា។"},"quiz":[{"q":"ក្រុមហ៊ុនអភិវឌ្ឍន៍មួយប្រាប់អ្នកថាគម្រោងផ្តល់ផលចំណេញ 9.5%។ អ្នកគួរតែបង្ហាញរឿងនេះទៅកាន់អតិថិជនជា៖","opts":["9.5% — អ្នកមានការអះអាងពីក្រុមហ៊ុនអភិវឌ្ឍន៍","'រហូតដល់ 9.5% អាស្រ័យលើការស្នាក់នៅ'","បំប្លែងទៅជាផលចំណេញសុទ្ធប្រមាណ (បន្ទាប់ពីកាត់ថ្លៃសេវា និងយូនីតទំនេរ) ប្រាប់ជាចន្លោះ និងបញ្ជាក់ពីប្រភព","9.5% សរុប (Gross) — បញ្ជាក់ថាវាមុនពេលដកចំណាយ"],"correct":2,"explain":"បំប្លែងទៅជាផលចំណេញសុទ្ធ។ ប្រាប់ជាចន្លោះ។ បញ្ជាក់ថាវាផ្អែកលើការប៉ាន់ប្រមាណរបស់ក្រុមហ៊ុនអភិវឌ្ឍន៍ មិនមែនទិន្នន័យប្រវត្តិសាស្ត្រដែលបានផ្ទៀងផ្ទាត់នោះទេ។ នោះគឺជាស្តង់ដាររបស់ PHC។"},{"q":"អ្នកវិនិយោគជប៉ុនម្នាក់សួរអំពីផលចំណេញ។ អ្នកគួរតែ៖","opts":["ចាប់ផ្តើមដោយទិន្នន័យផលចំណេញមុន — ពួកគាត់ចង់ឃើញតួលេខមុនគេ","ចាប់ផ្តើមដោយការទម្លាយហានិភ័យមុនគេ រួចចាំបង្ហាញទិន្នន័យផលចំណេញសុទ្ធជាមួយនឹងភស្តុតាង","ផ្តល់ជាចន្លោះ ហើយទុកឱ្យពួកគាត់សួរសំណួរតាមដាន","តម្រូវតាមផលចំណេញសរុបដែលក្រុមហ៊ុនអភិវឌ្ឍន៍បានផ្សព្វផ្សាយ"],"correct":1,"explain":"អតិថិជនជប៉ុនត្រូវមានអារម្មណ៍ថាសុវត្ថិភាពមុនពេលស្តាប់ផលចំណេញ។ ហានិភ័យមុនគេ បន្ទាប់មកទិន្នន័យ រួចចាំភស្តុតាង។ មិនត្រូវចាប់ផ្តើមដោយផលចំណេញសម្រាប់អ្នកវិនិយោគជប៉ុនឡើយ។"},{"q":"ឃ្លា 'មួយនេះពិតជានឹងឡើងថ្លៃ' គឺ៖","opts":["មិនអីទេក្នុងការនិយាយ ប្រសិនបើអ្នកជឿជាក់លើវា","អាចទទួលយកបាន ប្រសិនបើតួលេខ BKK1 គាំទ្រវា","មិនអាចទទួលយកបានដាច់ខាត — គ្មានទីប្រឹក្សា PHC ណាម្នាក់ប្រើប្រាស់ភាសាធានាតម្លៃនាពេលអនាគតឡើយ","អូខេសម្រាប់អ្នកទិញខ្មែរដែលត្រូវការការធានាចិត្ត"],"correct":2,"explain":"មិនអាចទទួលយកបានដាច់ខាត។ តម្លៃនាពេលអនាគតមិនដែលត្រូវបានធានាឡើយ។ ឃ្លានេះបង្កើតឱ្យមានហានិភ័យផ្លូវច្បាប់ និងកិត្យានុភាព។ 'ទិន្នន័យកន្លងមកបង្ហាញថា X — ប៉ុន្តែសមត្ថភាពនាពេលអនាគតមិនត្រូវបានធានានោះទេ' គឺជាការកំណត់ក្របខ័ណ្ឌតែមួយគត់ដែលស្វ័យទទួលយកបាន។"},{"q":"អ្នកវិនិយោគអាល្លឺម៉ង់ម្នាក់សួរឱ្យអ្នកប្រៀបធៀបគម្រោងពីរ។ ចម្លើយរបស់អ្នកគួរតែទម្ងន់លើ៖","opts":["ក្រុមហ៊ុនអភិវឌ្ឍន៍ណាដែលមានកេរ្តិ៍ឈ្មោះទីផ្សារល្អជាង","ROI ការការពារហានិភ័យអវិជ្ជមាន និងភាពច្បាស់លាស់ខាងផ្លូវច្បាប់ — ក្នុងន័យច្បាស់លាស់ និងមានហេតុផល","ការទាក់ទាញផ្លូវអារម្មណ៍ — សហគមន៍ របៀបរស់នៅ សុភមង្គលរយៈពេលវែង","សញ្ជាតិនៃក្រុមហ៊ុនអភិវឌ្ឍន៍ជាសញ្ញាទំនុកចិត្តចម្បង"],"correct":1,"explain":"អ្នកទិញជាតិអាល្លឺម៉ង់/អឺរ៉ុប គឺជាមនុស្សចូលចិត្តវិភាគ និងដឹកនាំដោយហេតុផល។ ត្រូវចាប់ផ្តើមដោយ ROI ករណីហានិភ័យអវិជ្ជមាន និងរចនាសម្ព័ន្ធផ្លូវច្បាប់។ ចៀសវាងភាសាអូសទាញអារម្មណ៍ទាំងស្រុង — វាបង្ហាញពីទីប្រឹក្សាដែលខ្វះការត្រៀមខ្លួន។"}]}},
{id:10,week:2,title:"Reading Client Signals",short:"Reading Signals",objectives:["Tell the difference between a buying signal and a stall signal", "Respond to hesitation without pressuring the client", "Know when to re-qualify a client who has gone quiet"],sections:[{"label": "Buying Signals vs. Stall Signals", "heading": "Learn to read what a client is really saying", "body": "Clients rarely say \"I'm ready to buy\" directly. They show it. Learning to read these signals — without misreading them — is one of the most valuable advisory skills.", "grid": [["Buying signals", "Asks about payment timing or deposit amount. Asks about a specific floor or unit number. Brings a partner or family member to the next meeting. Asks about handover or furniture packages. Requests SPA or legal documents."], ["Stall signals", "\"I need to think about it\" with no specific concern named. Vague answers to direct questions. Delays scheduling a follow-up. Repeatedly asks the same question in different ways. Goes quiet after a strong first meeting."]]}, {"label": "Responding to Hesitation", "heading": "Curiosity beats pressure, every time", "body": "A client who is unsure is not a lost client. But treating the hesitation like a buying signal — or pushing past it — will lose them.", "rules": [{"title": "\"I need to think about it\"", "detail": "This is information, not a failure. Ask: \"Of course — is there a specific part of this you'd like to think through more? I want to make sure you have everything you need.\"", "action": "Ask what specifically needs more thought — don't just accept the vague answer."}, {"title": "\"I'm looking at other options too\"", "detail": "Normal. Ask: \"What are you comparing us to? It helps me give you the most honest comparison.\" Never criticize a competitor.", "action": "Never speak negatively about a competing agency or project."}, {"title": "\"My advisor / accountant needs to review\"", "detail": "A strong buying signal from a careful investor. Provide PHC's legal documents right away and make the review easy.", "action": "Send the documents the same day — don't make them ask twice."}, {"title": "Silence for more than 7 days", "detail": "Re-qualify gently. Send a check-in message that offers new information — not pressure. \"I wanted to share an update on [project] — let me know if it's still relevant for you.\"", "action": "Always add a real piece of new information to a re-engagement message — never just \"following up.\""}]}],roleplay:{"scenario": "A client hesitates after a strong first meeting", "instructions": "Practice responding with curiosity, not pressure.", "lines": [{"role": "client", "text": "\"I liked what I saw. I just need some time to think.\""}, {"role": "agent", "text": "\"Of course — is there a specific part you'd like to think through more? I want to make sure you have everything you need before deciding.\""}, {"role": "client", "text": "\"Mostly the developer. I hadn't heard of Megakim before.\""}, {"role": "agent", "text": "\"That's the right instinct. Let me send you their completed project record — 7 buildings delivered, and resident reviews. Would it help to speak with a current owner?\""}, {"role": "client", "text": "\"That would help a lot, actually.\""}, {"role": "note", "text": "Debrief: Did the agent respond to the hesitation with curiosity — not with a defense or a push?"}], "debrief": "Curiosity beats pressure. Every hesitation carries information — find it, and respond to the real concern, not the surface words."},quiz:[{"q": "A client asks \"which floor do you recommend?\" This is:", "opts": ["A neutral question needing a standard answer", "A buying signal — they're starting to picture ownership", "A stalling tactic", "A sign they're comparing prices"], "correct": 1, "explain": "Questions about specific floors or units are among the clearest buying signals — the client is starting to picture themselves owning it. Respond with real attention, not a generic answer."}, {"q": "A client has gone silent for 10 days after a strong meeting. You should:", "opts": ["Send a message that says only \"just checking in\"", "Send a re-engagement message with a real piece of new, relevant information", "Assume they're not interested and stop reaching out", "Call every day until they respond"], "correct": 1, "explain": "Always add real information — a market update, a project milestone. \"Just checking in\" carries no value and feels like pressure. New information re-opens the conversation naturally."}, {"q": "A client says \"my accountant needs to review this first.\" This is:", "opts": ["A stall signal — the deal has stopped", "A strong buying signal from a careful investor", "A sign they don't trust PHC", "Not important, no action needed"], "correct": 1, "explain": "This is a strong signal from a careful, serious investor. Provide the legal documents immediately and make the review process as easy as possible."}, {"q": "A client says \"I'm also looking at other options.\" The correct response is:", "opts": ["Point out flaws in competing agencies", "Ask what they're comparing to, so you can give an honest comparison", "Offer an immediate discount to compete", "Ignore it and keep talking about your own project"], "correct": 1, "explain": "Ask what they're comparing to. Never criticize a competitor — it damages your own credibility more than theirs. An honest comparison builds trust."}],reflection:"Think about a client who went cold. Looking back — what signal were they giving, and what could you have done differently?",km:{"title":"ការមើលដឹងពីសញ្ញារបស់អតិថិជន","short":"ការមើលសញ្ញា","objectives":["ទទួលស្គាល់ភាពខុសគ្នារវាងសញ្ញាទិញ និងសញ្ញាស្ទាក់ស្ទើរ","ដឹងពីរបៀបឆ្លើយតបទៅនឹងការស្ទាក់ស្ទើរដោយមិនបង្កើតសម្ពាធ","ដឹងថានៅពេលណាត្រូវវាយតម្លៃអតិថិជនឡើងវិញ ដែលបានស្ងាត់បាត់ដំណឹង"],"sections":[{"label":"សញ្ញាទិញ","heading":"នៅពេលអតិថិជនត្រៀមខ្លួនរួចរាល់ — តើវាមានរូបរាងយ៉ាងណា","body":"សញ្ញាទិញកម្រនឹងបង្ហាញមកច្បាស់ៗណាស់។ អតិថិជនភាគច្រើនមិននិយាយថា 'ខ្ញុំត្រៀមខ្លួនទិញហើយ' នោះ ម្រួលដល់ការពិនិត្យមើលភ្លាមៗ","ពន្យល់ថាអតិថិជនភាគច្រើនមិនប្រើប្រាស់គណនេយ្យករសម្រាប់ការទិញប្រភេទនេះឡើយ","តាមដានបន្ទាប់ពីមួយសប្តាហ៍ដើម្បីពិនិត្យមើលថាការពិនិត្យមើលបានរួចរាល់ហើយឬនៅ"],"correct":1,"explain":"នេះគឺជាសញ្ញាទិញយ៉ាងច្បាស់លាស់ពីអ្នកវិនិយោគដែលប្រុងប្រយ័ត្ន។ ចម្លើយដែលត្រឹមត្រូវគឺសម្រួល — មិនមែនធ្វើឱ្យយឺតយ៉ាវឡើយ។ ផ្តល់ឯកសារជូនភ្លាមៗ។"},{"q":"អតិថិជននិយាយថា 'ខ្ញុំកំពុងមើលជម្រើសផ្សេងទៀតដែរ។' ចម្លើយរបស់ PHC គឺ៖","opts":["ផ្តល់ការបញ្ចុះតម្លៃដើម្បីទាក់ទាញការយកចិត្តទុកដាក់របស់ពួកគាត់","បង្អាប់ការប្រកួតប្រជែង — គម្រោងរបស់យើងគឺល្អជាងច្បាស់ណាស់","សួរពីអ្វីដែលពួកគាត់កំពុងប្រៀបធៀប និងផ្តល់ការមើលឃើញទន្ទឹមគ្នាដោយស្មោះត្រង់","រំលឹកពួកគាត់ថាយូនីតល្អៗលក់ដាច់លឿនណាស់"],"correct":2,"explain":"មិនត្រូវបង្អាប់ដៃគូប្រកួតប្រជែងឡើយ។ សួរពីអ្វីដែលពួកគាត់កំពុងប្រៀបធៀប — នេះផ្តល់ព័ត៌មានដល់អ្នក និងបង្ហាញពីទំនុកចិត្ត។ ទីប្រឹក្សាដែលស្វាគមន៍ការប្រៀបធៀប បង្កើតទំនុកចិត្តបានច្រើនជាងអ្នកដែលចៀសវាងវា។"}]}},
{id:11,week:3,title:"Yield, ROI & Cost of Ownership",short:"Yield & ROI",objectives:["Calculate gross and net yield accurately for any unit","Explain the full cost of ownership — buying, holding, and selling","Walk a client through a realistic ROI scenario using verified data"],sections:[{label:"Gross vs Net Yield",heading:"The number that matters is net",body:"Most developers advertise gross yield. Gross yield means nothing to the investor's actual income. Net yield is what lands in the bank. The difference is significant — and misrepresenting it is a credibility risk. PHC always presents net.",box:{title:"The net yield calculation:",lines:["Gross yield = annual rent ÷ purchase price × 100","Net yield = (annual rent − management fees − vacancy − taxes) ÷ purchase price × 100","Average deductions: management fee ~$1.8/sqm/month + ~10% vacancy + 14% rental tax (foreigner)","Rule of thumb: net is typically 1.5–2.5% lower than gross in Cambodia"]},warning:"Never quote gross yield without labelling it as gross. Always convert to net before presenting to any client. A developer quoting 9% gross may mean 6.5–7% net. Know the difference."},{label:"Full Cost of Ownership",heading:"What the investor actually pays",body:"The headline purchase price is only part of the equation. Every serious investor will ask about total in and total out. Know every cost — if you miss one, you lose credibility.",table:{headers:["Cost item","Rate","On $150K unit"],rows:[["Booking deposit","$500–$2,000","One-time, refundable terms vary"],["Downpayment","20–30% of price","$30K–$45K on signing"],["Transfer tax (stamp duty)","4% of value","$6,000 (exemptions may apply)"],["Legal / SPA review","0.5–1% of value","$750–$1,500"],["Furniture & fit-out","Varies","$5K–$15K typical"],["Annual property tax (TOIP)","0.1% above $25K","~$125/yr on $150K"],["Building management","$1–$2/sqm/month","$53–$106/month (53sqm unit)"],["Rental income tax","14% of gross (foreigner)","On $800/month = $112/month"],["CGT on exit (20% on gain)","20% of taxable profit","Varies by gain and holding period"]]}},{label:"Verified ROI — J Tower 2",heading:"Real numbers from a real transaction",body:"This case study is documented in the REAKH Investment & Market Analysis Condominium Report 2025. It is the most credible ROI reference available for PHC agents. Use it as data — never as a promise.",rules:[{title:"The verified 5-year result",detail:"Purchased 2019 for $139,755 + $8K furniture. Handed over 2022. Rented at $1,200/month gross ($1,083 net at 90% occupancy). Resold 2024 for $175,000. Total return: $50,637. Average per year: 6.85%. Total ROI: 34.27%."},{title:"The 8-year and 10-year projections",detail:"REAKH projects: 8-year hold = 58% total ROI (7.25%/yr). 10-year hold = 77.23% total ROI (7.72%/yr). These are projections, not verified results. Present them as such."},{title:"How to use this with clients",detail:"'Here is a real verified transaction from our partner REAKH. This is what actually happened — not what was promised.' Then show the numbers. Let the data do the work."}]}],roleplay:{scenario:"A client asks what kind of return they can realistically expect",instructions:"Practice presenting ROI with precision — not enthusiasm. Lead with costs before returns.",lines:[{role:"client",text:'"I\'m looking at a $150,000 unit in BKK1. What kind of return can I expect?"'},{role:"agent",text:'"Let me give you the full picture — starting with costs, then income, then what the data shows on exit."'},{role:"client",text:'"Sure."'},{role:"agent",text:'"All-in, a $150K unit typically costs $155–$160K including transfer tax and legal fees. A 1-bedroom in BKK1 rents for around $800/month gross. After management fees and rental tax, you\'re net around $650–$670/month — roughly $7,800–$8,000/year. That\'s 5–5.5% net yield on your total investment."'},{role:"client",text:'"That\'s lower than I expected."'},{role:"agent",text:'"It\'s honest. Some agencies will quote you 8 or 9% gross — that\'s before costs. On a completed, well-managed BKK1 unit, 5–7% net is a realistic long-term range. The strongest verified data point we have — from our partner REAKH on J Tower 2 — shows 6.85% per year average over 5 years, combining rental income and capital appreciation."'},{role:"note",text:"Debrief: Did the Agent lead with costs before returns? Was the yield figure presented as net, not gross?"}],debrief:"The agent who presents the full cost picture first — including the deductions — is the one the client will trust when it matters. Never lead with the headline return."},quiz:[{q:"A developer advertises 9% rental yield. Before presenting this to a client, you should:",opts:["Use the 9% figure — the developer confirmed it","Convert to an estimated net yield range, label the source, and note it is gross","Round it down to 8% to be conservative","Only use it if the developer provides it in writing"],correct:1,explain:"Always convert developer yield claims to an estimated net figure. Gross yield excludes management fees, vacancy, and rental tax — the costs the investor actually bears. Presenting gross as-is is a misrepresentation."},{q:"On a $150,000 condo purchase, the one-time transfer tax (stamp duty) is approximately:",opts:["$750","$3,000","$6,000","$15,000"],correct:2,explain:"Transfer tax is 4% of the assessed property value. On $150,000 that is $6,000 — a significant one-time cost that must be disclosed upfront. Note that stamp duty exemptions may apply for properties under $70K or $210K depending on buyer profile."},{q:"The J Tower 2 REAKH case study shows what verified total ROI over 5 years?",opts:["18.5%","27.3%","34.27%","52%"],correct:2,explain:"34.27% total ROI over 5 years (2019–2024) — averaging 6.85% per year. This combines $23,392 in net rental income and $27,245 in capital appreciation on a $147,755 total investment."},{q:"Net yield for a foreign investor on a BKK1 1-bedroom unit at $800/month rent is closest to:",opts:["8% — matches gross advertised rates","6.5–7% — after removing all costs","5–5.5% — after management, vacancy, and 14% rental tax","3% — market is too competitive"],correct:2,explain:"After deducting management fees (~$1.8/sqm/month), ~10% vacancy, and 14% rental income tax for foreign non-residents, net yield on a typical BKK1 1BR drops to approximately 5–5.5% on total investment cost. This is the honest number."}],reflection:"Walk through the full cost of ownership on a $150,000 BKK1 unit from reservation to resale. What is the total cash out — and what is the realistic net return over 7 years?",km:{"title":"អត្រាផលចំណេញ (Yield), ROI និងថ្លៃចំណាយលើកម្មសិទ្ធិ","short":"Yield & ROI","objectives":["គណនាអត្រាផលចំណេញសរុប (Gross Yield) និងផលចំណេញសុទ្ធ (Net Yield) ឱ្យបានត្រឹមត្រូវសម្រាប់គ្រប់យូនីត","ពន្យល់ពីថ្លៃចំណាយសរុបលើកម្មសិទ្ធិ — ការទិញ ការកាន់កាប់ និងការលក់ចេញ","នាំអតិថិជនពិនិត្យមើលសេនារីយ៉ូ ROI ពិតប្រាកដដោយប្រើប្រាស់ទិន្នន័យដែលបានផ្ទៀងផ្ទាត់"],"sections":[{"label":"ផលចំណេញសរុប ធៀបនឹង ផលចំណេញសុទ្ធ","heading":"តួលេខដែលមានន័យពិតប្រាកដ គឺផលចំណេញសុទ្ធ","body":"ក្រុមហ៊ុនអភិវឌ្ឍន៍ភាគច្រើនផ្សព្វផ្សាយពីអត្រាផលចំណេញសរុប (Gross Yield)។ ផលចំណេញសរុបគ្មានន័យអ្វីឡើយចំពោះប្រាក់ចំណូលពិតប្រាកដរបស់អ្នកវិនិយោគ។ ផលចំណេញសុទ្ធ (Net Yield) គឺជាអ្វីដែលធ្លាក់ចូលក្នុងកុងធនាគារ។ ភាពខុសគ្នារវាងតួលេខទាំងពីរនេះគឺមានទំហំធំ — ហើយការបន្លំភ្នែកលើតួលេខនេះ គឺជាហានិភ័យបំផ្លាញភាពគួរឱ្យជឿជាក់។ PHC តែងតែបង្ហាញផលចំណេញសុទ្ធជានិច្ច។","box":{"title":"រូបមន្តគណនាផលចំណេញសុទ្ធ៖","lines":["ផលចំណេញសរុប (Gross yield) = ថ្លៃជួលប្រចាំឆ្នាំ ÷ តម្លៃទិញ × 100","ផលចំណេញសុទ្ធ (Net yield) = (ថ្លៃជួលប្រចាំឆ្នាំ − ថ្លៃគ្រប់គ្រង − អត្រាយូនីតទំនេរ − ពន្ធ) ÷ តម្លៃទិញ × 100","ការកាត់កកេរប្រចាំមធ្យម៖ ថ្លៃគ្រប់គ្រង ~$1.8/sqm/ខែ + ~10% អត្រាយូនីតទំនេរ + ពន្ធលើប្រាក់ចំណូលពីការជួល 14% (ជនបរទេស)","វិធានជាទូទៅ៖ ផលចំណេញសុទ្ធជាទូទៅទាបជាងផលចំណេញសរុបពី 1.5–2.5% នៅកម្ពុជា"]},"warning":"មិនត្រូវជម្រាបពីអត្រាផលចំណេញសរុបដោយមិនបានបញ្ជាក់ថាវាជាផលចំណេញសរុបឡើយ។ ត្រូវបំប្លែងទៅជាផលចំណេញសុទ្ធជានិច្ចមុននឹងបង្ហាញជូនអតិថិជន។ ក្រុមហ៊ុនអភិវឌ្ឍន៍ដែលប្រកាស 9% សរុប អាចមានន័យត្រឹមតែ 6.5–7
