<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PHC В· Agent Training</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   TOKENS
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
:root {
  /* SF Pro вҖ” Apple system font stack */
  --sf: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
  --sf-mono: "SF Mono", "SFMono-Regular", ui-monospace, "Courier New", monospace;

  --navy:       #06264f;
  --navy-d:     #040f24;
  --navy-md:    #0b3d7a;
  --navy-glass: rgba(6,38,79,0.85);
  --gold:       #c9993f;
  --gold-lt:    #e0b86a;
  --gold-dim:   #a07a2e;
  --gold-soft:  rgba(201,153,63,0.10);
  --gold-border:rgba(201,153,63,0.22);
  --ok:         #1a7a4a;
  --ok-soft:    rgba(26,122,74,0.08);
  --ok-border:  rgba(26,122,74,0.22);
  --err:        #b83030;
  --err-soft:   rgba(184,48,48,0.08);
  --err-border: rgba(184,48,48,0.20);
  --ink:        #0c1b2e;
  --ink-2:      #374f66;
  --ink-3:      #7490a8;
  --line:       rgba(6,38,79,0.09);
  --line-md:    rgba(6,38,79,0.16);
  --bg:         #ffffff;
  --bg-2:       #f6f8fb;
  --bg-3:       #edf0f5;
  --r:          10px;
  --r-lg:       16px;
  --transition: .2s cubic-bezier(.4,0,.2,1);

  /* SF Pro system font вҖ” used everywhere on mobile, falls back to Inter on desktop */
  --sf: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "Inter", sans-serif;
  --sf-mono: "SF Mono", "SFMono-Regular", ui-monospace, "JetBrains Mono", "Courier New", monospace;

  /* week accent palette */
  --w1: #0B4F8A; --w1-s: rgba(11,79,138,.08);
  --w2: #1A6B3A; --w2-s: rgba(26,107,58,.08);
  --w3: #7B3F00; --w3-s: rgba(123,63,0,.08);
  --w4: #5B2D8E; --w4-s: rgba(91,45,142,.08);
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   RESET & BASE
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{
  font-family:var(--sf);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  background:#e8ecf3;
  color:var(--ink);
  min-height:100%;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:16px 16px 16px;
}
img{display:block;max-width:100%}
button{font-family:inherit;cursor:pointer}
a{color:inherit;text-decoration:none}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   APP SHELL
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
#app{
  width:100%;
  max-width:1080px;
  background:var(--bg);
  border-radius:20px;
  box-shadow:0 12px 60px rgba(6,38,79,0.18), 0 2px 8px rgba(6,38,79,0.08);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  min-height:calc(100vh - 32px);
  border:1px solid var(--line-md);
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   TOPBAR
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.topbar{
  background:var(--navy-d);
  height:56px;
  padding:0 20px;
  display:flex;
  align-items:center;
  gap:14px;
  flex-shrink:0;
  position:relative;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.topbar::after{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;
  height:1px;
  background:linear-gradient(90deg,var(--gold) 0%, rgba(201,153,63,.3) 40%, transparent 70%);
}
.tb-mark{
  height:34px;
  width:34px;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.tb-mark .phc-logo-img{height:34px;width:34px;}
.tb-wordmark{
  font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  font-size:13px;
  font-weight:600;
  letter-spacing:-0.01em;
  color:rgba(255,255,255,0.6);
  flex-shrink:0;
}
.tb-sep{width:1px;height:18px;background:rgba(255,255,255,0.08);flex-shrink:0}
.tb-ctx{
  font-size:12.5px;
  color:rgba(255,255,255,0.65);
  flex:1;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.tb-prog{
  display:flex;
  align-items:center;
  gap:10px;
  flex-shrink:0;
}
.tb-track{
  width:88px;height:2px;
  background:rgba(255,255,255,0.08);
  border-radius:2px;
  overflow:hidden;
}
.tb-fill{
  height:100%;
  background:linear-gradient(90deg,var(--gold-dim),var(--gold-lt));
  border-radius:2px;
  transition:width .6s cubic-bezier(.4,0,.2,1);
}
.tb-label{
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px;
  color:rgba(255,255,255,0.35);
  white-space:nowrap;
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   LAYOUT BODY
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.layout{display:flex;flex:1;min-height:0;overflow:hidden}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   SIDEBAR (desktop)
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.sidebar{
  width:228px;
  flex-shrink:0;
  background:var(--bg-2);
  border-right:1px solid var(--line);
  overflow-y:auto;
  padding:8px 0 24px;
  scrollbar-width:thin;
  scrollbar-color:var(--line-md) transparent;
}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--line-md);border-radius:2px}

.sb-week{
  padding:16px 16px 3px;
  display:flex;align-items:center;gap:7px;
}
.sb-week-pip{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sb-week-txt{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;
  font-weight:500;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--ink-3);
}
.sb-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 14px 8px 16px;
  cursor:pointer;
  border-left:2px solid transparent;
  transition:background var(--transition), border-color var(--transition);
  position:relative;
  min-height:40px;
}
.sb-row:hover{background:rgba(6,38,79,0.04)}
.sb-row.active{background:var(--gold-soft);border-left-color:var(--gold)}
.sb-row.done{opacity:0.62}
.sb-badge{
  width:22px;height:22px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:9.5px;
  flex-shrink:0;
  border:1px solid var(--line-md);
  background:var(--bg-3);
  color:var(--ink-3);
  font-family:'JetBrains Mono',monospace;
  transition:all .2s;
}
.sb-row.active .sb-badge{background:var(--gold);border-color:var(--gold);color:#fff}
.sb-row.done .sb-badge{background:var(--ok);border-color:var(--ok);color:#fff;font-size:10px}
.sb-title{font-size:11.5px;color:var(--ink-2);line-height:1.35;flex:1}
.sb-row.active .sb-title{color:var(--ink);font-weight:500}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   MAIN PANEL
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}

/* в•җв”Җв”Җ Lesson chrome в”Җв”Җв•җ */
.lesson-chrome{
  padding:16px 24px 14px;
  border-bottom:1px solid var(--line);
  flex-shrink:0;
  background:var(--bg);
}
.lc-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.lc-week-tag{
  padding:3px 9px;
  border-radius:4px;
  font-family:'JetBrains Mono',monospace;
  font-size:9px;
  font-weight:500;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:#fff;
  flex-shrink:0;
}
.lc-title{
  font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  font-size:17px;
  font-weight:600;
  color:var(--ink);
  flex:1;
  line-height:1.25;
  letter-spacing:-0.025em;
}
.lc-counter{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:var(--ink-3);
  flex-shrink:0;
}
/* step pips */
.pips{display:flex;gap:3px}
.pip{
  flex:1;height:2px;border-radius:2px;
  background:var(--bg-3);
  transition:background .3s, opacity .25s;
}
.pip.done{background:var(--gold)}
.pip.active{background:var(--gold);opacity:.45}

/* в•җв”Җв”Җ Scroll content в”Җв”Җв•җ */
.scroll{
  flex:1;overflow-y:auto;
  padding:28px 28px 24px;
  scrollbar-width:thin;
  scrollbar-color:var(--line-md) transparent;
}
.scroll::-webkit-scrollbar{width:4px}
.scroll::-webkit-scrollbar-thumb{background:var(--line-md);border-radius:3px}

/* в•җв”Җв”Җ Footer bar в”Җв”Җв•җ */
.footbar{
  padding:12px 24px;
  border-top:1px solid var(--line);
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;
  background:var(--bg);
}
.footbar-hint{margin-left:auto;font-size:11.5px;color:var(--ink-3)}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   BUTTONS
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.btn{
  padding:9px 18px;
  border-radius:8px;
  font-size:13px;
  font-weight:500;
  border:1px solid var(--line-md);
  background:var(--bg);
  color:var(--ink-2);
  transition:all var(--transition);
  white-space:nowrap;
  letter-spacing:0.01em;
}
.btn:hover{background:var(--bg-2);color:var(--ink);border-color:var(--line-md)}
.btn.primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn.primary:hover{background:var(--navy-md);border-color:var(--navy-md)}
.btn.cta{background:var(--gold);color:#fff;border-color:var(--gold)}
.btn.cta:hover{background:var(--gold-lt);border-color:var(--gold-lt)}
.btn:disabled{opacity:.32;pointer-events:none}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   ANIMATION
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.rise{animation:rise .28s cubic-bezier(.4,0,.2,1)}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   CONTENT ATOMS
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.eyebrow{
  font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  font-size:10px;
  font-weight:600;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--gold-dim);
  margin-bottom:6px;
}
.heading{
  font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  font-size:24px;
  font-weight:700;
  color:var(--ink);
  line-height:1.2;
  letter-spacing:-0.03em;
  margin-bottom:14px;
}
.body-text{
  font-family:var(--sf);
  font-size:14px;
  font-weight:400;
  color:var(--ink-2);
  line-height:1.75;
  margin-bottom:16px;
}
.body-text p{margin-bottom:8px}
.body-text strong{color:var(--ink);font-weight:600}

/* в”Җв”Җ Objectives block в”Җв”Җ */
.obj-card{
  background:var(--navy-d);
  border-radius:var(--r-lg);
  padding:20px 22px;
  margin-bottom:22px;
  position:relative;
  overflow:hidden;
}
.obj-card::before{
  content:'';position:absolute;
  top:0;left:0;width:100%;height:2px;
  background:linear-gradient(90deg,var(--gold),transparent 70%);
}
.obj-eyebrow{
  font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  font-size:10px;font-weight:600;
  letter-spacing:0.08em;text-transform:uppercase;
  color:var(--gold);margin-bottom:10px;
}
.obj-row{
  display:flex;align-items:flex-start;gap:10px;
  padding:5px 0;
  font-size:13.5px;
  color:rgba(255,255,255,0.80);
  line-height:1.6;
}
.obj-arrow{color:var(--gold);flex-shrink:0;margin-top:2px;font-size:11px}
.obj-row:not(:last-child){border-bottom:1px solid rgba(255,255,255,0.05)}

/* в”Җв”Җ Info box в”Җв”Җ */
.info-box{
  border-left:2px solid var(--gold);
  background:var(--gold-soft);
  padding:14px 18px;
  border-radius:0 var(--r) var(--r) 0;
  margin:14px 0;
  font-size:13.5px;
  color:var(--ink);
  line-height:1.72;
}
.info-box .ib-label{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;font-weight:500;
  letter-spacing:0.12em;text-transform:uppercase;
  color:var(--gold-dim);margin-bottom:7px;
}

/* в”Җв”Җ Warning box в”Җв”Җ */
.warn-box{
  border-left:2px solid var(--err);
  background:var(--err-soft);
  padding:14px 18px;
  border-radius:0 var(--r) var(--r) 0;
  margin:14px 0;
  font-size:13.5px;
  color:#8b1e1e;
  line-height:1.72;
}
.warn-box::before{content:'вҡ  ';font-size:12px;opacity:.7}

/* в”Җв”Җ Analogy box (plain-language "think of it like this") в”Җв”Җ */
.analogy-box{
  border-left:2px solid var(--navy-md);
  background:rgba(11,61,122,0.06);
  padding:14px 18px;
  border-radius:0 var(--r) var(--r) 0;
  margin:14px 0;
  font-size:13.5px;
  color:var(--ink);
  line-height:1.72;
}
.analogy-box .ib-label{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;font-weight:500;
  letter-spacing:0.12em;text-transform:uppercase;
  color:var(--navy-md);margin-bottom:7px;
}

/* в”Җв”Җ Diagram box (real spot illustrations, not text comparisons) в”Җв”Җ */
.diagram-box{
  background:var(--bg-2);
  border:1px solid var(--line);
  border-radius:var(--r-lg);
  padding:20px 18px;
  margin:14px 0;
}
.diagram-title{
  font-family:'JetBrains Mono',monospace;
  font-size:9.5px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--ink-3);text-align:center;margin-bottom:16px;
}
.building-diagram{display:flex;align-items:center;justify-content:center;gap:24px;flex-wrap:wrap}
.building-legend{display:flex;flex-direction:column;gap:12px}
.legend-row{display:flex;align-items:center;gap:9px}
.legend-swatch{width:26px;height:20px;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff}
.legend-swatch.blocked{background:var(--err)}
.legend-swatch.ok{background:var(--ok)}
.legend-text b{display:block;font-size:12.5px;font-weight:600;color:var(--ink)}
.legend-text span{font-size:11.5px;color:var(--ink-2)}
.quota-wrap{margin-top:4px}
.quota-bar{display:flex;height:36px;border-radius:8px;overflow:hidden;border:1px solid var(--line-md)}
.quota-seg{display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:600;color:#fff;line-height:1.3;text-align:center;padding:2px}
.quota-seg.foreign{background:var(--gold);width:70%}
.quota-seg.local{background:var(--ink-3);width:30%}
.quota-caption{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-2);margin-top:8px}

/* в”Җв”Җ Step-flow diagram вҖ” any numbered process, shown as a visual flow в”Җв”Җ */
.flow-diagram{display:flex;align-items:stretch;gap:0;margin:14px 0;overflow-x:auto;padding-bottom:2px}
.flow-step{flex:1;min-width:130px;background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r);padding:12px 13px}
.flow-step-n{width:22px;height:22px;border-radius:50%;background:var(--navy);color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:10.5px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.flow-step-title{font-size:12px;font-weight:600;color:var(--ink);margin-bottom:4px;line-height:1.3}
.flow-step-sub{font-size:10.5px;color:var(--ink-2);line-height:1.5}
.flow-arrow{display:flex;align-items:center;justify-content:center;color:var(--ink-3);font-size:15px;padding:0 6px;flex-shrink:0}
@media(max-width:600px){.flow-diagram{flex-direction:column}.flow-arrow{transform:rotate(90deg);padding:2px 0}}

/* в”Җв”Җ Worked-example calculation вҖ” real numbers, shown like a receipt в”Җв”Җ */
.calc-box{background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r-lg);padding:16px 18px;margin:14px 0}
.calc-title{font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-3);margin-bottom:10px}
.calc-row{display:flex;justify-content:space-between;gap:12px;font-size:12.5px;color:var(--ink-2);padding:6px 0;border-bottom:1px dashed var(--line-md)}
.calc-row span:last-child{font-family:'JetBrains Mono',monospace;flex-shrink:0}
.calc-row.total{border-bottom:none;border-top:2px solid var(--navy);margin-top:2px;padding-top:9px;font-weight:600;color:var(--navy);font-size:13.5px}

/* в”Җв”Җ Rule action line (one concrete instruction per rule) в”Җв”Җ */
.rule-action{display:flex;gap:8px;background:var(--gold-soft);border-radius:8px;padding:9px 12px;font-size:12.5px;color:var(--ink);margin-top:8px;line-height:1.55}
.rule-action b{font-weight:600;color:var(--navy)}

/* в”Җв”Җ Grid cards в”Җв”Җ */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
.ig{
  background:var(--bg-2);
  border:1px solid var(--line);
  border-radius:var(--r);
  padding:12px 14px;
  transition:border-color var(--transition);
}
.ig:hover{border-color:var(--line-md)}
.ig-lbl{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;color:var(--ink-3);
  text-transform:uppercase;letter-spacing:0.1em;
  margin-bottom:4px;
}
.ig-val{font-size:13px;font-weight:500;color:var(--ink);line-height:1.5}

/* в”Җв”Җ Numbered rules в”Җв”Җ */
.rules{margin:14px 0}
.rule{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--line)}
.rule:last-child{border-bottom:none}
.rule-n{
  width:28px;height:28px;border-radius:50%;
  background:var(--navy);color:var(--gold);
  font-family:'JetBrains Mono',monospace;font-size:11px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;
}
.rule-title{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:4px}
.rule-detail{font-size:13px;color:var(--ink-2);line-height:1.65}

/* в”Җв”Җ PHC Logo image вҖ” blend mode removes black background в”Җв”Җ */
.phc-logo-img{
  display:block;
  object-fit:contain;
  flex-shrink:0;
}
/* Dark backgrounds (topbar navy, hero navy): screen blends out black вҶ’ gold shows */
.phc-logo-dark{
  mix-blend-mode:screen;
}
/* Light/white backgrounds (certificate): multiply blends out black вҶ’ gold shows */
.phc-logo-cert{
  mix-blend-mode:multiply;
}

/* в”Җв”Җ Table outer wrapper with scroll hint в”Җв”Җ */
.tbl-outer{position:relative}
.tbl-scroll-hint{
  display:none; /* shown only on mobile via media query */
}
/* в”Җв”Җ Table в”Җв”Җ */
.tbl-wrap{overflow-x:auto;margin:14px 0;border-radius:var(--r);border:1px solid var(--line);background:var(--bg)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--navy)}
th{
  padding:10px 14px;text-align:left;
  font-family:'JetBrains Mono',monospace;
  font-size:9px;font-weight:500;
  letter-spacing:0.08em;text-transform:uppercase;
  color:rgba(255,255,255,0.55);white-space:nowrap;
}
td{padding:10px 14px;border-bottom:1px solid var(--line);color:var(--ink);vertical-align:top;line-height:1.5}
tr:nth-child(even) td{background:var(--bg-2)}
tr:last-child td{border-bottom:none}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   ROLEPLAY
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.rp-trigger{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;
  border-radius:var(--r);
  border:1px solid var(--line-md);
  background:var(--bg-2);
  cursor:pointer;
  transition:all var(--transition);
  user-select:none;
}
.rp-trigger:hover{border-color:var(--navy);background:rgba(6,38,79,.03)}
.rp-trigger-icon{
  width:32px;height:32px;
  border-radius:8px;
  background:var(--navy);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.rp-trigger-icon svg{width:14px;height:14px;fill:#fff;margin-left:2px}
.rp-trigger-inner{flex:1}
.rp-trigger-eyebrow{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;color:var(--gold-dim);
  text-transform:uppercase;letter-spacing:0.1em;margin-bottom:2px;
}
.rp-trigger-title{font-size:13px;font-weight:500;color:var(--ink)}
.rp-chevron{font-size:11px;color:var(--ink-3);transition:transform .2s;flex-shrink:0}
.rp-chevron.open{transform:rotate(180deg)}

.rp-panel{
  display:none;margin-top:6px;
  border:1px solid var(--line);border-radius:var(--r);
  background:var(--bg);overflow:hidden;
}
.rp-panel.open{display:block;animation:rise .22s ease}
.rp-panel-inner{padding:20px 20px 16px}
.rp-inst{
  font-size:12px;color:var(--ink-3);font-style:italic;
  margin-bottom:16px;padding-bottom:14px;
  border-bottom:1px solid var(--line);line-height:1.65;
}

/* в”Җв”Җ Roleplay lines: grid layout for perfect alignment в”Җв”Җ */
.rp-lines{display:flex;flex-direction:column;gap:0}

/* Each line: tag column (fixed 62px) + text column (flex) */
.rp-line{
  display:grid;
  grid-template-columns:62px 1fr;
  gap:0 12px;
  padding:9px 0;
  border-bottom:1px solid var(--line);
  align-items:start;
}
.rp-line:last-child{border-bottom:none}

/* Agent lines вҖ” subtle navy tint background */
.rp-line.rp-agent{background:rgba(6,38,79,.025);margin:0 -20px;padding:9px 20px}

/* Client lines вҖ” subtle green tint */
.rp-line.rp-client{background:rgba(26,107,64,.025);margin:0 -20px;padding:9px 20px}

/* Note lines вҖ” no tint, muted */
.rp-line.rp-note{padding:7px 0}
.rp-line.rp-note.rp-agent,.rp-line.rp-note.rp-client{background:none;margin:0;padding:7px 0}

.rp-tag{
  font-family:'JetBrains Mono',monospace;
  font-size:8px;font-weight:600;
  letter-spacing:0.09em;text-transform:uppercase;
  padding:3px 7px;border-radius:4px;
  display:inline-flex;align-items:center;justify-content:center;
  margin-top:2px;
  width:52px; /* fixed width вҖ” all tags same size */
  white-space:nowrap;
}
.rp-tag.agent{background:rgba(6,38,79,.10);color:var(--navy)}
.rp-tag.client{background:rgba(26,107,64,.12);color:var(--ok)}
.rp-tag.note{
  background:transparent;color:var(--ink-3);
  font-style:italic;font-weight:400;
  letter-spacing:0.06em;border:1px solid var(--line-md);
}
.rp-text{
  font-size:13.5px;color:var(--ink);line-height:1.7;
  padding-top:1px;
}
.rp-line.rp-note .rp-text{
  font-size:12px;color:var(--ink-3);font-style:italic;line-height:1.6;
}

.rp-debrief{
  margin-top:16px;padding:13px 16px;
  border-radius:8px;
  background:var(--gold-soft);border-left:2px solid var(--gold);
  font-size:13px;color:var(--ink);line-height:1.65;
}
.rp-debrief strong{color:var(--navy);font-weight:600}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   QUIZ
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.quiz-meta{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 14px;
  background:var(--bg-2);border:1px solid var(--line);
  border-radius:var(--r);margin-bottom:20px;
  font-size:13px;color:var(--ink-2);
}
.quiz-meta-score{
  font-family:'JetBrains Mono',monospace;
  font-size:12px;color:var(--ink-3);
}
.q-block{padding:22px 0;border-bottom:1px solid var(--line)}
.q-block:last-child{border-bottom:none;padding-bottom:0}
.q-num{
  font-family:'JetBrains Mono',monospace;
  font-size:9.5px;font-weight:500;
  color:var(--gold-dim);text-transform:uppercase;
  letter-spacing:0.12em;margin-bottom:8px;
}
.q-text{
  font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  font-size:17px;font-weight:600;
  letter-spacing:-0.025em;
  color:var(--ink);margin-bottom:14px;line-height:1.4;
}
.q-opts{display:flex;flex-direction:column;gap:7px}
.q-opt{
  display:flex;align-items:flex-start;gap:12px;
  padding:11px 14px;border-radius:var(--r);
  border:1px solid var(--line);cursor:pointer;
  background:var(--bg);transition:all var(--transition);
}
.q-opt:hover:not(.locked){border-color:var(--gold-border);background:var(--gold-soft)}
.q-opt.locked{cursor:default}
.q-opt.selected{border-color:var(--navy-md);background:rgba(6,38,79,0.06)}
.q-opt.selected .opt-ltr{background:var(--navy);border-color:var(--navy);color:#fff}
.opt-ltr{
  width:28px;height:28px;border-radius:50%;
  background:var(--bg-3);border:1px solid var(--line-md);
  color:var(--ink-3);font-family:'JetBrains Mono',monospace;
  font-size:11px;font-weight:500;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s;
}
.opt-text{font-size:13.5px;color:var(--ink);line-height:1.55;padding-top:4px}
.q-opt.correct{border-color:var(--ok-border);background:var(--ok-soft)}
.q-opt.correct .opt-ltr{background:var(--ok);border-color:var(--ok);color:#fff}
.q-opt.wrong{border-color:var(--err-border);background:var(--err-soft)}
.q-opt.wrong .opt-ltr{background:var(--err);border-color:var(--err);color:#fff}
.q-opt.reveal{border-color:var(--ok-border);background:var(--ok-soft);opacity:.55}
.q-opt.reveal .opt-ltr{background:var(--ok);border-color:var(--ok);color:#fff}

.q-feedback{
  display:none;margin-top:12px;padding:12px 14px;
  border-radius:8px;font-size:13px;line-height:1.65;
}
.q-feedback.correct{background:var(--ok-soft);border:1px solid var(--ok-border)}
.q-feedback.wrong{background:var(--err-soft);border:1px solid var(--err-border)}
.fb-head{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;font-weight:500;
  letter-spacing:0.1em;text-transform:uppercase;
  margin-bottom:4px;
}
.q-feedback.correct .fb-head{color:var(--ok)}
.q-feedback.wrong .fb-head{color:var(--err)}
.fb-body{color:var(--ink);font-size:13px;margin-top:3px}

.quiz-actions{margin-top:22px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.quiz-hint{font-size:12px;color:var(--ink-3)}
.quiz-pass-gate{
  width:100%;display:flex;align-items:flex-start;gap:9px;
  padding:12px 16px;border-radius:var(--r);
  background:var(--err-soft);border:1px solid var(--err-border);
  font-size:13px;color:var(--ink-2);line-height:1.55;
}
.quiz-pass-gate strong{color:var(--err)}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   COMPLETE
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.complete{
  display:flex;flex-direction:column;align-items:center;
  text-align:center;padding:36px 24px;gap:18px;
}
.complete-checkmark{
  width:64px;height:64px;border-radius:50%;
  background:var(--navy-d);
  border:2px solid var(--gold-border);
  display:flex;align-items:center;justify-content:center;
}
.complete-checkmark svg{width:26px;height:26px;stroke:var(--gold);stroke-width:2.5;fill:none}
.complete-h{
  font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  font-size:27px;font-weight:700;
  color:var(--ink);letter-spacing:-0.04em;
}
.complete-sub{font-size:14px;color:var(--ink-2);max-width:400px;line-height:1.7}
.score-pills{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.s-pill{
  padding:5px 18px;border-radius:20px;
  font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:500;
  border:1px solid;
}
.s-pill.good{background:var(--ok-soft);color:var(--ok);border-color:var(--ok-border)}
.s-pill.ok{background:var(--gold-soft);color:var(--gold-dim);border-color:var(--gold-border)}
.s-pill.mid{background:var(--err-soft);color:var(--err);border-color:var(--err-border)}

.reflect-card{
  background:var(--navy-d);border-radius:var(--r-lg);
  padding:22px 24px;width:100%;max-width:480px;text-align:left;
  position:relative;overflow:hidden;
}
.reflect-card::after{
  content:'"';
  position:absolute;top:-14px;right:18px;
  font-family:var(--sf);
  font-size:130px;color:rgba(201,153,63,.07);
  font-weight:900;
  line-height:1;pointer-events:none;
}
.reflect-eyebrow{
  font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  font-size:10px;font-weight:600;
  letter-spacing:0.06em;text-transform:uppercase;
  color:var(--gold);margin-bottom:10px;
}
.reflect-q{
  font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  font-size:16px;color:rgba(255,255,255,.85);
  font-weight:400;
  line-height:1.6;font-style:italic;
  letter-spacing:-0.01em;
}

.next-card{
  background:var(--bg-2);border:1px solid var(--line);
  border-radius:var(--r-lg);padding:16px 20px;
  text-align:left;width:100%;max-width:400px;
  cursor:pointer;transition:border-color var(--transition), box-shadow var(--transition);
}
.next-card:hover{border-color:var(--line-md);box-shadow:0 4px 16px rgba(6,38,79,.08)}
.next-card-eyebrow{
  font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  font-size:10px;font-weight:600;color:var(--ink-3);
  text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px;
}
.next-card-title{font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-size:15px;font-weight:600;letter-spacing:-0.02em;color:var(--ink);line-height:1.35}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   LANDING
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.landing{padding:28px;display:flex;flex-direction:column;gap:22px}

/* Hero */
.hero{
  background:var(--navy-d);border-radius:var(--r-lg);
  padding:32px 36px;position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;
  top:-80px;right:-80px;
  width:320px;height:320px;border-radius:50%;
  background:radial-gradient(circle,rgba(201,153,63,.09) 0%,transparent 70%);
  pointer-events:none;
}
.hero::after{
  content:'';position:absolute;
  bottom:-100px;left:10%;
  width:240px;height:240px;border-radius:50%;
  background:radial-gradient(circle,rgba(11,61,122,.4) 0%,transparent 70%);
  pointer-events:none;
}
.hero-brand-row{
  display:flex;align-items:center;gap:10px;
  margin-bottom:16px;position:relative;
}
.hero-mark{
  height:52px;
  width:52px;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.hero-mark .phc-logo-img{height:52px;width:52px;}
.hero-brand-name{
  font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  font-size:11px;font-weight:600;
  letter-spacing:0.08em;text-transform:uppercase;
  color:rgba(255,255,255,.45);
}
.hero-h{
  font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  font-size:34px;font-weight:700;
  color:#fff;letter-spacing:-0.03em;
  line-height:1.1;margin-bottom:6px;
  position:relative;
}
.hero-sub{
  font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  font-size:15px;font-weight:400;
  color:rgba(255,255,255,.50);
  line-height:1.5;
  letter-spacing:-0.01em;
  margin-bottom:24px;position:relative;
}
.hero-stats{
  display:grid;grid-template-columns:repeat(4,1fr);gap:16px;
  padding-top:20px;border-top:1px solid rgba(255,255,255,.07);
  position:relative;
}
.hs{text-align:left}
.hs-n{
  font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  font-size:28px;font-weight:700;
  color:var(--gold);line-height:1;margin-bottom:3px;
  letter-spacing:-0.03em;
}
.hs-l{font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-size:10px;font-weight:500;color:rgba(255,255,255,.38);text-transform:uppercase;letter-spacing:0.05em}

/* Overall progress */
.prog-row{
  display:flex;align-items:center;gap:14px;
  padding:14px 18px;
  background:var(--bg-2);border:1px solid var(--line);
  border-radius:var(--r);
}
.prog-row-label{font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-size:14px;font-weight:500;letter-spacing:-0.01em;color:var(--ink);flex-shrink:0}
.prog-track{
  flex:1;height:5px;background:var(--bg-3);
  border-radius:4px;overflow:hidden;
}
.prog-fill{
  height:100%;
  background:linear-gradient(90deg,var(--navy) 0%,var(--gold) 100%);
  border-radius:4px;
  transition:width .6s cubic-bezier(.4,0,.2,1);
}
.prog-pct{
  font-family:var(--sf-mono),ui-monospace,'SFMono-Regular',monospace;
  font-size:12px;font-weight:500;color:var(--ink-3);flex-shrink:0;
}

/* CTA */
.landing-cta{display:flex;justify-content:center}

/* Week grid */
.week-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.wk{
  border-radius:var(--r-lg);padding:18px 20px;
  cursor:pointer;border:1px solid;
  transition:transform var(--transition), box-shadow var(--transition);
  position:relative;overflow:hidden;
}
.wk:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.1)}
.wk-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.wk-label{
  font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.06em;
}
.wk-count{font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-size:11px;font-weight:500;opacity:.55}
.wk-title{
  font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  font-size:16px;font-weight:700;
  letter-spacing:-0.025em;
  margin-bottom:4px;
}
.wk-desc{font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-size:12px;font-weight:400;letter-spacing:-0.005em;opacity:.65;line-height:1.5}
.wk-bar{
  position:absolute;bottom:0;left:0;height:2px;
  background:currentColor;opacity:.3;
  transition:width .5s ease;
}

/* в”Җв”Җ Landing footer (reset + version) в”Җв”Җ */
.landing-footer{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:20px 28px 8px;
  gap:12px;
}
.reset-btn{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  font-weight:500;
  letter-spacing:0.04em;
  color:var(--ink-3);
  background:none;
  border:none;
  cursor:pointer;
  padding:6px 0;
  text-decoration:underline;
  text-underline-offset:3px;
  transition:color var(--transition);
}
.reset-btn:hover{color:var(--err)}
.landing-version{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  color:var(--ink-3);
  letter-spacing:0.04em;
  opacity:0.6;
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   MOBILE NAV (hidden by default)
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.mob-nav{display:none}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   MOBILE вҖ” APPLE SF PRO STYLE
   Reference: iOS / Apple HIG / apple.com
   Font: SF Pro system stack, -apple-system
   Layout: generous whitespace, large touch targets (вүҘ44px),
           rounded cards, clean hierarchy, max legibility
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
@media(max-width:700px){

  /* в”Җв”Җ SF Pro on everything вҖ” one clean rule, no overrides needed в”Җв”Җ
     --sf already has Inter as fallback so this works on all platforms */
  body *{
    font-family:var(--sf);
    -webkit-font-smoothing:antialiased;
  }
  /* Monospace elements: step counter, week count, progress label */
  .lc-counter,.tb-label,.wk-count,.prog-pct,
  .quiz-meta-score,.lc-week-tag{
    font-family:var(--sf-mono);
  }

  /* в”Җв”Җ Base в”Җв”Җ */
  body{
    padding:0;
    background:#f2f2f7; /* iOS systemGroupedBackground */
    font-family:var(--sf);
    -webkit-font-smoothing:antialiased;
  }
  #app{
    border-radius:0;
    min-height:100dvh;
    border:none;
    box-shadow:none;
    background:var(--bg);
  }
  .sidebar{display:none}
  .layout{flex-direction:column}
  .main{padding-bottom:calc(68px + env(safe-area-inset-bottom, 0px))}

  /* в”Җв”Җ Topbar вҖ” iOS Navigation Bar style в”Җв”Җ */
  .topbar{
    padding:0 14px;
    height:48px;
    background:rgba(255,255,255,0.85);
    -webkit-backdrop-filter:saturate(180%) blur(20px);
    backdrop-filter:saturate(180%) blur(20px);
    border-bottom:0.5px solid rgba(60,60,67,0.2);
    gap:10px;
  }
  /* On mobile: hide the long wordmark + separator вҖ” too wide */
  .tb-wordmark{display:none}
  .tb-sep{display:none}
  /* Mark stays as small logo */
  .tb-mark{height:30px;width:30px;flex-shrink:0}
  .tb-mark .phc-logo-img{height:30px;width:30px}
  /* Context = lesson title, truncated, fills remaining space */
  .tb-ctx{
    font-family:var(--sf);
    font-size:13px;
    font-weight:600;
    letter-spacing:-0.02em;
    color:rgba(255,255,255,0.88);
    flex:1;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    min-width:0;
  }
  /* Progress stays compact on the right */
  .tb-prog{gap:7px;flex-shrink:0}
  .tb-track{width:48px;height:3px;border-radius:2px}
  .tb-label{
    font-family:var(--sf-mono);
    font-size:10px;
    font-weight:500;
    letter-spacing:0;
    color:rgba(255,255,255,0.5);
    white-space:nowrap;
  }

  /* в”Җв”Җ Landing в”Җв”Җ */
  .landing{
    padding:0 0 32px;
    gap:0;
    background:#f2f2f7;
  }

  /* Hero вҖ” full bleed */
  .hero{
    padding:28px 20px 24px;
    border-radius:0;
    margin-bottom:0;
  }
  .hero::before,.hero::after{display:none}
  .hero-brand-row{margin-bottom:12px}
  .hero-mark{height:44px;width:44px}
  .hero-mark .phc-logo-img{height:44px;width:44px}
  .hero-brand-name{
    font-family:var(--sf);
    font-size:11px;
    font-weight:500;
    letter-spacing:0.02em;
    color:rgba(255,255,255,0.5);
  }
  .hero-h{
    font-family:var(--sf);
    font-size:26px;
    font-weight:700;
    letter-spacing:-0.03em;
    line-height:1.1;
    margin-bottom:6px;
  }
  .hero-sub{
    font-family:var(--sf);
    font-size:14px;
    font-weight:400;
    letter-spacing:-0.01em;
    color:rgba(255,255,255,0.5);
    margin-bottom:20px;
  }
  .hero-stats{
    grid-template-columns:repeat(4,1fr);
    gap:0;
    padding-top:16px;
    border-top:0.5px solid rgba(255,255,255,0.12);
  }
  .hs{text-align:center;padding:0 4px}
  .hs-n{
    font-family:var(--sf);
    font-size:22px;
    font-weight:700;
    letter-spacing:-0.03em;
    color:var(--gold);
    margin-bottom:2px;
  }
  .hs-l{
    font-family:var(--sf);
    font-size:10px;
    font-weight:400;
    letter-spacing:0.01em;
    color:rgba(255,255,255,0.4);
  }

  /* Progress row вҖ” iOS grouped card style */
  .prog-row{
    margin:16px 16px 0;
    padding:14px 16px;
    border-radius:12px;
    background:#fff;
    box-shadow:0 1px 0 rgba(0,0,0,0.04), 0 0 0 0.5px rgba(60,60,67,0.1);
    gap:12px;
  }
  .prog-row-label{
    font-family:var(--sf);
    font-size:14px;
    font-weight:500;
    letter-spacing:-0.01em;
    color:var(--ink);
    white-space:nowrap;
  }
  .prog-track{height:4px;border-radius:4px}
  .prog-pct{
    font-family:var(--sf-mono);
    font-size:12px;
    font-weight:500;
    color:var(--ink-3);
    white-space:nowrap;
  }

  /* CTA */
  .landing-cta{padding:12px 16px 0}
  .landing-cta .btn,
  .landing-cta button{
    width:100%;
    height:50px;
    border-radius:14px;
    font-family:var(--sf);
    font-size:16px;
    font-weight:600;
    letter-spacing:-0.01em;
    justify-content:center;
    display:flex;align-items:center;
  }

  /* Week cards вҖ” iOS grouped list style */
  .week-grid{
    grid-template-columns:1fr;
    gap:0;
    margin:16px 0 0;
    padding:0 16px;
  }
  .wk{
    border-radius:0;
    border:none;
    border-bottom:0.5px solid rgba(60,60,67,0.15);
    padding:14px 0 14px 4px;
    background:#fff;
    box-shadow:none;
  }
  .wk:first-child{border-radius:12px 12px 0 0;padding-top:16px}

  /* в”Җв”Җ Lesson Chrome вҖ” fixed below topbar в”Җв”Җ

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   NAME INPUT (landing вҖ” program complete)
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.name-prompt{
  background:var(--bg-2);
  border:1px solid var(--line);
  border-radius:var(--r-lg);
  padding:20px 22px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.name-prompt-label{
  font-family:'JetBrains Mono',monospace;
  font-size:9.5px;
  font-weight:500;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--gold-dim);
}
.name-prompt-sub{font-size:13px;color:var(--ink-2);line-height:1.55}
.name-input-row{display:flex;gap:10px;align-items:stretch}
.name-input{
  flex:1;
  padding:10px 14px;
  border-radius:8px;
  border:1px solid var(--line-md);
  background:var(--bg);
  font-family:'Playfair Display',serif;
  font-size:17px;
  color:var(--ink);
  outline:none;
  transition:border-color var(--transition);
}
.name-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,153,63,.12)}
.name-input::placeholder{color:var(--ink-3);font-style:italic;font-size:15px}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   CERTIFICATE VIEW
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.cert-view{
  flex:1;
  display:flex;
  flex-direction:column;
  background:var(--bg-3);
  min-height:0;
}
.cert-toolbar{
  padding:12px 24px;
  background:var(--bg);
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  gap:12px;
  flex-shrink:0;
}
.cert-toolbar-title{
  font-size:13px;
  font-weight:500;
  color:var(--ink);
  flex:1;
}
.cert-scroll{
  flex:1;
  overflow-y:auto;
  padding:32px;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  scrollbar-width:thin;
}

/* The certificate itself */
.certificate{
  width:100%;
  max-width:680px;
  background:#fff;
  box-shadow:0 8px 40px rgba(6,38,79,.18);
  border-radius:4px;
  position:relative;
  overflow:hidden;
  aspect-ratio:210/297; /* A4 portrait */
  display:flex;
  flex-direction:column;
}

/* Border frame */
.cert-frame{
  position:absolute;
  inset:14px;
  border:1px solid var(--gold-border);
  pointer-events:none;
  z-index:1;
}
.cert-frame-inner{
  position:absolute;
  inset:18px;
  border:0.5px solid rgba(201,153,63,.15);
  pointer-events:none;
  z-index:1;
}

/* Background watermark */
.cert-bg{
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 15% 20%, rgba(201,153,63,.04) 0%, transparent 50%),
    radial-gradient(circle at 85% 80%, rgba(6,38,79,.04) 0%, transparent 50%);
  pointer-events:none;
}

/* Cert content */
.cert-content{
  position:relative;
  z-index:2;
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:8% 10% 6%;
  text-align:center;
}
/* Cert logo row вҖ” centered at top */
.cert-logo-row{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-bottom:4%;
}
/* White circle behind logo вҖ” removes the black JPEG background cleanly */
.cert-mark-bg{
  width:76px;height:76px;
  border-radius:50%;
  background:#fff;
  border:1.5px solid var(--gold-border);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  box-shadow:0 2px 16px rgba(201,153,63,.18);
}
.cert-mark{
  display:flex;align-items:center;justify-content:center;
}
.cert-mark .phc-logo-img{height:70px;width:70px;}
.cert-brand{
  font-family:'Playfair Display',serif;
  font-size:13px;
  font-weight:600;
  color:var(--navy);
  letter-spacing:0.04em;
}
.cert-brand-jp{
  font-size:10px;
  color:var(--ink-3);
  letter-spacing:0.06em;
  font-family:'JetBrains Mono',monospace;
}
.cert-eyebrow{
  font-family:'JetBrains Mono',monospace;
  font-size:8.5px;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--gold-dim);
  margin-bottom:3%;
}
.cert-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(18px,3.5vw,28px);
  font-weight:700;
  color:var(--navy-d);
  line-height:1.2;
  margin-bottom:2%;
  letter-spacing:0.01em;
}
.cert-presented{
  font-size:clamp(9px,1.4vw,12px);
  color:var(--ink-3);
  letter-spacing:0.08em;
  text-transform:uppercase;
  font-family:'JetBrains Mono',monospace;
  margin-bottom:4%;
}
.cert-name{
  font-family:'Playfair Display',serif;
  font-size:clamp(22px,4.5vw,38px);
  font-weight:600;
  color:var(--navy);
  letter-spacing:0.02em;
  line-height:1.15;
  margin-bottom:4%;
  padding:0 5%;
  min-height:1.4em;
  word-break:break-word;
}
.cert-divider{
  width:60%;
  height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin-bottom:4%;
}
.cert-body{
  font-size:clamp(9px,1.4vw,12px);
  color:var(--ink-2);
  line-height:1.75;
  max-width:80%;
  margin-bottom:5%;
}
.cert-body strong{color:var(--navy)}

/* Gold seal */
.cert-seal{
  width:clamp(56px,9vw,80px);
  height:clamp(56px,9vw,80px);
  margin-bottom:5%;
  flex-shrink:0;
}

/* Signature row вҖ” single centered signature */
.cert-sig-row{
  display:flex;
  width:80%;
  justify-content:center;
  margin-bottom:4%;
}
.cert-sig{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}
.cert-sig-line{
  width:160px;
  height:1px;
  background:linear-gradient(90deg,transparent,var(--line-md),transparent);
}
.cert-sig-name{
  font-family:'Playfair Display',serif;
  font-size:clamp(11px,1.6vw,14px);
  color:var(--ink);
  font-weight:600;
  letter-spacing:0.01em;
}
.cert-sig-title{
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(7px,1vw,9px);
  color:var(--gold-dim);
  text-transform:uppercase;
  letter-spacing:0.12em;
}

/* Date & issue info */
.cert-footer-info{
  display:flex;
  justify-content:center;
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(7px,1vw,9px);
  color:var(--ink-3);
  letter-spacing:0.08em;
  text-transform:uppercase;
}
.cert-footer-info span{display:flex;flex-direction:column;align-items:center;gap:3px}
.cert-footer-info strong{color:var(--ink-2);font-weight:500;font-size:clamp(8px,1.1vw,10px)}

/* в•җв•җ PRINT STYLES в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
@media print{
  body{background:#fff;padding:0;margin:0}
  #app,.cert-toolbar,.topbar,.sidebar,.footbar,.mob-nav,.landing,.scroll,.main,
  button,.cert-scroll{display:block!important;padding:0!important;margin:0!important;
  border:none!important;box-shadow:none!important;background:transparent!important}
  #app,body{width:100%;max-width:none;border-radius:0}
  .cert-view{display:block!important;background:#fff}
  .cert-toolbar{display:none!important}
  .cert-scroll{padding:0!important;overflow:visible!important;display:block!important}
  .certificate{
    width:100%;max-width:none;
    box-shadow:none!important;
    aspect-ratio:auto!important;
    page-break-inside:avoid;
    border-radius:0;
  }
  @page{size:A4 portrait;margin:0}
}
</style>

{id:1,week:1,title:"Welcome to Property Hub Cambodia",short:"Welcome to PHC",objectives:["Know what PHC is and what makes it different from a normal real estate agency", "Understand your job title: Investment Advisor, and how it's different from 'salesperson'", "Know the 3 rules every PHC agent follows, with no exceptions"],sections:[{"label": "Company Identity", "heading": "The company you represent", "body": "Property Hub Cambodia (PHC) helps foreign investors buy property in Cambodia. We are based in BKK1, a district in Phnom Penh. We speak Khmer, English, Japanese, and German. Here is the most important idea in this lesson: PHC is not a real estate agency. PHC is an advisory firm. A real estate agency's job is to sell property. PHC's job is to give honest advice вҖ” even when that advice is \"don't buy this one.\"", "box": {"title": "Company facts", "lines": ["Name: Property Hub Cambodia (PHC)", "Office: BKK1, Phnom Penh", "Languages: Khmer, English, Japanese, German", "Years in business: 15+", "Clients served: 500+"]}}, {"label": "Your Job Title", "heading": "You are an Investment Advisor, not a salesperson", "body": "These two jobs sound similar. They are not the same job. Look at the comparison below before you meet your first client.", "grid": [["A salesperson's job", "Make the sale happen. If the client is unsure, convince them. Every conversation moves toward yes."], ["A PHC advisor's job", "Find out if this property is right for the client. If it is not right, say so вҖ” even if that means no sale today."]], "rules": [{"title": "You will lose some sales. That is correct.", "detail": "When a client's goals do not match a property, tell them clearly. A client who trusts you today will come back later, or send you a friend.", "action": "If a property does not fit the client's stated goal, say so out loud before showing them anything else."}]}, {"label": "The 3 Rules", "heading": "3 rules every PHC agent follows, always", "body": "These 3 rules apply in every conversation, with every client, every time. There are no exceptions.", "rules": [{"title": "Rule 1: Be clear, not persuasive", "detail": "If you cannot explain something in a simple, honest sentence, do not say it at all. Go find the correct answer first.", "action": "If you don't know an answer, say \"let me confirm that for you\" вҖ” never guess."}, {"title": "Rule 2: Trust is the real product", "detail": "PHC's most valuable asset is not any single property listing. It is PHC's reputation. One client who feels pressured will tell other people not to trust PHC.", "action": "If you feel tempted to rush a client toward a decision, stop and slow down instead."}, {"title": "Rule 3: Follow the system, every time", "detail": "PHC has a process for a reason. Skipping steps because you are in a hurry causes mistakes.", "action": "Before you close a conversation, check: did I follow every step for today's stage?"}]}],roleplay:{"scenario": "A client tests you in the first minute", "instructions": "One person plays AGENT. One person plays CLIENT. Try it once, then switch roles.", "lines": [{"role": "client", "text": "\"So you're a real estate agent вҖ” you're here to sell me a property, right?\""}, {"role": "agent", "text": "\"Not exactly. My job is to advise you, not to sell to you.\""}, {"role": "client", "text": "\"What's the difference?\""}, {"role": "agent", "text": "\"A salesperson wants the sale to happen. My job is to make sure the sale is right for you вҖ” even if that means telling you not to buy.\""}, {"role": "client", "text": "\"What if you tell me not to buy?\""}, {"role": "agent", "text": "\"Then I will. If this investment is wrong for your situation, I will say so вҖ” even if it costs me the sale. That is the only way you can trust what I tell you.\""}, {"role": "note", "text": "Debrief: Did the agent sound confident, or like they were reading a script? Did the client feel like the difference was real?"}], "debrief": "The goal is not to memorize these exact words. The goal is to mean them. If the client does not feel the difference, practice again."},quiz:[{"q": "What is your official job title at PHC?", "opts": ["Property Salesperson", "Real Estate Agent", "Investment Advisor", "Property Consultant"], "correct": 2, "explain": "Investment Advisor. This title changes how you talk to every client. You are there to advise вҖ” not to sell."}, {"q": "What are PHC's 3 rules?", "opts": ["Speed, Volume, Commission", "Be clear not persuasive В· Trust is the product В· Follow the system", "Price, Location, Yield", "Marketing, Sales, Closing"], "correct": 1, "explain": "Be clear, not persuasive. Trust is the product. Follow the system, every time. These 3 rules control every conversation a PHC agent has."}, {"q": "A client asks you to guarantee a specific return on their investment. What do you do?", "opts": ["Give a careful estimate to make them feel good", "Explain that no advisor can honestly guarantee a return вҖ” and explain why", "Check with the developer and repeat their number", "Quote the highest gross yield you have heard"], "correct": 1, "explain": "Never use the word \"guarantee\" for investment returns. Explaining why builds trust. Guessing destroys it."}, {"q": "What does PHC compete on, according to this lesson?", "opts": ["The lowest commission in Phnom Penh", "Trust, clarity, and advisory depth", "The most property listings", "The fastest closing time"], "correct": 1, "explain": "PHC is not a high-volume agency. PHC competes on trust, clarity, and depth of advice. That is what makes PHC different."}],reflection:"What do you think is the hardest part about being an advisor instead of a salesperson? Write 2-3 sentences.",km:{"title":"бһҹбҹ’бһңбһ¶бһӮбһҳбһ“бҹҚбһҳбһҖбһҖбһ¶бһ“бҹӢ Property Hub Cambodia","short":"бһҹбҹ’бһңбһ¶бһӮбһҳбһ“бҹҚбһҳбһҖбһҖбһ¶бһ“бҹӢ PHC","objectives":["бһҷбһӣбҹӢбһҠбһ№бһ„бһ–бһёбһўбһҸбҹ’бһҸбһҹбһүбҹ’бһүбһ¶бһҺ бһҸбһҳбҹ’бһӣбҹғ бһ“бһ·бһ„бһ‘бһёбһҸбһ¶бҹҶбһ„бһ‘бһёбһ•бҹ’бһҹбһ¶бһҡбһҡбһ”бһҹбҹӢ PHC","бһҷбһӣбҹӢ һ‘бҹҖбһҸбһҠбһҫбһҡбһҸбһҪбһҮбһ¶ бһўбһҸбһ·бһҗбһ·бһҮбһ“ (CLIENT)бҹ” бһҹбһ¶бһҖбһӣбҹ’бһ”бһ„бһҳбҹ’бһҸбһ„ бһ бһҫбһҷбһ•бҹ’бһӣбһ¶бһҹбҹӢбһ”бҹ’бһҸбһјбһҡбһҸбһҪбһ“бһ¶бһ‘бһёбһӮбҹ’бһ“бһ¶бҹ”","lines":[{"role":"client","text":"\"бһ…бһ№бһ„бһўбҹ’бһ“бһҖбһҮбһ¶бһ—бҹ’бһ“бһ¶бһҖбҹӢбһ„бһ¶бһҡбһўбһ…бһӣбһ“бһ‘бҹ’бһҡбһ–бҹ’бһҷ вҖ” бһўбҹ’бһ“бһҖбһ“бҹ…бһ‘бһёбһ“бҹҒбҹҮбһҮбһ¶бһҳбһјбһӣбһҠбҹ’бһӢбһ¶бһ“бһҠбһҫбһҳбҹ’бһ”бһёбһӣбһҖбҹӢбһўбһ…бһӣбһ“бһ‘бҹ’бһҡбһ–бҹ’бһҷбһұбҹ’бһҷбһҒбҹ’бһүбһ»бҹҶ бһҳбҹӮбһ“бһ‘бҹҒ?\""},{"role":"agent","text":"\"бһҳбһ·бһ“бһҳбҹӮбһ“бһ–бһ·бһҸбһ”бҹ’бһҡбһ¶бһҖбһҠбһ“бҹ„бҹҮбһ‘бҹҒбҹ” бһҸбһҪбһ“бһ¶бһ‘бһёбһҡбһ”бһҹбҹӢбһҒбҹ’бһүбһ»бҹҶбһӮбһәбһ‘бһёбһ”бҹ’бһҡбһ№бһҖбҹ’бһҹбһ¶бһңбһ·бһ“бһ·бһҷбҹ„бһӮ бһҳбһ·бһ“бһҳбҹӮбһ“бһҮбһ¶бһ—бҹ’бһ“бһ¶бһҖбҹӢбһ„бһ¶бһҡбһӣбһҖбҹӢбһ“бҹ„бҹҮбһ‘бҹҒбҹ”\""},{"role":"client","text":"\"бһҸбһҫбһңбһ¶бһҒбһ»бһҹбһӮбҹ’бһ“бһ¶бһҷбҹүбһ¶бһ„бһҳбҹүбҹҒбһ…?\""},{"role":"agent","text":"\"бһ—бҹ’бһ“бһ¶бһҖбҹӢбһ„бһ¶бһҡбһӣбһҖбҹӢбһ•бҹ’бһҸбҹ„бһҸбһӣбһҫбһҖбһ¶бһҡбһ’бҹ’бһңбһҫбһұбҹ’бһҷбһ”бҹ’бһҡбһҸбһ·бһ”бһҸбҹ’бһҸбһ·бһҖбһ¶бһҡбһӣбһҖбҹӢбһҖбһҫбһҸбһЎбһҫбһ„бҹ” бһҜбһ—бһ¶бһҡбһҖбһ·бһ…бҹ’бһ…бһҡбһ”бһҹбҹӢбһҒбҹ’бһүбһ»бҹҶбһӮбһәбһ’бһ¶бһ“бһ¶бһҗбһ¶бһ”бҹ’бһҡбһҸбһ·бһ”бһҸбҹ’бһҸбһ·бһҖбһ¶бһҡбһ“бҹ„бҹҮбһҸбҹ’бһҡбһ№бһҳбһҸбҹ’бһҡбһјбһңбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһўбҹ’бһ“бһҖ вҖ” бһ‘бҹ„бҹҮбһ”бһёбһҮбһ¶бһңбһ¶бһ“бһ¶бҹҶбһ‘бҹ…бһҡбһҖбһҖбһ¶бһҡбһ‘бһ·бһүбһ¬бһўбһҸбҹӢбһҖбҹҸбһҠбҹ„бһҷбҹ”\""},{"role":"client","text":"\"бһ…бһ»бҹҮбһ”бһҫбһўбҹ’бһ“бһҖбһ”бҹ’бһҡбһ¶бһ”бҹӢбһҒбҹ’бһүбһ»бҹҶбһҳбһ·бһ“бһұбҹ’бһҷбһ‘бһ·бһүбһңбһ·бһү?\""},{"role":"agent","text":"\"бһ”бҹ’бһҡбһ¶бһҖбһҠбһҺбһ¶бһҹбҹӢбҹ” бһ”бҹ’бһҡбһҹбһ·бһ“бһ”бһҫбһҖбһ¶бһҡбһңбһ·бһ“бһ·бһҷбҹ„бһӮбһ“бҹҒбҹҮбһҳбһ·бһ“бһҹбһҳбһҹбҹ’бһҡбһ”бһ“бһ№бһ„бһҹбҹ’бһҗбһ¶бһ“бһ—бһ¶бһ–бһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖбһ‘бҹҒ бһҒбҹ’бһүбһ»бҹҶбһ“бһ№бһ„бһ”бҹ’бһҡбһ¶бһ”бҹӢбһўбҹ’бһ“бһҖ вҖ” бһ‘бҹ„бҹҮбһ”бһёбһҮбһ¶бһңбһ¶бһҳбһ¶бһ“бһ“бҹҗбһҷбһҗбһ¶бһҸбҹ’бһҡбһјбһңбһ”бҹ„бҹҮбһ”бһ„бҹӢбһҖбһ¶бһҡбһӣбһҖбҹӢбһҖбҹҸбһҠбҹ„бһҷбҹ” бһ“бҹ„бҹҮбһҮбһ¶бһңбһ·бһ’бһёбһҸбҹӮбһҳбһҪбһҷбһӮбһҸбҹӢбһҠбҹӮбһӣбһҒбҹ’бһүбһ»бҹҶбһўбһ¶бһ…бһҡбһҖбҹ’бһҹбһ¶бһ—бһ¶бһ–бһӮбһҪбһҡбһұбҹ’бһҷбһ‘бһ»бһҖбһ…бһ·бһҸбҹ’бһҸбһҮбһ¶бһҳбһҪбһҷбһўбҹ’бһ“бһҖбһ”бһ¶бһ“бҹ”\""},{"role":"client","text":"\"бһ“бҹ„бҹҮ... бһҳбһ·бһ“бһҳбҹӮбһ“бһҮбһ¶бһўбҹ’бһңбһёбһҠбҹӮбһӣбһҒбҹ’бһүбһ»бҹҶбһҡбҹҶбһ–бһ№бһ„бһ‘бһ»бһҖбһ“бҹ„бҹҮбһ‘бҹҒбҹ”\""},{"role":"note","text":"бһҖбһ¶бһҡбһ”бһјбһҖбһҹбһҡбһ»бһ”бһҠбһҖбһ–бһ·бһҹбҹ„бһ’бһ“бҹҚбҹ– бһҸбһҫбһ—бҹ’бһ“бһ¶бһҖбҹӢбһ„бһ¶бһҡбһ“бһ·бһҷбһ¶бһҷбһҹбҹ’бһҸбһ¶бһ”бҹӢбһ‘бҹ…бһҳбһ¶бһ“бһ‘бҹҶбһ“бһ»бһҖбһ…бһ·бһҸбҹ’бһҸ бһ¬бһҠбһјбһ…бһ‘бһ“бҹ’бһ‘бҹҒбһүбһ…бһ¶бҹҶбһҳбһ¶бһҸбҹӢ? бһҸбһҫбһўбһҸбһ·бһҗбһ·бһҮбһ“бһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһ”бһүбҹ’бһ…бһ»бҹҮбһ”бһүбҹ’бһ…бһјбһӣбһұбҹ’бһҷбһҮбһҝбһҮбһ¶бһҖбҹӢбһҠбҹӮбһҡбһ¬бһ‘бҹҒ?"}],"debrief":"бһӮбҹ„бһӣбһҠбҹ…бһҳбһ·бһ“бһҳбҹӮбһ“бһҮбһ¶бһҖбһ¶бһҡбһ‘бһ“бҹ’бһ‘бҹҒбһүбһҸбһ¶бһҳбһҹбҹ’бһӮбҹ’бһҡбһёбһ”бһ“бҹ„бҹҮбһ‘бҹҒ вҖ” бһӮбһәбһҸбҹ’бһҡбһјбһңбһҳбһ¶бһ“бһ…бһ·бһҸбҹ’бһҸбһҹбҹ’бһҳбҹ„бҹҮбһҸбҹ’бһҡбһ„бҹӢбһ…бҹҶбһ–бҹ„бҹҮбһўбҹ’бһңбһёбһҠбҹӮбһӣбһўбҹ’бһ“бһҖбһ“бһ·бһҷбһ¶бһҷбҹ” бһ”бҹ’бһҡбһҹбһ·бһ“бһ”бһҫбһўбһҸбһ·бһҗбһ·бһҮбһ“бһҳбһ·бһ“бһҳбһ¶бһ“бһўбһ¶бһҡбһҳбҹ’бһҳбһҺбҹҚбһҳбһҫбһӣбһғбһҫбһүбһ–бһёбһ—бһ¶бһ–бһҒбһ»бһҹбһӮбҹ’бһ“бһ¶бһ‘бҹҒ бһ…бһјбһҡбһ бһ¶бһҸбҹӢбһҹбһҳбһңбһ¶бһҳбҹ’бһҸбһ„бһ‘бҹҖбһҸбҹ”"},"quiz":[{"q":"бһҸбһҫбһҸбһҪбһ“бһ¶бһ‘бһёбһ•бҹ’бһӣбһјбһңбһҖбһ¶бһҡбһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖбһҮбһ¶бһ—бҹ’бһ“бһ¶бһҖбҹӢбһ„бһ¶бһҡ PHC бһӮбһәбһҮбһ¶бһўбҹ’бһңбһё?","opts":["бһўбҹ’бһ“бһҖбһӣбһҖбҹӢбһўбһ…бһӣбһ“бһ‘бҹ’бһҡбһ–бҹ’бһҷ","бһ—бҹ’бһ“бһ¶бһҖбҹӢбһ„бһ¶бһҡбһўбһ…бһӣбһ“бһ‘бҹ’бһҡбһ–бҹ’бһҷ","бһ‘бһёбһ”бҹ’бһҡбһ№бһҖбҹ’бһҹбһ¶бһңбһ·бһ“бһ·бһҷбҹ„бһӮ","бһўбҹ’бһ“бһҖбһ”бҹ’бһҡбһ№бһҖбҹ’бһҹбһ¶бһўбһ…бһӣбһ“бһ‘бҹ’бһҡбһ–бҹ’бһҷ"],"correct":2,"explain":"бһ‘бһёбһ”бҹ’бһҡбһ№бһҖбҹ’бһҹбһ¶бһңбһ·бһ“бһ·бһҷбҹ„бһӮбҹ” бһҖбһ¶бһҡбһҖбҹҶбһҺбһҸбҹӢбһҸбһҪбһ“бһ¶бһ‘бһёбһ“бҹҒбҹҮбһ‘бһҳбҹ’бһҡбһ„бҹӢбһ”бҹӮбһ”бһ”бһ‘бһҠбһӣбҹӢбһҖбһ¶бһҡбһ”бҹ’бһҡбһ¶бһҹбҹ’бһҡбҹҗбһҷбһ‘бһ¶бһҖбҹӢбһ‘бһ„бһҮбһ¶бһҳбһҪбһҷбһўбһҸбһ·бһҗбһ·бһҮбһ“бһӮбҹ’бһҡбһ”бҹӢбһ–бҹҒбһӣбҹ” бһўбҹ’бһ“бһҖбһ“бҹ…бһ‘бһёбһ“бҹ„бҹҮбһҠбһҫбһҳбҹ’бһ”бһёбһ•бҹ’бһҸбһӣбҹӢбһ”бҹ’бһҡбһ№бһҖбҹ’бһҹбһ¶ вҖ” бһҳбһ·бһ“бһҳбҹӮбһ“бһҠбһҫбһҳбҹ’бһ”бһёбһӣбһҖбҹӢбһ“бҹ„бҹҮбһ‘бҹҒбҹ”"},{"q":"бһҹбҹ’бһҠбһ„бҹӢбһҠбһ¶бһҡбһҳбһ·бһ“бһўбһ¶бһ…бһҡбҹҶбһӣбҹ„бһ—бһ”бһ¶бһ“бһ…бҹҶбһ“бһҪбһ“бһ”бһёбһҡбһ”бһҹбҹӢ PHC бһӮбһә ҝбһ“бһ”бҹҶбһ•бһ»бһҸ","бһ‘бҹҶбһ“бһ»бһҖбһ…бһ·бһҸбҹ’бһҸ бһ—бһ¶бһ–бһ…бҹ’бһ”бһ¶бһҹбҹӢбһӣбһ¶бһҹбҹӢ бһ“бһ·бһ„бһҮбһҳбҹ’бһҡбҹ…бһ“бҹғбһҖбһ¶бһҡбһ•бҹ’бһҸбһӣбҹӢбһ”бҹ’бһҡбһ№бһҖбҹ’бһҹбһ¶","бһ‘бҹҶбһ“бһ¶бһҖбҹӢбһ‘бҹҶбһ“бһ„бһҮбһ¶бһҳбһҪбһҷбһҳбҹ’бһ…бһ¶бһҹбҹӢбһӮбһҳбҹ’бһҡбҹ„бһ„ бһ“бһ·бһ„бһўбһ…бһӣбһ“бһ‘бҹ’бһҡбһ–бҹ’бһҷбһ–бһ·бһҹбҹҒбһҹбһ•бҹ’бһҸбһ¶бһ…бҹӢбһҳбһ»бһҒ"],"correct":2,"explain":"PHC бһҳбһ·бһ“бһҳбҹӮбһ“бһҮбһ¶бһҖбҹ’бһҡбһ»бһҳбһ бҹҠбһ»бһ“бһҠбҹӮбһӣбһ•бҹ’бһҸбҹ„бһҸбһӣбһҫбһ”бһҡбһ·бһҳбһ¶бһҺбһ“бҹ„бҹҮбһ‘бҹҒбҹ” бһҷбһҫбһ„бһ”бҹ’бһҡбһҖбһҪбһҸбһ”бҹ’бһҡбһҮбҹӮбһ„бһӣбһҫбһ‘бҹҶбһ“бһ»бһҖбһ…бһ·бһҸбҹ’бһҸ бһ—бһ¶бһ–бһ…бҹ’бһ”бһ¶бһҹбҹӢбһӣбһ¶бһҹбҹӢ бһ“бһ·бһ„бһҮбһҳбҹ’бһҡбҹ…бһ“бҹғбһҖбһ¶бһҡбһ•бҹ’бһҸбһӣбҹӢбһ”бҹ’бһҡбһ№бһҖбҹ’бһҹбһ¶бҹ” бһ“бҹҒбҹҮбһӮбһәбһҮбһ¶бһўбҹ’бһңбһёбһҠбҹӮбһӣбһ’бҹ’бһңбһҫбһұбҹ’бһҷбһҷбһҫбһ„бһҒбһ»бһҹбһ”бҹ’бһӣбҹӮбһҖбһ–бһёбһҖбҹ’бһҡбһ»бһҳбһ бҹҠбһ»бһ“бһҠбһ‘бҹғбһ‘бҹҖбһҸбһ“бҹ…бһҖбҹ’бһ“бһ»бһ„бһ‘бһёбһ•бҹ’бһҹбһ¶бһҡбҹ”"}]}},
{id:2,week:1,title:"The Phnom Penh Property Market",short:"Phnom Penh Market",objectives:["Know the current state of the Phnom Penh condo market using REAKH data", "Know average prices and rents for the main districts", "Calculate a simple Capital Gains Tax (CGT) example correctly"],sections:[{"label": "Where These Numbers Come From", "heading": "REAKH вҖ” our data partner, not just a name to remember", "body": "Every number in this lesson comes from Realestate.com.kh (REAKH), our official listing partner and the leading property platform in Cambodia. When you say a number to a client, you can say where it came from. That is what makes the number trustworthy instead of a guess.", "box": {"title": "Cambodia condo market вҖ” 2025/2026 snapshot", "lines": ["Average price across Phnom Penh: $1,800/sqm (gross floor area)", "Average price in BKK1: $2,000/sqm gross", "Transaction volume grew 25% in 2025 вҖ” the market is recovering, not booming", "Total condo supply in Phnom Penh: about 60,000+ units by end of 2024"]}}, {"label": "Prices and Rent by District", "heading": "Learn these numbers вҖ” clients will test you", "body": "Buy prices are gross floor area, per square meter. Rents are for a condo with normal shared facilities (pool, gym, lobby) вҖ” the standard for the newer buildings PHC recommends.", "table": {"headers": ["District", "Buy $/sqm", "1BR rent", "2BR rent", "3BR rent"], "rows": [["BKK1", "$2,000", "$800", "$1,450", "$2,550"], ["Tonle Bassac", "$2,500", "$600", "$1,000", "$1,550"], ["Daun Penh", "$2,000", "$500", "$900", "$1,500"], ["Chroy Changvar", "$1,700", "$450", "$900", "$1,800"], ["Toul Kork", "$1,450", "$500", "$900", "$1,500"], ["Toul Tompoung", "$1,200", "$450", "$800", "$1,300"], ["BKK3", "$1,600", "$550", "$900", "$1,200"], ["Sen Sok", "$1,100", "$400", "$650", "$950"]]}}, {"label": "Capital Gains Tax (CGT)", "heading": "The tax a client pays when they sell вҖ” worked example", "body": "CGT is a tax on profit, not on the full sale price. Many clients confuse the two вҖ” this mistake makes them think the tax is much bigger than it really is. Clear this up early, with real numbers.", "analogy": "Think of CGT like paying tax on your salary, not on the whole company's revenue. You are only taxed on what you actually gained вҖ” the sale price, minus what you originally paid and your documented costs.", "calc": {"title": "Example: bought for $100,000, sold for $200,000, $40,000 in documented costs", "rows": [{"label": "Sale price", "value": "$200,000"}, {"label": "Minus: original purchase price", "value": "вҲ’$100,000"}, {"label": "Minus: documented costs", "value": "вҲ’$40,000"}, {"label": "Taxable gain", "value": "$60,000"}, {"label": "CGT owed (20% of taxable gain)", "value": "$12,000", "total": true}]}, "rules": [{"title": "Always show the taxable gain, not the full sale price", "detail": "A client who thinks CGT applies to the full $200,000 will panic. Once they see it only applies to the $60,000 gain, the number feels manageable.", "action": "Walk through the calculation out loud with the client's own numbers, every time CGT comes up."}]}],roleplay:{"scenario": "Explaining CGT to a first-time investor", "instructions": "Practice being calm and specific with numbers вҖ” not vague reassurance.", "lines": [{"role": "client", "text": "\"I heard there's a new tax on property in Cambodia. Is that true?\""}, {"role": "agent", "text": "\"Yes вҖ” Capital Gains Tax started in January 2026. It applies to the profit you make when you sell, not the full sale price. The rate is 20% of that profit.\""}, {"role": "client", "text": "\"So buying now is a bad idea?\""}, {"role": "agent", "text": "\"Not at all вҖ” it just means the strategy shifts. For example: buy at $100K, sell later at $200K, with $40K in documented costs. Your taxable gain is $60K, so the tax is $12,000. Your final profit is still $48,000. Short-term flipping is what CGT really discourages вҖ” not long-term holding for rental income.\""}, {"role": "note", "text": "Debrief: Did the agent use real numbers instead of vague reassurance? Did they distinguish long-term holding from quick flipping?"}], "debrief": "Never say \"don't worry about CGT.\" Always say \"here's the calculation.\" Numbers build trust; reassurance without numbers does not."},quiz:[{"q": "According to REAKH data, what is the average price per sqm in BKK1?", "opts": ["$1,200", "$1,800 вҖ” Phnom Penh's citywide average", "$2,000", "$2,800"], "correct": 2, "explain": "BKK1 averages $2,000/sqm gross вҖ” this is REAKH's tracked figure across all project tiers in the district."}, {"q": "How much did transaction volume grow in 2025?", "opts": ["Fell 10%", "Grew 5%", "Grew 25%", "Stayed flat"], "correct": 2, "explain": "Transaction volume grew 25% in 2025. This is the single most useful market-momentum number to know."}, {"q": "CGT is a tax on:", "opts": ["The full sale price", "The seller's total profit (gain), after subtracting the purchase price and documented costs", "A flat $10,000 fee", "Only foreign sellers"], "correct": 1, "explain": "CGT taxes the gain only вҖ” sale price minus original price minus documented costs. Never let a client think it applies to the full sale amount."}, {"q": "A unit was bought for $100K and sold for $200K with $40K in documented costs. What is the CGT owed?", "opts": ["$40,000", "$20,000", "$12,000", "$8,000"], "correct": 2, "explain": "Taxable gain = $200K вҲ’ $100K вҲ’ $40K = $60K. CGT = 20% of $60K = $12,000."}],reflection:"Explain the difference between gross yield and net yield to a client who has never invested in property before. Then explain how CGT changes their profit when they sell.",km:{"title":"бһ‘бһёбһ•бҹ’бһҹбһ¶бһҡбһўбһ…бһӣбһ“бһ‘бҹ’бһҡбһ–бҹ’бһҷбһ“бҹ…бһҡбһ¶бһҮбһ’бһ¶бһ“бһёбһ—бҹ’бһ“бҹҶбһ–бҹҒбһү","short":"бһ‘бһёбһ•бҹ’бһҹбһ¶бһҡбһ—бҹ’бһ“бҹҶбһ–бҹҒбһү","objectives":["бһҷбһӣбҹӢбһҠбһ№бһ„бһ–бһёбһҹбҹ’бһҗбһ¶бһ“бһ—бһ¶бһ–бһ”бһ…бҹ’бһ…бһ»бһ”бҹ’бһ”бһ“бҹ’бһ“бһ“бҹғбһ‘бһёбһ•бҹ’бһҹбһ¶бһҡбһҒбһ»бһ“бһҠбһјбһ“бҹ…бһҡбһ¶бһҮбһ’бһ¶бһ“бһёб
