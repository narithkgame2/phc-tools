<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PHC · Agent Training</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════════
   TOKENS
══════════════════════════════════════════════════════════════ */
:root {
  /* SF Pro — Apple system font stack */
  --sf: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
  --sf-mono: "SF Mono", "SFMono-Regular", ui-monospace, "Courier New", monospace;

  --navy:       #06264f;
  --navy-d:     #040f24;
  --navy-md:    #0b3d7a;
  --navy-glass: rgba(6,38,79,0.85);
  --gold:       #c9993f;
  --gold-lt:    #e0b86a;
  --gold-dim:   #a07a2e;
  --gold-soft:  rgba(201,153,63,0.10);
  --gold-border:rgba(201,153,63,0.22);
  --ok:         #1a7a4a;
  --ok-soft:    rgba(26,122,74,0.08);
  --ok-border:  rgba(26,122,74,0.22);
  --err:        #b83030;
  --err-soft:   rgba(184,48,48,0.08);
  --err-border: rgba(184,48,48,0.20);
  --ink:        #0c1b2e;
  --ink-2:      #374f66;
  --ink-3:      #7490a8;
  --line:       rgba(6,38,79,0.09);
  --line-md:    rgba(6,38,79,0.16);
  --bg:         #ffffff;
  --bg-2:       #f6f8fb;
  --bg-3:       #edf0f5;
  --r:          10px;
  --r-lg:       16px;
  --transition: .2s cubic-bezier(.4,0,.2,1);

  /* SF Pro system font — used everywhere on mobile, falls back to Inter on desktop */
  --sf: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "Inter", sans-serif;
  --sf-mono: "SF Mono", "SFMono-Regular", ui-monospace, "JetBrains Mono", "Courier New", monospace;

  /* week accent palette */
  --w1: #0B4F8A; --w1-s: rgba(11,79,138,.08);
  --w2: #1A6B3A; --w2-s: rgba(26,107,58,.08);
  --w3: #7B3F00; --w3-s: rgba(123,63,0,.08);
  --w4: #5B2D8E; --w4-s: rgba(91,45,142,.08);
}

/* ══════════════════════════════════════════════════════════════
   RESET & BASE
══════════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{
  font-family:var(--sf);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  background:#e8ecf3;
  color:var(--ink);
  min-height:100%;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:16px 16px 16px;
}
img{display:block;max-width:100%}
button{font-family:inherit;cursor:pointer}
a{color:inherit;text-decoration:none}

/* ══════════════════════════════════════════════════════════════
   APP SHELL
══════════════════════════════════════════════════════════════ */
#app{
  width:100%;
  max-width:1080px;
  background:var(--bg);
  border-radius:20px;
  box-shadow:0 12px 60px rgba(6,38,79,0.18), 0 2px 8px rgba(6,38,79,0.08);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  min-height:calc(100vh - 32px);
  border:1px solid var(--line-md);
}

/* ══════════════════════════════════════════════════════════════
   TOPBAR
══════════════════════════════════════════════════════════════ */
.topbar{
  background:var(--navy-d);
  height:56px;
  padding:0 20px;
  display:flex;
  align-items:center;
  gap:14px;
  flex-shrink:0;
  position:relative;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.topbar::after{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;
  height:1px;
  background:linear-gradient(90deg,var(--gold) 0%, rgba(201,153,63,.3) 40%, transparent 70%);
}
.tb-mark{
  height:34px;
  width:34px;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.tb-mark .phc-logo-img{height:34px;width:34px;}
.tb-wordmark{
  font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  font-size:13px;
  font-weight:600;
  letter-spacing:-0.01em;
  color:rgba(255,255,255,0.6);
  flex-shrink:0;
}
.tb-sep{width:1px;height:18px;background:rgba(255,255,255,0.08);flex-shrink:0}
.tb-ctx{
  font-size:12.5px;
  color:rgba(255,255,255,0.65);
  flex:1;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.tb-prog{
  display:flex;
  align-items:center;
  gap:10px;
  flex-shrink:0;
}
.tb-track{
  width:88px;height:2px;
  background:rgba(255,255,255,0.08);
  border-radius:2px;
  overflow:hidden;
}
.tb-fill{
  height:100%;
  background:linear-gradient(90deg,var(--gold-dim),var(--gold-lt));
  border-radius:2px;
  transition:width .6s cubic-bezier(.4,0,.2,1);
}
.tb-label{
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px;
  color:rgba(255,255,255,0.35);
  white-space:nowrap;
}

/* ══════════════════════════════════════════════════════════════
   LAYOUT BODY
══════════════════════════════════════════════════════════════ */
.layout{display:flex;flex:1;min-height:0;overflow:hidden}

/* ══════════════════════════════════════════════════════════════
   SIDEBAR (desktop)
══════════════════════════════════════════════════════════════ */
.sidebar{
  width:228px;
  flex-shrink:0;
  background:var(--bg-2);
  border-right:1px solid var(--line);
  overflow-y:auto;
  padding:8px 0 24px;
  scrollbar-width:thin;
  scrollbar-color:var(--line-md) transparent;
}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--line-md);border-radius:2px}

.sb-week{
  padding:16px 16px 3px;
  display:flex;align-items:center;gap:7px;
}
.sb-week-pip{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sb-week-txt{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;
  font-weight:500;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--ink-3);
}
.sb-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 14px 8px 16px;
  cursor:pointer;
  border-left:2px solid transparent;
  transition:background var(--transition), border-color var(--transition);
  position:relative;
  min-height:40px;
}
.sb-row:hover{background:rgba(6,38,79,0.04)}
.sb-row.active{background:var(--gold-soft);border-left-color:var(--gold)}
.sb-row.done{opacity:0.62}
.sb-badge{
  width:22px;height:22px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:9.5px;
  flex-shrink:0;
  border:1px solid var(--line-md);
  background:var(--bg-3);
  color:var(--ink-3);
  font-family:'JetBrains Mono',monospace;
  transition:all .2s;
}
.sb-row.active .sb-badge{background:var(--gold);border-color:var(--gold);color:#fff}
.sb-row.done .sb-badge{background:var(--ok);border-color:var(--ok);color:#fff;font-size:10px}
.sb-title{font-size:11.5px;color:var(--ink-2);line-height:1.35;flex:1}
.sb-row.active .sb-title{color:var(--ink);font-weight:500}

/* ══════════════════════════════════════════════════════════════
   MAIN PANEL
══════════════════════════════════════════════════════════════ */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}

/* ═── Lesson chrome ──═ */
.lesson-chrome{
  padding:16px 24px 14px;
  border-bottom:1px solid var(--line);
  flex-shrink:0;
  background:var(--bg);
}
.lc-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.lc-week-tag{
  padding:3px 9px;
  border-radius:4px;
  font-family:'JetBrains Mono',monospace;
  font-size:9px;
  font-weight:500;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:#fff;
  flex-shrink:0;
}
.lc-title{
  font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  font-size:17px;
  font-weight:600;
  color:var(--ink);
  flex:1;
  line-height:1.25;
  letter-spacing:-0.025em;
}
.lc-counter{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:var(--ink-3);
  flex-shrink:0;
}
/* step pips */
.pips{display:flex;gap:3px}
.pip{
  flex:1;height:2px;border-radius:2px;
  background:var(--bg-3);
  transition:background .3s, opacity .25s;
}
.pip.done{background:var(--gold)}
.pip.active{background:var(--gold);opacity:.45}

/* ═── Scroll content ──═ */
.scroll{
  flex:1;overflow-y:auto;
  padding:28px 28px 24px;
  scrollbar-width:thin;
  scrollbar-color:var(--line-md) transparent;
}
.scroll::-webkit-scrollbar{width:4px}
.scroll::-webkit-scrollbar-thumb{background:var(--line-md);border-radius:3px}

/* ═── Footer bar ──═ */
.footbar{
  padding:12px 24px;
  border-top:1px solid var(--line);
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;
  background:var(--bg);
}
.footbar-hint{margin-left:auto;font-size:11.5px;color:var(--ink-3)}

/* ══════════════════════════════════════════════════════════════
   BUTTONS
══════════════════════════════════════════════════════════════ */
.btn{
  padding:9px 18px;
  border-radius:8px;
  font-size:13px;
  font-weight:500;
  border:1px solid var(--line-md);
  background:var(--bg);
  color:var(--ink-2);
  transition:all var(--transition);
  white-space:nowrap;
  letter-spacing:0.01em;
}
.btn:hover{background:var(--bg-2);color:var(--ink);border-color:var(--line-md)}
.btn.primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn.primary:hover{background:var(--navy-md);border-color:var(--navy-md)}
.btn.cta{background:var(--gold);color:#fff;border-color:var(--gold)}
.btn.cta:hover{background:var(--gold-lt);border-color:var(--gold-lt)}
.btn:disabled{opacity:.32;pointer-events:none}

/* ══════════════════════════════════════════════════════════════
   ANIMATION
══════════════════════════════════════════════════════════════ */
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.rise{animation:rise .28s cubic-bezier(.4,0,.2,1)}

/* ══════════════════════════════════════════════════════════════
   CONTENT ATOMS
══════════════════════════════════════════════════════════════ */
.eyebrow{
  font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  font-size:10px;
  font-weight:600;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--gold-dim);
  margin-bottom:6px;
}
.heading{
  font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  font-size:24px;
  font-weight:700;
  color:var(--ink);
  line-height:1.2;
  letter-spacing:-0.03em;
  margin-bottom:14px;
}
.body-text{
  font-family:var(--sf);
  font-size:14px;
  font-weight:400;
  color:var(--ink-2);
  line-height:1.75;
  margin-bottom:16px;
}
.body-text p{margin-bottom:8px}
.body-text strong{color:var(--ink);font-weight:600}

/* ── Objectives block ── */
.obj-card{
  background:var(--navy-d);
  border-radius:var(--r-lg);
  padding:20px 22px;
  margin-bottom:22px;
  position:relative;
  overflow:hidden;
}
.obj-card::before{
  content:'';position:absolute;
  top:0;left:0;width:100%;height:2px;
  background:linear-gradient(90deg,var(--gold),transparent 70%);
}
.obj-eyebrow{
  font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  font-size:10px;font-weight:600;
  letter-spacing:0.08em;text-transform:uppercase;
  color:var(--gold);margin-bottom:10px;
}
.obj-row{
  display:flex;align-items:flex-start;gap:10px;
  padding:5px 0;
  font-size:13.5px;
  color:rgba(255,255,255,0.80);
  line-height:1.6;
}
.obj-arrow{color:var(--gold);flex-shrink:0;margin-top:2px;font-size:11px}
.obj-row:not(:last-child){border-bottom:1px solid rgba(255,255,255,0.05)}

/* ── Info box ── */
.info-box{
  border-left:2px solid var(--gold);
  background:var(--gold-soft);
  padding:14px 18px;
  border-radius:0 var(--r) var(--r) 0;
  margin:14px 0;
  font-size:13.5px;
  color:var(--ink);
  line-height:1.72;
}
.info-box .ib-label{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;font-weight:500;
  letter-spacing:0.12em;text-transform:uppercase;
  color:var(--gold-dim);margin-bottom:7px;
}

/* ── Warning box ── */
.warn-box{
  border-left:2px solid var(--err);
  background:var(--err-soft);
  padding:14px 18px;
  border-radius:0 var(--r) var(--r) 0;
  margin:14px 0;
  font-size:13.5px;
  color:#8b1e1e;
  line-height:1.72;
}
.warn-box::before{content:'⚠ ';font-size:12px;opacity:.7}

/* ── Grid cards ── */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
.ig{
  background:var(--bg-2);
  border:1px solid var(--line);
  border-radius:var(--r);
  padding:12px 14px;
  transition:border-color var(--transition);
}
.ig:hover{border-color:var(--line-md)}
.ig-lbl{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;color:var(--ink-3);
  text-transform:uppercase;letter-spacing:0.1em;
  margin-bottom:4px;
}
.ig-val{font-size:13px;font-weight:500;color:var(--ink);line-height:1.5}

/* ── Numbered rules ── */
.rules{margin:14px 0}
.rule{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--line)}
.rule:last-child{border-bottom:none}
.rule-n{
  width:28px;height:28px;border-radius:50%;
  background:var(--navy);color:var(--gold);
  font-family:'JetBrains Mono',monospace;font-size:11px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;
}
.rule-title{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:4px}
.rule-detail{font-size:13px;color:var(--ink-2);line-height:1.65}

/* ── PHC Logo image — blend mode removes black background ── */
.phc-logo-img{
  display:block;
  object-fit:contain;
  flex-shrink:0;
}
/* Dark backgrounds (topbar navy, hero navy): screen blends out black → gold shows */
.phc-logo-dark{
  mix-blend-mode:screen;
}
/* Light/white backgrounds (certificate): multiply blends out black → gold shows */
.phc-logo-cert{
  mix-blend-mode:multiply;
}

/* ── Table outer wrapper with scroll hint ── */
.tbl-outer{position:relative}
.tbl-scroll-hint{
  display:none; /* shown only on mobile via media query */
}
/* ── Table ── */
.tbl-wrap{overflow-x:auto;margin:14px 0;border-radius:var(--r);border:1px solid var(--line);background:var(--bg)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--navy)}
th{
  padding:10px 14px;text-align:left;
  font-family:'JetBrains Mono',monospace;
  font-size:9px;font-weight:500;
  letter-spacing:0.08em;text-transform:uppercase;
  color:rgba(255,255,255,0.55);white-space:nowrap;
}
td{padding:10px 14px;border-bottom:1px solid var(--line);color:var(--ink);vertical-align:top;line-height:1.5}
tr:nth-child(even) td{background:var(--bg-2)}
tr:last-child td{border-bottom:none}

/* ══════════════════════════════════════════════════════════════
   ROLEPLAY
══════════════════════════════════════════════════════════════ */
.rp-trigger{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;
  border-radius:var(--r);
  border:1px solid var(--line-md);
  background:var(--bg-2);
  cursor:pointer;
  transition:all var(--transition);
  user-select:none;
}
.rp-trigger:hover{border-color:var(--navy);background:rgba(6,38,79,.03)}
.rp-trigger-icon{
  width:32px;height:32px;
  border-radius:8px;
  background:var(--navy);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.rp-trigger-icon svg{width:14px;height:14px;fill:#fff;margin-left:2px}
.rp-trigger-inner{flex:1}
.rp-trigger-eyebrow{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;color:var(--gold-dim);
  text-transform:uppercase;letter-spacing:0.1em;margin-bottom:2px;
}
.rp-trigger-title{font-size:13px;font-weight:500;color:var(--ink)}
.rp-chevron{font-size:11px;color:var(--ink-3);transition:transform .2s;flex-shrink:0}
.rp-chevron.open{transform:rotate(180deg)}

.rp-panel{
  display:none;margin-top:6px;
  border:1px solid var(--line);border-radius:var(--r);
  background:var(--bg);overflow:hidden;
}
.rp-panel.open{display:block;animation:rise .22s ease}
.rp-panel-inner{padding:20px 20px 16px}
.rp-inst{
  font-size:12px;color:var(--ink-3);font-style:italic;
  margin-bottom:16px;padding-bottom:14px;
  border-bottom:1px solid var(--line);line-height:1.65;
}

/* ── Roleplay lines: grid layout for perfect alignment ── */
.rp-lines{display:flex;flex-direction:column;gap:0}

/* Each line: tag column (fixed 62px) + text column (flex) */
.rp-line{
  display:grid;
  grid-template-columns:62px 1fr;
  gap:0 12px;
  padding:9px 0;
  border-bottom:1px solid var(--line);
  align-items:start;
}
.rp-line:last-child{border-bottom:none}

/* Agent lines — subtle navy tint background */
.rp-line.rp-agent{background:rgba(6,38,79,.025);margin:0 -20px;padding:9px 20px}

/* Client lines — subtle green tint */
.rp-line.rp-client{background:rgba(26,107,64,.025);margin:0 -20px;padding:9px 20px}

/* Note lines — no tint, muted */
.rp-line.rp-note{padding:7px 0}
.rp-line.rp-note.rp-agent,.rp-line.rp-note.rp-client{background:none;margin:0;padding:7px 0}

.rp-tag{
  font-family:'JetBrains Mono',monospace;
  font-size:8px;font-weight:600;
  letter-spacing:0.09em;text-transform:uppercase;
  padding:3px 7px;border-radius:4px;
  display:inline-flex;align-items:center;justify-content:center;
  margin-top:2px;
  width:52px; /* fixed width — all tags same size */
  white-space:nowrap;
}
.rp-tag.agent{background:rgba(6,38,79,.10);color:var(--navy)}
.rp-tag.client{background:rgba(26,107,64,.12);color:var(--ok)}
.rp-tag.note{
  background:transparent;color:var(--ink-3);
  font-style:italic;font-weight:400;
  letter-spacing:0.06em;border:1px solid var(--line-md);
}
.rp-text{
  font-size:13.5px;color:var(--ink);line-height:1.7;
  padding-top:1px;
}
.rp-line.rp-note .rp-text{
  font-size:12px;color:var(--ink-3);font-style:italic;line-height:1.6;
}

.rp-debrief{
  margin-top:16px;padding:13px 16px;
  border-radius:8px;
  background:var(--gold-soft);border-left:2px solid var(--gold);
  font-size:13px;color:var(--ink);line-height:1.65;
}
.rp-debrief strong{color:var(--navy);font-weight:600}

/* ══════════════════════════════════════════════════════════════
   QUIZ
══════════════════════════════════════════════════════════════ */
.quiz-meta{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 14px;
  background:var(--bg-2);border:1px solid var(--line);
  border-radius:var(--r);margin-bottom:20px;
  font-size:13px;color:var(--ink-2);
}
.quiz-meta-score{
  font-family:'JetBrains Mono',monospace;
  font-size:12px;color:var(--ink-3);
}
.q-block{padding:22px 0;border-bottom:1px solid var(--line)}
.q-block:last-child{border-bottom:none;padding-bottom:0}
.q-num{
  font-family:'JetBrains Mono',monospace;
  font-size:9.5px;font-weight:500;
  color:var(--gold-dim);text-transform:uppercase;
  letter-spacing:0.12em;margin-bottom:8px;
}
.q-text{
  font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  font-size:17px;font-weight:600;
  letter-spacing:-0.025em;
  color:var(--ink);margin-bottom:14px;line-height:1.4;
}
.q-opts{display:flex;flex-direction:column;gap:7px}
.q-opt{
  display:flex;align-items:flex-start;gap:12px;
  padding:11px 14px;border-radius:var(--r);
  border:1px solid var(--line);cursor:pointer;
  background:var(--bg);transition:all var(--transition);
}
.q-opt:hover:not(.locked){border-color:var(--gold-border);background:var(--gold-soft)}
.q-opt.locked{cursor:default}
.q-opt.selected{border-color:var(--navy-md);background:rgba(6,38,79,0.06)}
.q-opt.selected .opt-ltr{background:var(--navy);border-color:var(--navy);color:#fff}
.opt-ltr{
  width:28px;height:28px;border-radius:50%;
  background:var(--bg-3);border:1px solid var(--line-md);
  color:var(--ink-3);font-family:'JetBrains Mono',monospace;
  font-size:11px;font-weight:500;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s;
}
.opt-text{font-size:13.5px;color:var(--ink);line-height:1.55;padding-top:4px}
.q-opt.correct{border-color:var(--ok-border);background:var(--ok-soft)}
.q-opt.correct .opt-ltr{background:var(--ok);border-color:var(--ok);color:#fff}
.q-opt.wrong{border-color:var(--err-border);background:var(--err-soft)}
.q-opt.wrong .opt-ltr{background:var(--err);border-color:var(--err);color:#fff}
.q-opt.reveal{border-color:var(--ok-border);background:var(--ok-soft);opacity:.55}
.q-opt.reveal .opt-ltr{background:var(--ok);border-color:var(--ok);color:#fff}

.q-feedback{
  display:none;margin-top:12px;padding:12px 14px;
  border-radius:8px;font-size:13px;line-height:1.65;
}
.q-feedback.correct{background:var(--ok-soft);border:1px solid var(--ok-border)}
.q-feedback.wrong{background:var(--err-soft);border:1px solid var(--err-border)}
.fb-head{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;font-weight:500;
  letter-spacing:0.1em;text-transform:uppercase;
  margin-bottom:4px;
}
.q-feedback.correct .fb-head{color:var(--ok)}
.q-feedback.wrong .fb-head{color:var(--err)}
.fb-body{color:var(--ink);font-size:13px;margin-top:3px}

.quiz-actions{margin-top:22px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.quiz-hint{font-size:12px;color:var(--ink-3)}
.quiz-pass-gate{
  width:100%;display:flex;align-items:flex-start;gap:9px;
  padding:12px 16px;border-radius:var(--r);
  background:var(--err-soft);border:1px solid var(--err-border);
  font-size:13px;color:var(--ink-2);line-height:1.55;
}
.quiz-pass-gate strong{color:var(--err)}

/* ══════════════════════════════════════════════════════════════
   COMPLETE
══════════════════════════════════════════════════════════════ */
.complete{
  display:flex;flex-direction:column;align-items:center;
  text-align:center;padding:36px 24px;gap:18px;
}
.complete-checkmark{
  width:64px;height:64px;border-radius:50%;
  background:var(--navy-d);
  border:2px solid var(--gold-border);
  display:flex;align-items:center;justify-content:center;
}
.complete-checkmark svg{width:26px;height:26px;stroke:var(--gold);stroke-width:2.5;fill:none}
.complete-h{
  font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  font-size:27px;font-weight:700;
  color:var(--ink);letter-spacing:-0.04em;
}
.complete-sub{font-size:14px;color:var(--ink-2);max-width:400px;line-height:1.7}
.score-pills{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.s-pill{
  padding:5px 18px;border-radius:20px;
  font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:500;
  border:1px solid;
}
.s-pill.good{background:var(--ok-soft);color:var(--ok);border-color:var(--ok-border)}
.s-pill.ok{background:var(--gold-soft);color:var(--gold-dim);border-color:var(--gold-border)}
.s-pill.mid{background:var(--err-soft);color:var(--err);border-color:var(--err-border)}

.reflect-card{
  background:var(--navy-d);border-radius:var(--r-lg);
  padding:22px 24px;width:100%;max-width:480px;text-align:left;
  position:relative;overflow:hidden;
}
.reflect-card::after{
  content:'"';
  position:absolute;top:-14px;right:18px;
  font-family:var(--sf);
  font-size:130px;color:rgba(201,153,63,.07);
  font-weight:900;
  line-height:1;pointer-events:none;
}
.reflect-eyebrow{
  font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  font-size:10px;font-weight:600;
  letter-spacing:0.06em;text-transform:uppercase;
  color:var(--gold);margin-bottom:10px;
}
.reflect-q{
  font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  font-size:16px;color:rgba(255,255,255,.85);
  font-weight:400;
  line-height:1.6;font-style:italic;
  letter-spacing:-0.01em;
}

.next-card{
  background:var(--bg-2);border:1px solid var(--line);
  border-radius:var(--r-lg);padding:16px 20px;
  text-align:left;width:100%;max-width:400px;
  cursor:pointer;transition:border-color var(--transition), box-shadow var(--transition);
}
.next-card:hover{border-color:var(--line-md);box-shadow:0 4px 16px rgba(6,38,79,.08)}
.next-card-eyebrow{
  font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  font-size:10px;font-weight:600;color:var(--ink-3);
  text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px;
}
.next-card-title{font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-size:15px;font-weight:600;letter-spacing:-0.02em;color:var(--ink);line-height:1.35}

/* ══════════════════════════════════════════════════════════════
   LANDING
══════════════════════════════════════════════════════════════ */
.landing{padding:28px;display:flex;flex-direction:column;gap:22px}

/* Hero */
.hero{
  background:var(--navy-d);border-radius:var(--r-lg);
  padding:32px 36px;position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;
  top:-80px;right:-80px;
  width:320px;height:320px;border-radius:50%;
  background:radial-gradient(circle,rgba(201,153,63,.09) 0%,transparent 70%);
  pointer-events:none;
}
.hero::after{
  content:'';position:absolute;
  bottom:-100px;left:10%;
  width:240px;height:240px;border-radius:50%;
  background:radial-gradient(circle,rgba(11,61,122,.4) 0%,transparent 70%);
  pointer-events:none;
}
.hero-brand-row{
  display:flex;align-items:center;gap:10px;
  margin-bottom:16px;position:relative;
}
.hero-mark{
  height:52px;
  width:52px;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.hero-mark .phc-logo-img{height:52px;width:52px;}
.hero-brand-name{
  font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  font-size:11px;font-weight:600;
  letter-spacing:0.08em;text-transform:uppercase;
  color:rgba(255,255,255,.45);
}
.hero-h{
  font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  font-size:34px;font-weight:700;
  color:#fff;letter-spacing:-0.03em;
  line-height:1.1;margin-bottom:6px;
  position:relative;
}
.hero-sub{
  font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  font-size:15px;font-weight:400;
  color:rgba(255,255,255,.50);
  line-height:1.5;
  letter-spacing:-0.01em;
  margin-bottom:24px;position:relative;
}
.hero-stats{
  display:grid;grid-template-columns:repeat(4,1fr);gap:16px;
  padding-top:20px;border-top:1px solid rgba(255,255,255,.07);
  position:relative;
}
.hs{text-align:left}
.hs-n{
  font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  font-size:28px;font-weight:700;
  color:var(--gold);line-height:1;margin-bottom:3px;
  letter-spacing:-0.03em;
}
.hs-l{font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-size:10px;font-weight:500;color:rgba(255,255,255,.38);text-transform:uppercase;letter-spacing:0.05em}

/* Overall progress */
.prog-row{
  display:flex;align-items:center;gap:14px;
  padding:14px 18px;
  background:var(--bg-2);border:1px solid var(--line);
  border-radius:var(--r);
}
.prog-row-label{font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-size:14px;font-weight:500;letter-spacing:-0.01em;color:var(--ink);flex-shrink:0}
.prog-track{
  flex:1;height:5px;background:var(--bg-3);
  border-radius:4px;overflow:hidden;
}
.prog-fill{
  height:100%;
  background:linear-gradient(90deg,var(--navy) 0%,var(--gold) 100%);
  border-radius:4px;
  transition:width .6s cubic-bezier(.4,0,.2,1);
}
.prog-pct{
  font-family:var(--sf-mono),ui-monospace,'SFMono-Regular',monospace;
  font-size:12px;font-weight:500;color:var(--ink-3);flex-shrink:0;
}

/* CTA */
.landing-cta{display:flex;justify-content:center}

/* Week grid */
.week-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.wk{
  border-radius:var(--r-lg);padding:18px 20px;
  cursor:pointer;border:1px solid;
  transition:transform var(--transition), box-shadow var(--transition);
  position:relative;overflow:hidden;
}
.wk:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.1)}
.wk-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.wk-label{
  font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.06em;
}
.wk-count{font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-size:11px;font-weight:500;opacity:.55}
.wk-title{
  font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  font-size:16px;font-weight:700;
  letter-spacing:-0.025em;
  margin-bottom:4px;
}
.wk-desc{font-family:var(--sf),-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-size:12px;font-weight:400;letter-spacing:-0.005em;opacity:.65;line-height:1.5}
.wk-bar{
  position:absolute;bottom:0;left:0;height:2px;
  background:currentColor;opacity:.3;
  transition:width .5s ease;
}

/* ── Landing footer (reset + version) ── */
.landing-footer{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:20px 28px 8px;
  gap:12px;
}
.reset-btn{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  font-weight:500;
  letter-spacing:0.04em;
  color:var(--ink-3);
  background:none;
  border:none;
  cursor:pointer;
  padding:6px 0;
  text-decoration:underline;
  text-underline-offset:3px;
  transition:color var(--transition);
}
.reset-btn:hover{color:var(--err)}
.landing-version{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  color:var(--ink-3);
  letter-spacing:0.04em;
  opacity:0.6;
}

/* ══════════════════════════════════════════════════════════════
   MOBILE NAV (hidden by default)
══════════════════════════════════════════════════════════════ */
.mob-nav{display:none}

/* ══════════════════════════════════════════════════════════════
   MOBILE — APPLE SF PRO STYLE
   Reference: iOS / Apple HIG / apple.com
   Font: SF Pro system stack, -apple-system
   Layout: generous whitespace, large touch targets (≥44px),
           rounded cards, clean hierarchy, max legibility
══════════════════════════════════════════════════════════════ */
@media(max-width:700px){

  /* ── SF Pro on everything — one clean rule, no overrides needed ──
     --sf already has Inter as fallback so this works on all platforms */
  body *{
    font-family:var(--sf);
    -webkit-font-smoothing:antialiased;
  }
  /* Monospace elements: step counter, week count, progress label */
  .lc-counter,.tb-label,.wk-count,.prog-pct,
  .quiz-meta-score,.lc-week-tag{
    font-family:var(--sf-mono);
  }

  /* ── Base ── */
  body{
    padding:0;
    background:#f2f2f7; /* iOS systemGroupedBackground */
    font-family:var(--sf);
    -webkit-font-smoothing:antialiased;
  }
  #app{
    border-radius:0;
    min-height:100dvh;
    border:none;
    box-shadow:none;
    background:var(--bg);
  }
  .sidebar{display:none}
  .layout{flex-direction:column}
  .main{padding-bottom:calc(68px + env(safe-area-inset-bottom, 0px))}

  /* ── Topbar — iOS Navigation Bar style ── */
  .topbar{
    padding:0 14px;
    height:48px;
    background:rgba(255,255,255,0.85);
    -webkit-backdrop-filter:saturate(180%) blur(20px);
    backdrop-filter:saturate(180%) blur(20px);
    border-bottom:0.5px solid rgba(60,60,67,0.2);
    gap:10px;
  }
  /* On mobile: hide the long wordmark + separator — too wide */
  .tb-wordmark{display:none}
  .tb-sep{display:none}
  /* Mark stays as small logo */
  .tb-mark{height:30px;width:30px;flex-shrink:0}
  .tb-mark .phc-logo-img{height:30px;width:30px}
  /* Context = lesson title, truncated, fills remaining space */
  .tb-ctx{
    font-family:var(--sf);
    font-size:13px;
    font-weight:600;
    letter-spacing:-0.02em;
    color:rgba(255,255,255,0.88);
    flex:1;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    min-width:0;
  }
  /* Progress stays compact on the right */
  .tb-prog{gap:7px;flex-shrink:0}
  .tb-track{width:48px;height:3px;border-radius:2px}
  .tb-label{
    font-family:var(--sf-mono);
    font-size:10px;
    font-weight:500;
    letter-spacing:0;
    color:rgba(255,255,255,0.5);
    white-space:nowrap;
  }

  /* ── Landing ── */
  .landing{
    padding:0 0 32px;
    gap:0;
    background:#f2f2f7;
  }

  /* Hero — full bleed */
  .hero{
    padding:28px 20px 24px;
    border-radius:0;
    margin-bottom:0;
  }
  .hero::before,.hero::after{display:none}
  .hero-brand-row{margin-bottom:12px}
  .hero-mark{height:44px;width:44px}
  .hero-mark .phc-logo-img{height:44px;width:44px}
  .hero-brand-name{
    font-family:var(--sf);
    font-size:11px;
    font-weight:500;
    letter-spacing:0.02em;
    color:rgba(255,255,255,0.5);
  }
  .hero-h{
    font-family:var(--sf);
    font-size:26px;
    font-weight:700;
    letter-spacing:-0.03em;
    line-height:1.1;
    margin-bottom:6px;
  }
  .hero-sub{
    font-family:var(--sf);
    font-size:14px;
    font-weight:400;
    letter-spacing:-0.01em;
    color:rgba(255,255,255,0.5);
    margin-bottom:20px;
  }
  .hero-stats{
    grid-template-columns:repeat(4,1fr);
    gap:0;
    padding-top:16px;
    border-top:0.5px solid rgba(255,255,255,0.12);
  }
  .hs{text-align:center;padding:0 4px}
  .hs-n{
    font-family:var(--sf);
    font-size:22px;
    font-weight:700;
    letter-spacing:-0.03em;
    color:var(--gold);
    margin-bottom:2px;
  }
  .hs-l{
    font-family:var(--sf);
    font-size:10px;
    font-weight:400;
    letter-spacing:0.01em;
    color:rgba(255,255,255,0.4);
  }

  /* Progress row — iOS grouped card style */
  .prog-row{
    margin:16px 16px 0;
    padding:14px 16px;
    border-radius:12px;
    background:#fff;
    box-shadow:0 1px 0 rgba(0,0,0,0.04), 0 0 0 0.5px rgba(60,60,67,0.1);
    gap:12px;
  }
  .prog-row-label{
    font-family:var(--sf);
    font-size:14px;
    font-weight:500;
    letter-spacing:-0.01em;
    color:var(--ink);
    white-space:nowrap;
  }
  .prog-track{height:4px;border-radius:4px}
  .prog-pct{
    font-family:var(--sf-mono);
    font-size:12px;
    font-weight:500;
    color:var(--ink-3);
    white-space:nowrap;
  }

  /* CTA */
  .landing-cta{padding:12px 16px 0}
  .landing-cta .btn,
  .landing-cta button{
    width:100%;
    height:50px;
    border-radius:14px;
    font-family:var(--sf);
    font-size:16px;
    font-weight:600;
    letter-spacing:-0.01em;
    justify-content:center;
    display:flex;align-items:center;
  }

  /* Week cards — iOS grouped list style */
  .week-grid{
    grid-template-columns:1fr;
    gap:0;
    margin:16px 0 0;
    padding:0 16px;
  }
  .wk{
    border-radius:0;
    border:none;
    border-bottom:0.5px solid rgba(60,60,67,0.15);
    padding:14px 0 14px 4px;
    background:#fff;
    box-shadow:none;
  }
  .wk:first-child{border-radius:12px 12px 0 0;padding-top:16px}
  .wk:last-child{border-radius:0 0 12px 12px;border-bottom:none;padding-bottom:16px}
  .wk:hover{transform:none;box-shadow:none}
  .wk:active{background:#f2f2f7}
  .wk-header{margin-bottom:4px}
  .wk-label{
    font-family:var(--sf);
    font-size:11px;
    font-weight:600;
    letter-spacing:0.04em;
    text-transform:uppercase;
  }
  .wk-count{
    font-family:var(--sf-mono);
    font-size:11px;
    font-weight:500;
    color:var(--ink-3);
  }
  .wk-title{
    font-family:var(--sf);
    font-size:16px;
    font-weight:600;
    letter-spacing:-0.02em;
    margin-bottom:3px;
  }
  .wk-desc{
    font-family:var(--sf);
    font-size:12px;
    font-weight:400;
    letter-spacing:-0.005em;
    opacity:0.6;
  }
  .wk-bar{display:none}

  /* Name prompt */
  .name-prompt{
    margin:16px 16px 0;
    border-radius:12px;
    padding:16px;
    background:#fff;
    box-shadow:0 0 0 0.5px rgba(60,60,67,0.1);
    border:none;
  }
  .name-prompt-label{
    font-family:var(--sf);
    font-size:11px;
    font-weight:600;
    letter-spacing:0.04em;
    color:var(--gold-dim);
  }
  /* Landing footer */
  .landing-footer{padding:16px 16px 8px}
  .reset-btn{font-size:12px}
  .landing-version{font-size:9px}
  .name-prompt-sub{font-family:var(--sf);font-size:13px}
  .name-input-row{flex-direction:column;gap:8px}
  .name-input{
    font-family:var(--sf);
    font-size:17px;
    font-weight:400;
    letter-spacing:-0.02em;
    border-radius:10px;
    height:44px;
    border:0.5px solid rgba(60,60,67,0.2);
    padding:0 12px;
  }

  /* ── Lesson Chrome — fixed below topbar ──
     NOTE: .main is overflow:hidden so position:sticky won't work.
     We use position:fixed instead, and give .scroll a padding-top to match. */
  .lesson-chrome{
    position:fixed;
    top:48px;
    left:0;right:0;
    z-index:90;
    padding:8px 14px 8px;
    background:rgba(248,248,248,0.96);
    -webkit-backdrop-filter:saturate(180%) blur(20px);
    backdrop-filter:saturate(180%) blur(20px);
    border-bottom:0.5px solid rgba(60,60,67,0.2);
  }
  /* Scroll area clears fixed topbar (48px) + fixed chrome (~46px) */
  .scroll{padding-top:50px}
  /* Collapse top row */
  .lc-top{
    margin-bottom:5px;
    gap:7px;
    align-items:center;
  }
  .lc-week-tag{
    font-family:var(--sf);
    font-size:9px;
    font-weight:700;
    letter-spacing:0.04em;
    padding:2px 7px;
    border-radius:5px;
    flex-shrink:0;
  }
  .lc-title{
    font-family:var(--sf);
    font-size:14px;
    font-weight:600;
    letter-spacing:-0.02em;
    line-height:1.2;
    flex:1;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    min-width:0;
  }
  .lc-counter{
    font-family:var(--sf-mono);
    font-size:10px;
    font-weight:500;
    color:var(--ink-3);
    white-space:nowrap;
    flex-shrink:0;
  }
  .pip{height:2px;border-radius:2px}

  /* ── Scroll content — base padding (chrome fixed-overlay adds more via .lesson-chrome rule) ── */
  .scroll{padding:20px 16px 24px}

  /* ── Typography — Apple SF Pro style ── */
  /* Section eyebrow: small all-caps label */
  .eyebrow{
    font-family:var(--sf);
    font-size:11px;
    font-weight:600;
    letter-spacing:0.05em;
    text-transform:uppercase;
    color:var(--gold-dim);
    margin-bottom:4px;
  }
  /* Section heading: Apple "Large Title" style */
  .heading{
    font-family:var(--sf);
    font-size:22px;
    font-weight:700;
    letter-spacing:-0.03em;
    line-height:1.2;
    color:var(--ink);
    margin-bottom:10px;
  }
  /* Body text: Apple "Body" style — readable, comfortable */
  .body-text{
    font-family:var(--sf);
    font-size:15px;
    font-weight:400;
    letter-spacing:-0.01em;
    line-height:1.6;
    color:var(--ink-2);
    margin-bottom:14px;
  }
  .body-text p{margin-bottom:10px}
  .body-text strong{
    font-family:var(--sf);
    font-weight:600;
    color:var(--ink);
  }
  /* Section label (above sections: "PRICE & RENT BY DISTRICT") */
  .sec-label{
    font-family:var(--sf);
    font-size:11px;
    font-weight:600;
    letter-spacing:0.04em;
    text-transform:uppercase;
    color:var(--ink-3);
    padding-bottom:8px;
    margin-bottom:12px;
    border-bottom:0.5px solid rgba(60,60,67,0.15);
  }
  /* Info + warn boxes */
  .info-box{
    font-family:var(--sf);
    font-size:14px;
    font-weight:400;
    letter-spacing:-0.01em;
    line-height:1.55;
    border-radius:0 10px 10px 0;
    padding:13px 14px;
  }
  .info-box .ib-label{
    font-family:var(--sf);
    font-size:10px;
    font-weight:700;
    letter-spacing:0.05em;
    text-transform:uppercase;
    color:var(--gold-dim);
  }
  .warn-box{
    font-family:var(--sf);
    font-size:14px;
    font-weight:400;
    letter-spacing:-0.01em;
    line-height:1.55;
    border-radius:0 10px 10px 0;
    padding:13px 14px;
    color:var(--err);
  }
  /* Grid cards */
  .ig-lbl{
    font-family:var(--sf);
    font-size:10px;
    font-weight:600;
    letter-spacing:0.04em;
    text-transform:uppercase;
    color:var(--ink-3);
    margin-bottom:3px;
  }
  .ig-val{
    font-family:var(--sf);
    font-size:13.5px;
    font-weight:500;
    letter-spacing:-0.01em;
    line-height:1.4;
  }

  /* ── Info grid ── */
  .info-grid{grid-template-columns:1fr;gap:8px}
  .ig{
    padding:12px 14px;
    border-radius:10px;
    background:#fff;
    border:0.5px solid rgba(60,60,67,0.1);
    box-shadow:none;
  }
  .ig-lbl{
    font-family:var(--sf);
    font-size:11px;
    font-weight:500;
    letter-spacing:0.02em;
    color:var(--ink-3);
    text-transform:uppercase;
    margin-bottom:3px;
  }
  .ig-val{
    font-family:var(--sf);
    font-size:14px;
    font-weight:500;
    letter-spacing:-0.01em;
    line-height:1.4;
  }

  /* Info & warn boxes */
  .info-box{
    border-radius:0 10px 10px 0;
    padding:12px 14px;
    font-family:var(--sf);
    font-size:14px;
    letter-spacing:-0.01em;
  }
  .info-box .ib-label{
    font-family:var(--sf);
    font-size:10px;
    font-weight:600;
    letter-spacing:0.05em;
  }
  .warn-box{
    border-radius:0 10px 10px 0;
    font-family:var(--sf);
    font-size:14px;
    letter-spacing:-0.01em;
    padding:12px 14px;
  }

  /* ── Objectives card ── */
  .obj-card{
    padding:16px 16px 12px;
    border-radius:12px;
    margin-bottom:16px;
  }
  .obj-eyebrow{
    font-family:var(--sf);
    font-size:10px;
    font-weight:700;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:8px;
  }
  .obj-row{
    font-family:var(--sf);
    font-size:14px;
    font-weight:400;
    letter-spacing:-0.01em;
    line-height:1.55;
    padding:7px 0;
    color:rgba(255,255,255,0.82);
  }
  .obj-arrow{font-size:10px;margin-top:3px}

  /* ── Tables — horizontal scroll, no text wrapping ── */
  .tbl-wrap{
    margin:12px -16px;
    border-radius:0;
    border-left:none;
    border-right:none;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    /* Scroll indicator hint */
    background:
      linear-gradient(to right, white 0%, transparent 20px) left,
      linear-gradient(to left,  white 0%, transparent 20px) right;
    background-color:#fff;
    background-attachment:local;
  }
  table{
    font-family:var(--sf);
    font-size:13px;
    /* Let table be as wide as it needs — don't force a min-width that clips */
    min-width:auto;
    width:max-content;
    min-width:100%;
  }
  th{
    font-family:var(--sf);
    font-size:10px;
    font-weight:700;
    letter-spacing:0.04em;
    padding:10px 14px;
    white-space:nowrap; /* header labels never wrap */
  }
  td{
    font-family:var(--sf);
    font-size:13px;
    font-weight:400;
    letter-spacing:-0.01em;
    padding:10px 14px;
    white-space:nowrap; /* ← key fix: no wrapping in cells */
    vertical-align:middle;
  }
  /* First column (district / label) can wrap if needed but stays generous */
  td:first-child{
    font-weight:500;
    min-width:100px;
  }
  /* Numeric columns stay compact and right-aligned */
  td:not(:first-child){
    text-align:right;
    font-variant-numeric:tabular-nums;
    min-width:70px;
  }
  th:not(:first-child){
    text-align:right;
  }
  /* Scroll hint shown on mobile for wide tables */
  .tbl-scroll-hint{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:4px;
    padding:0 16px 4px;
    font-family:var(--sf);
    font-size:11px;
    font-weight:500;
    color:var(--ink-3);
    letter-spacing:-0.01em;
  }
  .tbl-scroll-hint::after{
    content:'→';
    font-size:11px;
    color:var(--gold-dim);
  }

  /* ── Rules ── */
  .rules{margin:12px 0}
  .rule{
    gap:12px;
    padding:14px 0;
  }
  .rule-n{
    width:26px;height:26px;
    border-radius:8px; /* iOS squircle-ish */
    font-family:var(--sf);
    font-size:12px;
    font-weight:700;
    flex-shrink:0;
  }
  .rule-title{
    font-family:var(--sf);
    font-size:15px;
    font-weight:600;
    letter-spacing:-0.02em;
    margin-bottom:3px;
  }
  .rule-detail{
    font-family:var(--sf);
    font-size:13.5px;
    font-weight:400;
    letter-spacing:-0.01em;
    line-height:1.5;
    color:var(--ink-2);
  }

  /* ── Roleplay ── */
  .rp-trigger{
    border-radius:12px;
    padding:13px 14px;
    background:#fff;
    border:0.5px solid rgba(60,60,67,0.15);
  }
  .rp-trigger-title{
    font-family:var(--sf);
    font-size:14px;
    font-weight:600;
    letter-spacing:-0.01em;
  }
  .rp-trigger-eyebrow{
    font-family:var(--sf);
    font-size:10px;
    font-weight:600;
    letter-spacing:0.05em;
  }
  .rp-panel{
    border-radius:0 0 12px 12px;
    border:0.5px solid rgba(60,60,67,0.12);
    border-top:none;
  }
  .rp-panel-inner{padding:14px 14px 12px}
  .rp-inst{
    font-family:var(--sf);
    font-size:12.5px;
    letter-spacing:-0.005em;
    font-style:italic;
  }
  .rp-line{
    grid-template-columns:52px 1fr;
    gap:0 10px;
    padding:10px 0;
  }
  .rp-line.rp-agent{margin:0 -14px;padding:10px 14px}
  .rp-line.rp-client{margin:0 -14px;padding:10px 14px}
  .rp-tag{
    font-family:var(--sf);
    font-size:9px;
    font-weight:700;
    letter-spacing:0.04em;
    width:44px;
    padding:3px 6px;
    border-radius:5px;
  }
  .rp-text{
    font-family:var(--sf);
    font-size:14px;
    font-weight:400;
    letter-spacing:-0.01em;
    line-height:1.55;
  }
  .rp-line.rp-note .rp-text{
    font-family:var(--sf);
    font-size:12.5px;
    color:var(--ink-3);
  }
  .rp-debrief{
    border-radius:10px;
    font-family:var(--sf);
    font-size:13.5px;
    letter-spacing:-0.01em;
    padding:12px 14px;
  }
  .rp-debrief strong{
    font-family:var(--sf);
    font-size:13.5px;
  }

  /* ── Quiz ── */
  .quiz-meta{
    border-radius:10px;
    padding:11px 14px;
    font-family:var(--sf);
    font-size:13px;
    letter-spacing:-0.01em;
    margin-bottom:16px;
  }
  .q-num{
    font-family:var(--sf);
    font-size:11px;
    font-weight:600;
    letter-spacing:0.04em;
    color:var(--gold-dim);
    margin-bottom:6px;
  }
  .q-text{
    font-family:var(--sf);
    font-size:17px;
    font-weight:600;
    letter-spacing:-0.025em;
    line-height:1.35;
    margin-bottom:12px;
  }
  .q-block{padding:18px 0}
  .q-opts{gap:8px}
  .q-opt{
    padding:13px 14px;
    gap:12px;
    min-height:52px;
    border-radius:12px;
    border:0.5px solid rgba(60,60,67,0.15);
    background:#fff;
    transition:background .1s;
  }
  .q-opt:hover:not(.locked){
    background:#f2f2f7;
    border-color:rgba(60,60,67,0.2);
  }
  .opt-ltr{
    width:28px;height:28px;
    border-radius:50%;
    font-family:var(--sf-mono);
    font-size:12px;
    font-weight:600;
    background:#f2f2f7;
    border:none;
    color:var(--ink-3);
  }
  .opt-text{
    font-family:var(--sf);
    font-size:14px;
    font-weight:400;
    letter-spacing:-0.01em;
    line-height:1.45;
    padding-top:2px;
  }
  .q-feedback{
    border-radius:10px;
    padding:12px 14px;
    font-family:var(--sf);
    font-size:13.5px;
    letter-spacing:-0.01em;
  }
  .fb-head{
    font-family:var(--sf);
    font-size:11px;
    font-weight:700;
    letter-spacing:0.04em;
  }
  .fb-body{
    font-family:var(--sf);
    font-size:13.5px;
    letter-spacing:-0.01em;
  }
  .quiz-actions{flex-wrap:wrap;gap:8px;margin-top:16px}
  .quiz-meta{flex-wrap:wrap;gap:6px}

  /* Buttons — iOS style */
  .btn{
    font-family:var(--sf);
    font-size:15px;
    font-weight:600;
    letter-spacing:-0.01em;
    border-radius:12px;
    height:44px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding:0 18px;
    -webkit-tap-highlight-color:transparent;
  }

  /* ── Complete screen ── */
  .complete{padding:28px 16px;gap:16px}
  .complete-h{
    font-family:var(--sf);
    font-size:26px;
    font-weight:700;
    letter-spacing:-0.04em;
  }
  .complete-sub{
    font-family:var(--sf);
    font-size:15px;
    letter-spacing:-0.01em;
  }
  .s-pill{
    font-family:var(--sf);
    font-size:13px;
    font-weight:600;
    letter-spacing:-0.01em;
    border-radius:20px;
    padding:6px 16px;
  }
  .reflect-card{
    padding:18px 16px;
    border-radius:14px;
    width:100%;
  }
  .reflect-eyebrow{
    font-family:var(--sf);
    font-size:11px;
    font-weight:600;
    letter-spacing:0.04em;
  }
  .reflect-q{
    font-family:var(--sf);
    font-size:16px;
    font-weight:400;
    letter-spacing:-0.02em;
    line-height:1.5;
    font-style:italic;
    color:rgba(255,255,255,0.85);
  }
  .next-card{
    padding:14px 16px;
    border-radius:12px;
    border:0.5px solid rgba(60,60,67,0.15);
    background:#fff;
    width:100%;
  }
  .next-card-eyebrow{
    font-family:var(--sf);
    font-size:11px;
    font-weight:600;
    letter-spacing:0.04em;
  }
  .next-card-title{
    font-family:var(--sf);
    font-size:15px;
    font-weight:600;
    letter-spacing:-0.02em;
  }

  /* ── Footer bar hidden ── */
  .footbar{display:none}

  /* ── Mobile bottom nav — iOS Tab Bar style ── */
  .mob-nav{
    display:flex;
    position:fixed;bottom:0;left:0;right:0;
    background:rgba(248,248,248,0.94);
    -webkit-backdrop-filter:saturate(180%) blur(20px);
    backdrop-filter:saturate(180%) blur(20px);
    border-top:0.5px solid rgba(60,60,67,0.2);
    align-items:center;
    justify-content:space-between;
    z-index:200;
    padding:8px 12px 0;
    padding-bottom:calc(8px + env(safe-area-inset-bottom, 0px));
    gap:8px;
    height:calc(60px + env(safe-area-inset-bottom, 0px));
  }
  .mob-nav-btn{
    display:flex;flex-direction:column;align-items:center;gap:2px;
    padding:4px 10px 6px;
    border-radius:10px;
    background:transparent;border:none;
    color:rgba(60,60,67,0.45);
    font-family:var(--sf);
    font-size:10px;
    font-weight:500;
    letter-spacing:0.01em;
    transition:color .12s;
    cursor:pointer;
    flex-shrink:0;
    min-width:52px;
    -webkit-tap-highlight-color:transparent;
  }
  .mob-nav-btn.active{color:var(--navy)}
  .mob-nav-btn svg{
    width:22px;height:22px;
    stroke:currentColor;
    fill:none;
    stroke-width:1.6;
    stroke-linecap:round;
  }
  /* Continue — iOS primary action button */
  .mob-nav-continue{
    flex:1;
    height:44px;
    padding:0 16px;
    border-radius:12px;
    background:var(--navy);
    border:none;
    color:#fff;
    font-family:var(--sf);
    font-size:15px;
    font-weight:600;
    letter-spacing:-0.01em;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    transition:opacity .12s, transform .1s;
    white-space:nowrap;
    text-align:center;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .mob-nav-continue:active{opacity:0.82;transform:scale(0.98)}
  .mob-nav-continue.cta-gold{background:var(--gold)}
  .mob-nav-continue:disabled{opacity:.3;pointer-events:none}

  /* ── Certificate ── */
  .cert-toolbar{
    padding:10px 16px;
    gap:10px;
    background:rgba(255,255,255,0.92);
    border-bottom:0.5px solid rgba(60,60,67,0.15);
  }
  .cert-toolbar-title{
    font-family:var(--sf);
    font-size:14px;
    font-weight:600;
    letter-spacing:-0.02em;
  }
  .cert-scroll{padding:16px 12px}
  .cert-content{padding:6% 5% 5%}
  .cert-name{font-size:clamp(18px,6.5vw,30px)}
  .cert-body{font-size:clamp(9px,1.3vw,11.5px)}
}

/* ── Tiny screens ── */
@media(max-width:380px){
  /* tb-wordmark already hidden in 700px block */
  .topbar{padding:0 12px;height:46px}
  .lesson-chrome{top:46px;padding:7px 12px 7px}
  .lc-title{font-size:13px}
  .lc-counter{font-size:9px}
  .hero-h{font-size:21px;letter-spacing:-0.04em}
  .heading{font-size:18px}
  .q-text{font-size:15px}
  .hero-stats{grid-template-columns:repeat(4,1fr)}
  .hs-n{font-size:17px}
  .hs-l{font-size:9px}
}

/* ══════════════════════════════════════════════════════════════
   NAME INPUT (landing — program complete)
══════════════════════════════════════════════════════════════ */
.name-prompt{
  background:var(--bg-2);
  border:1px solid var(--line);
  border-radius:var(--r-lg);
  padding:20px 22px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.name-prompt-label{
  font-family:'JetBrains Mono',monospace;
  font-size:9.5px;
  font-weight:500;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--gold-dim);
}
.name-prompt-sub{font-size:13px;color:var(--ink-2);line-height:1.55}
.name-input-row{display:flex;gap:10px;align-items:stretch}
.name-input{
  flex:1;
  padding:10px 14px;
  border-radius:8px;
  border:1px solid var(--line-md);
  background:var(--bg);
  font-family:'Playfair Display',serif;
  font-size:17px;
  color:var(--ink);
  outline:none;
  transition:border-color var(--transition);
}
.name-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,153,63,.12)}
.name-input::placeholder{color:var(--ink-3);font-style:italic;font-size:15px}

/* ══════════════════════════════════════════════════════════════
   CERTIFICATE VIEW
══════════════════════════════════════════════════════════════ */
.cert-view{
  flex:1;
  display:flex;
  flex-direction:column;
  background:var(--bg-3);
  min-height:0;
}
.cert-toolbar{
  padding:12px 24px;
  background:var(--bg);
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  gap:12px;
  flex-shrink:0;
}
.cert-toolbar-title{
  font-size:13px;
  font-weight:500;
  color:var(--ink);
  flex:1;
}
.cert-scroll{
  flex:1;
  overflow-y:auto;
  padding:32px;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  scrollbar-width:thin;
}

/* The certificate itself */
.certificate{
  width:100%;
  max-width:680px;
  background:#fff;
  box-shadow:0 8px 40px rgba(6,38,79,.18);
  border-radius:4px;
  position:relative;
  overflow:hidden;
  aspect-ratio:210/297; /* A4 portrait */
  display:flex;
  flex-direction:column;
}

/* Border frame */
.cert-frame{
  position:absolute;
  inset:14px;
  border:1px solid var(--gold-border);
  pointer-events:none;
  z-index:1;
}
.cert-frame-inner{
  position:absolute;
  inset:18px;
  border:0.5px solid rgba(201,153,63,.15);
  pointer-events:none;
  z-index:1;
}

/* Background watermark */
.cert-bg{
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 15% 20%, rgba(201,153,63,.04) 0%, transparent 50%),
    radial-gradient(circle at 85% 80%, rgba(6,38,79,.04) 0%, transparent 50%);
  pointer-events:none;
}

/* Cert content */
.cert-content{
  position:relative;
  z-index:2;
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:8% 10% 6%;
  text-align:center;
}
/* Cert logo row — centered at top */
.cert-logo-row{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-bottom:4%;
}
/* White circle behind logo — removes the black JPEG background cleanly */
.cert-mark-bg{
  width:76px;height:76px;
  border-radius:50%;
  background:#fff;
  border:1.5px solid var(--gold-border);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  box-shadow:0 2px 16px rgba(201,153,63,.18);
}
.cert-mark{
  display:flex;align-items:center;justify-content:center;
}
.cert-mark .phc-logo-img{height:70px;width:70px;}
.cert-brand{
  font-family:'Playfair Display',serif;
  font-size:13px;
  font-weight:600;
  color:var(--navy);
  letter-spacing:0.04em;
}
.cert-brand-jp{
  font-size:10px;
  color:var(--ink-3);
  letter-spacing:0.06em;
  font-family:'JetBrains Mono',monospace;
}
.cert-eyebrow{
  font-family:'JetBrains Mono',monospace;
  font-size:8.5px;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--gold-dim);
  margin-bottom:3%;
}
.cert-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(18px,3.5vw,28px);
  font-weight:700;
  color:var(--navy-d);
  line-height:1.2;
  margin-bottom:2%;
  letter-spacing:0.01em;
}
.cert-presented{
  font-size:clamp(9px,1.4vw,12px);
  color:var(--ink-3);
  letter-spacing:0.08em;
  text-transform:uppercase;
  font-family:'JetBrains Mono',monospace;
  margin-bottom:4%;
}
.cert-name{
  font-family:'Playfair Display',serif;
  font-size:clamp(22px,4.5vw,38px);
  font-weight:600;
  color:var(--navy);
  letter-spacing:0.02em;
  line-height:1.15;
  margin-bottom:4%;
  padding:0 5%;
  min-height:1.4em;
  word-break:break-word;
}
.cert-divider{
  width:60%;
  height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin-bottom:4%;
}
.cert-body{
  font-size:clamp(9px,1.4vw,12px);
  color:var(--ink-2);
  line-height:1.75;
  max-width:80%;
  margin-bottom:5%;
}
.cert-body strong{color:var(--navy)}

/* Gold seal */
.cert-seal{
  width:clamp(56px,9vw,80px);
  height:clamp(56px,9vw,80px);
  margin-bottom:5%;
  flex-shrink:0;
}

/* Signature row — single centered signature */
.cert-sig-row{
  display:flex;
  width:80%;
  justify-content:center;
  margin-bottom:4%;
}
.cert-sig{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}
.cert-sig-line{
  width:160px;
  height:1px;
  background:linear-gradient(90deg,transparent,var(--line-md),transparent);
}
.cert-sig-name{
  font-family:'Playfair Display',serif;
  font-size:clamp(11px,1.6vw,14px);
  color:var(--ink);
  font-weight:600;
  letter-spacing:0.01em;
}
.cert-sig-title{
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(7px,1vw,9px);
  color:var(--gold-dim);
  text-transform:uppercase;
  letter-spacing:0.12em;
}

/* Date & issue info */
.cert-footer-info{
  display:flex;
  justify-content:center;
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(7px,1vw,9px);
  color:var(--ink-3);
  letter-spacing:0.08em;
  text-transform:uppercase;
}
.cert-footer-info span{display:flex;flex-direction:column;align-items:center;gap:3px}
.cert-footer-info strong{color:var(--ink-2);font-weight:500;font-size:clamp(8px,1.1vw,10px)}

/* ══ PRINT STYLES ══════════════════════════════════════════════ */
@media print{
  body{background:#fff;padding:0;margin:0}
  #app,.cert-toolbar,.topbar,.sidebar,.footbar,.mob-nav,.landing,.scroll,.main,
  button,.cert-scroll{display:block!important;padding:0!important;margin:0!important;
  border:none!important;box-shadow:none!important;background:transparent!important}
  #app,body{width:100%;max-width:none;border-radius:0}
  .cert-view{display:block!important;background:#fff}
  .cert-toolbar{display:none!important}
  .cert-scroll{padding:0!important;overflow:visible!important;display:block!important}
  .certificate{
    width:100%;max-width:none;
    box-shadow:none!important;
    aspect-ratio:auto!important;
    page-break-inside:avoid;
    border-radius:0;
  }
  @page{size:A4 portrait;margin:0}
}
</style>

const LESSONS=[
{id:1,week:1,title:"Welcome to Property Hub Cambodia",short:"Welcome to PHC",objectives:["Know PHC's identity, values, and market position","Understand your role as an Investment Advisor — not a salesperson","Know the three non-negotiable standards every PHC agent holds"],sections:[{label:"Company Identity",heading:"The company you represent",body:"Property Hub Cambodia — also known as カンボジア不動産 in Japanese — is a premium, multilingual, consultant-first real estate advisory firm based in BKK1, Phnom Penh. We are not a volume agency. We compete on trust, clarity, and depth of advisory.",box:{title:"Core facts",lines:["Brand: Property Hub Cambodia | カンボジア不動産","Values: Family · Security · Safe Place · Home","Office: #12F Time Square 5, St. 306, BKK1, Phnom Penh","Languages: Khmer · English · Japanese · German","Track record: 15+ years · 500+ clients · 1,200+ transactions · 98% satisfaction"]},grid:[["Team lead","Nick — CEO & Senior Real Estate Advisor"],["Co-founder","Ms. Meas Monika — Property Consultant"],["Co-founder","Mr. Reza — German/European Investor Advisor"],["Partner","Official listing partner — Realestate.com.kh (REAKH)"]]},{label:"Your Role",heading:"You are an Investment Advisor",body:"Not a salesperson. Not a property presenter. Not a closer. The difference is fundamental: a salesperson focuses on making the transaction happen. An Investment Advisor focuses on whether the transaction is right for the client — even if it means losing a deal. At PHC, we always choose the second path.",box:{title:"Every client must feel three things within 5 minutes:",lines:["Clear — they understand their situation better than before","Safe — no pressure, no manipulation, no rush","Respected — their intelligence is never underestimated"]},warning:"If a client feels confused, rushed, or pressured — you have failed. This is true even if they still buy. A pressured buyer becomes a resentful referrer."},{label:"The Standards",heading:"Three non-negotiable standards",body:"These apply to every agent, every interaction, without exception.",rules:[{title:"Clarity over persuasion",detail:"If something cannot be explained simply and honestly — it should not be sold. If you do not know something — say so, verify it, and come back with the right answer."},{title:"Trust is the product",detail:"PHC's most valuable asset is not any listing — it is our reputation. Protect it even if it costs a deal. One lost deal protects ten future relationships."},{title:"Build systems, not one-offs",detail:"Follow the frameworks. Every PHC process exists for a reason. Consistency is what makes a great advisor great — not talent or charm. Discipline."}]}],roleplay:{scenario:"What is your role here?",instructions:"One person plays AGENT, one plays CLIENT. Run it once, then switch roles.",lines:[{role:"client",text:'"So you\'re a real estate agent — you\'re basically here to sell me a property, right?"'},{role:"agent",text:'"Not exactly. My title is Investment Advisor, not sales agent."'},{role:"client",text:'"What\'s the difference?"'},{role:"agent",text:'"A sales agent focuses on making the transaction happen. My job is to make sure the transaction is the right one for you — whether that leads to a purchase or not."'},{role:"client",text:'"So you\'d tell me not to buy?"'},{role:"agent",text:'"Absolutely. If this investment doesn\'t fit your situation, I\'ll tell you — even if it means walking away. That\'s the only way I can stay credible with you."'},{role:"client",text:'"That\'s... not what I expected."'},{role:"note",text:"Debrief: Did the Agent sound confident or rehearsed? Was the Client convinced?"}],debrief:"The goal is not to recite the script — it is to mean what you say. If the client does not feel the difference, practice it again."},quiz:[{q:"What is your official title as a PHC agent?",opts:["Property Salesperson","Real Estate Agent","Investment Advisor","Property Consultant"],correct:2,explain:"Investment Advisor. This framing shapes every client interaction. You are there to advise — not to sell."},{q:"PHC's three non-negotiable standards are:",opts:["Speed, volume, commission","Clarity, trust, systems","Price, location, yield","Marketing, closing, referrals"],correct:1,explain:"Clarity over persuasion · Trust is the product · Build systems, not one-offs. These three govern every PHC agent interaction."},{q:"A client pushes you to give a guaranteed return estimate. You should:",opts:["Give a conservative estimate to make them feel better","Explain that guarantees are not how responsible advisors operate — and why","Check with a developer and pass their figure along","Quote the gross advertised yield"],correct:1,explain:"Never use the word 'guaranteed' in reference to investment returns. Explain why honestly — this builds credibility, not resistance."},{q:"Within 5 minutes, every PHC client must feel three things. Which set is correct?",opts:["Excited, convinced, ready to buy","Clear, safe, respected","Informed, motivated, committed","Welcomed, impressed, decided"],correct:1,explain:"Clear — they understand their situation better. Safe — no pressure or manipulation. Respected — their intelligence is never underestimated. These three are the foundation."},{q:"PHC competes primarily on:",opts:["The lowest commission rate in Phnom Penh","Volume of listings and fastest transaction speed","Trust, clarity, and depth of advisory","Developer relationships and exclusive inventory"],correct:2,explain:"PHC is not a volume agency. We compete on trust, clarity, and depth of advisory. This is what differentiates us from every other agency in the market."}],reflection:"What do you think is the hardest part of being an Investment Advisor rather than a salesperson — and why?"},
{id:2,week:1,title:"The Phnom Penh Property Market",short:"Phnom Penh Market",objectives:["Understand the current state of the Phnom Penh condo market using REAKH data","Know the key districts, price benchmarks, and buyer/renter profiles","Be able to explain yield, pricing, and CGT clearly to any client"],sections:[{label:"Market Overview",heading:"The market in 2026 — REAKH-sourced data",body:"All figures in this lesson are sourced from the Realestate.com.kh Investment & Market Analysis Condominium Report — our official listing partner and Cambodia's leading real estate platform. Use these numbers with confidence in client conversations.",box:{title:"Source: REAKH Investment & Market Analysis Condominium Report (2025)",lines:["All prices quoted on GROSS size. Net vs gross: ~20% difference on average.","Average price/sqm across all Phnom Penh: $1,800 gross","BKK1 average: $2,000/sqm gross (market average across all project tiers)","Transaction volume: Up 25% in 2025 — market momentum confirmed","Phnom Penh cumulative condo supply: ~60,000+ units by end 2024"]},grid:[["Who's buying","Cambodian 18.8% · American 10.3% · Singaporean 7% · British 6.7% · Chinese 6.7% · Russian 6.2% · German 5.3% · Japanese 3.8%"],["Who's renting","Cambodian 13.8% · American 10.6% · Chinese 9.8% · French 9.0% · South African 6.8% · British 5.2% · Japanese 3.3%"],["Most bought unit","1-bedroom — 61% of all purchases · Avg size 53sqm · Avg price $118,000"],["Most rented unit","1-bedroom — 72% of all rentals · Avg rent $500/month market-wide"]]},{label:"Price & Rent by District",heading:"Know these numbers — clients will test you",body:"Prices are GROSS per sqm. Rental prices are for semi- to fully-serviced condo units (pool, gym, reception) — the standard in new developments PHC recommends.",table:{headers:["District","Buy $/sqm","1BR rent","2BR rent","3BR rent"],rows:[["BKK1","$2,000","$800","$1,450","$2,550"],["Tonle Bassac","$2,500","$600","$1,000","$1,550"],["Daun Penh","$2,000","$500","$900","$1,500"],["Chroy Changvar","$1,700","$450","$900","$1,800"],["Toul Kork","$1,450","$500","$900","$1,500"],["Toul Tompoung","$1,200","$450","$800","$1,300"],["BKK3","$1,600","$550","$900","$1,200"],["Sen Sok","$1,100","$400","$650","$950"]]}},{label:"Market Cycle & CGT",heading:"Where we are in the cycle — and why CGT matters",body:"The REAKH report places Cambodia at the beginning of a potential second property cycle. Prices peaked 2017–2018, corrected through 2019–2022, and have been stabilizing since. Q1 2026 data signals the market is entering a new phase of measured growth — not a boom, but a credible recovery.",rules:[{title:"The market cycle context",detail:"Growth 2013–2018 → Correction 2019–2022 → Stabilization 2022–2024 → Potential second cycle from 2024. Transaction volumes up 25% in 2025 confirm buyer confidence returning."},{title:"What CGT means — 20% on profit",detail:"Capital Gains Tax is 20% on the taxable gain. Gain = sale price minus (purchase price + documented costs). Taxpayers can use 80% flat deduction OR actual documented expenses — whichever reduces tax more."},{title:"CGT in practice — example",detail:"Buy at $100K, sell at $200K, costs $40K → taxable gain $60K → CGT payable $12,000. Net exit $188K vs $200K headline price. Always disclose this to every investor."},{title:"Stamp duty exemptions (2026)",detail:"The Royal Government extended stamp duty exemptions until end of 2026: properties under $70,000 fully exempt · properties under $210,000 also receive preferential treatment. This benefits first-home buyers and investors in the entry-mid tier."}]}],roleplay:{scenario:"Explaining CGT to a first-time investor",instructions:"Practice delivering this clearly and without minimising the risk.",lines:[{role:"client",text:'"Someone told me there\'s a new Capital Gains Tax in Cambodia. Is that true?"'},{role:"agent",text:'"Yes — CGT became effective in January 2026. It applies to the profit you make when you sell a property. The rate is 20% on the taxable gain."'},{role:"client",text:'"So buying is a bad idea now?"'},{role:"agent",text:'"Not at all — it means the strategy has shifted. For a long-term hold with rental income, CGT is manageable. For example, on a $200K exit with $100K purchase price and $40K in documented costs, the tax is around $12,000. The issue is short-term flipping — that strategy no longer makes sense in this market."'},{role:"client",text:'"You mentioned 7 years — is that long enough?"'},{role:"agent",text:'"Based on the REAKH case study of J Tower 2 — a real verified transaction — a 5-year hold generated 34% total ROI. At 8 years, the projection is 58%. Rental income compounds over time. CGT applies at exit, but the hold period is what drives the return."'},{role:"note",text:"Debrief: Did the Agent name the CGT amount precisely? Did they use the J Tower 2 case study as evidence, not persuasion?"}],debrief:"CGT must be disclosed proactively with numbers — not vague reassurance. 'Don't worry' is never acceptable. 'Here is the math' is."},quiz:[{q:"According to the REAKH Condominium Report, what is the average price per sqm in BKK1 (gross)?",opts:["$1,200","$1,800 — Phnom Penh average","$2,000","$2,800"],correct:2,explain:"REAKH reports BKK1 at $2,000/sqm gross — the market average across all BKK1 project tiers. This is the figure to use in client conversations as it comes from our official listing partner."},{q:"According to REAKH data, which unit type dominates both buying AND renting?",opts:["Studio — lowest price, easiest to rent","2-bedroom — best yield","1-bedroom — 61% of purchases, 72% of rentals","3-bedroom — highest rent, limited supply"],correct:2,explain:"1-bedrooms dominate both sides: 61% of all condo purchases and 72% of all rental demand. They offer the best balance of affordability, rental velocity, and investor accessibility."},{q:"Transaction volume in the Phnom Penh condo market changed by how much in 2025?",opts:["Down 10% — market still recovering","Up 5% — slow but steady","Up 25% — confirmed by REAKH data","Flat — no meaningful change"],correct:2,explain:"Up 25% in 2025. This is the single most important market momentum data point from the REAKH report. It signals returning buyer confidence and a market entering a new cycle."},{q:"CGT in Cambodia is applied at what rate, on what base?",opts:["10% of sale price","20% of gross sale price","20% of the taxable profit — gain after deducting purchase price and costs","5% stamp duty on the full value"],correct:2,explain:"CGT is 20% of the taxable gain, not the full sale price. Gain = sale price minus purchase price and documented costs. Taxpayers can also use an 80% flat deduction method. Always present this correctly — the distinction significantly changes the investor's exit calculation."}],reflection:"How would you explain the difference between gross yield and net yield to a client who has never invested in property before? Now include the CGT impact on exit in your answer."},
{id:3,week:1,title:"How Real Estate Works in Cambodia",short:"Real Estate Law",objectives:["Know the difference between Hard Title, Strata Title, and Soft Title","Understand foreign ownership rules and be able to explain them to any client","Know the buying process step by step"],sections:[{label:"Title Types",heading:"Title type is the most important thing you will learn",body:"Title type determines legal ownership. The wrong title for a foreign buyer = no legal ownership. Never present a project to a foreign client without first confirming its title type.",box:{title:"The two title types you must know:",lines:["Hard / Strata Title — freehold. Registered with Ministry of Land. Required for all foreign buyers. PHC standard.","Soft Title — locally registered, NOT nationally recognized. For Cambodian nationals only. Never recommend to any PHC client."]},warning:"If a developer cannot confirm strata title for a condo — do not proceed. Escalate to Nick before advising the client."},{label:"Foreign Ownership Rules",heading:"Three rules — know these exactly",body:"Cambodia allows foreigners to own property — but with specific restrictions. Clients will ask, and a wrong answer damages trust immediately.",rules:[{title:"Above ground floor only",detail:"Foreigners can only own units on the 1st floor and above. Ground floor units cannot be legally owned by foreigners — regardless of title type."},{title:"Maximum 70% foreign ownership per building",detail:"No more than 70% of units in any single building can be held by foreign nationals. This is the 'foreign quota.' Always check remaining quota before recommending a project."},{title:"Strata title is mandatory",detail:"The unit must have strata title (freehold). All PHC recommended projects have strata title. Verify per unit if ever in doubt."}]},{label:"The Buying Process",heading:"Step by step — own this process",body:"Clients will ask you to walk them through the buying process. Know it completely.",rules:[{title:"1. Reservation",detail:"Client pays booking deposit ($1,000–$3,000). Secures the unit while documentation is prepared. Confirm refund policy per project."},{title:"2. Sales & Purchase Agreement (SPA)",detail:"Legal contract between buyer and developer. Always advise clients to have an independent legal advisor review before signing."},{title:"3. Payment Schedule",detail:"Staged payments during construction, or larger upfront for completed units. Know the schedule for every project you present."},{title:"4. Handover & Title Transfer",detail:"Physical handover, final payment, then strata title registered in buyer's name with Ministry of Land. PHC coordinates this process."}]}],roleplay:{scenario:"Explaining foreign ownership rules",instructions:"Practice being direct without being harsh. The client needs clarity, not a lecture.",lines:[{role:"client",text:'"I love unit 01 on the ground floor — can I buy it?"'},{role:"agent",text:'"I have to be direct with you: as a foreign national, you cannot legally own a ground-floor unit in Cambodia."'},{role:"client",text:'"Why not?"'},{role:"agent",text:'"Cambodian law restricts foreign freehold ownership to units above the ground floor. The restriction applies regardless of title type."'},{role:"client",text:'"But the developer said it was strata title."'},{role:"agent",text:'"Strata title is correct for the building — but the floor restriction still applies. The 2nd floor has a similar layout and qualifies for foreign ownership. Shall I show you the floor plan?"'},{role:"note",text:"Debrief: Was the Agent direct without being harsh? Did the Client feel redirected — not rejected?"}],debrief:"The floor restriction is absolute law. Never soften it, never suggest workarounds. Redirect confidently to a compliant alternative."},quiz:[{q:"A foreign investor wants to buy a ground-floor unit in a new BKK1 condo. You should:",opts:["Proceed — ground floor is fine if there is strata title","Advise that foreigners cannot legally own ground-floor units and offer an alternative","Check with the developer if they will make an exception","Recommend they use a Cambodian nominee structure"],correct:1,explain:"Foreigners can only own units above the ground floor. This is non-negotiable law. Redirect to a compliant upper-floor unit immediately."},{q:"A project has 68% foreign ownership. A Japanese investor wants to buy. You should:",opts:["Proceed — 68% is under the 70% cap so it is fine","Flag that only 2% foreign quota remains — this is nearly at the legal cap","Tell them foreigners cannot buy because it is over 65%","It does not matter — strata title protects them regardless"],correct:1,explain:"Only 2% foreign quota remains. This must be flagged clearly. The project may reach the cap before handover, blocking the title transfer."},{q:"What is the SPA in the Cambodian buying process?",opts:["The strata property assessment","The sales and purchase agreement — the legal contract between buyer and developer","The standard payment arrangement","The state property act"],correct:1,explain:"SPA = Sales & Purchase Agreement. It is the binding legal contract between buyer and developer. Always advise clients to have an independent legal advisor review it before signing."},{q:"What is the first step a buyer must take to secure a specific unit?",opts:["Sign the SPA immediately","Submit a visa application","Pay a reservation / booking deposit","Transfer the full purchase price"],correct:2,explain:"Reservation comes first — typically $1,000–$3,000. It secures the unit while documentation is prepared. Always confirm the refund policy before advising a client to proceed."},{q:"Soft Title is:",opts:["Acceptable for foreign buyers in completed condos","A nationally registered freehold title equivalent to strata","A locally registered title not recognized nationally — for Cambodian nationals only","The same as strata title but for commercial properties"],correct:2,explain:"Soft Title is NOT nationally recognized. It is for Cambodian nationals only. Never recommend it to any PHC client regardless of nationality."}],reflection:"In your own words, explain the foreign ownership rules to an imaginary first-time buyer from Japan."},
{id:4,week:1,title:"The PHC Project Portfolio",short:"Project Portfolio",objectives:["Know every active PHC project by developer, location, status, price, and title","Be able to match the right project to the right client profile","Know which projects to present first for each of the 5 client segments"],sections:[{label:"Anchor Developers",heading:"Two developers drive our portfolio",body:"PHC works with multiple developers, but two are our anchors for international buyers. Know these profiles as well as you know the projects themselves.",grid:[["Megakim World Corp","7 completed projects · Strong delivery track record · Modern design · Prime PP locations"],["Tanichu Assetment","Japanese developer · Precision quality · Freehold strata confirmed · Highest trust for JP investors"],["Best for Megakim","International and local buyers · Competitive pricing · Volume and velocity"],["Best for Tanichu","Japanese investors · Risk-averse buyers · Quality-first clients"]]},{label:"Active Projects",heading:"Know every project cold",body:"These are the projects you will discuss in every client conversation. Status, price, title, and best-fit client — from memory.",table:{headers:["Project","District","Price from","Status","Best for"],rows:[["Time Square 8","TTP","~$1,452/sqm","Completed","Overseas Khmer, budget investors"],["Time Square 9","BKK1","~$1,700/sqm","Under const.","JP investors, EU buyers, upscale Khmer"],["Time Square 10","Otres Beach","~$40K","Under const.","Coastal/holiday, budget entry"],["Time Square 11","BKK3","TBC","Feb 2026 launch","Local Khmer, first-home buyers"],["J Tower 2","BKK1 area","Market rate","Completed","JP investors — Tier 1"],["J Tower 3","BKK1 area","TBC","Pre-sale","JP investors — Tier 1 luxury"],["Le Condé","BKK1","From $150K","Completed May '25","JP (Hopetree mgmt), EU hands-off"],["Royal Platinum","Toul Kork","From $120K","Completed 2025","EU retirement, Khmer families"],["Peninsula","Chroy Changvar","~$4,200/sqm","Active","EU $300K+, yield-f
