លវែង។ ចំណុចទិន្នន័យដែលបានផ្ទៀងផ្ទាត់រឹងមាំបំផុតដែលយើងមាន — ពីដៃគូរបស់យើង REAKH លើគម្រោង J Tower 2 — បង្ហាញពីមធ្យមភាគ 6.85% ក្នុងមួយឆ្នាំ ក្នុងរយៈពេល ៥ ឆ្នាំ ដោយបូកបញ្ចូលគ្នារវាងប្រាក់ចំណូលពីការជួល និងកំណើនតម្លៃដើម។\""},{"role":"note","text":"ការបូកសរុបសង្ខេប៖ តើភ្នាក់ងារបានចាប់ផ្តើមដោយការបង្ហាញថ្លៃចំណាយមុននឹងនិយាយពីផលចំណេញដែរឬទេ? តើតួលេខផលចំណេញត្រូវបានបង្ហាញជាផលចំណេញសុទ្ធ មិនមែនផលចំណេញសរុបដែរឬទេ?"}],"debrief":"ភ្នាក់ងារដែលបង្ហាញរូបភាពថ្លៃចំណាយពេញលេញមុនគេ — រួមទាំងការកាត់កកេរផ្សេងៗ — គឺជាបុគ្គលដែលអតិថិជននឹងទុកចិត្តនៅពេលចាំបាច់។ មិនត្រូវចាប់ផ្តើមដោយការប្រកាសពីផលចំណេញមុនគេឡើយ។"},"quiz":[{"q":"ក្រុមហ៊ុនអភិវឌ្ឍន៍មួយផ្សព្វផ្សាយពីអត្រាផលចំណេញពីការជួល 9%។ មុនពេលបង្ហាញរឿងនេះទៅកាន់អតិថិជន អ្នកគួរតែ៖","opts":["ប្រើប្រាស់តួលេខ 9% នោះ — ក្រុមហ៊ុនអភិវឌ្ឍន៍បានបញ្ជាក់រួចហើយ","បំប្លែងទៅជាចន្លោះផលចំណេញសុទ្ធប៉ាន់ប្រមាណ បញ្ជាក់ពីប្រភព និងប្រាប់ថាវាជាផលចំណេញសរុប","កាត់បន្ថយមកត្រឹម 8% ដើម្បីឱ្យមានសុវត្ថិភាព","ប្រើប្រាស់វា លុះត្រាតែកំពុណ្យអភិវឌ្ឍន៍ផ្តល់ឯកសារជាលាយលក្ខណ៍អក្សរ"],"correct":1,"explain":"ត្រូវបំប្លែងការអះអាងផលចំណេញរបស់ក្រុមហ៊ុនអភិវឌ្ឍន៍ទៅជាតួលេខសុទ្ធប៉ាន់ប្រមាណជានិច្ច។ ផលចំណេញសរុបមិនបានរាប់បញ្ចូលថ្លៃគ្រប់គ្រង អត្រាយូនីតទំនេរ និងពន្ធលើការជួលឡើយ — ដែលជាចំណាយដែលអ្នកវិនិយោគត្រូវរ៉ាប់រងពិតប្រាកដ។ ការបង្ហាញផលចំណេញសរុបដូចជាតួលេខចុងក្រោយ គឺជាការភូតភរ។"},{"q":"លើការទិញខុនដូតម្លៃ $150,000 ពន្ធប្រទាក់ក្រឡា / ពន្ធប្រថាប់ត្រាដែលបង់តែម្តងគឺប្រមាណ៖","opts":["$750","$3,000","$6,000","$15,000"],"correct":2,"explain":"ពន្ធប្រទាក់ក្រឡាគឺ 4% នៃតម្លៃអចលនទ្រព្យដែលបានវាយតម្លៃ។ លើកញ្ចប់ $150,000 នោះត្រូវជា $6,000 — គឺជាចំណាយធំមួយដែលបង់តែម្តង ហើយត្រូវតែទម្លាយឱ្យដឹងជាមុន។ សូមកត់សម្គាល់ថា ការលើកលែងពន្ធប្រថាប់ត្រាអាចនឹងត្រូវអនុវត្តសម្រាប់អចលនទ្រព្យក្រោម $70K ឬ $210K អាស្រ័យលើប្រវត្តិរូបរបស់អ្នកទិញ។"},{"q":"ការសិក្សាករណី J Tower 2 របស់ REAKH បង្ហាញពី ROI សរុបដែលបានផ្ទៀងផ្ទាត់កម្រិតណាក្នុងរយៈពេល ៥ ឆ្នាំ?","opts":["18.5%","27.3%","34.27%","52%"],"correct":2,"explain":"ROI សរុប 34.27% ក្នុងរយៈពេល ៥ ឆ្នាំ (2019–2024) — ជាមធ្យម 6.85% ក្នុងមួយឆ្នាំ។ តួលេខនេះបូកបញ្ចូលគ្នារវាងប្រាក់ចំណូលជួលសុទ្ធ $23,392 និងកំណើនតម្លៃដើម $27,245 លើការវិនិយោគសរុប $147,755។"},{"q":"ផលចំណេញសុទ្ធសម្រាប់អ្នកវិនិយោគបរទេសលើ BKK1 យូនីត ១ បន្ទប់គេង ក្នុងតម្លៃជួល $800/ខែ គឺកៀកទៅនឹង៖","opts":["8% — ត្រូវគ្នានឹងអត្រាសរុបដែលបានផ្សព្វផ្សាយ","6.5–7% — បន្ទាប់ពីដកការចំណាយទាំងអស់","5–5.5% — បន្ទាប់ពីដកថ្លៃគ្រប់គ្រង អត្រាយូនីតទំនេរ និងពន្ធជួល 14%","3% — ទីផ្សារមានការប្រកួតប្រជែងខ្លាំងពេក"],"correct":2,"explain":"បន្ទាប់ពីកាត់ថ្លៃគ្រប់គ្រង (~$1.8/sqm/ខែ) អត្រាយូនីតទំនេរ ~10% និងពន្ធលើប្រាក់ចំណូលជួល 14% សម្រាប់ជនបរទេសមិនមែននិវេសនជន ផលចំណេញសុទ្ធលើ 1BR នៅ BKK1 ជាទូទៅធ្លាក់មកត្រឹមប្រហែល 5–5.5% នៃដើមទុនវិនិយោគសរុប។ នេះគឺជាតួលេខស្មោះត្រង់។"}]}},
{id:12,week:3,title:"The Japanese Investor Protocol",short:"Japanese Protocol",objectives:["Understand exactly how Japanese investors think about risk and decision-making","Know the specific PHC protocol for every stage of a Japanese investor conversation","Be able to adapt tone, evidence, and follow-up to Japanese professional standards"],sections:[{label:"Understanding the Profile",heading:"Who you are talking to",body:"Japanese investors in Cambodia are typically professionals in their 40s–60s with high incomes, low risk tolerance, and a strong preference for stability over returns. They have a long-term orientation, distrust urgency, and require verifiable evidence before making any decision. Trust is the entry point — without it, no product discussion is possible.",box:{title:"Japanese investor profile — PHC framework:",lines:["Age: typically 40–65 · Income: high earner · Risk tolerance: LOW","Primary goal: stable passive income + capital preservation","Decision style: methodical, evidence-based, consensus with family or advisors","Cultural norms: respect for hierarchy, structured communication, no pressure","Best-fit projects: J Tower 2 / J Tower 3 (Tanichu developer), Le Condé (Hopetree Japan mgmt)","Language: always provide written follow-ups; if possible, Japanese-language summaries"]}},{label:"The Protocol — Step by Step",heading:"Every conversation follows this exact structure",body:"With Japanese investors, the sequence is not flexible. Deviating from this order — especially presenting returns before risks — signals an amateur and ends the relationship.",rules:[{title:"Step 1: Open with respect, not product",detail:"'Nakamura-san, thank you for taking the time to meet with us. Before I share anything about our projects, I would like to understand your goals and concerns first.' Never lead with a project. Ever."},{title:"Step 2: Disclose risks before returns — always",detail:"Exit liquidity risk first. Then yield reality. Then developer track record. Then CGT. PHC rule: Japanese clients must hear the downside before the upside. This is what creates trust, not undermines it."},{title:"Step 3: Present maximum 2 projects — with evidence",detail:"J Tower 3 or J Tower 2 for Tanichu familiarity. Le Condé for Hopetree Japan management. No more than 2. Justify each with data — delivery history, verified rental data, strata title confirmation."},{title:"Step 4: Never push for a decision in meeting one",detail:"The standard Japanese investor will not decide in the first or even second meeting. This is normal. 'I need to discuss with my family' is not a stall — it is the process. Respect it. Schedule meeting two."},{title:"Step 5: Send written follow-up the same day",detail:"Every PHC meeting with a Japanese investor ends with a same-day written summary: risks clarified + net yield data + next step agreed. This is non-negotiable. It signals professionalism at a standard Japanese professionals recognise."}]},{label:"Language & Evidence",heading:"What to say — and what never to say",body:"Language with Japanese investors must be precise, calm, and evidence-based. The words matter as much as the numbers.",table:{headers:["Never say","Say instead"],rows:[["'Guaranteed 8% return'","'Based on REAKH verified data, net yield range is 5–7%'"],["'You should buy now — prices are rising'","'The REAKH data shows transaction volume up 25% in 2025. Timing is a consideration.'"],["'This is a great opportunity'","'This project has a verified delivery record. Here are the facts.'"],["'Don't worry about CGT'","'CGT applies at exit. Here is the calculation on your scenario.'"],["'Other Japanese investors are buying'","Never use social proof as a pressure tactic. Present data instead."]]}}],roleplay:{scenario:"Opening a first meeting with a Japanese investor",instructions:"Practice the risk-first sequence. Time yourself — risks should come before any project name.",lines:[{role:"agent",text:'"Tanaka-san, before I share anything about our projects — may I ask what is most important to you in this investment? Is it income stability, capital preservation, or a combination?"'},{role:"client",text:'"Capital safety first. Income is secondary."'},{role:"agent",text:'"That is very helpful. I want to be transparent with you about how this market works before we discuss any specific project. Cambodia is a growing market, but exit liquidity is not yet at the level of Japan or Singapore. If you needed to sell in 2–3 years, that could be challenging. For a 7–10 year hold with rental income, the data is much more supportive."'},{role:"client",text:'"I understand. What does the rental income look like in practice?"'},{role:"agent",text:'"Based on a verified REAKH case study — a real transaction, not a projection — a 2-bedroom in BKK1 rented at $1,083/month net after management fees, at 90% occupancy. Over 5 years, that generated $23,392 in net rental income, and the unit appreciated by $27,245. Total return: 34% over 5 years."'},{role:"note",text:"Debrief: Did risk come first? Was the ROI data presented as verified fact, not as a sales pitch?"}],debrief:"A Japanese client who hears risks before returns will trust you more, not less. That trust is what makes them act — on their timeline, not yours."},quiz:[{q:"With a Japanese investor, you should present risks:",opts:["After showing the projects — to avoid dampening enthusiasm","Only if the client asks about them","Before presenting any specific project — always","At the end of the meeting as a brief disclaimer"],correct:2,explain:"Risks come first with Japanese investors — every time. This is the PHC Japanese investor protocol. Presenting returns before risks signals a salesperson, not an advisor."},{q:"A Japanese client says 'I need to discuss with my family before deciding.' You should:",opts:["Increase urgency — offer a limited time price","Thank them and prepare a shareable written summary for the family discussion","Mark them as low-priority and focus on faster-moving leads","Call them every day until they respond"],correct:1,explain:"Family consensus is a normal and respected part of the Japanese decision process. Prepare a clear, professional summary they can share with family or advisors. This is a buying signal, not a stall."},{q:"The two highest-trust projects for Japanese investors in the PHC portfolio are:",opts:["Le Condé and Royal Platinum","Time Square 9 and G.A.T.O Tower","J Tower 2 / J Tower 3 (Tanichu) and Le Condé (Hopetree Japan)","Peninsula and Time Square 8"],correct:2,explain:"J Tower 3 / J Tower 2 because Tanichu is a Japanese developer — the highest cultural trust signal for Japanese buyers. Le Condé because Hopetree Japan management is recognised and trusted in the Japanese market."},{q:"Same-day written follow-up after a Japanese investor meeting is:",opts:["Nice to have if you have time","Optional — most Japanese investors prefer phone follow-up","Non-negotiable — it summarises risks, net yield data, and agreed next step","Only required after a second meeting"],correct:2,explain:"Same-day written follow-up is the most reliable trust-building act in the PHC Japanese investor protocol. It demonstrates professionalism at a standard Japanese investors expect. It is not optional."}],reflection:"Write the first 3 sentences you would say to open a meeting with a 55-year-old Japanese investor — in a way that builds trust before any product is mentioned.",km:{"title":"ពិធីសារសម្រាប់អ្នកវិនិយោគជប៉ុន","short":"ពិធីសារជប៉ុន","objectives":["យល់ដឹងឱ្យបានច្បាស់លាស់ពីរបៀបដែលអ្នកវិនិយោគជប៉ុនគិតអំពីហានិភ័យ និងការសម្រេចចិត្ត","ស្គាល់ពីពិធីសារជាក់លាក់របស់ PHC សម្រាប់គ្រប់ដំណាក់កាលនៃការសន្ទនាក្នុងការស្វែងយល់ពីអ្នកវិនិយោគជប៉ុន","អាចតម្រង់តុងសំឡេង ភស្តុតាង និងការតាមដានបន្តឱ្យត្រូវតាមស្តង់ដារវិជ្ជាជីវៈរបស់ជប៉ុន"],"sections":[{"label":"ការយល់ដឹងពីប្រវត្តិរូបអតិថិជន","heading":"តើនរណាជាបុគ្គលដែលអ្នកកំពុងជជែកជាមួយ","body":"អ្នកវិនិយោគជប៉ុននៅកម្ពុជា ជាទូទៅគឺជាអ្នកជំនាញដែលមានអាយុចន្លោះពី ៤០ ដល់ ៦០ ឆ្នាំ មានប្រាក់ចំណូលខ្ពស់ កម្រិតទទួលយកហានិភ័យទាប និងមានចំណូលចិត្តខ្លាំងលើស្ថិរភាពជាងផលចំណេញខ្ពស់។ ពួកគាត់មានចក្ខុវិស័យរយៈពេលវែង មិនទុកចិត្តលើការប្រញាប់ប្រញាល់ និងត្រូវការភស្តុតាងដែលអាចផ្ទៀងផ្ទាត់បានមុនពេលធ្វើការសម្រេចចិត្តណាមួយ។ ទំនុកចិត្តគឺជាច្រកចូលដំបូង — ប្រសិនបើគ្មានវាទេ គ្មានការពិភាក្សាលើផលិតផលណាអាចទៅរួចឡើយ។","box":{"title":"ប្រវត្តិរូបអ្នកវិនិយោគជប៉ុន — ក្របខ័ណ្ឌការងារ PHC៖","lines":["អាយុ៖ ជាទូទៅ 40–65 ឆ្នាំ · ប្រាក់ចំណូល៖ អ្នករកចំណូលបានខ្ពស់ · កម្រិតទទួលយកហានិភ័យ៖ ទាប","គោលដៅចម្បង៖ ចំណូលអកម្មដែលមានស្ថិរភាព + ការរក្សាដើមទុន","រចនាប័ទ្មសម្រេចចិត្ត៖ មានលំដាប់លំដោយ ផ្អែកលើភស្តុតាង ការឯកភាពគ្នាជាមួយគ្រួសារ ឬទីប្រឹក្សា","បទដ្ឋានវប្បធម៌៖ ការគោរពឋានានុក្រម ការទំនាក់ទំនងដែលមានរចនាសម្ព័ន្ធ គ្មានសម្ពាធ","គម្រោងដែលស័ក្តិសមបំផុត៖ J Tower 2 / J Tower 3 (ក្រុមហ៊ុនអភិវឌ្ឍន៍ Tanichu), Le Condé (ការគ្រប់គ្រង Hopetree Japan)","ភាសា៖ ផ្តល់ការតាមដានជាលាយលក្ខណ៍អក្សរជានិច្ច ប្រសិនបើអាច ផ្តល់ការសង្ខេបជាភាសាជប៉ុន"]}},{"label":"ពិធីសារ — ជំហានតាមជំហាន","heading":"រាល់ការសន្ទនាដើរតាមរចនាសម្ព័ន្ធច្បាស់លាស់នេះ","body":"ជាមួយអ្នកវិនិយោគជប៉ុន លំដាប់លំដោយមិនមែនជាអ្វីដែលអាចបត់បែនបានតាមចិត្តឡើយ។ ការលោតផ្លោះរំលងលំដាប់នេះ — ជាពិសេសការបង្ហាញផលចំណេញមុននឹងនិយាយពីហានិភ័យ — បង្ហាញពីភាពមិនស្ទាត់ជំនាញ និងបញ្ចប់ទំនាក់ទំនងភ្លាមៗ។","rules":[{"title":"ជំហានទី ១៖ បើកឆាកដោយការគោរព មិនមែនដោយផលិតផលឡើយ","detail":"'Nakamura-san អរគុណលោកដែលបានចំណាយពេលមកជួបពួកយើង។ មុនពេលខ្ញុំចែករំលែកព័ត៌មានអំពីគម្រោងរបស់យើង ខ្ញុំសូមស្វែងយល់ពីគោលដៅ និងការព្រួយបារម្ភរបស់លោកជាមុនសិន។' មិនត្រូវចាប់ផ្តើមដោយគម្រោងជាដាច់ខាត។"},{"title":"ជំហានទី ២៖ ទម្លាយហានិភ័យមុនផលចំណេញ — ជានិច្ចកាល","detail":"ហានិភ័យសភាពសាច់ប្រាក់នៃការលក់ចេញ (Exit liquidity) មុនគេ។ បន្ទាប់មកភាពជាក់ស្តែងនៃផលចំណេញ។ បន្ទាប់មកប្រវត្តិស្នាដៃក្រុមហ៊ុនអភិវឌ្ឍន៍។ បន្ទាប់មក CGT។ វិធាន PHC៖ អតិថិជនជប៉ុនត្រូវតែលឺពីផលអវិជ្ជមានមុនផលវិជ្ជមាន។ នេះជាអ្វីដែលបង្កើតទំនុកចិត្ត មិនមែនបំផ្លាញវាឡើយ។"},{"title":"ជំហានទី ៣៖ បង្ហាញយ៉ាងច្រើន ២ គម្រោង — ជាមួយនឹងភស្តុតាង","detail":"J Tower 3 ឬ J Tower 2 សម្រាប់ភាពស្គាល់គ្នាជាមួយ Tanichu។ Le Condé សម្រាប់ការគ្រប់គ្រង Hopetree Japan។ មិនត្រូវលើសពី ២ គម្រោងឡើយ។ បញ្ជាក់ពីហេតុផលនៃគម្រោង ,"text":"\"Tanaka-san មុនពេលខ្ញុំចែករំលែកអ្វីមួយអំពីគម្រោងរបស់យើង — តើខ្ញុំអាចសួរបានទេថា អ្វីជាចំណុចសំខាន់បំផុតសម្រាប់លោកក្នុងការវិនិយោគនេះ? តើវាជាស្ថិរភាពប្រាក់ចំណូល ការរក្សាដើមទុន ឬទាំងពីរ?\""},{"role":"client","text":"\"សុវត្ថិភាពដើមទុនជាចម្បង។ ប្រាក់ចំណូលជារឿងបន្ទាប់បន្សំ។\""},{"role":"agent","text":"\"នោះជាព័ត៌មានមានប្រយោជន៍ណាស់។ ខ្ញុំចង់មានភាពស្មោះត្រង់ជាមួយលោកអំពីរបៀបដែលទីផ្សារនេះដំណើរការ មុនពេលយើងពិភាក្សាអំពីគម្រោងជាក់លាក់ណាមួយ។ កម្ពុជាគឺជាទីផ្សារកំពុងកើនឡើង ប៉ុន្តែសភាពសាច់ប្រាក់នៃការលក់ចេញ (Exit liquidity) មិនទាន់ដល់កម្រិតប្រទេសជប៉ុន ឬសិង្ហបុរីនៅឡើយទេ។ ប្រសិនបើលោកត្រូវការលក់វិញក្នុងរយៈពេល ២–៣ ឆ្នាំ វាអាចនឹងមានបច្ច័យប្រឈម។ សម្រាប់ការកាន់កាប់រយៈពេល ៧–១០ ឆ្នាំ ដើម្បីទទួលបានចំណូលជួល ទិន្នន័យគាំទ្ររឿងនេះបានល្អជាង។\""},{"role":"client","text":"\"ខ្ញុំយល់ហើយ។ ចុះប្រាក់ចំណូលពីការជួលវិញ មានទិដ្ឋភាពយ៉ាងម៉េចដែរក្នុងអនុវត្តជាក់ស្តែង?\""},{"role":"agent","text":"\"ផ្អែកលើការសិក្សាករណីដែលបានផ្ទៀងផ្ទាត់របស់ REAKH — ដែលជាប្រតិបត្តិការទិញលក់ពិតប្រាកដ មិនមែនជាការប៉ាន់ប្រមាណ — យូនីតបន្ទប់គេង ២ នៅ BKK1 ជួលបាន $1,083/ខែ សុទ្ធ បន្ទាប់ពីដកថ្លៃគ្រប់គ្រង នៅអត្រាអ្នកស្នាក់នៅ 90%។ ក្នុងរយៈពេល ៥ ឆ្នាំ វាបង្កើតប្រាក់ចំណូលជួលសុទ្ធបាន $23,392 ហើយយូនីតនោះបានកើនតម្លៃ $27,245។ ផលចំណេញសរុប៖ 34% ក្នុងរយៈពេល ៥ ឆ្នាំ។\""},{"role":"note","text":"ការបូកសរុបសង្ខេប៖ តើហានិភ័យត្រូវបានលើកមកនិយាយមុនគេដែរឬទេ? តើទិន្នន័យ ROI ត្រូវបានបង្ហាញជាអង្គហេតុពិតដែលបានផ្ទៀងផ្ទាត់ មិនមែនជាការអូសទាញលក់ដែរឬទេ?"}],"debrief":"អតិថិជនជប៉ុនដែលបានលឺពីហានិភ័យមុនផលចំណេញ នឹងទុកចិត្តអ្នកកាន់តែខ្លាំង មិនមែនតិចជាងមុននោះទេ។ ទំនុកចិត្តនោះហើយដែលធ្វើឱ្យពួកគាត់ធ្វើសកម្មភាព — តាមកាលវិភាគរបស់ពួកគាត់ មិនមែនរបស់អ្នកឡើយ។"},"quiz":[{"q":"ជាមួយអ្នកវិនិយោគជប៉ុន អ្នកគួរតែបង្ហាញហានិភ័យ៖","opts":["បន្ទាប់ពីបង្ហាញគម្រោងរួច — ដើម្បីចៀសវាងការធ្វើឱ្យបាត់បង់ការចាប់អារម្មណ៍","លុះត្រាតែអតិថិជនសួរនាំអំពីវា","មុនពេលបង្ហាញគម្រោងជាក់លាក់ណាមួយ — ជានិច្ចកាល","នៅចុងបញ្ចប់នៃជំនួបជាការបញ្ជាក់ជូនសង្ខេប"],"correct":2,"explain":"ហានិភ័យត្រូវតែមកមុនគេជាមួយអ្នកវិនិយោគជប៉ុន — គ្រប់ពេលវេលា។ នេះគឺជាពិធីសារសម្រាប់អ្នកវិនិយោគជប៉ុនរបស់ PHC។ ការបង្ហាញផលចំណេញមុនហានិភ័យ បង្ហាញពីលក្ខណៈអ្នកលក់ មិនមែនជាទីប្រឹក្សាឡើយ។"},{"q":"អតិថិជនជប៉ុននិយាយថា 'ខ្ញុំត្រូវពិភាក្សាជាមួយគ្រួសារមុនពេលសម្រេចចិត្ត។' អ្នកគួរតែ៖","opts":["បង្កើតភាពបន្ទាន់បន្ថែម — ផ្តល់ជូនតម្លៃដែលមានកំណត់ពេល","ថ្លែងអរគុណពួកគាត់ ហើយរៀបចំសេចក្តីសង្ខេបជាលាយលក្ខណ៍អក្សរដែលអាចចែករំលែកបានសម្រាប់យកទៅពិភាក្សាជាមួយគ្រួសារ","កំណត់សម្គាល់ពួកគាត់ថាជាអតិថិជនអាទិភាពទាប ហើយផ្តោតលើអតិថិជនដែលសម្រេចចិត្តលឿនជាង","ហៅទូរស័ព្ទទៅពួកគាត់រៀងរាល់ថ្ងៃរហូតដល់ពួកគាត់ឆ្លើយតប"],"correct":1,"explain":"ការឯកភាពគ្នាក្នុងគ្រួសារ គឺជាផ្នែកធម្មតា និងទទួលបានការគោរពនៃដំណើរការសម្រេចចិត្តរបស់ជនជាតិជប៉ុន។ ត្រូវរៀបចំសេចក្តីសង្ខេបច្បាស់លាស់ និងមានវិជ្ជាជីវៈ ដែលពួកគាត់អាចយកទៅចែករំលែកជាមួយគ្រួសារ ឬទីប្រឹក្សាបាន។ នេះជាសញ្ញាទិញ មិនមែនជាការគេចវេះឡើយ។"},{"q":"គម្រោងពីរដែលមានទំនុកចិត្តខ្ពស់បំផុតសម្រាប់អ្នកវិនិយោគជប៉ុននៅក្នុងផលប័ត្រ PHC គឺ៖","opts":["Le Condé និង Royal Platinum","Time Square 9 និង G.A.T.O Tower","J Tower 2 / J Tower 3 (Tanichu) និង Le Condé (Hopetree Japan)","Peninsula និង Time Square 8"],"correct":2,"explain":"J Tower 3 / J Tower 2 ដោយសារតែ Tanichu គឺជាក្រុមហ៊ុនអភិវឌ្ឍន៍ជប៉ុន — ដែលជាសញ្ញាទំនុកចិត្តផ្នែកវប្បធម៌ខ្ពស់បំផុតសម្រាប់អ្នកទិញជប៉ុន។ Le Condé ដោយសារតែការគ្រប់គ្រងរបស់ Hopetree Japan ត្រូវបានទទួលស្គាល់ និងទុកចិត្តនៅក្នុងទីផ្សារជប៉ុន។"},{"q":"ការតាមដានជាលាយលក្ខណ៍អក្សរនៅថ្ងៃដដែលបន្ទាប់ពីជំនួបជាមួយអ្នកវិនិយោគជប៉ុនគឺ៖","opts":["ជារឿងល្អប្រសិនបើអ្នកមានពេល","ជម្រើសបត់បែន — អ្នកវិនិយោគជប៉ុនភាគច្រើនចូលចិត្តការតាមដានតាមទូរស័ព្ទ","រឿងដាច់ខាតមិនអាចរំលងបាន — វាសង្ខេបពីហានិភ័យ ទិន្នន័យផលចំណេញសុទ្ធ និងជំហានបន្ទាប់ដែលបានព្រមព្រៀង","តម្រូវឱ្យធ្វើតែបន្ទាប់ពីជំនួបលើកទីពីរប្រៀបធៀបប៉ុណ្ណោះ"],"correct":2,"explain":"ការតាមដានជាលាយលក្ខណ៍អក្សរនៅថ្ងៃដដែល គឺជាសកម្មភាពបង្កើតទំនុកចិត្តដែលគួរឱ្យទុកចិត្តបំផុតនៅក្នុងពិធីសារសម្រាប់អ្នកវិនិយោគជប៉ុនរបស់ PHC។ វាបង្ហាញពីវិជ្ជាជីវៈក្នុងស្តង់ដារដែលអ្នកវិនិយោគជប៉ុនរំពឹងទុក។ វាជារឿងមិនអាចរំលងបានឡើយ។"}]}},
{id:13,week:3,title:"The European & German Investor Protocol",short:"European Protocol",objectives:["Understand the decision-making style and priorities of German and European investors","Know how to present yield data, legal structure, and downside scenarios in a way that resonates","Avoid the communication mistakes that consistently lose European clients"],sections:[{label:"Understanding the Profile",heading:"Logic, precision, and downside protection",body:"German and European investors approaching Cambodia real estate are typically analytically oriented, financially literate, and highly skeptical of promotional language. They respond to structure, data, and clearly stated downside scenarios. Emotional language, vague guarantees, and lifestyle framing will immediately signal an unprepared advisor.",box:{title:"European investor profile — PHC framework:",lines:["Age: 45–65 · Profile: pre-retirement, professional, often high net worth","Primary goal: reliable monthly income to supplement pension or savings","Decision style: logical, comparative, requires written documentation","Risk tolerance: moderate — will accept risk if it is clearly quantified","Best-fit projects: Le Condé (institutional management), Peninsula (yield focus), Royal Platinum (completed, stable)","Key advisor: Reza — PHC co-founder, European advisor specialist"]}},{label:"What Europeans Need to Hear",heading:"Structure the conversation around three questions",body:"Every European investor has three core questions, whether they ask them explicitly or not. Answer all three — with data — before they ask.",rules:[{title:"Question 1: What is my actual monthly income?",detail:"Net rental yield after all costs. Not gross. Example: $150K unit in BKK1, $800 rent, minus $117 management, minus $112 tax = approximately $571/month net. Annual = ~$6,852. Net yield ~4.6% on total investment including stamp duty."},{title:"Question 2: What is my downside scenario?",detail:"Exit liquidity is the main risk. Cambodia is not liquid like Germany or France. If you needed to sell in 2–3 years, you may not find a buyer at your target price. Long-term hold (7–10 years) mitigates this significantly."},{title:"Question 3: What is the legal protection?",detail:"Strata title freehold is genuine legal ownership — registered at the Ministry of Land, backed by Cambodian law. The 70% foreign quota ensures foreigners are protected as a voting majority cannot be reached. SPA review by an independent lawyer is standard and expected."}]},{label:"Common Mistakes",heading:"What consistently loses European clients",body:"These are the specific communication patterns that cause European and German investors to disengage.",rules:[{title:"Using emotional language",detail:"'Beautiful lifestyle,' 'vibrant community,' 'you'll love living here' — these phrases signal you don't understand who you're talking to. European investors want ROI, not lifestyle copy."},{title:"Leading with upside without naming downside",detail:"Presenting appreciation potential without CGT, exit liquidity, or vacancy risk is a red flag to an analytical investor. They will spot it — and they won't come back."},{title:"Failing to involve Reza",detail:"Reza is PHC's European investor specialist. If the client profile is German or wider European, involve Reza from the second conversation. Not doing so is a missed advantage."},{title:"Sending informal follow-ups",detail:"European professionals expect structured, written communication. A WhatsApp voice note is not appropriate. A PDF summary with data, risks, and a clear next step is."}]}],roleplay:{scenario:"Presenting net yield to a German investor",instructions:"Practice presenting costs before income — no emotional language anywhere.",lines:[{role:"client",text:'"I want to understand the real numbers. What is the net yield after all costs?"'},{role:"agent",text:'"Good question — and I want to give you the precise figure. Let\'s take a completed 1-bedroom in BKK1 at $150,000. Rental income: $800/month gross. Building management fee at $1.8/sqm on a 53sqm unit: $95/month. Rental income tax at 14% for non-residents: $112/month. Net income: approximately $593/month — $7,116/year."'},{role:"client",text:'"So that\'s 4.7% on $150,000?"'},{role:"agent",text:'"Correct. 4.7% net cash yield on total purchase price before stamp duty. Including the 4% transfer tax, your total investment is around $156,000. Net yield drops to approximately 4.5%. However, the verified REAKH case study on J Tower 2 shows that capital appreciation of $27,245 over 5 years added 18% to total return. Combined, the 5-year average was 6.85% per year."'},{role:"note",text:"Debrief: Was the yield presented step-by-step? Did the Agent show their working? Was there any emotional language?"}],debrief:"German and European investors do not want a sales pitch. They want an advisor who can show their working. If you can do the math live in a conversation, you will win the trust."},quiz:[{q:"A German investor asks 'what is my actual monthly income on a $150K BKK1 unit?' The correct answer is:",opts:["$800 — that is the market rental rate","$686 — after management fees only","Approximately $570–$600 net — after management fees and 14% rental tax","$1,083 — based on the REAKH case study"],correct:2,explain:"$800 gross minus ~$95 management fee minus ~$112 rental tax (14% for non-residents) = approximately $593/month net. Always show the deductions line by line — this is what European investors respect."},{q:"A European investor asks about downside scenarios. You should:",opts:["Redirect to the upside — focus on the opportunity","Acknowledge exit liquidity risk specifically and quantify it","Tell them Cambodia is as safe as Singapore","Give a vague answer about market uncertainty"],correct:1,explain:"Name the specific downside: exit liquidity is the primary risk. Cambodia is improving but is not liquid. A 2–3 year hold could be problematic if they need to sell. A 7–10 year hold substantially reduces this risk. Always be specific — vague risk disclaimers are not credible."},{q:"When should Reza be involved in a European investor conversation?",opts:["Only if the client asks about German language support","Only for clients investing over $300K","From the second conversation onwards for any German or European buyer","Only at the closing stage"],correct:2,explain:"Reza is PHC's European investor specialist. Involving him early — from the second meeting — is a competitive advantage. Not doing so means you are not deploying the team effectively."},{q:"Which communication format is appropriate for European investor follow-up?",opts:["WhatsApp voice note — fast and personal","A verbal summary at the end of the meeting","A structured PDF or written document with data, risks, and clear next step","Email with a project brochure attached"],correct:2,explain:"European professionals expect structured, written, data-led communication. A PDF summary with net yield calculation, risks named, and a clear next step is the PHC standard. A brochure alone is not enough — it lacks the analysis layer the client expects."}],reflection:"Write a 3-paragraph written follow-up summary for a German client who has just attended their first PHC meeting and shown interest in Le Condé BKK1.",km:{"title":"ពិធីសារសម្រាប់អ្នកវិនិយោគអឺរ៉ុប និងអាល្លឺម៉ង់","short":"ពិធីសារអឺរ៉ុប","objectives":["យល់ដឹងពី រចនាប័ទ្មនៃការសម្រេចចិត្ត និងអាទិភាពរបស់អ្នកវិនិយោគអាល្លឺម៉ង់ និងអឺរ៉ុប","ស្គាល់ពីរបៀបបង្ហាញទិន្នន័យផលចំណេញ រចនាសម្ព័ន្ធផ្លូវច្បាប់ និងសេនារីយ៉ូហានិភ័យអវិជ្ជមានតាមរបៀបដែលទាក់ទាញចិត្ត","ចៀសវាងកំហុសឆ្គងនៃការទំនាក់ទំនងដែលបំផ្លាញទំនាក់ទំនងជាមួយអតិថិជនអឺរ៉ុបជាញឹកញាប់"],"sections":[{"label":"ការយល់ដឹងពីប្រវត្តិរូបអតិថិជន","heading":"តក្កវិជ្ជា ភាពច្បាស់លាស់ និងការការពារហានិភ័យអវិជ្ជមាន","body":"អ្នកវិនិយោគអាល្លឺម៉ង់ និងអឺរ៉ុបដែលចាប់អារម្មណ៍លើអចលនទ្រព្យនៅកម្ពុជា ជាទូទៅគឺជាមនុស្សចូលចិត្តការវិភាគ មានចំណេះដឹងផ្នែកហិរញ្ញវត្ថុ និងមានការសង្ស័យខ្ពស់លើភាសាផ្សព្វផ្សាយអូសទាញ។ ពួកគាត់ឆ្លើយតបទៅនឹងរចនាសម្ព័ន្ធ ទិន ត្ថិភាពដូចសិង្ហបុរីដែរ","ផ្តល់ចម្លើយមិនច្បាស់លាស់អំពីភាពមិនប្រាកដប្រជានៃទីផ្សារ"],"correct":1,"explain":"បញ្ជាក់ពីហានិភ័យអវិជ្ជមានជាក់លាក់៖ សភាពសាច់ប្រាក់នៃការលក់ចេញ គឺជាហានិភ័យចម្បង។ កម្ពុជាកំពុងតែល្អប្រសើរ ប៉ុន្តែមិនទាន់មានសភាពសាច់ប្រាក់រហ័សឡើយ។ ការកាន់កាប់រយៈពេល ២–៣ ឆ្នាំ អាចមានបច្ច័យប្រឈម ប្រសិនបើពួកគាត់ត្រូវការលក់។ ការកាន់កាប់រយៈពេល ៧–១០ ឆ្នាំ កាត់បន្ថយហានិភ័យនេះបានយ៉ាងច្រើន។ ត្រូវនិយាយឱ្យចំៗជានិច្ច — ការបដិសេធហានិភ័យមិនច្បាស់លាស់ គឺគ្មានភាពគួរឱ្យជឿជាក់ឡើយ។"},{"q":"តើនៅពេលណាដែល Reza គួរតែចូលរួមក្នុងការសន្ទនាជាមួយអ្នកវិនិយោគអឺរ៉ុប?","opts":["លុះត្រាតែអតិថិជនសួររកការគាំទ្រជាភាសាអាល្លឺម៉ង់","សម្រាប់តែអតិថិជនដែលវិនិយោគលើសពី $300K ប៉ុណ្ណោះ","ចាប់ពីការសន្ទនាលើកទីពីរតទៅ សម្រាប់អ្នកទិញជាតិអាល្លឺម៉ង់ ឬអឺរ៉ុបគ្រប់រូប","លុះត្រាតែដល់ដំណាក់កាលបិទការលក់"],"correct":2,"explain":"Reza គឺជាទីប្រឹក្សាជំនាញសម្រាប់អតិថិជនអឺរ៉ុបរបស់ PHC។ ការបញ្ជូនគាត់ឱ្យចូលរួមតាំងពីដំបូង — ចាប់ពីជំនួបលើកទីពីរ — គឺជាប្រៀបប្រកួតប្រជែង។ ការមិនធ្វើបែបនេះ មានន័យថាអ្នកមិនបានប្រើប្រាស់ក្រុមការងារឱ្យមានប្រសិទ្ធភាពឡើយ។"},{"q":"តើទម្រង់នៃការទំនាក់ទំនងមួយណាដែលសមស្របសម្រាប់ការតាមដានអតិថិជនអឺរ៉ុប?","opts":["សារសំឡេងតាម WhatsApp — លឿន និងស្និទ្ធស្នាល","ការសង្ខេបដោយផ្ទាល់មាត់នៅចុងបញ្ចប់នៃជំនួប","ឯកសារ PDF ឬឯកសារជាលាយលក្ខណ៍អក្សរដែលមានរចនាសម្ព័ន្ធ ជាមួយទិន្នន័យ ហានិភ័យ និងជំហានបន្ទាប់ច្បាស់លាស់","អ៊ីមែលដែលភ្ជាប់មកជាមួយកាតាឡុកគម្រោង"],"correct":2,"explain":"អ្នកជំនាញអឺរ៉ុបរំពឹងទទួលបានការទំនាក់ទំនងជាលាយលក្ខណ៍អក្សរ ដឹកនាំដោយទិន្នន័យ និងមានរចនាសម្ព័ន្ធ។ សេចក្តីសង្ខេបជា PDF ដែលមានការគណនាផលចំណេញសុទ្ធ ការបញ្ជាក់ហានិភ័យ និងជំហានបន្ទាប់ច្បាស់លាស់ គឺជាស្តង់ដារ PHC។ កាតាឡុកតែមួយមុខគឺមិនគ្រប់គ្រាន់ឡើយ — វាខ្វះស្រទាប់នៃការវិភាគដែលអតិថិជនរំពឹងទុក។"}]}},
{id:14,week:3,title:"Serving Khmer & Overseas Cambodian Clients",short:"Khmer Clients",objectives:["Understand what local Khmer and overseas Cambodian clients value most","Know how to adapt communication, project selection, and decision support for each sub-segment","Avoid the assumptions that damage trust with Cambodian-heritage clients"],sections:[{label:"Two Distinct Sub-Segments",heading:"Not one group — two different conversations",body:"'Khmer client' is not a single profile. Local Khmer end-users and overseas Cambodians have different goals, different decision speeds, and different emotional drivers. Treating them as one group is the first mistake most agents make.",grid:[["Local Khmer end-user","25–50, Phnom Penh-based, lifestyle upgrade or family home. Values: community, school proximity, developer reputation, payment flexibility. Slower decision — family consensus required."],["Overseas Cambodian","30–55, based abroad (USA, France, Australia, Canada). Goal: investment + family connection + capital preservation. Often faster to decide. Needs: clear remote process, walkthrough support, reliable documentation."]]},{label:"Local Khmer Client Protocol",heading:"Family, community, and comfort first",body:"Local Khmer buyers are motivated by the idea of a safe, modern home for their family in a trusted community. They are not primarily yield-driven. Developer reputation and project track record matter more than ROI calculations.",rules:[{title:"Lead with safety and community — not returns",detail:"'This development is by Megakim — 7 completed projects, all delivered on time. The building has 24-hour security, a school nearby, and a residents community.' This framing resonates. Net yield does not."},{title:"Payment flexibility is a decision driver",detail:"Many local buyers are sensitive to payment schedule. Know the instalment plans for every project. Some offer up to 50% due at completion — this significantly reduces risk during construction. Feature this prominently."},{title:"Support family consensus — don't rush it",detail:"Decisions will involve parents, siblings, or spouses. This is not a delay — it is the process. Prepare materials they can take home and share. Offer a joint meeting with family if needed."},{title:"Language and warmth",detail:"Communicate in Khmer where possible. Tone should be warm, respectful, and community-focused. Avoid financial jargon — use plain language about what the home will feel like to live in."}]},{label:"Overseas Cambodian Protocol",heading:"Remote buyers need extra support — not less rigour",body:"Overseas Cambodians are often faster to commit than local buyers, but they carry specific anxieties about buying remotely: developer trust, documentation security, and the ability to manage from abroad.",rules:[{title:"Prioritise developer track record loudly",detail:"'Megakim has delivered 7 projects. Here are the handover photos from Time Square 8. Here is the strata title certificate.' Overseas buyers cannot visit easily — verified delivery evidence is the substitute for a site visit."},{title:"Remote process must be airtight",detail:"Provide: clear payment schedule in writing, digital SPA review process, title transfer documentation, and property management options. 'You don't need to be here' only works if you can back it up."},{title:"Respond fast",detail:"Overseas Cambodians often make decisions across time zones with narrow windows of availability. Response time matters more than with local clients. Missed messages are missed deals."},{title:"WhatsApp and Telegram are the right channels",detail:"These clients are not in the office. They are on their phones. Use the channels that work for them — with professional content, not casual voice notes."}]}],roleplay:{scenario:"Handling a family decision process for a local Khmer buyer",instructions:"Practice supporting the consensus without creating urgency.",lines:[{role:"client",text:'"I like the unit in Time Square 11. But I need to talk with my parents first."'},{role:"agent",text:'"Of course — that\'s completely normal. I\'d like to help make that conversation as easy as possible for you."'},{role:"client",text:'"What should I tell them?"'},{role:"agent",text:'"Let me prepare a simple summary — the project name, developer track record, payment plan, and what the monthly cost looks like. Something clear they can read without needing to know the full background. Would that help?"'},{role:"client",text:'"Yes, that would be very helpful."'},{role:"agent",text:'"I\'ll send it to you today. If it would be useful, I\'m also happy to join a meeting with your family — by phone or in person — to answer any questions they have directly."'},{role:"note",text:"Debrief: Did the Agent resist creating urgency? Did they actively support the family process?"}],debrief:"For Khmer clients, the family is part of the decision. Support it — not just tolerate it. An agent who makes the family feel respected will close the deal. An agent who creates pressure will lose it."},quiz:[{q:"A local Khmer buyer says 'my parents want to see the building first.' You should:",opts:["Tell them they can visit after booking to save the unit","Offer to arrange a site visit for the whole family as a priority","Explain that the project is off-plan and not visitable","Send them a video instead — site visits take too long"],correct:1,explain:"Site visits for family members are part of the Khmer client process. Facilitate them proactively. A family that has seen the building is far more likely to support the decision."},{q:"An overseas Cambodian client contacts you from Los Angeles at 10pm Cambodia time. You should:",opts:["Reply the next morning — client should expect time zone delays","Reply as soon as possible — response speed is a trust signal for overseas buyers","Ask them to call during business hours","Send a brochure and follow up during PP office hours"],correct:1,explain:"Overseas Cambodian clients operate across time zones with limited availability windows. Fast response is a competitive differentiator. A delayed response sends the client to another agency."},{q:"For local Khmer buyers, the most important project selection factor is:",opts:["Net yield and ROI projections","Developer reputation, payment flexibility, and community feel","Price per sqm vs comparable districts","Foreign ownership eligibility"],correct:1,explain:"Local Khmer end-users are driven by community, safety, family suitability, and payment flexibility — not yield calculations. PHC projects like Time Square 11 BKK3 and Royal Platinum Toul Kork lead with these qualities."},{q:"When preparing materials for a Khmer buyer's family discussion, you should include:",opts:["The full investment analysis with yield tables","A simple, clear summary: project name, developer track record, payment plan, monthly cost","Only the developer brochure — let the family research independently","A price comparison vs other projects in the same area"],correct:1,explain:"Keep it simple and clear. The family needs enough to feel confident — not overwhelmed. Developer track record and payment plan are the two most important reassurance points for local Khmer families."}],reflection:"Think about the differences between how you would open a conversation with a 35-year-old Khmer professional buying their first home, versus a 45-year-old Cambodian-American looking to invest remotely. What changes — and what stays the same?",km:{"title":"ការបម្រើសេវាកម្មជូនអតិថិជនខ្មែរក្នុងស្រុក និងអាណិកជនខ្មែរនៅបរទេស","short":"អតិថិជនខ្មែរ","objectives":["យល់ដឹងពីអ្វីដែលអតិថិជនខ្មែរក្នុងស្រុក និងអាណិកជនខ្មែរនៅបរទេសឱ្យតម្លៃបំផុត","ស្គាល់ពីរបៀបតម្រង់ការទំនាក់ទំនង ការជ្រើសរើសគម្រោង និងការគាំទ្រការសម្រេចចិត្តសម្រាប់ផ្នែកអតិថិជននីមួយៗ","ចៀសវាងការសន្មតទាំងឡាយដែលបំផ្លាញទំនុកចិត្តជាមួយអតិថិជនដែលមានប្រភពដើមជាជនជាតិខ្មែរ"],"sections":[{"label":"ផ្នែកអតិថិជនពីរផ្សេងគ្នា","heading":"មិនមែនជាក្រុមតែមួយឡើយ — គឺជាការសន្ទនាពីរផ្សេងគ្នា","body":"'អតិថិជនខ្មែរ' មិនមែនជាប្រវត្តិរូបតែមួយនោះទេ។ អ្នកទិញរស់នៅផ្ទាល់ជាជនជាតិខ្មែរក្នុងស្រុក និងអាណិកជនខ្មែរនៅបរទេស មានគោលដៅខុសគ្នា ល្បឿននៃការសម្រេចចិត្តខុសគ្នា និងកត្តាកម្មសិទ្ធិផ្លូវអារម្មណ៍ខុសគ្នា។ ការប្រព្រឹត្តទៅលើពួកគាត់ដូចជាក្រុមតែមួយ គឺជាកំហុសដំបូងដែលភ្នាក់ងារភាគច្រើនប្រព្រឹត្ត។","grid":[["អ្នកទិញរស់នៅផ្ទាល់ជាជនជាតិខ្មែរក្នុងស្រុក","អាយុ 25–50 ឆ្នាំ អភិវឌ្ឍនៅភ្នំពេញ ការផ្លាស់ប្តូររបៀបរស់នៅ ឬផ្ទះសម្រាប់គ្រួសារ។ តម្លៃ៖ សហគមន៍ ជិតសាលារៀន កេរ្តិ៍ឈ្មោះក្រុមហ៊ុនអភិវឌ្ឍន៍ ភាពបត់បែននៃការបង់ប្រាក់។ ការសម្រេចចិត្តយឺតជាង — ត្រូវការការឯកភាពគ្នាក្នុងគ្រួសារ។"],["អាណិកជនខ្មែរនៅបរទេស","អាយុ 30–55 ឆ្នាំ រស់នៅបរទេស (អាមេរិក បារាំង អូស្ត្រាលី កាណាដា)។ គោលដៅ៖ ការវិនិយោគ + ការភ្ជាប់ទំនាក់ទំនងគ្រួសារ + ការរក្សាដើមទុន។ ជាញឹកញាប់សម្រេចចិត្តលឿនជាង។ តម្រូវការ៖ ដំណើរការពីចម្ងាយច្បាស់លាស់ ការគាំទ្រការចុះមើល ការរៀបចំឯកសារដែលគួរឱ្យទុកចិត្ត។"]]},{"label":"ពិធីសារសម្រាប់អតិថិជនខ្មែរក្នុងស្រុក","heading":"គ្រួសារ សហគមន៍ និងភាពផាសុកភាពជាចម្បង","body":"អ្នកទិញខ្មែរក្នុងស្រុកមានកត្តាជំរុញចិត្តដោយគំនិតនៃការមានផ្ទះដែលមានសុវត្ថិភាព និងទំនើបសម្រាប់គ្រួសាររបស់ពួកគាត់នៅក្នុងសហគមន៍ដែលគួរឱ្យទុកចិត្ត។ ពួកគាត់មិនមានកត្តាជំរុញចម្បងដោយផលចំណេញនោះឡើយ។ កេរ្តិ៍ឈ្មោះក្រុមហ៊ុនអភិវឌ្ឍន៍ និងប្រវត្តិស្នាដៃគម្រោង មានសារៈសំខាន់ជាងការគណនា ROI។","rules":[{"title":"ចាប់ផ្តើមដោយសុវត្ថិភាព និងសហគមន៍ — មិនមែនផលចំណេញឡើយ","detail":"'គម្រោងនេះអភិវឌ្ឍដោយ Megakim — គម្រោងចំនួន ៧ បានបញ្ចប់ ហើយប្រគល់តាមកាលកំណត់ទាំងអស់។ អគារមានប្រព័ន្ធសុវត្ថិភាព ២៤ ម៉ោង ជិតសាលារៀន និងមានសហគមន៍អ្នករស់នៅ។' ការកំណត់ក្របខ័ណ្ឌបែបនេះទាក់ទាញចិត្ត។ ផលចំណេញសុទ្ធមិនទាក់ទាញចិត្តឡើយ។"},{"title":"ភាពបត់បែននៃការបង់ប្រាក់គឺជាកត្តាជំរុញការសម្រេចចិត្ត","detail":"អ្នកទិញក្នុងស្រុកភាគច្រើនមានភាពប្រុងប្រយ័ត្នលើកាលវិភាគបង់ប្រាក់។ ត្រូវស្គាល់ផែនការបង់ប្រាក់រំលស់សម្រាប់គ្រប់គម្រោង។ គម្រោងខ្លះផ្តល់ជូនការបង់រហូតដល់ 50% នៅពេលប្រគល់ផ្ទះ — នេះកាត់បន្ថយហានិភ័យក្នុងអំឡុងពេលសាងសង់បានយ៉ាងច្រើន។ ត្រូវលើកយកចំណុចនេះមកបង្ហាញឱ្យលេចធ្លោ។"},{"title":"គាំទ្រការឯកភាពគ្នាក្នុងគ្រួសារ — មិនត្រូវប្រញាប់ប្រញាល់ឡើយ","detail":"ការសម្រេចចិត្តនឹងមានការចូលរួមពីឪពុកម្តាយ បងប្អូន ឬប្តីប្រពន្ធ។ នេះមិនមែនជាការយឺតយ៉ាវទេ — វាជាដំណើរការការងារ។ ត្ នខ្មែរនៅបរទេសម្នាក់ទាក់ទងមកអ្នកពីឡូសអង់ជើឡែសនៅម៉ោង ១០ យប់ម៉ោងនៅកម្ពុជា។ អ្នកគួរតែ៖","opts":["ឆ្លើយតបនៅព្រឹកស្អែក — អតិថិជនគួរតែរំពឹងទុកពីការយឺតយ៉ាវនៃល្វែងម៉ោង","ឆ្លើយតបឱ្យបានឆាប់តាមដែលអាចធ្វើទៅបាន — ល្បឿននៃការឆ្លើយតបគឺជាសញ្ញាទំនុកចិត្តសម្រាប់អ្នកទិញនៅបរទេស","សុំឱ្យពួកគាត់ហៅទូរស័ព្ទមកក្នុងម៉ោងធ្វើការ","ផ្ញើកាតាឡុក ហើយតាមដានក្នុងម៉ោងធ្វើការនៅភ្នំពេញ"],"correct":1,"explain":"អាណិកជនខ្មែរនៅបរទេសធ្វើការឆ្លងល្វែងម៉ោង ជាមួយនឹងបង្អួចពេលវេលាមានកម្រិត។ ការឆ្លើយតបលឿន គឺជាប្រៀបប្រកួតប្រជែង។ ការឆ្លើយតបយឺតយ៉ាវ នឹងធ្វើឱ្យអតិថិជនទៅកាន់ក្រុមហ៊ុនផ្សេង។"},{"q":"សម្រាប់អ្នកទិញខ្មែរក្នុងស្រុក កត្តាជ្រើសរើសគម្រោងដែលសំខាន់បំផុតគឺ៖","opts":["ផលចំណេញសុទ្ធ និងការប៉ាន់ប្រមាណ ROI","កេរ្តិ៍ឈ្មោះក្រុមហ៊ុនអភិវឌ្ឍន៍ ភាពបត់បែននៃការបង់ប្រាក់ និងបរិយាកាសសហគមន៍","តម្លៃក្នុងមួយម៉ែត្រការ៉េ ធៀបនឹងខណ្ឌប្រហាក់ប្រហែល","សិទ្ធិទទួលបានកម្មសិទ្ធិបរទេស"],"correct":1,"explain":"អ្នកទិញរស់នៅផ្ទាល់ជាជនជាតិខ្មែរក្នុងស្រុក មានកត្តាជំរុញដោយសហគមន៍ សុវត្ថិភាព ភាពស័ក្តិសមសម្រាប់គ្រួសារ និងភាពបត់បែននៃការបង់ប្រាក់ — មិនមែនការគណនាផលចំណេញឡើយ។ គម្រោង PHC ដូចជា Time Square 11 BKK3 និង Royal Platinum Toul Kork ដឹកនាំដោយគុណតម្លៃទាំងនេះ។"},{"q":"នៅពេលរៀបចំឯកសារសម្រាប់ការពិភាក្សាក្នុងគ្រួសាររបស់អ្នកទិញខ្មែរ អ្នកគួរតែរាប់បញ្ចូល៖","opts":["ការវិភាគការវិនិយោគពេញលេញ ជាមួយតារាងផលចំណេញ","សេចក្តីសង្ខេបសាមញ្ញ និងច្បាស់លាស់៖ ឈ្មោះគម្រោង ប្រវត្តិស្នាដៃក្រុមហ៊ុនអភិវឌ្ឍន៍ ផែនការបង់ប្រាក់ ចំណាយប្រចាំខែ","មានតែប្រូស៊ួររបស់ក្រុមហ៊ុនអភិវឌ្ឍន៍ប៉ុណ្ណោះ — ទុកឱ្យគ្រួសារស្រាវជ្រាវដោយខ្លួនឯង","ការប្រៀបធៀបតម្លៃ ធៀបនឹងគម្រោងផ្សេងទៀតនៅក្នុងតំបន់ដដែល"],"correct":1,"explain":"រក្សាវាឱ្យសាមញ្ញ និងច្បាស់លាស់។ គ្រួសារត្រូវការព័ត៌មានគ្រប់គ្រាន់ដើម្បីឱ្យមានទំនុកចិត្ត — មិនមែនការងឿងឆ្ងល់ឡើយ។ ប្រវត្តិស្នាដៃក្រុមហ៊ុនអភិវឌ្ឍន៍ និងផែនការបង់ប្រាក់ គឺជាចំណុចផ្តល់ទំនុកចិត្តសំខាន់បំផុតពីរសម្រាប់គ្រួសារខ្មែរក្នុងស្រុក។"}]}},
{id:15,week:3,title:"Handling Objections",short:"Objections",objectives:["Recognise the 8 most common objections in the Cambodia property market","Respond to each one with data and calm — never with pressure or dismissal","Know when an objection is a buying signal versus a genuine dealbreaker"],sections:[{label:"What Objections Actually Are",heading:"Information, not rejection",body:"Every objection contains information. 'It's too expensive' means 'help me understand the value.' 'I need more time' means 'I haven't got what I need to decide yet.' 'The market is risky' means 'I don't fully trust this yet.' The agent who hears the information inside the objection — and responds to it — is the one who builds trust. The agent who tries to overcome the objection is the one who loses the client.",box:{title:"The PHC objection framework:",lines:["1. Acknowledge — confirm you heard them","2. Clarify — ask one question to understand the specific concern","3. Respond with data — never with pressure","4. Check — confirm whether the response addressed their concern","5. Move forward — propose a next step, not a close"]}},{label:"The 8 Common Objections",heading:"Know the answer to each one before you hear it",body:"These are the objections every PHC agent will face regularly. Prepare for them — not with scripts, but with facts.",rules:[{title:"'The market is too risky'",detail:"Acknowledge: 'That is a fair concern.' Data: 'The REAKH report shows transaction volume up 25% in 2025, and Cambodia is entering its second property cycle. The risk is real but the direction is clear for long-term holders.' Ask: 'What specific risk concerns you most?'"},{title:"'Yields are lower than other markets'",detail:"Agree partially: 'Net yields in Cambodia are 5–7% — lower than some frontier markets, higher than most developed ones. What matters is the combination: USD-denominated, no currency risk, and a market in early-cycle recovery.' Data: J Tower 2 combined yield = 6.85%/yr."},{title:"'I don't know the developer'",detail:"Verify: 'That is the right instinct — developer track record is the most important risk factor in this market.' Evidence: 'Megakim has completed 7 projects. Tanichu is a Japanese developer with J Tower 2 as a delivered, verified asset. Would it help to see the handover documentation?'"},{title:"'The CGT makes it less attractive'",detail:"Correct the framing: 'CGT applies to the profit on exit — not the full sale price. On a $200K exit with a $100K purchase and $40K costs, the tax is $12,000. For a 7–10 year hold with rental income, that is a small part of the total return.'"},{title:"'I've heard about developers defaulting'",detail:"Acknowledge: 'Yes — that happened to some projects in the 2015–2019 cycle.' Differentiate: 'PHC recommends only completed projects or developers with a verified track record. We do not recommend off-plan from unknown developers.'"},{title:"'The rental market seems oversupplied'",detail:"Data: 'BKK1 has 18.5% of all rental demand in Phnom Penh. Vacancy rates on well-managed completed units in central districts are low. The risk is higher in outer districts with weaker management.'"},{title:"'I want to think about it'",detail:"Ask: 'Of course — what specifically would you want to think through? I want to make sure you have all the information you need.' Then address the specific gap."},{title:"'I can get a better deal elsewhere'",detail:"Ask: 'What are you comparing this to specifically? I want to give you the most accurate comparison I can.' Never dismiss. Understand what the alternative is and engage with it honestly."}]}],roleplay:{scenario:"Handling the 'market is too risky' objection",instructions:"Practice using data calmly — acknowledge first, then respond, then check.",lines:[{role:"client",text:'"Honestly, I\'m not sure. Cambodia still feels risky to me."'},{role:"agent",text:'"That\'s a completely fair concern — and I don\'t want to dismiss it. Can I ask: what specific risk concerns you most? Is it the political environment, the developer, the legal structure, or something else?"'},{role:"client",text:'"Mostly the developer. I\'ve heard of projects that didn\'t deliver."'},{role:"agent",text:'"Yes — that did happen, primarily in the 2015–2019 off-plan boom. Some projects were launched without the capital to complete. That\'s why PHC only recommends projects from developers with a verified delivery track record. Megakim has completed 7 projects. Tanichu delivered J Tower 2 on schedule. Le Condé is completed and occupied. Would it help if I showed you the handover data from any of these?"'},{role:"client",text:'"Yes, that would help."'},{role:"note",text:"Debrief: Did the Agent acknowledge before responding? Did they ask a clarifying question to find the specific concern?"}],debrief:"Acknowledge, clarify, respond with data. Never skip the clarifying question — the stated objection is often not the real one. Find the actual concern, then address it."},quiz:[{q:"A client says 'yields are lower than other markets.' The PHC response is:",opts:["Agree and suggest they invest elsewhere if they want higher yields","Disagree — Cambodia yields are the highest in Asia","Acknowledge the comparison is valid, then add context: USD denomination, early-cycle recovery, verified 6.85%/yr combined return from REAKH data","Redirect to capital appreciation instead"],correct:2,explain:"Partially agree — acknowledging the comparison builds credibility. Then add the context: USD base, no currency risk, early-cycle market, verified ROI data. This is a complete answer, not a deflection."},{q:"A client says 'I've heard developers in Cambodia default.' You should:",opts:["Deny it — those were isolated incidents long ago","Acknowledge it happened in the 2015–2019 cycle, then differentiate PHC's project selection criteria","Change the subject to a positive project story","Offer a buy-back guarantee to address the concern"],correct:1,explain:"Acknowledge the truth — it happened. Then differentiate: PHC only recommends developers with verified delivery track records. This is more credible than denial, and it demonstrates that PHC's due diligence process is real."},{q:"When a client says 'I need to think about it,' the correct first response is:",opts:["Create urgency — prices may change","Ask what specifically they want to think through","Give them space and follow up in 2 weeks","Send them a project brochure to review"],correct:1,explain:"'I need to think about it' almost always contains a specific unresolved concern. Asking 'what specifically would you want to think through?' surfaces it. The answer to that question is what you need to address — not the time objection itself."},{q:"The CGT objection ('CGT makes this less attractive') is best handled by:",opts:["Agreeing and suggesting they wait until CGT is removed","Denying CGT has any real impact","Correcting the framing: CGT applies to taxable profit, not full sale price — and showing the actual calculation on their scenario","Redirecting to rental yield as the real return driver"],correct:2,explain:"Show the math. 'CGT applies to the taxable gain — on a $200K sale with $100K purchase and $40K documented costs, the tax is $12,000. Over a 7–10 year hold with rental income, that is a manageable exit cost.' The calculation dismantles the objection better than any reframe."}],reflection:"Think of the hardest objection you would find most difficult to answer. Write out how you would handle it using the PHC framework: acknowledge, clarify, respond with data, check, move forward.",km:{"title":"ការចាត់ចែងការទាស់ទែង / ការស្ទាក់ស្ទើរ","short":"ការទាស់ទែង","objectives":["ទទួលស្គាល់ការទាស់ទែងទូទៅបំផុតទាំង ៨ នៅក្នុងទីផ្សារអចលនទ្រព្យកម្ពុជា","ឆ្លើយតបទៅនឹងចំណុចនីមួយៗដោយប្រើប្រាស់ទិន្នន័យ និងភាពស្ងប់ស្ងាត់ — មិនប្រើប្រាស់សម្ពាធ ឬការបដិសេធឡើយ","ដឹងថានៅពេលណាដែលការទាស់ទែងគឺជាសញ្ញាទិញ ធៀបនឹងចំណុចមិនអាចសម្រុះសម្រួលបានពិតប្រាកដ"],"sections":[{"label":"អ្វីជាធម្មជាតិពិតនៃការទាស់ទែង","heading":"ព័ត៌មាន មិនមែនជាការបដិសេធឡើយ","body":"រាល់ការទាស់ទែងតែងតែបង្កប់នូវព័ត៌មាន។ 'វាថ្លៃពេក' មានន័យថា 'ជួយឱ្យខ្ញុំយល់ពីតម្លៃ'។ 'ខ្ញុំត្រូវការពេលបន្ថែម' មានន័យថា 'ខ្ញុំមិនទាន់មានព័ត៌មានគ្រប់គ្រាន់ដើម្បីសម្រេចចិត្តនៅឡើយទេ'។ 'ទីផ្សារមានហានិភ័យ' មានន័យថា 'ខ្ញុំមិនទាន់ទុកចិត្តរឿងនេះពេញលេញនៅឡើយទេ'។ ភ្នាក់ងារដែលស្តាប់យល់ពីព័ត៌មាននៅក្នុងការទាស់ទែង — ហើយឆ្លើយតបទៅវា — គឺជាបុគ្គលដែលបង្កើតទំនុកចិត្ត។ ភ្នាក់ងារដែលព្យាយាមយកឈ្នះការទាស់ទែង គឺជាបុគ្គលដែលបាត់បង់អតិថិជន។","box":{"title":"ក្របខ័ណ្ឌការងារចាត់ចែងការទាស់ទែងរបស់ PHC៖","lines":["1. ទទួលស្គាល់ — បញ្ជាក់ថាអ្នកបានលឺពួកគាត់","2. បញ្ជាក់ឱ្យច្បាស់ — សួរសំណួរមួយដើម្បីយល់ពីការបារម្ភជាក់លាក់","3. ឆ្លើយតបដោយទិន្នន័យ — មិនឆ្លើយតបដោយសម្ពាធឡើយ","4. ផ្ទៀងផ្ទាត់ — បញ្ជាក់ថាតើចម្លើយបានដោះស្រាយការបារម្ភរបស់ពួកគាត់ហើយឬនៅ","5. បន្តទៅមុខ — ស្នើជំហានបន្ទាប់ មិនមែនការបិទការលក់ឡើយ"]}},{"label":"ការទាស់ទែងទូទៅទាំង ៨","heading":"ស្គាល់ចម្លើយសម្រាប់ចំណុចនីមួយៗមុនពេលអ្នកបានលឺវា","body":"ទាំងនេះគឺជាការទាស់ទែងដែលភ្នាក់ងារ PHC គ្រប់រូបនឹងជួបប្រទះជាទៀងទាត់។ ត្រៀមខ្លួនសម្រាប់ចំណុចទាំងនេះ — មិនមែនដោយការទន្ទេញចាំមាត់នោះទេ ប៉ុន្តែដោយអង្គហេតុពិត។","rules":[{"title":"'ទីផ្សារមានហានិភ័យខ្លាំងពេក'","detail":"ទទួលស្គាល់៖ 'នោះជាការបារម្ភដ៏សមហេតុផល។' ទិន្នន័យ៖ 'របាយការណ៍របស់ REAKH បង្ហាញថាបរិមាណប្រតិបត្តិការកើនឡើង 25% ក្នុងឆ្នាំ 2025 ហើយកម្ពុជាកំពុងឈានចូលវដ្តអចលនទ្រព្យទីពីរ។ ហានិភ័យគឺមានពិតប្រាកដ ប៉ុន្តែទិសដៅគឺច្បាស់លាស់សម្រាប់អ្នកកាន់កាប់រយៈពេលវែង។' សួរ៖ 'តើហានិភ័យជាក់លាក់ណាមួយដែលបារម្ភជាងគេ?'"},{"title":"'អត្រាផលចំណេញទាបជាងទីផ្សារផ្សេងទៀត'","detail":"យល់ស្របមួយផ្នែក៖ 'ផលចំណេញសុទ្ធនៅកម្ពុជាគឺ 5–7% — ទាបជាងទីផ្សារកំពុងអភិវឌ្ឍមួយចំនួន ប៉ុន្តែខ្ពស់ជាងទីផ្សារអភិវឌ្ឍន៍ភាគច្រើន។ អ្វីដែលសំខាន់គឺការបូកបញ្ចូលគ្នា៖ រូបិយវត្ថុដុល្លារអាមេរិក គ្មានហានិភ័យរូបិយប័ណ្ណ និងទីផ្សារក្នុងដំណាក់កាលស្តារឡើងវិញដើមវដ្ត។' ទិន្នន័យ៖ ផលចំណេញបូកបញ្ចូលគ្នារបស់ J Tower 2 = 6.85%/ឆ្នាំ។"},{"title":"'ខ្ញុំមិនស្គាល់ក្រុមហ៊ុនអភិវឌ្ឍន៍ទេ'","detail":"ផ្ទៀងផ្ទាត់៖ 'នោះជាការគិតត្រឹមត្រូវបំផុត — ប្រវត្តិស្នាដៃក្រុមហ៊ុនអភិវឌ្ឍន៍ គឺជាកត្តាហានិភ័យសំខាន់បំផុតនៅក្នុងទីផ្សារនេះ។' ភស្តុតាង៖ 'Megakim បានបញ្ចប់គម្រោងចំនួន ៧។ Tanichu គឺជាក្រុមហ៊ ធ្លាប់លឺថាក្រុមហ៊ុនអភិវឌ្ឍន៍នៅកម្ពុជាបោះបង់ចោលគម្រោង។' អ្នកគួរតែ៖","opts":["បដិសេធ — ទាំងនោះជារឿងកោះក្ដោបពីយូរណាស់មកហើយ","ទទួលស្គាល់ថាវាបានកើតឡើងក្នុងវដ្តឆ្នាំ 2015–2019 រួចបង្ហាញពីលក្ខណៈវិនិច្ឆ័យនៃការជ្រើសរើសគម្រោងរបស់ PHC","ផ្លាស់ប្តូរប្រធានបទទៅជារឿងរ៉ាវគម្រោងវិជ្ជមានវិញ","ផ្តល់ជូនការធានាទិញត្រឡប់មកវិញដើម្បីដោះស្រាយការបារម្ភ"],"correct":1,"explain":"ទទួលស្គាល់ការពិត — វាបានកើតឡើងមែន។ បន្ទាប់មកបង្ហាញចំណុចខុសប្លែក៖ PHC ណែនាំតែក្រុមហ៊ុនអភិវឌ្ឍន៍ដែលមានប្រវត្តិស្នាដៃនៃការប្រគល់ដែលបានផ្ទៀងផ្ទាត់ប៉ុណ្ណោះ។ នេះមានភាពគួរឱ្យជឿជាក់ជាងការបដិសេធ ហើយវាបង្ហាញថាដំណើរការផ្ទៀងផ្ទាត់របស់ PHC គឺមានពិតប្រាកដ។"},{"q":"នៅពេលអតិថិជននិយាយថា 'ខ្ញុំត្រូវយកទៅគិតមើលសិន' ចម្លើយដំបូងដែលត្រឹមត្រូវគឺ៖","opts":["បង្កើតភាពបន្ទាន់ — តម្លៃអាចនឹងផ្លាស់ប្តូរ","សួរថាមានចំណុចជាក់លាក់ណាមួយដែលពួកគាត់ចង់យកទៅគិតគូរ","ទុកលំហទំនេរឱ្យពួកគាត់ ហើយតាមដានក្នុងរយៈពេល ២ សប្តាហ៍","ផ្ញើប្រូស៊ួរគម្រោងឱ្យពួកគាត់ពិនិត្យមើល"],"correct":1,"explain":"'ខ្ញុំត្រូវយកទៅគិតមើលសិន' ស្ទើរតែតែងតែបង្កប់នូវការបារម្ភជាក់លាក់ដែលមិនទាន់បានដោះស្រាយ។ ការសួរថា 'តើមានចំណុចជាក់លាក់ណាមួយដែលបងចង់យកទៅគិតគូរដែរឬទេ?' នឹងទាញវាចេញមកក្រៅ។ ចម្លើយចំពោះសំណួរនោះគឺជាអ្វីដែលអ្នកត្រូវដោះស្រាយ — មិនមែនជារឿងពេលវេលានោះឡើយ។"},{"q":"ការទាស់ទែងលើ CGT ('CGT ធ្វើឱ្យវាមិនសូវមានការទាក់ទាញ') ត្រូវបានចាត់ចែងល្អបំផុតដោយ៖","opts":["យល់ស្រប ហើយណែនាំឱ្យពួកគាត់រង់ចាំរហូតដល់ CGT ត្រូវបានលុបចោល","បដិសេធថា CGT គ្មានផលប៉ះពាល់ពិតប្រាកដឡើយ","កែតម្រូវការកំណត់ក្របខ័ណ្ឌ៖ CGT អនុវត្តលើប្រាក់ចំណេញដែលត្រូវជាប់ពន្ធ មិនមែនតម្លៃលក់សរុបឡើយ — ហើយបង្ហាញការគណនាជាក់ស្តែងលើសេនារីយ៉ូរបស់ពួកគាត់","បង្វែរទិសដៅទៅកាន់ផលចំណេញពីការជួលជាកត្តាជំរុញផលចំណេញពិតប្រាកដ"],"correct":2,"explain":"បង្ហាញការគណនា។ 'CGT អនុវត្តលើប្រាក់ចំណេញដែលត្រូវជាប់ពន្ធ — លើការលក់ $200K ដោយមានតម្លៃទិញ $100K និងចំណាយ $40K ពន្ធគឺ $12,000។ ក្នុងរយៈពេល ៧–១០ ឆ្នាំ ជាមួយប្រាក់ចំណូលជួល នោះជាចំណាយលក់ចេញដែលអាចចាត់ចែងបាន។' ការគណនារំលាយការទាស់ទែងបានល្អជាងការផ្លាស់ប្តូរបរិបទណាមួយ។"}]}},
{id:16,week:4,title:"Site Visits & Property Presentations",short:"Site Visits",objectives:["Know how to prepare, conduct, and debrief a site visit professionally","Understand what to emphasise — and what to never say — during a property walkthrough","Convert a strong site visit into a clear next step"],sections:[{label:"Before the Visit",heading:"Preparation is the visit",body:"Most agents show up and react to whatever happens on site. PHC agents prepare. The preparation determines 70% of the outcome. A well-prepared site visit builds authority before a single door is opened.",rules:[{title:"Research the unit before you arrive",detail:"Know the exact floor, unit number, sqm, view orientation, management fee, and payment schedule. If you have to check your phone during the visit to answer basic questions, you have already lost ground."},{title:"Set the agenda before arrival",detail:"Message the client before: 'During our visit, we will look at the unit, the amenities, meet the onsite management team if available, and I will walk you through the full cost picture.' This signals structure and professionalism."},{title:"Know the building's foreign quota status",detail:"Before the visit: confirm the remaining foreign ownership percentage. If quota is low — flag it before the visit, not during. Surprises on site destroy confidence."},{title:"Prepare your objection responses",detail:"Anticipate the 2–3 concerns most likely for this client's profile (from qualification). Think through the data responses before you walk in."}]},{label:"During the Visit",heading:"What to do — and what never to say",body:"The site visit is not a sales presentation. It is a discovery and verification experience for the client. Your role is to guide, not to sell.",rules:[{title:"Let the client lead the walkthrough",detail:"Open the door and step back. Let the client move through the space naturally. Note what they comment on. Their reactions are qualification data."},{title:"Comment on specifics, not generalities",detail:"'This floor is 17th — south-facing. You will have direct sunlight from 9am to 3pm.' Not: 'The views are amazing.' Specifics signal expertise. Generalities signal a tour guide."},{title:"Address the management team if on site",detail:"Introduce the client to the building manager or reception if possible. Third-party voices — especially from Japanese management brands — carry more weight than your own."},{title:"Never use urgency language on site",detail:"'Only 3 units left on this floor' on a site visit is a pressure tactic that sophisticated buyers immediately recognise. If inventory is genuinely limited, state it once — factually, not urgently."}]},{label:"After the Visit",heading:"The debrief is where deals are won",body:"The 15 minutes after a site visit — whether in the lobby, a nearby café, or by phone — is the most valuable advisory time in the entire sales process. Use it deliberately.",rules:[{title:"Ask three questions immediately after",detail:"'What did you like most?' · 'What concerned you?' · 'Does this feel like the right type of property for what you described to me?' These three questions surface everything you need for the next step."},{title:"Confirm or update your recommendation",detail:"Based on their responses, either confirm your recommendation or adjust it: 'Given what you said about space — I think the 2-bedroom at Time Square 9 would actually be a better fit. Can I show you that one next?'"},{title:"Propose one clear next step",detail:"'The natural next step is to review the SPA together. Would you like me to arrange that with our legal team this week?' Always one step. Never push for a close."},{title:"Send a written summary within 24 hours",detail:"Summary of the unit visited · observations noted · any open questions · the agreed next step. This is standard PHC practice after every site visit."}]}],roleplay:{scenario:"Debrief conversation after a site visit",instructions:"Practice the three-question debrief. Do not propose any solution until all three are answered.",lines:[{role:"agent",text:'"Thank you for visiting today. Can I ask — what did you like most about the unit?"'},{role:"client",text:'"The view was better than I expected. And the building feels more solid than some I\'ve seen."'},{role:"agent",text:'"Good to hear. What concerned you — anything that gave you pause?"'},{role:"client",text:'"The size. 53 sqm feels a bit small. I\'d hoped for something larger."'},{role:"agent",text:'"That\'s really useful. Last question: does this type of project — the location, the building quality, the management — feel right for what you described to me?"'},{role:"client",text:'"Yes, I think so. Just the size issue."'},{role:"agent",text:'"In that case, let me show you the 2-bedroom option in the same building — 78sqm, same management, same view orientation. It\'s $40,000 more but the rental income is also higher — around $900/month vs $800. Would that be worth looking at?"'},{role:"note",text:"Debrief: Did the Agent ask all three questions before proposing anything? Did the pivot feel natural?"}],debrief:"The three debrief questions are not small talk — they are qualification data. The client tells you exactly how to close in their answers. Listen before you speak."},quiz:[{q:"Before a site visit, the most important thing to confirm is:",opts:["That the client has their passport","The exact floor, view, sqm, payment schedule, and current foreign quota remaining","That the developer has a good-looking showroom","That the unit has been furnished to show standard"],correct:1,explain:"Know your product before the visit. Floor, view, size, payment schedule, and especially the foreign quota — if quota is nearly full, you must disclose this before the visit, not during it."},{q:"During a site visit a client says 'the views are amazing.' The PHC agent response is:",opts:["'Yes, the views are incredible — one of the best in Phnom Penh!'","'This unit is floor 17, south-facing. Direct sunlight from 9am to 3pm, clear river view year-round.'","'Wait until you see the amenities downstairs.'","'Many clients have said the same thing — this is a very popular floor.'"],correct:1,explain:"Specifics signal expertise. Agreeing with 'amazing' signals a tour guide. State the facts — floor, orientation, light hours, view characteristics. This is what an Investment Advisor sounds like on a site visit."},{q:"Immediately after a site visit, the three questions you ask are:",opts:["'Are you ready to book?' · 'What budget do you have?' · 'When can you sign?'","'What did you like most?' · 'What concerned you?' · 'Does this feel like the right type for your goals?'","'Did you love it?' · 'Shall I check availability?' · 'When would you move in?'","'What did you think?' · 'Any questions?' · 'Want to see another?'"],correct:1,explain:"These three questions surface the client's positive signals, residual concerns, and fit assessment — all the information needed to propose the correct next step or pivot to a better match."},{q:"The correct next step to propose after a strong site visit is:",opts:["A booking deposit — strike while enthusiasm is high","A review of the SPA with the legal team, or viewing the next matched unit","A follow-up call in two weeks when they have had time to think","A meeting with Nick to discuss commitment"],correct:1,explain:"One clear, structured next step. Either SPA review with legal support, or a follow-up viewing of a better-matched unit. Never push for a close on the same day as a first site visit — it signals pressure, not advisory."}],reflection:"Describe what an ideal site visit looks like from your perspective — from the moment you message the client before arrival to the written follow-up the next day.",km:{"title":"ការចុះពិនិត្យទីតាំងផ្ទាល់ និងការធ្វើបទបង្ហាញអំពីអចលនទ្រព្យ","short":"ការចុះពិនិត្យទីតាំងផ្ទាល់","objectives":["យល់ដឹងពីរបៀបរៀបចំ ដឹកនាំ និងបូកសរុបវាយតម្លៃការចុះពិនិត្យទីតាំងផ្ទាល់ប្រកបដោយអាជីព","យល់ដឹងពីអ្វីដែលត្រូវសង្កត់ធ្ងន់ — និងអ្វីដែលដាច់ខាតមិនត្រូវនិយាយ — ក្នុងអំឡុងពេលដើរទស្សនាអចលនទ្រព្យ","បម្លែងការចុះពិនិត្យទីតាំងប្រកបដោយលទ្ធផលល្អឱ្យទៅជាជំហានបន្តបន្ទាប់យ៉ាងច្បាស់លាស់"],"sections":[{"label":"មុនពេលចុះពិនិត្យ","heading":"ការរៀបចំទុកជាមុន គឺជាគន្លឹះនៃការចុះពិនិត្យ","body":"ភ្នាក់ងារភាគច្រើនគ្រាន់តែមកដល់ទីតាំង ហើយឆ្លើយតបតាមស្ថានភាពជាក់ស្តែងដែលកើតឡើងប៉ុណ្ណោះ។ ភ្នាក់ងារ PHC តែងតែរៀបចំទុកជាមុន។ ការរៀបចំទុកជាមុនកំណត់លទ្ធផលរហូតដល់ 70%។ ការរៀបចំចុះពិនិត្យទីតាំងបានល្អ បង្កើតបានជាឥទ្ធិពល និងជំនឿទុកចិត្ត តាំងពីមុនពេលបើកទ្វារអចលនទ្រព្យទៅទៀត។","rules":[{"title":"ស្រាវជ្រាវព័ត៌មានយូនីតឱ្យបានច្បាស់មុនពេលអ្នកមកដល់","detail":"ត្រូវដឹងពីជាន់ពិតប្រាកដ លេខយូនីត ទំហំ sqm ទិសដៅទស្សនីយភាព កម្រៃគ្រប់គ្រង និងកាលវិភាគបង់ប្រាក់។ ប្រសិនបើអ្នកត្រូវមើលទូរស័ព្ទក្នុងអំឡុងពេលចុះពិនិត្យដើម្បីឆ្លើយសំណួរមូលដ្ឋាន នោះអ្នកបានបាត់បង់ប្រៀបរួចស្រេចទៅហើយ។"},{"title":"កំណត់របៀបវារៈមុនពេលមកដល់","detail":"ផ្ញើសារជូនអតិថិជនជាមុន៖ 'ក្នុងអំឡុងពេលចុះពិនិត្យ Clean របស់យើង យើងនឹងមើលយូនីត គ្រឿងបរិក្ខារ ជួបក្រុមការងារគ្រប់គ្រងប្រចាំទីតាំង (ប្រសិនបើមាន) ហើយខ្ញុំនឹងពន្យល់ជូនអ្នកពីកញ្ចប់ចំណាយសរុបទាំងមូល។' នេះបង្ហាញពីលំដាប់លំដោយ និងភាពជាអាជីព។"},{"title":"ដឹងពីស្ថានភាពកូតាបរទេសរបស់អគារ","detail":"មុនពេលចុះពិនិត្យ៖ បញ្ជាក់ពីភាគរយកម្មសិទ្ធិបរទេសដែលនៅសល់។ ប្រសិនបើកូតានៅសល់តិច — ត្រូវជម្រាបជូនមុនពេលចុះពិនិត្យ មិនមែនអំឡុងពេលនោះទេ។ ការភ្ញាក់ផ្អើលនៅទីតាំងផ្ទាល់នឹងបំផ្លាញទំនុកចិត្ត។"},{"title":"រៀបចំចម្លើយឆ្លើយតបចំពោះក្តីបារម្ភ","detail":"រំពឹងទុកជាមុននូវក្តីបារម្ភ 2–3 ដែលអាចកើតមានបំផុតសម្រាប់ព័ត៌មានរូបវន្តរបស់អតិថិជននេះ (ទទួលបានពីការវាយតម្លៃលក្ខណៈសម្បត្តិ)។ គិតគូរពីទិន្នន័យសម្រាប់ឆ្លើយតបឱ្យបានរួចរាល់ មុនពេលអ្នកឈានជើងចូល។"}]},{"label":"អំឡុងពេលចុះពិនិត្យ","heading":"អ្វីដែលត្រូវធ្វើ — និងអ្វីដែលដាច់ខាតមិនត្រូវនិយាយ","body":"ការចុះពិនិត្យទីតាំងផ្ទាល់ មិនមែនជាការធ្វើបទបង្ហាញលក់នោះទេ។ វាជាបទពិសោធន៍នៃការស្វែងយល់ និងផ្ទៀងផ្ទាត់សម្រាប់អតិថិជន។ តួនាទីរបស់អ្នកគឺសម្របសម្រួល និងណែនាំ មិនមែនដើម្បីលក់ឡើយ។","rules":[{"title":"ទុកឱ្យអតិថិជនជាអ្នកដឹកនាំការដើរទស្សនា","detail":"បើកទ្វារ ហើយថយក្រោយមួយជំហាន។ ទុកឱ្យអតិថិជនដើរទស្សនាលំហដោយធម្មជាតិ។ កត់សម្គាល់អ្វីដែលពួក ោះទេ — វាជាទិន្នន័យសម្រាប់វាយតម្លៃលក្ខណៈសម្បត្តិ។ អតិថិជនប្រាប់អ្នកយ៉ាងច្បាស់ពីរបៀបបញ្ចប់ការលក់នៅក្នុងចម្លើយរបស់ពួកគាត់។ ចូរស្ដាប់មុនពេលអ្នកនិយាយ។"},"quiz":[{"q":"មុនពេលចុះពិនិត្យទីតាំងផ្ទាល់ អ្វីដែលសំខាន់បំផុតដែលត្រូវបញ្ជាក់គឺ៖","opts":["អតិថិជនមានលិខិតឆ្លងដែនតាមខ្លួន","ជាន់ពិតប្រាកដ ទិដ្ឋភាព ទំហំ sqm កាលវិភាគបង់ប្រាក់ និងកូតាបរទេសដែលនៅសល់បច្ចុប្បន្ន","ក្រុមហ៊ុនអភិវឌ្ឍន៍មានបន្ទប់បង្ហាញ (showroom) ស្អាតបាត","យូនីតត្រូវបានរៀបចំគ្រឿងសង្ហារិមតាមស្តង់ដារបង្ហាញ"],"correct":1,"explain":"ត្រូវស្គាល់ផលិតផលរបស់អ្នកឱ្យច្បាស់មុនពេលចុះពិនិត្យ។ ជាន់ ទិដ្ឋភាព ទំហំ កាលវិភាគបង់ប្រាក់ និងជាពិសេសកូតាបរទេស — ប្រសិនបើកូតាជិតពេញ អ្នកត្រូវតែទម្លាយព័ត៌មាននេះមុនពេលចុះពិនិត្យ មិនមែនអំឡុងពេលនោះទេ។"},{"q":"ក្នុងអំឡុងពេលចុះពិនិត្យទីតាំង អតិថិជននិយាយថា 'ទិដ្ឋភាពស្អាតខ្លាំងណាស់'។ ការឆ្លើយតបរបស់ភ្នាក់ងារ PHC គឺ៖","opts":["'បាទ/ចាស ទិដ្ឋភាពពិតជាអស្ចារ្យណាស់ — ជាទិដ្ឋភាពល្អបំផុតមួយក្នុងរាជធានីភ្នំពេញ!'","'យូនីតនេះនៅជាន់ទី 17 បែរមុខទៅទិសខាងត្បូង។ ទទួលបានពន្លឺព្រះអាទិត្យផ្ទាល់ចាប់ពីម៉ោង 9am ដល់ 3pm និងមើលឃើញទន្លេយ៉ាងច្បាស់ពេញមួយឆ្នាំ។'","'រង់ចាំរហូតដល់អ្នកបានឃើញគ្រឿងបរិក្ខារនៅជាន់ខាងក្រោមសិន។'","'អតិថិជនច្រើននាក់ណាស់បាននិយាយដូចគ្នានេះ — នេះជាជាន់ដែលពេញនិយមខ្លាំង។'"],"correct":1,"explain":"ចំណុចជាក់លាក់បង្ហាញពីជំនាញច្បាស់លាស់។ ការយល់ស្របនឹងពាក្យ 'អស្ចារ្យ' បង្ហាញត្រឹមជាអ្នកនាំភ្ញៀវទេសចរ។ ត្រូវបញ្ជាក់ការពិត — ជាន់ ទិសដៅ ម៉ោងទទួលបានពន្លឺ លក្ខណៈពិសេសនៃទិដ្ឋភាព។ នេះជាអ្វីដែលទីប្រឹក្សាវិនិយោគពោលឡើងក្នុងអំឡុងពេលចុះពិនិត្យទីតាំង។"},{"q":"ភ្លាមៗបន្ទាប់ពីការចុះពិនិត្យទីតាំង សំណួរទាំងបីដែលអ្នកត្រូវសួរគឺ៖","opts":["'តើអ្នកត្រៀមខ្លួនកក់ហើយឬនៅ?' · 'តើអ្នកមានកញ្ចប់ថវិកាប៉ុន្មាន?' · 'តើអ្នកអាចចុះហត្ថលេខាបាននៅពេលណា?'","'តើអ្វីដែលអ្នកពេញចិត្តបំផុត?' · 'តើមានអ្វីដែលធ្វើឱ្យអ្នកបារម្ភដែរឬទេ?' · 'តើអ្នកមានអារម្មណ៍ថា នេះជាប្រភេទដែលសមស្របសម្រាប់គោលដៅរបស់អ្នកដែរឬទេ?'","'តើអ្នកស្រឡាញ់វាទេ?' · 'តើខ្ញុំគួរពិនិត្យមើលស្តុកដែលទំនេរដែរឬទេ?' · 'តើអ្នកនឹងរើចូលនៅពេលណា?'","'តើអ្នកគិតយ៉ាងណាដែរ?' · 'មានសំណួរអ្វីទេ?' · 'ចង់មើលមួយទៀតទេ?'"],"correct":1,"explain":"សំណួរទាំងបីនេះបញ្ចេញនូវសញ្ញាវិជ្ជមានរបស់អតិថិជន ក្តីបារម្ភដែលនៅសេសសល់ និងការវាយតម្លៃភាពសមស្រប — រាល់ព័ត៌មានទាំងអស់ដែលត្រូវការដើម្បីស្នើជំហានបន្ទាប់ដែលត្រឹមត្រូវ ឬបង្វែរទៅរកជម្រើសដែលសមស្របជាង។"},{"q":"ជំហានបន្ទាប់ដែលត្រឹមត្រូវក្នុងការស្នើបន្ទាប់ពីការចុះពិនិត្យទីតាំងទទួលបានលទ្ធផលល្អគឺ៖","opts":["ការប្រាក់កក់ — សម្រេចការលក់ភ្លាមៗនៅពេលការរំភើបកំពុងមានខ្ពស់","ការពិនិត្យមើល SPA ជាមួយក្រុមការងារច្បាប់ ឬការទស្សនាយូនីតបន្ទាប់ដែលសមស្រប","ការទូរស័ព្ទតាមដានក្នុងរយៈពេលពីរប្រជាប្តាហ៍នៅពេលពួកគាត់មានពេលគិតគូរ","ការជួបពិភាក្សាជាមួយ Nick ដើម្បីពិភាក្សាអំពីការប្តេជ្ញាចិត្ត"],"correct":1,"explain":"ជំហានបន្ទាប់ច្បាស់លាស់ និងមានរចនាសម្ព័ន្ធមួយ។ អាចជាការពិនិត្យមើល SPA ដោយមានការគាំទ្រផ្នែកច្បាប់ ឬការទស្សនាតាមដាននូវយូនីតដែលសមស្របជាង។ ដាច់ខាតកុំបង្ខំដើម្បីបញ្ចប់ការលក់នៅថ្ងៃតែមួយជាមួយនឹងការចុះពិនិត្យទីតាំងលើកដំបូង — វាបង្ហាញពីសម្ពាធ មិនមែនការប្រឹក្សាយោបល់ឡើយ។"}]}},
{id:17,week:4,title:"Writing Proposals & Follow-Ups",short:"Proposals & Follow-Ups",objectives:["Produce a PHC-standard written proposal after every client meeting","Write follow-up messages that add value rather than create pressure","Know the difference between a check-in and a chase"],sections:[{label:"Why Written Communication Matters",heading:"The document is the professional",body:"Verbal conversations are forgotten. Written summaries become the reference point clients return to when making decisions — often days or weeks later, sometimes shared with family or advisors in other countries. A well-written PHC proposal can close a deal without a single additional conversation. A poorly written one can undo a great meeting.",box:{title:"PHC written communication standard:",lines:["Every client meeting → same-day written summary (email or WhatsApp structured message)","Every site visit → written summary within 24 hours","Every qualified investor → written proposal within 48 hours of first meeting","Format: clear, structured, data-led — no marketing language, no pressure"]}},{label:"The PHC Proposal Structure",heading:"What a proposal must contain",body:"A PHC proposal is not a brochure. It is a structured advisory document. Every section serves a purpose.",rules:[{title:"1. Client situation summary",detail:"2–3 sentences summarising what the client told you: their goal, timeline, budget, and risk profile. This shows you listened."},{title:"2. Your recommendation and why",detail:"State the 1–2 projects you recommend. For each: why this project fits their stated criteria (not why it is a great project in general)."},{title:"3. The numbers",detail:"Net yield calculation. Total cost of purchase including stamp duty. Monthly income estimate. CGT on a modelled exit scenario. Show your working."},{title:"4. Risks — explicitly stated",detail:"State the 2–3 most relevant risks for this client's profile: exit liquidity, CGT, vacancy rate, off-plan construction risk (if applicable). This is the section that builds the most trust."},{title:"5. Clear next step",detail:"One action. 'I suggest we schedule an SPA review with our legal team this week.' Not multiple options — one clear proposal."}]},{label:"Follow-Up Principles",heading:"Add value or stay silent",body:"The most common follow-up mistake is sending a message that adds no new information and simply says 'just checking in.' This is pressure disguised as care. PHC follow-ups always add something: a market update, a relevant data point, a direct answer to an open question.",rules:[{title:"The value-add check-in",detail:"'I wanted to share that the foreign quota on Le Condé has moved to 64% as of this week — relevant to your timeline. Let me know if you would like to discuss.' This is a check-in with a reason."},{title:"The answer to an open question",detail:"If the client asked something you could not answer immediately, the follow-up is the answer. 'You asked about the management fee at J Tower 3 — I confirmed it is $1.8/sqm/month, identical to J Tower 2.' This is high-trust follow-up."},{title:"The re-qualification after silence",detail:"After 7–10 days of no response: 'I wanted to reach out — not to push, but to check if anything has changed in your timeline or situation. If there is new information I can provide, I am happy to do so.' This is professional. 'Are you still interested?' is not."}]}],roleplay:{scenario:"Sending a follow-up after a first meeting with a European investor",instructions:"Write the message live. Read it aloud before the debrief.",lines:[{role:"note",text:"Context: German investor, 52, interested in Le Condé or J Tower 3, timeline 3–6 months, $200K budget, main concern was exit liquidity."},  {role:"agent",text:"'Dear Mr. Schmidt, thank you for visiting us today. As discussed, I am attaching a summary of the two projects I recommended for your profile, along with the full cost calculations and the risks I mentioned — including exit liquidity. The key numbers: Le Condé 1BR, BKK1, completed: total cost ~$164K including stamp duty. Net yield estimate ~5.2%. The REAKH J Tower 2 case study (5-year verified result) is included as a reference point for realistic long-term return. Next step I would suggest: a call with our European advisor Reza, who can walk you through the legal structure in detail. Are you available this week? Best regards, [Agent Name], Property Hub Cambodia.'"},{role:"note",text:"Debrief: Was there any pressure language? Were the risks visible? Was there exactly one next step?"}],debrief:"The best follow-up reads like a memo from a trusted advisor, not a message from a salesperson. If it could have been sent by an agent at any agency, it is not PHC quality. It should be specific to what that client told you."},quiz:[{q:"A PHC written proposal must always include:",opts:["A developer brochure and price list","Client situation summary, recommendation with rationale, net yield numbers, risks, and one next step","A comparison of at least 5 projects","Testimonials from previous clients"],correct:1,explain:"The five components: client situation (you listened) · recommendation with rationale (you matched) · numbers (you are precise) · risks (you are honest) · one next step (you are clear). Each component has a trust function."},{q:"A client has not responded for 8 days. The PHC follow-up message is:",opts:["'Hi, just checking in — are you still interested?'","'Hi, prices on Le Condé may be moving — wanted to give you a heads up.'","'I wanted to reach out — not to push, but to check if anything has changed in your timeline or if there is new information I can provide.'","'Hi, I have not heard from you. Do you want to proceed or not?'"],correct:2,explain:"The re-qualification follow-up after silence is a professional check-in, not pressure. It opens a door without pushing through it. 'Not to push' is a PHC phrase — it signals advisor behaviour, not sales behaviour."},{q:"The risks section in a PHC proposal is:",opts:["Optional — only include if the client asked about risks","A brief disclaimer at the bottom","A prominent, explicitly stated list of the 2–3 most relevant risks for this client's profile","Only required for off-plan projects"],correct:2,explain:"The risks section is the most trust-building part of the proposal. It shows the client you are an advisor, not a salesperson. Make it prominent and specific to their profile — not a generic legal disclaimer."},{q:"Which of the following is a PHC-quality follow-up message?",opts:["'Just wanted to check — any decision yet?'","'I confirmed the management fee at J Tower 3 that you asked about — $1.8/sqm/month, same as J Tower 2. Happy to walk through the full cost model if useful.'","'Hi! Great meeting yesterday. Let me know if you want to move forward.'","'The market is moving fast — you should decide soon.'"],correct:1,explain:"This follows the value-add principle: it answers an open question, it is specific to the conversation, and it adds new information. No pressure, no urgency — just professional follow-through."}],reflection:"Write a PHC-standard proposal for a Japanese investor who is interested in J Tower 3, has a $200K budget, and whose main concern is developer reliability.",km:{"title":"ការសរសេរសំណើ និងការផ្ញើសារតាមដាន","short":"សំណើ និងការផ្ញើសារតាមដាន","objectives":["រៀបចំសំណើជាលាយលក្ខណ៍អក្សរតាមស្តង់ដារ PHC បន្ទាប់ពីការជួបពិភាក្សាជាមួយអតិថិជនគ្រប់ពេល","សរសេរសារតាមដានដែលបន្ថែមតម្លៃ ជាជាងការបង្កើតសម្ពាធ","ស្គាល់ពីភាពខុសគ្នារវាងការផ្ញើសារសួរសុខទុក្ខបន្ថែមតម្លៃ (check-in) និងការដេញដោលតាមទារ (chase)"],"sections":[{"label":"ហេតុអ្វីបានជាការទាក់ទងជាលាយលក្ខណ៍អក្សរមានសារៈសំខាន់","heading":"ឯកសារគឺជាមុខមាត់នៃអាជីព","body":"ការសន្ទនាតាមមាត់ទទេនឹងត្រូវភ្លេចភ្លាំង។ សេចក្តីសង្ខេបជាលាយលក្ខណ៍អក្សរនឹងក្លាយជាចំណុចយោងដែលអតិថិជនត្រឡប់មកមើលវិញនៅពេលធ្វើការសម្រេចចិត្ត — ជាញឹកញាប់ច្រើនថ្ងៃឬច្រើនសប្តាហ៍ក្រោយមក ដោយជួនកាលត្រូវចែករំលែកជាមួយគ្រួសារ ឬទីប្រឹក្សានៅប្រទេសផ្សេងទៀត។ សំណើ PHC ដែលសរសេរបានល្អអាចបញ្ចប់ការលក់បានដោយមិនបាច់មានការសន្ទនាបន្ថែមសូម្បីមួយម៉ាត់។ ចំណែកសំណើដែលសរសេរមិនបានល្អ អាចបំផ្លាញជំនួបពិភាក្សាដ៏ល្អឥតខ្ចោះបាន។","box":{"title":"ស្តង់ដារការទាក់ទងជាលាយលក្ខណ៍អក្សរ PHC៖","lines":["រាល់ការជួបពិភាក្សាជាមួយអតិថិជន → សេចក្តីសង្ខេបជាលាយលក្ខណ៍អក្សរក្នុងថ្ងៃតែមួយ (អ៊ីមែល ឬសារ WhatsApp មានរចនាសម្ព័ន្ធ)","រាល់ការចុះពិនិត្យទីតាំង → សេចក្តីសង្ខេបជាលាយលក្ខណ៍អក្សរក្នុងរង្វង់ 24 ម៉ោង","រាល់វិនិយោគិនដែលមានលក្ខណៈសម្បត្តិគ្រប់គ្រាន់ → សំណើជាលាយលក្ខណ៍អក្សរក្នុងរង្វង់ 48 ម៉ោងបន្ទាប់ពីជំនួបលើកដំបូង","ទម្រង់៖ ច្បាស់លាស់ មានរចនាសម្ព័ន្ធ ផ្អែកលើទិន្នន័យ — គ្មានភាសាផ្សព្វផ្សាយពាណិជ្ជកម្ម គ្មានសម្ពាធ"]}},{"label":"រចនាសម្ព័ន្ធសំណើរបស់ PHC","heading":"អ្វីដែលសំណើមួយត្រូវតែមាន","body":"សំណើរបស់ PHC មិនមែនជាក្រដាសបត់ផ្សព្វផ្សាយ (brochure) នោះទេ។ វាជាឯកសារប្រឹក្សាយោបល់ដែលមានរចនាសម្ព័ន្ធច្បាស់លាស់។ ផ្នែកនីមួយៗបម្រើឱ្យគោលបំណងជាក់លាក់។","rules":[{"title":"1. សេចក្តីសង្ខេបស្ថានភាពរបស់អតិថិជន","detail":"2–3 ប្រយោគសង្ខេបអំពីអ្វីដែលអតិថិជនបានប្រាប់អ្នក៖ គោលដៅ កាលវិភាគ កញ្ចប់ថវិកា និងកម្រិតហានិភ័យដែលទទួលយកបាន។ នេះបង្ហាញថាអ្នកបានស្តាប់ពួកគាត់។"},{"title":"2. ការណែនាំរបស់អ្នក និងហេតុផល","detail":"បញ្ជាក់គម្រោង 1–2 ដែលអ្នកណែនាំ។ សម្រាប់គម្រោងនីមួយៗ៖ ហេតុអ្វីបានជាគម្រោងនេះសមស្របនឹងលក្ខណៈវិនិច្ឆ័យដែលពួកគាត់បានបញ្ជាក់ (មិនមែនហេតុអ្វីបានជាវាជាគម្រោងដ៏ល្អជារួមនោះទេ)។"},{"title":"3. តួលេខលេខ","detail":"ការគណនាផលចំណេញសុទ្ធ (net yield)។ ចំណាយសរុបនៃការទិញ រួមទាំងពន្ធប្រទាប់ត្រា (stamp duty)។ ការប៉ាន់ប្រមាណប្រាក់ចំណូលប្រចាំខែ។ CGT លើសេនារីយ៉ូច្រកចេញដែលបានធ្វើម៉ូដែល។ បង្ហាញពីរបៀបគណនារបស់អ្នក។"},{"title":"4. ហានិភ័យ — បញ្ជាក់យ៉ាងច្បាស់លាស់","detail":"បញ្ជាក់ហានិភ័យដែលពាក់ព័ន្ធបំផុត 2–3 សម្រាប់ព័ត៌មានរូបវន្តរបស់អតិថិជននេះ៖ សភាពសាច់ប្រាក់នៃច្រកចេញ (exit liquidity), CGT, អត្រាយូនីតទំនេរ, ហានិភ័យសំណង់ off-plan (ប្រសិនបើពាក់ព័ន្ធ)។ នេះជាផ្នែកដែលបង្កើតទំនុកចិត្តបានខ្លាំងបំផុត។"},{"title":"5. ជំហានបន្ទាប់ដែលច្បាស់លាស់","detail":"សកម្មភាពតែមួយ។ 'ខ្ញុំសូមស្នើឱ្យយើងរៀបចំកាលវិភាគពិនិត្យមើល SPA ជាមួយក្រុមការងារច្បាប់របស់យើងក្នុងសប្តាហ៍នេះ។' មិនមែនផ្តល់ជម្រើសច្រើននោះទេ — គឺសំណើច្បាស់លាស់តែមួយ។"}]},{"label":"គោលការណ៍នៃការផ្ញើសារតាមដាន","heading":"បន្ថែ
