һ”бһјбһ„","instructions":"бһ бһ¶бһҸбҹӢбһҹбһҳбһ“бһ·бһҷбһ¶бһҷбһҡбһҝбһ„бһ“бҹҒбҹҮбһұбҹ’бһҷбһ”бһ¶бһ“бһ…бҹ’бһ”бһ¶бһҹбҹӢбһӣбһ¶бһҹбҹӢ бһ“бһ·бһ„бһҠбҹ„бһҷбһҳбһ·бһ“бһҖбһ¶бһҸбҹӢбһ”бһ“бҹ’бһҗбһҷбһ бһ¶бһ“бһ·бһ—бҹҗбһҷбһ“бҹ„бҹҮбһ‘бҹҒбҹ”","lines":[{"role":"client","text":"\"бһҳбһ¶бһ“бһӮбҹҒбһ”бҹ’бһҡбһ¶бһ”бҹӢбһҒбҹ’бһүбһ»бҹҶбһҗбһ¶бһҳбһ¶бһ“бһ–бһ“бҹ’бһ’бһӣбһҫбһ…бҹҶбһҺбҹҒбһүбһҠбһҫбһҳбһ‘бһ»бһ“ (CGT) бһҗбҹ’бһҳбһёбһ“бҹ…бһҖбһҳбҹ’бһ–бһ»бһҮбһ¶бҹ” бһҸбһҫбһңбһ¶бһҮбһ¶бһҖбһ¶бһҡбһ–бһ·бһҸбһ‘бҹҒ?\""},{"role":"agent","text":"\"бһ”бһ¶бһ‘ бһ–бһ·бһҸбһҳбҹӮбһ“бһ бһҫбһҷ вҖ” CGT бһ”бһ¶бһ“бһ…бһјбһӣбһҮбһ¶бһ’бһҡбһҳбһ¶бһ“бһҖбҹ’бһ“бһ»бһ„бһҒбҹӮбһҳбһҖбһҡбһ¶ бһҶбҹ’бһ“бһ¶бҹҶ 2026бҹ” бһңбһ¶бһўбһ“бһ»бһңбһҸбҹ’бһҸбһӣбһҫбһ”бҹ’бһҡбһ¶бһҖбҹӢбһ…бҹҶбһҺбҹҒбһүбһҠбҹӮбһӣбһўбҹ’бһ“бһҖбһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бһ“бҹ…бһ–бҹҒбһӣбһўбҹ’бһ“бһҖбһӣбһҖбҹӢбһўбһ…бһӣбһ“бһ‘бҹ’бһҡбһ–бҹ’бһҷбҹ” бһўбһҸбҹ’бһҡбһ¶бһӮбһә 20% бһӣбһҫбһ”бҹ’бһҡбһ¶бһҖбҹӢбһ…бҹҶбһҺбҹҒбһүбһҠбҹӮбһӣбһҸбҹ’бһҡбһјбһңбһҮбһ¶бһ”бҹӢбһ–бһ“бҹ’бһ’бҹ”\""},{"role":"client","text":"\"бһўбһүбҹ’бһ…бһ№бһ„бһҖбһ¶бһҡбһ‘бһ·бһүбһ“бҹ…бһ–бҹҒбһӣбһ“бҹҒбҹҮбһҮбһ¶бһӮбҹҶбһ“бһ·бһҸбһҳбһ·бһ“бһӣбҹ’бһўбһҳбҹӮбһ“бһ‘бҹҒ?\""},{"role":"agent","text":"\"бһҳбһ·бһ“бһҳбҹӮбһ“бһ‘бһ¶бһӣбҹӢбһҸбҹӮбһҹбҹ„бҹҮ вҖ” бһңбһ¶бһҳбһ¶бһ“бһ“бҹҗбһҷбһҗбһ¶бһҷбһ»бһ‘бҹ’бһ’бһҹбһ¶бһҹбҹ’бһҸбҹ’бһҡбһ”бһ¶бһ“бһ•бҹ’бһӣбһ¶бһҹбҹӢбһ”бҹ’бһҸбһјбһҡбҹ” бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҖбһ¶бһҡбһҖбһ¶бһ“бҹӢбһҖбһ¶бһ”бҹӢбһҡбһҷбҹҲбһ–бҹҒбһӣбһңбҹӮбһ„бһҠбһҫбһҳбҹ’бһ”бһёбһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бһ…бҹҶбһҺбһјбһӣбһ–бһёбһҖбһ¶бһҡбһҮбһҪбһӣ CGT бһӮбһәбһўбһ¶бһ…бһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһҡбһ„бһ”бһ¶бһ“бҹ” бһ§бһ‘бһ¶бһ бһҡбһҺбҹҚ бһӣбһҫбһҖбһ¶бһҡбһӣбһҖбҹӢбһ…бҹҒбһү $200K бһҠбҹ„бһҷбһҳбһ¶бһ“бһҸбһҳбҹ’бһӣбҹғбһ‘бһ·бһү $100K бһ“бһ·бһ„бһ…бҹҶбһҺбһ¶бһҷбһҳбһ¶бһ“бһҜбһҖбһҹбһ¶бһҡбһ”бһүбҹ’бһҮбһ¶бһҖбҹӢ $40K бһ–бһ“бҹ’бһ’бһӮбһәбһ”бҹ’бһҡбһ бҹӮбһӣ $12,000бҹ” бһ”бһүбҹ’бһ бһ¶бһӮбһәбһҖбһ¶бһҡбһ‘бһ·бһүбһӣбһҖбҹӢбһҖбҹ’бһ“бһ»бһ„бһҡбһҷбҹҲбһ–бҹҒбһӣбһҒбҹ’бһӣбһё (flipping) вҖ” бһҷбһ»бһ‘бҹ’бһ’бһҹбһ¶бһҹбҹ’бһҸбҹ’бһҡбһ“бҹ„бҹҮбһҳбһ·бһ“бһҹбһҳбһҹбҹ’бһҡбһ”бһ‘бҹҖбһҸбһ‘бҹҒбһҖбҹ’бһ“бһ»бһ„бһ‘бһёбһ•бҹ’бһҹбһ¶бһҡбһ“бҹҒбҹҮбҹ”\""},{"role":"client","text":"\"бһўбҹ’бһ“бһҖбһ”бһ¶бһ“бһҡбҹҖбһ”бһҡбһ¶бһ”бҹӢбһ–бһёбһҡбһҷбҹҲбһ–бҹҒбһӣ 7 бһҶбҹ’бһ“бһ¶бҹҶ вҖ” бһҸбһҫбһңбһ¶бһңбҹӮбһ„бһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһҡбһ¶бһ“бҹӢбһ‘бҹҒ?\""},{"role":"agent","text":"\"бһ•бҹ’бһўбҹӮбһҖбһӣбһҫбһҖбһ¶бһҡбһҹбһ·бһҖбҹ’бһҹбһ¶бһҖбһҡбһҺбһёбһҮбһ¶бһҖбҹӢбһҹбҹ’бһҸбҹӮбһ„бһҡбһ”бһҹбҹӢ REAKH бһӣбһҫбһӮбһҳбҹ’бһҡбҹ„бһ„ J Tower 2 вҖ” бһҠбҹӮбһӣбһҮбһ¶бһ”бҹ’бһҡбһҸбһ·бһ”бһҸбҹ’бһҸбһ·бһҖбһ¶бһҡбһ•бҹ’бһӣбһјбһңбһҖбһ¶бһҡбһҠбҹӮбһӣбһ”бһ¶бһ“бһ•бҹ’бһ‘бҹҖбһ„бһ•бҹ’бһ‘бһ¶бһҸбҹӢ вҖ” бһҖбһ¶бһҡбһҖбһ¶бһ“бҹӢбһҖбһ¶бһ”бҹӢбһҡбһҷбҹҲбһ–бҹҒбһӣ 5 бһҶбҹ’бһ“бһ¶бҹҶбһ”бһ¶бһ“бһ”бһ„бҹ’бһҖбһҫбһҸ ROI бһҹбһҡбһ»бһ” 34%бҹ” бһ“бҹ…бһҶбҹ’бһ“бһ¶бҹҶбһ‘бһё 8 бһҖбһ¶бһҡбһ–бҹ’бһҷбһ¶бһҖбһҡбһҺбҹҚбһӮбһә 58%бҹ” бһ”бҹ’бһҡбһ¶бһҖбҹӢбһ…бҹҶбһҺбһјбһӣбһ–бһёбһҖбһ¶бһҡбһҮбһҪбһӣбһҖбһҫбһ“бһЎбһҫбһ„бһ”бһјбһҖбһ”бһ“бҹ’бһҸбһ·бһ…бһҳбҹ’бһҸбһ„бҹ—бһҸбһ¶бһҳбһ–бҹҒбһӣбһңбҹҒбһӣбһ¶бҹ” CGT бһўбһ“бһ»бһңбһҸбҹ’бһҸбһ“бҹ…бһ–бҹҒбһӣбһӣбһҖбҹӢбһ…бҹҒбһү бһ”бҹүбһ»бһ“бҹ’бһҸбҹӮбһҡбһҷбҹҲбһ–бҹҒбһӣбһҖбһ¶бһ“бҹӢбһҖбһ¶бһ”бҹӢбһӮбһәбһҮбһ¶бһўбҹ’бһңбһёбһҠбҹӮбһӣбһҮбһҳбҹ’бһҡбһ»бһүбһ•бһӣбһ…бҹҶбһҺбҹҒбһүбҹ”\""},{"role":"note","text":"бһҖбһ¶бһҡбһ”бһјбһҖбһҹбһҡбһ»бһ”бһҠбһҖбһ–бһ·бһҹбҹ„бһ’бһ“бҹҚбҹ– бһҸбһҫбһ—бҹ’бһ“бһ¶бһҖбҹӢбһ„бһ¶бһҡбһ”бһ¶бһ“бһ”бһүбҹ’бһҮбһ¶бһҖбҹӢбһ…бҹҶбһ“бһҪбһ“бһ‘бһ№бһҖбһ”бҹ’бһҡбһ¶бһҖбҹӢ CGT бһҷбҹүбһ¶бһ„бһ…бҹ’бһ”бһ¶бһҹбҹӢбһӣбһ¶бһҹбҹӢбһҠбҹӮбһҡбһ¬бһ‘бҹҒ? бһҸбһҫбһ–бһҪбһҖбһӮбһ¶бһҸбҹӢбһ”бһ¶бһ“бһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһҖбһ¶бһҡбһҹбһ·бһҖбҹ’бһҹбһ¶бһҖбһҡбһҺбһё J Tower 2 бһҮбһ¶бһ—бһҹбҹ’бһҸбһ»бһҸбһ¶бһ„ бһҠбҹ„бһҷбһҳбһ·бһ“бһҳбҹӮбһ“бһҮбһ¶бһҖбһ¶бһҡбһ”бһүбҹ’бһ…бһ»бҹҮбһ”бһүбҹ’бһ…бһјбһӣбһҠбҹӮбһҡбһ¬бһ‘бҹҒ?"}],"debrief":"CGT бһҸбҹ’бһҡбһјбһңбһҸбҹӮбһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһ”бһ„бҹ’бһ бһ¶бһүбһҮбһ¶бһҳбһ»бһ“бһҠбҹ„бһҷбһҹбһҖбһҳбҹ’бһҳбһҮбһ¶бһҳбһҪбһҷбһ“бһ№бһ„бһҸбһҪбһӣбҹҒбһҒбһ…бҹ’бһ”бһ¶бһҹбҹӢбһӣбһ¶бһҹбҹӢ вҖ” бһҳбһ·бһ“бһҳбҹӮбһ“бһҖбһ¶бһҡбһ•бҹ’бһҸбһӣбҹӢбһ‘бҹҶбһ“бһ»бһҖбһ…бһ·бһҸбҹ’бһҸбһ”бҹӮбһ”бһҹбҹ’бһҡбһ–бһ·бһ…бһҹбҹ’бһҡбһ–бһ·бһӣбһ“бҹ„бҹҮбһ‘бҹҒбҹ” бһ–бһ¶бһҖбҹ’бһҷбһҗбһ¶ 'бһҖбһ»бҹҶбһ”бһ¶бһҡбһҳбҹ’бһ—' бһӮбһәбһҳбһ·бһ“бһўбһ¶бһ…бһ‘бһ‘бһҪбһӣбһҷбһҖбһ”бһ¶бһ“бһЎбһҫбһҷбҹ” бһ–бһ¶бһҖбҹ’бһҷбһҗбһ¶ 'бһ“бҹҒбҹҮбһҮбһ¶бһҖбһ¶бһҡбһӮбһҺбһ“бһ¶' бһ‘бһҫбһ”бһҮбһ¶бһҖбһ¶бһҡбһҸбҹ’бһҡбһ№бһҳбһҸбҹ’бһҡбһјбһңбҹ”"},"quiz":[{"q":"бһҷбҹ„бһ„бһҸбһ¶бһҳбһҡбһ”бһ¶бһҷбһҖбһ¶бһҡбһҺбҹҚбһҒбһ»бһ“бһҠбһј REAKH бһҸбһҫбһҸбһҳбҹ’бһӣбҹғбһҳбһ’бҹ’бһҷбһҳбһҖбҹ’бһ“бһ»бһ„бһҳбһҪбһҷбһҳбҹүбҹӮбһҸбҹ’бһҡбһҖбһ¶бһҡбҹүбҹҒбһ“бҹ… BKK1 (gross) бһӮбһәбһҹбҹ’бһҳбһҫбһ“бһ№бһ„бһ”бҹүбһ»бһ“бҹ’бһҳбһ¶бһ“?","opts":["$1,200","$1,800 вҖ” бһҸбһҳбҹ’бһӣбҹғбһҳбһ’бҹ’бһҷбһҳбһ“бҹ…бһҡбһ¶бһҮбһ’бһ¶бһ“бһёбһ—бҹ’бһ“бҹҶбһ–бҹҒбһү","$2,000","$2,800"],"correct":2,"explain":"REAKH бһҡбһ¶бһҷбһҖбһ¶бһҡбһҺбҹҚбһҗбһ¶ BKK1 бһҳбһ¶бһ“бһҸбһҳбҹ’бһӣбҹғ $2,000/sqm gross вҖ” бһҠбҹӮбһӣбһҮбһ¶бһҸбһҳбҹ’бһӣбҹғбһҳбһ’бҹ’бһҷбһҳбһ‘бһёбһ•бҹ’бһҹбһ¶бһҡбһ“бҹ…бһӮбҹ’бһҡбһ”бҹӢбһҖбһҳбҹ’бһҡбһ·бһҸбһӮбһҳбҹ’бһҡбҹ„бһ„бһҖбҹ’бһ“бһ»бһ„ BKK1бҹ” бһ“бҹҒбҹҮбһҮбһ¶бһҸбһҪбһӣбҹҒбһҒбһҠбҹӮбһӣбһҸбҹ’бһҡбһјбһңбһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһҖбҹ’бһ“бһ»бһ„бһҖбһ¶бһҡбһҹбһ“бҹ’бһ‘бһ“бһ¶бһҮбһ¶бһҳбһҪбһҷбһўбһҸбһ·бһҗбһ·бһҮбһ“ бһҠбҹ„бһҷбһҹбһ¶бһҡбһңбһ¶бһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бһ–бһёбһҠбҹғбһӮбһјбһ”бһүбҹ’бһҮбһёбһўбһ…бһӣбһ“бһ‘бҹ’бһҡбһ–бҹ’бһҷбһ•бҹ’бһӣбһјбһңбһҖбһ¶бһҡбһҡбһ”бһҹбҹӢбһҷбһҫбһ„бҹ”"},{"q":"бһҷбҹ„бһ„бһҸбһ¶бһҳбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷ REAKH бһҸбһҫбһ”бҹ’бһҡбһ—бҹҒбһ‘бһҷбһјбһ“бһёбһҸбһҳбһҪбһҷбһҺбһ¶бһҠбҹӮбһӣбһӮбҹ’бһҡбһ”бһҠбһҺбҹ’бһҸбһ”бҹӢбһӣбһҫбһ‘бһ¶бҹҶбһ„бһҖбһ¶бһҡбһ‘бһ·бһү бһ“бһ·бһ„бһҖбһ¶бһҡбһҮбһҪбһӣ?","opts":["Studio вҖ” бһҸбһҳбҹ’бһӣбҹғбһ‘бһ¶бһ”бһ”бҹҶбһ•бһ»бһҸ бһ„бһ¶бһҷбһҹбҹ’бһҡбһҪбһӣбһҮбһҪбһӣбһ”бҹҶбһ•бһ»бһҸ","бһ”бһ“бҹ’бһ‘бһ”бҹӢбһӮбҹҒбһ„ 2 вҖ” бһ•бҹ’бһҸбһӣбҹӢбһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһӣбҹ’бһўбһ”бҹҶбһ•бһ»бһҸ","бһ”бһ“бҹ’бһ‘бһ”бҹӢбһӮбҹҒбһ„ 1 вҖ” 61% бһ“бҹғбһҖбһ¶бһҡбһ‘бһ·бһү, 72% бһ“бҹғбһҖбһ¶бһҡбһҮбһҪбһӣ","бһ”бһ“бҹ’бһ‘бһ”бҹӢбһӮбҹҒбһ„ 3 вҖ” бһҗбҹ’бһӣбҹғбһҮбһҪбһӣбһҒбҹ’бһ–бһҹбҹӢбһ”бҹҶбһ•бһ»бһҸ бһҖбһ¶бһҡбһ•бҹ’бһӮбһҸбҹӢбһ•бҹ’бһӮбһ„бҹӢбһҳбһ¶бһ“бһҖбһҳбҹ’бһҡбһ·бһҸ"],"correct":2,"explain":"бһ”бһ“бҹ’бһ‘бһ”бҹӢбһӮбҹҒбһ„ 1 бһӮбҹ’бһҡбһ”бһҠбһҺбҹ’бһҸбһ”бҹӢбһӣбһҫбһ•бҹ’бһ“бҹӮбһҖбһ‘бһ¶бҹҶбһ„бһ–бһёбһҡбҹ– 61% бһ“бҹғбһҖбһ¶бһҡбһ‘бһ·бһүбһҒбһ»бһ“бһҠбһјбһҹбһҡбһ»бһ” бһ“бһ·бһ„ 72% бһ“бҹғбһҸбһҳбҹ’бһҡбһјбһңбһҖбһ¶бһҡбһҮбһҪбһӣбһҹбһҡбһ»бһ”бҹ” бһ–бһҪбһҖбһңбһ¶бһ•бҹ’бһҸбһӣбҹӢбһ“бһјбһңбһҸбһ»бһӣбҹ’бһҷбһ—бһ¶бһ–бһӣбҹ’бһўбһ”бҹҶбһ•бһ»бһҸбһ“бҹғбһҹбһҳбһҸбҹ’бһҗбһ—бһ¶бһ–бһ‘бһ·бһү бһӣбҹ’бһ”бһҝбһ“бһ“бҹғбһҖбһ¶бһҡбһҮбһҪбһӣ бһ“бһ·бһ„бһ—бһ¶бһ–бһ„бһ¶бһҷбһҹбҹ’бһҡбһҪбһӣбһ…бһјбһӣбһҡбһҪбһҳбһҡбһ”бһҹбҹӢбһңбһ·бһ“бһ·бһҷбҹ„бһӮбһ·бһ“бҹ”"},{"q":"бһҸбһҫбһ”бһҡбһ·бһҳбһ¶бһҺбһ”бҹ’бһҡбһҸбһ·бһ”бһҸбҹ’бһҸбһ·бһҖбһ¶бһҡбһ“бҹ…бһҖбҹ’бһ“бһ»бһ„бһ‘бһёбһ•бҹ’бһҹбһ¶бһҡбһҒбһ»бһ“бһҠбһјбһ“бҹ…бһҡбһ¶бһҮбһ’бһ¶бһ“бһёбһ—бҹ’бһ“бҹҶбһ–бҹҒбһүбһ”бһ¶бһ“бһ•бҹ’бһӣбһ¶бһҹбҹӢбһ”бҹ’бһҸбһјбһҡбһ”бҹүбһ»бһ“бҹ’бһҳбһ¶бһ“бһҖбҹ’бһ“бһ»бһ„бһҶбҹ’бһ“бһ¶бҹҶ 2025?","opts":["бһҗбһҷбһ…бһ»бҹҮ 10% вҖ” бһ‘бһёбһ•бҹ’бһҹбһ¶бһҡбһ“бҹ…бһҸбҹӮбһ”бһ“бҹ’бһҸбһ”бҹ’бһҡбһҳбһјбһӣбһ•бҹ’бһҸбһ»бҹҶбһҖбһ¶бһҡбһҹбҹ’бһҸбһ¶бһҡбһЎбһҫбһ„бһңбһ·бһү","бһҖбһҫбһ“бһЎбһҫбһ„ 5% вҖ” бһҷбһәбһҸбһ”бҹүбһ»бһ“бҹ’бһҸбҹӮбһҳбһ¶бһ“бһҹбҹ’бһҗбһ·бһҡбһ—бһ¶бһ–","бһҖбһҫбһ“бһЎбһҫбһ„ 25% вҖ” бһ”бһүбҹ’бһҮбһ¶бһҖбҹӢбһҠбҹ„бһҷбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷ REAKH","бһҗбҹҒбһҡ вҖ” бһӮбҹ’бһҳбһ¶бһ“бһҖбһ¶бһҡбһ•бҹ’бһӣбһ¶бһҹбҹӢбһ”бҹ’бһҸбһјбһҡбһӮбһҪбһҡбһұбҹ’бһҷбһҖбһҸбҹӢбһҹбһҳбҹ’бһӮбһ¶бһӣбҹӢ"],"correct":2,"explain":"бһҖбһҫбһ“бһЎбһҫбһ„ 25% бһҖбҹ’бһ“бһ»бһ„бһҶбҹ’бһ“бһ¶бҹҶ 2025бҹ” бһ“бҹҒбҹҮбһӮбһәбһҮбһ¶бһ…бҹҶбһҺбһ»бһ…бһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһҹбһ“бҹ’бһ‘бһ»бҹҮбһ‘бһёбһ•бҹ’бһҹбһ¶бһҡбһҠбҹӮбһӣбһҹбҹҶбһҒбһ¶бһ“бҹӢбһ”бҹҶбһ•бһ»бһҸбһҸбҹӮбһҳбһҪбһҷбһӮбһҸбҹӢбһ–бһёбһҡбһ¶бһҷбһҖбһ¶бһҡбһҺбҹҚ REAKHбҹ” бһңбһ¶бһ”бһ„бҹ’бһ бһ¶бһүбһ–бһёбһ‘бҹҶбһ“бһ»бһҖбһ…бһ·бһҸбҹ’бһҸбһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖбһ‘бһ·бһүбһҠбҹӮбһӣбһҖбҹҶбһ–бһ»бһ„бһҸбҹ’бһҡбһЎбһ”бҹӢбһҳбһҖбһңбһ·бһү бһ“бһ·бһ„бһ‘бһёбһ•бҹ’бһҹбһ¶бһҡбһҠбҹӮбһӣбһҖбҹҶбһ–бһ»бһ„бһҲбһ¶бһ“бһ…бһјбһӣбһҠбһӣбҹӢбһңбһҠбҹ’бһҸбһҗбҹ’бһҳбһёбҹ”"},{"q":"бһҸбһҫ CGT бһ“бҹ…бһҖбһҳбҹ’бһ–бһ»бһҮбһ¶бһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһўбһ“бһ»бһңбһҸбҹ’бһҸбһҖбҹ’бһ“бһ»бһ„бһўбһҸбҹ’бһҡбһ¶бһ”бҹүбһ»бһ“бҹ’бһҳбһ¶бһ“ бһ“бһ·бһ„бһӣбһҫбһҳбһјбһӣбһҠбҹ’бһӢбһ¶бһ“бһўбҹ’бһңбһё?","opts":["10% бһ“бҹғбһҸбһҳбҹ’бһӣбҹғбһӣбһҖбҹӢ","20% бһ“бҹғбһҸбһҳбҹ’бһӣбҹғбһӣбһҖбҹӢбһҹбһҡбһ»бһ”","20% бһ“бҹғбһ”бҹ’бһҡбһ¶бһҖбҹӢбһ…бҹҶбһҺбҹҒбһүбһҠбҹӮбһӣбһҸбҹ’бһҡбһјбһңбһҮбһ¶бһ”бҹӢбһ–бһ“бҹ’бһ’ вҖ” бһ…бҹҶбһҺбҹҒбһүбһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ–бһёбһҠбһҖбһҸбһҳбҹ’бһӣбҹғбһ‘бһ·бһү бһ“бһ·бһ„бһ…бҹҶбһҺбһ¶бһҷ","5% бһ–бһ“бҹ’бһ’бһ”бҹ’бһҡбһҗбһ¶бһ”бҹӢбһҸбҹ’бһҡбһ¶бһӣбһҫбһҸбһҳбҹ’бһӣбҹғбһ–бҹҒбһү"],"correct":2,"explain":"CGT бһӮбһә 20% бһ“бҹғбһ”бҹ’бһҡбһ¶бһҖбҹӢбһ…бҹҶбһҺбҹҒбһүбһҠбҹӮбһӣбһҸбҹ’бһҡбһјбһңбһҮбһ¶бһ”бҹӢбһ–бһ“бҹ’бһ’ бһҳбһ·бһ“бһҳбҹӮбһ“бһҸбһҳбҹ’бһӣбҹғбһӣбһҖбҹӢбһ–бҹҒбһүбһ“бҹ„бҹҮбһ‘бҹҒбҹ” бһ…бҹҶбһҺбҹҒбһү = бһҸбһҳбҹ’бһӣбҹғбһӣбһҖбҹӢ бһҠбһҖ бһҸбһҳбҹ’бһӣбҹғбһ‘бһ·бһү бһ“бһ·бһ„бһ…бҹҶбһҺбһ¶бһҷбһҠбҹӮбһӣбһҳбһ¶бһ“бһҜбһҖбһҹбһ¶бһҡбһ”бһүбҹ’бһҮбһ¶бһҖбҹӢбҹ” бһўбҹ’бһ“бһҖбһҮбһ¶бһ”бҹӢбһ–бһ“бҹ’бһ’бһҖбҹҸбһўбһ¶бһ…бһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһңбһ·бһ’бһёбһҹбһ¶бһҹбҹ’бһҸбҹ’бһҡбһҖбһ¶бһҸбҹӢбһҖбһ„бһҖбһҳбҹ’бһҡбһ·бһҸбһҗбҹҒбһҡ 80% бһ”бһ¶бһ“бһ•бһ„бһҠбҹӮбһҡбҹ” бһҸбҹӮбһ„бһҸбҹӮбһ”бһ„бҹ’бһ бһ¶бһүбһҡбһҝбһ„бһ“бҹҒбҹҮбһұбҹ’бһҷбһ”бһ¶бһ“бһҸбҹ’бһҡбһ№бһҳбһҸбҹ’бһҡбһјбһң вҖ” бһ—бһ¶бһ–бһҒбһ»бһҹбһӮбҹ’бһ“бһ¶бһ“бҹҒбҹҮбһ•бҹ’бһӣбһ¶бһҹбҹӢбһ”бҹ’бһҸбһјбһҡбһҖбһ¶бһҡбһӮбһҺбһ“бһ¶бһ–бҹҒбһӣбһӣбһҖбҹӢбһ…бҹҒбһүбһҡбһ”бһҹбҹӢбһңбһ·бһ“бһ·бһҷбҹ„бһӮбһ·бһ“бһҷбҹүбһ¶бһ„бһҒбҹ’бһӣбһ¶бҹҶбһ„бҹ”"}]}},
{id:3,week:1,title:"How Real Estate Works in Cambodia",short:"Real Estate Law",objectives:["Know the difference between the two title types, and why it matters", "Explain the 3 foreign-ownership rules to any client, in simple words", "Know the 4 steps of the buying process, in order"],sections:[{"label": "Title Types", "heading": "The single most important word in this lesson: title", "body": "\"Title\" is the legal document that proves who owns a property. If a client buys the wrong title type, they may not legally own anything. This is the biggest mistake to avoid in your entire job.", "analogy": "A strata title works like a car registration from the national government. It proves that exact car belongs to you, anywhere in the country, and any police officer can check it. A soft title is more like a note from your neighborhood chief. It might be true, but nobody outside that neighborhood has to accept it, and there is no national record of it at all.", "box": {"title": "The 2 title types you need to know:", "lines": ["Strata Title вҖ” permanent ownership, registered with the national government (Ministry of Land Management). The only title type foreigners can legally use. Every PHC property has this.", "Soft Title вҖ” registered only with a local authority, not the national government. Not legally valid nationwide. Only for Cambodian citizens. Never recommend this to a PHC client."]}, "warning": "If a developer cannot prove strata title for a condo, stop the conversation. Tell Nick before you say anything else to the client."}, {"label": "Foreign Ownership Rules", "heading": "3 rules for foreign buyers вҖ” know these by heart", "body": "Cambodia does allow foreigners to own property, but only under 3 specific rules. A client will ask about this in almost every conversation. A wrong answer here breaks trust immediately. The two pictures below show the two rules that are easiest to get wrong вҖ” look at the picture, then read the rule.", "diagrams": ["floors", "quota"], "rules": [{"title": "Rule 1: Ground floor is never allowed", "detail": "Foreigners can only own units starting from the 1st floor and up. A ground-floor unit cannot legally belong to a foreigner вҖ” no matter what title type it has.", "action": "If a foreign client likes a ground-floor unit, tell them immediately it is not possible, then show them a unit one floor up instead."}, {"title": "Rule 2: Max 70% foreign ownership per building", "detail": "No more than 70% of the units in one building can be owned by foreigners. This is called the \"foreign quota.\" Always check how much quota is left before you recommend a project.", "action": "Before recommending any project, ask: how much foreign quota is left in this building? If it's under 5%, say so clearly before showing anything."}, {"title": "Rule 3: Strata title is required, no exceptions", "detail": "Every unit sold to a foreign client must have strata title. This was covered in the section above вҖ” it matters enough to repeat here.", "action": "Check the title type for every unit, every time, before you mention it to a foreign client."}]}, {"label": "The Buying Process", "heading": "4 steps, in order вҖ” memorize this order", "body": "Every client will ask \"what happens next?\" at some point. Know this order without having to look it up. Here it is as a picture first вҖ” the details are below it.", "flow": [{"title": "Reservation", "sub": "Small deposit, $1,000вҖ“$3,000"}, {"title": "SPA", "sub": "Legal contract, lawyer reviews it"}, {"title": "Payment Schedule", "sub": "Staged payments during construction"}, {"title": "Handover", "sub": "Title registered in your name"}], "rules": [{"title": "Step 1: Reservation", "detail": "The client pays a small deposit, usually $1,000вҖ“$3,000. This holds the unit while paperwork is prepared. Ask the developer about their specific refund policy before the client pays.", "action": "Confirm the refund policy in writing before the client pays the reservation deposit."}, {"title": "Step 2: Sale & Purchase Agreement (SPA)", "detail": "This is the main legal contract between the buyer and the developer. Always recommend the client hire their own independent lawyer to review it before signing.", "action": "Say this exact sentence to every client: \"I recommend having your own lawyer review the SPA before you sign.\""}, {"title": "Step 3: Payment Schedule", "detail": "Payments are usually made in stages during construction, or as one larger payment if the unit is already built. Know the payment schedule for every project you present.", "action": "Before showing a project, check its payment schedule so you can answer questions without pausing."}, {"title": "Step 4: Handover & Title Registration", "detail": "The developer hands over the finished unit. The client makes the final payment. Then the strata title is registered in the client's name at the Ministry of Land Management. PHC helps coordinate this step.", "action": "Tell the client this step exists early on, so the ending of the process is not a surprise."}]}],roleplay:{"scenario": "Explaining the foreign ownership rules", "instructions": "Practice sounding direct without sounding harsh. The client needs clarity, not a lecture.", "lines": [{"role": "client", "text": "\"I like unit 01 on the ground floor вҖ” can I buy it?\""}, {"role": "agent", "text": "\"I need to tell you clearly: as a foreigner, you cannot legally own a ground-floor unit in Cambodia.\""}, {"role": "client", "text": "\"Why not?\""}, {"role": "agent", "text": "\"Cambodian law only allows foreign ownership starting from the 1st floor and up. This rule applies no matter what type of title the unit has.\""}, {"role": "client", "text": "\"But the developer told me it has strata title.\""}, {"role": "agent", "text": "\"The title type is correct вҖ” but the floor rule still applies. Unit 02, one floor up, has the same layout and is fully available to you. Would you like to see it?\""}, {"role": "note", "text": "Debrief: Did the agent sound direct without sounding harsh? Did the client feel redirected, not rejected?"}], "debrief": "The floor rule is a hard rule. Do not soften it or suggest a workaround. Redirect confidently to a real option instead."},quiz:[{"q": "A foreign buyer wants a ground-floor unit in a new BKK1 condo. What do you do?", "opts": ["Continue вҖ” ground floor is fine if the building has strata title", "Explain clearly that foreigners cannot legally own ground-floor units, and offer an alternative unit", "Ask the developer if they can make an exception", "Suggest they use a Cambodian friend's name instead"], "correct": 1, "explain": "Foreigners can only own units from the 1st floor and up. This rule has no exceptions. Redirect to a real, legal option right away."}, {"q": "A building already has 68% foreign ownership. A Japanese investor wants to buy a unit there. What do you do?", "opts": ["Continue вҖ” 68% is under the 70% limit, so it's fine", "Point out that only 2% of the foreign quota remains вҖ” this is very close to the legal limit", "Tell them foreigners cannot buy there because it's over 65%", "It doesn't matter вҖ” strata title protects them regardless"], "correct": 1, "explain": "Only 2% of the foreign quota is left. This must be said clearly. The building could hit its limit before handover, which would block title registration."}, {"q": "What is an SPA?", "opts": ["A property valuation report", "Sale & Purchase Agreement вҖ” the main legal contract between buyer and developer", "A standard payment schedule", "A government land tax form"], "correct": 1, "explain": "SPA = Sale & Purchase Agreement. It is a binding legal contract. Always recommend the client's own independent lawyer review it before signing."}, {"q": "What is the first step a buyer takes to hold a specific unit?", "opts": ["Sign the SPA immediately", "Apply for a visa", "Pay a reservation deposit", "Pay the full purchase price"], "correct": 2, "explain": "The reservation deposit comes first вҖ” usually $1,000вҖ“$3,000. It holds the unit while paperwork is prepared. Always confirm the refund policy before the client pays."}, {"q": "Soft Title is:", "opts": ["Acceptable for foreign buyers if the condo is already built", "A national-level permanent title, equal to strata title", "Registered only with a local authority, not recognized nationwide вҖ” for Cambodian citizens only", "The same as strata title, but for commercial property"], "correct": 2, "explain": "Soft Title is not recognized at the national level. It is only for Cambodian citizens. Never recommend it to any PHC client, regardless of nationality."}],reflection:"In your own simple words, explain the foreign ownership rules to a first-time buyer from Japan who has never bought property outside Japan before.",km:{"title":"бһҠбҹҶбһҺбһҫбһҡбһҖбһ¶бһҡбһўбһ…бһӣбһ“бһ‘бҹ’бһҡбһ–бҹ’бһҷбһ“бҹ…бһҖбһҳбҹ’бһ–бһ»бһҮбһ¶","short":"бһ…бҹ’бһ”бһ¶бһ”бҹӢбһўбһ…бһӣбһ“бһ‘бҹ’бһҡбһ–бҹ’бһҷ","objectives":["бһҹбҹ’бһӮбһ¶бһӣбҹӢбһ—бһ¶бһ–бһҒбһ»бһҹбһӮбҹ’бһ“бһ¶бһҡбһңбһ¶бһ„бһ”бҹ’бһӣбһ„бҹӢбһҡбһ№бһ„ (Hard Title) бһ”бҹ’бһӣбһ„бҹӢбһўбһӮбһ¶бһҡбһҹбһ бһҖбһҳбҹ’бһҳбһҹбһ·бһ‘бҹ’бһ’бһ· (Strata Title) бһ“бһ·бһ„бһ”бҹ’бһӣбһ„бҹӢбһ‘бһ“бҹӢ (Soft Title)","бһҷбһӣбҹӢбһҠбһ№бһ„бһ–бһёбһҖбҹ’бһ”бһҪбһ“бһ…бҹ’бһ”бһ¶бһ”бҹӢбһҖбһҳбҹ’бһҳбһҹбһ·бһ‘бҹ’бһ’бһ·бһ”бһҡбһ‘бҹҒбһҹ бһ“бһ·бһ„бһўбһ¶бһ…бһ–бһ“бҹ’бһҷбһӣбҹӢбһҠбһӣбҹӢбһўбһҸбһ·бһҗбһ·бһҮбһ“бһӮбҹ’бһҡбһ”бҹӢбһҡбһјбһ”бһ”бһ¶бһ“","бһҹбҹ’бһӮбһ¶бһӣбҹӢбһҠбҹҶбһҺбһҫбһҡбһҖбһ¶бһҡбһ‘бһ·бһүбһҮбһ¶бһҮбҹҶбһ бһ¶бһ“бҹ—"],"sections":[{"label":"бһ”бҹ’бһҡбһ—бҹҒбһ‘бһ”бҹ’бһӣбһ„бҹӢбһҖбһҳбҹ’бһҳбһҹбһ·бһ‘бҹ’бһ’бһ·","heading":"бһ”бҹ’бһҡбһ—бҹҒбһ‘бһ”бҹ’бһӣбһ„бҹӢбһӮбһәбһҮбһ¶бһўбҹ’бһңбһёбһҠбҹӮбһӣбһҹбҹҶбһҒбһ¶бһ“бҹӢбһ”бҹҶбһ•бһ»бһҸбһҠбҹӮбһӣбһўбҹ’бһ“бһҖбһ“бһ№бһ„бһҸбҹ’бһҡбһјбһңбһҡбҹҖбһ“","body":"бһ”бҹ’бһҡбһ—бҹҒбһ‘бһ”бҹ’бһӣбһ„бҹӢбһҖбҹҶбһҺбһҸбҹӢбһ–бһёбһҖбһҳбҹ’бһҳбһҹбһ·бһ‘бҹ’бһ’бһ·бһҹбҹ’бһҡбһ”бһ…бҹ’бһ”бһ¶бһ”бҹӢбҹ” бһ”бҹ’бһӣбһ„бҹӢбһҒбһ»бһҹбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһўбҹ’бһ“бһҖбһ‘бһ·бһүбһ”бһҡбһ‘бҹҒбһҹ = бһӮбҹ’бһҳбһ¶бһ“бһҖбһҳбҹ’бһҳбһҹбһ·бһ‘бҹ’бһ’бһ·бһҹбҹ’бһҡбһ”бһ…бҹ’бһ”бһ¶бһ”бҹӢбҹ” бһҳбһ·бһ“бһҸбҹ’бһҡбһјбһңбһҺбҹӮбһ“бһ¶бҹҶбһӮбһҳбҹ’бһҡбҹ„бһ„бһ‘бҹ…бһҖбһ¶бһ“бҹӢбһўбһҸбһ·бһҗбһ·бһҮбһ“бһ”бһҡбһ‘бҹҒбһҹбһҠбҹ„бһҷбһҳбһ·бһ“бһ”бһ¶бһ“бһ•бҹ’бһ‘бҹҖбһ„бһ•бҹ’бһ‘бһ¶бһҸбҹӢбһ”бҹ’бһҡбһ—бҹҒбһ‘бһ”бҹ’бһӣбһ„бҹӢбһҮбһ¶бһҳбһ»бһ“бһЎбһҫбһҷбҹ”","box":{"title":"бһ”бҹ’бһҡбһ—бҹҒбһ‘бһ”бҹ’бһӣбһ„бҹӢбһ–бһёбһҡбһҠбҹӮбһӣбһўбҹ’бһ“бһҖбһҸбҹ’бһҡбһјбһңбһҸбҹӮбһҠбһ№бһ„бҹ–","lines":["бһ”бҹ’бһӣбһ„бҹӢбһҡбһ№бһ„ / бһ”бҹ’бһӣбһ„бҹӢбһўбһӮбһ¶бһҡбһҹбһ бһҖбһҳбҹ’бһҳбһҹбһ·бһ‘бҹ’бһ’бһ· (Strata Title) вҖ” бһҖбһҳбҹ’бһҳбһҹбһ·бһ‘бҹ’бһ’бһ·бһўбһ…бһ·бһ“бҹ’бһҸбҹ’бһҡбҹғбһҷбҹҚбҹ” бһ…бһ»бҹҮбһ”бһүбҹ’бһҮбһёбһ“бҹ…бһҖбҹ’бһҡбһҹбһҪбһ„бһҡбҹҖбһ”бһ…бҹҶбһҠбҹӮбһ“бһҠбһёбҹ” бһҸбһҳбҹ’бһҡбһјбһңбһұбҹ’бһҷбһҳбһ¶бһ“бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһўбҹ’бһ“бһҖбһ‘бһ·бһүбһ”бһҡбһ‘бҹҒбһҹбһ‘бһ¶бҹҶбһ„бһўбһҹбҹӢбҹ” бһҮбһ¶бһҹбҹ’бһҠбһ„бҹӢбһҠбһ¶бһҡбһҡбһ”бһҹбҹӢ PHCбҹ”","бһ”бҹ’бһӣбһ„бҹӢбһ‘бһ“бҹӢ вҖ” бһ…бһ»бҹҮбһ”бһүбҹ’бһҮбһёбһҸбҹ’бһҡбһ№бһҳбһўбһ¶бһҮбҹ’бһүбһ¶бһ’бһҡбһҳбһјбһӣбһҠбҹ’бһӢбһ¶бһ“ бһҳбһ·бһ“бһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһ‘бһ‘бһҪбһӣбһҹбҹ’бһӮбһ¶бһӣбҹӢбһҖбҹ’бһ“бһ»бһ„бһҖбһҳбҹ’бһҡбһ·бһҸбһҮбһ¶бһҸбһ·бһЎбһҫбһҷбҹ” бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҮбһ“бһҮбһ¶бһҸбһ·бһҒбҹ’бһҳбҹӮбһҡбһҸбҹӮбһ”бҹүбһ»бһҺбҹ’бһҺбҹ„бҹҮбҹ” бһҳбһ·бһ“бһҸбҹ’бһҡбһјбһңбһҺбҹӮбһ“бһ¶бҹҶбһҠбһӣбҹӢбһўбһҸбһ·бһҗбһ·бһҮбһ“ PHC бһҺбһ¶бһҳбҹ’бһ“бһ¶бһҖбҹӢбһЎбһҫбһҷбҹ”"]},"warning":"бһ”бҹ’бһҡбһҹбһ·бһ“бһ”бһҫбһҳбҹ’бһ…бһ¶бһҹбҹӢбһӮбһҳбҹ’бһҡбҹ„бһ„бһҳбһ·бһ“бһўбһ¶бһ…бһ”бһүбҹ’бһҮбһ¶бһҖбҹӢбһ–бһёбһ”бҹ’бһӣбһ„бҹӢбһўбһӮбһ¶бһҡбһҹбһ бһҖбһҳбҹ’бһҳбһҹбһ·бһ‘бҹ’бһ’бһ· (strata title) бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҒбһ»бһ“бһҠбһјбһ”бһ¶бһ“бһ‘бҹҒ вҖ” бһҖбһ»бҹҶбһ”бһ“бҹ’бһҸбһ‘бҹ…бһҳбһ»бһҒбһ‘бҹҖбһҸбҹ” бһҡбһ¶бһҷбһҖбһ¶бһҡбһҺбҹҚбһҮбһјбһ“ Nick бһҳбһ»бһ“бһ–бҹҒбһӣбһ•бҹ’бһҸбһӣбҹӢбһ”бҹ’бһҡбһ№бһҖбҹ’бһҹбһ¶бһҠбһӣбҹӢбһўбһҸбһ·бһҗбһ·бһҮбһ“бҹ”"},{"label":"бһ…бҹ’бһ”бһ¶бһ”бҹӢбһҖбһҳбҹ’бһҳбһҹбһ·бһ‘бҹ’бһ’бһ·бһ”бһҡбһ‘бҹҒбһҹ","heading":"бһңбһ·бһ’бһ¶бһ“бһ”бһёбһҷбҹүбһ¶бһ„ вҖ” бһҸбҹ’бһҡбһјбһңбһ…бһ¶бҹҶбһұбҹ’бһҷбһ…бҹ’бһ”бһ¶бһҹбҹӢ","body":"бһ”бҹ’бһҡбһ‘бҹҒбһҹбһҖбһҳбҹ’бһ–бһ»бһҮбһ¶бһўбһ“бһ»бһүбҹ’бһүбһ¶бһҸбһұбҹ’бһҷбһҮбһ“бһ”бһҡбһ‘бҹҒбһҹбһҖбһ¶бһҸбҹӢбһ”бҹ’бһӣбһ„бҹӢбһ•бҹ’бһ‘бһ¶бһӣбҹӢбһҒб ҹ”"}]},{"label":"бһҠбҹҶбһҺбһҫбһҡбһҖбһ¶бһҡбһ‘бһ·бһү","heading":"бһҮбҹҶбһ бһ¶бһ“бһҸбһ¶бһҳбһҮбҹҶбһ бһ¶бһ“ вҖ” бһҖбҹ’бһҸбһ¶бһ”бҹӢбһҠбҹҶбһҺбһҫбһҡбһҖбһ¶бһҡбһ“бҹҒбҹҮбһұбҹ’бһҷбһҮбһ¶бһ”бҹӢ","body":"бһўбһҸбһ·бһҗбһ·бһҮбһ“бһ“бһ№бһ„бһҹбһ»бҹҶбһұбҹ’бһҷбһўбҹ’бһ“бһҖбһ“бһ¶бҹҶбһ–бһҪбһҖбһӮбһ¶бһҸбҹӢбһҶбҹ’бһӣбһ„бһҖбһ¶бһҸбҹӢбһҠбҹҶбһҺбһҫбһҡбһҖбһ¶бһҡбһ‘бһ·бһүбҹ” бһ…бһјбһҡбһҷбһӣбҹӢбһҠбһ№бһ„бһ–бһёбһңбһ¶бһұбҹ’бһҷбһ”бһ¶бһ“бһ–бҹҒбһүбһӣбҹҒбһүбҹ”","rules":[{"title":"1. бһҖбһ¶бһҡбһҖбһҖбҹӢбһ‘бһ»бһҖ (Reservation)","detail":"бһўбһҸбһ·бһҗбһ·бһҮбһ“бһ”бһ„бҹӢбһ”бҹ’бһҡбһ¶бһҖбҹӢбһҖбһҖбҹӢбһ‘бһ»бһҖ ($1,000вҖ“$3,000)бҹ” бһҡбһҖбҹ’бһҹбһ¶бһҷбһјбһ“бһёбһҸбһҒбһҺбҹҲбһ–бҹҒбһӣбһҠбҹӮбһӣбһҜбһҖбһҹбһ¶бһҡбһҖбҹҶбһ–бһ»бһ„бһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһҡбҹҖбһ”бһ…бҹҶбҹ” бһ”бһүбҹ’бһҮбһ¶бһҖбҹӢбһ–бһёбһӮбҹ„бһӣбһҖбһ¶бһҡбһҺбҹҚбһҹбһ„бһ”бҹ’бһҡбһ¶бһҖбҹӢбһңбһ·бһүбһҸбһ¶бһҳбһӮбһҳбҹ’бһҡбҹ„бһ„бһ“бһёбһҳбһҪбһҷбҹ—бҹ”"},{"title":"2. бһҖбһ·бһ…бҹ’бһ…бһҹбһ“бҹ’бһҷбһ¶бһ‘бһ·бһүбһӣбһҖбҹӢ (SPA)","detail":"бһҖбһ·бһ…бҹ’бһ…бһҹбһ“бҹ’бһҷбһ¶бһ•бҹ’бһӣбһјбһңбһ…бҹ’бһ”бһ¶бһ”бҹӢбһҡбһңбһ¶бһ„бһўбҹ’бһ“бһҖбһ‘бһ·бһү бһ“бһ·бһ„бһҳбҹ’бһ…бһ¶бһҹбҹӢбһӮбһҳбҹ’бһҡбҹ„бһ„бҹ” бһҸбҹӮбһ„бһҸбҹӮбһҺбҹӮбһ“бһ¶бҹҶбһўбһҸбһ·бһҗбһ·бһҮбһ“бһұбҹ’бһҷбһҳбһ¶бһ“бһ‘бһёбһ”бҹ’бһҡбһ№бһҖбҹ’бһҹбһ¶бһ•бҹ’бһ“бҹӮбһҖбһ…бҹ’бһ”бһ¶бһ”бҹӢбһҜбһҖбһҡбһ¶бһҮбҹ’бһҷбһ–бһ·бһ“бһ·бһҸбҹ’бһҷбһҳбһҫбһӣбһҳбһ»бһ“бһ–бҹҒбһӣбһ…бһ»бҹҮбһ бһҸбҹ’бһҗбһӣбҹҒбһҒбһ¶бҹ”"},{"title":"3. бһҸбһ¶бһҡбһ¶бһ„бһҖбһ¶бһҡбһ”бһ„бҹӢбһ”бҹ’бһҡбһ¶бһҖбҹӢ","detail":"бһҖбһ¶бһҡбһ”бһ„бҹӢбһ”бҹ’бһҡбһ¶бһҖбҹӢбһҸбһ¶бһҳбһҠбҹҶбһҺбһ¶бһҖбҹӢбһҖбһ¶бһӣбһҖбҹ’бһ“бһ»бһ„бһўбҹҶбһЎбһ»бһ„бһ–бҹҒбһӣбһҹбһ¶бһ„бһҹбһ„бҹӢ бһ¬бһ”бһ„бҹӢбһҳбһ»бһ“бһ…бҹ’бһҡбһҫбһ“бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҷбһјбһ“бһёбһҸбһҠбҹӮбһӣбһҹбһ¶бһ„бһҹбһ„бҹӢбһҡбһҪбһ…бҹ” бһҸбҹ’бһҡбһјбһңбһҹбҹ’бһӮбһ¶бһӣбҹӢбһҸбһ¶бһҡбһ¶бһ„бһ”бһ„бҹӢбһ”бҹ’бһҡбһ¶бһҖбҹӢбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһӮбҹ’бһҡбһ”бҹӢбһӮбһҳбҹ’бһҡбҹ„бһ„бһҠбҹӮбһӣбһўбҹ’бһ“бһҖбһ”бһ„бҹ’бһ бһ¶бһүбҹ”"},{"title":"4. бһҖбһ¶бһҡбһ”бҹ’бһҡбһӮбһӣбҹӢбһ•бҹ’бһ‘бҹҮ бһ“бһ·бһ„бһҖбһ¶бһҡбһ•бҹ’бһ‘бҹҒбһҡбһ”бҹ’бһӣбһ„бҹӢ","detail":"бһҖбһ¶бһҡбһ”бҹ’бһҡбһӮбһӣбҹӢбһ•бҹ’бһ‘бҹҮбһҮбһ¶бһҖбҹӢбһҹбҹ’бһҸбҹӮбһ„ бһҖбһ¶бһҡбһ”бһ„ һ¶бһ”бҹӢбһҠбҹӮбһӣбһ”бҹ’бһҡбһ‘бҹҒбһҹбһҖбһҳбҹ’бһ–бһ»бһҮбһ¶бһ•бҹ’бһҸбһӣбҹӢбһҮбһјбһ“бҹ”\""},{"role":"note","text":"бһҖбһ¶бһҡбһ”бһјбһҖбһҹбһҡбһ»бһ”бһҠбһҖбһ–бһ·бһҹбҹ„бһ’бһ“бҹҚбҹ– бһҸбһҫбһ—бҹ’бһ“бһ¶бһҖбҹӢбһ„бһ¶бһҡбһ”бһ¶бһ“бһ•бҹ’бһҸбһӣбҹӢбһ бҹҒбһҸбһ»бһ•бһӣбһ“бҹғбһҖбһ¶бһҡбһҮбҹ’бһҡбһҫбһҹбһҡбһҫбһҹбһҷбҹүбһ¶бһ„бһ…бҹ’бһ”бһ¶бһҹбҹӢбһӣбһ¶бһҹбҹӢбһҠбҹӮбһҡбһ¬бһ‘бҹҒ? бһҸбһҫбһўбһҸбһ·бһҗбһ·бһҮбһ“бһҳбһ¶бһ“бһўбһ¶бһҡбһҳбҹ’бһҳбһҺбҹҚбһҗбһ¶бһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһҹбҹ’бһҸбһ¶бһ”бҹӢ вҖ” бһҳбһ·бһ“бһҳбҹӮбһ“бһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһҠбҹҒбһүбһҠбҹ„бһӣбһӣбһҖбҹӢбһҠбҹӮбһҡбһ¬бһ‘бҹҒ?"}],"debrief":"бһҸбҹӮбһ„бһҸбҹӮбһ•бҹ’бһҸбһӣбҹӢбһ бҹҒбһҸбһ»бһ•бһӣбһҗбһ¶бһ бҹҒбһҸбһ»бһўбҹ’бһңбһёбһ”бһ¶бһ“бһҮбһ¶бһўбҹ’бһ“бһҖбһҮбҹ’бһҡбһҫбһҹбһҡбһҫбһҹбһҮбһҳбҹ’бһҡбһҫбһҹ 2вҖ“3 бһҠбҹӮбһӣбһўбҹ’бһ“бһҖбһ”бһ„бҹ’бһ бһ¶бһүбҹ” бһ–бһ¶бһҖбҹ’бһҷбһҗбһ¶ 'бһҮбһҳбҹ’бһҡбһҫбһҹбһ‘бһ¶бҹҶбһ„бһ“бҹҒбҹҮбһҹбһҳбһҹбҹ’бһҡбһ”бһ“бһ№бһ„бһӮбҹ„бһӣбһҠбҹ…бһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖ' бһӮбһәбһҳбһ·бһ“бһ‘бһ¶бһ“бҹӢбһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһҡбһ¶бһ“бҹӢбһ‘бҹҒ вҖ” бһ…бһјбһ–бһ“бҹ’бһҷбһӣбҹӢбһҗбһ¶бһҸбһҫбһңбһ¶бһҹбһҳбһҹбҹ’бһҡбһ”бһҠбҹ„бһҷбһҡбһ”бҹҖбһ”бһҺбһ¶бҹ”"},"quiz":[{"q":"бһҸбһҫбһӮбһҳбҹ’бһҡбҹ„бһ„ Megakim бһҳбһҪбһҷбһҺбһ¶бһҠбҹӮбһӣбһӣбһҖбҹӢбһўбһҹбҹӢ 85% бһ“бҹғбһҷбһјбһ“бһёбһҸбһҹбһҡбһ»бһ”бһҖбҹ’бһ“бһ»бһ„бһҡбһҷбҹҲбһ–бҹҒбһӣ 6 бһҒбҹӮбһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ–бһёбһ”бһҫбһҖбһӣбһҖбҹӢ?","opts":["Time Square 9","Time Square 10","Time Square 11","Time Square 8"],"correct":3,"explain":"Time Square 8, бһ‘бһҪбһӣбһ‘бҹҶбһ–бһјбһ„бҹ” бһҖбһ¶бһҡбһ”бһүбҹ’бһҮбһ¶бһҖбҹӢбһ‘бһёбһ•бҹ’бһҹбһ¶бһҡбһҷбҹүбһ¶бһ„бһҡбһ№бһ„бһҳбһ¶бҹҶбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ·бһҹбһ¶бһ„бһҹбһ„бҹӢбһ”бҹ’бһҡбһӮбһӣбҹӢбһ•бҹ’бһ‘бҹҮбһҡбһ”бһҹбҹӢ Megakim бһ“бһ·бһ„бһҸбһҳбҹ’бһҡбһјбһңбһҖбһ¶бһҡбһ‘бһ·бһүбһ–бһ·бһҸбһ”бҹ’бһҡбһ¶бһҖбһҠбҹ”"},{"q":"бһңбһ·бһ“бһ·бһҷбҹ„бһӮбһ·бһ“бһҮбһ”бҹүбһ»бһ“бһҳбҹ’бһ“бһ¶бһҖбҹӢбһ…бһ„бҹӢбһ”бһ¶бһ“бһӮбһҳбҹ’бһҡбҹ„бһ„бһҠбҹӮбһӣбһҳбһ¶бһ“бһ‘бҹҶбһ“бһ»бһҖбһ…бһ·бһҸбҹ’бһҸбһҒбҹ’бһ–бһҹбҹӢбһ”бҹҶбһ•бһ»бһҸбһ“бҹ…бһҖбҹ’бһ“бһ»бһ„бһ”бһүбҹ’бһҮбһёбҹ” бһўбҹ’бһ“бһҖбһҺбҹӮбһ“бһ¶бҹҶбҹ–","opts":["Le CondГ© BKK1","J Tower 2 бһ¬ J Tower 3","Time Square 9","G.A.T.O Tower"],"correct":1,"explain":"J Tower 2 бһ¬ J Tower 3бҹ” бһҳбҹ’бһ…бһ¶бһҹбҹӢбһӮбһҳбҹ’бһҡбҹ„бһ„бһҮбһ”бҹүбһ»бһ“ (Tanichu) = бһҹбһүбҹ’бһүбһ¶бһ“бҹғбһ‘бҹҶбһ“бһ»бһҖбһ…бһ·бһҸбҹ’бһҸбһҸбһ¶бһҳбһңбһ”бҹ’бһ”бһ’бһҳбҹҢбһҒбҹ’бһ–бһҹбҹӢбһ”бҹҶбһ•бһ»бһҸбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһңбһ·бһ“бһ·бһҷбҹ„бһӮбһ·бһ“бһҮбһ”бҹүбһ»бһ“бҹ” бһ“бҹҒбҹҮбһӮбһәбһҮбһ¶бһҖбһ¶бһҡбһҺбҹӮбһ“бһ¶бҹҶбһҖбһҳбҹ’бһҡбһ·бһҸ Tier 1 бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҖбҹ’бһҡбһ»бһҳбһўбһҸбһ·бһҗбһ·бһҮбһ“бһ“бҹ„бҹҮбҹ”"},{"q":"Le CondГ© бһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһҡбһ„бһҠбҹ„бһҷбһҖбҹ’бһҡбһ»бһҳбһ бҹҠбһ»бһ“бһ”бҹ’бһҡбһҸбһ·бһ”бһҸбҹ’бһҸбһ·бһҖбһҡбһҳбһҪбһҷбһҺбһ¶ вҖ” бһ бһҫбһҷбһ бҹҒбһҸбһ»бһўбҹ’бһңбһёбһ”бһ¶бһ“бһҮбһ¶бһҡбһҝбһ„бһ“бҹҒбҹҮбһҹбҹҶбһҒбһ¶бһ“бҹӢ?","opts":["бһҖбһ¶бһҡбһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһҡбһ„бһўбһ…бһӣбһ“бһ‘бҹ’бһҡбһ–бҹ’бһҷ Megakim","Hopetree Japan вҖ” бһ”бһ„бҹ’бһ бһ¶бһүбһ–бһёбһҖбһ¶бһҡбһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһҡбһ„бһҹбҹ’бһҠбһ„бҹӢбһҠбһ¶бһҡбһҮбһ”бҹүбһ»бһ“бһҖбһҳбҹ’бһҡбһ·бһҸбһҹбҹ’бһҗбһ¶бһ”бҹҗбһ“","Wangfu International бһҠбҹ„бһҷбһ•бҹ’бһ‘бһ¶бһӣбҹӢ","бһҖбҹ’бһҡбһ»бһҳбһ бҹҠбһ»бһ“бһ—бҹ’бһ“бһ¶бһҖбҹӢбһ„бһ¶бһҡбһҖбҹ’бһ“бһ»бһ„бһҹбҹ’бһҡбһ»бһҖбһҜбһҖбһҡбһ¶бһҮбҹ’бһҷ"],"correct":1,"explain":"Hopetree Japanбҹ” бһ“бҹҒбҹҮбһӮбһәбһҮбһ¶бһ…бҹҶбһҺбһ»бһ…бһӣбһҖбҹӢбһҹбҹҶбһҒбһ¶бһ“бҹӢбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһңбһ·бһ“бһ·бһҷбҹ„бһӮбһ·бһ“бһҮбһ”бҹүбһ»бһ“ (бһҳбҹүбһ¶бһҖбһҹбһүбҹ’бһүбһ¶бһҠбҹӮбһӣбһҹбҹ’бһӮбһ¶бһӣбҹӢ) бһ“бһ·бһ„бһўбҹ’бһ“бһҖбһ‘бһ·бһүбһўбһәбһҡбҹүбһ»бһ”бһҠбҹӮбһӣбһҳбһ·бһ“бһ…бһ„бҹӢбһ…бһ¶бһҸбҹӢбһ…бҹӮбһ„бһ•бҹ’бһ‘бһ¶бһӣбҹӢ (бһ”бҹ’бһҡбһҸбһ·бһ”бһҸбҹ’бһҸбһ·бһҖбһҡбһӮбһ»бһҺбһ—бһ¶бһ–бһҹбҹ’бһҗбһ¶бһ”бҹҗбһ“)бҹ”"},{"q":"бһўбҹ’бһ“бһҖбһ‘бһ·бһүбһўбһәбһҡбҹүбһ»бһ”бһҳбҹ’бһ“бһ¶бһҖбҹӢбһ…бһ„бҹӢбһ”бһ¶бһ“бһ‘бҹ’бһҡбһ–бҹ’бһҷбһҹбһҳбҹ’бһ”бһҸбҹ’бһҸбһ·бһҮбһҪбһӣбһҹбһ¶бһ„бһҹбһ„бҹӢбһҡбһҪбһ… бһҳбһ·бһ“бһ…бһ„бҹӢбһ…бһ¶бһҸбҹӢбһ…бҹӮбһ„бһ•бҹ’бһ‘бһ¶бһӣбҹӢ бһҖбҹ’бһҡбҹ„бһҳ $200Kбҹ” бһҖбһ¶бһҡбһҺбҹӮбһ“бһ¶бҹҶбһҠбҹҶбһ”бһјбһ„бһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖбһӮбһәбҹ–","opts":["Time Square 10 Otres Beach вҖ” бһҸбһҳбҹ’бһӣбҹғбһ…бһ¶бһ”бҹӢбһ•бҹ’бһҸбһҫбһҳбһ‘бһ¶бһ”бһ”бҹҶбһ•бһ»бһҸ","G.A.T.O Tower вҖ” бһ‘бһёбһҸбһ¶бҹҶбһ„ BKK1 бһҠбҹҸбһӣбҹҒбһ…бһ’бҹ’бһӣбҹ„","Le CondГ© BKK1 вҖ” бһ”бһүбҹ’бһ…бһ”бҹӢбһҖбһ¶бһҡбһҹбһ¶бһ„бһҹбһ„бҹӢбһ§бһҹбһ—бһ¶ 2025, бһҖбһ¶бһҡбһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһҡбһ„бһҠбҹ„бһҷ Hopetree Japan, бһ…бһ¶бһ”бҹӢбһ–бһё $150K","J Tower 3 вҖ” бһҮбһ”бҹүбһ»бһ“бһ”бҹ’бһҡбһҺбһ·бһҸ, бһҖбһҳбҹ’бһҡбһ·бһҸбһҒбҹ’бһ–бһҹбҹӢбһ”бҹҶбһ•бһ»бһҸ"],"correct":2,"explain":"Le CondГ© бһҸбҹ’бһҡбһјбһңбһӮбҹ’бһ“бһ¶бһ“бһ№бһ„бһӣбһҖбҹ’бһҒбһҒбһҺбҹ’бһҢбһ‘бһ¶бҹҶбһ„бһўбһҹбҹӢбҹ– бһҹбһ¶бһ„бһҹбһ„бҹӢбһҡбһҪбһ…бһҡбһ¶бһӣбҹӢ, бһҖбһ¶бһҡбһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһҡбһ„бһҹбҹ’бһҗбһ¶бһ”бҹҗбһ“ (Hopetree Japan), бһ‘бһёбһҸбһ¶бҹҶбһ„ BKK1, бһ…бһ¶бһ”бҹӢбһ–бһё $150Kбҹ” бһңбһ¶бһӮбһәбһҮбһ¶бһҖбһ¶бһҡбһ•бҹ’бһӮбһјбһ•бҹ’бһӮбһ„бһҖбһҳбҹ’бһҡбһ·бһҸ Tier 1 бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһўбҹ’бһ“бһҖбһ‘бһ·бһүбһўбһәбһҡбҹүбһ»бһ”бһҠбҹӮбһӣбһ…бһ„бҹӢбһ”бһ¶бһ“бһҖбһ¶бһҡбһҮбһҪбһӣбһҠбҹ„бһҷбһҳбһ·бһ“бһ…бһ¶бһҸбҹӢбһ…бҹӮбһ„бһ•бҹ’бһ‘бһ¶бһӣбҹӢбһҖбҹ’бһҡбҹ„бһҳ $200Kбҹ”"}]}},
{id:5,week:1,title:"Who Our Clients Are",short:"Client Segments",objectives:["Know PHC's 5 client segments: profile, goal, and decision style", "Identify which segment a new client belongs to within 5 minutes", "Know which projects match each segment вҖ” and why"],sections:[{"label": "Why Segmentation Matters", "heading": "One approach does not fit every client", "body": "The biggest mistake a new agent makes is treating every client the same way. A safety-focused Japanese investor needs a very different conversation from a young Khmer professional buying their first home. Knowing your client's segment before you talk about any project is not optional вҖ” it is the foundation of good advice.", "box": {"title": "The rule", "lines": ["Identify the client segment first. Match the project second. Never do it the other way around."]}}, {"label": "The 5 Segments", "heading": "Know each profile clearly", "body": "These are the five types of client PHC serves. Each one has a different goal, decision style, and best-fit project.", "table": {"headers": ["Segment", "Profile", "Main goal", "Best projects"], "rows": [["Japanese investors", "40вҖ“65, high earner, low risk tolerance", "Stable passive income, capital safety", "J Tower 2, J Tower 3, TS9, Le CondГ©"], ["German/European", "45вҖ“65, pre-retirement, analytical", "Monthly income to supplement pension", "Le CondГ©, Royal Platinum, Peninsula"], ["Overseas Cambodians", "30вҖ“55, abroad, family-focused", "Home for family, safe capital, connection", "TS8, TS11, Royal Platinum, TS9"], ["Local Khmer", "25вҖ“50, Phnom Penh-based, lifestyle upgrade", "Safe family home, community", "TS11 BKK3, Royal Platinum, TS8"], ["Other foreign investors", "Russian, Chinese, hands-off rental", "Yield and management quality", "Le CondГ©, Peninsula, TS9"]]}}, {"label": "The 5-Minute Test", "heading": "3 questions, in order, tell you the segment", "body": "In the first 5 minutes of any first meeting, ask these 3 questions in this order. By the end, you'll know which segment you're talking to.", "flow": [{"title": "1. Background", "sub": "Nationality and past investing experience"}, {"title": "2. Their goal", "sub": "Income, lifestyle, or both"}, {"title": "3. The power question", "sub": "What would make this the wrong decision?"}], "rules": [{"title": "Question 1: background", "detail": "\"Have you invested in property before вҖ” here or anywhere else?\" This sets the segment fast.", "action": "Ask this within the first minute of any new client conversation."}, {"title": "Question 2: their goal", "detail": "\"What do you hope this investment gives you?\" Rental income points to an investor. Living there points to an end-user.", "action": "Listen for the word \"income\" vs the word \"live\" вҖ” that single word tells you a lot."}, {"title": "Question 3: the power question", "detail": "\"What would make this the wrong decision for you?\" This single question reveals risk tolerance, decision criteria, and hidden worries all at once.", "action": "Ask this question word-for-word вҖ” it is the most useful sentence in this entire lesson."}]}],roleplay:{"scenario": "Identifying a client's segment in 5 minutes", "instructions": "Practice the 5-minute test feeling natural вҖ” not like an interrogation.", "lines": [{"role": "client", "text": "\"I'm interested in property in BKK1. What do you have?\""}, {"role": "agent", "text": "\"Happy to show you. Before I do вҖ” can I ask a couple of quick questions so I show you the most relevant options?\""}, {"role": "client", "text": "\"Sure, go ahead.\""}, {"role": "agent", "text": "\"What's driving your interest right now вҖ” rental income, capital growth, a place to live, or a mix?\""}, {"role": "client", "text": "\"Mostly a place to spend 4-5 months a year, but ideally it pays for itself when I'm not there.\""}, {"role": "agent", "text": "\"That's very helpful. And is this for retirement use, or are you still working?\""}, {"role": "client", "text": "\"I retire in about 18 months. I'm based in Switzerland.\""}, {"role": "agent", "text": "\"Perfect вҖ” that's a profile our co-founder Reza works with directly. He specializes with European retirement buyers. I'd like to bring him into our next conversation.\""}, {"role": "note", "text": "Debrief: Did the agent avoid showing everything before qualifying? Did the handoff to Reza feel smooth?"}], "debrief": "Notice the agent didn't show anything. In 4 questions they identified: European вҶ’ retirement buyer вҶ’ part-year use + rental вҶ’ needs Reza. Segment first. Always."},quiz:[{"q": "A 52-year-old German client says their main goal is \"reliable monthly income to add to my pension.\" Which segment are they?", "opts": ["Segment 5 вҖ” other foreign investors", "Segment 2 вҖ” German/European", "Segment 1 вҖ” Japanese investors", "Segment 3 вҖ” Overseas Cambodians"], "correct": 1, "explain": "German/European. The pension-income framing, European nationality, and reason-led approach are exactly the expected profile. Bring in Reza early."}, {"q": "A local Khmer buyer says \"I need to discuss with my parents before deciding.\" What should you do?", "opts": ["Push for a faster decision вҖ” parents aren't the buyer", "Support it fully вҖ” provide shareable documents and welcome the family into the process", "Lower the price to make the decision easier", "Follow up more frequently to keep momentum"], "correct": 1, "explain": "Family agreement is a normal part of the process for local Khmer buyers. Support it. Prepare shareable documents. Never treat it as an obstacle."}, {"q": "What is the most powerful of the 3 qualifying questions?", "opts": ["\"What's your budget?\"", "\"How did you hear about us?\"", "\"What would make this the wrong decision for you?\"", "\"Are you buying for yourself or as an investment?\""], "correct": 2, "explain": "\"What would make this the wrong decision for you?\" reveals risk tolerance, worries, and decision criteria all at once. It's the single most valuable question in the qualifying process."}, {"q": "The correct order for advising any client is:", "opts": ["Match a project first, then understand the client", "Identify the segment first, then match a project", "Show every available option, then narrow down", "Ask about budget first, then everything else"], "correct": 1, "explain": "Identify the segment first. Match the project second. This order is never reversed at PHC вҖ” showing everything before qualifying is a volume-focused salesperson's move, not an advisor's."}, {"q": "An overseas Cambodian client living abroad contacts you about property for their family in Phnom Penh. You should:", "opts": ["Focus on investment yield вҖ” same as any other foreign buyer", "Prioritize clear comparisons, fast responses, and video-call support", "Treat them the same as a local end-user вҖ” same profile", "Refer them to an agent who only speaks Khmer"], "correct": 1, "explain": "Overseas Cambodians often decide faster than local buyers but need clear comparisons and remote support. Fast, responsive communication is a priority for this segment."}],reflection:"You meet a new client. In the first 5 minutes, what 3 things do you want to know about them вҖ” and why those 3?",km:{"title":"бһҸбһҫбһўбһҸбһ·бһҗбһ·бһҮбһ“бһҡбһ”бһҹбҹӢбһҷбһҫбһ„бһҮбһ¶бһ“бһҡбһҺбһ¶","short":"бһҖбҹ’бһҡбһ»бһҳбһўбһҸбһ·бһҗбһ·бһҮбһ“","objectives":["бһҹбҹ’бһӮбһ¶бһӣбҹӢбһҖбҹ’бһҡбһ»бһҳбһўбһҸбһ·бһҗбһ·бһҮбһ“ PHC бһ‘бһ¶бҹҶбһ„ 5 бһҸбһ¶бһҳбһҡбһҷбҹҲбһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ·бһҡбһјбһ” бһӮбҹ„бһӣбһҠбҹ… бһ“бһ·бһ„бһҡбһ…бһ“бһ¶бһ”бҹҗбһ‘бҹ’бһҳбһ“бҹғбһҖбһ¶бһҡбһҹбһҳбҹ’бһҡбҹҒбһ…бһ…бһ·бһҸбҹ’бһҸ","бһўбһ¶бһ…бһҖбҹҶбһҺбһҸбҹӢбһ”бһ¶бһ“бһҗбһ¶бһўбһҸбһ·бһҗбһ·бһҮбһ“бһҗбҹ’бһҳбһёбһҹбҹ’бһҗбһ·бһҸбһ“бҹ…бһҖбҹ’бһ“бһ»бһ„бһҖбҹ’бһҡбһ»бһҳбһҺбһ¶бһҖбҹ’бһ“бһ»бһ„бһҡбһҷбҹҲбһ–бҹҒбһӣ 5 бһ“бһ¶бһ‘бһё","бһҹбҹ’бһӮбһ¶бһӣбҹӢбһӮбһҳбҹ’бһҡбҹ„бһ„бһҺбһ¶бһҠбҹӮбһӣбһҸбҹ’бһҡбһјбһңбһӮбҹ’бһ“бһ¶бһ“бһ№бһ„бһҖбҹ’бһҡбһ»бһҳбһ“бһёбһҳбһҪбһҷбҹ— вҖ” бһ“бһ·бһ„бһ бҹҒбһҸбһ»бһўбҹ’бһңбһё"],"sections":[{"label":"бһ бҹҒбһҸбһ»бһўбҹ’бһңбһёбһ”бһ¶бһ“бһҮбһ¶бһҖбһ¶бһ ҡбһҳбҹ’бһ—бһҖбҹ’бһ“бһ»бһ„бһ–бҹҒбһӣбһҠбҹҶбһҺбһ¶бһӣбһӮбҹ’бһ“бһ¶бҹ”"}]}],"reflection":"бһўбҹ’бһ“бһҖбһҮбһҪбһ”бһўбһҸбһ·бһҗбһ·бһҮбһ“бһҗбҹ’бһҳбһёбһҳбҹ’бһ“бһ¶бһҖбҹӢбҹ” бһҖбҹ’бһ“бһ»бһ„бһҡбһҷбҹҲбһ–бҹҒбһӣ 5 бһ“бһ¶бһ‘бһёбһҠбҹҶбһ”бһјбһ„ бһҸбһҫбһўбҹ’бһңбһёбһҮбһ¶ 3 бһҷбҹүбһ¶бһ„бһҠбҹӮбһӣбһўбҹ’бһ“бһҖбһ…бһ„бҹӢбһҠбһ№бһ„бһўбҹҶбһ–бһёбһ–бһҪбһҖбһӮбһ¶бһҸбҹӢ вҖ” бһ бһҫбһҷбһ бҹҒбһҸбһ»бһўбҹ’бһңбһёбһ”бһ¶бһ“бһҮбһ¶ 3 бһҷбҹүбһ¶бһ„бһ“бҹ„бҹҮ?","roleplay":{"scenario":"бһҖбһ¶бһҡбһҖбҹҶбһҺбһҸбҹӢбһҖбҹ’бһҡбһ»бһҳбһўбһҸбһ·бһҗбһ·бһҮбһ“бһҖбҹ’бһ“бһ»бһ„бһҡбһҷбҹҲбһ–бҹҒбһӣ 5 бһ“бһ¶бһ‘бһё","instructions":"бһ бһ¶бһҸбҹӢбһҹбһҳбһ’бҹ’бһңбһҫбһҖбһ¶бһҡбһҸбҹҒбһҹбҹ’бһҸ 5 бһ“бһ¶бһ‘бһёбһҠбҹ„бһҷбһ’бһҳбҹ’бһҳбһҮбһ¶бһҸбһ· вҖ” бһҳбһ·бһ“бһҳбҹӮбһ“бһҠбһјбһ…бһҮбһ¶бһҖбһ¶бһҡбһҠбҹҒбһүбһҠбҹ„бһӣбһҹбһҪбһҡбһ…бһҳбҹ’бһӣбһҫбһҷбһ“бҹ„бҹҮбһ‘бҹҒбҹ”","lines":[{"role":"client","text":"\"бһҒбҹ’бһүбһ»бҹҶбһ…бһ¶бһ”бҹӢбһўбһ¶бһҡбһҳбҹ’бһҳбһҺбҹҚбһӣбһҫбһўбһ…бһӣбһ“бһ‘бҹ’бһҡбһ–бҹ’бһҷбһ“бҹ… BKK1бҹ” бһҸбһҫбһўбҹ’бһ“бһҖбһҳбһ¶бһ“бһўбҹ’бһңбһёбһҒбҹ’бһӣбҹҮ?\""},{"role":"agent","text":"\"бһҡбһёбһҖбһҡбһ¶бһҷбһ“бһ№бһ„бһ”бһ„бҹ’бһ бһ¶бһүбһҮбһјбһ“бһўбҹ’бһ“бһҖбҹ” бһҳбһ»бһ“бһ–бҹҒбһӣбһҒбҹ’бһүбһ»бҹҶбһ’бҹ’бһңбһҫбһ”бҹӮбһ”бһ“бҹ„бҹҮ вҖ” бһҸбһҫбһҒбҹ’бһүбһ»бҹҶбһўбһ¶бһ…бһҹбһҪбһҡбһҹбҹҶбһҺбһҪбһҡбһҡбһ бҹҗбһҹбһҳбһҪбһҷбһ…бҹҶбһ“бһҪбһ“бһ”бһ¶бһ“бһ‘бҹҒ бһҠбһҫбһҳбҹ’бһ”бһёбһұбҹ’бһҷбһҒбҹ’бһүбһ»бҹҶбһ”бһ„бҹ’бһ бһ¶бһүбһҮбһҳбҹ’бһҡбһҫбһҹбһҠбҹӮбһӣбһ–бһ¶бһҖбҹӢбһ–бҹҗбһ“бҹ’бһ’бһ”бҹҶбһ•бһ»бһҸбһҮбһјбһ“бһўбҹ’бһ“бһҖ?\""},{"role":"client","text":"\"бһ”бһ¶бһ“ бһ”бҹ’бһҡбһ¶бһҖбһҠбһҺбһ¶бһҹбҹӢбҹ”\""},{"role":"agent","text":"\"бһҸбһҫбһўбҹ’бһңбһёбһҮбһ¶бһҖбһҸбҹ’бһҸбһ¶бһҮбһҳбҹ’бһҡбһ»бһүбһҖбһ¶бһҡбһ…бһ¶бһ”бҹӢбһўбһ¶бһҡбһҳбҹ’бһҳбһҺбҹҚбһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖбһ“бҹ…бһ–бҹҒбһӣбһ“бҹҒбҹҮ вҖ” бһ”бҹ’бһҡбһ¶бһҖбҹӢбһ…бҹҶбһҺбһјбһӣбһ–бһёбһҖбһ¶бһҡбһҮбһҪбһӣ бһҖбһҫбһ“бһЎбһҫбһ„бһҸбһҳбҹ’бһӣбҹғбһҠбһҫбһҳбһ‘бһ»бһ“ бһҖбһ“бҹ’бһӣбҹӮбһ„бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҡбһҹбҹӢбһ“бҹ… бһ¬бһ…бһҳбҹ’бһҡбһ»бҹҮ?\""},{"role":"client","text":"\"бһ—бһ¶бһӮбһ…бҹ’бһҡбһҫбһ“бһҮбһ¶бһҖбһ“бҹ’бһӣбҹӮбһ„бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһ…бҹҶбһҺбһ¶бһҷбһ–бҹҒбһӣ 4вҖ“5 бһҒбҹӮбһҖбҹ’бһ“бһ»бһ„бһҳб һҡбһҹбһҳбҹ’бһҡбҹҒбһ…бһ…бһ·бһҸбҹ’бһҸбһ“бҹҒбҹҮбһҖбҹ’бһӣбһ¶бһҷбһҮбһ¶бһҖбһ¶бһҡбһҹбһҳбҹ’бһҡбҹҒбһ…бһ…бһ·бһҸбҹ’бһҸбһҳбһ·бһ“бһӣбҹ’бһўбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһўбҹ’бһ“бһҖ?' бһ”бһ„бҹ’бһ бһ¶бһүбһ–бһёбһҖбһ¶бһҡбһўбһҸбҹӢбһ’бҹ’бһҳбһҸбҹӢбһ бһ¶бһ“бһ·бһ—бҹҗбһҷ бһҖбһ¶бһҡбһ–бҹ’бһҡбһҪбһҷбһ”бһ¶бһҡбһҳбҹ’бһ— бһ“бһ·бһ„бһӣбһҖбҹ’бһҒбһҺбҹҲбһңбһ·бһ“бһ·бһ…бҹ’бһҶбҹҗбһҷбһ“бҹғбһҖбһ¶бһҡбһҹбһҳбҹ’бһҡбҹҒбһ…бһ…бһ·бһҸбҹ’бһҸбһҖбҹ’бһ“бһ»бһ„бһ–бҹҒбһӣбһҠбҹҶбһҺбһ¶бһӣбһӮбҹ’бһ“бһ¶бҹ” бһңбһ¶бһҮбһ¶бһҹбҹҶбһҺбһҪбһҡбһҖбҹҶбһҺбһҸбҹӢбһӣбһҖбҹ’бһҒбһҒбһҺбҹ’бһҢбһҠбҹӮбһӣбһҳбһ¶бһ“бһҸбһҳбҹ’бһӣбҹғбһ”бҹҶбһ•бһ»бһҸбһҸбҹӮбһҳбһҪбһҷбһӮбһҸбҹӢбһ“бҹ…бһҖбҹ’бһ“бһ»бһ„бһҡбһ…бһ“бһ¶бһҹбһҳбҹ’бһ–бҹҗбһ“бҹ’бһ’ PHCбҹ”"},{"q":"бһӣбҹҶбһҠбһ¶бһ”бҹӢбһҠбҹӮбһӣбһҸбҹ’бһҡбһ№бһҳбһҸбҹ’бһҡбһјбһңбһҖбҹ’бһ“бһ»бһ„бһҖбһ¶бһҡбһ•бҹ’бһҸбһӣбҹӢбһ”бҹ’бһҡбһ№бһҖбҹ’бһҹбһ¶бһҠбһӣбҹӢбһўбһҸбһ·бһҗбһ·бһҮбһ“бһӮбһәбҹ–","opts":["бһ•бҹ’бһӮбһјбһ•бҹ’бһӮбһ„бһӮбһҳбҹ’бһҡбҹ„бһ„бһҮбһ¶бһҳбһ»бһ“ бһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһҳбһҖбһҷбһӣбҹӢбһ–бһёбһўбһҸбһ·бһҗбһ·бһҮбһ“","бһҖбҹҶбһҺбһҸбҹӢбһҖбҹ’бһҡбһ»бһҳбһўбһҸбһ·бһҗбһ·бһҮбһ“бһҮбһ¶бһҳбһ»бһ“ бһ•бҹ’бһӮбһјбһ•бҹ’бһӮбһ„бһӮбһҳбҹ’бһҡбҹ„бһ„бһҮбһ¶бһҖбҹ’бһҡбҹ„бһҷ","бһ”бһ„бҹ’бһ бһ¶бһүбһҮбһҳбҹ’бһҡбһҫбһҹбһҠбҹӮбһӣбһўбһ¶бһ…бһҡбһҖбһ”бһ¶бһ“бһ‘бһ¶бҹҶбһ„бһўбһҹбҹӢ бһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһҳбһҖбһ”бһ„бҹ’бһҡбһҪбһҳбһҳбһҖбһңбһ·бһү","бһҹбһҪбһҡбһҗбһңбһ·бһҖбһ¶бһҮбһ¶бһҳбһ»бһ“ бһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһҳбһҖбһҖбҹҶбһҺбһҸбҹӢбһҖбҹ’бһҡбһ»бһҳбһўбһҸбһ·бһҗбһ·бһҮбһ“"],"correct":1,"explain":"бһҖбҹҶбһҺбһҸбҹӢбһҖбҹ’бһҡбһ»бһҳбһўбһҸбһ·бһҗбһ·бһҮбһ“бһҮбһ¶бһҳбһ»бһ“бҹ” бһ•бҹ’бһӮбһјбһ•бҹ’бһӮбһ„бһӮбһҳбҹ’бһҡбҹ„бһ„бһҮбһ¶бһҖбҹ’бһҡбҹ„бһҷбҹ” бһӣбҹҶбһҠбһ¶бһ”бҹӢбһ“бҹҒбҹҮбһҳбһ·бһ“бһҠбҹӮбһӣбһҸбҹ’бһҡбһјбһңбһ”бһ¶бһ“бһ’бҹ’бһңбһҫбһ…бҹ’бһҡбһ¶бһҹбһЎбһҫбһҷбһ“бҹ… PHC вҖ” бһҖбһ¶бһҡбһ”бһ„бҹ’бһ бһ¶бһүбһҳбһ»бһ“бһ–бҹҒбһӣбһҖбҹҶбһҺбһҸбҹӢбһӣбһҖбҹ’бһҒбһҒбһҺбҹ’бһҢбһӮбһәбһҮбһ¶бһҹбһҖбһҳбҹ’бһҳбһ—бһ¶бһ–бһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖбһӣбһҖбҹӢбһҠбҹӮбһӣбһ•бҹ’бһҸбҹ„бһҸбһӣбһҫбһ”бһҡбһ·бһҳбһ¶бһҺ бһҳбһ·бһ“бһҳбҹӮбһ“бһҮбһ¶бһ‘бһёбһ”бҹ’бһҡбһ№бһҖбҹ’бһҹбһ¶бһ“бҹ„бҹҮбһ‘бҹҒбҹ”"},{"q":"бһўбһҸбһ·бһҗбһ·бһҮбһ“бһҒбҹ’бһҳбҹӮбһҡбһ“бҹ…бһ”бһҡбһ‘бҹҒбһҹбһҳбҹ’бһ“бһ¶бһҖбҹӢбһҠбҹӮбһӣ {id:6,week:2,title:"The PHC Advisor Mindset",short:"Advisor Mindset",objectives:["Understand what separates a trusted advisor from a salesperson","Know the PHC trust-building sequence for first meetings","Avoid the five most common agent mistakes"],sections:[{label:"The Mindset Shift",heading:"Authority comes from restraint",body:"Most agents try to impress clients with how much they know. PHC advisors do the opposite. They ask more than they tell. They disclose risks before returns. They say 'this may not be suitable for you' вҖ” and mean it. That restraint is what creates authority.",box:{title:"The PHC first-meeting sequence:",lines:["1. Listen first вҖ” qualify before presenting anything","2. Name the risks before the returns","3. Match to max 2вҖ“3 projects вҖ” justify each one","4. Never push for a decision in meeting one","5. Send a written follow-up the same day"]}},{label:"Five Mistakes",heading:"What destroys trust вҖ” immediately",body:"These are the five behaviours that will damage your credibility with clients. Each of them is common. None of them are acceptable at PHC.",rules:[{title:"Quoting gross yield as if it were net",detail:"Always present net yield. Gross yield includes none of the costs the client will actually face. Presenting gross without context is dishonest."},{title:"Guaranteeing anything about future value",detail:"'This will definitely go up' or 'guaranteed rental income' are phrases that will destroy your credibility. Cambodia is not guaranteed. Nothing is."},{title:"Rushing the decision",detail:"Urgency tactics вҖ” 'only 2 units left,' 'price goes up tomorrow' вҖ” work once and then destroy trust forever. PHC does not use them."},{title:"Presenting without qualifying",detail:"Showing projects before understanding the client is the mark of a volume salesperson. PHC advisors never do this."},{title:"Not following up in writing",detail:"A verbal conversation is forgotten. A written summary shows professionalism and gives the client something to reference. Send it the same day."}]}],roleplay:{scenario:"Opening a first meeting with a new client",instructions:"Practice establishing authority through questions вҖ” not through telling.",lines:[{role:"client",text:'"I\'ve been looking at property in Phnom Penh for a while. I know what I want."'},{role:"agent",text:'"That\'s a great position to be in. What\'s drawn you to Phnom Penh specifically вҖ” investment, lifestyle, or both?"'},{role:"client",text:'"Investment. I want 8% yield."'},{role:"agent",text:'"Understood. Before I show you anything вҖ” can I ask what you\'ve seen so far, and what made you hesitate on those?"'},{role:"client",text:'"A few projects. The yields looked good but I wasn\'t sure about the developer."'},{role:"agent",text:'"That hesitation is the right instinct. Developer track record is one of the most important risk factors in this market. Let me ask about your timeline and risk tolerance before I make any recommendations."'},{role:"note",text:"Debrief: The agent asked four questions before saying anything about a project. Was it natural?"}],debrief:"An advisor who asks good questions appears more competent than one who talks a lot. Every question delays the pitch вҖ” and that delay builds trust."},quiz:[{q:"PHC's approach to first meetings is:",opts:["Present the best projects first to make a strong impression","Listen, qualify, then match вҖ” never present before understanding","Give a market overview first, then ask questions","Discuss price ranges to filter serious buyers early"],correct:1,explain:"Listen first. Qualify before presenting anything. The sequence is the system вҖ” and the system is why clients trust PHC over volume agencies."},{q:"A client asks for a guaranteed 8% return. You should:",opts:["Confirm it's achievable in BKK1 based on current data","Explain clearly that guarantees are not how responsible advisors work вҖ” and present net yield data instead","Refer them to the developer who can provide guarantees","Tell them 8% is too high and suggest 6%"],correct:1,explain:"Never guarantee returns. Explain net yield data honestly. 'Here is what the data shows, here is what affects it, here is the range' вҖ” that is the PHC answer."},{q:"Why is same-day written follow-up non-negotiable?",opts:["Because it shows how busy and in-demand you are","Because it creates a written record of what was discussed вҖ” and demonstrates professionalism","To give the client a chance to read more marketing materials","To lock in commitment before they look at competitors"],correct:1,explain:"Written follow-up summarises what was discussed, clarifies risks, and signals professionalism. It is the most reliable trust-building act after a first meeting."},{q:"Which of these five mistakes is most likely to permanently damage trust with a serious investor?",opts:["Forgetting to send a follow-up email","Using urgency tactics such as 'only 2 units left'","Starting the meeting with a project overview","Asking too many qualifying questions"],correct:1,explain:"Urgency tactics work once вҖ” then destroy trust permanently. Serious investors recognise them immediately. PHC never uses them under any circumstance."}],reflection:"Think of a time you felt genuinely respected and not sold to. What did that person do differently вҖ” and can you apply it?",km:{"title":"бһ•бҹ’бһ“бһҸбҹӢбһӮбҹҶбһ“бһ·бһҸбһ‘бһёбһ”бҹ’бһҡбһ№бһҖбҹ’бһҹбһ¶бһҡбһ”бһҹбҹӢ PHC","short":"бһ•бҹ’бһ“бһҸбҹӢбһӮбҹҶбһ“бһ·бһҸбһ‘бһёбһ”бҹ’бһҡбһ№бһҖбҹ’бһҹбһ¶","objectives":["бһҷбһӣбҹӢбһҠбһ№бһ„бһ–бһёбһ…бҹҶбһҺбһ»бһ…бһҒбһ»бһҹбһӮбҹ’бһ“бһ¶бһҡбһңбһ¶бһ„бһ‘бһёбһ”бҹ’бһҡбһ№бһҖбҹ’бһҹбһ¶бһҠбҹӮбһӣбһӮбһҪбһҡбһұбҹ’бһҷбһ‘бһ»бһҖбһ…бһ·бһҸбҹ’бһҸ бһ“бһ·бһ„бһўбҹ’бһ“бһҖбһӣбһҖбҹӢ","бһҹбҹ’бһӮбһ¶бһӣбҹӢбһ–бһёбһӣбҹҶбһҠбһ¶бһ”бҹӢбһӣбҹҶбһҠбҹ„бһҷбһ“бҹғбһҖбһ¶бһҡбһ”бһ„бҹ’бһҖбһҫбһҸбһ‘бҹҶбһ“бһ»бһҖбһ…бһ·бһҸбҹ’бһҸбһҡбһ”бһҹбҹӢ PHC бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҮбҹҶбһ“бһҪбһ”бһҠбҹҶбһ”бһјбһ„","бһ…бҹҖбһҹбһңбһ¶бһ„бһҖбҹҶбһ бһ»бһҹбһҶбҹ’бһӮбһ„бһ‘бһјбһ‘бҹ…бһ‘бһ¶бҹҶбһ„ бҹҘ бһҡбһ”бһҹбҹӢбһ—бҹ’бһ“бһ¶бһҖбҹӢбһ„бһ¶бһҡбһўбһ…бһӣбһ“бһ‘бҹ’бһҡбһ–бҹ’бһҷ"],"sections":[{"label":"бһҖбһ¶бһҡбһ•бҹ’бһӣбһ¶бһҹбҹӢбһ”бҹ’бһҸбһјбһҡбһ•бҹ’бһ“бһҸбҹӢбһӮбҹҶбһ“бһ·бһҸ","heading":"бһҘбһ‘бҹ’бһ’бһ·бһ–бһӣ бһ“бһ·бһ„бһ—бһ¶бһ–бһӮбһҪбһҡбһұбҹ’бһҷбһҮбһҝбһҮбһ¶бһҖбҹӢ бһҖбһҫбһҸбһ…бҹҒбһүбһ–бһёбһҖбһ¶бһҡбһҹбҹ’бһ„бһ”бҹӢбһҹбҹ’бһ„бһ¶бһҸбҹӢ бһ“бһ·бһ„бһҖбһ¶бһҡбһ‘бһ”бҹӢбһ…бһ·бһҸбҹ’бһҸ","body":"бһ—бҹ’бһ“бһ¶бһҖбҹӢбһ„бһ¶бһҡбһ—бһ¶бһӮбһ…бҹ’бһҡбһҫбһ“бһ–бҹ’бһҷбһ¶бһҷбһ¶бһҳбһ’бҹ’бһңбһҫбһұбҹ’бһҷбһўбһҸбһ·бһҗбһ·бһҮбһ“бһ…бһ¶бһ”бҹӢбһўбһ¶бһҡбһҳбҹ’бһҳбһҺбҹҚбһҠбҹ„бһҷбһ”бһ„бҹ’бһ бһ¶бһүбһ–бһёбһ…бҹҶбһҺбҹҒбҹҮбһҠбһ№бһ„бһҠбҹӮбһӣбһҒбҹ’бһӣбһҪбһ“бһҳбһ¶бһ“бҹ” бһ”бҹүбһ»бһ“бҹ’бһҸбҹӮбһ‘бһёбһ”бҹ’бһҡбһ№бһҖбҹ’бһҹбһ¶бһҡбһ”бһҹбҹӢ PHC бһ’бҹ’бһңбһҫбһҡбһҝбһ„бһ•бҹ’бһ‘бһ»бһҷбһ–бһёбһ“бҹҒбҹҮбҹ” бһ–бһҪбһҖбһӮбһ¶бһҸбҹӢбһҹбһҪбһҡбһ…бҹ’бһҡбһҫбһ“бһҮбһ¶бһ„бһ“бһ·бһҷбһ¶бһҷбҹ” бһ–бһҪбһҖбһӮбһ¶бһҸбҹӢбһ‘бһҳбҹ’бһӣбһ¶бһҷбһ–бһёбһ бһ¶бһ“бһ·бһ—бҹҗбһҷбһҳбһ»бһ“бһ“бһ№бһ„бһ“бһ·бһҷбһ¶бһҷбһ–бһёбһ•бһӣбһ…бҹҶбһҺбҹҒбһүбҹ” бһ–бһҪбһҖбһӮбһ¶бһҸбҹӢбһ“бһ·бһҷбһ¶бһҷбһҗбһ¶ 'бһӮбһҳбҹ’бһҡбҹ„бһ„бһ“бҹҒбҹҮбһ”бҹ’бһҡбһ бҹӮбһӣбһҮбһ¶бһҳбһ·бһ“бһҹбһҳбһҹбҹ’бһҡбһ”бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһӣбҹ„бһҖбһўбҹ’бһ“бһҖбһ‘бҹҒ' вҖ” бһ бһҫбһҷбһ–бһҪбһҖбһӮбһ¶бһҸбҹӢбһҳбһ¶бһ“бһ”бҹҶбһҺбһ„бһ“бһ·бһҷбһ¶бһҷбһ”бҹӮбһ”бһ“бҹ„бҹҮбһҳбҹӮбһ“бҹ” бһҖбһ¶бһҡбһҹбҹ’бһ„бһ”бҹӢбһҹбҹ’бһ„бһ¶бһҸбҹӢ бһ“бһ·бһ„бһҖбһ¶бһҡбһ‘бһ”бҹӢбһ…бһ·бһҸбҹ’бһҸбһ“бҹҒбҹҮбһ бһҫбһҷбһҠбҹӮбһӣбһ”бһ„бҹ’бһҖбһҫбһҸбһ”бһ¶бһ“бһҮбһ¶бһҘбһ‘бҹ’бһ’бһ·бһ–бһӣ бһ“бһ·бһ„бһ—бһ¶бһ–бһӮбһҪбһҡбһұбҹ’бһҷбһҮбһҝбһҮбһ¶бһҖбҹӢбҹ”","box":{"title":"бһӣбҹҶбһҠбһ¶бһ”бҹӢбһӣбҹҶбһҠбҹ„бһҷбһ“бҹғбһҮбҹҶбһ“бһҪбһ”бһҠбҹҶбһ”бһјбһ„бһҡбһ”бһҹбҹӢ PHCбҹ–","lines":["1. бһҹбҹ’бһҸбһ¶бһ”бҹӢбһҮбһ¶бһҳбһ»бһ“ вҖ” бһңбһ¶бһҷбһҸбһҳбҹ’бһӣбҹғбһҹбҹ’бһңбҹӮбһ„бһҷбһӣбҹӢбһ–бһёбһўбһҸбһ·бһҗбһ·бһҮбһ“бһҳбһ»бһ“бһ“бһ№бһ„бһ”бһ„бҹ’бһ бһ¶бһүбһӮбһҳбҹ’бһҡбҹ„бһ„бһўбҹ’бһңбһёбһҳбһҪбһҷ","2. бһ”бһүбҹ’бһҮбһ¶бһҖбҹӢбһ–бһёбһ бһ¶бһ“бһ·бһ—бҹҗбһҷбһҳбһ»бһ“бһ“бһ№бһ„бһ“бһ·бһҷбһ¶бһҷбһ–бһёбһ•бһӣбһ…бҹҶбһҺбҹҒбһү","3. бһ•бҹ’бһӮбһјбһ•бҹ’бһӮбһ„бһӮбһҳбҹ’бһҡбҹ„бһ„бһҷбҹүбһ¶бһ„бһ…бҹ’бһҡбһҫбһ“ бҹў бһ‘бҹ… бҹЈ бһ”бҹүбһ»бһҺбҹ’бһҺбҹ„бҹҮ вҖ” бһ–бҹ’бһҡбһҳбһ‘бһ¶бҹҶбһ„бһ–бһ“бҹ’бһҷбһӣбҹӢбһ–бһёбһ бҹҒбһҸбһ»бһ•бһӣбһ“бҹғбһӮбһҳбҹ’бһҡбҹ„бһ„бһ“бһёбһҳбһҪбһҷбҹ—","4. бһҳбһ·бһ“бһҸбҹ’бһҡбһјбһңбһҮбҹҶбһҡбһ»бһүбһұбҹ’бһҷбһҳбһ¶бһ“бһҖбһ¶бһҡбһҹбһҳбҹ’бһҡбҹҒбһ…бһ…бһ·бһҸбҹ’бһҸбһ“бҹ…бһҖбҹ’бһ“бһ»бһ„бһҮбҹҶбһ“бһҪбһ”бһӣбһҫбһҖбһҠбҹҶбһ”бһјбһ„бһЎбһҫбһҷ","5. бһ•бҹ’бһүбһҫбһҹбһ¶бһҡбһҹбһ„бҹ’бһҒбҹҒбһ”бһҸбһ¶бһҳбһӣбһ¶бһҷбһӣбһҖбҹ’бһҒбһҺбҹҚбһўбһҖбҹ’бһҹбһҡбһҸбһ¶бһҳбһҠбһ¶бһ“бһ“бҹ…бһҗбҹ’бһ„бҹғбһҠбһҠбҹӮбһӣ"]}},{"label":"бһҖбҹҶбһ бһ»бһҹбһҶбҹ’бһӮбһ„бһ‘бһ¶бҹҶбһ„ бҹҘ","heading":"бһўбҹ’бһңбһёбһҠбҹӮбһӣбһ”бҹҶбһ•бҹ’бһӣбһ¶бһүбһ‘бҹҶбһ“бһ»бһҖбһ…бһ·бһҸбҹ’бһҸ вҖ” бһ—бҹ’бһӣбһ¶бһҳбҹ—","body":"бһ‘бһ¶бҹҶбһ„бһ“бҹҒбҹҮбһӮбһәбһҮбһ¶бһҖбһ¶бһҷбһңбһ·бһҖбһ¶бһҡ бһ“бһ·бһ„бһўбһ¶бһҖбһ”бҹ’бһ”бһҖбһ·бһҡбһ·бһҷбһ¶бһ‘бһ¶бҹҶбһ„ бҹҘ бһҠбҹӮбһӣбһ“бһ№бһ„бһ”бҹҶбһ•бҹ’бһӣбһ¶бһүбһҖбһ·бһҸбҹ’бһҷбһ¶бһ“бһ»бһ—бһ¶бһ–бһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖбһҮбһ¶бһҳбһҪбһҷбһўбһҸбһ·бһҗбһ·бһҮбһ“бҹ” бһҖбҹҶбһ бһ»бһҹбһ“бһёбһҳбһҪбһҷбҹ—бһҹбһ»бһ‘бҹ’бһ’бһҸбҹӮбһҮбһ¶бһҡбһҝбһ„бһ‘бһјбһ‘бҹ… бһ”бҹүбһ»бһ“бҹ’бһҸбҹӮбһӮбҹ’бһҳбһ¶бһ“бһҳбһҪбһҷбһҺбһ¶бһҠбҹӮбһӣ PHC бһўбһ¶бһ…бһ‘бһ‘бһҪбһӣбһҷбһҖбһ”бһ¶бһ“бһЎбһҫбһҷбҹ”","rules":[{"title":"бһҖбһ¶бһҡбһ”бҹ’бһҡбһ¶бһ”бҹӢбһўбһҸбҹ’бһҡбһ¶бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһҡбһ»бһ” (Gross Yield) бһ’бҹ’бһңбһҫбһҠбһјбһ…бһҮбһ¶бһўбһҸбҹ’бһҡбһ¶бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһ»бһ‘бҹ’бһ’ (Net Yield)","detail":"бһҸбҹ’бһҡбһјбһңбһ”бһ„бҹ’бһ бһ¶бһүбһўбһҸбҹ’бһҡбһ¶бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһ»бһ‘бҹ’бһ’бһҮбһ¶бһ“бһ·бһ…бҹ’бһ…бҹ” бһўбһҸбҹ’бһҡбһ¶бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһҡбһ»бһ”бһҳбһ·бһ“бһ”бһ¶бһ“бһҡбһ¶бһ”бҹӢбһ”бһүбҹ’бһ…бһјбһӣбһ…бҹҶбһҺбһ¶бһҷбһ•бҹ’бһҹбҹҒбһ„бҹ—бһҠбҹӮбһӣбһўбһҸбһ·бһҗбһ·бһҮбһ“бһҸбҹ’бһҡбһјбһңбһ…бҹҶбһҺбһ¶бһҷбһ–бһ·бһҸбһ”бҹ’бһҡбһ¶бһҖбһҠбһ“бҹ„бҹҮбһ‘бҹҒбҹ” бһҖбһ¶бһҡбһ”бһ„бҹ’бһ бһ¶бһүбһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһҡбһ»бһ”бһҠбҹ„бһҷбһҳбһ·бһ“бһ”бһ¶бһ“бһ–бһ“бҹ’бһҷбһӣбҹӢбһ”бһҡбһ·бһ”бһ‘бһ…бҹ’бһ”бһ¶бһҹбҹӢбһӣбһ¶бһҹбҹӢ бһӮбһәбһҮбһ¶бһ‘бһ„бҹ’бһңбһҫбһҳбһ·бһ“бһҹбҹ’бһҳбҹ„бҹҮбһҸбҹ’бһҡбһ„бҹӢбҹ”"},{"title":"бһҖбһ¶бһҡбһ’бһ¶бһ“бһ¶бһӣбһҫбһҸбһҳбҹ’бһӣбҹғбһ“бһ¶бһ–бҹҒбһӣбһўбһ“бһ¶бһӮбһҸ","detail":"бһғбҹ’бһӣбһ¶бһҠбһјбһ…бһҮбһ¶ 'бһҳбһҪбһҷбһ“бҹҒбҹҮбһ–бһ·бһҸбһҮбһ¶бһ“бһ№бһ„бһЎбһҫбһ„бһҗбҹ’бһӣбҹғ' бһ¬ 'бһ’бһ¶бһ“бһ¶бһ”бҹ’бһҡбһ¶бһҖбҹӢбһ…бҹҶбһҺбһјбһӣбһ–бһёбһҖбһ¶бһҡбһҮбһҪбһӣ' бһӮбһәбһҮбһ¶бһғбҹ’бһӣбһ¶бһҠбҹӮбһӣбһ“бһ№бһ„бһ”бҹҶбһ•бҹ’бһӣбһ¶бһүбһҖбһ·бһҸбҹ’бһҷбһ¶бһ“бһ»бһ—бһ¶бһ–бһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖбҹ” бһ“бҹ…бһҖбһҳбҹ’бһ–бһ»бһҮбһ¶бһӮбҹ’бһҳбһ¶бһ“бһўбҹ’бһңбһёбһҠбҹӮбһӣбһ’бһ¶бһ“бһ¶ бҹЎбҹ бҹ % бһ“бҹ„бҹҮбһ‘бҹҒбҹ” бһӮбҹ’бһҳбһ¶бһ“бһўбҹ’бһңбһёбһ‘бҹҖбһ„бһ‘бһ¶бһҸбҹӢбһЎбһҫбһҷбҹ”"},{"title":"бһҖбһ¶бһҡбһ”бҹ’бһҡбһүбһ¶бһ”бҹӢбһ”бҹ’бһҡбһүбһ¶бһӣбҹӢбһҮбҹҶбһҡбһ»бһүбһҖбһ¶бһҡбһҹбһҳбҹ’бһҡбҹҒбһ…бһ…бһ·бһҸбҹ’бһҸ","detail":"бһҷбһ»бһ‘бҹ’бһ’бһҹбһ¶бһҹбҹ’бһҸбҹ’бһҡбһ”бһ„бҹ’бһҖбһҫбһҸбһ—бһ¶бһ–бһ”бһ“бҹ’бһ‘бһ¶бһ“бҹӢ вҖ” бһҠбһјбһ…бһҮбһ¶ 'бһҹбһӣбҹӢбһҸбҹӮ бҹў бһҷбһјбһ“бһёбһҸбһ‘бҹҖбһҸбһ‘бҹҒ' бһ¬ 'бһҗбҹ’бһ„бҹғбһҹбҹ’бһўбҹӮбһҖбһЎбһҫбһ„бһҗбҹ’бһӣбҹғбһ бһҫбһҷ' вҖ” бһўбһ¶бһ…бһ”бҹ’бһҡбҹҖбһ”бһҠбһјбһ…бһҮбһ¶бһҖбһ¶бһҡбһ‘бһ¶бһҖбҹӢбһ‘бһ¶бһүбһ”бһ¶бһ“бһҸбҹӮбһҳбһҪбһҷбһӮбҹ’бһҡбһ¶ бһ”бҹүбһ»бһ“бҹ’бһҸбҹӮбһ”бҹҶбһ•бҹ’бһӣбһ¶бһүбһ‘бҹҶбһ“бһ»бһҖбһ…бһ·бһҸбҹ’бһҸбһҮбһ¶бһҡбҹҖбһ„бһҡбһ бһјбһҸбҹ” PHC бһҳбһ·бһ“бһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһңбһ·бһ’бһёбһҹбһ¶бһҹбҹ’бһҸбҹ’бһҡбһ‘бһ¶бҹҶбһ„бһ“бҹҒбҹҮбһЎбһҫбһҷбҹ”"},{"title":"бһҖбһ¶бһҡбһ”бһ„бҹ’бһ бһ¶бһүбһӮбһҳбҹ’бһҡбҹ„бһ„бһҠбҹ„бһҷбһҳбһ·бһ“бһ”бһ¶бһ“бһңбһ¶бһҷбһҸбһҳбҹ’бһӣбҹғбһҹбҹ’бһңбҹӮбһ„бһҷбһӣбҹӢбһ–бһёбһўбһҸбһ·бһҗбһ·бһҮбһ“","detail":"бһҖбһ¶бһҡбһ“бһ¶бҹҶбһҳбһҫбһӣбһӮбһҳбҹ’бһҡбҹ„бһ„бһҳбһ»бһ“бһ–бҹҒбһӣбһҷбһӣбҹӢбһ–бһёбһўбһҸбһ·бһҗбһ·бһҮбһ“ бһӮбһәбһҮбһ¶бһҹбһүбҹ’бһүбһ¶бһҹбһҳбҹ’бһӮбһ¶бһӣбҹӢбһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖбһӣбһҖбҹӢбһҠбҹӮбһӣбһ•бҹ’бһҸбҹ„бһҸбһҸбҹӮбһӣбһҫбһ”бһҡбһ·бһҳбһ¶бһҺбҹ” бһ‘бһёбһ”бҹ’бһҡбһ№бһҖбҹ’бһҹбһ¶бһҡбһ”бһҹбҹӢ PHC бһҳбһ·бһ“бһҠбҹӮбһӣбһ’бҹ’бһңбһҫбһ”бҹӮбһ”бһ“бҹҒбҹҮбһЎбһҫбһҷбҹ”"},{"title":"бһҖбһ¶бһҡбһҳбһ·бһ“бһҸбһ¶бһҳбһҠбһ¶бһ“бһ”бһ“бҹ’бһҸбһҮбһ¶бһӣбһ¶бһҷбһӣбһҖбҹ’бһҒбһҺбҹҚбһўбһҖбҹ’бһҹбһҡ","detail":"бһҖбһ¶бһҡбһҹбһ“бҹ’бһ‘бһ“бһ¶бһҸбһ¶бһҳбһҳбһ¶бһҸбҹӢбһ‘бһ‘бҹҒбһўбһ¶бһ…бһ“бһ№бһ„бһҸбҹ’бһҡбһјбһңбһ—бҹ’бһӣбҹҒбһ…бһ—бҹ’бһӣбһ¶бҹҶбһ„бҹ” бһҖбһ¶бһҡбһҹбһ„бҹ’бһҒбҹҒбһ”бһҮбһ¶бһӣбһ¶бһҷбһӣбһҖбҹ’бһҒбһҺбҹҚбһўбһҖбҹ’бһҹбһҡбһ”бһ„бҹ’бһ бһ¶бһүбһ–бһёбһңбһ·бһҮбҹ’бһҮбһ¶бһҮбһёбһңбҹҲ бһ“бһ·бһ„бһ•бҹ’бһҸбһӣбҹӢбһұбҹ’бһҷбһўбһҸбһ·бһҗбһ·бһҮбһ“бһ“бһјбһңбһҜбһҖбһҹбһ¶бһҡбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһ•бҹ’бһ‘бҹҖбһ„бһ•бҹ’бһ‘бһ¶бһҸбҹӢбҹ” бһҸбҹ’бһҡбһјбһңбһ•бҹ’бһүбһҫбһңбһ¶бһұбҹ’бһҷбһ”бһ¶бһ“бһҖбҹ’бһ“бһ»бһ„бһҗбҹ’бһ„бҹғбһҠбһҠбҹӮбһӣбҹ”"}]}],"reflection":"бһҹбһ¶бһҖбһӣбҹ’бһ”бһ„бһӮбһ·бһҸбһўбҹҶбһ–бһёбһ–бҹҒбһӣбһҳбһҪбһҷбһҠбҹӮбһӣбһўбҹ’бһ“бһҖбһҳбһ¶бһ“бһўбһ¶бһҡбһҳбҹ’бһҳбһҺбҹҚбһҗбһ¶бһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бһҖбһ¶бһҡбһӮбҹ„бһҡбһ–бһҷбҹүбһ¶бһ„бһ–бһ·бһҸбһ”бҹ’бһҡбһ¶бһҖбһҠ бһ бһҫбһҷбһҳбһ·бһ“бһҳбҹӮбһ“бһҸбҹ’бһҡбһјбһңбһӮбҹҒбһӣбһҖбҹӢбһҠбһ¶бһҖбҹӢбһ“бҹ„бҹҮбһ‘бҹҒбҹ” бһҸбһҫбһ”бһ»бһӮбҹ’бһӮбһӣбһҡбһјбһ”бһ“бҹ„бҹҮбһ”бһ¶бһ“бһ’бҹ’бһңбһҫбһўбҹ’бһңбһёбһҒбһ»бһҹбһ”бҹ’бһӣбҹӮбһҖбһ–бһёбһӮбҹҒ вҖ” бһ бһҫбһҷбһҸбһҫбһўбҹ’бһ“бһҖбһўбһ¶бһ…бһҷбһҖбһңбһ¶бһҳбһҖбһўбһ“бһ»бһңбһҸбҹ’бһҸбһ”бһ¶бһ“бһҠбҹӮбһҡбһ¬бһ‘бҹҒ?","roleplay":{"scenario":"бһҖбһ¶бһҡбһ…бһ¶бһ”бҹӢбһ•бҹ’бһҸбһҫбһҳбһҮбҹҶбһ“бһҪбһ”бһӣбһҫбһҖбһҠбҹҶбһ”бһјбһ„бһҮбһ¶бһҳбһҪбһҷбһўбһҸбһ·бһҗбһ·бһҮбһ“бһҗбҹ’бһҳбһё","instructions":"бһўбһ“бһ»бһңбһҸбҹ’бһҸбһҖбһ¶бһҡбһ”бһ„бҹ’бһҖбһҫбһҸбһҘбһ‘бҹ’бһ’бһ·бһ–бһӣ бһ“бһ·бһ„бһ—бһ¶бһ–бһӮбһҪбһҡбһұбҹ’бһҷбһҮбһҝбһҮбһ¶бһҖбҹӢбһҸбһ¶бһҳбһҡбһҷбҹҲбһҹбҹҶбһҺбһҪбһҡ вҖ” бһҳбһ·бһ“бһҳбҹӮбһ“бһҸбһ¶бһҳбһҡбһҷбҹҲбһҖбһ¶бһҡбһ”бҹ’бһҡбһ¶бһ”бҹӢ бһ¬бһ“бһ·бһҷбһ¶бһҷбһ…бҹ’бһҡбһҫбһ“бһ“бҹ„бҹҮбһ‘бҹҒбҹ”","lines":[{"role":"client","text":"\"бһҒбҹ’бһүбһ»бҹҶбһ”бһ¶бһ“бһҳбһҫбһӣбһўбһ…бһӣбһ“бһ‘бҹ’бһҡбһ–бҹ’бһҷбһ“бҹ…бһ—бҹ’бһ“бҹҶбһ–бҹҒбһүбһҳбһҪбһҷбһҡбһҷбҹҲбһ бһҫбһҷбҹ” бһҒбҹ’бһүбһ»бҹҶбһҠбһ№бһ„бһҗбһ¶бһҒбҹ’бһүбһ»бҹҶбһҸбҹ’бһҡбһјбһңбһҖбһ¶бһҡбһўбҹ’бһңбһёбҹ”\""},{"role":"agent","text":"\"бһ“бҹ„бҹҮбһҮбһ¶бһ…бҹҶбһҺбһ»бһ…бһ…бһ¶бһ”бҹӢбһ•бҹ’бһҸбһҫбһҳбһҠбҹҸбһӣбҹ’бһўбһҳбһҪбһҷбҹ” бһҸбһҫбһўбҹ’бһңбһёбһҠбҹӮбһӣбһ‘бһ¶бһҖбҹӢбһ‘бһ¶бһүбһ”бһ„бһұбҹ’бһҷбһ…бһ¶бһ”бҹӢбһўбһ¶бһҡбһҳбҹ’бһҳбһҺбҹҚбһ“бҹ…бһ—бҹ’бһ“бҹҶбһ–бҹҒбһүбһҮбһ¶бһ–бһ·бһҹбҹҒбһҹ вҖ” бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҖбһ¶бһҡбһңбһ·бһ“бһ·бһҷбҹ„бһӮ бһҡбһ”бҹҖбһ”бһҡбһҹбҹӢбһ“бҹ… бһ¬бһ‘бһ¶бҹҶбһ„бһ–бһёбһҡ?\""},{"role":"client","text":"\"бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҖбһ¶бһҡбһңбһ·бһ“бһ·бһҷбҹ„бһӮбҹ” бһҒбҹ’бһүбһ»бҹҶбһ…бһ„бҹӢбһ”бһ¶бһ“бһ•бһӣбһ…бҹҶбһҺбҹҒбһү 8%бҹ”\""},{"role":"agent","text":"\"бһҷбһӣбҹӢбһ…бҹ’бһ”бһ¶бһҹбҹӢбһҺбһ¶бһҹбҹӢбһ”бһ„бҹ” бһҳбһ»бһ“бһ–бҹҒбһӣбһҒбҹ’бһүбһ»бҹҶбһ”бһ„бҹ’бһ бһ¶бһүбһӮбһҳбҹ’бһҡбҹ„бһ„бһўбҹ’бһңбһёбһҳбһҪбһҷбһҠбһӣбҹӢбһ”бһ„ вҖ” бһҸбһҫбһҒбҹ’бһүбһ»бҹҶбһўбһ¶бһ…бһҹбһҪбһҡбһ”бһ“бҹ’бһҸбһ·бһ…бһ”бһ¶бһ“бһ‘бҹҒбһҗбһ¶ бһҖбһ“бҹ’бһӣбһ„бһҳбһҖбһ”бһ„бһ”бһ¶бһ“бһҳбһҫбһӣбһӮбһҳбҹ’бһҡбҹ„бһ„бһўбҹ’бһңбһёбһҒбҹ’бһӣбҹҮбһ бһҫбһҷ бһ бһҫбһҷбһҸбһҫбһўбҹ’бһңбһёбһҠбҹӮбһӣбһ’бҹ’бһңбһҫбһұбҹ’бһҷбһ”бһ„бһ“бҹ…бһҡбһ¶бһҖбҹӢбһҡбһ¶бһҖбҹӢбһҹбҹ’бһ‘бһ¶бһҖбҹӢбһҹбҹ’бһ‘бһҫбһҡбһӣбһҫбһӮбһҳбҹ’бһҡбҹ„бһ„бһ‘бһ¶бҹҶбһ„бһ“бҹ„бҹҮ?\""},{"role":"client","text":"\"бһ–бһёбһҡбһ”бһёбһӮбһҳбҹ’бһҡбҹ„бһ„бһҠбҹӮбһҡбҹ” бһўбһҸбҹ’бһҡбһ¶бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҳбһҫбһӣбһ‘бҹ…бһӣбҹ’бһў бһ”бҹүбһ»бһ“бҹ’бһҸбҹӮбһҒбҹ’бһүбһ»бҹҶбһҳбһ·бһ“бһҹбһјбһңбһ”бҹ’бһҡбһ¶бһҖбһҠбһ…бһ·бһҸбҹ’бһҸбһӣбһҫбһҖбҹ’бһҡбһ»бһҳбһ бҹҠбһ»бһ“бһўбһ—бһ·бһңбһҢбҹ’бһҚбһ“бҹҚбҹ”\""},{"role":"agent","text":"\"бһҖбһ¶бһҡбһҹбҹ’бһ‘бһ¶бһҖбҹӢбһҹбҹ’бһ‘бһҫбһҡбһ“бҹ„бҹҮбһӮбһәбһҮбһ¶бһҖбһ¶бһҡбһӮбһ·бһҸбһҠбҹҸбһҸбҹ’бһҡбһ№бһҳбһҸбҹ’бһҡбһјбһңбҹ” бһ”бҹ’бһҡбһңбһҸбҹ’бһҸбһ·бһҹбҹ’бһ“бһ¶бһҠбҹғбһҡбһ”бһҹбҹӢбһҖбҹ’бһҡбһ»бһҳбһ бҹҠбһ»бһ“бһўбһ—бһ·бһңбһҢбҹ’бһҚбһ“бҹҚ бһӮбһәбһҮбһ¶бһҖбһҸбҹ’бһҸбһ¶бһ бһ¶бһ“бһ·бһ—бҹҗбһҷбһҠбҹҸбһҹбҹҶбһҒбһ¶бһ“бҹӢбһ”бҹҶбһ•бһ»бһҸбһҳбһҪбһҷбһ“бҹ…бһҖбҹ’бһ“бһ»бһ„бһ‘бһёбһ•бҹ’бһҹбһ¶бһҡбһ“бҹҒбҹҮбҹ” бһўбһ“бһ»бһүбҹ’бһүбһ¶бһҸбһұбҹ’бһҷбһҒбҹ’бһүбһ»бҹҶбһҹбһҪбһҡбһўбҹҶбһ–бһёбһҖбһ¶бһӣбһңбһ·бһ—бһ¶бһӮбһ–бҹҒбһӣбһңбҹҒбһӣбһ¶ бһ“бһ·бһ„бһҖбһҳбҹ’бһҡбһ·бһҸбһ бһ¶бһ“бһ·бһ—бҹҗбһҷбһҠбҹӮбһӣбһ”бһ„бһўбһ¶бһ…бһ‘бһ‘бһҪбһӣбһҷбһҖбһ”бһ¶бһ“ бһҳбһ»бһ“бһ–бҹҒбһӣбһҒбҹ’бһүбһ»бҹҶбһ’бҹ’бһңбһҫбһҖбһ¶бһҡбһҺбҹӮбһ“бһ¶бҹҶбһӮбһҳбҹ’бһҡбҹ„бһ„бһҺбһ¶бһҳбһҪбһҷбһҮбһјбһ“бһ”бһ„бҹ”\""},{"role":"note","text":"бһҖбһ¶бһҡбһ”бһјбһҖбһҹбһҡбһ»бһ”бһҹбһ„бҹ’бһҒбҹҒбһ”бҹ– бһ—бҹ’бһ“бһ¶бһҖбҹӢбһ„бһ¶бһҡбһ”бһ¶бһ“бһҹбһҪбһҡбһ…бҹҶбһ“бһҪбһ“ бҹӨ бһҹбҹҶбһҺбһҪбһҡбһҳбһ»бһ“бһ–бҹҒбһӣбһ“бһ·бһҷбһ¶бһҷбһўбҹ’бһңбһёбһҳбһҪбһҷбһўбҹҶбһ–бһёбһӮбһҳбҹ’бһҡбҹ„бһ„бҹ” бһҸбһҫбһңбһ¶бһҳбһ¶бһ“бһӣбһҖбҹ’бһҒбһҺбҹҲбһ’бһҳбҹ’бһҳбһҮбһ¶бһҸбһ·бһҠбҹӮбһҡбһ¬бһ‘бҹҒ?"}],"debrief":"бһ‘бһёбһ”бҹ’бһҡбһ№бһҖбҹ’бһҹбһ¶бһҠбҹӮбһӣбһ…бҹҒбҹҮбһҹбһҪбһҡбһҹбҹҶбһҺбһҪбһҡбһ”бһ¶бһ“бһӣбҹ’бһў бһ“бһ№бһ„бһҳбһҫбһӣбһ‘бҹ…бһҳбһ¶бһ“бһҹбһҳбһҸбҹ’бһҗбһ—бһ¶бһ–бһҮбһ¶бһ„бһўбҹ’бһ“бһҖбһҠбҹӮбһӣбһ“бһ·бһҷбһ¶бһҷбһ…бҹ’бһҡбһҫбһ“бҹ” б һҖбһҖбһ¶бһҡбһ”бҹ’бһҸбҹҒбһҮбҹ’бһүбһ¶бһ…бһ·бһҸбҹ’бһҸбһҳбһ»бһ“бһ–бҹҒбһӣбһ–бһҪбһҖбһӮбһ¶бһҸбҹӢбһ‘бҹ…бһҳбһҫбһӣбһҠбҹғбһӮбһјбһ”бҹ’бһҡбһҖбһҪбһҸбһ”бҹ’бһҡбһҮбҹӮбһ„"],"correct":1,"explain":"бһҖбһ¶бһҡбһҸбһ¶бһҳбһҠбһ¶бһ“бһҮбһ¶бһӣбһ¶бһҷбһӣбһҖбҹ’бһҒбһҺбҹҚбһўбһҖбҹ’бһҹбһҡбһҹбһ„бҹ’бһҒбҹҒбһ”бһ“бһјбһңбһўбҹ’бһңбһёбһҠбҹӮбһӣбһ”бһ¶бһ“бһ–бһ·бһ—бһ¶бһҖбҹ’бһҹбһ¶ бһ”бһүбҹ’бһҮбһ¶бһҖбҹӢбһ…бҹ’бһ”бһ¶бһҹбҹӢбһ–бһёбһ бһ¶бһ“бһ·бһ—бҹҗбһҷ бһ“бһ·бһ„бһ”бһ„бҹ’бһ бһ¶бһүбһ–бһёбһңбһ·бһҮбҹ’бһҮбһ¶бһҮбһёбһңбҹҲбҹ” бһңбһ¶бһӮбһәбһҮбһ¶бһҹбһҖбһҳбҹ’бһҳбһ—бһ¶бһ–бһ”бһ„бҹ’бһҖбһҫбһҸбһ‘бҹҶбһ“бһ»бһҖбһ…бһ·бһҸбҹ’бһҸбһҠбҹӮбһӣбһӮбһҪбһҡбһұбҹ’бһҷбһ‘бһ»бһҖбһ…бһ·бһҸбҹ’бһҸбһ”бҹҶбһ•бһ»бһҸбһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ–бһёбһҮбҹҶбһ“бһҪбһ”бһҠбҹҶбһ”бһјбһ„бҹ”"},{"q":"бһҸбһҫбһҖбҹҶбһ бһ»бһҹбһҳбһҪбһҷбһҺбһ¶бһҖбҹ’бһ“бһ»бһ„бһ…бҹҶбһҺбҹ„бһҳбһҖбҹҶбһ бһ»бһҹбһ‘бһ¶бҹҶбһ„бһ”бҹ’бһҡбһ¶бҹҶбһ“бҹҒбҹҮ бһҠбҹӮбһӣбһ„бһ¶бһҷбһ“бһ№бһ„бһ”бҹҶбһ•бҹ’бһӣбһ¶бһүбһ‘бҹҶбһ“бһ»бһҖбһ…бһ·бһҸбҹ’бһҸбһҮбһ¶бһҳбһҪбһҷбһўбҹ’бһ“бһҖбһңбһ·бһ“бһ·бһҷбҹ„бһӮбһ’бҹ’бһ„бһ“бҹӢбһ’бҹ’бһ„бһҡбһҮбһ¶бһҡбҹҖбһ„бһҡбһ бһјбһҸ?","opts":["бһҖбһ¶бһҡбһ—бҹ’бһӣбҹҒбһ…бһ•бҹ’бһүбһҫбһўбҹҠбһёбһҳбҹӮбһӣбһҸбһ¶бһҳбһҠбһ¶бһ“","бһҖбһ¶бһҡбһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһҷбһ»бһ‘бҹ’бһ’бһҹбһ¶бһҹбҹ’бһҸбҹ’бһҡбһ”бһ„бҹ’бһҖбһҫбһҸбһ—бһ¶бһ–бһ”бһ“бҹ’бһ‘бһ¶бһ“бҹӢ бһҠбһјбһ…бһҮбһ¶ 'бһҹбһӣбҹӢбһҸбҹӮ бҹў бһҷбһјбһ“бһёбһҸбһ‘бҹҖбһҸбһ‘бҹҒ'","бһҖбһ¶бһҡбһ…бһ¶бһ”бҹӢбһ•бҹ’бһҸбһҫбһҳбһҮбҹҶбһ“бһҪбһ”бһҠбҹ„бһҷбһҖбһ¶бһҡбһҹбһ„бҹ’бһҒбҹҒбһ”бһўбҹҶбһ–бһёбһӮбһҳбҹ’бһҡбҹ„бһ„","бһҖбһ¶бһҡбһҹбһҪбһҡбһҹбҹҶбһҺбһҪбһҡбһңбһ¶бһҷбһҸбһҳбҹ’бһӣбҹғбһ…бҹ’бһҡбһҫбһ“бһ–бҹҒбһҖ"],"correct":1,"explain":"бһҷбһ»бһ‘бҹ’бһ’бһҹбһ¶бһҹбҹ’бһҸбҹ’бһҡбһ”бһ„бҹ’бһҖбһҫбһҸбһ—бһ¶бһ–бһ”бһ“бҹ’бһ‘бһ¶бһ“бҹӢбһўбһ¶бһ…бһ”бҹ’бһҡбһҫбһ”бһ¶бһ“бһ•бһӣбһҸбҹӮбһҳбҹ’бһҸбһ„бһ”бҹүбһ»бһҺбҹ’бһҺбҹ„бҹҮ вҖ” бһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһҳбһҖбһ“бһ№бһ„бһ”бҹҶбһ•бҹ’бһӣбһ¶бһүбһ‘бҹҶбһ“бһ»бһҖбһ…бһ·бһҸбҹ’бһҸбһҮбһ¶бһҡбҹҖбһ„бһҡбһ бһјбһҸбҹ” бһўбҹ’бһ“бһҖбһңбһ·бһ“бһ·бһҷбҹ„бһӮбһ’бҹ’бһ„бһ“бҹӢбһ’бҹ’бһ„бһҡбһҳбһҫбһӣбһ’бҹ’бһӣбһ»бҹҮбһ‘бһ„бҹ’бһңбһҫбһ“бҹҒбҹҮбһ—бҹ’бһӣбһ¶бһҳбҹ—бҹ” PHC бһҳбһ·бһ“бһҠбҹӮбһӣбһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһңбһ¶бһҖбҹ’бһ“бһ»бһ„бһҖбһ¶бһӣбҹҲбһ‘бҹҒбһҹбҹҲбһҺбһ¶бһҖбҹҸбһҠбҹ„бһҷбҹ”"}]}},
{id:7,week:2,title:"Qualifying Clients Correctly",short:"Client Qualification",objectives:["Know the 4 qualification dimensions every PHC agent must uncover","Be able to qualify a client in under 10 minutes without it feeling like an interrogation","Know which questions reveal the most and why"],sections:[{label:"Why Qualification Matters",heading:"The wrong project is worse than no project",body:"Recommending the wrong project to a client вҖ” even if they buy вҖ” is a failure. It creates dissatisfied clients, bad reviews, and no referrals. The qualification framework protects both the client and PHC's reputation.",box:{title:"The 4 dimensions you must uncover:",lines:["1. Goal вҖ” what do they want the investment to do?","2. Timeline вҖ” when do they need to act, and when do they expect returns?","3. Budget вҖ” realistic range, not aspirational","4. Risk tolerance вҖ” what keeps them up at night?"]}},{label:"The Questions",heading:"Questions that open вҖ” not close",body:"Good qualification questions feel like curiosity, not interrogation. The framing matters as much as the content.",rules:[{title:"Goal question",detail:"'What are you hoping this investment will do for you вҖ” in 3 years, and in 10 years?' The gap between those two answers tells you a lot."},{title:"Timeline question",detail:"'If you found something ideal today, what would need to happen before you could move forward?' This reveals hidden blockers вҖ” visa, funds, family, other commitments."},{title:"Budget question",detail:"'What range are you working with вҖ” and is that flexible if the right opportunity came up?' Never assume the stated budget is fixed."},{title:"Risk question",detail:"'What would make this investment a mistake for you?' This is the most honest question. Risk is personal вҖ” and only the client can define it."}]},{label:"Red Flags",heading:"Know when to pause вҖ” or walk away",body:"Not every client is the right fit for PHC. Part of qualification is recognising this early.",rules:[{title:"Unrealistic yield expectations",detail:"'I need 15% net yield.' If the expectation is disconnected from the market, realign before proceeding. If they refuse вҖ” they are not your client."},{title:"Zero timeline",detail:"'I need to buy this week.' Urgency without information is a sign of poor decision-making вҖ” not a buying signal. Slow down."},{title:"Nominee structures",detail:"Any client asking to use a Cambodian nominee to own property must be stopped. This is legally risky and PHC does not support it."}]}],roleplay:{scenario:"Full qualification in under 10 minutes",instructions:"Practice all 4 dimensions in natural sequence вҖ” without reading from a script.",lines:[{role:"agent",text:'"Thank you for coming in. Before I show you anything вҖ” tell me what\'s bringing you to Cambodia property right now."'},{role:"client",text:'"I heard yields are good here. A friend made money."'},{role:"agent",text:'"What kind of return is he getting вҖ” do you know if that\'s gross or net?"'},{role:"client",text:'"Not sure. He said 8%."'},{role:"agent",text:'"8% gross is common. Net after management and vacancy is usually 5.5вҖ“7% depending on location and operator. Does that range still work for you?"'},{role:"client",text:'"Yes, I think so."'},{role:"agent",text:'"Good. What\'s your timeline вҖ” are you looking to move forward in the next few months, or are you still in research mode?"'},{role:"client",text:'"I\'d like to decide in the next 2 months."'},{role:"agent",text:'"Perfect. And roughly what range are you working with?"'},{role:"note",text:"Debrief: Did the Agent realign the yield expectation early вҖ” calmly and without judgment?"}],debrief:"Realigning expectations early is a service, not a rejection. It protects the client from disappointment вҖ” and protects PHC from a bad outcome."},quiz:[{q:"A client says 'I want 12% net yield in Cambodia.' You should:",opts:["Show them the highest-yield project available","Agree вҖ” it's possible in the right location","Calmly explain that 12% net is not realistic in the current Phnom Penh market вҖ” and share actual data","Tell them Cambodia is not the right market for them"],correct:2,explain:"Realign the expectation with data, calmly. '12% net is not realistic вҖ” here is what the data shows' is the PHC response. Don't agree to it, don't dismiss the client вҖ” educate."},{q:"Which question most reliably reveals a client's real risk tolerance?",opts:["'How much can you afford to lose?'","'What would make this investment a mistake for you?'","'Are you comfortable with off-plan risk?'","'How much experience do you have with property?'"],correct:1,explain:"'What would make this a mistake for you?' is open-ended and personal. It reveals fears, deal-breakers, and values that no closed question would surface."},{q:"A client asks you to help them set up a Cambodian nominee structure to own a villa. You should:",opts:["Refer them to a local lawyer who handles nominees","Help them вҖ” it's common practice","Explain that PHC does not support nominee structures due to legal risk вҖ” and offer compliant alternatives","Ask Nick first before responding"],correct:2,explain:"PHC does not support nominee structures. This is a legal risk to the client and a reputational risk to PHC. State this clearly and redirect to compliant ownership options."},{q:"A client says 'I need to buy this week.' This is:",opts:["A strong buying signal вҖ” move fast and close","A red flag вҖ” urgency without information is poor decision-making","Normal вҖ” most serious buyers decide quickly","An opportunity to show them all available inventory"],correct:1,explain:"'I need to buy this week' without proper qualification is a red flag, not a buying signal. Slow down, qualify properly, and protect both the client and PHC from a rushed bad outcome."}],reflection:"Think about a client conversation where you felt you didn't understand what they really wanted. What questions would you ask differently now?",km:{"title":"бһҖбһ¶бһҡбһңбһ¶бһҷбһҸбһҳбҹ’бһӣбҹғбһҹбҹ’бһңбҹӮбһ„бһҷбһӣбҹӢбһ–бһёбһўбһҸбһ·бһҗбһ·бһҮбһ“бһұбҹ’бһҷбһ”бһ¶бһ“бһҸбҹ’бһҡбһ№бһҳбһҸбҹ’бһҡбһјбһң","short":"бһҖбһ¶бһҡбһңбһ¶бһҷбһҸбһҳбҹ’бһӣбҹғбһўбһҸбһ·бһҗбһ·бһҮбһ“","objectives":["бһҹбҹ’бһӮбһ¶бһӣбҹӢбһңбһ·бһҳбһ¶бһҸбҹ’бһҡбһңбһ¶бһҷбһҸбһҳбҹ’бһӣбҹғбһ‘бһ¶бҹҶбһ„ бҹӨ бһҠбҹӮбһӣбһ—бҹ’бһ“бһ¶бһҖбҹӢбһ„бһ¶бһҡ PHC бһӮбҹ’бһҡбһ”бҹӢбһҡбһјбһ”бһҸбҹ’бһҡбһјбһңбһҸбҹӮбһҹбҹ’бһңбҹӮбһ„бһҷбһӣбҹӢбһұбҹ’бһҷбһғбһҫбһү","бһўбһ¶бһ…бһңбһ¶бһҷбһҸбһҳбҹ’бһӣбҹғбһўбһҸбһ·бһҗбһ·бһҮбһ“бһҖбҹ’бһ“бһ»бһ„бһҡбһҷбҹҲбһ–бҹҒбһӣбһҸбһ·бһ…бһҮбһ¶бһ„ бҹЎбҹ  бһ“бһ¶бһ‘бһё бһҠбҹ„бһҷбһҳбһ·бһ“бһ’бҹ’бһңбһҫбһұбҹ’бһҷбһҳбһ¶бһ“бһўбһ¶бһҡбһҳбҹ’бһҳбһҺбҹҚбһҠбһјбһ…бһҮбһ¶бһҖбһ¶бһҡбһҹбһ¶бһҖбһҹбһҪбһҡбһ…бһҳбҹ’бһӣбһҫбһҷ","бһҹбҹ’бһӮбһ¶бһӣбҹӢбһҹбҹҶбһҺбһҪбһҡбһҺбһ¶бһҠбҹӮбһӣбһ‘бһ¶бһүбһҷбһҖбһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“бһ”бһ¶бһ“бһ…бҹ’бһҡбһҫбһ“бһ”бҹҶбһ•бһ»бһҸ бһ“бһ·бһ„бһ бҹҒбһҸбһ»бһўбҹ’бһңбһё"],"sections":[{"label":"бһ бҹҒбһҸбһ»бһўбҹ’бһңбһёбһ”бһ¶бһ“бһҮбһ¶бһҖбһ¶бһҡбһңбһ¶бһҷбһҸбһҳбҹ’бһӣбҹғбһҳбһ¶бһ“бһҹбһ¶бһҡбҹҲбһҹбҹҶбһҒбһ¶бһ“бҹӢ","heading":"бһӮбһҳбҹ’бһҡбҹ„бһ„бһҠбҹӮбһӣбһҒбһ»бһҹ бһӮбһәбһўбһ¶бһҖбҹ’бһҡбһҖбҹӢбһҮбһ¶бһ„бһҖбһ¶бһҡбһӮбҹ’бһҳбһ¶бһ“бһӮбһҳбҹ’бһҡбҹ„бһ„","body":"бһҖбһ¶бһҡбһҺбҹӮбһ“бһ¶бҹҶбһӮбһҳбҹ’бһҡбҹ„бһ„бһҠбҹӮбһӣбһҒбһ»бһҹбһ‘бҹ…бһұбҹ’бһҷбһўбһҸбһ·бһҗбһ·бһҮбһ“ вҖ” бһ‘бҹ„бҹҮбһ”бһёбһҮбһ¶бһ–бһҪбһҖбһӮбһ¶бһҸбҹӢбһ‘бһ·бһүбһҖбҹҸбһҠбҹ„бһҷ вҖ” бһӮбһәбһҮбһ¶бһ”бһҡбһ¶бһҮбҹҗбһҷбҹ” бһңбһ¶бһ”бһ„бҹ’бһҖбһҫбһҸбһұбҹ’бһҷбһҳбһ¶бһ“бһўбһҸбһ·бһҗбһ·бһҮбһ“бһҳбһ·бһ“бһ–бҹҒбһүбһ…бһ·бһҸбҹ’бһҸ бһҖбһ¶бһҡбһңбһ¶бһҷбһҸбһҳбҹ’бһӣбҹғбһҳбһ·бһ“бһӣбҹ’бһў бһ“бһ·бһ„бһӮбҹ’бһҳбһ¶бһ“бһҖбһ¶бһҡбһҺбҹӮбһ“бһ¶бҹҶбһ”бһ“бҹ’бһҸбҹ” бһҹбһҖбҹ’бһҡбһ”бһҒбҹҗбһҺбҹ’бһҢбһҖбһ¶бһҡбһ„бһ¶бһҡбһ“бҹғбһҖбһ¶бһҡбһңбһ¶бһҷбһҸбһҳбҹ’бһӣбҹғбһҹбҹ’бһңбҹӮбһ„бһҷбһӣбҹӢ бһӮбһәбһҖбһ¶бһҡбһ–бһ¶бһҡбһ‘бһ¶бҹҶбһ„бһўбһҸбһ·бһҗбһ·бһҮбһ“ бһ“бһ·бһ„бһҖбһ·бһҸбҹ’бһҷбһ¶бһ“бһ»бһ—бһ¶бһ–бһҡбһ”бһҹбҹӢ PHCбҹ”","box":{"title":"бһңбһ·бһҳбһ¶бһҸбҹ’бһҡбһ‘бһ¶бҹҶбһ„ бҹӨ бһҠбҹӮбһӣбһўбҹ’бһ“бһҖбһҸбҹ’бһҡбһјбһңбһҸбҹӮбһҹбҹ’бһңбҹӮбһ„бһҷбһӣбҹӢбһұбҹ’бһҷбһғбһҫбһүбҹ–","lines":["1. бһӮбҹ„бһӣбһҠбҹ… вҖ” бһҸбһҫбһ–бһҪбһҖбһӮбһ¶бһҸбҹӢбһ…бһ„бҹӢбһұбҹ’бһҷбһҖбһ¶бһҡбһңб бҹҶбһҺбҹҒбһүбһҹбһ»бһ‘бҹ’бһ’ 15%бҹ”' бһ”бҹ’бһҡбһҹбһ·бһ“бһ”бһҫбһҖбһ¶бһҡбһҡбҹҶбһ–бһ№бһ„бһ‘бһ»бһҖбһҳбһ·бһ“бһҹбҹҠбһёбһӮбҹ’бһ“бһ¶бһ“бһ№бһ„бһ‘бһёбһ•бҹ’бһҹбһ¶бһҡ бһҸбҹ’бһҡбһјбһңбһҸбһҳбҹ’бһҡбһ„бҹӢбһҖбһ¶бһҡбһҷбһӣбҹӢбһғбһҫбһүбһЎбһҫбһ„бһңбһ·бһүбһҳбһ»бһ“бһ“бһ№бһ„бһ”бһ“бҹ’бһҸбҹ” бһ”бҹ’бһҡбһҹбһ·бһ“бһ”бһҫбһ–бһҪбһҖбһӮбһ¶бһҸбҹӢбһ”бһҠбһ·бһҹбҹҒбһ’ вҖ” бһ–бһҪбһҖбһӮбһ¶бһҸбҹӢбһҳбһ·бһ“бһҳбҹӮбһ“бһҮбһ¶бһўбһҸбһ·бһҗбһ·бһҮбһ“бһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖбһЎбһҫбһҷбҹ”"},{"title":"бһӮбҹ’бһҳбһ¶бһ“бһҖбһ¶бһӣбһңбһ·бһ—бһ¶бһӮбһ–бҹҒбһӣбһңбҹҒбһӣбһ¶ (бһ”бҹ’бһҡбһүбһ¶бһ”бҹӢбһҮбҹ’бһҡбһ»бһӣ)","detail":"'бһҒбҹ’бһүбһ»бҹҶбһҸбҹ’бһҡбһјбһңбһҸбҹӮбһ‘бһ·бһүбһ“бҹ…бһҖбҹ’бһ“бһ»бһ„бһҹбһ”бҹ’бһҸбһ¶бһ бҹҚбһ“бҹҒбҹҮбҹ”' бһ—бһ¶бһ–бһ”бһ“бҹ’бһ‘бһ¶бһ“бҹӢбһҠбҹӮбһӣбһҒбҹ’бһңбҹҮбһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“ бһӮбһәбһҮбһ¶бһҹбһүбҹ’бһүбһ¶бһ“бҹғбһҖбһ¶бһҡбһҹбһҳбҹ’бһҡбҹҒбһ…бһ…бһ·бһҸбҹ’бһҸбһҳбһ·бһ“бһ”бһ¶бһ“бһӣбҹ’бһў вҖ” бһҳбһ·бһ“бһҳбҹӮбһ“бһҮбһ¶бһҹбһүбҹ’бһүбһ¶бһ‘бһ·бһүбһ“бҹ„бҹҮбһ‘бҹҒбҹ” бһҸбҹ’бһҡбһјбһңбһ–бһ“бҹ’бһҷбһәбһҸбһ…бһ„бҹ’бһңбһ¶бһҖбҹӢбҹ”"},{"title":"бһҡбһ…бһ“бһ¶бһҹбһҳбҹ’бһ–бҹҗбһ“бҹ’бһ’бһҲбҹ’бһ“бҹ„бҹҮбһ”бһ¶бҹҶбһ„бһҳбһ»бһҒ (Nominee Structures)","detail":"бһўбһҸбһ·бһҗбһ·бһҮбһ“бһҺбһ¶бһҠбҹӮбһӣбһҹбҹ’бһ“бһҫбһҹбһ»бҹҶбһ”бҹ’бһҡбһҫбһ”бҹ’бһҡбһ¶бһҹбҹӢбһҮбһ“бһҮбһ¶бһҸбһ·бһҖбһҳбҹ’бһ–бһ»бһҮбһ¶бһ”бһ¶бҹҶбһ„бһҳбһ»бһҒбһҠбһҫбһҳбҹ’бһ”бһёбһҖбһ¶бһ“бҹӢбһҖбһ¶бһ”бҹӢбһўбһ…бһӣбһ“бһ‘бҹ’бһҡбһ–бҹ’бһҷ бһҸбҹ’бһҡбһјбһңбһҸбҹӮбһ”бһүбҹ’бһҲбһ”бҹӢбҹ” бһ“бҹҒбҹҮбһҳбһ¶бһ“бһ бһ¶бһ“бһ·бһ—бҹҗбһҷбһ•бҹ’бһӣбһјбһңбһ…бҹ’бһ”бһ¶бһ”бҹӢ бһ бһҫбһҷ PHC бһҳбһ·бһ“бһӮбһ¶бҹҶбһ‘бҹ’бһҡбһ‘бһ„бҹ’бһңбһҫбһ“бҹҒбҹҮбһЎбһҫбһҷбҹ”"}]}],"reflection":"бһӮбһ·бһҸбһўбҹҶбһ–бһёбһҖбһ¶бһҡбһҹбһ“бҹ’бһ‘бһ“бһ¶бһҮбһ¶бһҳбһҪбһҷбһўбһҸбһ·бһҗбһ·бһҮбһ“бһҳбҹ’бһ“бһ¶бһҖбҹӢбһҠбҹӮбһӣбһўбҹ’бһ“бһҖбһҳбһ¶бһ“бһўбһ¶бһҡбһҳбҹ’бһҳбһҺбҹҚбһҗбһ¶ бһҳбһ·бһ“бһ”бһ¶бһ“бһҷбһӣбҹӢбһ–бһёбһўбҹ’бһңбһёбһҠбҹӮбһӣбһ–бһҪбһҖбһӮбһ¶бһҸбҹӢбһҸбҹ’бһҡбһјбһңбһҖбһ¶бһҡбһ–бһ·бһҸбһ”бҹ’бһҡбһ¶бһҖбһҠбҹ” бһҸбһҫбһҹбҹҶбһҺбһҪбһҡбһўбҹ’бһңбһёбһҒбҹ’бһӣбҹҮбһҠбҹӮбһӣбһўбҹ’бһ“бһҖбһ“бһ№бһ„бһҹбһҪбһҡбһҒбһ»бһҹбһ–бһёбһҳбһ»бһ“бһ“бҹ…бһ–бҹҒбһӣбһ“бҹҒбҹҮ?","roleplay":{"scenario":"бһҖбһ¶бһҡбһңбһ¶бһҷбһҸбһҳбҹ’бһӣбҹғбһҹбҹ’бһңбҹӮбһ„бһҷбһӣбҹӢбһ–бҹҒбһүбһӣбҹҒбһүбһҖбҹ’бһ“бһ»бһ„бһҡбһҷбҹҲбһ–бҹҒбһӣбһҸбһ·бһ…бһҮбһ¶бһ„ бҹЎбҹ  бһ“бһ¶бһ‘бһё","instructions":"бһўбһ“бһ»бһңбһҸбҹ’бһҸбһңбһ·бһҳбһ¶бһҸбҹ’бһҡбһ‘бһ¶бҹҶбһ„ бҹӨ бһҸбһ¶бһҳбһӣбҹҶбһҠбһ¶бһ”бҹӢбһӣбҹҶбһҠбҹ„бһҷбһ’бһҳбҹ’бһҳбһҮбһ¶бһҸбһ· вҖ” бһҠбҹ„бһҷбһҳбһ·бһ“бһ”бһ¶бһ…бҹӢбһўбһ¶бһ“бһҸбһ¶бһҳбһҖбҹ’бһҡбһҠбһ¶бһҹбҹ”","lines":[{"role":"agent","text":"\"бһўбһҡбһӮбһ»бһҺбһ”бһ„бһҠбҹӮбһӣбһ”бһ¶бһ“бһўбһүбҹ’бһҮбһҫбһүбһҳбһҖбҹ” бһҳбһ»бһ“бһ–бҹҒбһӣбһҒбҹ’бһүбһ»бҹҶбһ”бһ„бҹ’бһ бһ¶бһүбһўбҹ’бһңбһёбһҳбһҪбһҷбһҮбһјбһ“бһ”бһ„ вҖ” бһҹбһјбһҳбһ”бҹ’бһҡбһ¶бһ”бҹӢбһҒбҹ’бһүбһ»бҹҶбһ”бһ“бҹ’бһҸбһ·бһ…бһ”бһ¶бһ“бһ‘бҹҒбһҗбһ¶ бһҸбһҫбһўбҹ’бһңбһёбһҠбҹӮбһӣбһ“бһ¶бҹҶбһұбҹ’бһҷбһ”бһ„бһ…бһ¶бһ”бҹӢбһўбһ¶бһҡбһҳбҹ’бһҳбһҺбҹҚбһӣбһҫбһўбһ…бһӣбһ“бһ‘бҹ’бһҡбһ–бҹ’бһҷбһ“бҹ…бһҖбһҳбҹ’бһ–бһ»бһҮбһ¶бһ“бһ¶бһ–бҹҒбһӣбһ“бҹҒбҹҮ?\""},{"role":"client","text":"\"бһҒбҹ’бһүбһ»бҹҶбһӣбһәбһҗбһ¶бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһ“бҹ…бһ‘бһёбһ“бҹҒбҹҮбһӣбҹ’бһўбҹ” бһҳбһ·бһҸбҹ’бһҸбһ—бһҖбҹ’бһҸбһ·бһҒбҹ’бһүбһ»бҹҶбһҡбһҖбһ”бҹ’бһҡбһ¶бһҖбҹӢбһ”бһ¶бһ“бһ–бһёбһ‘бһёбһ“бҹҒбҹҮбҹ”\""},{"role":"agent","text":"\"бһҸбһҫбһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҖбһҳбҹ’бһҡбһ·бһҸбһҺбһ¶бһҠбҹӮбһӣбһӮбһ¶бһҸбҹӢбһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“ вҖ” бһҸбһҫбһ”бһ„бһҠбһ№бһ„бһ‘бҹҒбһҗбһ¶бһҮбһ¶бһҡбһҪбһҳ (Gross) бһ¬бһҹбһ»бһ‘бҹ’бһ’ (Net)?\""},{"role":"client","text":"\"бһҳбһ·бһ“бһҹбһјбһңбһ”бҹ’бһҡбһ¶бһҖбһҠбһҠбҹӮбһҡбҹ” бһӮбһ¶бһҸбҹӢбһҗбһ¶ 8%бҹ”\""},{"role":"agent","text":"\"8% бһҹбһҡбһ»бһ” (Gross) бһӮбһәбһҮбһ¶бһҡбһҝбһ„бһ‘бһјбһ‘бҹ…бҹ” бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһ»бһ‘бҹ’бһ’бһ”бһ“бҹ’бһ‘бһ¶бһ”бҹӢбһ–бһёбһҠбһҖбһҗбҹ’бһӣбҹғбһӮбҹ’бһҡбһ”бҹӢбһӮбҹ’бһҡбһ„ бһ“бһ·бһ„бһўбһҸбҹ’бһҡбһ¶бһҷбһјбһ“бһёбһҸбһ‘бҹҶбһ“бҹҒбһҡ бһӮбһәбһ…бһ“бҹ’бһӣбҹ„бҹҮбһ–бһё 5.5вҖ“7% бһўбһ¶бһҹбҹ’бһҡбҹҗбһҷбһӣбһҫбһ‘бһёбһҸбһ¶бҹҶбһ„ бһ“бһ·бһ„бһўбҹ’бһ“бһҖбһ”бҹ’бһҡбһҸбһ·бһ”бһҸбҹ’бһҸбһ·бһҖбһ¶бһҡбҹ” бһҸбһҫбһ…бһ“бҹ’бһӣбҹ„бҹҮбһ“бҹҒбҹҮбһ“бҹ…бһҸбҹӮбһҹбһҳбһҹбҹ’бһҡбһ”бһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһ”бһ„бһҠбҹӮбһҡбһ¬бһ‘бҹҒ?\""},{"role":"client","text":"\"бһ”бһ¶бһ‘ бһҒбҹ’бһүбһ»бҹҶбһӮбһ·бһҸбһҗбһ¶бһ“бҹ…бһҸбҹӮбһўбһјбһҒбҹҒбҹ”\""},{"role":"agent","text":"\"бһӣбҹ’бһўбһҺбһ¶бһҹбҹӢбһ”бһ„бҹ” бһҸбһҫбһҖбһ¶бһӣбһңбһ·бһ—бһ¶бһӮбһ–бҹҒбһӣбһңбҹҒбһӣбһ¶бһҡбһ”бһҹбҹӢбһ”бһ„бһҷбҹүбһ¶бһ„бһҳбҹүбҹҒбһ…бһҠбҹӮбһҡ вҖ” бһҸбһҫбһ”бһ„бһҖбҹҶбһ–бһ»бһ„бһҹбһҳбҹ’бһӣбһ№бһ„бһҳбһҫбһӣбһҖбһ¶бһҡбһҹбһҳбҹ’бһҡбҹҒбһ…бһ…бһ·бһҸбҹ’бһҸбһҖбҹ’бһ“бһ»бһ„бһҡбһҷбҹҲбһ–бҹҒбһӣбһ–бһёбһҡбһ”бҹ’бһҡбһ¶бҹҶбһ–бһёбһҡбһҒбҹӮбһҒбһ¶бһ„бһҳбһ»бһҒ бһ¬бһҖбҹҸбһҖбҹҶбһ–бһ»бһ„бһҹбҹ’бһҗбһ·бһҸбһҖбҹ’бһ“бһ»бһ„бһҠбҹҶбһҺбһ¶бһҖбҹӢбһҖбһ¶бһӣбһҹбҹ’бһҡбһ¶бһңбһҮбҹ’бһҡбһ¶бһңбһ“бҹ…бһЎбһҫбһҷ?\""},{"role":"client","text":"\"бһҒбҹ’бһүбһ»бҹҶбһ…бһ„бҹӢбһҹбһҳбҹ’бһҡбҹҒбһ…бһ…бһ·бһҸбҹ’бһҸбһҖбҹ’бһ“бһ»бһ„бһҡбһ„бҹ’бһңбһ„бҹӢ бҹў бһҒбҹӮбһҒбһ¶бһ„бһҳбһ»бһҒбҹ”\""},{"role":"agent","text":"\"бһӣбҹ’бһўбһҘбһҸбһҒбҹ’бһ…бҹ„бҹҮбҹ” бһ бһҫбһҷбһҸбһҫбһ”бҹ’бһҡбһ бҹӮбһӣбһҮбһ¶бһ…бһ“бҹ’бһӣбҹ„бҹҮбһҗбһңбһ·бһҖбһ¶бһ”бҹүбһ»бһ“бҹ’бһҳбһ¶бһ“бһҠбҹӮбһҡбһ”бһ„бһ”бһ¶бһ“бһҸбҹ’бһҡбҹҖбһҳбһ‘бһ»бһҖ?\""},{"role":"note","text":"бһҖбһ¶бһҡбһ”бһјбһҖбһҹбһҡбһ»бһ”бһҹбһ„бҹ’бһҒбҹҒбһ”бҹ– бһҸбһҫбһ—бҹ’бһ“бһ¶бһҖбҹӢбһ„бһ¶бһҡбһ”бһ¶бһ“бһҸбһҳбҹ’бһҡбһ„бҹӢбһҖбһ¶бһҡбһҡбҹҶбһ–бһ№бһ„бһ‘бһ»бһҖбһӣбһҫбһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһЎбһҫбһ„бһңбһ·бһүбһҸбһ¶бҹҶбһ„бһ–бһёбһҠбҹҶбһ”бһјбһ„ вҖ” бһҠбҹ„бһҷбһҹбҹ’бһ„бһ”бҹӢбһҹбҹ’бһ„бһ¶бһҸбҹӢ бһ“бһ·бһ„бһӮбҹ’бһҳбһ¶бһ“бһҖбһ¶бһҡбһҡбһҫбһҹбһўбһҫбһ„бһҠбҹӮбһҡбһ¬бһ‘бҹҒ?"}],"debrief":"бһҖбһ¶бһҡбһҸбһҳбҹ’бһҡбһ„бҹӢбһҖбһ¶бһҡбһҡбҹҶбһ–бһ№бһ„бһ‘бһ»бһҖбһЎбһҫбһ„бһңбһ·бһүбһҸбһ¶бҹҶбһ„бһ–бһёбһҠбҹҶбһ”бһјбһ„ бһӮбһәбһҮбһ¶бһҹбҹҒбһңбһ¶бһҖбһҳбҹ’бһҳбһҳбһҪбһҷ бһҳбһ·бһ“бһҳбҹӮбһ“бһҮбһ¶бһҖбһ¶бһҡбһ”бһҠбһ·бһҹбҹҒбһ’бһЎбһҫбһҷбҹ” бһңбһ¶бһҖбһ¶бһҡбһ–бһ¶бһҡбһўбһҸбһ·бһҗбһ·бһҮбһ“бһ–бһёбһҖбһ¶бһҡбһҒбһҖбһ…бһ·бһҸбҹ’бһҸ вҖ” бһ“бһ·бһ„бһҖбһ¶бһҡбһ–бһ¶бһҡ PHC бһ–бһёбһӣбһ‘бҹ’бһ’бһ•бһӣбһҳбһ·бһ“бһӣбҹ’бһўбҹ”"},"quiz":[{"q":"бһўбһҸбһ·бһҗбһ·бһҮбһ“бһ“бһ·бһҷбһ¶бһҷбһҗбһ¶ 'бһҒбҹ’бһүбһ»бҹҶбһ…бһ„бҹӢбһ”бһ¶бһ“бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҹбһ»бһ‘бҹ’бһ’ 12% бһ“бҹ…бһҖбһҳбҹ’бһ–бһ»бһҮбһ¶бҹ”' бһўбҹ’бһ“бһҖбһӮбһҪбһҡбһҸбҹӮбҹ–","opts":["бһ”бһ„бҹ’бһ бһ¶бһүбһӮбһҳбҹ’бһҡбҹ„бһ„бһҠбҹӮбһӣбһҳбһ¶бһ“бһ•бһӣбһ…бҹҶбһҺбҹҒбһүбһҒбҹ’бһ–бһҹбҹӢбһ”бҹҶбһ•бһ»бһҸбһҠбҹӮбһӣбһҳбһ¶бһ“","бһҷбһӣбҹӢбһҹбҹ’бһҡбһ” вҖ” бһңбһ¶бһўбһ¶бһ…бһ‘бҹ…бһҡбһҪбһ…бһ“бҹ…бһ‘бһёбһҸбһ¶бҹҶбһ„бһҠбҹӮбһӣбһҸбҹ’бһҡбһ№бһҳбһҸбҹ’бһҡбһјбһң
