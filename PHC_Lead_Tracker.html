<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PHC CRM · Leads</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --sb:#191b23;--sb-hover:rgba(255,255,255,.05);--sb-active:rgba(255,255,255,.09);
  --sb-text:#a8b0c8;--sb-text-s:#ffffff;--sb-icon:#5a6180;--sb-border:rgba(255,255,255,.06);
  --purple:#7c5cbf;--purple-l:#9d8ef0;--purple-pale:#f3f0ff;--purple-btn:#7c5cbf;
  --bg:#f7f8fa;--card:#ffffff;--white:#ffffff;
  --border:#e3e5ea;--border-h:#c8cdd8;
  --text:#1f2437;--text-s:#5e6882;--text-m:#9ca3af;
  --urgent:#d63031;--urgent-pale:#fff0f0;--urgent-t:#991b1b;
  --high:#e67e22;--high-pale:#fffbf0;--high-t:#92400e;
  --normal:#3b82f6;--normal-pale:#eff6ff;--normal-t:#1d4ed8;
  --low:#9ca3af;--low-pale:#f9fafb;--low-t:#4b5563;
  --green:#10b981;--red:#ef4444;--orange:#f97316;
  --av-nick:#7c5cbf;--av-monika:#10b981;--av-reza:#f97316;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
a{text-decoration:none;cursor:pointer}

/* ── APP SHELL ── */
.app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:230px;flex-shrink:0;background:var(--sb);display:flex;flex-direction:column;border-right:1px solid var(--sb-border);transition:width .2s ease;overflow:hidden}
.sidebar.collapsed{width:52px}
.sidebar.collapsed .sb-label,.sidebar.collapsed .ws-info,.sidebar.collapsed .sb-section-label,
.sidebar.collapsed .sb-badge,.sidebar.collapsed .sb-space-items{display:none}

/* sidebar header */
.ws-header{display:flex;align-items:center;gap:9px;padding:14px 12px 12px;border-bottom:1px solid var(--sb-border);flex-shrink:0}
.ws-logo{width:28px;height:28px;border-radius:7px;background:var(--purple);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;cursor:pointer}
.ws-info{flex:1;min-width:0}
.ws-name{font-size:12px;font-weight:600;color:var(--sb-text-s);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ws-sub{font-size:10px;color:var(--sb-icon);margin-top:1px}
.collapse-btn{background:none;border:none;color:var(--sb-icon);cursor:pointer;font-size:13px;padding:4px;border-radius:4px;flex-shrink:0;line-height:1}
.collapse-btn:hover{background:var(--sb-hover);color:var(--sb-text)}

/* sidebar search */
.sb-search{display:flex;align-items:center;gap:6px;margin:8px 8px 4px;padding:6px 8px;background:rgba(255,255,255,.06);border-radius:6px;border:1px solid var(--sb-border)}
.sb-search input{border:none;background:transparent;font-size:11px;color:var(--sb-text);outline:none;width:100%;font-family:'Inter',sans-serif}
.sb-search input::placeholder{color:var(--sb-icon)}
.sb-search-icon{color:var(--sb-icon);font-size:11px;flex-shrink:0}
.sidebar.collapsed .sb-search{padding:6px;justify-content:center}
.sidebar.collapsed .sb-search input{display:none}

/* sidebar nav */
.sb-nav{flex:1;overflow-y:auto;padding:4px 0;scrollbar-width:none}
.sb-nav::-webkit-scrollbar{display:none}
.sb-section-label{font-size:9px;font-weight:600;color:var(--sb-icon);text-transform:uppercase;letter-spacing:.1em;padding:12px 14px 4px}
.sb-item{display:flex;align-items:center;gap:8px;padding:6px 10px;margin:1px 6px;border-radius:6px;color:var(--sb-text);font-size:12px;font-weight:400;transition:all .15s;cursor:pointer;position:relative;user-select:none}
.sb-item:hover{background:var(--sb-hover);color:var(--sb-text-s)}
.sb-item.active{background:var(--sb-active);color:var(--sb-text-s)}
.sb-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;color:var(--sb-icon)}
.sb-item.active .sb-icon,.sb-item:hover .sb-icon{color:var(--sb-text-s)}
.sb-label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-badge{background:var(--urgent);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;min-width:16px;text-align:center;flex-shrink:0}
.sb-badge.zero{background:rgba(255,255,255,.12);color:var(--sb-icon)}
.sb-sub{padding:5px 10px 5px 32px;font-size:11px}
.sb-sub .stage-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.sb-count{font-size:10px;color:var(--sb-icon);margin-left:auto;padding-right:2px;font-weight:500}
.sb-disabled{opacity:.35;pointer-events:none}
.sb-space-hdr{display:flex;align-items:center;gap:7px;padding:6px 10px;margin:1px 6px;border-radius:6px;color:var(--sb-text);font-size:12px;cursor:pointer}
.sb-space-hdr:hover{background:var(--sb-hover);color:var(--sb-text-s)}
.sb-space-toggle{font-size:10px;color:var(--sb-icon);flex-shrink:0;transition:transform .2s}
.sb-space-items{overflow:hidden;transition:max-height .2s ease;max-height:400px}

/* sidebar agents */
.sb-agents{border-top:1px solid var(--sb-border);padding:8px 0}
.av-ring{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0;letter-spacing:.02em}

/* sidebar footer */
.sb-footer{border-top:1px solid var(--sb-border);padding:6px 0 8px}
.api-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.2);flex-shrink:0}
.api-dot.live{background:var(--green)}
.api-dot.err{background:var(--urgent)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);min-width:0}

/* topbar */
.topbar{background:var(--white);border-bottom:1px solid var(--border);height:44px;display:flex;align-items:center;padding:0 16px;gap:8px;flex-shrink:0}
.breadcrumb{font-size:12px;color:var(--text-s);font-weight:400}
.bc-sep{font-size:12px;color:var(--text-m);margin:0 2px}
.bc-active{font-size:12px;font-weight:600;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.api-status-txt{font-size:11px;color:var(--text-m)}
.tb-icon-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 8px;cursor:pointer;color:var(--text-s);font-size:12px;transition:all .15s}
.tb-icon-btn:hover{border-color:var(--border-h);color:var(--text)}

/* view toolbar */
.view-toolbar{background:var(--white);border-bottom:1px solid var(--border);height:40px;display:flex;align-items:center;padding:0 14px;gap:6px;flex-shrink:0;overflow-x:auto}
.view-toolbar::-webkit-scrollbar{display:none}
.vsw-group{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.vsw{padding:4px 11px;border:none;background:transparent;font-size:11px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;color:var(--text-s);transition:all .15s;display:flex;align-items:center;gap:5px}
.vsw.on{background:var(--white);color:var(--purple);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.vt-sep{width:1px;background:var(--border);height:20px;flex-shrink:0;margin:0 4px}
.filter-wrap{display:flex;align-items:center;gap:7px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 9px}
.filter-wrap input{border:none;background:transparent;font-size:11px;font-family:'Inter',sans-serif;color:var(--text);outline:none;width:140px}
.filter-wrap input::placeholder{color:var(--text-m)}
select.vt-sel{padding:4px 8px;border:1px solid var(--border);border-radius:6px;background:var(--bg);font-family:'Inter',sans-serif;font-size:11px;color:var(--text-s);cursor:pointer;outline:none}
.vt-right{display:flex;align-items:center;gap:6px;margin-left:auto}
.csv-btn{padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:transparent;font-size:11px;font-family:'Inter',sans-serif;color:var(--text-s);cursor:pointer;transition:all .15s;white-space:nowrap}
.csv-btn:hover{border-color:var(--purple);color:var(--purple)}
.add-btn{padding:5px 14px;border:none;border-radius:6px;background:var(--purple-btn);font-size:11px;font-weight:600;font-family:'Inter',sans-serif;color:#fff;cursor:pointer;transition:all .15s;white-space:nowrap}
.add-btn:hover{background:var(--purple-l)}

/* stage filter strip */
.stage-strip{background:var(--white);border-bottom:1px solid var(--border);padding:0 14px;display:flex;gap:2px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.stage-strip::-webkit-scrollbar{display:none}
.s-tab{padding:7px 12px;border:none;background:transparent;font-size:11px;font-weight:500;cursor:pointer;color:var(--text-s);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:5px}
.s-tab:hover{color:var(--text)}
.s-tab.on{color:var(--purple);border-bottom-color:var(--purple);font-weight:600}
.s-tab .sc{background:var(--bg);border-radius:9px;padding:1px 6px;font-size:9px;font-weight:600;color:var(--text-m)}
.s-tab.on .sc{background:var(--purple-pale);color:var(--purple)}

/* setup bar */
.setup-bar{background:var(--sb);padding:10px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--sb-border);flex-shrink:0}
.setup-bar.hidden{display:none}
.setup-bar input{flex:1;padding:6px 10px;border:1px solid rgba(124,92,191,.4);border-radius:6px;background:rgba(255,255,255,.07);color:#fff;font-size:12px;font-family:'Inter',sans-serif;outline:none}
.setup-bar input::placeholder{color:rgba(255,255,255,.3)}
.setup-bar label{color:var(--purple-l);font-size:11px;font-weight:600;white-space:nowrap}
.setup-save{background:var(--purple-btn);color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap}

/* overdue banner */
.overdue-bar{background:#fff5f5;border-bottom:1px solid #fecaca;padding:6px 14px;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--urgent);flex-shrink:0}
.overdue-bar.hidden{display:none}
.overdue-bar strong{font-weight:600}

/* ── BOARD ── */
.board-wrap{flex:1;overflow-x:auto;overflow-y:hidden;padding:14px 16px;display:flex;align-items:flex-start;gap:10px;background:var(--bg)}
.board-wrap.hidden{display:none}
.k-col{width:272px;flex-shrink:0;display:flex;flex-direction:column;max-height:100%;background:var(--bg)}
.k-col-hdr{display:flex;align-items:center;gap:7px;padding:0 4px 8px;flex-shrink:0}
.k-col-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.k-col-name{font-size:12px;font-weight:600;color:var(--text);flex:1}
.k-col-cnt{font-size:11px;color:var(--text-m);font-weight:400}
.k-col-val{font-size:10px;color:var(--text-m);margin-left:auto;font-weight:400}
.k-cards{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;padding-bottom:4px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.k-cards::-webkit-scrollbar{width:3px}
.k-cards::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.k-col-add{display:flex;align-items:center;gap:5px;padding:7px 6px;border-radius:6px;color:var(--text-m);font-size:11px;cursor:pointer;transition:all .15s;border:1.5px dashed var(--border);margin-top:2px;flex-shrink:0}
.k-col-add:hover{border-color:var(--purple);color:var(--purple);background:var(--purple-pale)}
.k-col.drag-over .k-cards{background:var(--purple-pale);border-radius:8px}

/* ── CARD ── */
.k-card{background:var(--card);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;user-select:none}
.k-card:hover{box-shadow:0 4px 14px rgba(0,0,0,.1);border-color:var(--border-h);transform:translateY(-1px)}
.k-card.dragging{opacity:.45;transform:rotate(1.5deg)}
.k-card-priority{height:3px;width:100%}
.k-card-body{padding:10px 11px}
.k-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:6px}
.k-card-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.35;flex:1}
.k-priority-flag{display:flex;align-items:center;gap:3px;font-size:9px;font-weight:600;padding:2px 6px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.pf-urgent{background:var(--urgent-pale);color:var(--urgent)}
.pf-high{background:var(--high-pale);color:var(--high)}
.pf-normal{background:var(--normal-pale);color:var(--normal-t)}
.pf-low{background:var(--low-pale);color:var(--low-t)}
.k-card-project{font-size:11px;color:var(--text-s);margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.k-card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:7px}
.k-tag{font-size:9px;padding:2px 7px;border-radius:10px;background:var(--bg);border:1px solid var(--border);color:var(--text-s);font-weight:500}
.k-card-footer{display:flex;align-items:center;justify-content:space-between;gap:4px}
.k-due{display:flex;align-items:center;gap:4px;font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500}
.kd-overdue{background:#fee2e2;color:var(--urgent)}
.kd-today{background:#fff7ed;color:var(--orange)}
.kd-upcoming{background:#f0fdf4;color:#065f46}
.kd-none{background:var(--bg);color:var(--text-m)}
.k-footer-right{display:flex;align-items:center;gap:6px}
.k-acts{font-size:10px;color:var(--text-m);display:flex;align-items:center;gap:3px}
.avatar-sm{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;flex-shrink:0;letter-spacing:.02em}

/* ── LIST VIEW ── */
.list-wrap{flex:1;overflow:auto;padding:14px 16px}
.list-wrap.hidden{display:none}
.l-table{width:100%;border-collapse:collapse;background:var(--card);border-radius:10px;border:1px solid var(--border);overflow:hidden}
.l-table thead th{background:#f9fafb;color:var(--text-s);padding:8px 13px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;border-bottom:1px solid var(--border)}
.l-table tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.l-table tbody tr:hover{background:#f9fafb}
.l-table tbody tr:last-child{border-bottom:none}
.l-table td{padding:9px 13px;font-size:12px;vertical-align:middle}
.l-status{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500}
.l-status-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.l-fu{font-size:10px;padding:2px 7px;border-radius:6px}

/* ── DASHBOARD ── */
.dash-wrap{flex:1;overflow:auto;padding:16px}
.dash-wrap.hidden{display:none}
.dash-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;position:relative;overflow:hidden}
.stat-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px}
.stat-card.sc-total::before{background:linear-gradient(90deg,var(--purple),var(--purple-l))}
.stat-card.sc-hot::before{background:linear-gradient(90deg,var(--high),var(--orange))}
.stat-card.sc-pipe::before{background:linear-gradient(90deg,var(--green),#34d399)}
.stat-card.sc-od::before{background:linear-gradient(90deg,var(--urgent),var(--high))}
.stat-label{font-size:10px;font-weight:600;color:var(--text-m);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.stat-val{font-size:28px;font-weight:700;color:var(--text);line-height:1}
.stat-sub{font-size:10px;color:var(--text-m);margin-top:4px}
.dash-charts{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px}
.chart-title{font-size:11px;font-weight:600;color:var(--text-s);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-lbl{font-size:11px;color:var(--text);width:92px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;background:var(--bg);border-radius:3px;height:6px;overflow:hidden}
.bar-fill{height:6px;border-radius:3px;background:var(--purple);transition:width .5s cubic-bezier(.4,0,.2,1);min-width:2px}
.bar-n{font-size:11px;color:var(--text-m);width:22px;text-align:right;flex-shrink:0;font-weight:500}
.dash-empty{font-size:11px;color:var(--text-m);font-style:italic}

/* ── DRAWER ── */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.25);backdrop-filter:blur(2px);z-index:200;display:flex;justify-content:flex-end}
.drawer-overlay.hidden{display:none}
.drawer{width:560px;max-width:100vw;height:100%;background:var(--white);display:flex;flex-direction:column;box-shadow:-8px 0 40px rgba(0,0,0,.12);animation:slideIn .22s ease}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.dr-hdr{background:var(--white);padding:14px 18px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.dr-hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.dr-name{font-size:18px;font-weight:700;color:var(--text);line-height:1.3;flex:1;margin-right:10px}
.dr-close{background:none;border:1px solid var(--border);border-radius:6px;color:var(--text-s);font-size:14px;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.dr-close:hover{background:var(--bg);border-color:var(--border-h)}
.dr-stage-bar{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.dr-stage-bar::-webkit-scrollbar{display:none}
.dr-stage-btn{padding:3px 10px;border-radius:12px;border:1px solid var(--border);background:var(--bg);font-size:10px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;transition:all .15s;color:var(--text-s)}
.dr-stage-btn.active{font-weight:600}
.dr-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);flex-shrink:0}
.dr-tab{padding:9px 16px;border:none;background:transparent;font-size:12px;font-weight:500;cursor:pointer;color:var(--text-s);border-bottom:2px solid transparent;font-family:'Inter',sans-serif;transition:all .15s}
.dr-tab.on{color:var(--purple);border-bottom-color:var(--purple);font-weight:600}
.dr-body{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:14px}
.dr-section-title{font-size:10px;font-weight:600;color:var(--text-m);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.info-item{display:flex;flex-direction:column;gap:3px}
.info-lbl{font-size:10px;color:var(--text-m);font-weight:500}
.info-val{font-size:12px;color:var(--text);font-weight:500}
.info-val.empty{color:var(--text-m);font-style:italic;font-weight:400}
.fu-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.fu-date-inp{padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-family:'Inter',sans-serif;font-size:12px;color:var(--text);background:var(--bg);outline:none;flex:1;min-width:120px;transition:border .15s}
.fu-date-inp:focus{border-color:var(--purple);background:#fff}
.fu-act-sel{padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-family:'Inter',sans-serif;font-size:11px;color:var(--text);background:var(--bg);outline:none;flex:1;transition:border .15s}
.fu-act-sel:focus{border-color:var(--purple)}
.fu-set-btn{background:var(--purple-btn);color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap}
.act-input-row{display:flex;gap:6px}
.act-type-sel{padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-family:'Inter',sans-serif;font-size:11px;background:var(--bg);outline:none;color:var(--text)}
.act-inp{flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-family:'Inter',sans-serif;font-size:12px;color:var(--text);background:var(--bg);outline:none;transition:border .15s}
.act-inp:focus{border-color:var(--purple);background:#fff}
.act-log-btn{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;color:var(--text-s);transition:all .15s}
.act-log-btn:hover{border-color:var(--purple);color:var(--purple)}
.act-list{display:flex;flex-direction:column;gap:5px;max-height:200px;overflow-y:auto}
.act-item{display:flex;gap:9px;padding:7px 10px;background:var(--bg);border-radius:6px;align-items:flex-start;border:1px solid var(--border)}
.act-icon{font-size:13px;flex-shrink:0;margin-top:1px}
.act-text{font-size:11px;color:var(--text);line-height:1.4}
.act-time{font-size:10px;color:var(--text-m);margin-top:1px}
.no-act{font-size:11px;color:var(--text-m);font-style:italic;padding:8px 0}
.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.edit-group{display:flex;flex-direction:column;gap:3px}
.edit-group.full{grid-column:1/-1}
.edit-lbl{font-size:10px;color:var(--text-m);font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.edit-inp,.edit-sel,.edit-ta{padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-family:'Inter',sans-serif;font-size:12px;color:var(--text);background:var(--bg);outline:none;width:100%;transition:border .15s}
.edit-inp:focus,.edit-sel:focus,.edit-ta:focus{border-color:var(--purple);background:#fff}
.edit-ta{resize:vertical;min-height:60px}
.dr-footer{padding:10px 18px;border-top:1px solid var(--border);display:flex;gap:7px;flex-shrink:0}
.dr-save{flex:1;background:var(--purple-btn);color:#fff;border:none;border-radius:7px;padding:9px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.dr-save:hover{background:var(--purple-l)}
.dr-del{background:transparent;border:1px solid var(--border);color:var(--text-s);border-radius:7px;padding:9px 14px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.dr-del:hover{border-color:var(--urgent);color:var(--urgent)}

/* ── MODAL ── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(4px);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-ov.hidden{display:none}
.modal{background:var(--white);border-radius:12px;width:100%;max-width:540px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);border:1px solid var(--border)}
.modal-hdr{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:1;border-radius:12px 12px 0 0}
.modal-hdr h2{font-size:15px;font-weight:700;color:var(--text)}
.modal-x{background:none;border:1px solid var(--border);border-radius:6px;color:var(--text-s);font-size:14px;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-body{padding:18px}
.m-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.m-group{display:flex;flex-direction:column;gap:4px}
.m-group.full{grid-column:1/-1}
.m-lbl{font-size:10px;font-weight:600;color:var(--text-m);text-transform:uppercase;letter-spacing:.04em}
.m-inp,.m-sel,.m-ta{padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-family:'Inter',sans-serif;font-size:12px;color:var(--text);background:var(--bg);outline:none;width:100%;transition:border .15s}
.m-inp:focus,.m-sel:focus,.m-ta:focus{border-color:var(--purple);background:#fff}
.m-ta{resize:vertical;min-height:55px}
.modal-ftr{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:7px;background:#fafafa;border-radius:0 0 12px 12px;position:sticky;bottom:0}
.btn-cancel{padding:7px 16px;border-radius:6px;border:1px solid var(--border);background:#fff;color:var(--text-s);font-family:'Inter',sans-serif;font-size:12px;cursor:pointer;transition:all .15s}
.btn-cancel:hover{background:var(--bg)}
.btn-add-lead{padding:7px 20px;border-radius:6px;border:none;background:var(--purple-btn);color:#fff;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-add-lead:hover{background:var(--purple-l)}

/* ── UTILS ── */
.loading{position:fixed;inset:0;background:rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center;z-index:500}
.loading.hidden{display:none}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:#fff;padding:9px 16px;border-radius:8px;font-size:12px;font-weight:500;box-shadow:0 6px 20px rgba(0,0,0,.2);z-index:600;transform:translateY(60px);transition:transform .25s;border-left:3px solid var(--purple)}
.toast.show{transform:translateY(0)}
.toast.err{border-left-color:var(--urgent)}
.empty{text-align:center;padding:32px;color:var(--text-m)}
.empty .ei{font-size:28px;margin-bottom:8px}
.empty p{font-size:12px}

@media(max-width:768px){
  .sidebar{width:52px}
  .sidebar .sb-label,.sidebar .ws-info,.sidebar .sb-section-label,.sidebar .sb-badge,.sidebar .sb-space-items{display:none}
}
</style>
</head>
<body>

<script>
// STATE
const LS_API  = 'phc_api_v3';
const LS_DATA = 'phc_leads_v3';
let API_URL      = localStorage.getItem(LS_API) || '';
let leads        = [];
let currentView  = 'kanban';
let stageFilter  = null;
let agentFilter  = '';
let drawerLeadId = null;
let drawerTab    = 'details';
let sidebarCollapsed = false;

const STAGES = [
  {k:'New Lead',    bg:'#dbeafe',t:'#1e40af',dot:'#3b82f6'},
  {k:'Contacted',   bg:'#fef3c7',t:'#92400e',dot:'#f59e0b'},
  {k:'Viewing',     bg:'#d1fae5',t:'#065f46',dot:'#10b981'},
  {k:'Negotiating', bg:'#ede9fe',t:'#4c1d95',dot:'#8b5cf6'},
  {k:'Closed',      bg:'#e0f2fe',t:'#0369a1',dot:'#0ea5e9'},
  {k:'Hold',        bg:'#f1f5f9',t:'#475569',dot:'#94a3b8'},
  {k:'Released',    bg:'#fee2e2',t:'#991b1b',dot:'#f87171'}
];

const ACTIVITY_ICONS = {
  'Call':'📞','WhatsApp':'💬','Email':'📧','Viewing':'🏠','Note':'📝','Meeting':'🤝','Other':'📌'
};

const AGENT_AV = {
  Nick:  {bg:'var(--av-nick)',  initials:'NK'},
  Monika:{bg:'var(--av-monika)',initials:'MO'},
  Reza:  {bg:'var(--av-reza)',  initials:'RE'}
};

// SCORING
const NS = {Japanese:5,German:4,Singaporean:4,British:3,Cambodian:3,Russian:3,Chinese:3,Other:2};
const BS = {'$500K+':5,'$300K-$500K':4,'$200K-$300K':3,'$100K-$200K':2,'Under $100K':1};
const TS = {'0-3 months':5,'3-6 months':4,'6-12 months':2,'12+ months':1};

function score(l){ return Math.round(((NS[l.nationality]||2)+(BS[l.budget]||1)+(TS[l.timeline]||1))/3); }

function priority(l){
  var sc = score(l);
  if(sc>=5) return {label:'Urgent',cls:'pf-urgent',color:'var(--urgent)',border:'#d63031'};
  if(sc>=4) return {label:'High',  cls:'pf-high',  color:'var(--high)',  border:'#e67e22'};
  if(sc>=3) return {label:'Normal',cls:'pf-normal',color:'var(--normal)',border:'#3b82f6'};
  return          {label:'Low',   cls:'pf-low',   color:'var(--low)',   border:'#9ca3af'};
}

// BUDGET MIDPOINTS
const BUDGET_MID = {'Under $100K':75000,'$100K-$200K':150000,'$200K-$300K':250000,'$300K-$500K':400000,'$500K+':500000};
function pipeVal(ls){ return ls.reduce(function(s,l){return s+(BUDGET_MID[l.budget]||0);},0); }
function fmtUSD(n){ if(n>=1000000) return '$'+(n/1000000).toFixed(1)+'M'; if(n>=1000) return '$'+Math.round(n/1000)+'K'; return '$'+n; }

// FOLLOW-UP
function today(){ return new Date().toISOString().split('T')[0]; }
function fuStatus(l){
  if(!l.followUpDate) return 'none';
  if(l.followUpDate<today()) return 'overdue';
  if(l.followUpDate===today()) return 'today';
  return 'upcoming';
}
function fuLabel(l){
  var s=fuStatus(l);
  if(s==='none') return {cls:'kd-none',txt:'No date'};
  var d=new Date(l.followUpDate+'T00:00:00');
  var fmt=d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  if(s==='overdue') return {cls:'kd-overdue',txt:'Overdue '+fmt};
  if(s==='today')   return {cls:'kd-today',  txt:'Today '+fmt};
  return {cls:'kd-upcoming',txt:fmt};
}

// AVATAR
function avatarHtml(agent,size){
  size = size||22;
  var av=AGENT_AV[agent]||{bg:'var(--low)',initials:(agent||'?').slice(0,2).toUpperCase()};
  return '<div class="avatar-sm" style="width:'+size+'px;height:'+size+'px;background:'+av.bg+'">'+av.initials+'</div>';
}

// API
async function apiGET(q){
  if(!API_URL) return null;
  try{ var r=await fetch(API_URL+'?'+new URLSearchParams(q)); return await r.json(); }catch{return null;}
}
async function apiPOST(body){
  if(!API_URL) return null;
  try{ var r=await fetch(API_URL,{method:'POST',body:JSON.stringify(body)}); return await r.json(); }catch{return null;}
}
async function loadLeads(){
  if(!API_URL){
    var c=localStorage.getItem(LS_DATA);
    leads=c?JSON.parse(c):sampleLeads();
    render(); return;
  }
  setLoading(true);
  var res=await apiGET({action:'getAll',sheet:'Leads'});
  setLoading(false);
  if(res&&res.success){
    leads=res.data.filter(function(r){return r.id;});
    localStorage.setItem(LS_DATA,JSON.stringify(leads));
    setApiStatus(true);
  } else {
    setApiStatus(false);
    var c=localStorage.getItem(LS_DATA);
    leads=c?JSON.parse(c):sampleLeads();
  }
  render();
}
async function persistLead(lead,isNew){
  localStorage.setItem(LS_DATA,JSON.stringify(leads));
  if(!API_URL) return;
  if(isNew) await apiPOST({action:'insert',sheet:'Leads',data:lead});
  else await apiPOST({action:'update',sheet:'Leads',id:lead.id,data:lead});
}

function sampleLeads(){

// FILTER
function getFiltered(){
  var q=document.getElementById('srchQ').value.toLowerCase();
  var nt=document.getElementById('fltNat').value;
  return leads.filter(function(l){
    if(stageFilter==='__overdue__') return fuStatus(l)==='overdue' && l.stage!=='Closed' && l.stage!=='Released';
    var mq=!q||(l.fullName||'').toLowerCase().includes(q)||(l.phone||'').toLowerCase().includes(q)||(l.interestedIn||'').toLowerCase().includes(q)||(l.notes||'').toLowerCase().includes(q);
    var ma=!agentFilter||l.agent===agentFilter;
    var mn=!nt||l.nationality===nt;
    var ms=!stageFilter||l.stage===stageFilter;
    return mq&&ma&&mn&&ms;
  });
}

// DASHBOARD
function renderDashboard(){
  var dash=document.getElementById('dashWrap');
  var total=leads.length;
  var hot=leads.filter(function(l){return score(l)>=4;}).length;
  var active=leads.filter(function(l){return l.stage!=='Closed'&&l.stage!=='Released';});
  var pv=pipeVal(active);
  var od=leads.filter(function(l){return fuStatus(l)==='overdue'&&l.stage!=='Closed'&&l.stage!=='Released';}).length;

  var stageCounts={};
  STAGES.forEach(function(s){stageCounts[s.k]=0;});
  leads.forEach(function(l){if(stageCounts[l.stage]!==undefined)stageCounts[l.stage]++;});
  var maxStage=Math.max.apply(null,Object.values(stageCounts).concat([1]));

  var srcCounts={};
  leads.forEach(function(l){if(l.source)srcCounts[l.source]=(srcCounts[l.source]||0)+1;});
  var srcEntries=Object.entries(srcCounts).sort(function(a,b){return b[1]-a[1];});
  var maxSrc=Math.max.apply(null,srcEntries.map(function(e){return e[1];}).concat([1]));

  var agCounts={Nick:0,Monika:0,Reza:0};
  leads.forEach(function(l){if(agCounts[l.agent]!==undefined)agCounts[l.agent]++;});
  var agMax=Math.max.apply(null,Object.values(agCounts).concat([1]));

  var priDist={Urgent:0,High:0,Normal:0,Low:0};
  leads.forEach(function(l){priDist[priority(l).label]++;});
  var priMax=Math.max.apply(null,Object.values(priDist).concat([1]));
  var priColors={Urgent:'var(--urgent)',High:'var(--high)',Normal:'var(--normal)',Low:'var(--low)'};

  dash.innerHTML=
    '<div class="dash-stats">'+
      '<div class="stat-card sc-total"><div class="stat-label">Total Leads</div><div class="stat-val">'+total+'</div><div class="stat-sub">All pipeline stages</div></div>'+
      '<div class="stat-card sc-hot"><div class="stat-label">Hot Leads</div><div class="stat-val">'+hot+'</div><div class="stat-sub">Urgent + High priority</div></div>'+
      '<div class="stat-card sc-pipe"><div class="stat-label">Active Pipeline</div><div class="stat-val">'+fmtUSD(pv)+'</div><div class="stat-sub">Excl. Closed &amp; Released</div></div>'+
      '<div class="stat-card sc-od"><div class="stat-label">Overdue</div><div class="stat-val">'+od+'</div><div class="stat-sub">Follow-up past due</div></div>'+
    '</div>'+
    '<div class="dash-charts">'+
      '<div class="chart-card"><div class="chart-title">By Stage</div>'+
        STAGES.map(function(s){return '<div class="bar-row"><div class="bar-lbl">'+s.k+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(stageCounts[s.k]/maxStage*100)+'%;background:'+s.dot+'"></div></div><div class="bar-n">'+stageCounts[s.k]+'</div></div>';}).join('')+
      '</div>'+
      '<div class="chart-card"><div class="chart-title">By Priority</div>'+
        Object.entries(priDist).map(function(e){return '<div class="bar-row"><div class="bar-lbl">'+e[0]+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(e[1]/priMax*100)+'%;background:'+priColors[e[0]]+'"></div></div><div class="bar-n">'+e[1]+'</div></div>';}).join('')+
      '</div>'+
      '<div class="chart-card"><div class="chart-title">By Source</div>'+
        (srcEntries.length?srcEntries.slice(0,8).map(function(e){return '<div class="bar-row"><div class="bar-lbl">'+escHtml(e[0])+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(e[1]/maxSrc*100)+'%"></div></div><div class="bar-n">'+e[1]+'</div></div>';}).join(''):'<div class="dash-empty">No source data yet.</div>')+
      '</div>'+
      '<div class="chart-card"><div class="chart-title">By Agent</div>'+
        Object.entries(agCounts).map(function(e){
          var av=AGENT_AV[e[0]]||{bg:'var(--low)',initials:'??'};
          return '<div class="bar-row"><div class="bar-lbl" style="display:flex;align-items:center;gap:5px"><div class="avatar-sm" style="width:16px;height:16px;font-size:7px;background:'+av.bg+'">'+av.initials+'</div>'+escHtml(e[0])+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(e[1]/agMax*100)+'%;background:'+av.bg+'"></div></div><div class="bar-n">'+e[1]+'</div></div>';
        }).join('')+
      '</div>'+
    '</div>';
}

// CSV
function exportCSV(){
  var fields=['fullName','nationality','phone','email','budget','timeline','interestedIn','source','stage','priority','agent','followUpDate','followUpAction','notes','createdAt'];
  var headers=['Name','Nationality','Phone','Email','Budget','Timeline','Project','Source','Stage','Priority','Agent','Follow-up Date','Follow-up Action','Notes','Created At'];
  var rows=[headers].concat(leads.map(function(l){
    return fields.map(function(f){
      var v=f==='priority'?priority(l).label:(l[f]||'');
      return '"'+String(v).replace(/"/g,'""')+'"';
    });
  }));
  var csv=rows.map(function(r){return r.join(',');}).join('\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='phc_leads_'+today()+'.csv';a.click();URL.revokeObjectURL(url);
  toast('CSV exported - '+leads.length+' leads');
}

// DRAG & DROP
function onDragOver(e,col){e.preventDefault();col.classList.add('drag-over');}
function onDragLeave(col){col.classList.remove('drag-over');}
async function onDrop(e,stage){
  e.preventDefault();
  document.querySelectorAll('.k-col').forEach(function(c){c.classList.remove('drag-over');});
  var id=e.dataTransfer.getData('leadId');
  var lead=leads.find(function(l){return l.id===id;});
  if(!lead||lead.stage===stage) return;
  var old=lead.stage;
  lead.stage=stage;
  lead.activities=lead.activities||[];
  lead.activities.unshift({type:'Note',note:'Moved from '+old+' to '+stage,ts:new Date().toISOString()});
  await persistLead(lead,false);
  render();
  toast(lead.fullName+' moved to '+stage);
}

  var old=l.stage;
  l.stage=stage;
  l.activities=l.activities||[];
  l.activities.unshift({type:'Note',note:'Stage: '+old+' to '+stage,ts:new Date().toISOString()});
  await persistLead(l,false);
  openDrawer(l.id);
  render();
  toast('Moved to '+stage);
}

async function saveFollowUp(){
  var l=leads.find(function(x){return x.id===drawerLeadId;});
  if(!l) return;
  l.followUpDate=document.getElementById('drFUDate').value;
  l.followUpAction=document.getElementById('drFUAction').value;
  if(l.followUpDate){
    l.activities=l.activities||[];
    l.activities.unshift({type:'Note',note:'Follow-up set: '+l.followUpDate+(l.followUpAction?' - '+l.followUpAction:''),ts:new Date().toISOString()});
  }
  await persistLead(l,false);
  openDrawer(l.id);
  render();
  toast('Follow-up saved');
}

async function logActivity(){
  var l=leads.find(function(x){return x.id===drawerLeadId;});
  if(!l) return;
  var type=document.getElementById('actType').value;
  var note=document.getElementById('actNote').value.trim();
  if(!note){toast('Enter activity note',true);return;}
  l.activities=l.activities||[];
  l.activities.unshift({type:type,note:note,ts:new Date().toISOString()});
  document.getElementById('actNote').value='';
  await persistLead(l,false);
  renderDrawerActivity(l);
  toast(type+' logged');
}

async function saveLead(){
  var l=leads.find(function(x){return x.id===drawerLeadId;});
  if(!l) return;
  l.fullName=document.getElementById('eFullName').value.trim();
  l.nationality=document.getElementById('eNat').value;
  l.phone=document.getElementById('ePhone').value.trim();
  l.email=document.getElementById('eEmail').value.trim();
  l.budget=document.getElementById('eBudget').value;
  l.timeline=document.getElementById('eTimeline').value;
  l.interestedIn=document.getElementById('eProject').value;
  l.agent=document.getElementById('eAgent').value;
  l.notes=document.getElementById('eNotes').value.trim();
  await persistLead(l,false);
  closeDrawer();
  render();
  toast('Lead updated');
}

async function deleteLead(){
  var l=leads.find(function(x){return x.id===drawerLeadId;});
  if(!l||!confirm('Delete '+l.fullName+'? Cannot be undone.')) return;
  if(API_URL) await apiPOST({action:'delete',sheet:'Leads',id:l.id});
  leads=leads.filter(function(x){return x.id!==l.id;});
  localStorage.setItem(LS_DATA,JSON.stringify(leads));
  closeDrawer();
  render();
  toast('Lead deleted');
}

// ADD LEAD
function openAdd(){ openAddForStage('New Lead'); }
function openAddForStage(stage){
  ['mName','mPhone','mEmail','mNotes'].forEach(function(id){document.getElementById(id).value='';});
  ['mNat','mBudget','mTimeline','mProject','mSource'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('mFU').value='';
  document.getElementById('mAgent').value='Nick';
  document.getElementById('modalOv').classList.remove('hidden');
  document.getElementById('modalOv').dataset.stage=stage;
}
function closeModal(){document.getElementById('modalOv').classList.add('hidden');}
async function addLead(){
  var name=document.getElementById('mName').value.trim();
  if(!name){toast('Name required',true);return;}
  var stage=document.getElementById('modalOv').dataset.stage||'New Lead';
  var l={
    id:crypto.randomUUID(),fullName:name,
    nationality:document.getElementById('mNat').value,
    phone:document.getElementById('mPhone').value.trim(),
    email:document.getElementById('mEmail').value.trim(),
    budget:document.getElementById('mBudget').value,
    timeline:document.getElementById('mTimeline').value,
    interestedIn:document.getElementById('mProject').value,
    source:document.getElementById('mSource').value,
    agent:document.getElementById('mAgent').value,
    stage:stage,followUpDate:document.getElementById('mFU').value,
    followUpAction:'',notes:document.getElementById('mNotes').value.trim(),
    activities:[],createdAt:new Date().toISOString()
  };
  leads.unshift(l);
  await persistLead(l,true);
  closeModal();
  render();
  toast(l.fullName+' added');
}

// UI HELPERS
function setView(v){
  currentView=v;
  document.getElementById('boardWrap').classList.toggle('hidden',v!=='kanban');
  document.getElementById('listWrap').classList.toggle('hidden',v!=='list');
  document.getElementById('dashWrap').classList.toggle('hidden',v!=='dash');
  document.getElementById('vKanban').classList.toggle('on',v==='kanban');
  document.getElementById('vList').classList.toggle('on',v==='list');
  document.getElementById('vDash').classList.toggle('on',v==='dash');
  render();
}

function setStageFilter(s){
  stageFilter=s;
  var bc=s||(agentFilter?agentFilter+' Leads':'All Leads');
  document.getElementById('bcCurrent').textContent=bc;
  render();
}

function sbSetFilter(s,label,el){
  stageFilter=s;
  agentFilter='';
  document.getElementById('bcCurrent').textContent=label||'All Leads';
  document.querySelectorAll('.sb-item.sb-sub').forEach(function(x){x.classList.remove('active');});
  if(el) el.classList.add('active');
  if(currentView==='dash') setView('kanban');
  render();
}

function sbSetAgent(agent,el){
  agentFilter=agent;
  stageFilter=null;
  document.getElementById('bcCurrent').textContent=agent?(agent+'\'s Leads'):'All Leads';
  document.querySelectorAll('[id^="sbAgent"]').forEach(function(x){x.classList.remove('active');});
  if(el) el.classList.add('active');
  render();
}

function sbSearch(q){ document.getElementById('srchQ').value=q; render(); }
function goDash(){ setView('dash'); document.getElementById('bcCurrent').textContent='Dashboard'; }
function goOverdue(){ sbSetFilter('__overdue__','Overdue',document.getElementById('sbOverdue')); }

function toggleSidebar(){
  sidebarCollapsed=!sidebarCollapsed;
  document.getElementById('sidebar').classList.toggle('collapsed',sidebarCollapsed);
  document.querySelector('.collapse-btn').textContent=sidebarCollapsed?'›':'‹';
}

function toggleSpace(hdr){
  var items=document.getElementById('spaceItems');
  var toggle=hdr.querySelector('.sb-space-toggle');
  var isOpen=items.style.maxHeight!=='0px'&&items.style.maxHeight!=='';
  if(isOpen){items.style.maxHeight='0px';toggle.textContent='▶';}
  else{items.style.maxHeight='400px';toggle.textContent='▼';}
}

function toggleSetup(){
  var b=document.getElementById('setupBar');
  b.classList.toggle('hidden');
  if(!b.classList.contains('hidden')) document.getElementById('apiInput').value=API_URL;
}
function saveApi(){
  var u=document.getElementById('apiInput').value.trim();
  if(!u) return;
  API_URL=u;localStorage.setItem(LS_API,u);
  document.getElementById('setupBar').classList.add('hidden');
  toast('Connected - loading...');
  loadLeads();
}
function setApiStatus(ok){
  document.getElementById('apiDot').className='api-dot'+(ok?' live':' err');
  document.getElementById('apiTxt').textContent=ok?'Sheets live':'Local mode';
}
function setLoading(v){document.getElementById('loadingEl').classList.toggle('hidden',!v);}
function toast(msg,err){
  var t=document.getElementById('toastEl');
  t.textContent=msg;
  t.className='toast'+(err?' err':'');
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},3000);
}

// XSS HELPERS
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s){ return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// INIT
document.addEventListener('DOMContentLoaded',function(){
  if(API_URL) setApiStatus(false);
  loadLeads();
});
</script>
</body>
</html>
